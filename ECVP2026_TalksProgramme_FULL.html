<script>
const talks=[{"Day": "Monday", "Time": "10:30", "Session": "Symposium: Strategies for searching: better understanding visual foraging through the study of individual differences", "Room": "Tregonwell Hall", "Title": "Foraging tempo revisited: How does time pressure contribute to individual differences in target selection behaviour?", "Speaker": "Ian M. Thornton", "CoAuthors": "Árni Kristjánsson", "Abstract": "An unexpected finding in the human foraging study by Kristjánsson, Jóhannesson & Thornton (2014) was that a minority of individuals (25%) showed little if any difference in run patterns under feature versus conjunction conditions. We termed these individuals “super-foragers”. Since that time, similar cohorts have been reported in many other studies, and attempts have been made to understand the characteristics of such individuals. In the current presentation, we will briefly review what we know to-date about individual differences in the context of foraging, and will then focus on new studies from our group linking run-pattern preferences to more general cognitive mechanism, in particular “processing speed”. Thornton, Nguyen & Kristjánsson (2021) demonstrated experimentally that manipulating the “foraging tempo” with which participants were allowed to select consecutive targets strongly influenced patterns of runs. Building on this finding, we will present new data exploring whether independently measured individual differences in the ability to make decisions under time pressure can be related to observed patterns of runs during human foraging tasks.", "SubmissionID": ""}, {"Day": "Monday", "Time": "10:30", "Session": "Multisensory and Haptic Perception", "Room": "Purbeck Lounge", "Title": "The Beep-Speed Illusion: Perception rather than bias", "Speaker": "Hauke S. Meyerhoff", "CoAuthors": "Simon Merz, Christian Frings", "Abstract": "When two objects move randomly across a screen and occasionally change direction, brief beeps synchronized with the direction changes of one object lead participants to indicate the synchronized disk as moving faster than the other in a forced-choice paradigm. This effect is observed both with and without eye movements, and across different object speeds and motion trajectories. We refer to this phenomenon as the Beep-Speed Illusion. We propose two potential explanations for the Beep-Speed Illusion. First, attentional mechanisms may enhance the processing of the beep-synchronized disk, leading to an increase in its perceived speed. Alternatively, decisional biases in response behavior may underlie the effects observed in our experiments.\n\nWith regard to attentional explanations, our results show that guiding visual attention toward one of the visual objects, rather than presenting beep sounds, elicits a similar illusion. This finding suggests an attentional origin of the Beep-Speed Illusion. With regard to decisional biases, our results indicate that simple response biases (i.e., selecting the synchronized object) cannot account for the illusion, as the same pattern of results emerges when observers are instructed to select either the faster or the slower object. Furthermore, the Beep-Speed Illusion is also observed in an equality judgment paradigm, in which participants indicate whether the two objects move at the same or at different speeds. This rules out more complex decisional biases arising from forced-choice tasks. In sum, our findings provide little evidence for decisional biases as an explanation for the Beep-Speed Illusion and instead point to differences in attentional processing between the synchronized and unsynchronized objects.", "SubmissionID": 9.0}, {"Day": "Monday", "Time": "10:30", "Session": "Perceptual Learning and Memory", "Room": "Bayview Suite", "Title": "Real-time neurofeedback training to modulate glutamate concentration using functional magnetic resonance spectroscopy", "Speaker": "Savanna Babu", "CoAuthors": "Nina Beck, Zhiyan Wang, Sebastian Frank", "Abstract": "Real-time neurofeedback training enables participants to learn to modulate their brain activity in a desired direction. However, existing neurofeedback trainings either rely on indirect measures of brain activity or lack spatial specificity, which limits the effectiveness of the technique. Here, we introduce a real-time neurofeedback training using functional magnetic resonance spectroscopy (fMRS) to directly modulate excitatory activity within a volume-of-interest (VOI) located in the occipital lobes (mainly consisting of early visual areas V1 and V2). fMRS is an MRI-based technique that allows non-invasive, near real-time measurement of the concentration of glutamate, a major excitatory neurotransmitter, in a predefined VOI. College-age participants (fifteen per condition) either trained to increase or decrease glutamate concentration using veridical feedback about their performance, or trained with random feedback as a control condition. Participants were unaware of their group assignment and of the purpose of the neurofeedback training. The following procedure was used. First, pretraining glutamate concentration was measured, followed by thirty neurofeedback training trials. Each trial included a sixteen-second induction phase during which participants applied self-selected mental strategies to modulate glutamate levels relative to the pretraining concentration. Performance was subsequently provided as veridical or random visual feedback. Glutamate concentration in the VOI was measured using consecutive two-second PRESS scans in a 3T MRI scanner. The results showed that within a thirty-minute training period, participants successfully learned to increase or decrease glutamate concentration relative to the pretraining concentration, whereas no significant concentration changes occurred in the control group. This indicates that real-time neurofeedback training using fMRS enables participants to rapidly learn to modulate excitatory activity in a predefined brain region. The developed procedure overcomes limitations set by previous neurofeedback training techniques and could support treatment procedures in patients with maladaptive excitatory processing.", "SubmissionID": 131.0}, {"Day": "Monday", "Time": "10:45", "Session": "Symposium: Strategies for searching: better understanding visual foraging through the study of individual differences", "Room": "Tregonwell Hall", "Title": "How working memory shapes visual foraging behaviour: insights from individual differences", "Speaker": "Maha Haggouch", "CoAuthors": "Karine Doré-Mazars, & Jérôme Tagu", "Abstract": "Previous research has shown that visual foraging strategies vary with task difficulty. In easy tasks, where targets and distractors differ by a single feature, participants typically adopt a proximity-based strategy, selecting the nearest target and frequently switching between target types. In difficult tasks, involving conjunctions of features, most participants adopt a category-based strategy, focusing on one target type at a time. However, individual differences are observed, with individuals showing category-based and proximity-based strategies in the same foraging task. The present study aimed to examine whether increasing working memory load – by increasing perceptual and motor load – would favour category-based strategies in all observers. We also investigated the relationship between individual differences in foraging strategy and individual differences in executive functioning. Each participant completed eight exhaustive visual foraging tasks (four feature-based and four conjunction-based), in which the number of target types (two vs. three) and response modality (mouse clicks vs. gaze fixation) were manipulated. Participants then performed three cognitive tasks assessing executive functions (inhibition, attentional flexibility, and visual working memory). Preliminary analyses indicate that increasing the number of target types favours a category-based strategy, and lengthens inter-target times. Participants with higher working memory spans were also more likely to change strategies with task difficulty, showing higher adaptability in foraging tasks. Overall, these findings highlight the role of executive functioning in foraging behaviour, with visual working memory playing a central role in both foraging behaviour and selection strategy.", "SubmissionID": ""}, {"Day": "Monday", "Time": "10:45", "Session": "Multisensory and Haptic Perception", "Room": "Purbeck Lounge", "Title": "Exploring pivotal moments in visual potential: Gaze behavior during visual and tactile exploration of sculptures", "Speaker": "Eleftheria Pistolas", "CoAuthors": "Johan Wagemans", "Abstract": "As observers move around a sculpture, shifts in viewpoint generate a sequence of geometric events in openings, ridges, cusps, occlusions, and T‑junctions. From the set of all visual experiences obtainable when traversing any orbit through space, these critical events in visual potential might attract attention and guide perceptual processing. In contrast, tactile exploration affords full access to the 3D form from a fixed visual position, enabling interaction with shape without the accompanying visual transformations produced by moving around the sculptures. To investigate how these two modes of exploration affect perceptual processing, we conducted an exhibition‑based study using eight sculptures by Joos Vandewalle, selected to vary in color, geometry, and structural complexity. In a within‑participants design, observers either freely moved around each sculpture to interact with its visual potential or explored it by touch from a fixed viewpoint using both hands. Participants wore mobile eye‑tracking glasses and a fiducial marker on top of the head, tracked by a ceiling camera. Fixations were coded into eight areas of interest, including outer edges, inner edges, surface regions, and pedestal in either a visual exploration trial or a tactile exploration trial. During visual trials, our data revealed a significantly lower proportion of fixations on surface regions compared to tactile trials. Heat maps showed a high density of fixations at emerging or disappearing openings, ridges, cusps, and contour junctions, precisely those locations where changes in visual potential occur. During tactile trials, although those salient aspects also attracted attention, the gaze also seemed to linger more on the surface of the sculptures, converging with our quantitative analysis of the areas of interest.", "SubmissionID": 121.0}, {"Day": "Monday", "Time": "10:45", "Session": "Perceptual Learning and Memory", "Room": "Bayview Suite", "Title": "Perceptual learning of a Form-from-Velocity task in eccentric visual locations with varying levels of sustained attention performance", "Speaker": "Mark Greenlee", "CoAuthors": "Elena von Perponcher, Sarah Kestler, Tina Plank", "Abstract": "Individuals with central vision loss rely on peripheral vision, leading to the development of a \"preferred retinal locus\" (PRL) through oculomotor and perceptual learning. The mechanisms guiding PRL location selection are still under investigation. One proposed factor influencing PRL location selection is the individual ability to sustain attention at that location. To investigate the link between sustained attention and perceptual learning, we assessed sustained attention in eight peripheral locations (8° eccentricity) in 19 normally sighted participants (18-30 years). Participants fixated centrally and directed their attention for 2.5–4 seconds to a cued eccentric location before identifying the orientation of a Landolt-C gap (up, down, left, right) at that location, amidst full-ring distractors in the other seven locations, followed by 100 ms masks across all locations. Participants then underwent perceptual learning of a speed discrimination task at their highest (HPL) and lowest (LPL) sustained attention performance locations. We used a form-from-velocity (FFV) task where different orientations of a virtual, motion-defined, triangle should be detected among moving dots. The target figure was distinguishable by a difference in speed of the target moving dots compared to the background moving dots. White coherently moving dots on a black background were used with randomly alternating overall motion direction (upwards, downwards, left, right). The target form was triangularly shaped and presented in two directions (apex pointing up/down; 2AFC). Participants had to indicate on each trial the orientation of the triangle, while fixating a central fixation cross. Results indicate a significant learning effect, demonstrated by significantly increased hit rates in the FFV task after training (p=.01) at both locations. Additionally, there were lower speed difference thresholds at the HPL in comparison to the LPL (p=.002). The results show that speed discrimination performance in the peripheral visual field may be modulated by differences in sustained attention abilities.", "SubmissionID": 243.0}, {"Day": "Monday", "Time": "11:00", "Session": "Symposium: Strategies for searching: better understanding visual foraging through the study of individual differences", "Room": "Tregonwell Hall", "Title": "Immersive virtual reality for probing visual foraging across the lifespan.", "Speaker": "Sarah K. Salo", "CoAuthors": "Matthew E. Roser, & Alastair D. Smith", "Abstract": "Psychological assays of human search behaviour have traditionally relied on the visual search paradigm, often treated as a simplified proxy for naturalistic visual foraging. However, relatively little is known about how visual foraging operates across the lifespan, particularly in large-scale environments where age-related changes in cognition may interact with strategy use and exploration. Such changes may be exacerbated in neurodegenerative conditions such as Alzheimer’s disease, contributing to a growing interest in visual foraging as a potential early behavioural marker of atypical cognitive decline. To address this, we developed an immersive virtual reality paradigm to examine visual foraging. Across a series of task manipulations, search behaviour was systematically influenced by target features and spatial distribution, revealing trade-offs between patch exploitation and exploration. These effects emerged largely independent of explicit instruction, suggesting that visual attention drives foraging strategy even when behaviour requires complex, large-scale movement. A follow-up study combining the paradigm with cognitive assessment and neuroimaging in younger and older adults revealed that group-level age differences in visual foraging performance were relatively modest, consistent with accounts of adaptive compensation in ageing. However, cognitive profiles, rather than age per se, differentiated more and less efficient foragers. These findings position immersive visual foraging as a tool for studying cognitive ageing. Rather than reflecting uniform decline, age-related differences in behaviour appear to be shaped by variability in underlying cognitive function, pointing to visual foraging as a sensitive behavioural lens on the earliest shifts in cognitive ageing, and highlighting the importance of understanding search behaviour through the lens of individual variability.", "SubmissionID": ""}, {"Day": "Monday", "Time": "11:00", "Session": "Multisensory and Haptic Perception", "Room": "Purbeck Lounge", "Title": "When Sound Leads Vision: Temporal Dynamics of Cross-Modal Prediction", "Speaker": "Merve Kiniklioglu", "CoAuthors": "Daniel Kaiser", "Abstract": "In everyday life, the brain continuously integrates information across sensory modalities, forming expectations about what is likely to occur next. These cross-modal predictions allow input from one modality (e.g., audition) to anticipate and modulate processing in another (e.g., vision). Here, we manipulated the temporal synchrony between auditory and visual streams and used time-resolved fMRI multivariate pattern analysis to test whether leading auditory input can predictively shape representations in visual cortex. Participants (N = 30) viewed sixteen 10-second naturalistic videos depicting everyday cooking actions (e.g., chopping, peeling, blending, pouring, frying, grating). Audio tracks were shifted by 3 seconds to precede the visual input (“leading” condition), follow it (“lagging” condition), or remain synchronized (“synchronous” condition). Participants monitored audiovisual congruency by detecting occasional mismatches between sound and video. We performed pairwise decoding of the sixteen stimuli within each ROI to assess the discriminability of stimulus-specific activity patterns across conditions. Leading sounds yielded higher decoding accuracy than lagging sounds in scene-selective PPA and object-selective LO, indicating that predictive auditory cues enhance visual representations of upcoming events across visual regions. In contrast, decoding accuracy in multisensory regions IPS and IFG tended to be higher in the lagging than in the leading and synchronous conditions, consistent with increased demands for temporal conflict monitoring. Time-resolved decoding further revealed that decoding in PPA exhibited a steeper rise when sounds led the visual input, whereas in IFG the rise was steeper when sounds lagged. Together, these findings demonstrate that anticipatory signals from one sensory modality can predictively shape representations in another, highlighting the temporal dynamics of cross-modal predictive processing.", "SubmissionID": 269.0}, {"Day": "Monday", "Time": "11:00", "Session": "Perceptual Learning and Memory", "Room": "Bayview Suite", "Title": "Excessive exposure to a task-irrelevant feature jeopardizes the long-term retention of perceptual learning", "Speaker": "Markus Becker", "CoAuthors": "Susanna Hirschle, Sebastian M. Frank", "Abstract": "Repeated exposure to a visual feature (e.g., a coherent motion direction) enhances discrimination sensitivity for that feature, reflecting visual perceptual learning (VPL). Previous studies showed that, once acquired, VPL can persist for months after the exposure period. Here we made a surprising observation, namely that excessive exposure to a task-irrelevant feature jeopardizes the long-term retention of VPL for that feature. In a first behavioral experiment, thirty college-age participants performed a rapid-serial-visual-presentation-task at screen center while being exposed to a near-threshold task-irrelevant coherent motion direction in the visual surroundings. Participants were randomly assigned to short-exposure (six sessions) and long-exposure (twelve sessions) groups. Discrimination sensitivity for the direction was assessed before the beginning, immediately after, and again three months after the exposure period. Both groups enhanced discrimination sensitivity for the exposed direction, reflecting VPL. During the retest three months later, discrimination sensitivity remained enhanced in the short-exposure group but returned to preexposure levels in the long-exposure group, indicating that the long-term consolidation of VPL had failed. To understand the neural mechanisms underlying the consolidation failure, a follow-up imaging experiment was conducted. Fifteen new participants completed the long-exposure behavioral protocol and underwent additional exposure sessions in the scanner before the beginning, midway through, immediately after, and at retest. Again, we found that VPL for the exposed direction was not retained at retest. Functional magnetic resonance imaging showed that activity in area MT+, crucial for coherent motion perception, remained high in the preexposure and midway scans but declined sharply in the posttraining and retest scans. This indicates that attenuated neural processing of the task-irrelevant feature after the first exposure period impairs the long-term consolidation of VPL. Our results suggest that a moderate amount of exposure is optimal for inducing and retaining VPL.", "SubmissionID": 45.0}, {"Day": "Monday", "Time": "11:15", "Session": "Symposium: Strategies for searching: better understanding visual foraging through the study of individual differences", "Room": "Tregonwell Hall", "Title": "Visual foraging patterns as distinguishing features: A predictive model for PSP vs. Parkinson's Disease", "Speaker": "Manjiri Bhat", "CoAuthors": "Alexis Cheviet, Daniel Smith, Anna Hughes, & Alasdair Clarke", "Abstract": "Progressive supranuclear palsy (PSP) is a rare neurodegenerative condition associated with disturbances in motor movement, including deficits in eye movement control. Its rarity means diagnosis is typically delayed by around 3.5 years compared to more prevalent movement disorders such as Parkinson's disease (PD). Here, we examined whether foraging behaviour could distinguish between PSP and PD patients, using the Bells Test as a clinical screening tool. Three patient groups: PD (N = 29), PSP (N = 28), and age-matched controls (AMC, N = 27), each completed one trial, searching for 30 bells embedded among distractor items on an A4 sheet. We applied a generative model to characterise search strategy, which predicts the sequence of item selections using latent parameters: proximity (bias toward nearer bells), momentum (bias toward continued forward motion or reversals), and absolute direction (bias toward a consistent search direction). PD patients and controls exhibited similar behaviour, both showing strong directional biases consistent with 'reading-like' search patterns, and both achieving comparable item-by-item prediction accuracy (~40%). PSP patients, by contrast, showed markedly disorganised search with no consistent directional or distance-based strategy, reflected in substantially lower prediction accuracy (~15%). Importantly, the model only requires the order of target selections from a single trial, suggesting that it could potentially be implemented as a practical tool in clinical settings. These findings suggest that foraging strategy captures meaningful differences between the two patient groups, and we discuss additional analyses aimed at evaluating the model's capacity to discriminate between PSP and PD at the individual level.", "SubmissionID": ""}, {"Day": "Monday", "Time": "11:15", "Session": "Multisensory and Haptic Perception", "Room": "Purbeck Lounge", "Title": "Where does the multisensory orienting advantage arise? ERP evidence at 50 ms cue-target onset asynchrony", "Speaker": "Luke Scott", "CoAuthors": "Ada Kritikos, Amanda Robinson, Philip Grove, Mick Zeljko", "Abstract": "Research using response times demonstrate a multisensory (audiovisual; bimodal) orienting advantage at short cue–target onset asynchronies (CTOAs; 50 ms), suggesting that multisensory integration (MSI) facilitates exogenous attentional orienting. Drift diffusion modelling indicates that this advantage is primarily expressed as a reduction in non-decision time, implicating faster sensory encoding and/or response-related processes rather than enhanced evidence accumulation. To localise this effect, the present study uses EEG to dissociate early sensory processing (N1) from later attentional selection (N2pc, P3a) and motor execution (RP), testing whether multisensory facilitation reflects early sensory gain, downstream attentional prioritisation, or speeded motor execution.\n\nParticipants performed a speeded visual orientation discrimination task following spatially non-predictive unimodal (visual), crossmodal (auditory), or bimodal (audiovisual) cues presented at a 50 ms CTOA. Analyses focused on target-locked P1 and N1 as indices of early visual processing, N2pc and P3a as markers of attentional allocation, and response-locked motor potentials to assess motor execution.\n\nWe replicated previously published response time findings. EEG measures indicated a modality × validity interaction in target-locked N1 amplitude, such that validity effects were larger for targets following bimodal cues than following unimodal or crossmodal cues. This effect was driven by greater negativity on invalid trials, which may reflect increased processing demands associated with attentional reorienting to targets appearing at invalid locations. Given the short cue–target interval, early target-locked components likely reflect a combination of cue-related and target-evoked activity. However, the observed validity-dependent modulation suggests that these effects are not solely driven by cue-evoked activity. Importantly, no corresponding modulation was observed in response-locked motor potentials, indicating that the multisensory advantage is unlikely to reflect changes in motor execution and instead arises at earlier perceptual or attentional stages.", "SubmissionID": 417.0}, {"Day": "Monday", "Time": "11:15", "Session": "Perceptual Learning and Memory", "Room": "Bayview Suite", "Title": "Representing the Future Objects in Working Memory", "Speaker": "Chenxiao Guan", "CoAuthors": "Xutao Zheng, Hai Zhang, Mowei Shen, Hui Chen", "Abstract": "It is widely acknowledged that we can recall the past state of an object, but can we also “remember” the state of an object that has not yet formed but holds the possibility to form in the future? This study explores how these possibility for a unified future object shapes visual working memory. Participants viewed puzzle-like stimulus pairs. Crucially, some pairs have possibility to be combined into a single, completed object (possible condition), while others remained separate pieces (impossible condition). Participants were asked to memorize the spatial gap between the pieces and, after a brief delay, move one of the piece to reproduce that distance. We found that the remembered distances were significantly shorter for possible pairs than impossible pairs. This finding persisted across varied orientations and shapes in follow-up tests, suggesting the representation of possible pairs was different from impossible pairs in working memory. To probe the neural signature of representing a possible future, we employed EEG during a change-detection task. During encoding  (0–500 ms), possible pairs captured attention similarly to a single piece but significantly different from impossible pairs, indicating they were rapidly integrated into a unified object representation. Critically, during maintenance (500–2000 ms), the match condition demanded the most attentional resources. This might reflects holding a \"future object\" in mind for change detection task is a double duty: one must preserve both the holistic, integrated form and the specific shape details of the pieces. Mismatched pieces, lacking this integrated future, required only simple shape memory. Our findings suggest a fascinating expansion of memory's reach. Working memory does not merely record the past; it actively sketches the shape of objects to come, holding space for objects that exist only in potential.", "SubmissionID": 294.0}, {"Day": "Monday", "Time": "11:30", "Session": "Multisensory and Haptic Perception", "Room": "Purbeck Lounge", "Title": "Perceptual cues underlying surface softness of touched textiles", "Speaker": "Knut Drewing", "CoAuthors": "Didem Katircilar, Qingyu Sun, Sairam Saikumur, Wehinger Marei, Roland Bennewitz", "Abstract": "Softness is a core dimension in human haptic material perception. Previous research has predominantly focused on compliance as a physical correlate of softness and on normal deformation (“pressure”) as the primary exploratory procedure. However, softness is also reliably perceived during lateral stroking, indicating that surface softness constitutes a distinct and relevant aspect of haptic experience—for instance when interacting with textiles, biological tissues, or human skin. Despite its importance, the perceptual mechanisms underlying surface softness judgments are poorly understood. While earlier industry-oriented studies have reported correlations between perceived surface softness and various physical parameters (e.g., acoustic emissions), the perceptual cues driving these judgments are still unclear. In the present study, we systematically investigated candidate cues including friction, roughness, and deformability during active touch. Thirty-eight participants explored 38 textile samples spanning fibrillary (e.g., velvet, fur) and non-fibrillary (e.g., silk, denim) materials using controlled lateral stroking movements. Visual and auditory information was minimized via an opaque curtain and headphones. Exploration force was monitored using motion tracking and regulated through real-time auditory feedback. Each stimulus was explored for 4 seconds. Participants provided magnitude estimates of perceived surface softness and rated surface descriptors on Likert scales. Kinematic and force parameters were recorded continuously. A principal component analysis of the descriptor ratings revealed four dimensions: smoothness/hairiness, roughness/friction, deformability, and velvetiness. Linear mixed-effects modelling showed that perceived surface softness increased with hairiness, velvetiness, deformability, and applied force, but decreased with perceived roughness/friction. Notably, the physical coefficient of friction and movement speed did not significantly predict surface softness judgments. These findings demonstrate that surface softness is a multidimensional percept arising from multiple interacting perceptual cues. Future work will further disentangle the relative contributions and underlying mechanisms of these cues.", "SubmissionID": 226.0}, {"Day": "Monday", "Time": "11:30", "Session": "Perceptual Learning and Memory", "Room": "Bayview Suite", "Title": "Two routes to scene memory: attention and image-intrinsic memorability", "Speaker": "Sule Tasliyurt Celebi", "CoAuthors": "Katharina Dobs", "Abstract": "What we remember depends not only on image properties but also on how we sample visual information. While models such as ResMem predict memorability from visual features, gaze reinstatement during recognition has also been linked to memory. Here, we ask whether these mechanisms depend on image content and how they interact to support memory. Participants (N = 40) viewed 144 natural indoor scenes containing faces, text, both, or neither (36 each; matched for predicted memorability using ResMem) during incidental encoding, followed by an old/new recognition test with eye tracking at both phases. For each image, we quantified human memorability (hit rate) and encoding–recognition gaze similarity (gaze reinstatement). Behaviorally, scenes containing faces were most memorable, text-only and both-content scenes showed intermediate memorability, and scenes containing neither were least memorable. Gaze reinstatement was highest for faces, intermediate for both-contents and text-only scenes, and lowest for scenes without faces or text. Critically, the relationship between gaze reinstatement, model predictions, and memorability dissociated across content. For face scenes, memorability was high and well predicted by ResMem, but independent of gaze reinstatement. In contrast, for text-only scenes, memorability was strongly predicted by gaze reinstatement but not by ResMem. These findings suggest two routes to scene memory: an image-intrinsic route captured by current models, and an attention-dependent route not reflected in model predictions.", "SubmissionID": 88.0}, {"Day": "Monday", "Time": "11:45", "Session": "Multisensory and Haptic Perception", "Room": "Purbeck Lounge", "Title": "Efference Copy Signals Improve Haptic Precision During Active Information Acquisition", "Speaker": "Didem Katircilar", "CoAuthors": "Bora Celebi, Roland Bennewitz, Knut Drewing", "Abstract": "Haptic perception can integrate cutaneous input from the fingerpad, proprioceptive signals about body position, and efference copy signals that can be used by sensory processing to predict the consequences of movement. Although all contribute to perception, the specific role of efference copy signals remains to be fully understood. To date, such signals are known to suppress task-irrelevant sensory input during self-generated movement (Juravle et al., 2010; Voudouris & Fiehler, 2017). However, their role when movements are aimed at acquiring information remains controverse. To investigate this, we conducted a spatial frequency discrimination experiment on grating stimuli using the method of constant stimuli (reference: 15.3 mm or 16.3 mm interelement distance; comparison stimuli spanning 11.3–19.3 mm or 12.3–20.3 mm, respectively), across three conditions: (1) In the active condition, participants explored the stimulus with the index finger by freely moving their arm back and forth; kinematic parameters were recorded for each trial. (2) In the passive-arm condition, these recorded trajectories were replayed using a motor-controlled armrest. (3) In the passive-stimulus condition, participants’ arms remained stationary while the stimulus probe moved according to the same recorded trajectories. The order of the latter two conditions was counterbalanced across participants. We hypothesized that perceptual precision would be highest with full sensorimotor signals (active), intermediate with cutaneous and proprioceptive input (passive-arm), and lowest with cutaneous input alone (passive-stimulus). Results showed that just noticeable differences for spatial frequency were lower in the active condition than in both the passive-arm and passive-stimulus conditions, with no significant difference between the two passive conditions. These findings indicate that when movements are aimed at information acquisition, efference copy signals enhance haptic perceptual precision.", "SubmissionID": 342.0}, {"Day": "Monday", "Time": "11:45", "Session": "Perceptual Learning and Memory", "Room": "Bayview Suite", "Title": "Temporal components of correct and incorrect item retrieval from visual working memory", "Speaker": "Adam Triabhall", "CoAuthors": "Julie de Falco, Paul Bays", "Abstract": "Accessing information held in working memory is among the most fundamental operations in visual cognition, but the time course of this retrieval process is poorly understood. In cued recall tasks, microsaccades (fixational eye movements) following cue onset are preferentially directed towards the location of the target item. In this study, we conducted a series of experiments in which participants were shown an array of visual items, each with a unique orientation and colour. After a brief delay, one target item was indicated by a cue of the same colour and participants were instructed to reproduce its orientation from memory. This task requires at least two processes: matching the colour cue to one of the items in memory, and retrieving the orientation of the matched item. The onset of the microsaccade bias is a physiological marker providing an upper-bound on the duration of the cue-to-item matching process. We developed a formal model that distinguishes baseline and item-directed microsaccade rates, estimating the transition point between these rates while accounting for stable directional bias. We compared the estimated transition points across experimental manipulations designed to influence the retrieval dynamics, systematically varying the number of memory items and the signal strength of colour and orientation features. The results argue against a strictly sequential retrieval process across non-spatial feature dimensions and items. Swap errors, defined as reports matching the orientation of a non-target item, were observed at sufficient rates to characterise microsaccades in this subset of trials. These microsaccades were preferentially directed toward the reported rather than the cued item, while showing qualitatively similar temporal dynamics to target-oriented trials. This demonstrates that swap errors originate from failures of the cue-to-item matching process. Taken together, these findings offer new insights into the temporal architecture of working memory retrieval and the mechanisms of access to stored representations.", "SubmissionID": 508.0}, {"Day": "Monday", "Time": "14:00", "Session": "Symposium: Recent Advances in Face Perception and Identification: From Cells to Cognitive Mechanisms and Applied Identification", "Room": "Tregonwell Hall", "Title": "The cellular basis of the human face inversion effect", "Speaker": "Bruno Rossion", "CoAuthors": "Marie-Alphée Laurent, Jacques Jonas, Sophie Colnat-Coulbois, Laurent Koessler, Corentin Jacques", "Abstract": "Human face identity recognition (FIR) is severely disrupted by picture-plane inversion, yet the cellular mechanisms of this robust face inversion effect (FIE) remain unknown due to behavioral and neuroanatomical limitations of non-human primate models of face recognition. Here we recorded extracellular spiking activity in the human Fusiform Gyrus (FG), a hominoid-specific structure that is key for face recognition. Nine epileptic patients implanted with a hybrid macro/microelectrode in the middle portion of the FG performed an automatic unfamiliar face individuation task associated with large inversion effects at the neural population level (EEG, iEEG). Within a rapid 6 Hz stream of the same repeated face identity across size changes, images of different face identities appeared every fifth image (1.2 Hz) during 70-seconds stimulation sequences. Across participants and sessions, this frequency-tagging stimulation identified 193 single- (122) and multi- (71) units responsive to face identity change at 1.2 Hz and harmonics. 166 units showed a significant identity discrimination response for upright faces (UP+ units, 86.0%) and only 58 for inverted faces (INV+ units, 30.0%), including 31 units responding to both conditions. This neuronal face inversion effect was more prominent in the right than the left hemisphere. Despite these differences, the firing rate for upright vs. inverted faces measured in their respective pool of significant units did not differ, and the time-course of the face identity discrimination response was similar for upright and inverted faces (~130-450 ms). In summary, most neurons are tuned to changes of face identity either at upright or inverted face orientation, with no difference in spike rate modulations across orientation. Instead, supporting a long-standing evidence accumulation hypothesis, the human FIE appears to be accounted for by a much larger proportion of midfusiform neurons tuned to changes of face identity for upright as compared to inverted faces.", "SubmissionID": ""}, {"Day": "Monday", "Time": "14:00", "Session": "Motion Perception", "Room": "Purbeck Lounge", "Title": "A polygon illusion", "Speaker": "Stuart Anstis", "CoAuthors": "Patrick Cavanagh, Sae Kaneko", "Abstract": "If a spot moves around inside an outline square that is also moving, the motion of the spot is judged relative to the square, not to the earth. Thus if a spot moves vertically up and down inside a surrounding square that moves horizontally left and right, the spot’s motion will look oblique, not vertical. We have developed this theme into what we call a ‘Polygon illusion’ that describes the polygonal motion path of a moving spot. It requires two polygons: Polygon 1 is the actual motion path followed by the moving spot, say a triangle. Observers do not perceive or notice this triangular path. The spot moves around the perimeter of Polygon 2, say a circle, which is made to move along some appropriate path.  Observers falsely perceive the spot as moving around a circular path (following Polygon 2) and completely ignore Polygon 2’s motion path.  So the spot’s motion is judged relative to the local polygon, not relative to the earth. Note that any two polygons can be chosen without restriction to produce this illusion", "SubmissionID": 255.0}, {"Day": "Monday", "Time": "14:00", "Session": "Scene and Object Perception and Recognition", "Room": "Bayview Suite", "Title": "Cooking in a kitchen with a toilet? Understanding Functions Based on Scene Context and Phrases", "Speaker": "Lea A Müller Karoza", "CoAuthors": "Melissa L.-H. Vo", "Abstract": "Constantly, we interact with objects to complete goal-directed actions. Single objects are directly manipulated, and scenes provide the contextual information needed to understand them. While scenes appear to carry action information, context has seldomly been manipulated systematically. The scene grammar framework suggests that scenes can be decomposed into “phrases” – subclusters of objects including an anchor object, which predicts the location and identity of other objects in the phrase. While these conceptual units are thought to reflect functional organization, whether action-possibilities are assessed based on these phrases remains largely unexplored. Across four Experiments, we assess if action understanding is based on phrases alone, or if it relies on context. To test this, we use so-called chimera scenes which gradually change from one category (e.g., from a bathroom) to another (e.g. a kitchen) by switching out phrases one-by-one (e.g. swapping the toilet in a bathroom with a stove, the shower with a fridge etc.). \n\nWhen categorizing scenes in Experiment 1, participants showed faster RTs for intact versus chimera scenes. Matching actions and scenes in Experiment 2, a new group of participants demonstrated higher accuracy and faster responses for intact scenes, and a gradual impairment correlated with the number of inconsistent phrases in the scenes. In Experiment 3, scenes served as primes in a lexical decision task, and the amount of (in)consistent scene information affected RTs. In Experiment 4, using eye-tracking, participants showed increased attention to action-related objects and to consistent scene context when assessing scene-action fit.\n\nIn sum, we demonstrate that inconsistent scene context disrupts action understanding, introducing uncertainty even when only a small subset of objects is incongruent. We suggest that contextual information contributes to efficient action understanding, rather than action-related objects alone, and that actions are thereby understood by integrating phrase- and scene-level information.", "SubmissionID": 433.0}, {"Day": "Monday", "Time": "14:15", "Session": "Symposium: Recent Advances in Face Perception and Identification: From Cells to Cognitive Mechanisms and Applied Identification", "Room": "Tregonwell Hall", "Title": "A cross syndrome investigation of face selective processing abilities in Williams Syndrome and Down syndrome", "Speaker": "Louise Ewing", "CoAuthors": "Inês Mares, Rachel Bennetts, Sarah Bate, Nadja Althaus, Michael Papasavva, Emily K. Farran & Marie L. Smith", "Abstract": "Individuals with Williams syndrome (WS) and Down syndrome (DS) are reported to show differences in their face processing relative to neurotypical comparison groups, i.e., strengths and weaknesses, respectively. Yet the evidence base for these claims remains limited, particularly with respect to their face-selectivity. Our cross-syndrome investigation assessed recognition memory and perceptual discrimination ability in adults with WS and DS alongside large neurotypical comparison samples, for upright faces and a comparably complex comparison category: bicycles. In line with neurotypical individual differences research, there was notable variability in face abilities within syndrome groups, as well as between them. Overall, the first two stages of the Cambridge Face Memory Test for Children proved particularly sensitive to group differences: individuals with DS performed more poorly than those with WS and NT children over 5 years of age, whereas individuals with WS showed difficulties only relative to NT children over 10 years. When modelling the developmental trajectories of face abilities relative to general object abilities, we found that the relationship between skills across categories did not differ across groups (NT, WS, DS). These latter findings critically challenge notions of the exceptionality of face processing differences in these syndrome groups, and prompt reconsideration of the theoretical accounts that highlight social differences.", "SubmissionID": ""}, {"Day": "Monday", "Time": "14:15", "Session": "Motion Perception", "Room": "Purbeck Lounge", "Title": "Visual Perception of Longitudinal Waves: Theory and Observations", "Speaker": "Christopher Tyler", "CoAuthors": "Joshua Solomon, Stuart Anstis", "Abstract": "Longitudinal travelling wave motion is a physical phenomenon that forms the basis of acoustics and seismic transmission. Our theoretical analysis of physical longitudinal wave motion reveals that it exhibits profound nonlinearities neglected by the physics community. We then simulated longitudinal motion in visual form with a random-dot field in which each dot particle oscillates sinusoidally about a fixed position at the same frequency but with a phase advance proportional to its distance from the origin. The resultant longitudinal density wave is essentially sinusoidal at very low oscillation amplitudes, becoming progressively distorted as oscillation amplitude increases. When the maximum velocity of each dot particle reaches that of the propagation, the density function approximates a series of narrow travelling spikes, splitting into double spikes at even greater amplitudes. \n\nTo study such phenomena, we generated wave motion of 6 cycles around 2:1 random-dot annuli, to preclude eye movements by central fixation. Perceptually, the motion splits into a transparent combination of forward motion of the crests and backward for the troughs, rather than a uniform travelling wave, revealing the emergent, or higher-order, tendency to integrate like motions across cycles separately for the two opposing directions. This split motion percept persists for drift-balanced contrast versions, but is eliminated when the dot density increase is compensated by reducing contrast, at high amplitudes. Remarkably, the speed for perceptual cancellation of either forward crest or backward trough motion percepts by adding a (‘rigid’) velocity component scales with oscillation amplitude, but with a nonlinear decrease for the forward crest motion. \n\nUncompensated longitudinal waves evoke no motion aftereffect (MAE) at any amplitude, except when the contrast of the forward crest motion is selectively reduced, revealing an MAE from the now-dominant retrograde trough motion. This result implies that the opposing transparent motions generate opposing MAEs that cancel when balanced.", "SubmissionID": 421.0}, {"Day": "Monday", "Time": "14:15", "Session": "Scene and Object Perception and Recognition", "Room": "Bayview Suite", "Title": "How Viewpoint Angle and Scene Congruency Shape Object Recognition", "Speaker": "Weina Zhu", "CoAuthors": "Mingjie Gao, Jan Drewes", "Abstract": "In natural scenes, objects are rarely viewed from a single fixed angle. Although previous research has separately examined viewpoint effects in object recognition and the influence of scene congruency, much less is known about how these two factors jointly shape object processing under naturalistic viewing conditions. To address this gap, we used stimuli generated from three-dimensional modeling to approximate natural viewpoint variation and examined the interaction between viewpoint and scene congruency across two experiments. \n\nIn Experiment 1, participants performed a behavioral object-classification task in which target objects were presented from different viewpoints in semantically congruent or incongruent scenes. The results showed that scene congruency facilitated object recognition and reduced the cost of viewpoint variation. In particular, back views, which provided less diagnostic visual information, produced greater recognition difficulty, whereas congruent scene context attenuated this disadvantage. \n\nIn Experiment 2, we used a repeated detection task (RDT) combined with EEG to investigate the neural dynamics underlying this interaction. ERP analyses revealed enhanced N300/N400 responses for incongruent scenes, indicating increased demands on semantic integration. In addition, viewpoint manipulation modulated both earlier and later processing stages: back views elicited larger N200 and N400 components than more canonical views, suggesting greater perceptual conflict and semantic processing cost. \n\nTogether, these findings show that scene congruency can compensate for viewpoint-related recognition difficulty, with viewpoint effects emerging at earlier stages of processing and the influence of scene congruency becoming more evident during later semantic integration.", "SubmissionID": 556.0}, {"Day": "Monday", "Time": "14:30", "Session": "Symposium: Recent Advances in Face Perception and Identification: From Cells to Cognitive Mechanisms and Applied Identification", "Room": "Tregonwell Hall", "Title": "Predictors of lineup accuracy in 2D and 3D displays: An individual differences approach", "Speaker": "Anna Bobak", "CoAuthors": "", "Abstract": "Face processing ability varies widely amongst people and has clear consequences for eyewitness accuracy. Indeed, eyewitness identification is error prone and has led to wrongful convictions in approximately 70% of the cases re-examined by the Innocence Project. Applied work typically concentrates on improving the lineup presentation procedures or estimating the impact of individual differences in face processing ability but seldom looks at both. While there is some evidence suggesting that so-called super-recognisers are consistently proficient across most face processing tasks, including lineup identification, this is not true for ‘typical’ perceivers whose ability can vary widely depending on the test used. For the first time, this research examines whether, and how, eyewitness accuracy interacts with individuals' face processing ability in different 2D and 3D Virtual Reality (VR) line ups. The aim of this project was to establish the best predictors of lineup identification, and to examine the extent to which they predict identity recognition in 2D and 3D lineups displayed in VR. Eight hundred and forty participants completed a battery of online face processing tests, followed by laboratory (in-person) basic vision assessment, and eight non-violent mock crimes and lineup tasks in VR. The results and implications for practice will be discussed as a part of this talk.", "SubmissionID": ""}, {"Day": "Monday", "Time": "14:30", "Session": "Motion Perception", "Room": "Purbeck Lounge", "Title": "A rotating wheel illusion reveals distinct stimulus and contextual contributions to perception", "Speaker": "Andrew Isaac Meso", "CoAuthors": "Fatima Jawad, Nathan Masters, Yixiao Cui", "Abstract": "It is established that dynamic changes in contrast near luminance edges can drive vivid motion illusions. Such illusions can provide insights into the hierarchical neural architecture serving perception. We empirically study a rotating wheel illusion recently introduced in various forms by a Japanese artist online on X (@jagarikin). The illusion occurs when a wheel (doughnut-like) typically configured with four equal radial sectors of alternate lower/black and higher/white luminance is spun around and appears to either expand or contract despite having no veridical radial motion. The inner and outer circumference of the wheel has narrow strips with luminance edges at the boundaries which contribute to the illusion. We carry out an experiment to measure factors that modulate illusion strength by manipulating four properties: rotation speed, edge size, edge contrast and wheel contrast. In a psychophysical forced choice task, we compare the strength of test stimuli to a simultaneously presented reference stimulus of fixed parameters in blocks of multiple trials. We show that these four characteristics drive the illusory strength. By percentage, participants are most sensitive to speed changes as a driver of the illusion. To study context, we carry out a similar task in which arrows of varying sizes are introduced at the centre of the test stimulus in directions congruent or incongruent with the radial illusory motion. The effect of the arrows shows substantial individual differences, generally either increasing illusion strength regardless of arrow congruence or decreasing the illusion and showing distinct effects for the arrow directions. Few participants are agnostic to the contextual arrows. We test correlations between sensitivity to the lower-level parameters and context measures and unveil a complex set of idiosyncratic interactions. Findings suggest a hierarchical system with contrast, spatial and motion processes contributing to the illusion, all potentially subject to individual top-down modulation.", "SubmissionID": 513.0}, {"Day": "Monday", "Time": "14:30", "Session": "Scene and Object Perception and Recognition", "Room": "Bayview Suite", "Title": "New scene representations are learned more effectively during active than passive tasks", "Speaker": "Victoria Nicholls", "CoAuthors": "Maxim Spur, Erwan David, Melissa Vo", "Abstract": "When we search for objects in a room, we use our previous knowledge of scenes to direct our attention to locations where the object could be. This scene knowledge, a.k.a. scene grammar, follows a hierarchical structure (Võ, 2021). Currently, it is not clear how we learn scene grammar. For instance, do we simply learn through repeated exposure to objects being in the same location or is a more active task, such as search, required to successfully learn object identities and locations? In this study, we aimed to determine how adults learn a new, artificial scene grammar. Participants encoded objects through either a passive viewing or an active search task. The passive viewing task highlighted objects in the scene which participants gazed at one after another. In the active search task, participants were given a target object which they searched for. To ensure that participants had no previous scene grammar for the objects or the scenes we presented them with artificial objects in artificial virtual reality scenes.  Participants then performed two recall tasks. First, an odd-one-out task where participants were presented with three objects and asked to choose which one was the odd one out. Secondly, participants were given a scene reconstruction task where participants had to place the artificial objects in the correct locations within the scenes. Eye tracking and behavioural responses indicated that participants learned the object locations faster and, in more detail, when they encoded objects via the active search task compared to the passive viewing task. However, participants only showed superior memory regarding which objects were grouped together in the rebuild task and not the odd-one-out task. These results suggest that participants learn new scene grammar more effectively through an active search task and only recall the new scene grammar representations when required for the task.", "SubmissionID": 429.0}, {"Day": "Monday", "Time": "14:45", "Session": "Symposium: Recent Advances in Face Perception and Identification: From Cells to Cognitive Mechanisms and Applied Identification", "Room": "Tregonwell Hall", "Title": "Context-induced distinctiveness in face learning: Evidence across multiple facial appearance cues", "Speaker": "Christel Devue", "CoAuthors": "Morgan Reedy, Gamze Ceylan & Mariame Bourard", "Abstract": "Traditionally, the impact of distinctiveness on face learning has been studied for faces deviating from a population norm, showing recognition advantages compared to typical faces. However, distinctiveness may depend on the observer’s face diet or on the immediate learning context. Namely, faces typical at the population level may become distinctive relative to others learned concurrently, thereby shaping their representation. To test this idea, we developed an odd-one-out learning paradigm grounded in a cost-efficient encoding hypothesis. Specifically, facial information that renders a face distinctive in a given context would be disproportionately weighted during learning, reducing the encoding of finer-grained information relative to faces learned concurrently. Participants learned four FaceGen‑generated faces. Before learning each one individually, they viewed a group image in which one face was made distinctive by a single salient feature (counterbalanced), while the remaining three shared that feature. In Experiment 1, distinctiveness was induced via skin tone (Caucasian, non‑Caucasian; N=96) to examine whether it could reverse the other‑race effect. In Experiments 2 and 3, distinctiveness was induced through hair (blond, black; N=80) or eye colour (blue, brown; N=80), to examine the impact of peripheral and central salient features on learning. Recognition was tested with the salient feature preserved (superficial test) or removed (e.g., skin tone or hair removed; eyes closed; fine test). Overall, context‑based distinctiveness seems to promote superficial encoding of faces. Although the other‑race effect appeared reversible at a superficial level, memory representations for distinctive same‑race faces were more robust, consistent with experience‑based tuning. Therefore, face representations are shaped by contextual distinctiveness during learning, favouring efficient encoding strategies that depend on both feature diagnosticity and prior visual experience.", "SubmissionID": ""}, {"Day": "Monday", "Time": "14:45", "Session": "Motion Perception", "Room": "Purbeck Lounge", "Title": "Measuring the Mainz-Linez Illusion using orbital displays.", "Speaker": "Ian M. Thornton", "CoAuthors": "Anna Riga, Sunčica Zdravković, Dejan Todorović", "Abstract": "The Mainz-Linez Illusion (MLI) – introduced at ECVP 2025 – is a powerful example of how static background elements can alter the perceived behaviour of moving targets. Specifically, rectilinearly moving targets are seen to deviate from their physical paths and follow the curves traced by static background elements. In the current presentation, we use an “orbital” variant of the display to quantify several aspects of the illusion. The orbital Mainz-Linez illusion (OMLI) uses a single static inducing circle whose contour is sinusoidally modulated. Targets physically orbit with a fixed radius, but as per the original MLI, appear to follow the curves of the modulated inducing circle. First, we demonstrate that the illusion requires targets to be close to equiluminance with respect to the wider background. This allows us to create a display in which a low-contrast target object – with illusory deviation – is paired with a high-contrast control object – perceived veridically – that is placed 180° away. Measurements are obtained by physically modulating the amplitude of the control object trajectory to systematically match the curves of the inducing circle. We use the method of constant stimuli to obtain the physical amplitude that matches the illusory deviation under various display conditions. On average, estimates of illusory deviation appear to vary between 30-40% of the physical curves. However, this magnitude is also subject to modulation by a number of factors, including eccentricity, configuration – in terms of the number and placement of target/control objects – and the parameters of the inducing circle.", "SubmissionID": 267.0}, {"Day": "Monday", "Time": "14:45", "Session": "Scene and Object Perception and Recognition", "Room": "Bayview Suite", "Title": "Stage-wise Correspondence is Insufficient: DNNs and the Brain Differ in Representational Transformations", "Speaker": "Florian Burger", "CoAuthors": "Manuel Varlet, Genevieve Quek, Tijl Grootswagers", "Abstract": "Object recognition unfolds in the brain along a spatiotemporal hierarchy, with representations transforming from being predominantly visual at early stages of processing to increasingly abstract at later ones. Deep neural networks (DNNs) parallel this progression: Activations in lower layers align with early neural processing; higher layers correspond to later neural processing stages. While this stage-wise correspondence is well established, it remains unclear whether the representational transformations across stages are the same in these two systems. Investigating this possibility requires stimuli that evoke distinct activation patterns at different stages of processing. To probe how representations evolve across DNN layers, we extracted activation patterns from a pretrained DNN for 26,107 images and computed representational dissimilarity matrix (RDMs) at each layer. We then applied a ‘greedy’ procedure with optimal-stopping to assemble a subset of 200 images that minimised correlation between layer-wise representations. Using this optimised image subset, we recorded electroencephalography (EEG) from 20 participants, and examined the correspondence between the resulting human RDMs and the DNN layer RDMs, replicating previous findings of early-to-early and late-to-late correspondence. Finally, we quantified representational transformation as changes in pairwise RDM values from early to late stages in DNNs and in the EEG over time. We found that while the direction of representational changes was preserved across DNNs and the brain, the relative magnitude of these changes did not match. These results reveal a critical gap in DNN-brain comparisons: while DNNs capture the stage at which representations emerge, DNNs and the human brain diverge in how representations are reorganised, underscoring that stage-level correspondence alone is insufficient for validating DNNs as models of human vision. Biological and artificial vision may solve object recognition through meaningfully different representational transformations, highlighting the need for future work to investigate how these changes unfold in each system.", "SubmissionID": 211.0}, {"Day": "Monday", "Time": "15:00", "Session": "Symposium: Recent Advances in Face Perception and Identification: From Cells to Cognitive Mechanisms and Applied Identification", "Room": "Tregonwell Hall", "Title": "Navigating toward domain-specific accounts of face identification: evidence from individuals with developmental prosopagnosia and super-recognizers", "Speaker": "Alejandro J. Estudillo", "CoAuthors": "Olivia Dark, Jan Wiener, Sarah Bate", "Abstract": "One of the classic debates in visual cognition concerns whether face recognition relies on general visual mechanisms (i.e., a domain-general view) or face-specific mechanisms (i.e., a domain-specific view). One line of support for the domain-general view comes from neuropsychological patients who, after brain injury, show concurrent deficits in face recognition and navigational skills. However, it is currently unknown whether this link is merely coincidental (i.e., observable only in prosopagnosia) or genuinely interdependent (i.e., such that variation in one ability predicts variation in the other across the full spectrum of face-recognition abilities). We tested these two accounts in participants with developmental prosopagnosia, super-recognizers, and control participants. In Study 1, participants completed a recently validated ecological route-learning task. In Study 2, participants completed a battery of laboratory tasks associated with navigational skills. Results showed no group differences in either study, suggesting that face recognition and spatial navigation are not directly associated, providing support for domain-specific accounts of face recognition.", "SubmissionID": ""}, {"Day": "Monday", "Time": "15:00", "Session": "Motion Perception", "Room": "Purbeck Lounge", "Title": "Judging a Row by Its Endpoints: Measuring the Bookend Effect", "Speaker": "Anna Riga", "CoAuthors": ", Stuart Anstis, Patrick Cavanagh, Ian Thornton", "Abstract": "Last year at ECVP, we introduced a new example of perceptual grouping called the bookend effect. When several targets undergoing illusory motion are placed in a row on top of an oriented black and white zig-zag background, the whole group appears to move in the direction set by the two outermost elements (the \"bookends\"). Surprisingly, this happens even when the inner elements (the \"books\") create strong illusory motion signals in the opposite direction. We hypothesized that spatial proximity and shared physical motion lead the visual system to construct a single, unified object representation for the entire group of targets. Within this group, the outer bookend elements have a strong influence on the perceived motion direction of the whole. Importantly, this isn't due to crowding, since the static and dynamic features of the inner elements can easily be reported. However, these inner features appear to contribute little, if at all, to determining the perceived direction of the group's motion. Here, in a series of experiments and stimulus variants, we investigate the conditions under which the bookend effect emerges and whether the inner books can ever modulate the overall motion percept. We quantify this by measuring perceived group direction using a standard adjustment probe. Initial findings reveal a consistent pattern of motion capture across variants, confirming almost no influence of the inner books until bookend motion/form is severely degraded.", "SubmissionID": 275.0}, {"Day": "Monday", "Time": "15:00", "Session": "Scene and Object Perception and Recognition", "Room": "Bayview Suite", "Title": "Computational mechanisms for flexible intuitive physics in humans", "Speaker": "Giacomo Aldegheri", "CoAuthors": "Roland W. Fleming", "Abstract": "Objects with different physical characteristics behave in entirely distinct ways: rigid bodies, such as boxes, and deformable objects, like ropes, respond very differently to manipulation. How do our internal models of the world support the ability to predict and interact with such diverse object classes? In video game physics engines, domain-specific models (such as rigid-body, soft-body and particle-based simulations), tailored to simulate specific object classes, are commonly used. Do we similarly possess distinct internal models for different physical objects? Do we use a single, versatile internal model across all objects? Or do we use a mixture of shared and object-specific mechanisms? To investigate these questions, we designed a game-like task to probe, in a controlled yet ecological way, how human participants interact with objects with diverse physical characteristics. Participants are shown, on a computer screen, an ‘arena’ including an object, a simple manipulator (a rectangular pusher) and a goal indicated by a shape and location within the arena. Using the keyboard, they can rotate and translate the pusher, and their task is to use it to push the object into the goal. On each trial, the object belongs to one of three categories: box, rope, and granular (e.g. a pile of pebbles). We compare the behavior of human participants on this task with graph neural network (GNN)-based models trained to predict the physical dynamics with varying degrees of flexibility. We present initial results assessing the degree to which these different models approximate human behavior, shedding light on the computational mechanisms of flexible intuitive physics in the human mind.", "SubmissionID": 305.0}, {"Day": "Monday", "Time": "15:15", "Session": "Motion Perception", "Room": "Purbeck Lounge", "Title": "Reconstructing motion direction from temporally disordered position sequences", "Speaker": "Mikhail Allakhverdov", "CoAuthors": "Martin Rolfs", "Abstract": "The idea that visual perception operates in discrete temporal windows rather than continuously has gained increasing support. However, how motion is perceived based on a sequence of discrete snapshots remains unclear. One possibility is that motion direction is not derived from chronological order but reconstructed from priors for coherent spatial changes among elements presented within a temporal interval.\n\nWe tested this hypothesis using an adaptation of Rolfs et al.’s (2025) high-speed motion paradigm. Participants viewed an object moving along a curved trajectory over or under a central fixation point, with its successive positions presented in a randomized order rather than in the order in which the object would physically move. Trajectory amplitudes were 4, 8, and 12 dva, with each position shown for one frame (0.7 ms). Across conditions, we manipulated the proportion of rightward and leftward positional shifts (0%, 30-33%, 50%, 68-72%, 100%). \n\nParticipants were asked to identify both the curvature and direction of motion. Participants showed 100% correct curvature identification, confirming stimulus visibility and task compliance. Crucially, the perceived direction of motion was systematically biased toward the direction defined by fewer, and therefore on average larger and faster, positional shifts. This result was consistent across all participants tested (N = 5), with little interindividual variability.\n\nWe propose that within a temporal integration window, positions are treated as a set rather than as an ordered sequence, and that large jumps introduce new windows of integration. Direction is then resolved at a higher processing level as an ordered sequence of average spatial positions (centers of mass) of successive temporal windows.\n\nThese findings are consistent with the idea that motion perception reflects postdictive reconstruction over temporally extended, discrete events rather than direct tracking of sequential change.", "SubmissionID": 546.0}, {"Day": "Monday", "Time": "15:15", "Session": "Scene and Object Perception and Recognition", "Room": "Bayview Suite", "Title": "Object category information is dynamically shifted by scene context", "Speaker": "Alex Clarke", "CoAuthors": "Ye Gu, Alexandra Krugliak", "Abstract": "Our knowledge about how the world is structured has a powerful influence on our perceptions. Being in a kitchen, there are certain items we’re more likely to see than others, and a large body of EEG/MEG research shows that the congruency between scenes and objects modulates neural activity, particularly at semantic stages. However, it remains unclear whether contextual information changes the temporal emergence of behaviourally relevant object representations, rather than simply modulating response amplitude. This study aimed to test whether a prior visual scene shifts the timing of object category representations in the brain, and whether such temporal shifts relate to facilitated recognition behaviour. MEG data were collected while participants viewed objects preceded by congruent scenes, incongruent scenes, or scrambled images (no‑context condition). Object category classifiers were trained on activity to no‑context objects and tested on congruent and incongruent trials. Cross‑condition decoding and temporal generalisation analyses were used to determine whether object category information occurred earlier or later in time when preceded by different scenes. Our results showed that behaviourally, object recognition was faster following congruent scenes compared to incongruent and no‑context conditions. Neural decoding showed that object category information could be decoded for both congruent and incongruent trials between ~100–500 ms. Crucially, temporal generalisation revealed that category information present in no‑context trials emerged earlier in time if objects followed congruent scenes. This temporal shift was not observed for incongruent trials, which showed temporally-aligned category representations. Further, the temporally shifted and enhanced decoding for congruent trials was correlated with faster behavioural recognition speeds. These findings demonstrate that scene context accelerates the emergence of categorical object representations when they are congruent. Our results support predictive processing accounts in which contextual expectations dynamically reshape the timing of semantic representations, facilitating object recognition in natural scenes.", "SubmissionID": 447.0}, {"Day": "Monday", "Time": "17:00", "Session": "Attention", "Room": "Tregonwell Hall", "Title": "Developmental changes in exogenous visual spatial attention: faster facilitation effects improve position accuracy with age.", "Speaker": "Mahalakshmi Ramamurthy", "CoAuthors": "Alex White, Jason Yeatman", "Abstract": "Exogenous visual spatial attention — the automatic orienting to peripheral cues — is widely considered developmentally stable. However, this conclusion overlooks critical temporal dynamics: prior developmental studies have focused on cue-to-target intervals (CTIs) of 100 ms or longer, inadvertently obscuring developmental processes unfolding at shorter timescales. Here, we examined how exogenous cue facilitation and suppression change across development at a shorter, previously unexplored CTI.\n\nWe tested 184 participants (ages 6–40 years, cross-sectional) in a letter identification task with peripheral cues appearing 50 ms or 100 ms before the target. All error trials were classified as transposition errors (reporting a nearby non-target) or misidentification errors (reporting a stimulus not present in the display) to understand how spatial cues changed task performance.\n\nDevelopmental changes emerged selectively at the 50 ms CTI, with valid cue benefits increasing with age and driven specifically by a reduction in transposition errors. No developmental modulation was found at 100 ms, indicating that developmental differences in exogenous attention are interval-sensitive and emerge only at shorter CTIs. \n\nOur findings challenge the developmental stability of exogenous attention, revealing that facilitatory effects of valid cues become faster with age and qualitatively more refined: adults use the valid cue benefits specifically to reduce transposition errors — the error type that directly reflects spatial position encoding — rather than producing broad accuracy gains. This suggests that with development, exogenous attention is not developmentally stable — it gets faster, more precise, and more functionally selective with age.", "SubmissionID": 112.0}, {"Day": "Monday", "Time": "17:00", "Session": "Symposium: Artificial Intelligence as a Window into Material Perception: From Minimal Models to Active and Individualized Representations", "Room": "Purbeck Lounge", "Title": "Tiny convolutional neural networks reveal computations underlying human gloss perception", "Speaker": "Takuma Morimoto", "CoAuthors": "Arash Akbarinia, Katherine R. Storrs, Jacob R. Cheeseman, Hannah E. Smithson, Karl R. Gegenfurtner, & Roland W. Fleming", "Abstract": "A central goal of visual neuroscience is to explain how the brain infers object properties such as texture, curvature, and gloss from images. Here, we used machine learning not as a direct model of the brain, but as a tool to identify the computations underlying human gloss perception, a visual task long regarded as a challenging inference. We rendered thousands of object images with varying shapes, viewpoints, and illumination, and collected gloss judgments through crowdsourcing. Human judgments were highly consistent across observers, yet systematically deviated from physical ground truth. We compared these responses with convolutional neural networks trained either to estimate physical specular reflectance or to reproduce human judgments. By progressively reducing network size, we identified the minimum computations required for each objective. Estimating physical reflectance required deep networks, whereas human judgments were captured by remarkably shallow networks with as few as three convolutional layers. Strikingly, a tiny model containing only a single filter predicted human judgments better than the best-performing ground-truth network. Generalization tests on independent external image sets showed that human-like networks also reproduced known gloss illusions, generalized to computer-generated object images with a broader range of optical properties, and extended to photographs of real objects. However, for objects with high-contrast textures, the model overestimated gloss by responding to texture. When the model was retrained on both textured and non-textured objects after adding a second filter, the original gloss-sensitive filter was retained, while the added filter acquired selective sensitivity to texture and suppressed texture-driven errors. These findings suggest that human gloss judgments rely on simpler, more general-purpose computations than previously thought, and highlight the value of tiny, interpretable neural networks for uncovering biologically plausible computations underlying material perception.", "SubmissionID": ""}, {"Day": "Monday", "Time": "17:00", "Session": "Metacognition", "Room": "Bayview Suite", "Title": "How the Brain Builds Confidence: The Neurobiological Basis of Decision Evaluation", "Speaker": "Elaine Casey", "CoAuthors": "Tarryn Balsdon", "Abstract": "Feelings of confidence in our decisions arise from an evaluation of the evidence supporting those decisions. For perceptual decisions, sensory evidence can be maintained in visual working memory well beyond stimulus offset. This persistence provides a basis for computational accounts in which confidence depends on evidence that continues to evolve following the decision. Under such a framework, the strength of the maintained sensory evidence should directly constrain the quality of confidence evaluations. However, the neural mechanisms governing the maintenance and transformation of this evidence remain poorly understood. \n\nHere, we investigate how sensory evidence is maintained and transforme
