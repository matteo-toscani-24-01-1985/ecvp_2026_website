d across the entire decision window using a perceptual discrimination task with orthogonal stimulus features (colour and orientation). On each trial, participants provided a perceptual response according to the task-relevant feature and subsequently rated their confidence on a 4-point scale. Critically, the task design allows us to dissociate stimulus-specific representations from decision-related processes in the post-stimulus interval. \n\nTwenty participants completed the task while EEG was recorded. Analyses focused on post-stimulus dynamics of both sensory representations and decision-related signals. This approach enabled us to track the temporal evolution of stimulus evidence and decision after stimulus presentation. \n\nWe find that stimulus-specific information persists after stimulus offset, remaining significantly above baseline for ~800ms. Moreover, this maintenance signal exhibits a gradual decline over time, consistent with accounts of evidence degradation. Finally, results suggest that greater accuracy of post-stimulus sensory maintenance, quantified as lower decoding error, contributes to the efficiency of confidence judgements. \n\nTogether, these findings suggest that confidence is supported by dynamically evolving post-decision representations. This work provides new insight into the neural mechanisms linking evidence accumulation, sensory maintenance, and confidence evaluation.", "SubmissionID": 369.0}, {"Day": "Monday", "Time": "17:15", "Session": "Attention", "Room": "Tregonwell Hall", "Title": "The neural basis of categorical visual attention in humans: evidence from intracerebral EEG recordings", "Speaker": "Ridvan Kayirici", "CoAuthors": "Louis Maillard, Sophie Colnat-Coulbois, Laurent Koessler, Tal Seidel Malkinson", "Abstract": "A major challenge in studying the neural substrates of visual attention in the human brain is attention’s fast and dynamic nature across large-scale networks. To address this, we used intracerebral electroencephalographic recordings (stereo-EEG) in drug-resistant epileptic patients implanted with multi-contact depth electrodes, enabling direct access to attention-related neural activity with high spatiotemporal resolution. \n\nWe employed a frequency-tagging paradigm with three image categories (faces, houses, cars) to reliably capture high-level visual representations. Participants (N=14, 7 women) viewed continuous sequences of natural images in which category-specific stimuli were presented as periodic oddballs at 1 Hz within a mixed-category stream presented at 4 Hz. This approach elicited category-selective neural responses at the tagging frequency, indexing populations tuned to each category. Attention was manipulated by instructing participants to selectively attend to one category while ignoring another, with both categories sequentially frequency-tagged at 1 Hz. Crucially, visual input was held constant across attention conditions, allowing isolation of attentional modulation. Neural responses were analyzed in the frequency domain by comparing normalized amplitudes between attended and ignored conditions. \n\nAcross 1882 cortical and hippocampal contacts, 739 showed significant oddball responses (z>3) to at least one image category. A significant main effect of attention, pooling categories together, was observed in 285 contacts across 12 participants, predominantly in bilateral ventral occipito-temporal cortex. This effect was supported by a linear mixed-effects model (β=1.02, p<.001). Category-specific attentional modulation was most often restricted to one (278 contacts, 14 participants) or two categories (56 contacts, 10 participants), mainly within ventral occipito-temporal cortex. In contrast, multi-category attentional effects were observed in a smaller subset of contacts (10 contacts, 4 participants), primarily in frontal, temporal, insular, and hippocampal regions. These findings reveal robust category-specific attentional modulation along the ventral visual stream, alongside more integrative, multi-category effects distributed in fronto-temporal networks, potentially reflecting higher-order attentional control mechanisms.", "SubmissionID": 119.0}, {"Day": "Monday", "Time": "17:15", "Session": "Symposium: Artificial Intelligence as a Window into Material Perception: From Minimal Models to Active and Individualized Representations", "Room": "Purbeck Lounge", "Title": "Spatiochromatic Representation in Discrete Autoencoders", "Speaker": "Arash Akbarinia", "CoAuthors": "Alban Flachot, Matteo Toscani, & Raquel Gil-Rodriguez", "Abstract": "Understanding how the human visual system efficiently encodes both colour and spatial structure remains a central challenge in vision science. Here, we investigate this question using artificial neural networks trained for colour conversion on natural images with discrete representational constraints. Specifically, we trained vector-quantised variational autoencoders (VQ-VAEs), characterised by a latent code constrained to discrete representations. We systematically varied the number of discrete embedding vectors (K), input–output colour spaces (e.g., RGB to CIELAB), and random initialisations. To characterise the learned representations, we generated images by sampling from individual embedding vectors, as well as their combinations. Across different random initialisations, embedding vectors converged to highly consistent and interpretable outputs, revealing a stable organisation of colour representations. With a small codebook (K=6), networks reliably produced three chromatic categories (red, yellow, blue) alongside three achromatic values (black, grey, white). Increasing the codebook size to K=8 introduced an additional chromatic category (green) and a finer subdivision of achromatic values. Further increases in K (11, 16, 32) primarily refined chromatic space, yielding intermediate hues (e.g., brown, beige), while the number of achromatic representations remained relatively stable. For larger codebooks (K≥32), a qualitative shift emerged: some embedding vectors encoded both chromatic and spatial information. Sampling from these vectors produced oriented patterns such as horizontal or vertical colour stripes, indicating the emergence of spatiochromatic units. Importantly, similar spatial and chromatic effects could also be achieved in smaller codebooks through combinations of vectors. These combinations resulted either in spatial mixtures (e.g., striped colours) or perceptual colour blending (e.g., red and blue yielding purple, or red and grey producing pink), resembling mechanisms of spatial integration and neural colour opponency. These findings suggest that key aspects of human spatiochromatic encoding can emerge from efficient representation learning under capacity constraints.", "SubmissionID": ""}, {"Day": "Monday", "Time": "17:15", "Session": "Metacognition", "Room": "Bayview Suite", "Title": "Neural adaptation of the sense of confidence", "Speaker": "Tarryn Balsdon", "CoAuthors": "Paolo Bartolomeo, Vincent de Gardelle, Pascal Mamassian, Marion Rouault", "Abstract": "When we make a decision, we can feel more or less confident in our choice. It has been proposed that a general metacognitive mechanism serves to evaluate confidence across all forms of decision-making. Here, we aimed to provide causal evidence of this general metacognitive mechanism, and examine its neural basis. We developed a confidence adaptation technique where prolonged exposure to high (or low) confidence decisions altered how humans evaluate their confidence in a different decision-making task. We found the evaluation of visual confidence was adapted in line with the predictions of a dual-channel model: there was a pattern of increased confidence sensitivity following adaptation. We could then examine neural activity that predicts this change in confidence. We found such activity in the dorsal anterior cingulate cortex, and the insula (commonly correlated with confidence in previous studies), changed according to the alteration in confidence evaluation. The change in the insula strongly predicted the change in behaviour, suggesting this region is critically engaged in evaluating confidence.", "SubmissionID": 431.0}, {"Day": "Monday", "Time": "17:30", "Session": "Attention", "Room": "Tregonwell Hall", "Title": "Revealing the hidden spatial distribution of visual attention through pupillometry", "Speaker": "Marleen Abbestee", "CoAuthors": ", Christoph Strauch, Chris Paffen, Stefan Van der Stigchel", "Abstract": "Visual attention selects which visual information is processed at a given moment. Its spatial distribution, i.e. its size and shape, constitutes the attentional field. This field is central to our everyday behaviour, but how it is adjusted and changes over time is challenging to measure. Here, we introduce a pupillometry approach that uses luminance tagging to track changes in the attentional field continuously. Our method is based on previous work, which has shown that attending to a brighter location causes the pupil to constrict, whereas attending to a dark location causes it to dilate. Here, we use these properties to demonstrate changes in the attentional field. In two experiments, we demonstrated that both the size of the attentional field (Experiment 1) and the shape (Experiment 2) can be tracked using a luminance-tagged background. Crucially, the approach is bidirectional: a large attentional field can be tagged with a dark luminance on one trial and a bright luminance on the next. This bidirectionality ensures that the measure is not confounded by other factors known to influence pupil size, thereby making it suitable to use across a range of contexts. We further discuss implications for studying the temporal dynamics of attentional field adjustments and present possible directions for applying this method to understand attentional field differences across different states and traits of individuals.", "SubmissionID": 172.0}, {"Day": "Monday", "Time": "17:30", "Session": "Symposium: Artificial Intelligence as a Window into Material Perception: From Minimal Models to Active and Individualized Representations", "Room": "Purbeck Lounge", "Title": "Unravelling constancy mechanisms in haptic perception of materials using DNN modelling", "Speaker": "Anna Metzger", "CoAuthors": "Matteo Toscani", "Abstract": "Haptic perception of the materials an object is made of is crucial for interacting with it. The sense of touch often extends our visual perception of materials, as we can sense differences (e.g. fake vs. real wood or satin vs. silk) which might be very difficult to see. The underlying signals in the perception of such fine textures are high-frequency vibrations elicited on the skin by manual exploration of the material surface (sliding across the surface). Naturally, these signals depend not only on the spatial structure of materials’ surfaces but also on exploration speed, however our haptic perception of materials is speed constant. We used an unsupervised learning model to show that processing of sensory input relies on efficient encoding of these vibratory signals. The resulting low dimensional perceptual space resembles the tuning of the two main tactile afferents (RA and PC) involved in material texture perception, suggesting that both artificial and natural system evolve similar representations. Moreover, such representation reflects a simple characteristic of the relative frequency composition of vibratory signals – the slope in the frequency domain. The slope is sufficient for material category classification and can explain human correct and mistaken material classifications. We systematically varied exploration speed and showed that, while signal properties change with speed, the slope in the frequency domain is relatively invariant. Furthermore, we trained a supervised neural network to classify material categories based on vibratory signals, independent of exploration speed. We show that its deepest units express a similar level of speed constancy as the slope, while its shallower units likely only extract the Fourier spectrum. Overall, we showed that deep learning trained to perform ecologically relevant tasks is a powerful framework for explaining how sensory input is acquired and transformed from simple, input-like features, into more complex perceptually-relevant features.", "SubmissionID": ""}, {"Day": "Monday", "Time": "17:30", "Session": "Metacognition", "Room": "Bayview Suite", "Title": "Confidence Sharing Improves Children's Collaborative Decisions", "Speaker": "Francisca Matias", "CoAuthors": "Pascal Mamassian, David Soto", "Abstract": "Confidence, our subjective sense of decision accuracy, represents a key marker of metacognitive experience. While research in adults demonstrates that confidence coordinates collaborative decisions, whether children can access and utilize these metacognitive signals for social coordination remains unknown and yet is critically important for education.We studied 38 dyads of children (8–11 years) completing a visual perception task.Children judged grating orientations and rated their confidence on a 6-point scale on each trial, first individually then collaboratively. An individual staircase maintained accuracy around 70%. We quantified metacognitive sensitivity and efficiency using Signal Detection Theory, analyzed Confidence Matching Scores during disagreement trials, examined confidence dynamics when participants changed their mind, and employed mixed-effects inference respecting the dyadic nesting of observations.Joint decisions demonstrated significantly higher type-1 perceptual sensitivity than individual decisions. Metacognitive sensitivity improved for joint decisions, however no effects were observed in M-ratio. During disagreement trials, dyads followed the more confident partner 92% of the time, with no age bias. The remaining 8% of non-following trials were characterised by significantly smaller confidence gaps, with the majority involving a difference of 1 point. Collective benefit (d′joint/d′max) was positively associated with relative sensitivity (d′min/d′max), indicating that more evenly matched dyads gained greater collective benefit. When participants changed their mind to align with the collaborative decision, they did so from a position of low confidence and confidence recovered to baseline levels on the subsequent trial without lasting disruption.Children effectively use subjective confidence as a social signal to coordinate perceptual decisions appropriately, abandoning strict confidence weighting when signals are nearly equivalent. Collaborative gain is greatest in evenly matched dyads. These findings demonstrate that collective functional metacognitive awareness does not require extended development and that collaborative learning can leverage confidence to enhance outcomes, directly informing educational interventions and metacognitive training programs.", "SubmissionID": 61.0}, {"Day": "Monday", "Time": "17:45", "Session": "Attention", "Room": "Tregonwell Hall", "Title": "Shifting of visual attention in time based on cue-interval regularities can operate in the absence of awareness", "Speaker": "Chiara Zanonato", "CoAuthors": "Assaf Breska", "Abstract": "In dynamic environments, adaptive behaviour crucially depends on anticipating the timing of upcoming events based on various temporal regularities and proactively increasing attention to peak at the expected time. Previous studies have shown that cue-interval associations make the interval predictable and lead to improved perception of and reaction time to visual stimuli. However, while it is established that some regularities, e.g. isochronous streams, can drive temporal attention automatically and involuntarily, it is not clear whether this applies to cue-interval associations. Understanding this is essential to models of visual attention, as in our natural environment, these regularities are often implicitly learned, and the prediction process is applied unconsciously. Here, we tested in two experiments the ability of interval-based temporal attention to operate in the absence of awareness or volitional use of temporal regularity. In the first experiment, participants provided speeded responses to a visual target embedded in a stream of visual stimuli. Unbeknownst to them, the interval between the target and the penultimate stimulus was consistently repeated in the stream. Subjective awareness of this regularity was reduced by using variable stream length and multiple target times, and was probed at the end of the experiment using a questionnaire about the task structure. We found that 81% of participants were classified as naïve based on their questionnaire responses, and within this group, responses were faster to temporally valid compared to invalid targets. The second experiment repeated this design with a challenging perceptual discrimination task, leading to 90% naive participants, and revealed higher temporal sensitivity (d′) for valid compared to invalid targets. Together, these results provide evidence that interval-based temporal attention can operate involuntarily without conscious awareness, and impact not only motor preparation but also directly visual processing.", "SubmissionID": 567.0}, {"Day": "Monday", "Time": "17:45", "Session": "Symposium: Artificial Intelligence as a Window into Material Perception: From Minimal Models to Active and Individualized Representations", "Room": "Purbeck Lounge", "Title": "Active Perception of Real-World Materials Using 3D Gaussian Splatting", "Speaker": "Vincent Graham", "CoAuthors": "Chenxi Liao, & Bei Xiao", "Abstract": "In everyday life, we visually judge materials to make decisions. Previous research on material perception mostly uses static images with passive viewing, even though the appearance of real-world materials often changes across viewpoints due to complex interactions among lighting, materials, and shape. We developed an AI-based pipeline based on 3D Gaussian Splatting (3DGS) to build photorealistic, yet controllable, scenes from real-world captures. We use fake fruit detection as a benchmark for our method. Unlike mesh-based rendering, 3DGS captures digital twins of real-world scenes while preserving their natural appearance. Unlike photographs or videos, 3DGS provides intuitive viewpoint controls, making it a useful tool for investigating the role of active vision in material perception. To automate scene construction, we built a programmable spherical camera rig that captures many views of the scene using a mirrorless camera. We combine neural scene reconstruction with geometric constraints from our spherical setup. This allows us to refine object masks by using a ground-plane constraint and 3D-to-2D projection, including hole-filling based on surface curvature. We also assembled randomized yet physically plausible fruit arrangements using an optimization algorithm. Interactive viewing was supported by developing a real-time GPU viewer that renders 4K resolution at 120 Hz. We investigate whether material judgments elicit task-driven active viewpoint-control strategies in reconstructed scenes. Participants inspect 50 fruit arrangements and indicate which objects are plastic fruits, while they explore the scene using a mouse that controls an orbiting camera. In a control, they identify which fruits have stickers placed on them. We record the viewpoint and mouse behavior during the exploration task. We predict that the material-judgment condition will induce greater individual differences in viewing trajectories, longer dwelling time, and more repeated visits to ambiguous stimuli than the sticker-identification condition, as material discrimination depends on viewpoint-dependent cues such as gloss, texture, and translucency.", "SubmissionID": ""}, {"Day": "Monday", "Time": "17:45", "Session": "Metacognition", "Room": "Bayview Suite", "Title": "The neural basis of stimulus-driven overconfidence", "Speaker": "Ema Zezelic", "CoAuthors": ", Florian Sandhaeger, Katrina R Quinn, Markus Siegel", "Abstract": "An essential part of decision-making is confidence - the ability to judge how likely our choices are to be correct or incorrect. Despite its fundamental role, the neural computations underlying confidence judgements are still poorly understood. While confidence and accuracy are inherently correlated, confidence judgments can be biased and thus dissociated from accuracy. Such dissociations provide a window into the underlying computational mechanisms. One such case is the positive evidence manipulation, where subjects are overconfident for strong evidence that supports their choice. Here, we employed this manipulation in a magnetoencephalography (MEG) study, in which participants performed an orientation discrimination task with simultaneous choice and confidence reports. We found that neural choice and confidence representations were similar with and without stimulus-driven overconfidence. However, in the overconfident high-evidence condition, both the mean and variance of neural choice signals were increased. Furthermore, a simple computational model of choice confidence predicted both the increase of the neural choice signals and of subjective confidence across individual subjects. Our results suggest that overconfidence is not due to a cognitive bias, but reflects a stimulus-driven change of the distribution of neural choice signals.", "SubmissionID": 63.0}, {"Day": "Monday", "Time": "18:00", "Session": "Attention", "Room": "Tregonwell Hall", "Title": "When Covert Exogenous Spatial Attention Isn’t Purely Bottom-Up: Reward learning modulates an abrupt onset’s impact on asymptotic discriminability", "Speaker": "Michael Grubb", "CoAuthors": "Nicholas Crotty", "Abstract": "The sudden appearance of a peripheral stimulus elicits a reflexive shift of covert spatial attention, yielding rapid and transient improvements in perception at attended locations. Classic accounts emphasize the largely bottom-up nature of this effect, yet recent work shows that “reflexive” attention is sensitive to learned regularities. Here we extend this work by asking whether learned reward associations modulate the allocation of covert exogenous spatial attention.\n\n\n\n\nTwenty-two observers completed four sessions each of a speed-accuracy trade-off (SAT) procedure. Each trial contained two peripheral Gabor patches presented left and right of fixation. Observers indicated the orientation (clockwise/counterclockwise from vertical) of the post-cued Gabor after delays of 33–2133 ms. A spatially uninformative, abrupt-onset disk preceded the Gabors and was equally likely to be valid (near the subsequent target) or invalid (near the distractor). The disk’s luminance was deterministically paired with one of two outcomes: for one luminance-defined disk, correct responses earned $0.03; for the other, correct responses earned $0.00. Data were fit with a standard SAT model to estimate asymptotic discriminability and the rate of information accrual.\n\n\n\n\nBoth reward-predictive and non-reward-predictive disks produced robust cueing effects. Critically, reward history modulated the magnitude of the attentional effect at asymptote: we observed a reward × cue validity interaction for the SAT asymptotic parameter, with larger cueing effects for reward-predictive onsets. In contrast, reward did not interact with cue validity for processing-time. Nonetheless, we observed a main effect of cue validity, consistent with prior SAT findings that exogenous cueing speeds the rate of information accrual.\n\n\n\n\nThese results indicate that reward learning selectively amplifies the ultimate perceptual advantage conferred by covert spatial attention, without altering attention’s effect on the temporal dynamics of information accumulation. More broadly, findings underscore that exogenous attention is not purely stimulus-driven: its consequences are shaped by learned regularities.", "SubmissionID": 10.0}, {"Day": "Monday", "Time": "18:00", "Session": "Symposium: Artificial Intelligence as a Window into Material Perception: From Minimal Models to Active and Individualized Representations", "Room": "Purbeck Lounge", "Title": "Personalized Modeling of Material Perception in Autism Spectrum Disorder", "Speaker": "Masataka Sawayama", "CoAuthors": "", "Abstract": "Real-world objects exhibit a wide range of material properties, and understanding how these are perceived requires considering not only group-level trends but also individual differences. This is particularly important for autism spectrum disorder (ASD), where individuals often exhibit sensory hypersensitivity or hyposensitivity, with substantial variability across individuals. Characterizing such diversity requires approaches that move beyond group averages and instead model perception at the individual level. In this study, we measured visual discrimination sensitivity across multiple material dimensions and developed personalized computational models of material perception using deep neural networks. Thirty individuals with ASD, recruited from clinical settings, and a group of age- and gender-matched typically developing (TD) participants took part in the experiment. Participants performed an odd-one-out task using a material perception dataset (Sawayama et al., 2022, Journal of Vision), in which stimuli were generated via physically based rendering and systematically varied along six material dimensions. At the group level, no significant differences were observed between ASD and TD participants in discrimination accuracy. However, substantial individual variability emerged in the computational modeling results. We evaluated multiple deep neural network models with different pretraining paradigms and found that self-supervised models (e.g., DINO) provided the best predictions of individual behavioral performance across both groups. Further analysis revealed distinct patterns in the levels of representation that best explained individual performance. For many TD participants, deeper-layer features yielded better predictions, suggesting reliance on higher-level representations. In contrast, ASD participants exhibited more heterogeneous patterns: while some individuals were best explained by deeper features, a substantial number were better captured by shallow-layer features, indicating a broader diversity in representational reliance. These findings suggest that personalized modeling can uncover individual differences in the perceptual features underlying material discrimination, providing insights into the heterogeneity of perceptual processing in ASD.", "SubmissionID": ""}, {"Day": "Monday", "Time": "18:00", "Session": "Metacognition", "Room": "Bayview Suite", "Title": "Evidence against domain-general metacognition: Distinct confidence rating strategies in visual perception and recognition memory tasks", "Speaker": "Yu-An Chen", "CoAuthors": "Nick Yeung", "Abstract": "Metacognition is often described as the monitoring and control of one’s own cognitive and behavioral processes. People use their confidence in a judgment to adjust their subsequent actions; for example, they may slow down when the road is unclear to gather more information, allowing for more accurate decisions. Given the ubiquity of metacognitive processes in mental operations (e.g., visual perception or recognition memory), researchers are curious about whether there is a single, unified system that can read out various forms of information from different domains (the domain-generality hypothesis). While previous research has conventionally addressed this question by correlating measures of metacognitive accuracy across tasks, we critique this approach, arguing that such correlations may be spurious, arising from shared third variables or inherent properties of modeling metacognitive efficiency using the signal detection theory (SDT) model. Consequently, whereas previous research has focused on performance correlations, our approach focuses on assessing domain-generality via more robust, quantifiable characteristics of confidence rating strategies. We reasoned that if metacognition is domain-general, individuals should maintain the same confidence rating strategies across different types of tasks. In the initial study, we manipulated difficulty in both visual perception and recognition memory tasks to test whether participants maintained the same computational strategies (e.g., being Bayesian or heuristic in confidence ratings) across tasks by examining the property of criteria setting under the unequal variance SDT model. The results indicate that participants’ computations of confidence were similar within tasks but not across tasks, providing evidence against the domain-generality of metacognition. At least, the metacognitive system for visual perception may differ from that for memory.", "SubmissionID": 364.0}, {"Day": "Monday", "Time": "18:15", "Session": "Attention", "Room": "Tregonwell Hall", "Title": "The Trajectory of Visual Attention; Teleport or Drift?", "Speaker": "Kabir Arora", "CoAuthors": "Stefan Van der Stigchel, J. Leon Kenemans, Marnix Naber, Surya Gayet, Samson Chota", "Abstract": "Covert attention is a fundamental component of visual processing, but its \"covert\" nature makes it challenging to measure directly. Thus, although signatures of covert attention are frequently used in all sorts of domains of visual cognition (visual search, visual working memory, attentional capture, reading, attentional spotlight tasks, object-based attention, etc.), relatively little is known about what a shift of covert attention actually looks like. Here, we address the following question: when covert attention shifts, and boosts sensory processing at some target location, is sensory processing along the path of this shift boosted as well? Or, does it \"teleport\" without altering sensory processing along the way?  We conduct an EEG-eyetracking experiment (n = 24) paired with a cueing task and Rapid Inivisible Frequency Tagging (RIFT), using which we track attentional allocation to the start and end points of a covert attentional shift. We show successful markers of attentional shifts (RIFT responses at the endpoints, alpha lateralization, gaze position). Crucially, we also tag locations between these start and end points and observe no attentional modulations to the RIFT response at these locations. Thus, our results suggest that covert attention is directly shifted from start to endpoint without boosting the encoding of stimuli along the way. As tools that track attention are developed in order to better study the various domains of visual cognition, this outcome places important constraints on what can be tracked.", "SubmissionID": 168.0}, {"Day": "Monday", "Time": "18:15", "Session": "Metacognition", "Room": "Bayview Suite", "Title": "", "Speaker": "Simona Noviello", "CoAuthors": "Benedikt Zoefel, Andrea Alamia, Jakob Schwenk, Silvia Savazzi, Gregor Thut, Irene Sperandio", "Abstract": "An accurate representation of object size is a fundamental visual process supporting effective interaction with the environment. Size computation relies on early mechanisms that encode stimulus properties according to the retinotopic organization of the visual system. Under normal viewing conditions, physically larger stimuli typically elicit stronger and earlier neural responses than smaller ones. While behavioural evidence suggests that size discrimination depends on conscious awareness, it remains unclear whether this is reflected at the neural level and whether size information can be processed without awareness. To address this question, we recorded EEG activity while participants performed a size discrimination task under Continuous Flash Suppression (CFS), which allows manipulation of visual awareness. On each trial, a small or large ring was presented to one eye while a dynamic high-contrast flickering mask was shown to the other. A staircase procedure was used to estimate individual perceptual thresholds, ensuring a balanced proportion of conscious and unconscious trials. Participants performed a forced-choice size judgment and rated perceptual clarity using the Perceptual Awareness Scale (PAS). Catch trials were included to assess performance in the absence of the stimulus. Behavioural results showed that size discrimination critically depended on awareness: accuracy was above chance only in conscious trials, whereas performance in unconscious trials did not differ from chance and was comparable to catch trials. Consistently, ERP analyses revealed size-related neural differences only under conscious perception, with no differences between unseen stimuli and catch trials. However, time–frequency analyses revealed residual unconscious processing. Although no power differences emerged, unseen stimuli elicited increased low-frequency (delta-band) phase synchronization compared to catch trials, suggesting that stimulus presence is registered without awareness. Overall, these findings indicate that while unconscious processing does not support size discrimination, it may encode basic stimulus presence, highlighting a dissociation between feature processing and detection across levels of awareness.", "SubmissionID": 509.0}, {"Day": "Tuesday", "Time": "10:30", "Session": "Computational Modelling", "Room": "Tregonwell Hall", "Title": "Learning Fast and Slow: towards a theory of perception", "Speaker": "Roland Fleming", "CoAuthors": "", "Abstract": "How come, perceptual learning sometimes requires tens of thousands of trials to elicit tiny changes in sensitivity that barely generalise, while other times we can learn entirely new concepts from a single example? Why do some researchers in our field think perception is all about inferring parameters of physical reality, like distance, size or colour, while others focus on attention or eye movements as the central processes of making sense of sensory signals?  While these two questions might seem not to have very much in common, here, I will present the outline of a two-stage theory of perception (‘learning fast and slow’) that seeks to provide a unifying explanation of a wide range of phenomena.  The basic concept is that perception is structured around two core computations—disentanglement and selection—that have complementary computational demands and benefits. Disentanglement proceeds by slowly acquiring nonlinear transformations of raw sensory signals through massive quantities of passive observation (structured by unsupervised learning objectives), which discover latent causal structures “out there” that are responsible for sensory signals. Once acquired, such general-purpose representations enable perceptual constancy of world properties like shape, material or object identity, by rapid, largely feedforward discriminative inference. Selection, in contrast, operates “in context” with a particular behavioural goal in mind, to suppress task-irrelevant features, allowing zero-shot learning and heuristic deployment of resources in a largely top-down way. This involves computationally costly generative inference and is impacted more directly by action outcome (e.g., reward).  I will present some concrete examples of this framing of perception, and argue that it may also help us to understand how both heuristics and statistically optimal strategies make sense in perception and action.", "SubmissionID": 163.0}, {"Day": "Tuesday", "Time": "10:30", "Session": "Symposium: Probing the Visual System: Illusions as Windows into Typical and Atypical Cognition", "Room": "Purbeck Lounge", "Title": "Atypical Development Disrupts the Perception-Action Dissociation: Evidence from Visual Illusions", "Speaker": "Erez Freud", "CoAuthors": "", "Abstract": "Visual illusions provide a powerful tool for probing the fundamental architecture of the visual system, particularly the well-established dissociation between vision-for-perception and vision-for-action. While adults typically show that actions like grasping are resistant to illusions that deceive perception, the developmental trajectory of this dissociation offers critical insights into how this functional specialization emerges. Our research demonstrates that this dissociation is evident in typically developing school-aged children, whose perceptual judgments are susceptible to the Ponzo illusion while their grasping movements remain accurately scaled to real-world object size.\n\nHowever, this foundational dissociation appears sensitive to developmental conditions, suggesting its emergence is not guaranteed. We explored this by testing two distinct pediatric populations. First, in children with amblyopia, a condition of atypical visual experience, we found a profoundly different pattern. Unlike their typically developing peers, these children were susceptible to the illusion in both their perceptual estimations and their grasping actions, suggesting that typical visual input is crucial for cementing the functional divide between the perception and action streams.\n\nSecond, in autistic adults, we observed a convergent but distinct reduction in the perception-action dissociation. Autistic individuals showed susceptibility to both the Ponzo illusion and to the height-width illusion during grasping - contextual information that typically influences only perceptual judgments leaked into visuomotor computations. This pattern suggests that typical neurodevelopmental maturation, independent of visual experience per se, is equally critical for establishing functional specialization.\n\nTogether, these findings illustrate that while the division of labor between perception and action pathways emerges early in typical development, it represents a fragile developmental outcome, contingent upon both the quality of visual experience and the integrity of neurodevelopmental maturation.", "SubmissionID": ""}, {"Day": "Tuesday", "Time": "10:30", "Session": "Serial Processing and Perceptual Dynamics", "Room": "Bayview Suite", "Title": "Tonic Arousal Modulates Response Speed but Not Attentional Orienting", "Speaker": "Ana-Maria Barosan", "CoAuthors": "Simon van Gaal, Timo Stein", "Abstract": "Human performance fluctuates over time even under constant task demands, potentially reflecting variations in internal states, such as arousal. While prior work has linked arousal to perceptual and decision-making performance, its influence on selective attention remains unclear. Here, we investigated how moment-to-moment fluctuations in tonic arousal modulate visuospatial attention, using pupillometry in combination with variants of the Posner cueing paradigm.\n\nAcross five experiments (N = 377), we measured pre-stimulus pupil size as a trial-by-trial index of tonic arousal while participants performed exogenous and endogenous spatial cueing tasks. Task variants systematically manipulated cue predictiveness, inclusion of neutral trials, inhibition of return, and cue type (peripheral vs. central). Behavioural performance was assessed via response times (RTs) and cueing effects (invalid–valid RT differences), allowing testing for dissociations between global processing efficiency and attentional orienting.\n\nConsistent with the Yerkes–Dodson framework, we observed a robust quadratic (U-shaped) relationship between tonic arousal and RTs in four of five experiments: responses were fastest at intermediate arousal levels and slower at both low and high arousal. Mixed-effects model comparisons confirmed that quadratic models provided a significantly better fit than linear models. In contrast, cueing effects showed little evidence of modulation by arousal, suggesting that attentional orienting is largely unaffected by fluctuations in tonic arousal.\n\nThese findings demonstrate that spontaneous fluctuations in tonic arousal strongly influence overall processing speed but do not consistently modulate the efficiency of spatial orienting. This dissociation suggests that arousal primarily affects global processing efficiency rather than the specific mechanisms underlying attentional reorienting. Together, our results refine current accounts of arousal–performance relationships by showing that the canonical inverted-U robustly characterizes response speed, but does not uniformly extend to selective attention.", "SubmissionID": 122.0}, {"Day": "Tuesday", "Time": "10:45", "Session": "Computational Modelling", "Room": "Tregonwell Hall", "Title": "Dissociable Visual and Non-Visual Semantic Coding in the Place Network Revealed by Language and Vision Models", "Speaker": "Scott L. Fairhall", "CoAuthors": "Daniela Gibbons, Stefania Bracci, Andrea Belluzzi", "Abstract": "Cognitive neuroscience has identified cortical regions that respond selectively to a broad range of object categories such as faces, places, body parts, tools, and animals. These regions respond strongly to visual images, but some also respond to words, and the perceptual/semantic nature of these representations is unclear. Here, we used fMRI-based Representational Similarity Analysis (RSA) alongside computational models of vision (VGG-19) and language (OpenAI Large-3) to dissociate visuo-semantic and non-visual semantic contributions to word-driven responses across the place-selective network.  \n\nParticipants (N=24) were presented with the names of 48 famous monuments. Representational spaces were derived from the pattern of activation produced by these monuments in the place-selective network: the parahippocampal place area (PPA), transverse occipital sulcus (TOS) and retrosplenial complex (RSC). These representational spaces were compared to computational representational spaces derived from a) a language model based on non-visual descriptions and b) a visual-feature based model constructed by averaging activations from the penultimate layer of VGG-19 across ten typical images per monument.\n\nKey analyses focussing on the independent contribution of visual and non-visual semantic models revealed different patterns across regions (region x model interaction: p=.007). Non-visual semantic information was represented strongly in RSC (p<.001) and TOS (p=.003), but not in PPA (p=.58). Conversely, for the visual model, visuo-semantic representations were present in PPA (p=.005) but not in RSC (p=.067) or TOS (p=.162). \n\nThis pattern of results indicates that, even in the absence of visual images, information about the visual properties of specific monuments is preferentially represented in ventral PPA, whereas non-visual semantic information is represented in RSC and TOS. \n\nThis functional dissociation within the place-selective network provides insights into the nature of visual and semantic representations within category selective regions, as well as functional specialisation across elements of category selective networks.", "SubmissionID": 484.0}, {"Day": "Tuesday", "Time": "10:45", "Session": "Symposium: Probing the Visual System: Illusions as Windows into Typical and Atypical Cognition", "Room": "Purbeck Lounge", "Title": "Altered Magnitude Matching Between Sensory modalities in Autism", "Speaker": "Bat-sheva Hadad", "CoAuthors": "", "Abstract": "In a series of experiments, we examined whether sensory processing in autism reflects differences in both contextual calibration and experience-driven (statistical) sensory learning, and whether these processes operate in a modality-specific or amodal manner. Using a magnitude perception paradigm, autistic and non-autistic adults judged auditory and visual durations relative to the distribution of recently experienced stimuli, allowing us to assess how sensory evidence is calibrated by context across modalities.\n\nAcross experiments, a consistent pattern emerged. Non-autistic participants showed modality-specific calibration, with stronger context effects within than between modalities, reflecting differentiated sensory coding. In contrast, autistic adults exhibited comparable context effects across modalities, alongside reduced sensory specialization, indicating a broader, more amodal integration of contextual information. To test whether this pattern reflected synesthetic cross-modal tendencies, we included a comparison group of adults with synesthesia. Synesthetes showed modality-specific calibration similar to non-autistic controls, ruling out synesthetic mechanisms as an explanation.\n\nTogether, these findings demonstrate a converging pattern across calibration and sensory learning paradigms: sensory processing in autism is characterized by less differentiated, more amodal integration of contextual information, suggesting broader, less specialized sensory representations.", "SubmissionID": ""}, {"Day": "Tuesday", "Time": "10:45", "Session": "Serial Processing and Perceptual Dynamics", "Room": "Bayview Suite", "Title": "Temporal expectations drive early visual processing", "Speaker": "Lasse Dietz", "CoAuthors": "Christoph Strauch, Stefan van der Stigchel, Surya Gayet, Samson Chota", "Abstract": "Expecting a red light right after a yellow light is possible because stoplights follow predictable timing. Temporal expectations about relevant sensory events reliably improve response time and response accuracy. Improved accuracy is in part attributed to preparatory changes in visual areas. However, physiological evidence for this preparation relies primarily on endogenous neural markers (e.g., alpha oscillations), whose precise relationship to visual processing is debated. Here, we employed Rapid-Invisible-Frequency Tagging (RIFT), an invisible experimenter-induced neural marker of early visual processing intensity, while participants completed a temporal orienting task (manipulation of expected target timing). In line with previous research, behavioral performance (precision) improved when targets were presented at the expected time. Crucially, the RIFT response revealed that anticipating relevant events increased visual processing shortly before their onset. Using induced (rather than endogenous) neural oscillations, these results show that temporal expectations facilitate perceptual performance by driving the earliest stages of visual processing when anticipating relevant sensory events.", "SubmissionID": 167.0}, {"Day": "Tuesday", "Time": "11:00", "Session": "Computational Modelling", "Room": "Tregonwell Hall", "Title": "Deep Neural Networks Initially Align with Biological Vision but Quickly Part Ways", "Speaker": "H.Steven Scholte", "CoAuthors": "Niklas Müller, Julio Smidi, Iris Groen, Marcel van Gerven", "Abstract": "Deep convolutional neural networks (DCNNs) have become the dominant computational model of biological vision, yet it is well known that they classify objects primarily by texture while humans rely on shape. This fundamental divergence in strategy coexists with strong brain-network correspondence — a paradox that raises questions about what such correspondence actually reflects. Here we compare developing networks with developed human vision: we track DCNNs across training, sampling checkpoints densely during early epochs and more sparsely thereafter, evaluating alignment with adult human fMRI, adult human EEG, and adult macaque electrophysiology at each developmental snapshot. Brain alignment is largely established within the first four epochs, when classification accuracy remains below 15%. During this brief window, networks acquire sensitivity to low-frequency, shape-based structure: the coarse visual statistics that any system processing natural images must encode, regardless of task. These findings suggest that the correspondence between artificial and biological vision reflects their shared visual environment (the universal structure of natural images that both systems must represent) but not the convergence on how they recognise objects. The rapid divergence after early training, as networks develop texture-based classification strategies that humans do not employ, demonstrates that DCNNs ultimately solve object recognition in a fundamentally different way than human vision, despite their early alignment with biological representations.", "SubmissionID": 6.0}, {"Day": "Tuesday", "Time": "11:00", "Session": "Symposium: Probing the Visual System: Illusions as Windows into Typical and Atypical Cognition", "Room": "Purbeck Lounge", "Title": "Ambiguous apparent motion perception in 5–7-year-old neurotypical children", "Speaker": "Elisabeth Hein", "CoAuthors": "", "Abstract": "In order to interact appropriately with our environment, we need to correctly interpret the motion of the objects within this environment. To do so, we need to connect the correct instances of these objects at different moments in time. This is not always an easy task, as the visual input can be highly ambiguous, for example when objects are occluded by other objects. To study how the visual system is able to solve this task, ambiguous apparent motion displays have been used in adults. In these displays participants can perceive different types of motion despite the visual input being identical. What motion is perceived depends on which objects have been connected across space and time, i.e., how object correspondence is solved. Research has shown that in adult vision the spatio-temporal relationship between objects as well as their features, e.g., their colour or shape, can influence the ambiguous apparent motion percept. Based on these findings different theories have been developed that suggest that object correspondence can happen at different levels of processing, at a lower-level spatio-temporal information has a large impact and at higher levels the influence of feature information is more important. The aim of the work presented here was to examine how children perceive ambiguous apparent motion and whether they use the same type of information to connect objects across space and time as adults do. We manipulated the ISI, colour and shape of the objects as well as the duration the display was presented and asked children between the age of 5 and 7 to report their motion percept. Our results showed that all factors influenced ambiguous apparent motion perception in children, but not in the same way as they do for adults, suggesting that correspondence might be solved predominantly at a lower-level in children.", "SubmissionID": ""}, {"Day": "Tuesday", "Time": "11:00", "Session": "Serial Processing and Perceptual Dynamics", "Room": "Bayview Suite", "Title": "Tracing Pupils and Performance: Task Difficulty and Timescales of Arousal", "Speaker": "Sean van Mil", "CoAuthors": "Margot Steijger, Stijn Nuiten, Lola Beerendonk, Jan-Willem de Gee, Timo Stein, Johannes Fahrenfort, Simon van Gaal", "Abstract": "A century after Yerkes and Dodson proposed that performance peaks at intermediate arousal, the neurobiological conditions under which this relationship emerges in humans remain debated. Arousal is increasingly understood as a multiscale process, expressed in fluctuations unfolding over different timescales, from fast, transient responses to slower changes in global state. These are reflected in pupil dynamics and relate to neuromodulatory influences, including but not limited to locus coeruleus-noradrenergic activity. Inverted-U arousal-performance relationships have been reported in both the auditory and visual domain, raising the question of what mechanisms underlie this relationship.\n\nWe investigated how task difficulty and the timescale of pupil-linked arousal fluctuations shape the arousal-performance relationship in an auditory discrimination task. Sixty participants performed easy and difficult task variants (~90% and 70% accuracy, respectively) while pupil size was measured. Using a hierarchical Bayesian modeling, we estimated how task difficulty and pre-stimulus pupil-linked arousal predicted perceptual sensitivity.\n\nOverall, we found evidence for an inverted-U shaped arousal-performance relationship, but no evidence for modulation by task difficulty. Crucially, the strength and form of this relationship depended on the investigated arousal timescale. When infra-slow arousal fluctuations (<0.01 Hz) were removed, the inverted-U relationship became stronger, whereas isolating these infra-slow components abolished the inverted-U.\n\nSliding-window analyses further showed a temporal dissociation across trials, with the inverted-U relationship emerging later within blocks, coinciding with attenuation of pupil decay. This suggests that early performance might be dominated by slower neuromodulatory fluctuations rather than intermediate-timescale fluctuations, influencing performance later in the block.\n\nTogether, these findings demonstrate that arousal-performance relationships is not fixed, but depends on the temporal scale of arousal fluctuations being examined, providing a mechanistic refinement of the Yerkes-Dodson law that is likely generalisable across modalities.", "SubmissionID": 274.0}, {"Day": "Tuesday", "Time": "11:15", "Session": "Computational Modelling", "Room": "Tregonwell Hall", "Title": "Steerable autoencoders underlying remapping, spatiotopy, and visual stability", "Speaker": "Patrick Cavanagh", "CoAuthors": "David Melcher, Khac Vinh Nguyen, Yalda Mohsenzadeh", "Abstract": "Whenever the eyes move, the locations of attended targets must be updated to keep track of them despite their shift on the retina, a process called remapping. Here we show that each attended target’s identity can be connected to the locations of its features in early visual cortex through a steerable autoencoder network. The network is trained to appropriately shift the feature activity to the target’s new location with each saccade. The model is a type of autoencoder architecture that takes an input pattern, here from early retinotopic cortex, passes it through several layers of encoding to generate a high-level, low-dimensional representation that corresponds to the object areas of visual cortex. The model receives and integrates the upcoming saccadic movement information in this layer. This then returns through decoding layers to produce an updated output pattern, again in early visual cortex. Autoencoders have been used to model object-based attention, to predict the subsequent images when targets are moving, and here to predict upcoming target locations when the eyes move – based on distributed information about eye position (gain fields). This autoencoder process is part of the overall architecture of the visual system, acting to link target properties together, even as the target or the eyes move.", "SubmissionID": 17.0}, {"Day": "Tuesday", "Time": "11:15", "Session": "Symposium: Probing the Visual System: Illusions as Windows into Typical and Atypical Cognition", "Room": "Purbeck Lounge", "Title": "Stress and visual illusions: Is there a relationship?", "Speaker": "Irene Sperandio", "CoAuthors": "", "Abstract": "Visual hallucinations induced pharmacologically, clinically, or experimentally often resemble specific geometric forms, including radial spokes/fans, concentric rings, and spirals. These ‘Klüver forms’ have been attributed to intrinsic properties of visual cortex, whereby wave-like activity patterns propagate through retinotopically-arranged lateral connections. Empirical evidence for this link derives from ‘seeded’ hallucinations, where flickering patterns in one visual-field location have been argued to elicit opponent forms in adjacent locations (e.g. spokes induce illusory rings, and vice versa). However, these reports rely on purely qualitative responses, taken in uncontrolled conditions. Here, we used quantitative psychophysical measurements to test whether flickering geometric stimuli can selectively induce spatially-opponent hallucinations in adjacent visual-field locations.\n\nParticipants (n=20 typical adults) viewed 15Hz flickering stimuli (either radial spokes/fans or concentric rings) for 2 minutes. Stimuli were either full field (as in the MacKay effect), foveal patterns with a blank surround, or peripheral patterns with a blank centre. Fixation was monitored. Hallucinatory percepts were reported using button presses, allowing classification as spokes, rings, or mixed forms. Across all conditions, opponent forms were significantly more frequent than congruent forms (e.g. central spoke stimuli induced more illusory peripheral rings than spokes), as predicted. However, this opponency was not exclusive: individual variability and the presence of mixed/irregular percepts demonstrate greater heterogeneity than previously reported. Opponent forms emerged rapidly after stimulus onset, with a slower rise in the frequency of congruent percepts, suggesting an additional role for processes like adaptation. Participant drawings corroborated these findings, revealing both a predominant opponent bias and more complex patterns (e.g. fractal structures) like those induced by unstructured flicker.\n\nOur results provide quantitative support for models in which hallucination content reflects the interaction of stimulus-driven input and intrinsic cortical dynamics, but also highlight the need to incorporate the variability and phenomenological richness of the resulting perceptual states.", "SubmissionID": ""}, {"Day": "Tuesday", "Time": "11:15", "Session": "Serial Processing and Perceptual Dynamics", "Room": "Bayview Suite", "Title": "Distinct effects of feature-based attention on serial dependence and central tendency bias in hue judgements", "Speaker": "Saija Niemi", "CoAuthors": "Toni Saarela, Maria Olkkonen", "Abstract": "Serial dependence and central tendency bias (CTB) are similar, attractive biases toward recent stimulus history but operating on different timescales. Serial dependence is modulated by feature-based attention: when a different feature of the stimulus was attended in the previous trial, serial dependence diminishes compared to when the same feature was attended. We tested whether feature-based attention similarly affects CTB in hue judgments. If it does, the two effects could be caused by a shared mechanism, but if not, it suggests that they are at least partially separate. Sixteen participants estimated the hue or horizontal width of colored ellipses in two separate sessions. In each trial, an ellipse was presented for 500 ms after a pre-cue, and after a 1250 ms interval, participants adjusted a response probe to match the cued feature. The feature to be reproduced alternated between trials in a fixed pattern. To test the effect of attention on CTB, we manipulated the distributions of hue between the sessions. Stimulus hues in Hue trials were sampled from 160°–200° or 180°–220° in CIELAB space (L* = 55, C = 45) in both sessions, counterbalanced between participants. In Width trials, the distribution of hues was different between the two sessions: either 20° greener or bluer. Using a linear mixed-effects model for analysis, we did not replicate the role of feature-based attention on serial dependence in hue judgments. Instead, previous stimuli one and two trials back attracted current hue judgments regardless of whether hue was attended in the previous trials or not. We also found an attractive CTB independently of serial dependence. The center of CTB shifted away from the unattended stimulus distributions, demonstrating a repulsive attentional effect. In conclusion, feature-based attention differently affects serial dependence and CTB, suggesting that they may rely on at least partially distinct mechanisms.", "SubmissionID": 525.0}, {"Day": "Tuesday", "Time": "11:30", "Session": "Computational Modelling", "Room": "Tregonwell Hall", "Title": "A Neural Model of Lightness and Color Assimilation", "Speaker": "Michael Rudd", "CoAuthors": "", "Abstract": "In the phenomena of lightness and color assimilation, the appearance of one region of a visual image undergoes a shift in value or hue in the direction of that of a surrounding or neighboring region. Well known examples are the Bezold-Brucke effect and Helson assimilation. Here, I show that these effects depend on edge integration—a process by which the appearance of a region is computed from a sum of color induction effects from edges—and I propose a neural model of assimilation based on edge encoding by On-center/Off-surround, Off-center/On-surround, and four types of double-opponent color neurons, followed by filling-in of surface color from edges. In support of this model, I describe a psychophysical experiment in which a visual stimulus comprising an achromatic disk surrounded by an achromatic annulus is presented against a background field whose color is varied from cyan to magenta along the LM axis of a physiological MB/DKL color space. This background variation changes the color contrast at the outer annulus border, and this contrast change, in turn, induces a change in the hue of the disk. Importantly, when the direction of the color contrast of the outer annulus border reverses as the background chromaticity passes through the achromatic point, the magnitude of the hue induction in the disk also changes. This result mirrors a previous finding that the strength of lightness induction from a remote border depends on the luminance polarity of that border (Rudd, J. Vision, 2010). The polarity-dependence of the strengths of lightness and color induction are difficult to explain with low-level filtering models, but are consistent with the hypothesis that surface appearance is computed from edges encoded by half-wave rectified neurons such as the ones proposed in the model, followed by a neural color filling-in mechanism that performs edge integration.", "SubmissionID": 495.0}, {"Day": "Tuesday", "Time": "11:30", "Session": "Serial Processing and Perceptual Dynamics", "Room": "Bayview Suite", "Title": "Temporal evolution of idiosyncratic visual biases: heating up the visual system?", "Speaker": "Mark Wexler", "CoAuthors": "Jun Min An", "Abstract": "The perception of different families of visual stimuli has been shown to be governed by idiosyncratic biases. These biases are reliably different from one observer to the next, are generally conserved within each individual over time, but do undergo changes over time that are usually small and cumulative, demonstrating that the biases are measures of internal states of the visual system (Wexler, Duyck & Mamassian, 2015). But what causes the biases to change over time when they do so? Their temporal evolution could be driven by either external stimulation, or internal dynamics of the visual system. In order to distinguish between these two causes of temporal evolution, we performed an experiment in which we measured biases repeatedly, but varied the temporal intervals between the measurements, from 1 minute to 12 hours. We reasoned that, on one hand, if evolution of biases is driven by the perception of the underlying stimuli, the degree of change should be independent of the temporal interval between measurements; if, on the other hand, temporal evolution is driven by internal dynamics of the visual system, changes in biases should be larger for longer temporal intervals between measurements. Interestingly, we found a result that contradicts both of these predictions: paradoxically, biases change more from one measurement to the next when measurements are performed at briefer intervals. This unexpected observation argues for a thermodynamic model in which repeated exposure to visual stimuli causes the visual system to go into a noisy or \"hot\" state far from equilibrium, driving larger changes in biases. With longer intervals, the visual system cools down, returning to a more stable state.", "SubmissionID": 584.0}, {"Day": "Tuesday", "Time": "11:45", "Session": "Computational Modelling", "Room": "Tregonwell Hall", "Title": "Inferring Visual Properties by Predicting Future Video Frames", "Speaker": "Fatma Kilic", "CoAuthors": "Roland W. Fleming, Katherine R. Storrs", "Abstract": "We investigated whether training a neural network to predict the future states of visual input could cause it to learn to infer world properties. We created 20,000 videos of objects rotating or translating under various lighting conditions. Each object had either a mirror-like reflective surface or was matte with one of 10 different surface patterns. We then trained an unsupervised recurrent neural network (PredRNN-v2) to predict the future frames of each video. After training, we analyzed the model’s latent representations for multiple factors (material, motion, illumination, and surface pattern) across three network layers and memory states (C, H, and M) by using linear decoding, feature-level selectivity metrics, and lesioning analyses. We found that the scene properties could be robustly decoded from the latent space representations across layers and memory states, indicating that the model developed a rich representation of environmental structure without supervision. The representations were generally distributed across many feature maps; however, there were subsets of feature maps that showed selectivity for specific visual properties. Importantly, lesioning those units led to a significant drop in property decoding compared to lesioning randomly-selected feature maps, indicating the functional relevance of those features. Taken together, the results suggest that artificial networks that learn to predict the next visual input implicitly learn representations that partially tease apart object and scene properties. These representations also capture properties that are relevant for material perception in dynamic environments. This computational framework can shed light on how the brain learns underlying world properties from complex visual environments.", "SubmissionID": 232.0}, {"Day": "Tuesday", "Time": "11:45", "Session": "Serial Processing and Perceptual Dynamics", "Room": "Bayview Suite", "Title": "A model of rhythmic attentional sampling of visual processing", "Speaker": "André R. Zarza Tapia", "CoAuthors": "David J. Heeger, Laura Dugué", "Abstract": "Attention rhythmically samples visual information at low frequencies (<20 Hz), giving rise to periodic fluctuations in behavioral performance (VanRullen, 2016; Fiebelkorn and Kastner, 2019; Kienitz, Schmid and Dugué, 2022). Despite accumulating empirical evidence, the circuit-level computations underlying these behavioral rhythms remain poorly understood. Here, we developed a computational model of rhythmic attentional sampling to explain and predict rhythmic perceptual outcomes. The model is grounded in the ORGaNICs framework –a class of biophysically-plausible recurrent neural circuits in which divisive normalization, a canonical computation describing how attentional allocation modulates visual cortex responses, emerges endogenously from the interplay between recurrent amplification and modulatory control (Heeger and Mackey, 2019). Crucially, the framework includes an input gain parameter that scales feedforward sensory drive, providing a candidate mechanism for attentional modulation. We exploit this by driving input gain rhythmically, instantiating periodic fluctuations in feedforward sensitivity. Applied to a population of spatially and orientation-tuned units, the model yielded phase-dependent fluctuations in detection sensitivity and closely fitted previous empirical evidence of rhythms in behavioral performance (Galas, Donovan and Dugué, 2025). Specifically, we captured two distinct modes of attentional sampling: sustained attention operating at the alpha frequency (~12 Hz) and exploratory attention rhythmically shifting between stimuli at the theta frequency (~6 Hz). Together, our work goes beyond previous empirical observations and provides a principled, circuit-level account of how rhythmic attentional modulation of recurrent sensory dynamics gives rise to structured fluctuations in perceptual sensitivity.", "SubmissionID": 49.0}, {"Day": "Tuesday", "Time": "14:00", "Session": "Face Perception and Recognition", "Room": "Tregonwell Hall", "Title": "Super-recognisers spontaneously and preferentially process face identity: Evidence from implicit experimental paradigms", "Speaker": "Timothy Cottier", "CoAuthors": "David White, Tijl Grootswagers, Manuel Varlet, Genevieve L. Quek", "Abstract": "Exceptional face recognition abilities are typically identified and studied via behavioural tasks that explicitly instruct observers to attend to face identity. Consequently, relatively little is known about how individual differences in face identity processing manifest under implicit task conditions (i.e., in the absence of explicit instructions to monitor identity). We address this outstanding question by exploring how super-recognisers—individuals with exceptional face identity processing abilities—differed from control participants on two implicit paradigms. In Experiment 1, 36 super-recognisers and 92 controls completed an “odd-one-out” task in which they selected which of three faces they found most visually distinct on each trial. Within each triplet, each face was a unique outlier in either valence, viewpoint, or identity, enabling participant’s selection to reveal which dimension they perceived as most salient. Although both participant groups tended to endorse identity as more salient than either valence or viewpoint, super-recognisers endorsed identity more than controls. In Experiment 2, 31 super-recognisers and 66 control participants completed a same/different expression matching task based upon a Garner Interference paradigm, where two sequentially presented faces could be either the same or different identities. We found that task-irrelevant identity changes detrimentally impacted expression-matching in both groups, but had a greater impact on Super-Recognisers’ performance. Additionally, across both experiments, our implicit indices of identity processing correlated with established face recognition test scores (e.g., CFMT+). Taken together, these results suggest that exceptional face recognition abilities are characterised not only by superior face memory or matching under explicit task conditions, but also by a tendency to spontaneously prioritise identity over other face dimensions. This prioritisation of identity occurs even when identity is task-irrelevant.", "SubmissionID": 78.0}, {"Day": "Tuesday", "Time": "14:00", "Session": "Colour Vision", "Room": "Purbeck Lounge", "Title": "Heterochromatic brightness adapts to display channel balance", "Speaker": "Jing Chen", "CoAuthors": "Yuan Zhang, Shuchen Guan, Karl Gegenfurtner", "Abstract": "Electronic displays are ubiquitous, yet consumer monitors differ substantially in the relative gains of their red, green, and blue primaries. It remains unclear whether heterochromatic brightness simply reflects these device differences, or whether the visual system adapts to the prevailing channel balance. We tested this question in three experiments using a brightness-ranking task. In Experiment 1 (N=12), observers viewed stimuli on a calibrated monitor while the green channel was scaled relative to red and blue at three levels. In Experiment 2 (N=122), we repeated the same manipulation online across observers’ own displays. In both experiments, brightness judgments shifted systematically with the imposed imbalance. As green gain increased, observers behaved as if green contributed less to brightness, in the direction opposing the physical manipulation, consistent with compensatory adjustment. Time-course analysis showed that this effect was absent initially but built up over the course of a block, suggesting adaptation over several minutes. To test whether this display-dependent effect extends across contexts, Experiment 3 measured observers’ brightness judgments in the laboratory on a common monitor and independently characterized their own displays. Observers using displays with relatively stronger red primaries later assigned lower relative brightness to red on the common monitor, whereas no corresponding effect was observed for green or blue. Together, these findings show that heterochromatic brightness is not a fixed readout of stimulus specification, but adjusts to display channel balance.", "SubmissionID": 107.0}, {"Day": "Tuesday", "Time": "14:00", "Session": "Symposium: Vision on the Move: From Eye Movements to Visual Encoding (and back)", "Room": "Bayview Suite", "Title": "Oculomotor contribution to synchronization of cortical activity", "Speaker": "Alessandro Benedetto", "CoAuthors": "Michele A. Cox, Jonathan D. Victor, Michele Rucci", "Abstract": "Humans actively shape their visual input through incessant eye movements. While rapid (micro-)saccades redirect the fovea toward objects of interest, slower fixational drifts continuously displace the retinal image even during attempted fixation. Traditionally considered disruptive, these oculomotor-induced luminance modulations are increasingly recognized as functional, contributing to the spatiotemporal reformatting of visual input and potentially enhancing visual encoding by helping form spatial representations. \n\nRecent work has shown that saccades redistribute the spectral content of natural scenes, “whitening” spatial frequencies below a velocity-dependent cutoff and reducing input redundancy. Notably, the bandwidth of this whitening effect decreases with increasing saccade amplitude. To investigate the cortical correlates of this reformatting, we combined EEG and eye tracking while participants executed saccades of varying amplitudes across narrow-band noise fields at different spatial frequencies. The EEG fixation-related potential (lambda-wave) over occipital sites followed the predictions of the whitening hypothesis: its amplitude varied with stimulus spatial frequency for small saccades, but became invariant for larger ones, consistent with amplitude-dependent spectral equalization. Beyond this retinal effect, we observed that the lambda-wave amplitude was modulated by a signal proportional to saccade size, indicating an interaction between sensory reformatting and a motor-related component.\n\nIn a second experiment, we further examined the role of fixational drifts by combining EEG, eye tracking, and gaze-contingent retinal stabilization. Participants fixated a grating flickering over time, either under natural viewing or retinal stabilization that eliminated drift-induced retinal motion. Although stabilization concentrated stimulus temporal power at the modulation frequency, it reduced the amplitude of the evoked steady-state visual potential, compared to natural viewing.\n\nTogether, these findings show that self-generated retinal transients are a fundamental feature of vision, shaping early visual processing and likely serving as signals that the visual system actively exploits to optimize visual encoding.", "SubmissionID": ""}, {"Day": "Tuesday", "Time": "14:15", "Session": "Face Perception and Recognition", "Room": "Tregonwell Hall", "Title": "Human face categorization is radially-biased: Fast periodic visual stimulation evidence.", "Speaker": "Marius Grandjean", "CoAuthors": "Hélène Dumont, Bruno Rossion, Valérie Goffaux", "Abstract": "At the fovea, face identity recognition preferentially relies on horizontally-oriented face information. Since radially oriented input is privileged in the periphery, along the horizontal meridian (HM) the engagement of face-selective mechanisms is enhanced. We previously showed that subject-level radial bias predicts the speed of saccadic eye movements toward faces. Here, we investigated whether this functional link is due to basic-level face categorization in the periphery being shaped by the radial bias. \n\nThirty-two participants were tested using Fast Periodic Visual Stimulation (FPVS) combined with EEG. Face images were periodically embedded at 1.2 Hz within rapid streams of non-face objects presented at 6 Hz. This frequency-tagging approach allows face categorization responses to be objectively isolated at predefined frequencies with high signal-to-noise ratio. It enables dissociating high-level categorization responses to faces (1.2 Hz, i.e. face oddball frequency) from general visual responses to stimulus sequences (6 Hz, i.e. base frequency). Stimuli were presented at four peripheral locations (left, right, up, down).\n\nNeural response to face oddball frequency  was localized on occipitotemporal electrodes with a significant right lateralization. This neural marker of face categorization was strongest along the horizontal meridian. It was also stronger in the upper than in the lower visual field in line with past evidence. In contrast, the general visual response at 6 Hz was maximal in the lower visual field, consistent with known low-level visual anisotropies.\n\nTogether, these results indicate a clear distinction in visual field anisotropy between high-level face categorization responses and low-level visual reponses. Basic-level face categorization in the periphery is most robust along the horizontal meridian, likely reflecting enhanced access to diagnostic horizontal information. These findings indicate that radial bias selectively modulates horizontal–vertical meridian anisotropies at high-level, category-selective stages of visual processing, following a pattern that is qualitatively distinct from low-level visual responses.", "SubmissionID": 124.0}, {"Day": "Tuesday", "Time": "14:15", "Session": "Colour Vision", "Room": "Purbeck Lounge", "Title": "Timing is key: N1 latency variation as a neural marker of chromatic sensitivity", "Speaker": "Ilgin Cebioglu", "CoAuthors": ", Jasna Martinovic, Laura Young, Gabriele Jordan, Quoc Vuong, Anya Hurlbert", "Abstract": "While individual differences in chromatic sensitivity are robustly captured by psychophysical measures, their relationship to individual differences in neural measures is less well understood. Such relationships are important for investigating possible compensatory mechanisms in colour vision deficiency (CVD). The N1 is a well-established VEP component associated with chromatic processing, but it remains unclear whether its shape and temporal characteristics reflect interindividual variability in chromatic sensitivity. Here we examine the relationship between psychophysical chromatic sensitivity thresholds and N1 amplitude and latency in a large sample of normal trichromats (NT) and individuals with CVD.\n\n39 participants (20 NT, 19 CVD) completed various colour vision assessments, including the Colour Assessment and Diagnosis (CAD), to measure sensitivity thresholds for L-M and S-(L+M) axes. In a separate electroencephalography (EEG) task, participants viewed Gabor patches at four contrast levels in each direction of these chromatic axes. Each condition comprised 65 stimulus presentations (300 ms stimulus duration, 1000–1200 ms interstimulus interval), during which participants responded to rare vertical Gabors as an attentional control. VEPs were derived by averaging EEG responses to horizontal Gabors at occipital electrodes (Oz, O1, O2). Linear regression functions were fitted to the four amplitude and latency values for each chromatic direction for each participant.\n\nThe slope of N1 latency, but not amplitude, as a function of contrast differed significantly between NT and CVD. Furthermore, latency slopes, but not amplitude slopes were positively correlated with CAD thresholds along the L–M axis across all participants. Individual N1 amplitude slopes exhibited correlations between chromatic directions, suggesting that interindividual variability in amplitude is probably driven by individual EEG acquisition factors, e.g. scalp impedance. These findings highlight the need for caution when interpreting interindividual variability in N1 amplitude, while supporti
