rviews highlighted that spatial mismatches (e.g., direction, dimensions, orientation) between the operator’s movements and the visual feedback of the robot’s movements contributed to difficulties in teleoperation. For example, the operator might move leftward, but the visual feedback shows the robot arm moving rightward and movement dimensions can be mismatched across the different screens due to the different viewpoints of the camera feeds being relayed. In quantitative work, we subsequently investigated whether certain dimensionality mismatches were easier to deal with than others in a lab-based task. Participants used a stylus to control a cursor to collect targets in six different visuomotor mappings, each introducing a different dimensionality mismatch. Participants were significantly worse at controlling the cursor when there was a mismatch between the active dimensions in the stylus’ workspace and the remote workspace (e.g., when movements in the z-dimension in the stylus’ workspace controlled movements in the y-dimension on the screen). Collectively, this work has implications for optimising visualisation of the remote workspace to support teleoperation performance.", "SubmissionID": ""}, {"Day": "Thursday", "Time": "15:00", "Session": "Perception and Action", "Room": "Tregonwell Hall", "Title": "Pushing the envelope: Active viewing drives boundary extension", "Speaker": "Hong B Nguyen", "CoAuthors": "Benjamin van Buren", "Abstract": "When we actively move to view a scene, planning those movements requires predicting what we will see next.  Sensorimotor predictions lie at the core of the “active learning” advantage, wherein observers better remember information if they can control what they see, and when they see it.  Compared to passive viewing, active viewing may increase memory precision because it better aligns incoming visual input with the observer’s current preparatory and attentional state.  Here, we asked whether visual predictions generated during active viewing not only enhance memory for what was seen, but also bias memory toward details which were never visible.  In Experiment 1, observers viewed scene images by either using their mouse to actively move a small viewing aperture, or passively watching a replay of another participant’s viewing trajectory.  After a 3-s exploration period, they completed a recognition memory test in which they discriminated the final view visible through the aperture from a decoy view which was slightly zoomed-in or zoomed-out.  Active viewers showed robust boundary extension, more frequently selecting zoomed-out decoys than zoomed-in decoys; passive viewers showed the opposite pattern, consistent with boundary contraction.  If active viewing drives greater boundary extension due to motor predictions, active viewers should specifically misremember having seen information in the direction their viewing trajectory was headed.  In Experiment 2, we displaced the decoy view forward or backward relative to the participant’s last heading direction.  Active viewers’ memory was biased toward unseen information in front of their viewing trajectory, and this bias was stronger than for passive viewers.  Thus active exploration drives memory toward predicted future views — not just any unseen content.  Together, these experiments demonstrate that sensorimotor predictions cause us to actively fill in what lies beyond a visible boundary.  We conclude that active viewing constructs richer, yet more inferential, memory representations than passive viewing.", "SubmissionID": 547.0}, {"Day": "Thursday", "Time": "15:00", "Session": "Spatial Vision", "Room": "Purbeck Lounge", "Title": "Anisotropy of small-number enumeration in peripheral vision", "Speaker": "Bilge Sayim", "CoAuthors": "Bert Reynvoet, Li L-Miao", "Abstract": "Humans can rapidly and accurately enumerate small numbers of items (typically up to four) without counting, a phenomenon known as subitizing. Small-number enumeration has been studied extensively, with most studies using centrally presented displays and/or free viewing. How small numerosities are enumerated in peripheral vision has rarely been systematically examined. However, peripheral vision is characterized by specific contextual interactions among neighboring items, which may modulate enumeration performance. A prominent property of peripheral processing is its radial-tangential anisotropy: interference among items is stronger along the radial than the tangential direction. This anisotropy has been shown for large-number numerosity perception; however, whether it also modulates small-number enumeration, which depends on distinct processes, remains unclear.\nWe presented displays of 3 to 6 discs. On each trial, all discs were presented within a single peripheral sector. Discs were arranged either radially or tangentially. Enumeration performance was measured using bias, defined as the signed deviation between reported and presented numerosity, and precision, indexed by the coefficient of variation (CV). Radial arrangements were reported as less numerous than tangential arrangements across all numerosities; however, they were also less precise, yielding higher CVs than tangential arrangements. A Bayesian observer model reproduced the dissociation between bias and precision, suggesting that radial arrangements were associated with greater internal noise than tangential arrangements, with noise increasing further with both numerosity and eccentricity. These findings indicate that small-number enumeration in peripheral vision is strongly shaped by radial-tangential anisotropy and highlight the importance of spatial interactions in determining enumeration performance.", "SubmissionID": 503.0}, {"Day": "Thursday", "Time": "15:00", "Session": "Symposium: Perception as Inference Across Scales — from natural scene statistics to neural computation and clinical translation", "Room": "Bayview Suite", "Title": "Sensorimotor transforms and teleoperation in the nuclear industry", "Speaker": "Peter Scarfe", "CoAuthors": "Rea Gill, Chloe Irwin", "Abstract": "There are numerous instances where humans need to work in remote, inaccessible and/or hazardous locations. Examples include robot assisted surgery, space exploration, and nuclear maintenance and decommissioning. To work in these locations “human in the loop” remote telerobotic systems are used. The ideal telerobotic system should be “transparent” to the user, the system should be as effortless to use as real-world actions, however, these systems remain difficult, time consuming and costly to use. In this talk I will identify the fundamental role that perceptual psychophysics can play in addressing the optimisation of such systems. I will first identify the core issues to be solved, then draw links to how perceptual psychophysics is relevant. I will end by giving some examples my lab has been working on in collaboration with the nuclear industry. First, on the impact of (and adaptation to) sensorimotor transforms between vision and proprioception, and second, our work in building a bimanual visual-haptic virtual reality system. I will reflect upon my journey of getting into perceptual psychophysics specifically because it had no real-world application, to running a lab where virtually all of our work is applied.", "SubmissionID": ""}, {"Day": "Thursday", "Time": "15:15", "Session": "Perception and Action", "Room": "Tregonwell Hall", "Title": "Pantomimed action detection reflects intuitive knowledge about visuomotor feedback", "Speaker": "Sholei Croom", "CoAuthors": "Chaz Firestone", "Abstract": "Visually guided action arises from a complex synergy between perceptual and motor systems; when someone grabs a cup to take a drink, for example, the mechanics of their reach are updated online in response to evolving perceptual input. To what extent are ordinary observers aware of this component of others’ goal-directed behavior? Here, we explored this question through “pantomimed actions” — actions directed towards imaginary objects. We created a stimulus set of videos where agents performed both genuine object-directed actions (e.g., stepping over a box), and pantomimes of those actions (e.g., stepping over an imagined box of similar dimensions). We asked both (a) whether naive observers who watch these videos can distinguish real actions from pantomimed actions, and also (b) which kinds of information underwrite this performance. In Experiment 1, subjects watched videos of real and pantomimed actions side-by-side, with a black ‘censor bar’ covering the real (or imagined) object’s location. Under these conditions, subjects were able to distinguish the two action types at rates above chance; for example, they could tell whether someone was stepping over a real (vs merely imagined) box, and also whether someone was shuffling between two real (vs merely imagined) poles. Moreover, subjects' text descriptions of their pantomime detection strategy reflected rich inferences about which features of the movement should be diagnostic. However, in Experiment 2, subjects viewed the same actions but with body movements instead depicted by simple ‘pose skeletons’ (dots connected by lines on a black background) generated from the original videos. Under these conditions, observer performance dropped to chance, despite the kinematic information being preserved across experiments. Together, these results suggest that ordinary people can relate differences in action kinematics to differences in sensory conditions, but that this capacity must be grounded in contextual information about the actor’s relation to their environment.", "SubmissionID": 576.0}, {"Day": "Thursday", "Time": "15:15", "Session": "Spatial Vision", "Room": "Purbeck Lounge", "Title": "Temporal dynamics of feedforward and feedback processes in visual perception: data and model using the flip tilt illusion", "Speaker": "Li Zhaoping", "CoAuthors": "", "Abstract": "Visual perception relies on both fast feedforward sensory signals and slower feedback processes involved in perceptual hypothesis testing. This study investigates their temporal dynamics through visual psychophysical experiments and computational modeling. Feedback processes are stronger in the central visual field, according to the Central-Peripheral Dichotomy theory (Zhaoping, 2019) and recent anatomical evidence (Majka et al., 2026). Accordingly, we examine perception in the central visual field using stimuli that normally evoke the flip tilt illusion only in the peripheral visual field. This illusion concerns the perceived orientation (tilt) of a pair of dots, defined by the alignment between the two dots. When the pair is heterogenous (i.e., one black dot and one white dot on a gray background) rather than homogeneous (two black or two white dots), the perceived tilt is orthogonal to the actual tilt, this is the flip-tilt illusion, which is typically absent in the central visual field because feedback processes veto misleading feedforward signals arising from V1 responses to the dot pairs (Zhaoping, 2020). We used four types of stimuli: uniformly oriented hetero-pairs (uniform-hetero), uniformly oriented homo-pairs (uniform-homo), and equal mixtures of the uniform-hetero and uniform-homo stimuli whose orientations were either parallel (parallel-mixed) or orthogonal (orthogonal-mixed) to each other. Each stimulus was presented in the central visual field for a brief duration t before being masked, the feedback process should be interrupted when t was sufficiently short.  Observers reported whether the perceived orientation was tilted clockwise or counterclockwise relative to vertical.  For uniform-homo stimuli, performance was worse at shorter t, but perception remained veridical. In contrast, uniform-hetero stimuli yielded veridical perception at long t but induced the flip tilt illusion at short t. Performance for parallel-mixed and orthogonal-mixed stimuli across t reflects interactions between feedforward and feedback processes. A model of the two processes accounts for the data.", "SubmissionID": 590.0}, {"Day": "Thursday", "Time": "17:00", "Session": "Perceptual Organisation", "Room": "Tregonwell Hall", "Title": "Revisiting Attneave’s Cat once more: An early recognition advantage for surprisal points over convexities and concavities.", "Speaker": "Gunnar Schmidtmann", "CoAuthors": "Nicholas Baker, Kevin Lande, Filipp Schmidt", "Abstract": "An object’s shape is a critical cue to its identity and function. How does the visual system encode shape? A long history of theoretical and experimental research suggests that at early stages, shape is encoded in terms of curvature. Psychophysical studies suggest the importance of local curvature maxima (convexities) or minima (concavities), and physiological studies have found V4 neurons tuned to such features. Information-theoretic analyses show that high-curvature regions are informative and that, for closed contours, concave regions carry more information than convex regions with equal curvature. Nevertheless, informativeness (surprisal) is only approximately correlated with degree of curvature. Here, we explored whether the visual system prioritizes curvature extrema per se, or whether it instead prioritizes the most informative contour locations. In a match-to-sample experiment, five observers matched a smooth reference animal contour to one of two subsequently presented rescaled shapes (target and distractor), where (1) the points of maximum and minimum curvature, or (2) maximum information (surprisal) were extracted and connected with straight lines. We restricted the number of sampled points in the target and distractor, ranging from 4 to 32 points (ranked by magnitude). Performance increased with increasing number of points in both conditions, approaching ~90%. However, under very strong simplification (4 and 6 points), performance was significantly better for points sampled at locations of maximal surprisal (62%, 71%) compared to points sampled at locations of maximum curvature (51%, 62%), indicating an advantage for shapes based on highly informative points. Performance for the maximal surprisal condition was already above chance at the lowest level, contrary to the maximum curvature condition. These results suggest that shape representation might rely on features with high informational content rather than curvature extrema per se.", "SubmissionID": 314.0}, {"Day": "Thursday", "Time": "17:00", "Session": "Symposium: Visuomotor transforms in prostheses, virtual reality, and teleoperation", "Room": "Purbeck Lounge", "Title": "SYNS: A Decade of Natural Scenes for Perception Science", "Speaker": "Erich Graf", "CoAuthors": "Wendy Adams, James Elder", "Abstract": "This year marks the 10th anniversary of the Southampton–York Natural Scenes (SYNS) dataset, a multimodal resource developed to characterise the statistical structure of natural environments and to support normative and computational accounts of visual perception. SYNS provides densely sampled, spatially co-registered measurements of indoor and outdoor scenes, combining LiDAR-derived range data, calibrated stereo image pairs, and high dynamic range (HDR) images. This integration of geometric and photometric information enables direct quantification of the relationship between image structure and 3D scene layout under ecologically valid conditions.\n\nOver the past decade, SYNS has supported a programme of work examining how natural scene statistics constrain perceptual encoding and inference. This work has revealed regularities in depth distributions, surface orientation, and luminance and colour statistics that are consistent with efficient coding principles and Bayesian models of perception. The availability of ground-truth geometry alongside rich image measurements has enabled systematic evaluation of the cues supporting depth perception and figure–ground organisation and has provided a common benchmark for comparing human and computational models of vision. \n\nWe will review these contributions and highlight recent unpublished work that builds on this foundation. This includes analyses of how local image structure relates to scene geometry at object boundaries, and psychophysical investigations of how observers integrate multiple cues (e.g. contrast, orientation, disparity, and colour) when making depth judgements in natural scenes. Across these lines of work, a consistent theme is that relatively simple image statistics carry substantial information about 3D structure, and that human observers are sensitive to and exploit these regularities in a manner shaped by spatial scale and perceptual priors. Together, these findings place further constraints on models of depth estimation and contour processing and demonstrate how multimodal natural scene statistics can inform theories of visual inference.", "SubmissionID": ""}, {"Day": "Thursday", "Time": "17:00", "Session": "Clinical Vision and Neuropsychology", "Room": "Bayview Suite", "Title": "Eye movements whilst watching TV could diagnose dementia", "Speaker": "Thomas Wilcockson", "CoAuthors": "", "Abstract": "Alzheimer’s disease (AD) is characterised by progressive cognitive decline that impacts ocular motor control. Our previous research has shown that eye movement tasks can be used to predict AD in preclinical dementia (Wilcockson, et al., 2019) even as early as 12-years in advance (Begde, et al., 2024), or whilst in the prodromal subjective cognitive decline stage (Wilcockson, et al., 2025). However, the traditional \"gold standard\" antisaccade task is susceptible to confounding individual differences, including working memory capacity, inhibitory control, and visual imagery (e.g., aphantasia; Wilcockson et al., in prep). These variables may compromise the reliability of the antisaccade task as a pure measure of neurodegeneration.\n\nTo address these limitations, we developed an ecologically valid, naturalistic task that measures the dissociation between top-down and bottom-up inhibitory control. Rather than viewing abstract stimuli, participants viewed video sequences while their eye movements were recorded. Participants were tasked with answering specific questions that required them to fixate on task-relevant stimuli rather than the most visually salient features of the scene. This design mirrors the inhibitory demands of an antisaccade task but within a familiar context. Four groups were recruited: AD, Mild Cognitive Impairment (MCI), older controls, and young controls.\n\nAnalysis revealed significant differences in gaze patterns between clinical groups and healthy controls. Both AD and MCI patients exhibited impaired top-down executive control, frequently failing to inhibit gaze toward salient but task-irrelevant stimuli. Furthermore, performance on this video task was significantly correlated with standardised memory scores, suggesting a robust link between ocular motor behaviour and general cognitive function.\n\nThese results indicate that eye movement measurement during naturalistic video viewing could serve as a non-invasive, accessible screening tool for cognitive decline. This approach may offer a more reliable and patient-friendly alternative to traditional diagnostic assessments, potentially facilitating earlier intervention and more accurate monitoring of disease progression.", "SubmissionID": 246.0}, {"Day": "Thursday", "Time": "17:15", "Session": "Perceptual Organisation", "Room": "Tregonwell Hall", "Title": "Arousal Modulates Performance but Not Decodable Visual Representations", "Speaker": "Margot Steijger", "CoAuthors": "Sean van Mil, Samuel Noorman, Lola Beerendonk, Timo Stein, Johannes Fahrenfort, Simon van Gaal", "Abstract": "Arousal modulates behavioral performance, often following an inverted U-shaped pattern in which performance is best at intermediate arousal levels. It remains unclear whether such effects reflect changes in sensory and perceptual representations, or later decision-related stages. Here, we tested whether arousal influences early visual encoding or later perceptual integration. \n\nParticipants performed a perceptual task in which they detected Kanizsa illusory figures and discriminated local contrast in masked stimuli while EEG and pupillometry were recorded. We used multivariate pattern analysis (MVPA) to decode stimulus contrast as an index of early visual encoding and illusory shape perception as an index of perceptual integration, and related decoding performance to trial-by-trial fluctuations in pupil-linked arousal. To assess more sustained arousal changes, we additionally analyzed an independent dataset using sleep deprivation.\n\nBehaviorally, performance was optimal at intermediate arousal levels for both accuracy and reaction time. In contrast, EEG decoding of stimulus contrast and illusory percepts remained stable across trial-by-trial fluctuations in pupil-linked arousal, indicating that neither early sensory encoding nor later perceptual integration was systematically affected. Likewise, reduced arousal following sleep deprivation did not reliably alter perceptual representations.\n\nTogether, these findings suggest that arousal-related changes in performance are unlikely to reflect modulation of visual representations. Instead, arousal may primarily influence post-perceptual processes, such as the transformation of perceptual evidence into decisions or responses. Ongoing analyses are testing this decision-stage account directly.", "SubmissionID": 483.0}, {"Day": "Thursday", "Time": "17:15", "Session": "Symposium: Visuomotor transforms in prostheses, virtual reality, and teleoperation", "Room": "Purbeck Lounge", "Title": "The Integration of Shape Information Across Spatial Scales during the Visual Perception of 3D Object Geometry: Evidence from Deep Neural Networks, ERPs and Eye Tracking", "Speaker": "Charles Leek", "CoAuthors": "Filipe Cristino, Dietmar Heinke", "Abstract": "The visual perception of 3D object geometry requires the computation of image shape features across different spatial scales from local edges to complex parts, the derivation of 3D spatial configuration, and the integration of these features into structured representations of 3D object geometry. In this talk we outline a series of studies that aim to elucidate the underlying computational processes that support 3D object recognitiion. Using converging evidence from behavioural studies, event-related potentials (ERPs), eye tracking and computational modelling, we show that 3D object recognition occurs in parallel across multiple spatial scales of image features and configural properties. Some limitations of deep convolutional neural networks as models of 3D object recognition are also discussed. We outline a novel multi-pathway parallel architecture for 3D object recognition that combines both compositional (parts-based) and image-based computational pathways.", "SubmissionID": ""}, {"Day": "Thursday", "Time": "17:15", "Session": "Clinical Vision and Neuropsychology", "Room": "Bayview Suite", "Title": "Apraxia Disrupts the Spatiotemporal Structure of Grasping, Despite Preserved Aperture Scaling", "Speaker": "Felicia Tassone", "CoAuthors": "Elisabeth Rounis, Fatemeh Geranmayeh, Matthew Banger, Alison McGregor, Erez Freud", "Abstract": "Limb apraxia is a neurobehavioural consequence of stroke, characterized by impaired skilled action that cannot be attributed to basic motor impairments. It has traditionally been thought to selectively disrupt higher-level action representations while preserving basic visuomotor control. However, this view is supported largely by peak-derived metrics, such as maximum grip aperture (MGA), which may overlook potential deficits in the fine-grained spatiotemporal structure of movements. To address this gap, we assessed 25 patients with clinically-confirmed apraxia and 25 age-matched controls on an Efron-block width-scaling task (four objects, 5mm increments) involving reach-to-grasp movements (Experiment 1). We also examined 25 younger and 25 older healthy adults to determine whether any observed deficits were stroke-specific rather than age-related (Experiment 2).\n\nConsistent with previous findings, apraxic patients successfully scaled their MGA with object size, similar to controls. However, patients exhibited significantly slower movements and prolonged time to MGA. To assess the spatiotemporal structure of the movements, Dynamic Time Warping (DTW) was used to measure the similarity between trajectory pairs across object sizes. The observed similarity matrix was then correlated with an ideal object size–based model. Although both patients and controls exhibited strong correspondence with the size model, apraxic patients showed significantly weaker correspondence compared to controls, even when using their ipsilesional hands. Bayesian analysis of Experiment 2 supported the null hypothesis, revealing that young and older adults showed equivalent object size–based trajectory organization patterns. Furthermore, both healthy age groups demonstrated stronger correspondence with the size model than apraxic patients’ ipsilesional hands.\n\nThese findings uncover novel deficits in apraxic reach-to-grasp behaviour. While object-related aperture scaling remains intact, the spatiotemporal organization of trajectories is disrupted: a deficit that is distinct from healthy aging, and an impairment previously under-characterized in apraxia.", "SubmissionID": 365.0}, {"Day": "Thursday", "Time": "17:30", "Session": "Perceptual Organisation", "Room": "Tregonwell Hall", "Title": "Occlusions Visual perception Color assimilation Motion extrapolation Object continuity", "Speaker": "Hazal Sertakan", "CoAuthors": ", Guido Marco Cicchini, David Charles Burr", "Abstract": "Visual input that reaches our retina is often interrupted by occlusions, yet perception remains stable and continuous. Previous research showed that object persistence and motion extrapolation contribute to perceptual stability, however, whether feature information is preserved during occlusion and at what level of processing remains unclear.\n\nWe investigated this using a dynamic color assimilation paradigm, in which a target's perceived color shifts toward nearby inducing stimuli. In our experiments, two colored disks moved along trajectories passing behind occluders for approximately two seconds. One second into occlusion, a brief color probe appeared between the occluders, and participants judged its hue relative to a remembered standard. The perceived color of the probe was systematically biased toward the colors of the hidden inducers, demonstrating color assimilation from occluded objects (Sertakan et al., Current Biology, 2026).\n\nCritically, the bias was strongest when the probe appeared along the predicted trajectories of the moving objects, and disappeared when inducers halted before the occluders or when the probe appeared off-trajectory. This rules out generalized contextual spreading or response bias, implicating an active spatio-temporal representation of occluded motion.\n\nTo examine whether this representation requires top-down attentional resources, in a second experiment we introduced a demanding task at fixation while the color judgment remained secondary. Strikingly, the magnitude of color assimilation was fully preserved under attentional load. This dissociation between dual-task performance and assimilation strength provides strong evidence that the spatio-temporal representation of occluded objects operates automatically, without top-down attentional allocation. The effect therefore cannot be attributed to focused attention on the moving objects, but reflects a genuinely automatic mechanism.\n\nTogether, these results suggest that the visual system maintains precise, feature-rich representations of occluded moving objects through low-level, automatic processes — extrapolating motion and preserving feature content to support stable, coherent perception even when objects are temporarily hidden from view.", "SubmissionID": 96.0}, {"Day": "Thursday", "Time": "17:30", "Session": "Symposium: Visuomotor transforms in prostheses, virtual reality, and teleoperation", "Room": "Purbeck Lounge", "Title": "Reward Learning Reshapes Neural Representations of Visual Perception and Imagery", "Speaker": "Arezoo Pooresmaeili", "CoAuthors": "Nathan Huneke, Guido Maiello", "Abstract": "To interact effectively with our environment, we must distinguish objects not only based on their perceptual features (e.g., whether a stimulus is a face) but also on their learned significance (e.g., whether a face is familiar or important). These functions are supported by regions along the ventral stream of visual processing. In particular, visual categorisation is supported by category-selective regions along the occipitotemporal ventral stream, such as the fusiform face area (FFA) and parahippocampal place area (PPA), during both perception and imagery. More anterior regions of the temporal cortex support the representation of higher-level information such as familiarity, meaning, and behavioural relevance.\n\nHowever, it remains unclear how learning, particularly reward and punishment, shapes these category representations over time and across tasks. To address this, we used functional magnetic resonance imaging (fMRI) to measure brain activity across two sessions in which participants viewed or imagined faces and houses. Between sessions, they learned that one category was associated with reward and the other with punishment.\n\nAs expected, occipitotemporal category-selective regions showed reliable responses to faces and houses in both tasks. After learning, brain responses increasingly reflected the motivational value of the categories: multivariate activity patterns across a distributed network more strongly distinguished rewarded from punished stimuli. Crucially, the strongest effects emerged in anterior temporal regions, which are downstream of occipitotemporal category-selective regions. Importantly, these value-related effects did not differ significantly between perception and imagery.\n\nThese findings show that learning about reward and punishment systematically alters how visual categories are represented at higher levels of the ventral stream. In particular, the anterior temporal cortex appears to integrate learned value into category representations, linking perceptual inputs to their acquired meaning and behavioural relevance. The generalization of these effects across perception and imagery suggests that learned value is embedded in abstract, task-independent representations.", "SubmissionID": ""}, {"Day": "Thursday", "Time": "17:30", "Session": "Clinical Vision and Neuropsychology", "Room": "Bayview Suite", "Title": "Bistable Perception as a Window into Non-Spatial Deficits in Spatial Neglect", "Speaker": "Karin Ludwig", "CoAuthors": "Lisa Beckmann, Theresa Halder, Felicitas Scheulen, Thomas Schenk", "Abstract": "Patients with spatial neglect show not only spatial deficits but also non-spatial impairments in visual perception and attention. One prominent non-spatial feature is a marked slowing of perceptual alternations during binocular rivalry (BR), which has been hypothesized to result from reduced habituation to the currently dominant stimulus – analogous to difficulties disengaging from attended spatial locations. In this study, we specifically tested this hypothesis in a group of patients with right-hemisphere lesions (N=31), spanning a range of neglect severity from none to severe, and an age-matched healthy control group. After viewing an unambiguous stimulus, participants were presented with an ambiguous BR display, composed of the previously seen stimulus (e.g., a house) and a new, previously unseen stimulus (e.g., a face). Compared to patients without neglect and healthy controls, neglect patients showed reduced switching to the previously unseen stimulus, consistent with diminished habituation. As a consequence of reduced habituation, neglect patients should show an increased sensitivity to saliency differences in the BR stimuli. We examined this in further experiments, replicating the result with contrast-modulated stimuli (high- and low-contrast gratings) and partially extending it to emotion-modulated stimuli (fearful, happy, and neutral faces vs. houses). We also tested whether the BR alternation rate findings generalized to another form of bistability, namely a structure-from-motion (SfM) sphere with an ambiguous rotation direction. The alternation rate of the SfM sphere also correlated with neglect severity, ruling out purely eye-based explanations that would account for only the BR results. Overall, our results are in line with the “reduced-habituation” hypothesis that might link spatial and non-spatial deficits in spatial neglect.", "SubmissionID": 86.0}, {"Day": "Thursday", "Time": "17:45", "Session": "Perceptual Organisation", "Room": "Tregonwell Hall", "Title": "Differential depth and motion compression along the line of sight", "Speaker": "Laurence Harris", "CoAuthors": "Ahmed Nadeem, Patrick Cavanagh", "Abstract": "Lengths seen along the line of sight at a distance appear compressed compared to widths and heights which are judged fairly accurately. How does this vary with eye height, and can we predict motion perception from length compression? We projected a display onto the floor at the end of a corridor and participants viewed it from 6, 12 or 18 meters while sitting on the floor, on a chair, or standing. For length judgments, three dots were projected that made an L shape with the two further away base dots at the same distance from the observer. The third dot was aligned with the rightmost of the first two and was closer to the observer. Observers adjusted the left-right separation of the two base dots to match the front-back separation of the right-hand pair of dots. The results showed a compression of perceived length of up to 400%. For motion judgments, the display was divided into two with a random dot pattern drifting left and right in the near half but toward and away from the observer in the farther half (and vice versa on half the trials). Observers adjusted the relative speeds of the two dot fields until they appeared to match. Motion toward and away from the observer was significantly slowed, by as much as 600% relative to left-right motion. For both length and motion settings, the effects of distance and eye height combined into one function governed by the viewing angle between the observer’s eye and the motion patterns but showing a larger effect for the motion judgements. The different perceptual outcomes for motion and distance judgements may arise from the local nature of the motion responses compared to the more global analysis needed for distance perception.", "SubmissionID": 207.0}, {"Day": "Thursday", "Time": "17:45", "Session": "Symposium: Visuomotor transforms in prostheses, virtual reality, and teleoperation", "Room": "Purbeck Lounge", "Title": "Colour Inference in the Wild: #theDress Ten Years On", "Speaker": "Christoph Witzel", "CoAuthors": "", "Abstract": "#TheDress was born in the world-wide web more than 10 years ago, when the ambiguous photo of a dress revealed striking individual differences in colour perception – many see it white and gold, many others blue and black. Subsequently, research has established that these are not merely differences in colour naming, but a continuous variation of perception. This variation is related to unconscious inferences about the lighting conditions in the photo and to a person’s sleep-wake cycle assumed to mediate inferred lighting conditions. Many candidate optical and physiological causes of the individual differences have been excluded. The perception of #TheDress can be primed by visual stimuli that manipulate the surround of the dress. New images that cause similar individual differences as #TheDress have been found and may be generated through a simple algorithm. However, the known determinants of #TheDress explain only a small amount of individual variation, implying that they only predict individual differences statistically across a large sample of participants. New results show that neither visual nor verbal primes of lighting assumptions affect #TheDress when they do not contain the dress itself. The original assumption that daylight variation is essential to the individual differences has been moderated. Rotating the hue of #TheDress gradually decreases the magnitude of individual variation, implying that individual differences might be stronger along the daylight locus, but not exclusive to it. The colours of #TheShoe, a picture of a shoe that many see turquoise and grey and others pink and white, vary in a direction almost perpendicular to the daylight locus. #TheShoe works by a similar principle as #TheDress: The perception of #TheShoe is correlated with #TheDress, and we can create new images with #TheShoe properties using the #TheDress algorithm. A more detailed understanding is necessary to provide reliable predictions of the striking individual differences.", "SubmissionID": ""}, {"Day": "Thursday", "Time": "17:45", "Session": "Clinical Vision and Neuropsychology", "Room": "Bayview Suite", "Title": "Connective Field Modeling Reveals Experience-Dependent Eccentricity Biases in Category-Selective Visual Cortex", "Speaker": "Tiago Mesquita", "CoAuthors": "Gargi Majumdar, Sunitha Lingareddy, Ramesh Kekunnaya, Brigitte Röder", "Abstract": "Category-selective regions in the ventral occipito-temporal cortex (VOTC) have been shown to exhibit systematic eccentricity biases: Face-selective areas seem to be preferentially linked to fovea, while place-selective areas have been found to feature a peripheral visual field preference. The present study tested whether these eccentricity biases emerge through early visual experience.\n\nWe applied Connective-field (CF) modeling to resting-state fMRI data of normally sighted controls (n = 25), permanently congenitally blind individuals (n = 9), and individuals with reversed dense bilateral congenital cataracts (n = 20). CF-modeling allows us to estimate how downstream visual areas sample from retinotopically organized V1. \n\nIn normally sighted individuals, CF-modeling demonstrated eccentricity biases previously shown with task-based fMRI: We found more peripheral CF eccentricities for the place-selective collateral sulcus (CoS) than for the face-selective median fusiform-gyrus (mFus). Thus, we were able to extend CF-modeling to visual areas beyond early visual cortex and provided evidence that CF-modeling can quantify eccentricity-biased connectivity in higher-order visual cortex. \n\nCompared to normally sighted controls, permanently congenitally blind humans’ CoS and mFus showed significantly higher eccentricities. \n\nCongenital cataract-reversal individuals exhibited CF eccentricities that were significantly less peripheral than in permanently congenitally blind individuals in the mFus. \n\nTogether, these findings demonstrate that eccentricity-biased V1-to-VOTC connectivity can be recovered from resting-state data using CF-modeling and thus represents an appropriate approach to study experience-dependent development of retinotopic biases in the visual processing hierarchy. The altered sampling of higher order visual areas from V1 in individuals with congenital blindness provides evidence for an experience-dependent development of foveal and parafoveal representations in VOTC. The partial but not full recovery of typical eccentricity biases in VOTC in individuals who have suffered from a transient phase of congenital blindness suggests a sensitive (rather than a critical) period for the experience-dependent shaping of retinotopic representations in higher order visual cortex.", "SubmissionID": 161.0}, {"Day": "Thursday", "Time": "18:00", "Session": "Perceptual Organisation", "Room": "Tregonwell Hall", "Title": "Cue-specialization in 3D cue integration", "Speaker": "Celine Aubuchon", "CoAuthors": ", Roland Fleming", "Abstract": "While image patterns that elicit 3D percepts (e.g., shading, texture) are typically described as “depth cues”, they often do not actually specify depths. Instead, different cues are systematically related to specific 3D properties. For example, shading is related primarily to an object’s second-order curvatures, but does not capture how stretched or sheared it is (first-order). Instead, texture varies directly with first-order structure, but is broadly unaffected by subtle surface curvatures. This means that under typical conditions, when both cues are present, they actually provide complementary information about different shape properties. Is each cue’s “specialization” leveraged when these signals are integrated? Put another way, are they each treated as redundant depth cues or instead as complementary signals? To investigate this, we developed a class of 3D surfaces that maximized perceptual differences between shading and texture. Smooth, thin blobs were first strongly sheared in depth, and then perturbed with random patterns of shallow curvature. The resulting shapes look quite different depending on whether they are shaded or textured: shaded versions appeared fronto-parallel and bumpy, while textured versions appeared slanted and smooth. Participants adjusted a 3D probe to report their perceived shape for different surfaces in shading-only, texture-only, and combined-cue conditions. Interestingly, when both cues were available, observers’ perceived shapes were not a compromise between the two single-cue estimates, but rather retained the more informative aspects of both cues. Predictions from depth-based cue-integration models were both quantitatively and qualitatively off. Instead, participants’ perceived shapes were closer to predictions made by separately estimating curvature and shear from their respective “best” cues. This has important implications for cue-combination models, because it suggests that cues do not necessarily supply redundant estimates, but instead may be assigned specialized roles in estimating particular aspects of shape.", "SubmissionID": 245.0}, {"Day": "Thursday", "Time": "18:00", "Session": "Symposium: Visuomotor transforms in prostheses, virtual reality, and teleoperation", "Room": "Purbeck Lounge", "Title": "Continuous Psychophysics in the Clinic", "Speaker": "Veronica Pisu", "CoAuthors": "Aleksandrs Koselevs, Sarah Cutler, Sam Khandhadia, Isabel Escofet, Jay Self, Andrew Lotery, Guido Maiello", "Abstract": "", "SubmissionID": ""}, {"Day": "Thursday", "Time": "18:00", "Session": "Clinical Vision and Neuropsychology", "Room": "Bayview Suite", "Title": "The role of elevated crowding and impaired integration in the visual deficits of Alzheimer’s Disease", "Speaker": "Zien Huang", "CoAuthors": "Yuhan Bai, Tessa Dekker, Sebastian Crutch, Keir Yong, John Greenwood", "Abstract": "Visual deficits are common in Alzheimer’s disease (AD), particularly in the ‘visual-variant AD’ subtype Posterior Cortical Atrophy (PCA). These cortical impairments can be detected using the Graded Incomplete Letters Test (GILT), which measures thresholds for recognising letters degraded by removing pixellated sections. Although GILT thresholds are strongly elevated in PCA relative to typical AD (tAD) and healthy ageing, it is unclear whether these impairments derive from higher-level deficits in processes such as global integration (difficulty combining fragmented elements into recognisable objects) or lower-level limitations such as elevated crowding (disruptions from clutter). To test whether these deficits drive impairments in incomplete letter recognition, participants with PCA (n=20), tAD (n=20), and controls (n=20) completed modified GILT variants designed to systematically probe these mechanisms, alongside independent measures of acuity and crowding. Relative to controls, PCA participants showed substantially decreased performance across conditions, with small, non-statistically-significant decreases in tAD. To probe global integration, pixel size was varied: larger pixels that concentrate information loss and increase the need to integrate fragmented features led to the poorest performance, with the best performance for smaller pixels that distribute degradation more evenly. Critically, these effects were not driven by absolute feature size: performance did not differ when whole letter sizes were varied. Adding background noise, which increases visual clutter and challenges global integration, led to additional performance decreases in PCA relative to controls. However, although independent measurements confirmed elevated crowding in PCA, these elevations were insufficient to account for the magnitude of GILT deficits. Reducing crowding (e.g. increasing letter size) also failed to improve GILT performance. Together, these findings indicate that impaired global integration is the primary driver of incomplete letter recognition deficits in PCA, with crowding contributing to a lesser extent. Test variants that more directly target these mechanisms could improve the detection of cortical visual loss.", "SubmissionID": 183.0}, {"Day": "Thursday", "Time": "18:15", "Session": "Perceptual Organisation", "Room": "Tregonwell Hall", "Title": "Investigating the Role of Local and Global Dynamics in Cascading Percepts", "Speaker": "Daniel van der Meer", "CoAuthors": "Michael D. Nunez, Simon van Gaal, Raoul P.P.P. Grasman, Han L.J. van der Maas", "Abstract": "Perceptually ambiguous stimuli displayed simultaneously tend to align in their perceived state. As an extension of previous research on multistable perception, this phenomenon could reveal substantial insights about the mechanism of our visual system as well as conscious perception. However, whether this so-called perceptual coupling arises from local, stimulus-driven interactions or global, top-down dynamics remains unresolved. We investigated this question using displays of multiple bistable motion quartets. In a first experiment, we applied exogenous manipulations to induce perceptual reversals in peripherally displayed motion quartets and measured their effect on a central ambiguous probe. We found that exogenous drivers of reversal in the periphery had only a small effect on the probe, corroborating previous indications that coupling is weaker between ambiguous and disambiguated stimuli. Effects relied on the visual distance and number of disambiguated stimuli to the probe. In a second experiment, we compared dominance durations for single versus multiple motion quartet displays, while constraining eye-movement in half of the trials. Contrary to some previous reports, we did not find shorter dominance durations for multi-stimulus displays in general. Preliminary results indicate however that the fixation cross acts as a moderator with shorter dominance durations occurring in multifigure setups only when no fixation cross is present. We integrate these findings in a cusp catastrophe network model incorporating local attention, inter-stimulus connectivity, and top-down influences. From this model, we derive new experimental predictions focusing on the role of eye-movements and visual attention.", "SubmissionID": 306.0}, {"Day": "Thursday", "Time": "18:15", "Session": "Clinical Vision and Neuropsychology", "Room": "Bayview Suite", "Title": "Effects of lithium treatment on threshold and suprathreshold vision in individuals with bipolar disorder: interim findings from the Helios-BD study", "Speaker": "Jasna Martinovic", "CoAuthors": "Joel Martin", "Abstract": "The HELIOS-BD study is a large-scale investigation of the hypothesis that lithium treatment in bipolar disorder acts at the level of the retina to quell hypersensitivity to light. The project integrates multimodal data from individuals with bipolar disorder, euthymic at time of testing, who are treated with lithium (current n = 31) or receiving alternative pharmacotherapy (current n = 43), as well as healthy controls (current n = 49; target n = 60 per group). Here we report findings from the psychophysics arm. To assess vision at threshold, we measured chromatic thresholds and colour and luminance contrast sensitivity functions. To assess processing away from threshold, we evaluated points of subjective equality for desaturated hues (orange and turquoise) and light grey. We also evaluated perceived contrast matching, with chromatic blue-yellow Gabors and luminance contrast-defined Gabors matched to red-green Gabors at four suprathreshold contrast levels. We find differences in contrast processing in the lithium-treated group for threshold tasks, which mainly rely on output from those units most sensitive to the signal, as well as for suprathreshold tasks, which rely on output of much larger and more inter-dependent neuronal populations. At threshold, the lithium-treated group exhibits elevated chromatic thresholds and decreased contrast sensitivity at 2-6 cpd for luminance and 6 cpd (the highest spatial frequency tested) for colour mechanisms. At suprathreshold, points of subjective equality and perceived contrast averages are similar to those of controls, but we observe somewhat broader just noticeable differences for desaturated hues and somewhat noisier perceived contrast matches (i.e., elevated standard errors across trials). These changes point towards increased noise in the visual system, with multiple retinal candidate sites. Noisiness persists at suprathreshold contrast levels, but does not lead to altered appearance in our euthymic observers.", "SubmissionID": 249.0}];
const favs=new Set(JSON.parse(localStorage.getItem('ecvp2026talks')||'[]'));
let myOnly=false;

function save(){localStorage.setItem('ecvp2026talks',JSON.stringify([...favs]));}
function fav(id){if(favs.has(id))favs.delete(id);else favs.add(id);save();render();}
function abs(id){let e=document.getElementById(id);e.style.display=e.style.display==='block'?'none':'block';}
function showMy(){myOnly=!myOnly;render();}

function render(){
 let q=document.getElementById('q').value.toLowerCase();
 let rows=talks.filter(t=>!q||JSON.stringify(t).toLowerCase().includes(q));
 if(myOnly) rows=rows.filter((t,i)=>favs.has(String(t.SubmissionID||i)));
 let out='';
 ['Monday','Tuesday','Wednesday','Thursday'].forEach(day=>{
   let dayRows=rows.filter(r=>r.Day===day);
   if(!dayRows.length) return;
   out+='<div class="day">'+day+'</div>';
   let groups={};
   dayRows.forEach(r=>{let k=r.Session+'||'+r.Room; (groups[k]=groups[k]||[]).push(r);});
   Object.keys(groups).forEach((k,g)=>{
      let a=groups[k];
      let startTime = a[0].Time;
      let endTime = a[a.length - 1].Time;
      out += '<div class="session"><div class="sessionhead">' + startTime + '–' + endTime + ' ' + a[0].Session + ' <span class="room">' + a[0].Room + '</span>' + '</div>';
/*
      out+='<div class="session"><div class="sessionhead">'+a[0].Session+' <span class="room">'+a[0].Room+'</span></div>';
*/
      a.forEach((t,i)=>{
        let id=String(t.SubmissionID||k+i);

        if (String(t.Session).startsWith('Symposium')) {
        out+='<div class="talk"> </b> — '+t.Title+'<br><i>'+t.Speaker+'</i>';
          } else {
        out+='<div class="talk"><b>'+t.Time+'</b> — '+t.Title+'<br><i>'+t.Speaker+'</i>';
        }

        if(t.CoAuthors) out+='<br>'+t.CoAuthors;
        out+='<br><button onclick="abs(\'a'+id+'\')">Abstract</button> ';
        out+='<button onclick="fav(\''+id+'\')">'+(favs.has(id)?'★ Saved':'☆ Save')+'</button>';
        out+='<div class="abs" id="a'+id+'">'+(t.Abstract||'')+'</div></div>';
      });
      out+='</div>';
   });
 });
 document.getElementById('app').innerHTML=out;
}

function exportICS(){
 const dayMap={Monday:'20260824',Tuesday:'20260825',Wednesday:'20260826',Thursday:'20260827'};
 let txt='BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//ECVP2026//Talks//EN\r\n';
 console.log(' got here 0')
 talks.forEach((t,i)=>{
   let id=String(t.SubmissionID||i);
   /* console.log(i) */
   if(!favs.has(id)) {console.log(favs.has(id))} return;
   console.log(' got here 1')
   let p=(t.Time||'').split(':');
   if(p.length<2) return;
   console.log(' got here 2')
   let h=parseInt(p[0]); let m=parseInt(p[1]);
   let endH=h, endM=m+15;

   if(String(t.Session).startsWith('Symposium')){
      return; // symposium talks skipped; attendees export selected talks only
   }
   console.log(' got here 3')
   if(endM>=60){endH++; endM-=60;}
   const pad=n=>String(n).padStart(2,'0');

   txt+='BEGIN:VEVENT\r\n';
   txt+='SUMMARY:'+String(t.Title).replace(/\r|\n/g,' ')+'\r\n';
   txt+='DTSTART:'+dayMap[t.Day]+'T'+pad(h)+pad(m)+'00\r\n';
   txt+='DTEND:'+dayMap[t.Day]+'T'+pad(endH)+pad(endM)+'00\r\n';
   txt+='LOCATION:'+String(t.Room).replace(/\r|\n/g,' ')+'\r\n';
   txt+='DESCRIPTION:'+String(t.Speaker).replace(/\r|\n/g,' ')+'\r\n';
   txt+='END:VEVENT\r\n';
   console.log(' got here 4')
 });
/*
 console.log("VEVENT count:", (txt.match(/BEGIN:VEVENT/g) || []).length);
 console.log(txt.slice(0, 2000));
 */
 txt+='END:VCALENDAR';

 const blob=new Blob([txt],{type:'text/calendar'});
 const a=document.createElement('a');
 a.href=URL.createObjectURL(blob);
 a.download='ECVP2026_MyTalks.ics';
 a.click();
}

document.getElementById('q').addEventListener('input',render);
render();
