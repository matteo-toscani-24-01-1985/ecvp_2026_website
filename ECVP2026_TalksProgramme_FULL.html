peaker": "Domenica Veniero", "CoAuthors": "Francesca Nannetti & Gregor Thut", "Abstract": "Oscillatory accounts of attention have predominantly emphasised the role of alpha-band activity in gating sensory processing and shaping attentional selection. Within this framework, alpha oscillations are thought to regulate the excitability of the visual cortex, by modulating perceptual performance in a rhythmic manner. However, accumulating evidence suggests that other frequency bands may play a more central role in attentional control than previously assumed. In particular, beta-band activity (∼15–30 Hz) has been implicated in top-down processes that support the enhancement of task-relevant information.\n\nIn this talk, I will present causal evidence on the role of neural oscillations in attentional deployment using transcranial magnetic stimulation (TMS) and EEG. By probing the attentional network at specific temporal intervals, we assessed both electrophysiological and behavioural consequences of rhythmic brain activity. Across a series of experiments, we consistently observed that beta-band dynamics, rather than alpha-band oscillations, are critically linked to changes in visual performance. This pattern was evident across both covert and overt attentional shifts and was robust across different behavioural measures, including detection accuracy and decision bias.\n\nThese findings challenge dominant alpha-centric models of attentional selection and suggest a need to revise current frameworks of rhythmic attention. More broadly, they contribute to the ongoing debate on whether perceptual and attentional processes are fundamentally rhythmic by highlighting the importance of identifying the specific frequency bands that causally shape behaviour.", "SubmissionID": ""}, {"Day": "Wednesday", "Time": "14:45", "Session": "Material Perception", "Room": "Bayview Suite", "Title": "Material perception in context", "Speaker": "Filipp Schmidt", "CoAuthors": "Roland W. Fleming", "Abstract": "Material recognition—distinguishing between substances like metal, fabric, wood, or glass—is essential for predicting object behavior and guiding interactions. Prior studies have shown that people can rapidly and effortlessly recognize materials and infer their properties, despite substantial variability in appearances. However, most previous work used isolated texture patches, ignoring potential effects of visual context. Unlike objects, materials are usually not defined by a diagnostic global shape, rendering them more ambiguous and potentially more prone to contextual influences. Here, we used AI-based image synthesis with careful, iterative prompting to seamlessly embed identical image patches—depicting materials such as eggshell, metal, or water—into eight different surrounding contexts. One context was congruent with the original material (e.g. eggshell patch embedded in the image of an egg), seven were incongruent (e.g. eggshell patch embedded in the image of a human arm). For each stimulus, 10 participants identified the material of the central patch and rated 17 properties (e.g., realism, softness, glossiness, temperature). Importantly, we tested different groups of participants so that no single person saw the same patch twice (irrespective of context). Our findings revealed a strong impact of the context on the interpretation of the central patch. For example, participants identified eggshell as human skin when embedded in the context of a human arm. Property ratings shifted systematically to reflect the categorization—e.g., the patch appeared “softer” and “warmer” in the arm context than in the egg context. A control experiment, in which material patches were paired with mismatched contexts, confirmed that these effects were not due to inattentiveness but genuine perceptual integration of the patch and the surroundings. Overall, the findings demonstrate that material recognition is highly context-sensitive, potentially more so than object perception, highlighting context as a key factor in material perception.", "SubmissionID": 20.0}, {"Day": "Wednesday", "Time": "15:00", "Session": "Eye Movements", "Room": "Tregonwell Hall", "Title": "Saccadic omission of predictable chromatic information", "Speaker": "Umberto Calleri", "CoAuthors": "Eckart Zimmermann", "Abstract": "When we move our eyes, we do not perceive the motion that is produced on the retina, a phenomenon known as saccadic omission. We have recently shown that intra-saccadic motion becomes habituated when certain speeds are repeatedly coupled to certain saccade amplitudes. Previous studies have shown conflicting findings regarding chromatic omission. Here, we asked if color might be omitted when presented contingently on a given saccade vector. Seventeen participants performed a color detection task for stimuli presented during saccade execution. In habituation trials, participants executed 100 saccades during which a full-screen color was presented for ~42 milliseconds. In these trials, participants had no other task than performing a saccade. We measured detection thresholds before and after saccade execution for the same colors shown in habituation trials. Participants were asked to locate the position of a colored stimulus flashed for ~42 ms that appeared randomly either in the upper or the lower half of the screen. Color contrast was varied across trials, and the median of the psychometric function was chosen as the detection threshold. We found raised detection thresholds after habituation, indicating that the sensorimotor system habituates to saccade-contingent color stimulation. Furthermore, intra-saccadic habituation was selective for the color presented during habituation trials. If participants were exposed to a red stimulus in habituation trials and tested with a yellow color afterwards, no habituation was found. Our data show that color, like motion, can become omitted during saccade execution, depending on the saccade-contingent stimulation history. We conclude that saccadic omission results from intra-saccadic habituation, flexibly silencing sensations that have been repeatedly experienced to co-occur with saccades.", "SubmissionID": 443.0}, {"Day": "Wednesday", "Time": "15:00", "Session": "Symposium: The rhythmic nature of perception and attention: Evidence, challenges, and open questions", "Room": "Purbeck Lounge", "Title": "Integrating fixed and flexible rhythms", "Speaker": "Clare Press", "CoAuthors": "Aaron Kaltenmaier, Quirin Gehmacher, Peter Kok & Matthew H. Davis", "Abstract": "Our sensory inputs contain temporal structure often paralleled by neural dynamics, notably, in the form of oscillations. How do we align neural processing with the input to optimize perception of sensory streams? Flexible rhythm, or entrainment, accounts propose that neural oscillations align flexibly with sensory rhythmic information. Fixed accounts instead suggest more rigid neural dynamics determined by different intrinsic processes. I first highlight this apparent incompatibility between existing accounts. Sensory rhythms in our environment will usually not coincide specifically with the rate of any fixed rhythm. To resolve these and other issues, I then propose that sampling rhythms reflect statistical (Bayesian) learning of the temporal properties of inputs, determined by several sources. We process the sensory world according to the probability with which the combination of sources has predicted information at that time. This mechanism can integrate constraints to determine optimal sampling. I present some recent MEG work where we test components of this account, along with considerations about the role of the motor system in supporting such temporally-specific perceptual processes.", "SubmissionID": ""}, {"Day": "Wednesday", "Time": "15:00", "Session": "Material Perception", "Room": "Bayview Suite", "Title": "Probing Novel, Hybrid Material Representations via Natural Language and Semantic Embeddings", "Speaker": "Hua-Chun Sun", "CoAuthors": "Selina Rudolph, Roland Fleming", "Abstract": "How do we perceive materials that are entirely novel or nonexistent in the real world?  Here we address this fundamental question by investigating how observers infer information about material properties from unfamiliar, hybrid combinations of different material categories. Building on our previous work (Schmidt et al., 2025), we utilized CNN-based interpolation (Vacher et al., 2020) to generate 12 cross-category morph sequences (e.g., sand–grass, moss–fur). We previously showed that perceptual scaling aligns with physical morph levels, driven by low-level features like RMS contrast and color saturation. Here, we investigated the semantic interpretation of these hybrid textures. Participants (N=100) provided free-text descriptions—including material labels, visual properties, and haptic attributes—across five interpolation steps (0%, 24%, 50%, 76%, and 100%). To quantify the responses, we used sentence-transformer embeddings to calculate mean cosine similarity between participants’ descriptions. Our results show that inter-observer consistency declines significantly as morphs approach the midpoint, indicating increased ambiguity and diverse recognition of novel material combinations. Furthermore, semantic similarity decreased as a function of distance along the morph continuum; for example, the 0%-24% pair was semantically closer than the 100%-24% pair. This suggests that the semantic space of visual materials closely maps onto the image-based morph space. Multidimensional scaling (MDS) further revealed a path-to-distance ratio of 0.24–0.33, demonstrating that morphed material representations do not follow a linear trajectory between parent categories in semantic space. Interestingly, descriptions of haptic properties did not follow these systematic trends as closely as material labels or visual attributes, likely due to a lack of lexical diversity. Participants used similar terms regardless of the material in general, suggesting that crossmodal tactile inferences from visual material cues are less sensitive. Overall, this study provides insights into how visual, haptic, and semantic material feature spaces are represented and integrated in the brain.", "SubmissionID": 253.0}, {"Day": "Wednesday", "Time": "15:15", "Session": "Eye Movements", "Room": "Tregonwell Hall", "Title": "Suppression of optokinesis during smooth pursuit eye movements: testing the stationarity tagging hypothesis", "Speaker": "David Souto", "CoAuthors": "Reveca Marcovici, Ignacio Serrano-Pedraza", "Abstract": "Performing smooth pursuit eye movements over a structured background requires suppression of optokinetic responses towards the reafferent retinal signal. This suppression is reflected in reflexive ocular tracking responses to brief background motion opposite to the direction of pursuit. When a patterned background is static and then moves, motion opposite to the direction of pursuit elicits a very small response. Motion in the direction of pursuit elicits a much larger response. The suppression of optokinesis is not simply motor: if the background moves with the pursuit target, a motion perturbation in the background elicits nearly symmetric responses. Another option is that responses to surfaces “tagged” as stationary are suppressed. In the absence of body motion, the retinal motion of stationary surfaces is anticorrelated to the eye movement—they produce purely reafferent signals. If these cues were used, we should see smaller suppression of optokinesis when background motion is presented without a static background. The ground surface, projecting to the lower visual field, provides another cue for stationarity, based on prior knowledge. Our preliminary data (n = 11) shows that the absence of a static background increases responses in the direction of pursuit but not those in the opposite direction. The effect of visual field was largest, again only for reflexive response in the direction of pursuit, with static backgrounds in the lower visual field having a suppressive effect on responses in the direction of pursuit. The processing of background motion signals in the re-afferent direction is qualitatively different from those in the pursuit direction; only the latter is consistent with stationarity tagging. The suppression of optokinesis may only differentiate between target and background.\n\nSupported by grant PID2024-155243NB-I00 from Ministerio de Ciencia, Innovación y Universidades (Spain).", "SubmissionID": 505.0}, {"Day": "Wednesday", "Time": "15:15", "Session": "Material Perception", "Room": "Bayview Suite", "Title": "Distangling the role of local motion and global shape information in material perception", "Speaker": "Melanie Pries", "CoAuthors": "Amna Malik, Katja Doerschner", "Abstract": "Recent studies using dynamic dot materials (DDMs) show that motion alone provides information about material properties of non-rigid deforming objects (Schmid & Doerschner, 2018; Bi et al., 2018). DDMs depict materials as moving dots attached to or embedded within objects. Without surface information, they convey material through local and global features of motion and shape. Recent work using point-light cloths (PLCs) suggests percepts remain robust to disruptions in local dot motion and rely on holistic processing, discounting local motion features (Erdogan et al., 2025). However, these displays are confounded by shape information conveyed by the spatial configuration of dots, a strong cue for material/object recognition. The visual system may extract global shape at each timepoint, with temporal integration allowing identification of e.g. cloth from moving dots. Hence, the critical question is whether local motion cues, in the absence of global shape cues, provide diagnostic information about materials? To answer this, we restricted access to global shape information with an aperture. Using dynamic dot stimuli from five material categories (liquid, smoke, rigid-breakable, jelly, fabric) we presented stimuli with intact or disrupted local motion (limited lifetime dots). Observers (N=40) viewed animations in three sequential blocks: a fixed aperture, an interactive aperture allowing shape exploration, and no aperture (https://next.hessenbox.de/index.php/s/X42ejA9pacnsadA). They completed free description, material categorization, and attribute rating task for each block. We found restricting global shape information and disrupting local motion both impaired performance. Critically, without global shape information, disrupting local motion reduced categorization to chance, whereas performance remained well above chance when local motion was intact. Descriptive and rating tasks showed similar patterns. Findings indicate contributions of both local motion and global shape in material perception from DDMs. Contrary to previous findings, we conclude that local motion cues are required for inferring material from motion when strong shape cues are absent.", "SubmissionID": 389.0}, {"Day": "Thursday", "Time": "10:30", "Session": "Neural Mechanisms", "Room": "Tregonwell Hall", "Title": "Dissociating feedforward encoding from recurrent integration: Evidence from EEG decoding, masking, attention, expectation, and NMDA blockade", "Speaker": "Timo Stein", "CoAuthors": "Samuel Noorman, Johannes Fahrenfort, Simon van Gaal", "Abstract": "A central question in visual neuroscience is what distinct functional roles are carried by feedforward and recurrent processes, and how these processes are selectively modulated by sensory input, top-down factors, and neurochemical mechanisms. Here, we report a set of three EEG decoding studies to dissociate feedforward encoding from recurrent processing across multiple manipulations targeting perceptual input strength, attention, expectation, and NMDA receptor function.\n\nUsing visual stimuli that vary in feature complexity, we distinguish early feedforward encoding of local contrast, intermediate processing of collinearity associated with lateral interactions, and later processing of illusory surfaces associated with feedback-dependent integration. Time-resolved decoding revealed a consistent dissociation across studies: early feedforward signals (~80 ms) were largely preserved across manipulations, whereas later stages (~200–300 ms), reflecting recurrent processing, were selectively modulated.\n\nFirst, we directly compared perceptual impairments (masking) and attentional limitations (attentional blink) under matched behavioral performance. Masking strongly reduced later-stage decoding, consistent with disrupted recurrent processing, whereas attentional limitations preserved local recurrent processing while preventing global recurrent processing associated with conscious access. Second, manipulating expectation and attention showed that top-down influences selectively affected later processing stages, with expectation effects emerging only when stimuli were task-relevant and attended, and no modulation of early feedforward encoding. Third, pharmacological manipulation using the NMDA receptor antagonist memantine provided causal evidence for the role of recurrent processing, selectively altering decoding of illusory surfaces, a marker of feedback-dependent integration, while leaving earlier stages largely unaffected.\n\nTogether, these findings demonstrate that feedforward and recurrent processes make distinct contributions to visual processing, with feedforward activity supporting robust early feature encoding and recurrent processing—spanning lateral and feedback interactions—supporting feature integration and conscious access. Across perceptual, attentional, and pharmacological manipulations, effects consistently target recurrent stages while leaving initial sensory encoding largely intact.", "SubmissionID": 209.0}, {"Day": "Thursday", "Time": "10:30", "Session": "Symposium: What vision scientists can learn from continuous movement tracking during decision making", "Room": "Purbeck Lounge", "Title": "Tracking the Continuous Resolution of Visual Ambiguity Through Movement Trajectories", "Speaker": "Tijl Grootswagers", "CoAuthors": "Genevieve L. Quek, Lu Lucuța, Almudena Ramírez-Haro, Lina Teichmann, Denise Moerel, Manuel Varlet", "Abstract": "Resolving visual ambiguity is a continuous process critical to adaptive human behaviour in complex environments. While traditional discrete-choice tasks have established a strong foundation for understanding final decision outcomes, we can now build upon this work to capture the complex, ongoing processes of evidence accumulation. This talk will demonstrate how continuous measures like computer mouse-tracking can be leveraged to provide a high-resolution window into the competitional dynamics of ambiguous perceptual decisions. We recorded computer mouse trajectories while online participants made high-level categorisation judgements about ambiguous images with competing conceptual interpretations (e.g., 'go right for animal'; 'go left for object'). By parametrically manipulating visual ambiguity, we could index how evidence for these competing alternatives is dynamically weighted over the course of the reaching response. The spatial and temporal characteristics of the movement trajectories, such as the physical pull towards the unchosen alternative, capture continuously updating cognitive conflict. These trajectories reveal how ambiguity is resolved in a continuous fashion, providing a time-resolved readout of updating decisional processes. Ultimately, this work highlights the richness of movement trajectories as an accessible, powerful, and sensitive window into the unfolding dynamics of human perception, underscoring their utility in advancing our understanding of choice behaviour.", "SubmissionID": ""}, {"Day": "Thursday", "Time": "10:30", "Session": "Active Vision and Visual Salience", "Room": "Bayview Suite", "Title": "Anticipatory gaze strategies as a principle of active information sampling", "Speaker": "Lynn Schmittwilken", "CoAuthors": ", Thomas S. A. Wallis", "Abstract": "Vision does not only depend on the retinal input, but also on how it is actively sampled over time. While eye movements are known to reflect both stimulus properties and task demands, it remains unclear whether their consequences on visual sensitivity are strategically exploited or merely incidental. Here, we investigate whether humans proactively adjust gaze behavior to optimize perceptual encoding, by disentangling task-driven (anticipatory) from stimulus-driven (reactive) influences on eye movement control.\nAcross two sessions, observers (N=15) detected either low (0.1 cpd) or high (10 cpd) spatial frequency gratings at varying contrasts. Stimuli spanned a wide visual angle, so eye movements were not necessary to perform the task. Crucially, low and high spatial frequency gratings were presented in both sessions. This allowed us to isolate the task-driven (session-dependent) and stimulus-driven (trial-dependent) effects on gaze patterns.\nSaccade amplitudes and velocities were strongly shaped by task demands, in line with predictions from optimal coding accounts: saccades were larger when participants looked for low spatial frequencies and smaller for high spatial frequency targets. Adoption of these strategies was related to performance, although effects varied across individuals. In contrast, stimulus-driven influences were comparatively weak, though reduced visibility increased the task-dependent effect. This suggests a trade-off between encoding benefits and movement costs.\nTogether, these findings support anticipatory gaze strategies as a principle of active information sampling, and highlight the role of self-generated motion for visual perception.", "SubmissionID": 196.0}, {"Day": "Thursday", "Time": "10:45", "Session": "Neural Mechanisms", "Room": "Tregonwell Hall", "Title": "Computational role of ventral bank STS neurons in the hierarchical visual processing of socially interacting bodies", "Speaker": "Martin A Giese", "CoAuthors": "Anna Bognar, Albert Mukovskiy, Ghazaleh Ghamkhari Nejad, Michael Stettler, Rufin Vogels", "Abstract": "Social interactions can be recognized from the dynamic relationships between moving bodies, even from highly impoverished stimuli as the ones by Heider and Simmel. The superior temporal sulcus (STS) has been proposed as possible neural substrate for this processing. Simple neural theories can account for this function by hierarchical processing, where at a first level individual agents are recognized, and then their spatio-temporal relationship during interaction is processed at a higher level. How the STS contributes to these computations at the single-cell level is completely unknown.\n\nMETHODS:  We present a hierarchical neural recognition model that implements the proposed computational principles. In addition, we tested how neurons in the ventral bank of the superior temporal sulcus (STS) of macaques might contribute to this processing. For this purpose, we presented individual and pairs of monkey avatars whose spatial relationship was modified to make them consistent or inconsistent with social interactions. RESULTS:  Our model successfully recognizes social interactions from abstract stimuli as well as during third-party observation of interacting full bodies. The recorded ventral bank STS units showed robust tuning to individual agents and their spatial parameters. Beyond a normalizing effect induced by the presence of a second agent, we failed to find a consistent influence of social interaction. CONCLUSIONS: While two level models account successfully for social interaction recognition from different stimulus classes, our experiment suggest that single units in the ventral bank of the STS are not performing the critical computations for the analysis of social interaction in third-party social interaction perception. Within a potential hierarchical processing stream their role thus likely is the processing of individual agents and their spatio-temporal parameters.", "SubmissionID": 272.0}, {"Day": "Thursday", "Time": "10:45", "Session": "Symposium: What vision scientists can learn from continuous movement tracking during decision making", "Room": "Purbeck Lounge", "Title": "Linking categorisation behaviour and category-selective cortex through motor tracking", "Speaker": "Timothée Maniquet", "CoAuthors": "Huangxu Fang, N. Apurva Ratan Murty, Hans Op de Beeck", "Abstract": "An important feature of the functional organisation of visual cortex is the presence in occipito-temporal cortex (OTC) of regions that preferentially respond to given categories of visual objects, such as faces, bodies, and scenes. To relate this functional selectivity to human behaviour, previous research has employed a distance-to-bound (DTB) approach, where multivariate brain activity is used to estimate a decision boundary that can then be linked to perceptual decisions. Using this approach, correlations have been found between activity in OTC, and reaction time (RT) when carrying out certain categorisation tasks. However, it remains unclear what determines (a) where in OTC these correlations can be found, (b) with which behavioural categorisation tasks they can be found, and (c) whether they would also be found for other behavioural markers.\n\nIn the current work, we explored these issues by asking (a) wether category-selective functional regions of OTC would relate to behavioural performance (b) while participants categorised images as belonging or not to their preferred categories. Crucially, (c) we replicated the RT correlations, and asked whether we could extend them to more complex, time-resolved motor movements.\n\nWe adopted a more basic DTB approach and considered simple, univariate activity, rather than relying on decoding to build our DTB. Our results show that activation in regions selective to faces, bodies, and scenes, is sufficient to relate to behavioural performance while categorising images as being faces, bodies, or scenes, respectively, but also while categorising images as being animate or inanimate. We found brain-behaviour correlations for RT, but also for motor movements, which extends the validity of the DTB approach to time-resolved behavioural performance. Overall, our data adds to evidence that OTC serves to guide categorisation behaviour, and expands this relationship to motor movements.", "SubmissionID": ""}, {"Day": "Thursday", "Time": "10:45", "Session": "Active Vision and Visual Salience", "Room": "Bayview Suite", "Title": "Exploring eye-movement mechanisms of colour discrimination: An eye-tracking study.", "Speaker": "Jack Prosser", "CoAuthors": "Anna Metzger, Matteo Toscani", "Abstract": "The human visual system samples the world through eye movements due to limited processing capacity. When participants match the colour of real objects, their fixations tend to land on the brightest regions, as these areas provide more information about a surface’s reflectance. However, because the brightest regions are typically most saturated, it is unclear whether fixations are driven by luminance or chromatic contrast (chroma). Our study explores fixation patterns of participants engaged in a colour discrimination task using physically-based rendered objects with dissociated luminance and chroma.\n\nThe hue for the two reference stimuli was set along the bisector of the purple and orange colour quadrants, with chroma set to the maximum radius in the DKL iso-luminant plane. Comparison stimuli were generated by rotating the hue in six steps of 5° clockwise and counterclockwise. Crucially, the stimuli were illuminated from above, so that surfaces exhibited a top-to-bottom luminance gradient. \n\nTo dissociate luminance from chroma, we held the lightness distribution constant and inverted the chroma distribution, such that the brightest pixels had the lowest chroma. Participants (N=25) were presented with the reference stimulus, followed by the comparison and the reference again, in a random order. Their task was to indicate whether the second or the third stimulus matched the colour of the reference.\n\nWe analysed colour discrimination performance (JND) and vertical fixation position as a function of condition (natural or inverted; lightness–chroma relationship) and quadrant. Consistent with previous research, JNDs were lower for the orange quadrant (F(1,24)=64.347, p<.001), but did not differ between conditions. Crucially, when chroma was highest in the darkest regions, fixations tended to land on lower positions on the objects (F(1,24)=15.538, p<.001). Together, the results suggest that participants adapt their fixation strategy to sample the most colour-informative regions, thereby maintaining consistent performance.", "SubmissionID": 388.0}, {"Day": "Thursday", "Time": "11:00", "Session": "Neural Mechanisms", "Room": "Tregonwell Hall", "Title": "Emergence and dynamics of visual content in high-level visual cortex", "Speaker": "Maëlan Q. Menétrey", "CoAuthors": "Isotta Rigoni, Jonathan Monney, Jules Veber, Lora Fanda, Fiorenzo Artoni, Pierre Mégevand, Michael H. Herzog, David Pascucci", "Abstract": "Recognition of meaningful visual scenes is thought to progress from low-level feature processing in early visual cortex to high-level representations in ventral temporal areas, via a rapid increase in evoked neural activity along the ventral stream. However, theories differ on how accessible visual content emerges. Some propose distributed broadcasting across large-scale networks, while others emphasize more locally sustained dynamics within ventral regions that maintain content-related information beyond the evoked response.\n\nUsing decoding and representational generalization analyses on intracranial stereo-electroencephalography (SEEG) recordings from seven patients with epilepsy, we tracked the emergence and temporal dynamics of visual content across electrodes sampling multiple brain regions and cortical depths. Participants either passively viewed or actively discriminated the category (animals vs. food) of 2-second images that were intact, phase-scrambled, or progressively descrambled, matched for low-level features.\n\nAlthough evoked responses in the broadband signal were weak and evident only in a small subset of electrodes in visual temporal cortex, we observed sustained and stable representations of real images throughout the presentation, relative to scrambled images. These representations emerged following the actual revealing of image content (intact or progressively descrambled) and were amplified during the active compared to the passive task, primarily involving temporal electrodes. \n\nThese initial results suggest that visual content is maintained beyond the initial feedforward sweep and may involve recurrent, temporally extended representations in ventral regions during image perception. Future analyses will investigate the specific contributions of other areas, such as frontal cortex, and their potential interactions with ventral stream processing of visual content across different frequency bands.", "SubmissionID": 229.0}, {"Day": "Thursday", "Time": "11:00", "Session": "Symposium: What vision scientists can learn from continuous movement tracking during decision making", "Room": "Purbeck Lounge", "Title": "Continuous movement tracking during decision making regarding visual social scenes reveals the temporal dynamics of the competition between scene and people valence", "Speaker": "Elahe’ Yargholi", "CoAuthors": "Timothée Maniquet, Joost Vennekens, Jan Van den Stock & Hans Op de Beeck", "Abstract": "To infer the emotional meaning of complex social interactions, we combine cues from scene context and depicted people. In a recent study (https://doi.org/10.1101/2025.05.08.651182), we used images of social interactions in emotionally loaded contexts, e.g. funerals. Across the full set the valence of the people in the scene was partially dissociated from the valence of the scene context, e.g. people laughing at a funeral. For these incongruent images, behavioral annotations revealed greater reliance on people valence and not the scene valence and fMRI showed stronger contribution of high-level processing. However, these measures did not reveal how valence judgments unfold over time. To investigate these temporal dynamics, we employed continuous mouse-tracking in an online experiment while participants rated image valence during short trials (1200ms). We quantified response dynamics as the deviation or ‘divergence’ of mouse trajectories from the screen’s vertical midline as a function of time and compared the deviation with behavioral annotations and fMRI data. For some incongruent stimuli, trajectories initially deviate toward the wrong response that are later corrected. For congruent images, trajectory divergence correlates with scene/people/image valence (450-1200ms). For incongruent images, divergence first correlates with scene valence (450–850ms) and later with people/image valence (625–1200ms). Comparisons with neurally (fMRI) predicted valence reveals that several regions predict divergence with similar temporal properties. Specifically, for congruent stimuli, predictions from many ROIs predict behavioral divergence at most time points, with the best predictions from mid- and high-level regions. For incongruent stimuli, predictions of scene valence from low-level visual ROIs peak at early time points, while correlations with predictions for people and image valence peak later and are related to mid- and high-level ROIs respectively.  Our findings show the efficiency of continuous movement tracking in studying and understanding complex cognitive processes.", "SubmissionID": ""}, {"Day": "Thursday", "Time": "11:00", "Session": "Active Vision and Visual Salience", "Room": "Bayview Suite", "Title": "Objective and explorative comparison of gaze allocation across conditions – an alternative to ROI analysis based on a combination of DDN classification and reverse correlation", "Speaker": "Anna Metzger", "CoAuthors": "Jack Prosser, Matteo Toscani", "Abstract": "Gaze analysis typically depends on hypothesised, subjectively defined regions of interest (ROIs) or on heatmaps. ROIs facilitate comparisons between conditions but limit objectivity and exploratory analysis, whereas heatmaps avoid predefined assumptions yet involve numerous pixel-wise comparisons that make meaningful differences difficult to detect. Here, we introduce an advanced approach for analysing gaze allocation which combines the advantages and overcomes the limitations of these traditional approaches. We employ deep neural networks (DNNs), using adapted versions of AlexNet, to classify experimental conditions based on gaze patterns. This is combined with reverse correlation techniques to reveal where and how gaze differs across conditions. We test this approach on data from an experiment examining how object-specific sounds (e.g., a church bell ringing) influence gaze allocation (N=7). ROI-based analyses indicate significant differences between conditions (congruent sound vs no sound), with greater attention directed toward sound-associated objects in the congruent condition. However, definition of ROIs implies a certain degree of subjectivity. In fact, our data show that small variations of ROIs change the statistical significance of the results. In contrast, our DNN-based approach successfully classifies task conditions from individual fixations. Crucially, classification accuracy could be used to test for significant differences between conditions. The results demonstrate that sound can systematically alter gaze allocation for some but not all images. Furthermore, averaging random fixation patterns classified as each condition by the trained DNN revealed task-specific, image-specific, and non-trivial viewing strategies - fixations were not always drawn directly to the sound source; instead, they may shift away from salient features and be directed all over the image, or fall between salient regions and the sound source. Such patterns would likely remain undetected using traditional hypothesis-driven methods. Overall, this approach offers an objective, data-driven framework that enables comparisons between experimental conditions while also allowing explorative approaches.", "SubmissionID": 515.0}, {"Day": "Thursday", "Time": "11:15", "Session": "Neural Mechanisms", "Room": "Tregonwell Hall", "Title": "The visual front-end as a theorem: deriving early vision rather than measuring it.", "Speaker": "Bart ter Haar Romeny", "CoAuthors": "", "Abstract": "Early vision is usually characterized by measurement and then modeled to fit the recordings. Here the opposite program is persued: ask what an optimal observer is obliged to do and derive the front-end before recording it. The chain is short and forced. A sample of light is a finite aperture; demanding only linearity, a location, a free width and maximal non-commitment (maximum entropy) yield a unique shape — the Gaussian. To read context, the observer must reach a neighboring point; composing infinitesimal steps shows the translation operator to be the exponential of the derivative, whose expansion is the Taylor series. Local structure is therefore the local jet of derivatives. Because differentiating noisy data is ill-posed, a theorem of Schwartz lets us differentiate the smooth operator instead of the image: the derivative-of-Gaussian kernels are the front-end receptive fields. The same axiomatic temper governs intensity. The stimulus axis is a half-line whose only invariant metric is the ratio, forcing a logarithmic code — Weber–Fechner. A cone, confined to a decade-and-a-half of useful range, holds its operating point by subtractive-in-log feedback from horizontal cells, whose synaptic triad is, almost literally, a field-effect transistor regulating the gate. And the very Gaussian-derivative filters predicted above are those that emerge unsupervised from principal- and independent-component analysis of natural-image patches; they are optimal regularizers, and steerable. Opponent color channels arise in the same way, as the decorrelating principal components of the cone signals. At every stage — sampling, differentiation, intensity coding, gain control, feature learning, and color — the optimal mathematical solution and the measured biology coincide. The visual system does not merely approximate good design; it appears to instantiate the design that first principles make inevitable.", "SubmissionID": 345.0}, {"Day": "Thursday", "Time": "11:15", "Session": "Symposium: What vision scientists can learn from continuous movement tracking during decision making", "Room": "Purbeck Lounge", "Title": "Introduction to Spatiotemporal Survival Analysis: New insights from distribution analyses of movement trajectories", "Speaker": "Maximilian P. Wolkersdorfer", "CoAuthors": "", "Abstract": "While, to this day, mean reaction time and accuracy analyses dominate the research of the temporal dynamics of human behavior, more recent approaches have been proposed to better capture true human performance. For instance, continuous movement-tracking (CMT) allows to dynamically track responses from initiation to completion, revealing the accumulation of information, emerging response conflicts, self-corrections, and more before the response is completed. Similarly, event history analysis (EHA) has emerged as a powerful tool to analyze the entire distribution of time-to-event data. By looking at both hazard and conditional accuracy functions, the application of EHA has given new insights into response activation, time-locking of effects, changes of effects over time, etc.\n\nHere, we introduce a recently developed method that combines the advantages of both of these approaches, namely Spatiotemporal Survival Analysis (StSA). StSA combines the rich data of CMT with the distributional approach of EHA. This is achieved by extracting the spatial information as well as the temporal information of movement along the entire trajectory. Here, the hazard function H(t, space) gives the conditional probability of movement in a spatial bin, given the movement hasn’t occurred within it earlier. Likewise, the conditional accuracy function CA(t, space) gives the probability that, if a movement occurs within a certain spatial bin within time bin t, it was toward the correct target. Key advantages of such an approach are that (1) all available data is used, (2) the dynamics of continuous movement and processing are captured, (3) it offers a model-free and versatile use for any type of CMT data. Thus, StSA offers a powerful and intuitive way to investigate decision-making along the entire time-course of overt response behavior.", "SubmissionID": ""}, {"Day": "Thursday", "Time": "11:15", "Session": "Active Vision and Visual Salience", "Room": "Bayview Suite", "Title": "Seeing Tools Together: Preliminary Eye-Tracking Evidence for Perceptual Shared Experience in Tool Observation", "Speaker": "Luigi Valio", "CoAuthors": "Flavia De Simone, Stefano Uccelli, Maria Antonella Brandimonte, Nicola Bruno, Giovanni Federico", "Abstract": "From the earliest forms of collective life, human technology thrived within social contexts where knowledge was developed, used, and shared collectively. Perceptual Shared Experience (PSE), the phenomenon where the presence of another person influences perception, exemplifies this social basis. Tools are particularly useful for studying PSE: as objects designed for action, they are embedded in cooperative practices and cultural transmission, fostering a form of perception inherently oriented toward shared use. To examine how social presence reorganizes attentional priorities during tool observation, we recorded participants’ eye movements as they viewed various tools, either alone or with another person. In this eye-tracking study, twenty-three participants (F = 10; meanage = 21.6; SDage = 4.4) looked at images of everyday tools (e.g., a hammer, a knife) either solo (solo condition) or with someone else (shared condition). Each tool was divided into two predefined Areas of Interest (AOIs): a functional part (e.g., the hammer’s head) and a manipulation part (e.g., the hammer’s handle). After a fixation cross was shown for 500 ms, stimuli were displayed for 2000 ms, followed by a 3500 ms blank screen. Gaze distribution over time was analysed using growth curve analysis (GCA). Results showed a main effect of AOIs and an interaction with social presence. In both conditions, functional parts initially attracted more gaze. However, in the shared condition, manipulation parts attracted gaze more quickly and surpassed functional parts at the end of the window exploration, a shift not seen in the solo condition. These findings suggest that social co-presence may accelerate attentional shifts from semantic to action-oriented features. Thus, these results highlight, for the first time, that PSE not only increases attention but also appears to redirect it toward action-relevant features, suggesting it may serve as an organizing principle of cooperative action.", "SubmissionID": 263.0}, {"Day": "Thursday", "Time": "11:30", "Session": "Neural Mechanisms", "Room": "Tregonwell Hall", "Title": "Simulation-informed estimation of minimally required fMRI runs for population receptive field (pRF) mapping", "Speaker": "Siddharth Mittal", "CoAuthors": "David Linhardt, Michael Woletz, Christian Windischberger", "Abstract": "Population receptive field (pRF) modelling characterises how visual information is represented in the human visual cortex. These models are estimated using retinotopy experiments with multiple runs of functional magnetic resonance imaging (fMRI). Yet no principled guidelines exist for selecting the number of runs required for reliable parameter estimation. Too few runs risk unreliable estimates; too many waste acquisition time and resources.\n\nWe propose a simulation-informed framework that links contrast-to-noise ratio (CNR) to pRF estimation accuracy and translates this relationship into a practical recommendation for the number of runs. We simulated pRF responses for the NYU retinotopy dataset’s bar stimulus with known ground truth and additive white Gaussian noise, establishing stimulus-specific relationships between CNR and pRF estimation error, quantified by median root-mean-square error (RMS) across simulations. RMS for pRF position (x, y) and polar angle follows power-law scaling with CNR, with exponents −0.81, −0.86, and −1.16, while eccentricity errors follow an exponential decay (rate ≈0.50). These relationships define the CNR required to achieve any desired pRF parameter accuracy. To translate these findings to empirical data, we analysed the NYU retinotopy dataset (n = 44, up to 12 runs/subject). Across subjects, the median voxel-wise CNR computed from pRF time series scales with the number of averaged runs following a power-law (exponent ≈0.41). This is lower than the ideal √N scaling (exponent 0.5), reflecting structured noise in fMRI data. \n\nBy connecting the empirical CNR-versus-runs relationship with the simulation-derived CNR-versus-error relationship, the framework yields a direct mapping from the number of runs to expected accuracy. Researchers can specify a target accuracy for any pRF parameter and solve for the required number of runs. This provides a principled tool for planning pRF experiments and comparing efficiency across stimuli. Ultimately, this reduces acquisition time while ensuring reliable pRF estimates and enabling clinically feasible retinotopy experiments.", "SubmissionID": 126.0}, {"Day": "Thursday", "Time": "11:30", "Session": "Symposium: What vision scientists can learn from continuous movement tracking during decision making", "Room": "Purbeck Lounge", "Title": "Modelling Hand Movement Trajectories in Rapid Chase", "Speaker": "Omar F. Jubran", "CoAuthors": "Jia Li, Maximilian P. Wolkersdorfer, Thomas Schmidt, Cees van Leeuwen, Thomas Lachmann", "Abstract": "Many visual perception processes have been argued to be feedforward processes. In response priming, the Rapid Chase Theory postulates that primes initiate motor responses that are later taken over by targets depending on stimulus onset asynchrony (Schmidt et al., 2006). Continuous movement-tracking (CMT) is an efficient method for examining the dynamics of such a perceptual process. This method also enables modelling cognitive processes from the “outside in,” i.e., inferring latent activation processes from observable motor behaviour. If response priming is a feedforward process, then the motor response to primes and targets should closely reflect the underlying activation dynamics. To capture this, hand trajectories from 4 experimental conditions from Schmidt et al. (2006) are first analysed and then used to simulate hand movements. Each movement is characterized by a decision time (initiation latency) and an acceleration parameter (response force). Parameter distributions were estimated using Bayesian inference from a single experimental condition (strong target, high contrast). The remaining three conditions are then simulated by systematically adjusting these parameters according to differences in stimulus properties (target strength and contrast), rather than refitting the model. This approach tests whether a single set of inferred parameters can generalize across conditions when modulated by stimulus properties. Both empirical and simulated data are analysed using Spatiotemporal Survival Analysis (StSA). This distributional approach captures the time course of response activation without data trimming or averaging, instead leveraging the full dataset. Results show that early responses are driven by prime information and later overtaken by target-driven activation across all conditions. Target takeover times remain stable, while acceleration varies with stimulus properties. The simulations successfully reproduce this pattern, supporting feedforward accounts of visuomotor processing.", "SubmissionID": ""}, {"Day": "Thursday", "Time": "11:30", "Session": "Active Vision and Visual Salience", "Room": "Bayview Suite", "Title": "Visual salience during a head movement", "Speaker": "Szonya Durant", "CoAuthors": ", Niklas Hypki, Kathryn Birrell, Tamara Watson, Markus Lappe", "Abstract": "This experiment investigates teh effect of visual salience during a head movement. We compare the effect of salience of a visual target on detection reaction times and eye movements, varying when the target appears relative to head movement. 36 participants performed 11 (repetitions) * 6 (conditions) * 2 (directions) target detection task presented in a HTC Vive Pro Eye virtual reality headset with eye tracking. The task was to find a (salient) red O or a (less salient) black T as quickly as possible on each trial and press a button according to its position. In the stimulus area, there was one distractor (a black letter L) and one target, positioned 5º above and below a central cross. For condition 1 participants fixated the cross and the letters appeared. For condition 2 participants were instructed that the stimuli could be found by moving their heads to the left (or right -  blocked), and the stimuli (a second fixation cross and the letters) were presented 60º horizontally from initial fixation, outside the initial field of view. Conditions 3-6 were the same as condition 2, but the letters only appeared (3) during the head movement (after 40º); (4) after the second cross was fixated for 10ms; (5) 50ms; and (6) 100ms. In all conditions the more salient target was detected faster. The largest effect of salience was in condition 2 - information was being processed during the head-eye movement. Reaction times relative to stimulus onset in the visual field suggested that in all other conditions the abrupt onset of stimuli reduced the differential effect of salience.   The gaze trajectory was not altered by peripheral stimuli during the head movement.  In conclusion, we find that stimuli which appear due to head movement are processed differently from sudden onset stimuli.", "SubmissionID": 324.0}, {"Day": "Thursday", "Time": "11:45", "Session": "Neural Mechanisms", "Room": "Tregonwell Hall", "Title": "Transformation from visual cues to perceived realism revealed by fMRI and MEG", "Speaker": "Taiki Orima", "CoAuthors": "Hiroshi Ban", "Abstract": "Although the human visual system easily perceives the realism of the visual world, the neural basis of realism perception remains unclear. Because any physical differences between real and unreal images can be reduced to differences in image features, prevailing neurocomputational models predict that realism should be encoded within ventral visual areas that hierarchically process visual features. Contrary to this prediction, our results demonstrate a spatiotemporal transformation from feature-based to percept-based representations of realism. Using fMRI recordings obtained while observers viewed a series of content-matched images with different levels of realism (100 %, 90 %, ……, 0 %) generated by neural style transfer, we found that activity patterns in early visual areas (V1-V3) aligned with subband image statistics, and ventral (VTC) and early dorsal (V3A/B) visual areas aligned with style features. In contrast, higher dorsal visual areas (IPS1-IPS5) exhibited a feature-independent representation that predicted perceived realism: even after removing the variance explained by image features, perceived realism remained predictable only in higher dorsal visual areas, but not in the other visual areas. Furthermore, source-localized MEG signals in early, ventral, and early dorsal visual areas successfully predicted perceived realism at early latencies (peaking at 110-130 ms), whereas those in higher dorsal visual areas did so at later latencies (peaking at 350-370 ms). Our findings indicate that perceived realism is not merely derived from combinations of image features, but is reformatted into an abstract perceptual representation in higher dorsal visual areas.", "SubmissionID": 444.0}, {"Day": "Thursday", "Time": "11:45", "Session": "Active Vision and Visual Salience", "Room": "Bayview Suite", "Title": "Knowing the world and understanding the words: Scene expectations and language comprehension as sources of guidance for visual attention and long-term memory", "Speaker": "Sara Spotorno", "CoAuthors": "Sara Spotorno, Zohra Farhan, Agnieszka Konopka", "Abstract": "Prior knowledge about the visual world and linguistic input are two sources of cognitive guidance that often co-occur in everyday life. However, it is unclear whether and how they jointly influence attentional allocation and long-term memory for information in real-word scenes. In this eye-tracking experiment, participants memorised a series of indoor scene images, each presented for 15 s, while listening to sentences describing them. Scenes contained eight objects, five of which mentioned in the sentence and three non-mentioned. In half of the images, all objects were semantically consistent, i.e., expected in the scene, while in the other half, one mentioned object and one non-mentioned object were semantically inconsistent (i.e., unexpected). In a two-alternative forced-choice recognition test, participants were asked to discriminate between a studied scene and a foil scene that differed in one object, which was either a mentioned or non-mentioned at encoding, and either consistent or inconsistent. The results showed longer fixation durations on mentioned than non-mentioned objects during memorisation, regardless of semantic consistency, and on inconsistent objects but only when these were non-mentioned. Object mention improved memory accuracy and confidence, while semantic consistency did not influence memory. In addition, memory did not depend on total fixation duration on the tested object during encoding. These findings suggest not only that representing information both visually and verbally enhances memory, in line with a dual-coding account, but also that language may be a stronger source of attentional and memory guidance than prior knowledge about objects within scenes. Violations of semantic expectations within a scene lead to greater attentional allocation, but only when object identification is not supported by a label. However, this study also suggests that, in contexts allowing ample viewing and memorisation time, greater attentional allocation at encoding need not directly result in a more robust memory representation.", "SubmissionID": 598.0}, {"Day": "Thursday", "Time": "14:00", "Session": "Perception and Action", "Room": "Tregonwell Hall", "Title": "Humans aim for the center when crossing a moving gap", "Speaker": "Tristan Balu", "CoAuthors": "Régis Lobjois, Aurélie Dommes, Martin Bossard", "Abstract": "Visual control of locomotion is essential for catching preys, reaching goals or avoiding threats. Some studies have shown that locomotor interception relies on nulling changes in target bearing angle. Furthermore, it has been demonstrated that humans tend to cross a moving gap close to its centre, suggesting that they rely on an interception strategy directed towards the gap centre instead of avoiding obstacles. In the present study, we tested this hypothesis by asking participants (N=21), immersed in a minimalist virtual environment, to walk towards a target located 15-m ahead while two moving obstacles crossed their path orthogonally. Spatiotemporal dynamics of the gap formed by these obstacles were manipulated across four conditions: (i) a control condition in which the gap size and the gap-centre velocity were maintained constant; (ii) a size-only condition in which the gap size increased while the velocity of its centre remained constant; and two conditions in which the gap-centre velocity was either (iii) accelerated by expanding the gap from the front or (iv) decelerated by expanding it from the rear. Initial lateral distance of the gap from the participants was also manipulated according to 5 offset conditions, resulting for participants to arrive at different positions in the gap if they did not regulate their behaviour. Results show that in all our conditions participants dynamically regulated their locomotion by adjusting both their speed and direction in order to cross the gap closer to its centre, even when such regulations were not required to safely pass between obstacles. These findings confirm that participants cross gaps in their centre and suggest that they mainly use an interception strategy rather than avoiding obstacles. These results will be discussed in light of constant bearing angle strategy", "SubmissionID": 247.0}, {"Day": "Thursday", "Time": "14:00", "Session": "Spatial Vision", "Room": "Purbeck Lounge", "Title": "Previews induce long lasting (~1s) visual processing", "Speaker": "Michael Herzog", "CoAuthors": "Martina Morea, Léo Bruneau, David Pascucci", "Abstract": "In classical models of vision, a stimulus is processed along the visual hierarchy, ultimately giving rise to its percept. Here, we demonstrate that the processing of even simple, briefly presented stimuli can extend over approximately one second and exhibits complex temporal dynamics. We presented a vernier stimulus flanked by one cube on each side for 20 ms in the visual periphery. Performance was markedly impaired compared to when the vernier was presented alone (a classic crowding effect), or when the vernier and cubes were presented for 160 ms (an uncrowding effect). Strikingly, a 20 ms preview of the cubes alone, presented prior to the 20 ms vernier–cube stimulus, resulted in performance comparable to that observed with the 160 ms presentation. This facilitative effect persisted for interstimulus intervals (ISIs) of up to 1 second, suggesting that the preview initiates or primes the processing of the cubes.Critically, inserting distractor stimuli (e.g., scrambled lines) during the ISI abolished the preview effect. To investigate the neural mechanisms underlying this phenomenon, we recorded EEG in the cubes preview, as well as in a control condition in which the scrambled lines served as the preview. Owing to the long ISI (600 ms), the EEG signals revealed two temporally distinct components: one associated with the preview and another with the subsequent vernier–cube stimulus. Notably, left versus right vernier offsets could already be decoded from neural activity following the preview—that is, several hundred milliseconds before the onset of the vernier–cube stimulus. We propose that the presentation of a stimulus, such as a preview, elicits neural activity that persists for at least one second and can strongly influence the processing of subsequent stimuli.", "SubmissionID": 35.0}, {"Day": "Thursday", "Time": "14:00", "Session": "Symposium: Perception as Inference Across Scales — from natural scene statistics to neural computation and clinical translation", "Room": "Bayview Suite", "Title": "Grasping with altered hands: (why) are some sensorimotor transformations more intuitive than others?", "Speaker": "Simon Watt", "CoAuthors": "Molly Hewitt", "Abstract": "Hand- and arm-operated devices transform or remap the relationship between body movements and end-effector movements. This includes not only complex devices (body-powered prostheses, remote manipulators etc.) but also simple handheld tools. Controlling such devices with fluidity approaching that of natural limb movements requires construction of internal models equivalent to those of biological hands/arms—and is seldom achieved. Across several studies, we show that our ability to internalise tool properties in this way depends strongly on the nature of the induced transformation, suggesting some sensorimotor remappings are easier to internalise, or more intuitive(?) than others. We used motion capture to examine grasping movements made with handheld tools that induce different mappings between hand/arm and end-effector, including varying the gain and direction of grasp opening, and grasp-axis orientation. We also compared different mappings between arm-and-shoulder movement and opening/closing of a body-powered simulated prosthetic hand. Using (relatively) straightforward mechanical devices allows us to isolate specific aspects or sensorimotor remappings, holding other factors constant, while avoiding confounds such as temporal delays. With this approach, we aim to better understand fundamental aspects of human tool use, and to draw generalisable (as opposed to implementation- or device-specific) conclusions. As might be expected, we find that some ‘classes’ of transformation are more difficult to internalise than others. Perhaps more surprisingly, qualitatively similar transformations (e.g. gain of grasp opening) can be substantially harder/easier to internalise depending on quantitative aspects of the remapping. Our data also suggest that visual control strategies for tool use precede development of internal models truly equivalent to those of the hand/arm. We hope that a better understanding of the principles governing how readily different sensorimotor transformations are internalised can inform the design of devices that are fundamentally better suited to human sensorimotor control, and therefore more intuitive to use.", "SubmissionID": ""}, {"Day": "Thursday", "Time": "14:15", "Session": "Perception and Action", "Room": "Tregonwell Hall", "Title": "Do we anticipate the position of an object differently when we cause its motion?", "Speaker": "Pierre-Adams Ouattara Oulé", "CoAuthors": "Elise Prigent, Ouriel Grynszpan", "Abstract": "How our ability to act on the environment shapes visual processing remains an underexplored research field with some studies suggesting that the experience of controlling one’s actions and their consequences may influence how we predict the future position of a moving object. This study sought to deepen our understanding of the relationship between self-agency and visual anticipation across three experiments using the representational momentum (RM) paradigm. Experiment 1 (N=32) showed that a key press triggering a dot's movement reduced motion anticipation compared to a computer-initiated movement. Experiments 2 and 3 added the notion of freedom of choice by presenting two dots to the participant and letting them choose which one to set in motion (free choice), instructing them which dot to set in motion (constrained choice), or letting them observe the dot’s motion without any involvement on their part (passive observation). Our results showed again that anticipation is reduced when we initiate the movement of the dot (free and constrained choice) compared to the computer initiating the movement. However, freedom of choice did not modulate this effect. Experiment 3 was the same as experiment 2 but with additional affordant contextual cues (tunnels along the dots’ trajectories) that could bias visual anticipation. The comparison between experiments 2 and 3 showed that the addition of affordances increased anticipation without interfering with the effect of self-agency. This study suggests that being the author of an object’s motion influences its visual anticipation independently of one’s freedom of action and contextual cues.", "SubmissionID": 141.0}, {"Day": "Thursday", "Time": "14:15", "Session": "Spatial Vision", "Room": "Purbeck Lounge", "Title": "Combining previews and backward masking reveals long lasting temporal dynamics of crowding", "Speaker": "Melissa Allouche", "CoAuthors": "Michael Herzog, Lisa Schwetlick", "Abstract": "Crowding, the deterioration of the perception of a peripheral target when surrounded by flankers, is commonly explained by feedforward-only models. They predict: the more flankers there are, the worse the performance. On the contrary, empirical evidence has shown the opposite can be true, i.e., performance can improve with an increase in flankers, a phenomenon known as uncrowding. Uncrowding emerges when flankers form coherent structures and are presented for at least ~160 ms, suggesting the involvement of feedback processes.  \n\nWe investigated whether uncrowding can be disrupted by using backward masking in a vernier offset discrimination task with three conditions: a vernier presented alone, flanked by lines (crowded), or by cubes (uncrowded), presented for 120 ms. A subsequently presented line-mask reduces performance in all conditions. Performance was particularly impaired in the cubes condition, indicating that uncrowding is comparatively more vulnerable. Presenting a flanker-only preview (e.g., only cubes for 20 ms before the target) restored performance.  \n\nThese results indicate that the cube-percept can be modified by temporally surrounding stimuli even after 120 ms presentation time. In several parametric studies we quantified how these modifications are time-sensitive. While the duration of the mask does not impact its disruptive effect, an 8ms ISI between target and mask improves performance. Likewise, the duration of the preview does not have a large effect but presenting the target 60-120 ms after the preview’s offset resulted in optimal performance similar to the no-mask condition.  \n\nThese results suggest that perceptual grouping unfolds over time, extending beyond stimulus presentation. With a 120 ms presentation of the cubes, the cubes-percept remains fragile as processing can be manipulated by time-sensitive tools: disrupted by a subsequent mask or kickstarted by a preview.", "SubmissionID": 137.0}, {"Day": "Thursday", "Time": "14:15", "Session": "Symposium: Perception as Inference Across Scales — from natural scene statistics to neural computation and clinical translation", "Room": "Bayview Suite", "Title": "Reaching with an extended arm in virtual reality: experience and performance", "Speaker": "Claire Yuke Pi", "CoAuthors": "", "Abstract": "Virtual reality (VR) enables us to extend the human body beyond its physical limits. Techniques such as Go-Go allow users to reach distant objects by stretching the virtual arm, raising a fundamental question: when is such augmentation perceptually and functionally effective?\nIn this talk, I focus on identifying where augmentation works. Using a spatial memory task, we systematically vary interaction distance and compare embodied reach extension (Go-Go) with tool-based pointing (Laser). Rather than asking which technique performs better overall, we examine how their effectiveness changes across space. Our findings show that augmentation is not uniformly beneficial: extending the arm supports interaction only within a limited spatial range, while excessive extension disrupts visuomotor coordination and increases cognitive cost. This reveals an “effective augmentation zone,” where perception and action remain aligned.\nI will then extend this perspective to ongoing work with children, using controlled manipulations of virtual arm functionality in simple, engaging tasks. This allows us to ask whether such effective zones are stable across development, or whether they shift with greater neural plasticity.\nFramed within visual perception, this work suggests that augmentation in VR is not only a tool for interaction but also a probe into how the brain calibrates the relationship between vision and action. More broadly, it raises an open question: if we repeatedly expose users to well-calibrated, effective augmentations, can these altered visuomotor mappings reshape abilities beyond VR, influencing how we perceive and act in the real world?", "SubmissionID": ""}, {"Day": "Thursday", "Time": "14:30", "Session": "Perception and Action", "Room": "Tregonwell Hall", "Title": "Catch Me If You Can: Combining a Tactile Bracelet and Belt to Enhance Grasping Range", "Speaker": "Marcin Furtak", "CoAuthors": "Silke Kärcher, Peter König", "Abstract": "To enable visually impaired people to grasp distant objects placed outside their reach, we have developed GRETA, the assistive system that integrates the tactile bracelet with the feelSpace naviBelt for spatial navigation. We built the system based on our previous work on the automated hand navigation system (HANS) that can guide the hand of the bracelet user to the target object without the assistance of an external operator. The new integrated assistive system is controlled via auditory commands processed by the Android app, enabling autonomous exploration of the surrounding space.\n\nThe system processes depth information (obtained from the smartphone via ARCore Depth API) and matches it with the objects detected in the scene by HANS. Upon finding the specified target object, based on its distance from the user, the system decides whether to send vibrations to the bracelet (fine-grained movements of the hand) or to the belt (coarse-grained movements of the whole body). The system automatically switches between the currently active device in real-time based on the user's position change, taking into account the speed of movement.\n\nWe are testing the system in several scenarios, differing in the distance and number of obstacles the user has to pass to reach the target object, for the initial validation of the system with a group of blindfolded, normally-sighted participants. Afterwards, we plan to prepare a detailed training protocol for blind users. The protocol will enable to learn how to use the system in real-life contexts without any assistance from another person.\n\nOverall, the integration of the bracelet and the belt within a single assistive system vastly enhances utility, enabling users to grasp target objects not only in scenarios when they are immediately within reach. It is a crucial step in the project life cycle, moving it much closer to real-world applications.", "SubmissionID": 451.0}, {"Day": "Thursday", "Time": "14:30", "Session": "Spatial Vision", "Room": "Purbeck Lounge", "Title": "Distinct system-level computations underlie perceptual variation across the visual field", "Speaker": "Marisa Carrasco", "CoAuthors": "Shutian Xue, Antoine Barbot, Jared Abrams, Qingyuan Chen", "Abstract": "GOAL: Human visual performance varies across eccentricity (distance from gaze) and around polar angle (circular dimension). Perception typically decreases with eccentricity. At isoeccentric locations, performance is superior along the horizontal than the vertical meridian—horizontal-vertical anisotropy—and along the lower than the upper vertical meridian—vertical meridian asymmetry. Whereas retinal factors and cortical surface area account for eccentricity effects, they only partially explain polar angle variations. Here, we investigated whether and how system-level computations transforming visual input into perception underlie these heterogeneities.\n\nMETHODS: Twelve participants performed an orientation discrimination task with Gabors embedded in dynamic white noise. Using the equivalent noise method and perceptual template model, we estimated three computations limiting visual performance in noise: gain—the system’s ability to linearly amplify the signal; nonlinearity—how inputs are nonlinearly transformed; and internal noise— intrinsic variability within the visual system, independent of external stimulation. These parameters were evaluated across eccentricity (fovea, parafovea, and perifovea) and around polar angle.\n\nRESULTS: We observed the expected performance variations across eccentricity and around polar angle. Performance declined with eccentricity, driven by decreased gain and nonlinearity alongside increased internal noise. Observers with stronger eccentricity effects showed greater gain decreases. Crucially, only gain varied with polar angle—it was higher along the horizontal than the vertical meridian, and along the lower than the upper vertical meridian. These gain asymmetries became more pronounced at further eccentricity and higher spatial frequency, directly paralleling performance asymmetries.\n\nCONCLUSION: This dissociation aligns with known variations in neuronal count and tuning. By revealing distinct system-level computations underlying performance differences along eccentricity and around polar angle, our findings link perceptual phenomena to neural architecture. This link provides insights into how the human brain encodes information under neural constraints and refines models of human perception.", "SubmissionID": 418.0}, {"Day": "Thursday", "Time": "14:30", "Session": "Symposium: Perception as Inference Across Scales — from natural scene statistics to neural computation and clinical translation", "Room": "Bayview Suite", "Title": "Adapting to sensorimotor delays in continuous motor control tasks", "Speaker": "Loes van Dam", "CoAuthors": "Celine Honekamp", "Abstract": "With the increased use of human-machine technologies, we are also increasingly more exposed to sensorimotor delays. For instance, when initiating an action using a prosthetic or teleoperation tool or even our own hand in Virtual Reality (VR), the visual feedback of that action generally occurs at a delay as the system needs time to process the user input into an output. Such delays can vary from a few to several hundreds of milliseconds depending on the complexities involved, and the sensorimotor system somehow must deal with these delays for movement planning. In some cases, slowing down movements to let the feedback catch up can help in performing a visuomotor task, in other cases exposure to delay will lead to a shift in perceived timing through delay adaptation.\nHere we will particularly focus on delay adaptation in continuous movement tasks such as target tracking and interception. We show that delay adaptation occurs only in particular conditions that limit the solution space to requiring a temporal shift to increase performance and where the environment provides information that allows prediction of the target movement ahead of time. Furthermore, transfer of delay adaptation is limited to conditions that use the same control input even if the visual display for the task and feedback remains the same, but can survive spatial offsets between hand and controlled object locations in VR. Moreover, repeated exposure to the delay can lead to behavioural and/or perceived time-shift savings depending on the task.\nIn short, delay adaptation for continuous movements strongly depends on the interplay of the control device, visuomotor task and the environment in which the task is to be performed. These findings are of particular importance for the further development of prosthetic, teleoperation and virtual reality tools and the environments in which they are to be used.", "SubmissionID": ""}, {"Day": "Thursday", "Time": "14:45", "Session": "Perception and Action", "Room": "Tregonwell Hall", "Title": "High lights and low lights: A dissociation between illumination and contrast in obstacle avoidance", "Speaker": "Martin Giesel", "CoAuthors": "Constanze Hesse", "Abstract": "Previously, we showed that safety margins during manual obstacle avoidance increase under mesopic lighting. In many XR applications, users interact with the environment without seeing their real hands, instead relying on virtual representations. We investigated in two experiments how illumination and obstacle contrast affect safety margins when avoiding virtual obstacles with virtual hand representations. Participants performed an obstacle avoidance task in a mirror setup. A virtual cuboid appeared as a mirror reflection in the workspace. Motion tracking markers on the index finger and the ulnar side of the hand were visualised as two rectangles moving in the x-y plane. In Experiment 1 (N=25), workspace and obstacle illumination was either high or low. In Experiment 2 (N=24), overall illumination was low, but the area beneath the obstacle had either high or low contrast relative to the background. In both experiments, collision feedback was manipulated: the area beneath the obstacle turned red upon contact. Safety margins were affected by illumination and contrast in opposite ways. Replicating our previous findings, safety margins were larger under low illumination even with virtual hands. In contrast, safety margins were larger for high-contrast obstacles. Collision feedback also increased safety margins. Our findings indicate that only illumination levels in the mesopic range increase sensory uncertainty. The increased safety margins for lower light levels might therefore be an automatic response to increased noise in the perceptual system. Manipulating contrast levels changes the saliency of the obstacle. Increased saliency of the obstacle might be seen as a warning signal which overshadows the light level effect. Overall, these findings show that safety margins are not determined by uncertainty alone, but by context-dependent interpretations of risk. (Supported by ESRC grant ES/V005170/1 to CH)", "SubmissionID": 466.0}, {"Day": "Thursday", "Time": "14:45", "Session": "Spatial Vision", "Room": "Purbeck Lounge", "Title": "Testing models of peripheral vision", "Speaker": "Ece Yatikci", "CoAuthors": "Ben Lonnqvist, Clementine Levy-Fidel, Marco Bertamini, Michael H. Herzog", "Abstract": "Peripheral vision is worse than foveal vision in terms of spatial resolution, which is often modelled by blur. If blur were the main determinant, then all tasks should be affected in the same way. We examined this hypothesis with two tasks: the Honeycomb illusion (Bertamini et al., 2016), in which fine barbs disappear in peripheral vision while global structure remains visible, and a visual pop-out task, which requires the preservation of the odd-one-out target. The same observers (N = 20) completed both tasks. We first fitted the parameters of an eccentricity-dependent blur model to performance in the Honeycomb task and then tested whether these parameters generalised to the pop-out task. The model captured key aspects of barb disappearance but failed to account for search performance. We then trained autoencoders with latent bottlenecks as models of compression. Two of the four models reproduced barb disappearance in the Honeycomb illusion, but none preserved the pop-out target. Hence, models that explained one task failed on the other. These findings show that candidate models of peripheral representation do not generalise across tasks and thus argue against a single representational constraint, such as blur or compression, as a sufficient account of peripheral perception.", "SubmissionID": 130.0}, {"Day": "Thursday", "Time": "14:45", "Session": "Symposium: Perception as Inference Across Scales — from natural scene statistics to neural computation and clinical translation", "Room": "Bayview Suite", "Title": "Exploring the effects of spatial mismatches in teleoperation", "Speaker": "Emily Crowe", "CoAuthors": "Gift Odoh, Daniel Torres Ruiz, Robert J. Houghton, Harun Tugal & Ayse Kucukyilmaz", "Abstract": "Teleoperation has been, and is likely to remain, a widely used approach for remote control across many sectors (e.g., nuclear energy) despite increasing interest in AI/ML-based automation. During teleoperation, humans are faced with a fundamentally different visuomotor control loop whereby the human and robot are operating in completely different workspaces. A consequence of this is that visual information about the remote workspace (e.g., robot arms, target objects) must be relayed back to the operator via multiple camera feeds. In a qualitative project, we investigated the difficulties experienced by teleoperators in the nuclear energy industry when having to rely on such camera feeds to guide their movements. Think-aloud procedures, cognitive work analyses, and critical decision method inte
