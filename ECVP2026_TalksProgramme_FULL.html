ng the use of N1 latency as a neural marker of chromatic sensitivity.", "SubmissionID": 350.0}, {"Day": "Tuesday", "Time": "14:15", "Session": "Symposium: Vision on the Move: From Eye Movements to Visual Encoding (and back)", "Room": "Bayview Suite", "Title": "From monocular input to binocular action: How pre-saccadic motion shapes post-saccadic following", "Speaker": "Nina M. Hanning", "CoAuthors": "Martin Rolfs", "Abstract": "The active visual system integrates pre-saccadic visual information to guide post-saccadic action. A key marker of this is the post-saccadic following response (PFR) – a short-latency drift of gaze in the direction of perceived motion immediately after saccade landing. Here, we tested whether PFR strength depends on monocular versus binocular motion input, using the physiological blind spot as a manipulation of monocular visibility.\n\nWe first localized each participant’s blind spot in both eyes. Participants then made centrally cued saccades to peripheral apertures containing random dot motion tangential to the saccade direction. Stimuli were presented either binocularly or such that motion was visible to only one eye (falling within the blind spot of the other). Motion either remained visible after saccade landing or was removed during the saccade, isolating the contribution of pre-saccadic information.\n\nWe observed a robust PFR that persisted when motion was removed mid-saccade, confirming its reliance on pre-saccadic information. Critically, PFR gain was reduced under monocular viewing. Moreover, we observed a brief interocular asymmetry in the early post-saccadic interval: the eye that received pre-saccadic motion input showed a stronger initial drift than the other eye – indicating that, at least briefly, post-saccadic motor output may not be fully yoked across the eyes.\n\nThese findings point to eye-specific contributions to post-saccadic motor output and indicate that early post-saccadic drift can be modulated independently in each eye. This challenges the assumption that smooth drift responses (like the PFR) are strictly binocular at the motor level and suggests that pre-saccadic motion exerts eye-specific influence on motor output weighted by binocular reliability. This raises the possibility that early post-saccadic drift provides a valuable window into how the brain transitions from monocular input to binocular action – and that this transition may not be instantaneous.", "SubmissionID": ""}, {"Day": "Tuesday", "Time": "14:30", "Session": "Face Perception and Recognition", "Room": "Tregonwell Hall", "Title": "Impaired face identity recognition in horizontally compressed identities", "Speaker": "Alexandros Venetis", "CoAuthors": "Bruno Rossion", "Abstract": "Human face identity recognition (FIR) is a fundamental social ability driven by specialized neural pathways. While earlier behavioral studies suggested that FIR is surprisingly resistant to horizontal image compression—implying that spatial configurations may be secondary to recognition—those conclusions were largely based on accuracy rates for familiar faces during long response intervals. To provide a more objective assessment, we utilized electroencephalography (EEG) to track implicit neural markers in twenty-one participants as they viewed unfamiliar faces at five varying compression levels (0% to 90%). Although robust recognition signals were recorded over the occipito-temporal cortex at low levels of distortion (0–22%), these responses progressively diminished as compression increased, reaching near-total suppression at 90%. These results indicate that, unlike artificial intelligence models that adapt efficiently to linear transformations, the human visual system is significantly hindered by geometric distortion, providing evidence that spatial cues are indeed vital for identity recognition.", "SubmissionID": 259.0}, {"Day": "Tuesday", "Time": "14:30", "Session": "Colour Vision", "Room": "Purbeck Lounge", "Title": "Journey into colour naming space: From 2D cone contrasts to 3D categories", "Speaker": "Anya Hurlbert", "CoAuthors": "Ilgin Cebioglu, Gabriele Jordan", "Abstract": "One person’s blue might be another’s green, or even white. Individual variation in colour naming occurs within all colour vision types, masking differences between individuals with colour vision deficiency (CVD) and normal trichromats (NT). Indeed, dichromats may deploy a similar range of colour terms to normal trichromats (Broackes 2010; Moreira et al. 2013), beyond the predicted hues “blue” and “yellow” of their cone-contrast spaces. Here we construct individual colour naming spaces that capture and quantify variations within and between colour vision (CV) types. As previously described (Hurlbert et al., ECVP 2025), colour naming was assessed with a forced-choice task. Participants (83 NT; 18 anomalous trichromats; 14 dichromats) selected the single best name of 11 basic colour terms (black, white, red, green, yellow, blue, brown, orange, pink, purple, gray) for each of 371 distinct colour samples successively presented against a large neutral background on a calibrated LCD monitor. Stimulus colours spanned 40 Munsell hues, 8 Chroma levels and 9 Values. For each participant, for each basic colour term, the convex hull enclosing all coordinates (in CIELAB or colour vision type-tailored cone-contrast space) named with that term was computed. The set of 11 convex hulls formed the individual participant’s colour naming space. For a given CV group, the average colour naming space was computed by averaging the individual convex hulls per category over the group.  An individual’s naming concordance with a given group was calculated from the intersection between the individual’s and the group average’s category convex hulls.  Colour category concordances with the NT group, computed in the 3D normal trichromat space (CIELAB), varied across basic colour terms for both normal trichromats and CVD individuals, and were significantly correlated between all CV groups. In particular, the colour naming space for dichromats exhibited 3D structure that was not explained by 2D cone-contrast coordinates.", "SubmissionID": 479.0}, {"Day": "Tuesday", "Time": "14:30", "Session": "Symposium: Vision on the Move: From Eye Movements to Visual Encoding (and back)", "Room": "Bayview Suite", "Title": "Feedback and feedforward contributions to perceptual stability during self-motion", "Speaker": "Antonella Pomè", "CoAuthors": "Eckart Zimmermann", "Abstract": "Active vision requires the brain to maintain coherent perceptual estimates despite continual self-induced changes in retinal input. This implies that visual encoding is not purely feedforward, but is shaped by the integration of sensory evidence with efference-copy–based predictions generated by internal forward models. A key contribution will examine how these predictions support perceptual continuity and produce history-dependent biases, and how their impact depends on the degree of voluntary control over visual sampling. By manipulating prediction precision and sensory uncertainty across complementary paradigms, the work will quantify effects on perceptual stability and serial dependencies. Extending these measurements to atypical visual behavior will test whether observed differences arise from altered predictive signals, altered sensory encoding, or differences in how prediction and evidence are combined.", "SubmissionID": ""}, {"Day": "Tuesday", "Time": "14:45", "Session": "Face Perception and Recognition", "Room": "Tregonwell Hall", "Title": "Fine-grained face race categorization shifts after virtual race embodiment", "Speaker": "Pauline Schaller", "CoAuthors": "Steve Katembu, Sotaro Taniguchi, Junhao Jiang, Anne-Raphaëlle Richoz, Akira Sarodo, Charles Obadiah Kimamo, Katsumi Watanabe, Roberto Caldara", "Abstract": "Social identity fundamentally shapes human interactions. Yet, its specific impact on visual processes remains poorly understood. A well-documented phenomenon is the Other-Race Categorization Advantage (ORCA), whereby individuals categorize other-race faces more efficiently than same-race faces. However, whether this effect is driven by perceptual expertise, social group affiliation, or an interaction between the two remains unclear. To address this question, we used a novel and promising methodological tool: Virtual Reality (VR). A large cross-cultural sample (N > 250) from Kenya, Japan, and Switzerland was embodied in avatars that either matched or differed from the participants’ natural race group. To enhance the illusion of virtual body ownership, participants completed three interactive tasks with visuotactile and visuomotor feedback. Race categorization performance was assessed pre- and post-embodiment using both race-prototypical and a continuum of race-morphed stimuli. The results revealed that embodiment did not modulate the ORCA, suggesting that rapid categorical processing of prototypical face race is robust to short-term changes in social identity. Conversely, embodiment reliably impacted the categorization of ambiguous race-morphed faces. Participants embodied in an other-race avatar were more likely to categorize ambiguous faces as belonging to their natural race group. These findings suggest that transient shifts in social identity selectively recalibrate fine-grained visual race boundaries without affecting robust categorization by race of prototypical faces. This study also highlights the value of VR embodiment as a tool for manipulating social identity and opens new avenues for investigating the interplay between group membership and visual processing, with potential implications for interventions targeting biases in face processing.", "SubmissionID": 395.0}, {"Day": "Tuesday", "Time": "14:45", "Session": "Colour Vision", "Room": "Purbeck Lounge", "Title": "Colour representations in the ventral visual pathway", "Speaker": "Jenny Bosten", "CoAuthors": "Ian Pennock, Ana Rozman, Chris Racey", "Abstract": "Colour information in natural scenes is highly correlated with other low and high level visual attributes such as entropy, fractal dimension, the presence of particular spatial features, and object and scene categories. If the visual system is sensitive to these reliable contingencies in inputs, intermediate and high-level colour representations in the brain may be in conjunction with spatial image attributes. We present recent work from our lab that has used neuroimaging to investigate joint colour-spatial representations in anterior visual areas. Using the Natural Scenes fMRI dataset we have used correlations between colour and other image properties to reveal functional distinctions in stimulus-provoked brain responses. We found that colour-biased regions in the ventral visual pathway are food-selective – now termed the ‘ventral food streams’. Since colour is a particularly reliable attribute of food (e.g., foodstuffs are often canonically coloured), we conducted several experiments using EEG and fMRI to attempt to isolate the colour tuning of joint colour-spatial representations in anterior visual areas. We describe the results of these studies, which have so far produced tuning functions which are quite noisy and variable. We discuss possible next steps in research to better isolate jointly tuned colour-spatial visual mechanisms.", "SubmissionID": 579.0}, {"Day": "Tuesday", "Time": "14:45", "Session": "Symposium: Vision on the Move: From Eye Movements to Visual Encoding (and back)", "Room": "Bayview Suite", "Title": "Temporal dynamics of visual processing during the course of fixation", "Speaker": "Cristina de la Malla", "CoAuthors": "Martina Poletti", "Abstract": "During natural scene inspection, vision unfolds through sequences of saccades and brief fixation periods. Although information is processed across the visual field during fixation, the temporal evolution of this processing and the interplay between foveal and extrafoveal processing remain incompletely characterized. We first investigated whether the time course of change localization during fixation differs across regions of the visual field. Participants made a saccade toward a fixation point surrounded by four bars that could be located either all in the fovea (0.3º of eccentricity), all in the periphery (9º of eccentricity), or two in the fovea and two in the periphery. Upon saccade landing, one of the stimuli briefly changed its orientation, and at the end of the trial participants reported the location of the moving stimulus. While foveal change localization remained relatively stable throughout fixation, at 9º performance markedly improved over time. When foveal and peripheral stimuli were monitored simultaneously, a similar pattern emerged: peripheral performance showed a pronounced recovery during fixation, whereas foveal performance remained stable. To determine if this temporal modulation follows a graded, eccentricity-dependent profile, in a second study stimuli were presented at different eccentricities (0.3º, 2º, 6º, 15º), either in isolation or split across two eccentricities. Performance improved over time during the course of fixation, with larger improvements at greater eccentricities. When two eccentricities were monitored simultaneously, early fixation performance favored stimuli closer to the center of gaze, but peripheral performance rapidly recovered, following a time course comparable to when tested alone. Together, these findings reveal that fixation is not a static processing window but a dynamic period in which visual processing recovers following saccades in a graded, eccentricity-dependent manner. Peripheral processing appears to incur an early post-saccadic cost that is progressively compensated during fixation, highlighting fundamental spatiotemporal constraints in active vision.", "SubmissionID": ""}, {"Day": "Tuesday", "Time": "15:00", "Session": "Face Perception and Recognition", "Room": "Tregonwell Hall", "Title": "What makes a face difficult to remember?", "Speaker": "Erling Nørkær", "CoAuthors": ", Christian Gerlach, Randi Starrfelt", "Abstract": "Individuals vary in their ability to learn, recollect and recognize facial identity. However, face memory variability related to difficulty of the stimuli themselves is rarely considered.\n\nThe aim of this study was twofold: (1) to investigate whether a gradient of trial difficulty exists on one of the most commonly used tests of unfamiliar face memory; and (2) to relate this potential difficulty gradient to the performance of a deep learning model in order to identify a structuring principle for face stimuli difficulty.\n\nWe tested 599 adult UK participants online with the Cambridge Face Memory Test (CFMT; Duchaine & Nakayama (2006)), in which participants must learn the identity of six novel identities (Phase 1), recognize them among distractors (Phase 2) and finally recognize them under degraded conditions (Phase 3).\n\nIn order to determine if a difficulty gradient for the 54 recognition trials (Phase 2 and 3) exists, we fit trial-level responses to a two-parameter Item Response Model (Lord, 1980). Then, we investigated whether this difficulty gradient corresponded with trial-by-trial performance in a deep learning model for face recognition (FaceNet, Schroff et al. (2015)), by correlating the IRT-derived trial difficulty parameters with the mean Euclidean distance between 128-dimensional vector embeddings of the target and distractor faces on each trial.\n\nWe found substantial variability in difficulty across the 54 CFMT recognition trials (difficulty parameters ranging from -2.31 to 0.91), indicating that the CFMT trials form a graded continuum of recognizability. Further, this difficulty gradient correlated significantly (r = -.37, p = .006) with the mean Euclidean target-distractor embedding distance.\n\nThese results suggest that the established gradient of face stimuli difficulty is statistically related to recognition based on deep learning. On that basis, deep learning models may inform the calibration of difficulty of new experimental paradigms and clinical assessments of face recognition ability.", "SubmissionID": 453.0}, {"Day": "Tuesday", "Time": "15:00", "Session": "Colour Vision", "Room": "Purbeck Lounge", "Title": "Decoding Illusory Colour from Training on Colorimetric Colour: Evidence for Shared Neural Signals Around 300 ms", "Speaker": "Nuzhah Saumtally", "CoAuthors": "Anna Metzger, Geza Ambrus, Matteo Toscani", "Abstract": "A central unresolved question is whether the brain represents illusory colour using the same neural code as physical colour, and at what time any such shared representation emerges.\n\nThe present study addressed this question using EEG and MVPA. Participants viewed a modified Lotto and Purves cube illusion in which a central grey patch appeared yellow under a blue illuminant and blue under a yellow illuminant, embedded in a larger contextual cube. We successfully decoded illusory colour from occipital activity, with reliable evidence emerging around ~300ms after stimulus onset (BF >10). Importantly, decoding peaks aligned in time with those obtained for colourimetric colour stimuli.\n\nTo test whether this effect depends on luminance information, we also included an isoluminant condition in which only chromatic information was available. In this case, decoding of illusory colour was weaker, with only modest Bayesian evidence (BF>3), suggesting that colour-only signals are sufficient to carry some but not strong information about the illusion, and that luminance contributes substantially to the full effect.\n\nIn a grayscale condition, where only lightness variation was present, decoding was still possible (BF>10) but emerged much earlier, around ~100ms, consistent with previous research suggesting early processing of lightness constancy (MacEvoy, & Paradiso, 2001). Finally, a simultaneous contrast condition, in which the patch was presented on a uniform background defined by the mean scene chromaticity, produced a temporal profile closely resembling the full Purves condition, again with decoding emerging around ~300ms (BF>10).\n\nTogether, our results suggest that colour constancy mechanisms can give rise to neural representations that closely resemble those evoked by physically defined colour, emerging relatively late. However, the comparable profile with simultaneous contrast suggests that decoding may not capture scene interpretation-related colour constancy mechanisms. The results argue that cross-decoding between physical and illusory conditions can be supported by non-chromatic scene features.", "SubmissionID": 592.0}, {"Day": "Tuesday", "Time": "15:15", "Session": "Face Perception and Recognition", "Room": "Tregonwell Hall", "Title": "Generalisation of Familiarity‑Related Neural Patterns to Emotional Facial Expressions", "Speaker": "Madeline Molly Ely", "CoAuthors": "Géza Gergely Ambrus", "Abstract": "While emotional expressions are theorised to modulate face familiarity, their shared neural dynamics remain unclear. In this secondary analysis of openly available EEG data, we used cross-dataset multivariate pattern analysis (MVPA) to test whether neural representations of familiarity generalise across emotional expressions. Data was drawn from two previously published experiments: an emotion categorisation task, in which 24 participants completed a two-alternative forced-choice task on facial expressions (happy, angry, sad, neutral; 384 trials), and a familiarity task, in which 22 participants viewed personally familiar and unfamiliar faces (100 trial-unique images) alongside an orthogonal attention task.\n\nClassifiers trained to distinguish familiar versus unfamiliar faces were cross-applied to emotional expression data, and vice versa, using re-labelling strategies (e.g., angry = familiar, neutral = unfamiliar). This approach enabled assessment of shared representational structure independent of task demands.\n\nResults showed that angry expressions aligned most strongly with familiarity-related neural patterns, with sustained cross-classification accuracy emerging from approximately 200 ms post-stimulus and peaking over posterior electrodes (Cohen’s d = 1.35). Happy and sad expressions exhibited weaker and more transient associations within the 200-400 ms window, while neutral expressions consistently aligned with neural signatures of unfamiliarity.\n\nThese findings support behavioural accounts of threat prioritisation, suggesting that threat-related facial expressions recruit neural representations that overlap with familiarity processing. Overall, the results provide evidence for partially overlapping neural mechanisms underlying affective evaluation and identity processing in face perception.", "SubmissionID": 380.0}, {"Day": "Tuesday", "Time": "15:15", "Session": "Colour Vision", "Room": "Purbeck Lounge", "Title": "A Behavioural Task to Measure Cone-Opponent Mechanisms", "Speaker": "Rio Coleman", "CoAuthors": "Christoph Witzel", "Abstract": "Colour opponency is a fundamental property of the human and many animal visual systems. Textbooks have long assumed that afterimages are colour-opponent and can be used to demonstrate this function. However, this idea has recently been refuted (Witzel, Communications Psychology, 2025), raising the question of how colour opponency can be demonstrated and investigated in a straightforward behavioural task.\n\nWe introduce opponent flicker fusion to directly probe cone-opponency. This new technique leverages the perceptual mixture of alternating colours at high temporal frequencies (heterochromatic flicker fusion). Opponent colours produce an achromatic percept when mixed; therefore, when such colours are alternated at high temporal frequency, they yield neutral grey. Opponent flicker fusion measures opponent colour pairs that produce grey by allowing observers to adjust the hue and saturation of one of two flickering colours until the flicker disappears against the isoluminant grey background. In one experiment, we sampled the fixed reference colour along an isoluminant hue circle in cone-opponent DKL space. As predicted, colours adjusted by observers to neutralise the referents corresponded to the cone-opponent colours along the hue circle. In a second experiment, adjusted colours were also cone-opponent when referent colours were sampled non-uniformly in cone-opponent space, thus excluding potential artifacts of the sampling method. A third experiment showed that opponent flicker fusion also worked with a temporal frequency below luminance flicker fusion (15Hz) after luminance flicker is neutralised through additional luminance adjustments. These results show that opponent flicker fusion allows probing the postreceptoral, second stage of colour processing because the separation between luminance and chromatic channels does not exist in the photoreceptors.  \n\nOpponent flicker fusion contrasts with the triangular distribution of afterimage colours that reflect cone adaptation at the first stage of colour processing. Together, afterimages and opponent flicker fusion provide behavioural tools to probe the physiological stages of colour processing.", "SubmissionID": 93.0}, {"Day": "Wednesday", "Time": "10:30", "Session": "Visual Search and Foraging", "Room": "Tregonwell Hall", "Title": "Overcoming the Reliability Paradox: A Psychometric Evaluation of an Object Foraging Task", "Speaker": "Irina Ovchinnikova", "CoAuthors": "Inga María Ólafsdóttir, Heida Maria Sigurdardottir", "Abstract": "Cognitive tasks that effectively detect group differences often perform poorly at detecting individual differences: the reliability paradox. This happens because tasks designed to maximize group or condition differences actively suppress the between-person variance that individual-differences research depends on. Visual object discrimination varies across individuals and develops throughout childhood, yet the tasks used to measure it have rarely been evaluated for psychometric adequacy.\n\nСhildren (N = 310, ages 4 - 8) completed a visual object foraging task. On each trial, children foraged through a display of 9 targets among 9 distractors. Item pairs were either from different object categories (basic-level) or the same category (subordinate-level); a control condition used black and white circles. Performance was measured as correctly selected targets per second. The visual similarity between items was quantified using activation patterns from the CORnet-S neural network, as well as human ratings for shapes and features.\n\nThe object discrimination task overcomes the reliability paradox, as it produces both large developmental effects and reliable individual differences. The task demonstrated excellent internal consistency and high alternate forms reliability across sessions with different stimulus sets. Stable between-person differences accounted for a substantially larger proportion of trial-level variance than is typically observed in classic cognitive paradigms. Explanatory IRT models revealed that item difficulty was driven by shape dissimilarity for basic-level trials and by feature dissimilarity for subordinate-level trials. The difficulty rankings were highly stable across age groups. Interestingly, native and non-native speakers had differential item functioning for basic but not for subordinate discrimination, and girls and boys showed differential item functioning for both types of object discrimination. A short form of 18-item pairs retained excellent reliability (< 5 minutes of testing). \n\nThese findings provide a psychometric foundation for prior and future research using this paradigm. The language-independence at the subordinate level makes it well-suited for cross-linguistic applications.", "SubmissionID": 165.0}, {"Day": "Wednesday", "Time": "10:30", "Session": "Symposium: Beyond local features: Spatiotemporal structure in perception and neural processing", "Room": "Purbeck Lounge", "Title": "Seeing the trees through the forest: Spatiotemporal routines in visual cognition", "Speaker": "David Pascucci", "CoAuthors": "Árni Kristjánsson", "Abstract": "Perception and cognition unfold within richly structured spatiotemporal environments. Despite this, research in these domains often relies on paradigms that isolate stimuli from their natural context. In this talk, I argue that even the most fundamental perceptual functions are inherently shaped by spatial and temporal structure. Drawing on examples from vision, attention, memory, and decision-making, I outline shared computational principles through which spatiotemporal context shapes perception and cognition. I further show how classic phenomena can be revisited when contextual factors, such as visual statistics, are taken into account. Finally, I introduce the concept of spatiotemporal routines: canonical mechanisms that integrate spatial and temporal structure to guide perception and behavior.", "SubmissionID": ""}, {"Day": "Wednesday", "Time": "10:30", "Session": "Visual Illusions, Hallucinations, and Visual Awareness", "Room": "Bayview Suite", "Title": "Seeing without saying: ERP signatures of visual awareness beyond report", "Speaker": "Chiara Mazzi", "CoAuthors": "Nicola Ciavatti, Elisabetta Colombari, Ilaria Siviero, Annalisa Pascarella, Silvia Francesca Storti, Silvia Savazzi", "Abstract": "A major challenge in the search for the neural correlates of consciousness is distinguishing electrophysiological signatures of perceptual awareness from activity related to report, decision-making, and other post-perceptual processes. No-report paradigms provide a critical tool for minimizing these confounds and identifying neural signals that more directly track conscious visual experience.\n\nIn Experiment 1, we recorded EEG while participants viewed Mooney images, taking advantage of their disambiguation effect: initially ambiguous two-tone stimuli become readily recognizable after presentation of the corresponding original image. This design allowed us to compare unaware and aware perceptual phases under both report and no-report conditions. Behavioral results confirmed a reliable perceptual transition, with recognition and naming accuracy increasing from the unaware to the aware phase. ERP analyses focused on the Visual Awareness Negativity (VAN) and the Late Positivity (LP). A robust VAN emerged in the contrast between aware and unaware trials, regardless of report demands. By contrast, the LP was strongly attenuated in the no-report condition, suggesting that this later effect is shaped largely by post-perceptual demands rather than by awareness itself.\n\nBuilding on Experiment 1, which dissociated awareness-related activity from report demands, Experiment 2 tested whether this activity also tracks the psychometric dynamics of perceptual emergence. To do so, we parametrically manipulated stimulus recognizability by gradually increasing the grayscale contribution to Mooney images across alpha levels. Preliminary results indicate that awareness-related ERP activity scales as a logistic function of alpha level, mirroring the psychometric profile of perceptual recognition rather than reflecting simple linear changes in physical input.\n\nTogether, these findings support the VAN as a strong candidate neural marker of visual awareness and show that combining no-report paradigms with parametric manipulations of recognizability provides a powerful approach for isolating neural activity genuinely linked to conscious perception.", "SubmissionID": 116.0}, {"Day": "Wednesday", "Time": "10:45", "Session": "Visual Search and Foraging", "Room": "Tregonwell Hall", "Title": "Individual Priors Shape Real-World Object Search", "Speaker": "Susan Ajith", "CoAuthors": "Daniel Kaiser, Lu-Chun Yeh", "Abstract": "Real-world objects vary widely in appearance. With each person experiencing a different visual diet, the variability represented for a given object differs between individuals. For example, when thinking about clocks, some people might picture an analogue template (e.g., a round clock face), whereas others might think of a digital one (e.g., a rectangular display). This raises the question: how do people use their own prior knowledge while searching for an object whose exact appearance is unknown? Here, we used human drawings to investigate how object templates vary across people. Across two experiments, we demonstrate that idiosyncrasies in object templates predict individual differences in visual search performance. In Experiment 1, participants drew four exemplars from each of 12 real-world object categories before performing a cued search task in which they indicated whether the target category was present or absent. Using a deep neural network (DNN), we computed similarity between each drawing and target stimulus per trial and correlated it with the reaction time for each participant. Our results showed that higher similarity between a participant's own template and the target predicted faster search performance. Critically, templates were prioritised based on drawing order, with participants' first drawing serving as the strongest predictor of their search performance. Furthermore, individuals' own drawings predicted their search better than other participants' drawings, revealing that idiosyncratic object templates shape search behaviour. In Experiment 2, we replicate this effect in a foraging task. Here, participants drew exemplars of 5 object categories followed by a visual foraging task with large object arrays containing multiple targets from the same category. We show that participants systematically utilize their own most prioritized templates as they forage. Together, our findings indicate that search differs across people as a function of their prior experience with objects and their variability in the world.", "SubmissionID": 241.0}, {"Day": "Wednesday", "Time": "10:45", "Session": "Symposium: Beyond local features: Spatiotemporal structure in perception and neural processing", "Room": "Purbeck Lounge", "Title": "Binding for whom? From features and observers to action in a structured world", "Speaker": "H. Steven Scholte", "CoAuthors": "", "Abstract": "The symposium challenges \"brick-by-brick\" views of visual processing by emphasizing spatiotemporal context. I argue this critique doesn't go far enough. The problem isn't that features need context—it's that \"features\" and \"binding\" are artifacts of a paradigm we should leave behind.\n\nThe binding problem asks how separately processed features are combined into coherent percepts. But this question presupposes that features exist as separable primitives and that perception culminates in a representation for an observer. Both assumptions are unnecessary. Visual systems are tuned not to local features but to the statistical structure of the natural world, shaped by evolutionary and developmental history. In this framework, there are no segregated features requiring recombination—binding is a solution to a problem the brain only has for a small part of its processing.\n\nMore fundamentally: binding for whom? The question presupposes a Cartesian observer for whom features must be assembled. Yet the brain contains no such privileged viewpoint—let alone the proliferation of observers that binding theories quietly require, one for each operation that must be 'read' by something further downstream. The neuroconnectionist framework—using deep neural networks to express and test hypotheses about brain computation—replaces \"are features bound?\" with \"can downstream circuits drive appropriate action?\", dissolving binding into questions about information accessibility for behavior.\n\nI discuss findings—from lesion studies, neural networks, and classic binding errors—that remain puzzling within the classical framework but become coherent and actionable once we abandon it.", "SubmissionID": ""}, {"Day": "Wednesday", "Time": "10:45", "Session": "Visual Illusions, Hallucinations, and Visual Awareness", "Room": "Bayview Suite", "Title": "People with more vivid visual imaginations are more likely to perceive illusory faces in objects", "Speaker": "Loren Bouyer", "CoAuthors": ", Derek Arnold, Jessica Taubert", "Abstract": "Differences in the vividness of visual imagery provide a window into how internally generated signals shape conscious perception. One unanswered question is the degree to which the vividness of visual imaginations can alter our perceptual experiences of the world. Here, we tested whether individual variation in imagery vividness predicts susceptibility to face pareidolia, an illusion in which faces are falsely perceived in inanimate objects.  Participants rated how face-like images of objects appeared and completed a standard measure of imagery vividness. Imagery vividness did not predict face-likeness ratings for canonical pareidolia images that strongly signal the presence of a face. However, imagery vividness positively predicted the tendency to report faces in non-face objects. These findings indicate that more vivid visualisers are more likely to impose face structure on ambiguous sensory input, consistent with stronger top-down influences on perception. Together, the results suggest that individual differences in imagination shape how strongly prior expectations bias perceptual decisions under uncertainty.", "SubmissionID": 181.0}, {"Day": "Wednesday", "Time": "11:00", "Session": "Visual Search and Foraging", "Room": "Tregonwell Hall", "Title": "Proactive deployment of attention in ageing: fixation-related neural dynamics during enhancement and inhibition of spatial priority", "Speaker": "Milena V. Rota", "CoAuthors": "Jinhui Hu, David Souto, Matias Ison, Douglas J. Barrett", "Abstract": "Visual attention is shaped not only by stimulus salience and current attentional goals, but also by statistical regularities in the environment. Repeated experience with target and distractor locations induces lasting plasticity in spatial priority maps, facilitating target selection at high-probability locations (proactive enhancement) and suppressing likely distractor locations (proactive inhibition). While enhancement-based learning appears largely preserved in healthy ageing, evidence suggests that older adults may show reduced capacity to deploy inhibitory attentional templates stemming from a strategic shift toward enhancement-based control.\n\nPreliminary data from our laboratory suggests age-related decreases in saccadic selectivity and processing speed are accompanied by differences in quasi-stable EEG topographies and their transition probabilities during search. These data are consistent with neural alterations in proactive attentional control. To investigate this further, the current study compared younger and older adults on a visual search task combining eye-tracking and EEG.\n\nDisplays contained 8 binary square wave gratings on a grey background with targets differentiated from distractors by orientation. Gratings were masked by multi-grey mosaics using alpha values designed to introduce a fixed level of ambiguity during orientation discrimination. Prior to search, a spatial cue varying in predictability (75% vs. 25% valid) indicated whether a subset of four objects was likely (positive) or unlikely (negative) to contain the target.\n\nWe examine oculometric indices of search efficiency and fixation-related potentials (FRPs) at high and low probability target locations. We predict that proactive enhancement for positive cues will be preserved across age groups, whereas older adults will show attenuated FRP modulation and reduced search efficiency for negative cues, consistent with diminished flexibility in deploying suppression-based templates. These contrasts seek to uncover how ageing affects neural signatures of target selection, evidence accumulation, and evaluation in response to spatial statistical regularities during visual search.", "SubmissionID": 338.0}, {"Day": "Wednesday", "Time": "11:00", "Session": "Symposium: Beyond local features: Spatiotemporal structure in perception and neural processing", "Room": "Purbeck Lounge", "Title": "A half second of spatiotemporal, contextual processing precedes conscious perception", "Speaker": "Michael H. Herzog", "CoAuthors": "", "Abstract": "Classical models of vision assume a largely feedforward process in which a stimulus is presented, propagated along the visual hierarchy, and ultimately gives rise to a conscious percept. Within this framework, consciousness appears as a continuous stream of percepts that closely follows incoming sensory input. Here, we present converging evidence suggesting a different picture: before a stimulus is consciously perceived, the visual system engages in a period of spatiotemporal and contextual integration that can last up to half a second. In addition, behavioral experiments, combined with transcranial magnetic stimulation (TMS) and electroencephalography (EEG), indicate that the conscious perception of a single element is not determined solely by its immediate sensory representation. Instead, perception depends on interactions among elements distributed across the visual field and unfolding over time. Information presented before and after a target stimulus can strongly influence how that stimulus is ultimately perceived. Hence, perception is constructed through extended contextual processing rather than instantaneously read out from the retinal input. We argue that such long unconscious processing periods are necessary to resolve the inherently ill-posed problems of vision, such as luminance, color, and, in particularly motion processing. In addition, segmentation and grouping are time consuming processes that depend on a large number of elements in the visual scene. Only after all these processes are accomplished, a coherent percept is rendered conscious. Conscious perception, therefore, may not reflect the immediate present but rather the outcome of a short period of postdictive processing that integrates events across time and space.", "SubmissionID": ""}, {"Day": "Wednesday", "Time": "11:00", "Session": "Visual Illusions, Hallucinations, and Visual Awareness", "Room": "Bayview Suite", "Title": "Remapping of metric spatial vision by orientation-specific adaptation", "Speaker": "Alan Johnston", "CoAuthors": ", Dan Hu, Kristian Skoczek, Neil Roach, Paul McGraw", "Abstract": "Visual adaptation provides a powerful tool for probing the mechanisms underlying metric spatial perception.  Following adaptation to dynamic spatial patterns, pairs of dots placed in adapted visual field locations appear closer together than identical pairs presented in unadapted locations, indicating a compression of perceived space. Here we examine how adaptation to oriented patterns modulates this effect to investigate the involvement of cortical mechanisms. We report that spatial compression is anisotropic and, surprisingly, greater for dot dipoles aligned with a sine grating spatial frequency sweep adaptor than for dipoles aligned with the luminance gradient. For contrast reversing grating adaptors, compression asymmetry was greatest for low spatial frequency gratings (at 6 Hz) and decreased with spatial frequency up to 8 c/deg, at which point compression was isotropic. For a 3 c/deg grating, compression asymmetry was largely invariant as a function of temporal frequency, whereas compression magnitude decreased with temporal frequency. Compression asymmetry was still present for 60Hz (imperceptible) grating adaptors. The orientation dependence of the effect implicates cortical processing, while its persistence at high temporal frequences suggests adaptation within early visual cortex, likely involving magnocellular inputs to layer 4Cb of V1. We account for these findings using a gain field framework. Specifically, we propose that a global, extrastriate gain field is constructed by spatial aggregation of local V1 responses. The gain field transforms location by means of a ramp weighting function which scales the physical separations and implements a spatial metric mapping physical space onto perceptual space. Adaptation-induced changes in gain produce directional distortions of this metric, leading to corresponding changes in perceived separation and size.", "SubmissionID": 422.0}, {"Day": "Wednesday", "Time": "11:15", "Session": "Visual Search and Foraging", "Room": "Tregonwell Hall", "Title": "All target-matching features of multi-dimensional search targets are prioritised independent of target-relevance: Electrophysiological evidence", "Speaker": "Chris Brown", "CoAuthors": "Xun He, Alina Khomenkova", "Abstract": "When searching for an object, we mentally represent its features as a search template. However, real-world objects often contain multiple identifying features across dimensions, varying in probability and task-relevance. This study investigated whether participants represent multifaceted objects using only their most probable and relevant features. Participants searched for target categories defined by multiple shapes (dresses, shirts) and colours (purple, green), where one feature per dimension appeared on two-thirds of trials (high probability) and the other on one-third (low probability). It was hypothesised that participants would adopt a 'good enough' template, prioritising only the most probable and task-relevant features. To probe which features were represented, isolated features were extracted from the targets and presented as task-irrelevant visual probes acting as either spatially valid or invalid cues to target location. Task-relevance was manipulated across three experiments (all Ns = 20): Experiment 1 made shape relevant (identifying an embedded line's orientation), while Experiments 2 and 3 made colour increasingly relevant (requiring colour congruence judgments, or requiring direct identification of target's colour). Contrary to predictions, behavioural results showed that all partially matching probes influenced spatial attention regardless of feature probability or dimension relevance, producing faster target detection when spatially congruent. ERP data revealed that all probes elicited a late lateralised positive component consistent with the Late Directing Attention Positivity (LDAP), reflecting strategic attentional deployment toward the probe location. Early attentional capture/selection was less consistent: shape probes elicited a large, reliable N2pc across experiments, whereas colour probes produced a weaker and more variable N2pc. These findings suggest that during unpredictable visual search, individuals strategically tune attention toward all potentially relevant features of a multifaceted object, rather than narrowing attention to specific high-probability or task-relevant features alone; and that the depth of processing to utilise these cues may vary across dimensions.", "SubmissionID": 438.0}, {"Day": "Wednesday", "Time": "11:15", "Session": "Symposium: Beyond local features: Spatiotemporal structure in perception and neural processing", "Room": "Purbeck Lounge", "Title": "Traveling Waves as spatiotemporal neural mechanism for perception and attention", "Speaker": "Laura Dugué", "CoAuthors": "Yue Kong, Kirsten Petras, David M. Alexander", "Abstract": "Neural processing unfolds through distributed spatiotemporal dynamics, and can manifest as traveling-wave-like patterns –smooth phase shift across the cortical space. Traveling waves have been observed across species, scales and recording types. Yet, their functional relevance in human is challenged by the methodological constraints inherent to noninvasive recordings. Our work focuses on developing theoretical models and analysis tools to reach a mechanistic understanding of traveling waves for human cognition, and in particular for visual perception and attention. The talk will present our recent research on both meso-scale (within a single visual region) and macro-scale (across the entire cortex) traveling waves. I will show that waves can travel across the primary visual area (V1) and organize perceptual processing over space and time. Additionally, waves can propagate between frontal and visual regions and support inter-areal communication during attentional exploration of visual scenes. Together, I will argue that traveling waves constitute a possible canonical brain computation underlying diverse brain functions.", "SubmissionID": ""}, {"Day": "Wednesday", "Time": "11:15", "Session": "Visual Illusions, Hallucinations, and Visual Awareness", "Room": "Bayview Suite", "Title": "Pupillary Signatures of Lightness After Scene Decomposition", "Speaker": "Matteo Toscani", "CoAuthors": "Abigail Grace Parkinson, Anna Metzger", "Abstract": "Visual illusions are widely used to investigate perceptual mechanisms. A prominent example is the lightness display introduced by Anderson and Winawer (2005): central disks are embedded in cloud-like regions that can be interpreted as occluding layers, producing systematic differences in lightness matches. This has been taken as evidence that the visual system infers reflectance through scene decomposition, effectively separating it from illumination and atmospheric conditions. However, such effects may reflect cognitive interpretation and response biases rather than perceptual inference. Observers may recognise the clouds as a separate surface and ignore them for their lightness matches, rather than experiencing different perceived lightness.\n\nWe used pupillary responses to test whether the effect reflects perception or cognitive interpretation. Twenty participants viewed two versions of the display: one inducing a lighter and the other a darker central disk percept. The physical stimulus was identical across conditions; only contextual interpretation varied. In a control condition, the entire background was rotated, disrupting the border relationships consistent with occlusion and transparency cues and presumably the illusion as well.\n\nIf pupil responses track luminance only, dilation should depend solely on background intensity. Instead, modulation by background luminance was reduced in the illusion relative to the rotated control (F(31,589)=3.598,p<.001), indicating that perceived lightness influences physiological responses. In fact, the image with the dark background is overall less dark when the disk is perceived as light, and the one with the light background is less light with the disk perceived as darker. A cluster-based permutation analysis showed that this modulation emerged in a sustained window starting at~1.8s. Behavioural lightness matches replicated the illusion (F(1,19)=41.14,p<.001).\n\nThese results show that the Anderson and Winawer effect reflects genuine perceptual processing. More broadly, this approach provides an objective (response bias-free) way to validate findings in perception.", "SubmissionID": ""}, {"Day": "Wednesday", "Time": "11:30", "Session": "Visual Search and Foraging", "Room": "Tregonwell Hall", "Title": "Mapping foraging strategy: How information availability shapes spatial exploration in a virtual environment", "Speaker": "Manjiri Bhat", "CoAuthors": "Russell A. Cohen-Hoffing, Anna E. Hughes, Alasdair D.F. Clarke", "Abstract": "Spatial exploration reflects how organisms gather, interpret, and respond to information about their environment. Foraging tasks, in which participants search for multiple targets across a space, provide a useful framework for studying exploration strategies. Here, participants navigated a virtual environment as first-person avatars, searching for items across a series of trials. We examined how movement ability and information availability shape foraging behaviour and developed a generative model to capture these strategies. The model predicts the order in which items are selected using three latent parameters: proximity (bias toward items near the previous selection), momentum (bias toward continued forward movement or reversals), and turning (tendency to turn left or right). We show that proximity and momentum are the strongest predictors of foraging behaviour in this task. We further demonstrate that information availability influences strategy: participants given access to a map were more inclined to reverse direction during search. We also evaluated different target selection rules, finding that a “winner-takes-all” rule outperformed both a stochastic alternative and a simple baseline. Taken together, these results show that our model captures foraging behaviour at the level of individual item selections, and we propose that this framework offers a useful approach for examining the cognitive processes underlying human visual exploration.", "SubmissionID": 56.0}, {"Day": "Wednesday", "Time": "11:30", "Session": "Visual Illusions, Hallucinations, and Visual Awareness", "Room": "Bayview Suite", "Title": "Controlling the content of visual hallucinations through seeded flicker", "Speaker": "John Greenwood", "CoAuthors": "Emma Somerville, Oris Shenyan, Tessa Dekker", "Abstract": "Visual hallucinations induced pharmacologically, clinically, or experimentally often resemble specific geometric forms, including radial spokes/fans, concentric rings, and spirals. These ‘Klüver forms’ have been attributed to intrinsic properties of visual cortex, whereby wave-like activity patterns propagate through retinotopically-arranged lateral connections. Empirical evidence for this link derives from ‘seeded’ hallucinations, where flickering patterns in one visual-field location have been argued to elicit opponent forms in adjacent locations (e.g. spokes induce illusory rings, and vice versa). However, these reports rely on purely qualitative responses, taken in uncontrolled conditions. Here, we used quantitative psychophysical measurements to test whether flickering geometric stimuli can selectively induce spatially-opponent hallucinations in adjacent visual-field locations.\n\n\n\n\nParticipants (n=20 typical adults) viewed 15Hz flickering stimuli (either radial spokes/fans or concentric rings) for 2 minutes. Stimuli were either full field (as in the MacKay effect), foveal patterns with a blank surround, or peripheral patterns with a blank centre. Fixation was monitored. Hallucinatory percepts were reported using button presses, allowing classification as spokes, rings, or mixed forms. Across all conditions, opponent forms were significantly more frequent than congruent forms (e.g. central spoke stimuli induced more illusory peripheral rings than spokes), as predicted. However, this opponency was not exclusive: individual variability and the presence of mixed/irregular percepts demonstrate greater heterogeneity than previously reported. Opponent forms emerged rapidly after stimulus onset, with a slower rise in the frequency of congruent percepts, suggesting an additional role for processes like adaptation. Participant drawings corroborated these findings, revealing both a predominant opponent bias and more complex patterns (e.g. fractal structures) like those induced by unstructured flicker.\n\n\n\n\nOur results provide quantitative support for models in which hallucination content reflects the interaction of stimulus-driven input and intrinsic cortical dynamics, but also highlight the need to incorporate the variability and phenomenological richness of the resulting perceptual states.", "SubmissionID": 186.0}, {"Day": "Wednesday", "Time": "11:45", "Session": "Visual Search and Foraging", "Room": "Tregonwell Hall", "Title": "A neural model of top-down feature guidance of spatial attention", "Speaker": "Sunčica Zdravković", "CoAuthors": "Nataša Mihajlović, Dražen Domijan", "Abstract": "In a singleton search paradigm, a salient distractor can capture attention, even if it is irrelevant. Such a bottom-up strategy can be prevented in a feature search paradigm when the target has a consistent value, allowing for the top-down control to be applied. However, when the task allows for both strategies, bottom-up seems to be preferred, and the participants would use the top-down strategy only to avoid switching between the two. Furthermore, whether a singleton distractor captures attention in a bottom-up manner or salience helps suppress irrelevant stimuli in a top-down manner can be influenced by the independently manipulated salience of the target and of the distractor. \n\nThis particular pattern of data was obtained from our 8 experiments and used to develop a neural model comprising 3 processing stages that emulate interactions among area V4, the inferotemporal (IT) cortex, and the posterior parietal (PP) cortex. Stage 1 is top-down attentional modulation from IT to feature maps in V4. Top-down attention interacts multiplicatively with feature maps, facilitating a relevant feature when a target template is present or suppressing an irrelevant feature when a salient distractor is present. This feedback provides re-entry signals to V4 that bias processing in the feedforward pathway from V4 to PP cortex, guiding spatial attention. Stage 2 is divisive normalization, which computes the contrast or saliency of locations within each feature map in V4. Stage 3 is a decision-making circuit in the PP cortex that selects a location based on the summed output from all feature maps computed in the second stage. Decision-making is modelled as a leaky competitive accumulator. \n\nUsing a single set of parameters, the model correctly predicted the pattern of response times from all our experiments. We propose a comprehensive, yet parsimonious model of attentional deployment under both top-down and bottom-up influences.", "SubmissionID": 215.0}, {"Day": "Wednesday", "Time": "11:45", "Session": "Visual Illusions, Hallucinations, and Visual Awareness", "Room": "Bayview Suite", "Title": "Hybrid images reveal time-dependent neural encoding of competing visual content", "Speaker": "Almudena Ramírez-Haro", "CoAuthors": "Denise Moerel, Genevieve L. Quek, Lina Teichmann, Manuel Varlet, Tijl Grootswagers", "Abstract": "Ambiguous object recognition is usually studied using images that have a single ground truth, for example, by reducing the available information (e.g., deleting or occluding parts of an object) or by adding noise to the image.  Another form of ambiguity consists of encoding the information from multiple object identities in the same visual input, which constitutes a great tool to study the brain’s mechanisms to disambiguate each individual identity. However, less is known about how the visual system resolves objects in images with multiple competing ground truths, as in the case of hybrid images. Using a pre-trained diffusion model that creates visual illusions through noise decomposition, we created hybrid images in which information about two distinct object identities was embedded in the low and high spatial frequency bands (e.g., low spatial frequencies ‘fruits’ and high spatial frequencies ‘parrots’). Alongside control images, we presented these hybrids to 30 observers while we recorded 64 channel EEG and used multivariate decoding to examine which object identity was dominant in the brain as a function of time. The decoding prediction favoured the low spatial frequency object in the early stages of the neural response, but flipped to favour the high spatial frequency object at a later processing stage. These predictions suggest a different prioritisation for the low spatial frequency information compared to the high spatial frequency information. Additionally, we conducted a behavioural categorisation experiment where participants chose whether the image was animate or inanimate. The correlation between the behavioural and the classifier’s categorisation of the images was positive when there was information of the high spatial frequency in the brain. Our work with hybrid images provides new insights into how the object information is carried through the visual system and how the high spatial frequency information drives the final categorisation decision in this case.", "SubmissionID": 149.0}, {"Day": "Wednesday", "Time": "14:00", "Session": "Eye Movements", "Room": "Tregonwell Hall", "Title": "Causal inference across features during transsaccadic integration in humans and RNNs", "Speaker": "Chris Jungerius", "CoAuthors": "Máté Lengyel, Paul Bays", "Abstract": "Transsaccadic integration supports uninterrupted processing of the visual environment by combining presaccadic memory with postsaccadic sensory input. This can be framed as a causal inference problem: integration should depend on the probability of stimulus stability (i.e., that pre- and postsaccadic signals share a common cause). An ideal Bayesian observer solves this by weighing the perceived discrepancy between observations against prior knowledge of sensory uncertainty and environmental volatility. Previous work shows that human observers approximate this process: when viewing stimuli that change during a saccade and reporting the postsaccadic feature value (color or orientation), the presaccadic feature biases perception only when the discrepancy is not too large. \n\nIn natural vision, features are often linked through shared object causes. An ideal observer should therefore use changes in one feature to infer changes in another, depending on their covariance structure. However, humans did not display such cross-feature integration in previous work, possibly because color and orientation covary weakly in natural scenes. Using recurrent neural networks (RNNs) trained on an analogous task, we show that networks approximate ideal observers, exploiting feature covariance when informative. Moreover, the degree of cross-feature integration closely tracks the statistics of the training environment. \n\nWe then extended our behavioral paradigm in a new experiment (n=14) using color and shape, which may share richer covariance. Replicating prior findings, participants showed causal inference behavior (reduced presaccadic biases for large discrepancies), but changes in the uncued feature did not modulate integration in the reported feature. These findings suggest that limited use of cross-feature statistical structure generalizes across feature dimensions. We propose that this reflects the covariance structure of the natural visual environment, contrasting with the training statistics required to elicit cross-feature integration in RNNs.", "SubmissionID": 518.0}, {"Day": "Wednesday", "Time": "14:00", "Session": "Symposium: The rhythmic nature of perception and attention: Evidence, challenges, and open questions", "Room": "Purbeck Lounge", "Title": "Dynamic modulation of endogenous attentional sampling under cue uncertainty", "Speaker": "Xiaoyi Liu", "CoAuthors": "Michael Arcaro, Sabine Kastner", "Abstract": "Theories of rhythmic attention propose that attention samples from the environment in rhythmic cycles, with alternating states of enhanced or diminished perceptual sensitivity at an attended location. While previous studies have revealed robust theta-band rhythmic sampling when attention is drawn to an exogenous event, the cues that drive attention are often internally driven and ambiguous in real world. To investigate how perceptual uncertainty of visual cues affects the temporal dynamics of attention deployment, we designed a task that combined elements of perceptual decision making and spatial attention. A central cloud of red and blue dots was used as an endogenous cue, with the dominant color indicating the likely location of a target, which appeared at a varied delay following the cue offset. Cue uncertainty was introduced by varying the red-blue ratio. Participants reported the target location, then rated their confidence in the attended location on a five-point scale. When cue uncertainty was low or subjective confidence was high, detection performance fluctuated at a theta frequency (∼6–7 Hz), replicating previous findings using exogenous attention cues. Increased cue ambiguity disrupted this rhythmic coordination. Remarkably, in the absence of directional cue information, we observed slow, coherent behavioral fluctuations (~3 Hz) selectively in the left visual field. These results suggest that attention dynamics flexibly adapt to internal states of certainty, with subjective confidence modulating both the frequency and coordination of spatial attentional sampling.", "SubmissionID": ""}, {"Day": "Wednesday", "Time": "14:00", "Session": "Material Perception", "Room": "Bayview Suite", "Title": "Applications of Physically Based Differentiable Rendering in Vision Science", "Speaker": "Benjamin Beilharz", "CoAuthors": "Benjamin Beilharz, Joshua Martin, Thomas Wallis", "Abstract": "Physically Based Rendering (PBR) is the physical simulation of light transport within a scene, i.e., how light participates in events such as reflections, refractions and scattering when interacting with objects. Recent advances have made the diffentiation of PBR possible and computationally tractable, allowing the reconstruction of physical scene properties (such as lighting, materials, shapes, etc.) from two-dimensional images using gradient-based optimisation. This enables us to optimise physically-interpretable parameters instead of reasoning about pixel-based images. Here we demonstrate the potential of differentiable PBR in two settings: (a) to find physically based model metamers to explain model sensitivities and invariances to physical object properties and (b) to create controversial scenes where two models disagree on the interpretation of a physical scene, using gloss appearance as an example. These examples display the promise of differentiable PBR for understanding perceptual inferences in humans and machines.", "SubmissionID": 44.0}, {"Day": "Wednesday", "Time": "14:15", "Session": "Eye Movements", "Room": "Tregonwell Hall", "Title": "Mislocalization in saccades to tactile targets", "Speaker": "Eckart Zimmermann", "CoAuthors": "", "Abstract": "Stimuli briefly presented around the time of a saccade are systematically mislocalized. This mislocalization is typically bi-directional, with probes presented both before and beyond the saccade target appearing compressed toward the target. Existing computational models attribute this effect to sensorimotor mechanisms that support visual stability across saccades. Alternatively, mislocalization might also be driven by purely sensory mechanisms. Here, I varied the sensory features of the saccade target by asking participants to execute saccades in complete darkness toward either tactile or visual signals. At the start of each trial in the tactile condition, participants fixated a tactile stimulus delivered to the left index finger. After 1 s, this stimulus was extinguished and simultaneously replaced by a tactile stimulus on the right index finger, which served as the saccade target. At varying times relative to saccade onset, a probe LED was briefly flashed (8 ms). After a 500 ms delay, a comparison LED appeared, and participants judged whether the probe had been located to the left or right of the comparison. Psychometric functions were used to estimate perceived probe location across multiple time bins around saccade execution. The visual condition was identical, except that LEDs defined both fixation and saccade targets. In this condition, I replicated the classic perisaccadic compression effect. In contrast, the tactile condition yielded an asymmetric pattern: probes presented before the saccade target were localized relatively accurately, whereas probes presented beyond the target were still perceived as compressed toward it. These findings demonstrate that saccade target features selectively influence perisaccadic mislocalization. Crucially, saccade dynamics were indistinguishable between the visual and the tactile conditions. Sensorimotor processes thus seem unlikely to explain these differences. Instead, the data show that perisaccadic mislocalization arises from uni- or multisensory spatial integration between transient visual probes and the saccade target signal.", "SubmissionID": 542.0}, {"Day": "Wednesday", "Time": "14:15", "Session": "Symposium: The rhythmic nature of perception and attention: Evidence, challenges, and open questions", "Room": "Purbeck Lounge", "Title": "Testing oscillatory modulations in temporal summary statistics across visual features", "Speaker": "Maëlan Q. Menétrey", "CoAuthors": "Paola Biocchi & David Pascucci", "Abstract": "Several theories propose that perception and cognition operate through rhythmic sampling, with theta (4–7 Hz) and alpha (8–13 Hz) oscillations shaping attention and perception. Yet, evidence for such “behavioral rhythms” remains inconsistent and largely confined to simplified paradigms with brief stimuli, leaving open whether these dynamics generalize to more continuous and naturalistic settings. Here, we introduce a paradigm in which observers estimate the average of rapidly unfolding visual features across eccentricities, allowing us to probe the temporal structure of perceptual integration. Using a temporally weighted averaging model across orientation, size, and color tasks, we tested for periodic modulations, or “waving averages”, in how individual stimuli contribute to perception. Our results reveal a heterogeneous pattern: robust low-frequency waving averages (<2.5 Hz) for orientation and size, weaker effects for color, and higher-frequency components (~4–8 Hz) emerging only in a subset of participants and primarily in the parafovea. These results challenge the notion of universal behavioral rhythms, instead pointing to task-dependent and individual-specific temporal dynamics, while highlighting slower oscillatory processes as a more consistent feature of perceptual integration.", "SubmissionID": ""}, {"Day": "Wednesday", "Time": "14:15", "Session": "Material Perception", "Room": "Bayview Suite", "Title": "Humans perceive invisible materials and their properties by observing others’ actions", "Speaker": "Nedim Goktepe", "CoAuthors": "Müge Cavdan, Katja Doerschner", "Abstract": "Imagine watching someone gently squeeze a ripe peach at a market. Even without touching the fruit yourself, you can infer its softness, juiciness, and fragility from the subtle deformation of its surface and the careful modulation of the person’s grip. But how much information is conveyed purely by the movements of the hand? Here, we isolated action information by removing the material from view and presenting observers with hand movements alone. Using motion-capture gloves, we recorded typical exploratory actions performed by two individuals interacting with five materials (e.g., a sponge). From the recorded explorations, we rendered realistic hand interactions. Across three experiments, we asked observers to identify these invisible materials and their properties from hand interactions seen from different viewpoints (first-person, second-person, and side). In Experiments 1 and 2, observers identified and categorized the invisible materials from hand interactions, using forced-choice tasks. In Experiment 3, observers rated 14 sensory adjectives (e.g., softness) to assess the material qualities. Observers were able to infer both material properties and material identity from hand movements alone. Performance differed significantly across material categories, with the highest accuracy for granular (71%), viscous (58%), and deformable materials (56%), indicating differences in diagnosticity of the characteristic exploratory movements. PCA analysis revealed 4 material dimensions closely matching the categories in Experiment 2 and tactile and visual material dimensions found in previous studies. Viewpoint did not significantly affect performance, suggesting that hand movements convey robust material information across different perspectives. Together, we found that exploratory hand movements can provide visual cues that allow an observer of these movements to readily identify the explored materials and their qualities, even in absence of direct visual information about the material itself. Hence, this work provides insights for robot learning, where artificial agents must extract information about object properties from observed human manipulation.", "SubmissionID": 311.0}, {"Day": "Wednesday", "Time": "14:30", "Session": "Eye Movements", "Room": "Tregonwell Hall", "Title": "Asymmetric detection of feature onsets and offsets across saccades", "Speaker": "Alexander Schütz", "CoAuthors": "", "Abstract": "The window of visibility differs between foveal and peripheral vision. While foveal vision achieves high contrast sensitivity even for fine spatial information, contrast sensitivity is overall lower and shifted to coarser information in peripheral vision. Consequently, the available information about object features changes with every saccade, when they move from peripheral to foveal vision and vice versa. Nevertheless, humans typically do not register any changes during saccades. Here, I tested which changes in feature visibility are detected across saccades.\n\nParticipants had to execute saccades to a black ring that could contain a Gabor stimulus. In the first task, contrast sensitivity for the Gabor was measured separately before and after the saccade. As expected, contrast thresholds were higher presaccadically in the periphery than postsaccadically in the fovea. In the second task, the Gabor either disappeared (offset) or appeared (onset) during the saccade (change), or it was either continuously present or absent (no change). Participants had to report if they noticed a change during the saccade. Three Gabor contrasts were tested: average of pre- and postsaccadic thresholds, twice the pre- and twice the postsaccadic threshold. \n\nFor perisaccadic Gabor offsets, change reports increased with increasing contrast. When the Gabor was continuously present, change reports were infrequent and decreased with increasing contrast. Strikingly, for perisaccadic Gabor onsets, change reports were indistinguishable from the continuous condition, indicating that participants could not register that the Gabor appeared during the saccade. In a second experiment, the Gabor was placed at the presaccadic fixation location and then onsets were more often detected than offsets.\n\nThese results indicate that the visibility of changes is related to the typical experience during saccades: At the postsaccadic fixation location, information is typically gained, and onsets are hardly noticed. At the presaccadic fixation location, information is typically lost, and offsets are hardly noticed.", "SubmissionID": 54.0}, {"Day": "Wednesday", "Time": "14:30", "Session": "Symposium: The rhythmic nature of perception and attention: Evidence, challenges, and open questions", "Room": "Purbeck Lounge", "Title": "Oscillatory dynamics of attention in sensory tuning and perceptual processing", "Speaker": "Laurie Galas", "CoAuthors": "Mehdi Senoussi, Niko Busch, Ian Donovan, Sanne ten Oever, Laura Dugué", "Abstract": "Growing evidence suggests that attention samples sensory information rhythmically, leading to periodic fluctuations in perceptual performance. Fundamental questions remain about the mechanisms, neural basis, and functional role of these behavioral rhythms. I will present a series of experiments combining psychophysics and electroencephalography to explore these limitations. Using an exhaustive psychophysical protocol with attentional manipulation and reverse correlation analyses, we showed that sustained and exploratory attention differentially shaped sensory representations over time. Sustained attention elicited oscillations in perceptual performance at alpha frequencies (9-12Hz) and rhythmically suppressed irrelevant information, whereas exploratory attention elicited oscillations at theta frequencies (4-7Hz) and rhythmically enhanced task-relevant features. In a follow-up study, we demonstrated that these behavioral rhythms corresponded to neural oscillatory dynamics at matching frequencies. Time-generalized EEG classification accuracies showed alpha oscillations during sustained (spatial and feature-based) attention and theta oscillations during spatial exploration. Faster reaction times correlated with stronger theta power, supporting the functional role of theta oscillations in attentional processing. Finally, we investigated whether oscillatory phase determined not only when perception was optimal, but also what was perceived. Previous studies, in the auditory domain, suggested that perceptual content could depend on the timing (i.e., the phase of brain oscillations) of stimulus presentation. We tested whether a similar relationship existed in vision by inducing an association between visual stimuli (faces) and the phase of visually tagged brain oscillations. We assessed this phase-face association by presenting ambiguous stimuli at multiple phases and found that face-discrimination performance was biased over time, with early versus late delays favoring different faces. These biases were not reliably modulated by the phase of ongoing oscillations. Overall, these findings support a role for oscillatory dynamics in structuring the timing of perception, while suggesting that further investigations are needed to clarify the link between oscillatory phase and perceptual content.", "SubmissionID": ""}, {"Day": "Wednesday", "Time": "14:30", "Session": "Material Perception", "Room": "Bayview Suite", "Title": "Perception of material properties: Roles of 2D, 3D and cognitive cues", "Speaker": "Qasim Zaidi", "CoAuthors": "Yi Xu", "Abstract": "Anticipating properties of a material such as slipperiness, ripeness, hardness or warmth from just its visual appearance is necessary for successful functioning. Most studies of material perception have concentrated on 2D perceptual cues while a few have used image statistics such as Fourier spectra or the responses of oriented linear filters.  The neural processing underlying material perception and the roles of 3D cues and semantic memory mostly remain to be understood. Towards these aims, we comprehensively investigated visual perception of fabrics varying widely in appearance and affordance.\n\nWe took high resolution photographs from a fixed distance of 135 different fabrics that included most types of woven, knit, braided, bonded and felted materials.  Observers were shown grey-level images of the fabrics at high resolution without stereo, and asked to place materials along five-point rating scales ranging over ten opposing properties: soft/rough, warm/cool, stiff/flexible, sturdy/delicate, water-absorbent/repellent, shiny/matte, see-through/opaque, smooth/coarse, elastic/rigid, thin/thick.\n\nWe conjectured that repeated 3D texture features are major cues, as are semantic memories associated with different types of fabric. A few fabric qualities can be distinguished using spatial-frequency bands (Giesel & Zaidi, 2013) but higher-order statistics are required to extract feature shapes, and 3D textures are perceived through shape-from-shading. The combined 10-dimensional ratings were subjected to dimensional reduction with a canonical-correlation analysis and the major axes correlated with image statistics estimated using gliders representing second, third and fourth order correlations, before and after whitening. The effect of shape from shading was estimated by redoing the ratings for high-resolution photos taken under diffuse light, and the effect of semantic memory by comparing fabric recognition performance under an auditory n-back memory suppression task. Together these manipulations reveal the range of cues used for material property perception and the differences from 2D texture discrimination.", "SubmissionID": 570.0}, {"Day": "Wednesday", "Time": "14:45", "Session": "Eye Movements", "Room": "Tregonwell Hall", "Title": "The Remote Distractor Effect and the Size-Latency Effect are caused by lateral inhibition in the Superior Colliculus", "Speaker": "Baptiste Caziot", "CoAuthors": "Frank Bremmer, Robert M. McPeek, Mark R. Harwood", "Abstract": "The Remote Distractor Effect (RDE) and the Size-Latency Effect (SLE) are two phenomena that influence the timing of saccadic eye-movements. In the SLE, larger targets delay saccades systematically according to their eccentricity/diameter ratio. In the RDE, the ratio of distractor and target eccentricities also predict saccade latencies. Do these effects share a common neural mechanism of lateral inhibition in the Superior Colliculus (SC)? If so, one would expect that: (1) both effects should exhibit identical spatial and temporal profiles, (2) increasing inhibition should systematically enhance effect magnitude, and (3) both effects should be attenuated when using equiluminant stimuli, which produce weaker SC responses. Through a series of human psychophysical experiments, we found that the ring stimuli used in past SLE experiments evoke RDE-like effects with identical spatial and temporal profiles, once taking into account the smaller magnitude of the RDE. Saccadic latency cost increases monotonically with the number of distractors, consistent with an increasing degree of inhibition. Finally, neither effect was observed with equiluminant stimuli that produce weaker responses in the SC. These findings are consistent with the RDE and SLE being caused by the same underlying neural mechanism, most likely of lateral inhibition within the SC.", "SubmissionID": 326.0}, {"Day": "Wednesday", "Time": "14:45", "Session": "Symposium: The rhythmic nature of perception and attention: Evidence, challenges, and open questions", "Room": "Purbeck Lounge", "Title": "Effects of neural oscillations on visual performance during attentional deployment", "S
