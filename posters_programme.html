ame direction upon touching. This perception of causality can be altered by visual adaptation: after prolonged exposure to launch events, observers are less likely to report perceiving a launch in subsequent ambiguous test events, ranging from launching to passing events by manipulating the disc overlap of these two objects. In Experiment 1 (n=12), we tested whether adaptation to causality spreads to different parts of an object even if those parts did not have direct contact with the other object involved in the launching event. The adaptor stimulus consisted of a single disc colliding with a vertical stack of five discs (each 1.5 dva in diameter), of which the point of collision was always at the bottom of the stack. Test events were presented at one of three vertical locations relative to the larger object: center, top, and bottom. We found adaptation effects only for test events that were presented at the bottom, indicating strong spatial specificity with no evidence for a spread of causality. In Experiment 2 (n=12), we examined whether a larger moving object colliding with a single disc would elicit the same spatial specificity. This time, the adaptor stimulus consisted of a vertical rectangle colliding with a single disc. Here, we observed evidence for a spread of adaptation in the launching object. Adaptation effects emerged at the center and top locations, but not at the bottom. Crucially, an additional adaptor stimulus designed to control for motion offset did not produce adaptation effects. Together, these findings suggest that perceived causality relies on spatially precise mechanisms tied to the point of contact; however, adaptation can also spread to parts of an object that had no direct contact with the launched object.", "SubmissionID": 544}, {"Day": "Tuesday", "Time": "15:30–17:00", "SessionID": 34, "Topic": "Cognition, Decision Making, and Confidence", "Title": "Selective responses to ordered sequences of letters and numbers with EEG frequency tagging", "Author": "Talia Retter", "CoAuthors": "Handy Bonnin, Mila Marinova, Christine Schiltz", "Abstract": "Memory for sequences of items is an important aspect of human cognition, but its representation is debated. Sequential memory may be represented more through relative item order, or more through collective chunks of items. One challenge is that variable explicit ordering or memory tasks are used in experimental research. We introduce a relevant task-free approach to record sequence-specific responses with EEG frequency tagging. Participants, uniformed about item sequences, were simply instructed to detect fixation-cross shape changes. Participants were shown rapid sequences of seven repeating items (letters, numbers, or colors) at a rate of 0.15 s per item, i.e., 6.7 Hz. If these sequences of items are automatically chunked, we expected to observe sequence-specific responses at 0.95 Hz (i.e., 6.7 Hz/7) and its harmonics. Selective sequence-specific responses were recorded to familiar, ordered letter sequences (ABCDEFG), suggesting that this letter string may be represented as an integral chunk. In contrast, we did not observe selective sequence responses to familiar, ordered sequences of an incomplete chunk of numbers (1234567). However, when this sequence was reshaped into a continuous fluid pattern (123456765432), a selective sequence response did occur. Overall, EEG frequency tagging of sequences appears to be a promising approach to investigate representations of sequences in memory. The present results suggest that the presentation of ordered sequences without an order-related task does not automatically elicit an order-recognition brain response. Instead, the results are in line with associative models with holistic chunking for sequential memory.", "SubmissionID": 545}, {"Day": "Tuesday", "Time": "15:30–17:00", "SessionID": 34, "Topic": "Cognition, Decision Making, and Confidence", "Title": "Too Much of the Same Thing: Overweighting Correlated Visual Evidence", "Author": "Andrey Chetverikov", "CoAuthors": "Richard Norman Bailey, Jefferson Ortega, David Whitney", "Abstract": "In socioeconomic decisions, people routinely treat correlated evidence as independent, overestimating its value. For example, a news story retold by several tabloids might be perceived as more truthful than when reported by a single outlet, despite originating from a single source. This phenomenon coined 'correlation neglect' is widely studied, yet its mechanisms remain poorly understood. Here, we demonstrate that this inability to account for correlations is not limited to socioeconomic decision-making but is also present in low-level perceptual decisions.\n\nObservers averaged color or orientation stimuli that were drawn randomly on each trial from a multivariate normal distribution. The distribution's covariance matrix was set in such a way that the features for half of the matrix were correlated, while in a control condition, no correlation was present. An ideal observer, aware of this task structure, would downweight correlated information. In contrast, the real observers consistently overweight correlated information across color and orientation experiments, indicating that they are not just neglecting the correlations, but treat correlated stimuli as more informative. We discuss mechanisms underlying this bias to visual correlations, which offer potential insights into the underlying cause of correlation neglect in socioeconomic decision-making.", "SubmissionID": 581}, {"Day": "Tuesday", "Time": "15:30–17:00", "SessionID": 34, "Topic": "Cognition, Decision Making, and Confidence", "Title": "Interactions between the brainstem and visual cortex in processing surprise.", "Author": "Nick Simpson", "CoAuthors": "Ryan Jepson, Martina Callaghan, Joost Haarsma, Jan Willem de Gee, Peter Kok, Clare Press", "Abstract": "To navigate the world as efficiently as we do, our perceptual systems integrate prior knowledge with sensory signals. According to predictive processing accounts, laminar organisation in the cortex supports this integration: top-down predictions about sensations activate deep layers of sensory cortex, input synapses onto middle layers, and the prediction error is computed in superficial layers. Furthermore, it has been proposed that, after large prediction error signals in the cortex, subsequent catecholamine release supported by brainstem structures might reactively amplify unexpected sensory representations. By capturing visual cortex and brainstem activity simultaneously with 7T fMRI, we investigated how these processes interact to determine what we perceive. During pre-scanning training, participants learned to associate auditory tones (high or low) with an on-screen Gabor patch (CW or CCW), where p(CW|low) = p(CCW|high) = 1. During scanning, participants were still exposed to expected tone-Gabor pairings on 75% of trials (p(CW|low) = p(CCW|high) = 0.75) but these were accompanied by unexpected pairings on the other 25%. Behaviourally there was evidence that participants learnt in the anticipated fashion - reaction times were faster for expected than unexpected trials in early scanning blocks and the effect declined across time. We test the idea that the laminar profile of visual cortex exhibits preferences according to purported predomination of unit types, with the expected represented with higher fidelity than the unexpected in deep layers and the converse preference in superficial layers. We also ask whether brainstem structures – specifically the Locus Coeruleus, the Raphe Nucleus, and the Ventral Tegmental Area – are more responsive to the unexpected, as well as how the brainstem and visual cortical effects interact. We discuss the implications of this novel 7T fMRI examination of brainstem-laminar sensory interactions for our understanding of perceptual processing and learning.", "SubmissionID": 587}, {"Day": "Tuesday", "Time": "15:30–17:00", "SessionID": 34, "Topic": "Cognition, Decision Making, and Confidence", "Title": "Tracking Word Order in Reading: Evidence from Eye Movements and Fixation-Related Potentials", "Author": "Federica Degno", "CoAuthors": "Simon P. Liversedge, Otto Loberg, Petar Atanasov", "Abstract": "In a recent eye tracking study, Atanasov et al. (2025) reported limited evidence for early parallel lexical processing during reading. The present study extends this work by manipulating the word order of a target word pair (transposed vs. non-transposed) and sentence final word grammaticality (grammatical vs. ungrammatical), while introducing a balanced grammaticality judgment task (50% “yes”, 50% “no” answers) and co-registering participants’ eye movements and EEG. This design enables a direct test of claims that word transposition effects may arise earlier than is detectable in eye movement data and are more sensitively indexed by neural measures. Preliminary eye movement results replicate the original Atanasov et al.’s findings. No parafoveal effects of word transposition are observed in the Pre-Target region. Disruption caused by word transposition is first detected at Target Word 1, and to a reduced extent at Target Word 2, with transpositions eliciting longer reading times. In the Post-Target region, reading times are longest when participants encountered an ungrammatical sentence final word for the first time. Overall, these findings support a view that processing is incremental and cue driven, with disruption being localised to the point of fixation of the ungrammaticality. Ongoing fixation-related potential analyses will determine whether earlier neural effects are detectable, providing a stronger test of parallel processing accounts.", "SubmissionID": 604}, {"Day": "Tuesday", "Time": "15:30–17:00", "SessionID": 43, "Topic": "Eye Movements", "Title": "Art dynamics are mirrored in gaze responses", "Author": "Eugene McSorley", "CoAuthors": "Louis Wiliams, Rachel McCloy", "Abstract": "This study investigated how eye movements to abstract artworks are shaped by artwork dynamism, viewer expertise, and prior exposure to art‑making processes. A total of 107 participants (42 artists and 65 non‑artists), aged 18–48, were recruited from the University of Reading and Goldsmiths. Artists had substantial formal art training, whereas non‑artists had minimal training. Participants viewed 20 abstract paintings independently classified as dynamic or static for 30 seconds each while eye movements were recorded. Half of the participants watched short videos explaining either dynamic or static abstract art‑making techniques prior to viewing the artworks, while the remainder viewed the stimuli without contextual information. Dynamic artworks elicited more fixations per second, shorter fixation durations, saccade amplitudes and duration, with faster saccade velocities than static artworks, indicating more active visual exploration. Across time, viewing shifted from rapid global scanning to more sustained focal inspection, reflected in decreased fixation rates, longer fixations, reduced saccade amplitudes, and slower saccade velocities. Art‑making videos selectively influenced eye movements, particularly for artists, by modulating saccade amplitude and velocity during early viewing. Overall, perceived dynamism strongly guided gaze behaviour, with expertise and contextual knowledge showing more subtle effects.", "SubmissionID": 189}, {"Day": "Tuesday", "Time": "15:30–17:00", "SessionID": 43, "Topic": "Eye Movements", "Title": "Pre-saccadic compensation of the Size-Eccentricity Effect: temporal stability and attentional contributions", "Author": "Jad Laaboudi", "CoAuthors": "Laure Pisella, Céline Paeye", "Abstract": "Preparing an eye movement is known to enhance visual perception at its goal location, improving the processing of several stimulus features. Previous findings indicate that saccade preparation also reduces the Size-Eccentricity Effect, i.e. the classic underestimation of object size in peripheral vision (Laaboudi et al., 2025). Importantly, this perceptual enhancement was observed about 200 ms before saccade onset, earlier than the typical time window reported for pre-saccadic enhancement. We therefore sought to clarify the temporal profile of this effect.\n\nIn a first experiment, 15 participants compared a briefly presented peripheral disk with a reference disk shown at the saccade landing position. By manipulating the timing of an auditory go-signal, we varied the delay between stimulus offset and saccade onset from 50 to 550 ms. Separate fixation trials assessed peripheral size perception without saccade preparation. Replicating our previous findings, perceived size in the periphery was more accurate in saccade than in fixation trials. However, this perceptual enhancement did not depend on saccade timing.\n\nBecause the effect remained stable, in a second experiment, we tested whether it reflected other, cue-driven attentional mechanisms. In particular, endogenous attention is generally more sustained over time than exogenous and pre-saccadic attention. To explore this, we extended our paradigm from a single peripheral location to four possible locations. In an exogenous condition, cues validly or invalidly indicated the test disk location with equal probability, whereas in an endogenous condition one location was favored (75%). Preliminary results revealed no reliable cueing effect, but a systematic perceptual enhancement associated with saccade preparation.\n\nTogether, these findings indicate that the increase in peripheral perceived size is robust across a broader temporal window than expected for typical pre-saccadic enhancement and is more specifically linked to oculomotor preparation than to the covert cueing manipulations tested here.", "SubmissionID": 206}, {"Day": "Tuesday", "Time": "15:30–17:00", "SessionID": 43, "Topic": "Eye Movements", "Title": "The Effect of Visual Defects in 3D Models on Visual Attention: A Desktop and VR Eye-Tracking Study", "Author": "Erwan David", "CoAuthors": "Sonain Jamil, Julien Pettré, Sébastien Iksal", "Abstract": "Virtual reality simulations are transforming education and training by providing controlled, immersive environments for skills that are costly, hazardous, or complex to teach through traditional methods. Central to simulation effectiveness is fidelity: the degree to which virtual environments accurately replicate real-world objects and phenomena. Low fidelity may disrupt learner attention, compromising educational outcomes, yet the field lacks theoretical frameworks and tools to measure and mitigate fidelity-related distractions.\n\nThe study I will present addresses this gap by investigating visual attention as an objective indicator of simulation fidelity. Specifically, we examine how visual defects in 3D-modelled objects distract viewers and whether immersiveness modulates this effect.\n\nWe conducted a 3D-mesh viewing protocol with eye tracking across two viewing conditions: desktop display and head-mounted VR. Participants viewed 3D objects containing controlled visual defects (mesh simplification, self-intersection, smoothing, and semantic) while gaze behaviour was recorded as a proxy for visual attention allocation. Each participant was presented with half of the objects in their unmodified state to mitigate an expectation bias.\n\nGaze data were analysed using region-of-interest metrics (dwell time, time to first fixation) and saccadic measures (saccade angles, scanpath patterns). We compared between defect conditions to characterise how they may capture and impact attention patterns across viewing contexts.\n\nResults characterise attentional capture by defect type and viewing condition, revealing systematic desktop-VR differences. From these data, we propose a quantitative ranking of the types of defect.\n\nThis work is a step towards a predictive model of perceived realism in 3D simulations. Such models have broad applications across industries using or relying on simulated stimuli, from educational VR to entertainment and industrial training. We hope that our findings will provide clear and usable metrics, to quantify simulation fidelity and identify visual defects, that will help improve learner attention and optimise educational impact.", "SubmissionID": 217}, {"Day": "Tuesday", "Time": "15:30–17:00", "SessionID": 43, "Topic": "Eye Movements", "Title": "Transdiagnostic Relevance of Social Attention Biases in Emotional Disorders", "Author": "Maximilian Broda", "CoAuthors": "Marcel Linka, Marie K. Neudert, Lukas Kirchner, Andrea Hermann, Benjamin de Haas", "Abstract": "Individuals differ in how they visually explore social scenes. While healthy observers typically prioritize faces, clinical populations often exhibit altered viewing behavior towards socially relevant content. However, it remains unclear whether these differences in viewing behavior are present across a transdiagnostic spectrum and whether individual social attention patterns relate to symptom severity or predict treatment outcomes. To investigate this, the ongoing transTAM project analyzes gaze behavior in a large transdiagnostic sample. We presented a diverse set of naturalistic scenes to N > 300 patients with emotional disorders (e.g., depressive and anxiety disorders) in a free-viewing paradigm while tracking their gaze and compared them to an ad-hoc student sample (N = 100). All participants freely viewed 40 natural scene images for 3 seconds each (OSIEshort; Linka & de Haas, 2020). For our analysis, we focused on metrics of social salience, quantifying visual attention directed toward human faces and bodies.\n\nOur results corroborate fundamental group differences in viewing strategies. While both groups predominantly fixated on faces first, controls showed a significantly stronger visual preference for facial regions overall, with higher dwell time and a greater number of fixations on faces (both p < .05). By contrast, patients demonstrated an elevated attentional shift toward bodies: compared to healthy controls, they were significantly more likely to direct their first target fixation to a body (p < .001) and spent more overall time dwelling on them (p < .001).\n\nThese findings suggest that a reduced visual preference for faces and an increased focus on bodies may constitute behavioral markers in clinical populations. We are currently collecting prospective longitudinal data to evaluate whether these individual social salience biases can predict therapeutic success and plan to expand our comparative analyses to age-matched controls.", "SubmissionID": 220}, {"Day": "Tuesday", "Time": "15:30–17:00", "SessionID": 43, "Topic": "Eye Movements", "Title": "From similarity structure to gaze dynamics: Eye-movement signatures of decision difficulty in a triplet matching task", "Author": "Josef Mana", "CoAuthors": "Jiri Lukavsky, Ivana Kapounova, Filip Dechterenko", "Abstract": "Similarity perception is a fundamental cognitive process that aids people in making sense of their environment. One way to measure it is via triplet matching tasks, whereby participants select from two reference stimuli the one more similar to a query stimulus. Triplet matching tasks are widely used to recover perceptual similarity spaces, yet the decision processes underlying individual choices remain insufficiently understood. Eye-tracking offers a window into these processes, but interpreting gaze behaviour requires an independently validated difficulty structure. Here, we present a two-stage study that first establishes such a structure and then interrogates its gaze correlates.\n\nIn the first, online experiment (N = 98), participants completed a similarity matching task across a common set of triplets derived from the FACES database. Triplet difficulties, operationalised by majority agreement rates, were highly consistent across participants, stable between repeated blocks and unaffected by left–right stimulus configuration, validating reliability of this difficulty structure.\n\nIn a subsequent eye-tracking experiment (N = 51) using the same stimuli, we examined how trial-level gaze behaviour relates to majority-consistent responding. As expected, harder triplets elicited more fixations, more gaze switches and longer total dwell time. Notably, dwell time on the non-chosen reference decreased substantially for the easiest triplets, while dwell on the chosen reference remained roughly constant across difficulty levels. Mixed-effects logistic regression further confirmed that non-chosen dwell and fixation count were the strongest predictors of majority-consistent choice. Chosen reference and query dwell also predicted responding when entered alone, but their effects became redundant once non-chosen dwell or fixation count were included in the model.\n\nThese results suggest that gaze in triplet similarity judgements is more strongly coupled to evidence against the non-chosen option than to evidence for the chosen one, with implications for how eye-gaze data should be interpreted in similarity-based decision models.", "SubmissionID": 225}, {"Day": "Tuesday", "Time": "15:30–17:00", "SessionID": 43, "Topic": "Eye Movements", "Title": "Motion direction representations and history effects in fixational eye movements", "Author": "Mert Can", "CoAuthors": "Thérèse Collins", "Abstract": "Fixational eye movements, such as microsaccades, occur while looking at a stable visual stimulus. Recent findings show that fixational eye movements are shifted towards stimulus orientation, suggesting that they reflect stimulus processing. In the current study, we replicated these findings with motion direction. Participants were presented with a random dot kinematogram and reported the remembered direction after a delay, while their eye movements were measured. Using representational similarity analysis, we identified meaningful fixational eye movement patterns for each stimulus direction that began at stimulus onset, were maintained throughout the response delay, and reactivated before the response. These patterns were maintained in the following trial, even after the onset of a new stimulus, well into the response delay. By investigating the representational shifts in the following trial, we further found gaze patterns shifting towards similar previous stimuli but away from dissimilar previous stimuli while gaze concurrently encoded, maintained, and recalled the new stimulus. Meanwhile, participants’ reports were repulsed away from the previous stimulus. The correlation between perceptual reports and representational shifts in gaze was negative – perceptual repulsion increased as repulsion in gaze decreased. These results show that while the perception of motion direction is repulsed from previous directions, fixational eye movements have both attractive and repulsive components. This suggests that the mechanisms driving fixational eye movements may be different from those that drive repulsive perceptual experience.", "SubmissionID": 260}, {"Day": "Tuesday", "Time": "15:30–17:00", "SessionID": 43, "Topic": "Eye Movements", "Title": "Tracking team flow experience by interpersonal pupil synchronization", "Author": "Hsin-I Liao", "CoAuthors": "Maxwell Montemayor, Katelyn Haly, Makio Kashino, Shinsuke Shimojo", "Abstract": "When two people played a coordination video game, their pupil responses were more synchronized when they performed better (Liao et al., 2025, ECVP). However, it remains unclear whether the interpersonal pupil synchronization reflects a joint mental state between the two players, such as cooperative team flow, or is simply due to external common sources, such as physical properties of the object they are engaged with simultaneously. In the current study, pairs of participants played a custom video game in coordination, designed for optimal lab experiments. In the critical condition, the game's difficulty was adjusted online to match players’ performance, making the game more engaging and potentially inducing psychological flow. Two control conditions were included in which the game difficulty was either constantly easy or constantly overloaded. The background luminance of the game display was alternated between dark and bright every 5 to 7 seconds to induce pupillary oscillations. After the play, in the designed questionnaires, participants reported a better team flow experience in the difficulty-adjusted condition than in the other two conditions, confirming our manipulation. For each pair, we calculated (1) interpersonal-PSI (Pupil Synchronization Index), the degree of pupil synchronization between the two players, and (2) transition-PSI, the degree of synchronization between each player’s pupillary oscillations and the luminance transition of the background. After controlling for the transition-PSI by using linear-mixed-effect analysis, the predicted interpersonal-PSI was more synchronized in the difficulty-adjusted and overloaded conditions than in the easy condition. Further analysis showed a positive correlation between predicted interpersonal-PSI and subjective team flow rating. The overall results suggest that the interpersonal-PSI reflects not only joint attentional engagement but also the subjective flow of the team experience, which cannot be explained by the external luminance change.\n\nAcknowledgment: JST Moonshot R&D Grant (JPMJMS2295-02, JPMJMS2295-03)", "SubmissionID": 309}, {"Day": "Tuesday", "Time": "15:30–17:00", "SessionID": 43, "Topic": "Eye Movements", "Title": "Representation And Comparison in Visual Short-Term Memory", "Author": "Lauren Hebburn", "CoAuthors": "Michael Pilling, Olivia Afonso", "Abstract": "Spatial location is often assumed to play a privileged role in visual short-term memory (VSTM). The spatial organisation of displays seems to facilitate change detection even when this factor is task-irrelevant. However, the existing literature is unclear as to whether this privileged spatial role is one which is limited to comparisons which happen in specific reference frames. We tested how different spatial reference frames influence the role of spatial location on comparisons using a gaze-contingent eye-tracking paradigm. In two experiments, participants performed a colour change-detection task in which the spatial configuration between memory and test arrays was either preserved or disrupted in one of two ways (items put in a new configuration or items maintain the same global configuration but with the colour to location mapping scrambled). In Experiment 1, a saccade was forced during the retention interval between memory and test, allowing dissociation of retinotopic, spatiotopic, and allocentric reference frames of the configuration. Results revealed a robust configural benefit to sensitivity measures even when spatial correspondence was disrupted by an eye movement, alongside evidence for both retinotopic and allocentric influences. Experiment 2 employs a stable-fixation version of this paradigm, presenting the test array in either the same or a new reference frame to isolate configural effects in the absence of eye movements. Together, findings suggest a flexible comparison mechanism that integrates information across multiple spatial reference frames.", "SubmissionID": 321}, {"Day": "Tuesday", "Time": "15:30–17:00", "SessionID": 43, "Topic": "Eye Movements", "Title": "Effect of environmental information on transsaccadic memory", "Author": "Suet Ping Lee", "CoAuthors": "Tatsuto Takeuchi", "Abstract": "Visual stability across saccades requires the visual system to maintain correspondence despite rapid retinal changes. While retinotopic and spatiotopic representations have been proposed to support this process, the role of environmental context in shaping these representations remains unclear. The present study uses a transsaccadic memory paradigm in virtual reality (VR) to examine how environmental stability influences spatial representations across eye movements.\n\nParticipants perform a transsaccadic memory task in an immersive VR environment with integrated eye tracking. Following central fixation, a brief array of colored stimuli is presented. Participants then execute a saccade to a peripheral fixation point, after which a probe stimulus is shown. Participants report the color of the probed item. The paradigm is used as a tool to assess how spatial correspondence is maintained under different environmental contexts.\n\nTwo experiments were conducted. In Experiment 1, a discrete environmental shift is introduced between the saccade and probe by switching the virtual surrounding room where the colored stimuli are presented. In Experiment 2, surrounding room is continuously rapidly altered throughout the trial, creating a dynamically unstable environment.\n\nWe hypothesize that if spatial correspondence relies on spatiotopic representations supported by stable environmental cues, performance will decline when environmental stability is disrupted. Alternatively, preserved performance under unstable conditions would suggest reliance on retinotopic or internally updated representations that do not depend on external scene continuity.\n\nThe results suggest that environmental context affects performance, despite being irrelevant to the primary task of color identification.", "SubmissionID": 341}, {"Day": "Tuesday", "Time": "15:30–17:00", "SessionID": 43, "Topic": "Eye Movements", "Title": "Contextual information enhances smooth pursuit performance in monkeys.", "Author": "Sadra Fathkhani", "CoAuthors": "Baptiste Caziot, Andre Kaminiarz, Frank Bremmer", "Abstract": "Smooth pursuit eye movements allow primates to track moving objects and are traditionally described as a visually driven process that minimizes retinal slip. However, accumulating evidence suggests that pursuit can be facilitated when motion is temporally regular or supported by contextual information. While such effects have been demonstrated in humans, it remains unclear whether similar facilitation occurs in non-human primates under familiar and behaviourally meaningful conditions.\n\nIn the present study, we investigated whether contextual familiarity enhances smooth pursuit behaviour in a macaque monkey. The monkey tracked a moving target under three conditions: within a natural video of a freely moving monkey, along the same trajectory across a static background, and as a randomly moving dot across a uniform grey background. This approach allowed us to assess how natural visual context influences pursuit behaviour independently of motion trajectory.\n\nOur results demonstrate that smooth pursuit is facilitated by contextual familiarity. When the target was embedded in the natural video, eye movements showed reduced latency and higher gain. In contrast, performance declined when contextual information was removed, even when the motion trajectory remained unchanged, and was further reduced when motion lacked structure.\n\nOur results suggest that, like in human observers, oculomotor control in monkey is facilitated by contextual information. In a next step, we will aim to investigate the neural basis of this contextual influence.", "SubmissionID": 348}, {"Day": "Tuesday", "Time": "15:30–17:00", "SessionID": 12, "Topic": "Spatial Vision", "Title": "What is the size of the normalization pool in early vision?", "Author": "Aqsa Hassan", "CoAuthors": "", "Abstract": "While we know in detail how spatial frequency and orientation channels interact, we do not fully understand how interactions work across spatial location. The non-linear interactions between channels are typically modelled as divisive normalization. It is defined as the ratio of input driven activation pool and the pooled activity of the neighbouring neurons called normalization pool. Masking experiments allow us to study the properties of the normalization pool which has been done for the bandwidth in spatial frequency and orientation, but not for the spatial extent. Thus, we lack psychophysical data to constrain the size of the normalization pool. Quantifying how strongly different sizes of masks affect contrast thresholds should constrain the spatial extent of the normalization pool in divisive normalization.\n\nWe set up a 2AFC contrast masking experiment varying the size of the mask grating while its spatial frequency and orientation were identical to those of the target gratings. We tested eight different sizes of circular mask gratings. The target grating was always a small Gabor patch with a standard deviation of 0.5 cycles centrally superimposed over the 15% and 40% contrast masks. We tested 1, 2, and 4 cycles per degree vertical stimuli at 0°, 5° and 10° eccentricities along the horizontal meridian. \n\nIn the periphery, we found that contrast thresholds increase with increasing mask size and then saturate, which allows us to estimate the spatial extent of the normalization pool by fitting a divisive normalization model. Results show that the spatial extent of the normalization pool is inversely proportional to spatial frequency corresponding to a standard deviation of 0.65 cycles independent of contrast both at 5- and 10-degrees of eccentricity. However, mask size did not affect thresholds in fovea and subsequently, we were unable to estimate the spatial extent of the normalization pool there.", "SubmissionID": 266}, {"Day": "Tuesday", "Time": "15:30–17:00", "SessionID": 12, "Topic": "Spatial Vision", "Title": "Visual perceptual learning of a crowding task: Partial transfer between different eccentricities in the visual field", "Author": "Tina Plank", "CoAuthors": "Daniel Kett, Elena von Perponcher, Mark Greenlee", "Abstract": "Visual crowding refers to impaired recognition of peripherally presented objects flanked by distractors. Exhibiting a “critical distance” between target and flankers, crowding effects can be reduced by perceptual learning. In this study, we were interested in whether training in a crowding task in one eccentricity of the visual field (here: 6.5° VA) transfers to another (here: 13° VA). Moreover, this transfer effect was tested on two different axes: at an angle of 25° to the vertical meridian as in the training, and at an angle of 25° to the horizontal meridian. 29 normally sighted participants (18-30 years) trained a crowding task in the upper left and right quadrant (target positioned at 6.5° eccentricity, 25° from the vertical meridian) over three sessions. The task was to recognize the orientation of a Landolt-C, flanked by distractors (same sized rings without a gap). Before and after training participants were additionally tested in the same task with target stimuli positioned at 13° eccentricity at two axes (25° from the vertical/horizontal meridian). We found an overall significant learning effect at the trained eccentricity of 6.5° VA (difference in hit rate: 0.2, SE: .02, p<.001). Learning also partially transferred to the higher eccentricity (13° VA), both on the same axis (difference in hit rate: 0.16, SE: .02, p<.001) and on the other axis (difference in hit rate: 0.13, SE: .02, p<.001). Our exploratory study investigated transfer effects of perceptual learning of a crowding task at one eccentricity in the visual field to another location. We found that learning effects transferred significantly to greater eccentricities. The results may have implications e.g. for training measures in eccentric viewing for patients with central vision loss, indicating that improvements in visual tasks at one eccentricity may rather easily transfer to other eccentricities in case of disease progression.", "SubmissionID": 271}, {"Day": "Tuesday", "Time": "15:30–17:00", "SessionID": 12, "Topic": "Spatial Vision", "Title": "Type-B Metacontrast Masking Highlights Central–Peripheral Differences in Symmetry Detection", "Author": "Martina Passaggi", "CoAuthors": "Giulio Contemori, Aanya Khare, Deniz Demirkapi, Marianna Musa, Carolina Maria Oletto, Luca Battaglini, Marco Bertamini", "Abstract": "Visual masking has long been used to probe the temporal dynamics of feedforward and recurrent processing. In particular, type-B metacontrast masking has been linked to feedback-dependent interference mechanisms. According to the Central–Periphery Dichotomy, peripheral vision is dominated by feedforward processing and should therefore be less susceptible to feedback-dependent visual phenomena (Zhaoping, & Liu, 2022).\n\nHere, we tested this prediction using symmetry perception, a task requiring global integration and thus presumed to rely on recurrent processing. Participants discriminated symmetry under metacontrast masking across stimulus onset asynchronies (SOAs: 0–200 ms), with stimuli presented either in fovea (0°) or in periphery (9°). To equate task difficulty across eccentricities, target and mask sizes were adjusted using an adaptive procedure.\n\nPerformance in fovea exhibited a characteristic U-shaped masking function, with maximal suppression at  around 50 ms SOA and no evidence of facilitation at 0 ms. In contrast, peripheral performance showed strong masking at short SOAs (0–40 ms), followed by a monotonic recovery with increasing SOA.\n\nThese findings indicate a qualitative difference in masking dynamics across eccentricity, consistent with reduced involvement of feedback processing in the periphery. Moreover, the absence of facilitation with symmetric stimuli suggests that facilitation effects might not be intrinsic to type-B masking, but might instead arise from stimulus conditions that favour feedforward target–mask integration.", "SubmissionID": 363}, {"Day": "Tuesday", "Time": "15:30–17:00", "SessionID": 12, "Topic": "Spatial Vision", "Title": "Response in the frequency-contrast plane: a classical problem through modern psychophysics.", "Author": "Paula Daudén", "CoAuthors": "Maryam Jannati, Valero Laparra, Jesús Malo, Felix Wichmann", "Abstract": "Accurate characterization of sensitivity in the frequency–contrast plane is essential for understanding early visual processing, which is commonly modelled as a set of frequency-selective mechanisms with nonlinear responses. Classical descriptions rely on contrast incremental thresholds (Legge, 1981); however, measuring full psychometric functions across multiple contrasts and spatial frequencies is extremely time-consuming. As a result, engineering-oriented models (Daly, 1990; Malo et al., 1997; Marcellin, 2001) often depend on questionable extrapolations, particularly under masking conditions.\n\nHere, we propose an exhaustive measurement of this sensitivity surface using modern alternatives to incremental thresholds: Maximum Likelihood Difference Scaling (MLDS) (Maloney & Yang, 2003), and Ordinal Embedding (OE) (Haghiri et al., 2020).  In both methods, two stimuli and a reference are presented, then the observer decides which is more similar to the reference. MLDS was originally designed for 1-dimensional stimuli-response curves (in our case, only changing contrast). However, OE can accommodate multidimensional stimuli and responses (in our case, changing frequency and contrast). This makes OE interesting to explore the frequency-contrast plane. OE can reveal interactions between frequencies that a 1-d analysis cannot. Our stimuli are Gabor patches and narrow-band noise of a certain frequency and contrast, some with a background of controlled frequency and orientation.\n\nOur results show that newer techniques can simultaneously reproduce many classical results: the band-pass behaviour at threshold contrast, this behaviour flattens at suprathreshold, and the contrast responses are nonlinear.   Moreover, as OE mixes frequencies and contrasts, preliminary results also show that frequency discrimination thresholds increase with frequency and decrease with contrast. For masking experiments (only evaluated with MLDS), one observes the channel-like selectivity and some facilitation effects.\n\nIn conclusion, new data analysis may provide accurate descriptions in a fraction of the time, and it can reveal multiple phenomena in a single experiment.", "SubmissionID": 383}, {"Day": "Tuesday", "Time": "15:30–17:00", "SessionID": 12, "Topic": "Spatial Vision", "Title": "Estimating contrast sensitivity functions without behavioural responses in normal and visually impaired observers: A rapid gamified continuous psychophysics method", "Author": "Zeynep Sude Yeşilova", "CoAuthors": "Carla Cardoso Bumbar, Matteo Toscani, Anna Metzger", "Abstract": "Traditional assessment of spatial vision relies on subjective methods that require verbal or motor responses and understanding of the task, challenging diagnosis of visual impairment in small children. We investigated whether gaze tracking during a naturalistic smooth pursuit task can serve as an objective, simple, eye movement behavior-based measure of spatial frequency sensitivity. Eighteen subjects with normal or corrected-to-normal vision were presented with a Gabor patch moving in a random walk trajectory. Spatial frequency (0.3–15 c/deg) and contrast (0.05–0.1 Michelson contrast) were varied continuously and independently on each frame. The task was to indicate with the mouse the last position of the Gabor when in dissapeared and a sound was played. We calculated framewise tracking error as the mean Euclidean distance between gaze position and stimulus position, then averaged over seven spatial frequency bins. Shorter distances indicate high tracking performance and consequently, high contrast sensitivity. A repeated-measures ANOVA revealed significant differences in tracking error across spatial frequency bins (F(6,12)=5.57, p<.001). The accuracy of individual tracking was also found to be negatively correlated with the normative contrast sensitivity data of Burr and Ross (1982) (r = -0.52, p=.001), which demonstrates that performance on gaze tracking followed the shape of the contrast sensitivity curve. To test if this method picks up visual impairments, we tested three participants with and without their refractive correction. Taking glasses off increased tracking error at all spatial frequencies, but crucially, the increase was larger at low frequencies. The two conditions could be told apart from the pattern of errors across frequencies, not just from absolute distance. These results suggest that gaze tracking captures spatial frequency-dependent visual sensitivity, and could be a useful tool for detecting specific visual impairments in small children.", "SubmissionID": 420}, {"Day": "Tuesday", "Time": "15:30–17:00", "SessionID": 12, "Topic": "Spatial Vision", "Title": "Beyond Self-Report: Measuring Implicit Confidence", "Author": "Nadia Hosseinizaveh", "CoAuthors": "Nathan Faivre", "Abstract": "Confidence, the subjective feeling of being correct, is usually measured via self-report, which is prone to biases and unreliable in some clinical populations. To address this, we developed a pressure-sensitive device to capture implicit confidence signatures through motor response dynamics. Our study adapted a paradigm to disentangle confidence from accuracy: participants detected Gabor patches embedded in noise, presented either centrally or peripherally, with contrast adjusted to correspond to the detection threshold. Based on previous findings, we expected to find underconfidence in peripheral vision despite equal detection accuracy. Eye-tracking was used to ensure fixation at the center, and detection response was reported via the pressure-sensitive device. After every two trials, participants reported which of their last two decisions (central vs. peripheral) they felt more confident about. Preliminary results showed higher accuracy for peripheral than central stimuli, which deviates from our intended design. Moreover, accuracy was higher for peripheral stimuli and target-present trials. Correspondingly, peak response force was higher for central stimuli, incorrect decisions, and target-absent trials. This suggests that participants pressed the button more strongly when they were less likely to be correct, and thus less confident. However, because detection accuracy differs between central and peripheral conditions, it remains unclear whether these force dynamics reflect implicit confidence or are influenced by differences in accuracy. In the next phase, we will refine the paradigm to ensure equivalent accuracy while preserving the intended confidence manipulation. This will allow us to robustly test whether response force dynamics serve as an implicit measure of confidence.", "SubmissionID": 437}, {"Day": "Tuesday", "Time": "15:30–17:00", "SessionID": 12, "Topic": "Spatial Vision", "Title": "Letters in context: Investigating the Negative Congruence Effect of Letter Recognition", "Author": "Laís Muntini", "CoAuthors": "Omar Jubran, Jon Andoni Duñabeitia, Michael Herzog, Cees van Leeuwen, Thomas Lachmann", "Abstract": "Literature suggests categorical differences in the processing of letters and non-letters: letters rely on highly practiced, automatized, analytic representations that conflict with the grouping tendencies induced by congruent surrounding shapes, whereas non-letters are more susceptible to holistic integration with the surrounding context. This is described as the negative congruence effect for letters, i.e., performance is reduced when letters are surrounded by a congruent shape, while incongruent surrounds produce positive or neutral congruence effects. In the present study, we investigated whether these effects can be modulated when the surrounding visual context is extended by the addition of flankers that repeat the shape surrounding the targets. In a speeded target identification task, we manipulated surrounding congruence (congruent vs. incongruent), flanker condition (none, two flankers, four flankers) and target type (letter vs psedoletter). We hypothesized that flankers may form a broader contextual structure, making the central letter more isolated and thereby reducing or eliminating the influence of the surrounding shape. Crowding could also increase holistic processing, creating an interference effect and causing the suppression of letter distinctions, i.e., ignore letter category. Results showed that performance decreased with the number of flankers, suggesting interference from the surroundings in the identification of both letters and pseudoletters. However, a significant interaction indicated that pseudoletters were more affected by incongruent surrounds, while letters remained relatively stable. Notably, no three-way interaction was found between target type, surround congruence, and flanker condition. These findings corroborate evidence for the negative congruence effect and support the presumption of crowding interference. Although descriptive patterns suggested a slight advantage for letters in the incongruent condition with increasing flankers, no statistical significancy was found; hence, the isolation hypothesis was not confirmed by our experiment. This was interpreted as a material-related visual angle constraint. This investigation highlights how immediate and expanded context shape letter recognition.", "SubmissionID": 470}, {"Day": "Tuesday", "Time": "15:30–17:00", "SessionID": 12, "Topic": "Spatial Vision", "Title": "Action knowledge acquired through VR training influences identification of novel tools under visual crowding", "Author": "nicolas slaski", "CoAuthors": "Bilge Sayim, Yannick Wamain, Solène Kalénine", "Abstract": "Visual crowding refers to the deterioration of performance in identifying stimuli when they are surrounded by distractors. In naturalistic settings, crowding may affect meaningful objects (e.g., cluttered tools) associated with action knowledge. Previous studies have shown that action knowledge associated with everyday objects can still influence object identification performance under crowded conditions, despite the disruptive effect of crowding. However, differences in low-level visual features between object categories (e.g., manipulable or non-manipulable objects) may confound these results, making it difficult to disentangle the contribution of action knowledge from the confounding role of low-level visual differences.\nTo address this, we investigated the influence of newly acquired action knowledge on the identification of novel objects in a visual crowding paradigm. We created 12 pairs of 3D objects (one tool, one recipient) presented them in a virtual environment. Participants were assigned to one of two learning conditions. In the manipulation condition, participants engaged in functional use interactions with objects. In the visual condition, they visually explored and described the objects. Following the learning phase, participants performed two crowding tasks. In the first task, learned or unlearned novel objects were briefly presented (150 ms) in the visual periphery, and participants reported whether the object presented had been learned. Preliminary results (n=6) showed a reduced crowding effect in the manipulation condition (d’ loss=0.43) compared to the visual condition (d’ loss=1.43). In the second task, participants judged whether a centrally presented recipient object and a peripheral tool, either crowded or not, corresponded to a learned pair. Results showed higher performance in the manipulation compared to the visual condition, both when objects were isolated (83.3% vs 72.2%) and crowded (73.6% vs 62.5%), despite a similar crowding effect magnitude (9.7%). These data suggest that novel action knowledge influence performance under crowding, and enhance object processing even at early stages.", "SubmissionID": 474}, {"Day": "Tuesday", "Time": "15:30–17:00", "SessionID": 12, "Topic": "Spatial Vision", "Title": "Far distance compression in virtual reality is reduced by the presence of a ground plane", "Author": "Dr Rebecca Hornsey", "CoAuthors": "Zsofia Kovacs-Bodo, Mark Donoghue, Paul Hibbard, Ross Goutcher", "Abstract": "Existing research has shown mis-estimation in distance perception tasks: distances are typically perceived as shorter than they are and depth intervals between objects are compressed. This has been consistently demonstrated in both physical and virtual spaces, from a wide variety of different testing methodologies. Typically however, the ranges of distances tested are within the tens of metres in egocentric distance, rather than hundreds of meters, or kilometres. We evaluated relative depth judgements at the multi-kilometre distance range using virtual reality. In a repeated measures design, participants performed a depth discrimination task where they indicated which stimulus had a greater depth separation, a reference pair of cubes presented at 500m or a target pair presented at 500m, 1km, or 2km. The task was repeated across three environments varying in available depth cues: a baseline void, a continuous floor plane, and a floor with geometric clutter objects. Adaptive staircases varied the separation between the target pair to measure the point of subjective equality and just noticeable difference. As presentation distance increased the results showed an increase in the point of subjective equality and widening of the just noticeable difference, indicating a perceived compression of space which was exaggerated at the further distances. Consistent with similar research at closer distances, analyses indicate that the presence of additional contextual cues reduced the distance-dependent bias, however a Weber’s fraction of 0.5 was consistently obtained tin all conditions. The greatest difference in performance was between the baseline and floored environment, suggesting a stable ground plane allows the visual system to utilise horizon-ratio cues to maintain depth constancy for better scaling across distances. These results have implications for the design of large scale virtual environments, such as flight and driving simulators where accurate spatial representation and interpretation are crucial.", "SubmissionID": 487}, {"Day": "Tuesday", "Time": "15:30–17:00", "SessionID": 14, "Topic": "Ensemble, Numerosity, Texture, and Serial Processing", "Title": "Eye movements challenge the central input bias in ensemble perception", "Author": "Thomas CHAPTAL", "CoAuthors": "Karine Doré-Mazars", "Abstract": "Global visual scene processing involves extracting statistical information from groups of items sharing features (e.g., size, color). Reliable estimates of the  mean size of an ensemble can be obtained rapidly (50 ms) without processing individual items. However, items are weighted differently within the ensemble representation, foveal items being more weighted than extrafoveal ones. Furthermore, ensemble representation accuracy improves over time. We hypothesize that eye movements contribute to this improvement by modifying foveal input, thereby weighting each item more equally.      \n\nParticipants (n=70) estimated the mean size of a disk ensemble via an adjustment task. Ensembles were displayed for three different exposure durations (100 ms, 400 ms, 1000 ms) and two eccentricities (3°, 15°) in two  blocks of 150 trials depending on the motor task (fixation vs. saccade). Participants were assigned to one of two conditions, either a central input condition (n=30; six flanker disks around a central disk) or a no-central input condition (n=40; a fixation cross replaced the central disk).  \n\nIn the no-central input condition, estimation accuracy was superior in saccade conditions compared to fixation conditions, and at 3° compared to 15°. Increasing exposure duration enhanced accuracy, especially in the saccade condition at 15°. \n\nBy comparison, accuracy was superior with a central input. In this case, saccade conditions did not improve accuracy over time, but prevented an accuracy drop at 15°. Although we observed a strong foveal bias for the central disk, eye movements reduced its weight in favor of newly fixated peripheral ones. In contrast, the central disk bias increased in the fixation condition for ensembles at 15°, in particular for longer exposure durations.\n\nOverall, our findings demonstrate that the central bias decreases with eye movements by reweighting the influence of newly foveated peripheral items, ensuring a more global representation of the scene.", "SubmissionID": 73},{"Day": "Tuesday", "Time": "15:30–17:00", "SessionID": 14, "Topic": "Ensemble, Numerosity, Texture, and Serial Processing", "Title": "Representing Objects, Categories and Ensembles: Where, Why, and How?", "Author": "Shaul Hochstein", "CoAuthors": "Noam Khayat, Marina Pavlovskaya, Haya Abtan, Daniella Koyfman, and Merav Ahissar", "Abstract": "Since Dan Ariely (2002) reignited interest in ensemble perception, also known as scene summary statistics perception, hundreds of papers have been published on this subject. It is now well established that ensemble perception includes low and high level parameters, objects, and scenes, and that observers perceive ensemble statistics including average, range, skewness, and distribution. Here we present new findings concerning the broad extent, neural computational process, cerebral site(s), and function of ensemble perception. Surprisingly, we found that ensemble means are represented in mid-level cortical areas specializing in object perception, including centrally the Lateral Occipital Complex, leading to the suggestion that ensembles are perceived as “ensemble files” similar to classically suggested “object files” and to category fuzzy characteristic “family resemblance”. Considering the very limited capacity of short term working memory, such aggregation and redefinition is essential for perception, computation, and memory. Yet, the process of aggregating ensembles and recognizing categories and even objects without first perceiving each individual item and its traits needs clarification. I shall show that direct population encoding solves the issue elegantly and simply. In summary, we now have a better handle on answering the three essential questions regarding object, category, and ensemble perception: Where in the visual brain are their summary statistics computed and their respective “files” located; Why is this important for perception and memory; and, How is this computation performed.", "SubmissionID": 615}, {"Day": "Tuesday", "Time": "15:30–17:00", "SessionID": 14, "Topic": "Ensemble, Numerosity, Texture, and Serial Processing", "Title": "Modulation of Serial Dependence by Objective and Subjective Task Difficulty", "Author": "Lena Schädlich", "CoAuthors": "Claus-Christian Carbon, Árni Kristjánsson, Alexander Pastukhov", "Abstract": "Serial dependence reflects how recent experiences bias current perceptual judgements, but its underlying components and their modulation remain unclear. We investigate whether distinct sources of prior information – previous responses and prior sensory evidence integrated over multiple time scales – are differentially weighted depending on task difficulty. We hypothesize that increased difficulty, associated with less reliable sensory input, leads to stronger reliance on prior information. Participants performed a motion direction estimation task using random dot kinematograms. We manipulated task difficulty in two ways. First, we varied objective difficulty by adjusting motion coherence (25% quantile: hard; 50%: baseline; 75%: easy). Second, we manipulated subjective difficulty by altering feedback about performance: feedback was either veridical, exaggerated (overestimating error), or attenuated (underestimating error), thereby changing perceived accuracy without affecting actual performance. To quantify serial dependence, we applied a Bayesian integration model that incorporates multiple components of prior information – prior responses and sensory evidence – each characterized by its own temporal integration window. These time constants are estimated as part of the model, allowing each component to flexibly capture influences ranging from short-term (recent trials) to longer-term accumulation. Behavioral responses were modeled using a von Mises distribution. We use this framework to quantify how the influence of each component of prior information is modulated by both objective and subjective task difficulty. This allows us to assess whether and how different sources of prior experience are differentially weighted as a function of sensory reliability and perceived performance. Overall, the findings support a view of serial dependence as a dynamic integration process in which multiple sources of prior information are flexibly weighted according to task demands and internal estimates of uncertainty.", "SubmissionID": 113}, {"Day": "Tuesday", "Time": "15:30–17:00", "SessionID": 14, "Topic": "Ensemble, Numerosity, Texture, and Serial Processing", "Title": "Serial Bottleneck in Multicategory Ensemble Perception", "Author": "Haomin li", "CoAuthors": "Meng Zhang, Jie He, Mowei Shen, Jifan Zhou", "Abstract": "Previous ensemble perception research has mainly focused on single-group displays, or multi-group displays separable by a second feature, leaving a question unresolved: How does the visual system extract the numerosity and means of multiple categories defined by distinct ranges on the same feature? Specifically, we investigate whether these processes are capacity-unlimited and parallel, or are constrained by a serial bottleneck.\n\nExperiment 1 adopted an implicit membership task with two orientation-defined categories: Participants reported whether a probe belonged to the memory array. The proportion of \"yes\" responses across probe feature values showed a bimodal pattern that matched the stimulus setting, supporting implicit identification of two categories. Experiment 2 extended this implicit identification to explicit report: Participants reported category numerosity and whether a probe matched any category mean. Category numerosity and encoding duration were manipulated to measure the time course of these statistical computations. The numerosity and mean-judgment performance did not vary with encoding duration in the 1-category condition, but improved with duration in 2+ categories. To test whether this effect arose from the categorization process rather than the mean extraction, Experiment 3 removed explicit mean judgment and added an unlimited-view condition. While unlimited time maximized performance for 2+ categories, categorization time increased sharply with numerosity, indicating a time-consuming serial categorization. To dissociate the categorization process from explicit numerosity counting, Experiment 4 adopted an implicit two-array comparison paradigm: Participants reported which side had more categories, with category-numerosity pairings manipulated. Accuracy was significantly higher in pairings involving a 1-category level, but did not differ across multi-category pairings, indicating that observers primarily distinguished single-category from multicategory displays.\n\nIn summary, observers can form implicit statistical representations in multicategory displays. However, regardless of whether explicit category‑numerosity counting is required, categorization and mean extraction are constrained by a serial bottleneck, making such operations time-dependent and capacity-limited.", "SubmissionID": 150}, {"Day": "Tuesday", "Time": "15:30–17:00", "SessionID": 14, "Topic": "Ensemble, Numerosity, Texture, and Serial Processing", "Title": "Variability Amplification Effect in Ensemble Emotion Perception", "Author": "Tianlang Wu", "CoAuthors": "Luyan Ji", "Abstract": "The visual system rapidly extracts summary statistics from groups of objects, a process known as ensemble perception. While previous studies have shown that observers efficiently estimate the average emotion of a crowd, far less is known about how the visual system represents emotional variability within a group. Through three experiments, we investigated the \"emotion variability amplification effect\"—the systematic overestimation of emotional diversity in a group of faces. In Experiment 1a, we examined whether the amplification effect exists by manipulating set size, with mean valence fixed at a neutral level. Variability was manipulated by varying the distance between the emotional intensities of faces in the sets. The results showed that variability estimates were systematically larger than the actual set variability. Moreover, variability estimation error increased with set size, confirming the presence of an amplification effect in emotional variability perception. In addition, Experiment 1b found that estimation error at 500 ms was significantly higher than at 1000 ms and 1500 ms, suggesting that the amplification effect may arise from limited processing time. In Experiment 2, we tested the effect of distribution by comparing symmetric and skewed emotion distributions, again with mean valence held at neutral. The results showed that skewed distributions, particularly negatively skewed ones (i.e., those containing more negative faces), led to a stronger variability amplification effect than symmetric distributions. In Experiment 3, we further examined whether the amplification effect extends to face sets with positive and negative mean emotions. The results showed that negative crowds elicited a stronger amplification effect than neutral or positive crowds. Taken together, these findings indicate that variability perception in ensemble coding is systematically biased. This bias is modulated by distribution and mean valence, suggesting a non-uniform weighting of emotional information and a potential bias toward negative signals.", "SubmissionID": 178}, {"Day": "Tuesday", "Time": "15:30–17:00", "SessionID": 14, "Topic": "Ensemble, Numerosity, Texture, and Serial Processing", "Title": "Is the temporal and spatial tuning of serial dependence shaped by the statistical structure of the environment?", "Author": "Takuma HASHIMOTO", "CoAuthors": "Yuko Yotsumoto", "Abstract": "Perception at any moment is systematically shaped by prior perceptual experience. One example is serial dependence, a phenomenon in which current perception is biased toward the immediately preceding perceptual experience. Although it remains debated whether serial dependence serves an adaptive function, one possibility is that it reflects a mechanism for stabilizing perception by relying on continuity in the external world. Because external changes are often gradual, recent perception may inform current inference. Under this view, serial dependence should arise selectively between sensory inputs inferred to be continuous. Such inference may depend on the temporal and spatial proximity of successive inputs, because inputs that are close in time and space are more likely to originate from the same external event. Moreover, temporal and spatial cues are often linked in natural environments rather than varying independently. For example, larger movements generally require longer temporal intervals than smaller movements. We therefore hypothesized that serial dependence would show an interaction between temporal and spatial tuning. This would be expected if serial dependence relies on continuity inference that reflects temporal and spatial relations in natural environments. To test this idea, we manipulated temporal interval and relative stimulus position across successive trials in an orientation reproduction task, and examined temporal and spatial tuning and their interaction. We observed that serial dependence became stronger as the temporal interval increased, contrary to the pattern typically reported. We found no clear evidence for an effect of spatial separation or its interaction with temporal interval. These results did not support our hypothesis and instead suggested that temporal tuning may independently shape the strength of serial dependence, rather than through an interaction with spatial tuning. We discuss possible mechanisms and reasons for the difference from previous findings.", "SubmissionID": 198}, {"Day": "Tuesday", "Time": "15:30–17:00", "SessionID": 14, "Topic": "Ensemble, Numerosity, Texture, and Serial Processing", "Title": "Visual experience influences tactile serial dependence in space and time domains", "Author": "Emanuele Caroglio", "CoAuthors": "Lara Coelho, Silvia Zanchi, Claudio Campus, David Burr, Monica Gori", "Abstract": "People’s judgments can be biased toward recently experienced stimuli. This effect resembles serial dependence, the tendency for responses to be influenced by the stimulus presented in the previous trial. Despite extensive research on serial dependence in the visual domain, studies investigating this effect in vibrotactile system remain scarce. In this work, we assessed serial dependence in vibrotactile temporal and spatial domains. We compared sighted and visually impaired individuals to investigate the potential influence of visual experience on tactile serial dependence.  \n\nIn this study, sighted (N=17) and blind (N=7 early and N=13 late) participants (Age = 25-65 years) completed two tactile discrimination tasks involving vibrotactile stimulation delivered through a wearable device called Caterpillar, which had three vibrating modules, one closer to the wrist, one closer to the elbow and one inbetween. We hypothesize that onset of blindness could influence serial dependence in vibrotactile modality.  Participants were composed of three groups: early blind, late blind, and sighted. In the Spatial Task, participants responded if the stimulus was perceived as closer to their wrist or elbow. In the Temporal Task, vibrotactile stimuli differed in duration, and participants had to judge whether the stimulus was short or long.  \n\nFor both tasks, we measured accuracy and, within signal detection theory, d-prime and criterion (i.e., response bias). We compared groups and conditions. Conditions involved a congruent condition where the stimulus n was equal to stimulus n−1, and non-congruent one. While d-prime did not significantly differ between the three groups, criterion in both sighted and early blind groups was numerically greater than for the late blind in the congruent condition in both spatial and temporal domain. These results align with our hypothesis, suggesting that visual experience modulates serial dependence processes in vibrotactile modality.", "SubmissionID": 200}, {"Day": "Tuesday", "Time": "15:30–17:00", "SessionID": 14, "Topic": "Ensemble, Numerosity, Texture, and Serial Processing", "Title": "Using a Generalized Form of Aksentijevic-Gibson Complexity to Predict Visual Complexity of Texture Images", "Author": "Andreas Gartus", "CoAuthors": "Helmut Leder", "Abstract": "Aksentijevic-Gibson complexity (AGC) is a measure of complexity for binary strings and 2D binary arrays based on amount of change in substrings. It has been applied to diverse areas like measuring the complexity of strings, EEG recordings, regularity in river flow, or visual forms. We propose a new form of generalized AGC (gAGC) that can be used to directly calculate the complexity of strings and arrays of real numbers without the need to binarize them. (Note that using gAGC with binary data is equivalent to standard AGC.)\n\nWe tested gAGC using two datasets: The Salzburg Texture Image Database (STex) containing 476 natural textures and a set of 450 artificial procedural textures (ProcTex). We compared (g)AGC with other measures of visual complexity such as GIF, PNG, and JPEG compression rates, PHOG complexity, and edge density. All measures were calculated on original and downsized versions of greyscale images and correlated with mean human complexity ratings. Downsizing served as a simple spatial low-pass filter removing image noise.\n\nIn both datasets, when using the original image size of 512x512 pixels, gAGC performed better than all other measures (r = .51). However, downsizing the texture images improved correlations for all measures and led to JPEG compression rate becoming globally best (STex: r = .77 at 16x16 pixels; ProcTex: r = .66 at 64x64 pixels). gAGC continued to perform reasonably well on downsized images (STex: r = .67 at 32x32 pixels; ProcTex: r = .63 at 192x192 pixels) and was equal or better than AGC (STex: r = .67 at 48x48 pixels; ProcTex: r = .56 at 48x48 pixels).\n\nIn sum, we introduced a generalized form of Aksentijevic-Gibson complexity and demonstrated that it can be used to predict visual complexity of texture images, without the need to binarize the images.", "SubmissionID": 205}, {"Day": "Tuesday", "Time": "15:30–17:00", "SessionID": 14, "Topic": "Ensemble, Numerosity, Texture, and Serial Processing", "Title": "Temporal continuity in motion direction perception is shaped by retention and motion history", "Author": "Andrea Pavan", "CoAuthors": "Sabina Orso", "Abstract": "Serial dependence refers to the tendency for recent perceptual experience to bias current judgments. It has been proposed as a mechanism supporting perceptual stability, but its cognitive origin remains debated. Here, we investigated whether attractive serial dependence in motion direction estimation reflects immediate perception, later visual working memory, or both, using random-dot kinematograms (RDKs). Participants viewed moving dot patterns and reported perceived motion direction after delays of 0, 1, 3, or 6 s following stimulus offset. Responses were biased toward the previous trial’s motion direction at all delays, including the nominal 0 s condition. Attractive bias was strongest at 1 s and 6 s, and weaker at 0 s and 3 s, revealing a non-monotonic temporal profile. These findings do not support a simple account in which immediate responses are dominated by repulsion and delayed responses uniquely reveal attraction. Instead, they suggest that serial dependence in motion is already present at nominal zero delay and is further modulated by retention-related processes over time. We also carried out two exploratory analyses. First, we examined whether motion judgments were better characterized by exact previous direction, motion axis, or both. This suggested that motion history effects may reflect not only exact previous direction but also the broader motion axis. Second, we examined response times as a function of trial-to-trial angular similarity. Although response time varied with delay, there was no clear overall effect of angular similarity alone. Together, these findings suggest that temporal continuity in motion direction perception is shaped by both recent motion history and retention-related processes, rather than by a simple transition from immediate repulsion to delayed attraction.", "SubmissionID": 280}, {"Day": "Tuesday", "Time": "15:30–17:00", "SessionID": 14, "Topic": "Ensemble, Numerosity, Texture, and Serial Processing", "Title": "No consistent bidirectional aftereffect from numerosity adaptation", "Author": "Joshua Solomon", "CoAuthors": "Kristina Zeljic, Michael Morgan", "Abstract": "Numerosity has been proposed as a primary visual attribute, akin to motion or colour, and has been reported to show bidirectional adaptation consistent with population coding by tuned mechanisms: after exposure to sparse or dense arrays, the perceived numerosity of an array with a moderate number of dots shifts away from the adaptor. However, recent studies argue against bidirectionality, claiming that adaptation to sparse arrays failed to increase perceived numerosity of a denser array. This suggests that previous accounts may reflect decisional rather than perceptual biases. To test this, we employed a comparison-of-comparisons paradigm using a four-quadrant display. Observers adapted to two spatially distinct dot clouds in upper quadrants of the visual field. Following adaptation, dot clouds were shown in all four quadrants. Observers judged which of the two bottom clouds appeared more different to the reference numerosity contained in each upper quadrant. Simple decisional biases such as a preference for selecting a previously adapted or unadapted stimulus cannot masquerade as perceptual bias in this paradigm. Across six observers, three adaptor numerosities (0, 25, 100) and three randomly interleaved reference numerosities (34, 50, 74), we found clear evidence for unidirectional aftereffects consistent with monotonic neuronal responses. Adapting to dense clouds (100 dots) produced the largest downward bias in perceived numerosity, with smaller reductions following 25-dot adaptors. No condition produced upward shifts, suggesting that previous reports of bidirectionality may reflect non-perceptual biases.", "SubmissionID": 316}, {"Day": "Tuesday", "Time": "15:30–17:00", "SessionID": 14, "Topic": "Ensemble, Numerosity, Texture, and Serial Processing", "Title": "Dynamic Context-Dependent Recalibration of Time Perception", "Author": "Cansu Kazan", "CoAuthors": "Valeria Centanino, Gianfranco Fortunato, Domenica Bueti", "Abstract": "The central tendency effect (CTE) refers to the bias of perceptual estimates toward the mean of the overall information distribution. In time perception, CTE is commonly studied using temporal reproduction tasks with partially overlapping distributions of durations, each defining a temporal context. As a by-product of CTE, in such tasks, the same physical durations are reproduced differently across contexts. However, temporal contexts have typically been studied in isolation, with each presented separately across blocks or sessions. This approach limits our understanding of how the brain dynamically updates its internal representation of time when temporal context changes implicitly. \n\nWe addressed this question using a temporal reproduction task with two partially overlapping temporal contexts (short and long), in which participants reproduced the durations of visual stimuli. Crucially, our design included transition conditions in which the temporal context shifted within the block (either from short to long or vice versa), in addition to the single-context conditions (all short or all long), as in previous studies.\n\nWe observed a similar magnitude of CTE in both between single-context and within transition conditions. Consistent with previous literature, the CTE was stronger in long than in short contexts. Importantly, this trend was amplified following contextual transitions; the CTE decreased in the short context after a transition from the long context and increased in the long context after a short one. Both effects were most pronounced for the shorter durations of the context distributions. Sequential-history analyses of temporal reproductions revealed a similar pattern of trial-to-trial biases across transition conditions, with attraction toward the preceding physical duration and repulsion from the preceding reproduced duration.\n\nTogether, these findings suggest that when temporal context shifts, the direction of contextual change is an additional global factor shaping the recalibration of the internal representation of time, alongside the current and the preceding context.", "SubmissionID": 323}, {"Day": "Tuesday", "Time": "15:30–17:00", "SessionID": 35, "Topic": "Social Perception and Emotion", "Title": "How do humans see horse faces?", "Author": "Nicola Gregory", "CoAuthors": "Trudi Dempsey, Rosa Verwijs, Gabriel Carreira Lencioni, Rachel Moseley", "Abstract": "There is increasing interest in the scientific literature regarding which facial cues reliably indicate pain and affect in horses, with an aim to improve their welfare. Although pain and discomfort ethograms have been published, little is known about the human ability to spontaneously perceive pain and affect from the faces of horses without such guides. Our previous research (Gregory et al., 2025) was the first to show how some psychological traits (social anxiety) but not others (empathy) predict perception of pain in horse faces, and that equine care-giving experience predicts accuracy of pain ratings. However, no research has assessed which features are attended to when humans assess horse faces for pain. As such, we examined participants’ eye movements whilst they viewed thirty images of horse faces,  displaying a range of expressions, for five seconds each, and then rated levels of perceived pain, arousal and valence. Participants also completed online questionnaires assessing a range of psychological traits and their horse care-giving experience. Subsequently, interest areas were assigned to each face according to key regions associated with pain and affect cues, and dwell time % to each was calculated.  Overall, we found that participants with horse-care experience looked mostly at the eyes (33%), followed by the upper-face, then the nose/muzzle, then ears, and finally the mid-face (4%). There was a medium positive correlation between years of horse-care experience and gaze to the eyes, and a medium negative correlation between gaze to the ears and years of horse experience. Relationships between psychological traits, pain ratings and dwell time to the AOIs will also be presented. Current findings indicate that horse experience, which we previously showed predicted pain rating accuracy, is associated with increased gaze to the eyes, suggesting the eyes are a critical feature for determining pain and affect in horse faces.", "SubmissionID": 60}, {"Day": "Tuesday", "Time": "15:30–17:00", "SessionID": 35, "Topic": "Social Perception and Emotion", "Title": "Rapid Negative Evaluation without Explicit Recognition in the Uncanny Valley Phenomenon", "Author": "Kota Sasaki", "CoAuthors": "Atsunori Ariga", "Abstract": "The uncanny valley refers to the negative affective response people experience toward human-like morphed entities involving animacy such as humanoid robots. Previous studies have shown that similar negative response can also arise for geometri
