rganization has been shown to rely on several shape-based cues such as surroundedness, convexity and symmetry. Early deep neural networks trained for object recognition, on the other hand, have been shown to strongly rely on texture information. Recent work suggests that this texture-bias might be overcome by Vision Transformers, and in particular, by large self-supervised models, in which object-centric perceptual organization  appears to emerge without the need for human labels.\n\nIn this work, we systematically test a broad range of Vision Transformers for their ability to use shape-based cues for figure-ground organization. To this end, we fit linear probes to predict figure-ground assignment from intermediate representations, both for natural images, and for three sets of controlled stimuli where only surroundedness, convexity and symmetry are valid cues. Our results show that several Vision Transformers are able to use shape cues for figure-ground organization. Moreover, for some of these models, figure-ground probes trained on natural stimuli generalize to synthetic stimuli that isolate individual cues.\n\nIn summary, our study demonstrates the ability of Vision Transformers to learn shape-based cues from the statistics of natural images. For some models, the link between figure-ground segregation and shape properties further reflects known biases of human visual perception. Understanding the internal processing of these models in greater detail is thus a promising future direction for studying the mechanisms of perceptual organization in human visual perception.", "SubmissionID": 477}, {"Day": "Monday", "Time": "15:30–17:00", "SessionID": 41, "Topic": "Computational Modelling and Neural Mechanisms", "Title": "Why the information capacity of visual working memory cannot be measured in bits", "Author": "Paul Bays", "CoAuthors": "Ivan Tomić", "Abstract": "The fidelity with which visual features can be recalled declines with the number of items represented in working memory, implying a limit on the brain's capacity for storing visual information. In the context of information theory, the process of storing and retrieving memories has been characterized as transmission of information through a noisy channel. If the channel capacity is fixed (e.g. to N bits) the ability to reconstruct a set of stored features will decrease in a predictable manner with set size. To assess this prediction, we developed a novel method based on the mutual information between stimuli and responses in cued recall tasks. In a crucial advance, this method accounts for the presence of “swap errors”, where one of the non-cued items is reported, which would otherwise distort information estimates. Applying our method to new and existing experimental data reveals a non-linear relationship between mutual information and share of capacity that is inconsistent with encoding in a fixed number of bits. We further show that the mutual information varies across feature dimensions, and with changes in stimulus range, in ways that are not predicted by a fixed capacity channel and cannot be accounted for by differences in perceptual acuity. While the information theoretic prediction assumes encoding can be flexibly reconfigured to make optimal use of a channel’s capacity, our observations instead match predictions of a relatively inflexible sample-based encoding mechanism, which we argue is consistent with the constraints imposed by the biology of the visual system. These findings are relevant to current debates about working memory recruitment of sensory cortex, and re-coding of visual information into more abstract mnemonic formats.", "SubmissionID": 527}, {"Day": "Monday", "Time": "15:30–17:00", "SessionID": 41, "Topic": "Computational Modelling and Neural Mechanisms", "Title": "Biases in orientation perception reflec­t sparse predictive coding rather than Bayesian inference", "Author": "Stefan Brugger", "CoAuthors": "Christoph Teufel", "Abstract": "Early vision is frequently characterised as Bayesian inference. For instance, natural scenes are dominated by horizontal and vertical orientations (‘cardinals’). The visual system is hypothesised to incorporate this environmental regularity as a prior, potentially implemented via the preponderance of V1 neurons tuned to cardinals relative to oblique orientations. While this framework has successfully driven research, inconsistencies have emerged. Brain-decoding studies demonstrate that the neural representation of orientation is biased toward cardinals, which Bayesian models account for via the prior. Yet psychophysical studies report biases away from cardinals, which Bayesian models informed by efficient coding explain via likelihood asymmetry. No extant model, however, can account for attractive neural and repulsive behavioural biases concurrently. Here, we reconcile these inconsistencies. Using MEG-decoding in human observers, we manipulate stimulus precision via contrast, and find neural biases towards cardinals. Critically, bias is greater for high- than for low-precision stimuli. This pattern is incompatible with the effect of an orientation-prior, but can account for repulsive psychophysical biases. Unlike neural decoding, psychophysical measurements are necessarily relative, involving comparison of stimuli. The larger attractive bias we decode for high- compared to low-contrast stimuli should thus manifest behaviourally as a (seemingly) repulsive bias. Consistent with this notion, psychophysical testing in the same observers revealed biases away from cardinals when matching orientations of low- and high-contrast stimuli. We reproduce this pattern of neural and behavioural biases in-silico using a sparse predictive-coding network. Our network performs inference over image contents holistically, rather than over isolated features such as orientation. When trained on natural images, it spontaneously develops V1-like receptive fields with non-homogeneous orientation-tuning preferences. This non-homogenous tuning, together with sparsity-inducing lateral inhibition, is the key mechanism underpinning the bias pattern. Overall, our findings are inconsistent with Bayesian accounts of early vision, but provide novel mechanistic insight, reconciling psychophysical and neuroimaging results.", "SubmissionID": 548}, {"Day": "Monday", "Time": "15:30–17:00", "SessionID": 41, "Topic": "Computational Modelling and Neural Mechanisms", "Title": "Bridging Computational Models, Brain Activity, and Behaviour: A Python Toolbox for Advanced RSA", "Author": "Jasper van den Bosch", "CoAuthors": "Tal Golan, Benjamin Peters, JohnMark Taylor, Mahdiyar Shahbazi, Baihan Lin, Ian Charest, Jörn Diedrichsen, Nikolaus Kriegeskorte, Marieke Mur, Heiko Schütt", "Abstract": "Understanding visual processing requires connecting complex computational models, such as deep neural networks, to large-scale neural and behavioral datasets. Representational similarity analysis (RSA) provides a central framework for this by allowing vision scientists to compare representational geometries across brains, computational models, and behavior. However, mapping high-dimensional vision models to noisy biological data presents distinct statistical challenges. \n\nTo address these challenges, we introduce rsatoolbox, an open-source Python library implementing recent methodological advances in RSA. The toolbox provides improved dissimilarity estimators, including cross-validated distances that eliminate the positive bias caused by measurement noise, alongside a novel Poisson symmetrized-KL divergence designed to specifically handle the variance of neural spiking data. Furthermore, it offers advanced comparators for Representational Dissimilarity Matrices (RDMs). These include whitened metrics to account for correlated errors in fMRI or M/EEG data, and a computationally efficient rank correlation coefficient (Kendall’s \\rho_a) for evaluating model architectures.\n\nCrucially, rsatoolbox establishes a rigorous inferential framework for evaluating visual models. It implements a two-factor bootstrap procedure that enables inferences to confidently generalize across both independent subjects and distinct visual stimuli simultaneously. The package also features visualization tools, such as multidimensional \"model maps\", to clearly communicate complex pairwise comparisons between candidate vision models and neural data. By integrating with the broader Python neuroscience ecosystem, rsatoolbox equips vision scientists with a standardized, robust platform to explore neural geometries across fMRI, M/EEG, spiking, and behavioral data, supporting the discovery of the computational mechanisms underlying visual perception.", "SubmissionID": 562}, {"Day": "Monday", "Time": "15:30–17:00", "SessionID": 41, "Topic": "Computational Modelling and Neural Mechanisms", "Title": "When (timing) is determining visual system organization", "Author": "Sharon Gilaie-Dotan", "CoAuthors": "", "Abstract": "The dominant role of any sensory system is to allow the organism to sense its environment (“NOW”), plan its potential (re)action according to its goals given the current surroundings and events (“SOON”), and learn (acquire knowledge) from current experiences for the future (“LATER”). While these are critical for survival (whether the organism is standstill, moving slowly or extremely fast through its environment), the prevailing model of human visual system organization mainly concerns and is mainly based on data from organisms that are located in one place in their environment. Thus, the temporal relevance of visual information for the behaving organism has been critically overlooked. In fact, the speed at which we move through the environment probably dictates and qualitatively changes “the what” and “the where” our visual system is tuned to (e.g. when running or driving but not when seated - information very far from us becomes highly relevant to our survival as our body may approach it very soon). I assume timing is the key factor determining what and where the visual system would be most sensitive to. Therefore, I propose a novel overarching comprehensive visual system organization framework that addresses the prevailing model’s limitations. The novel framework suggests the visual system is composed of 3 main visual pathways, each revolving around a pivotal egocentric time range: the “now” pathway (processing all the visual changes happening now across the visual field, mostly visual motion), the “soon” pathway (processing all visual information that may likely be relevant in the next 3s, today’s dorsal/”where”/”how” pathway), and the “later” pathway (processing information that may be relevant later on, today’s ventral/”what” pathway). I will follow this with multiplicity of predictions stemming from this model and highlight outstanding questions for new directions of research.", "SubmissionID": 583}, {"Day": "Monday", "Time": "15:30–17:00", "SessionID": 39, "Topic": "Material Perception", "Title": "Response activation by complex animal silhouettes: Double dissociation between response priming and custom-made masking functions", "Author": "Thomas Schmidt", "CoAuthors": "Johannes Gros, Lisa Jakoby, Jessica Klein, Lara Neff, Franziska Ober, Parsalaraib Rana", "Abstract": "Previously, dissociations between the time-courses of response priming and visual awareness have only been reported for simple geometrical and color stimuli. Here we use the recent technique of “induced dissociations” to extend those findings to more complex stimuli. Participants are presented with animal silhouettes as primes and targets and are asked to respond either to the looking direction of the target animal or to identify the looking direction of the masked prime animal. Prime visibility is controlled by a metacontrast mask that consists of the superimposed silhouettes of both looking directions. Mask contrast is systematically coupled to prime-target SOA in two different ways to induce qualitatively different masking functions without affecting the time-course of priming. We show that response priming effects increase with SOA no matter whether prime discrimination performance increases or decreases. Our results indicate for the first time that double dissociations between response priming and visual awareness of the critical prime feature extend beyond simple stimuli and to visually complex, semantically relevant materials.", "SubmissionID": 91}, {"Day": "Monday", "Time": "15:30–17:00", "SessionID": 39, "Topic": "Material Perception", "Title": "Active exploration reveals individual differences in material discrimination", "Author": "Hideki Tamura", "CoAuthors": "Ryu Nomachi, Shigeki Nakauchi, Tetsuto Minami, Takuma Morimoto", "Abstract": "Understanding which visual cues support material discrimination is a central question in material perception. While this has traditionally been studied using passive viewing paradigms, recent works have adopted active exploration paradigms. This allow observers to move their viewpoint or manipulate objects, enabling the investigation of how diagnostic cues are actively acquired. However, it remains unclear how such cue-acquisition strategies vary across individuals. In the present study, we examined individual differences in cue-acquisition strategies during an active material discrimination task and whether these differences can be predicted by image- and video-computable features. Twenty participants explored virtual objects in a head-mounted display by moving their heads and manipulating the stimuli using handheld controllers judging whether each object appeared more metallic or glass-like. The stimuli varied continuously from glass to metal and included diverse shapes and illumination environments. Exploratory behavior was categorized into actions such as pulling the object, approaching it, and viewing it from above or below. Principal component analysis revealed two dominant dimensions: overall exploration duration and relative reliance on viewpoint changes versus object manipulation. Clustering identified two strategy groups: one relying primarily on viewpoint changes with shorter exploration durations and other relying more on object manipulation with longer durations. Despite these differences, both groups exhibited comparable increases in discrimination sensitivity across trials. Furthermore, simple models based on single image- and video-based features (e.g., temporal luminance changes and optic flow) were used to predict participants’ responses. Despite their simplicity, some models achieved high discriminability (d’ > 2) for certain participants, although predictive performance varied substantially across individuals. These findings suggest that although observers can adopt diverse strategies sufficient to support increases in discrimination sensitivity, different individuals likely rely on different visual cues during active material discrimination.", "SubmissionID": 283}, {"Day": "Monday", "Time": "15:30–17:00", "SessionID": 39, "Topic": "Material Perception", "Title": "Active gaze sampling differentially shapes the use of motion and image cues in gloss perception", "Author": "竜 野町", "CoAuthors": "Takuma Morimoto, Shigeki Nakauchi, Tetsuto Minami, Hideki Tamura", "Abstract": "Gloss perception is a fundamental visual function that involves estimating the physical properties of object surfaces, and specular flow is known to play a critical role in this process. However, how motion-based and image-based information is integrated during active viewing and whether gaze behavior directly contributes to the use of these cues in perceptual judgments remain unclear. Here, we investigated how physical stimulus properties and gaze behavior jointly contribute to gloss judgments. Participants viewed rotating objects in a virtual environment and judged whether they appeared glossy or not. In addition to a “shiny” condition, in which specular reflections moved across the surface, we employed a “sticky” condition in which reflections were attached to the surface and rotated with the object. Eye movements were recorded, and optical flow and static image features around fixation were analyzed alongside temporal changes in gaze. Perceived gloss was enhanced in the shiny condition but markedly reduced in the sticky condition. Compared with luminance-based features (five features; 72.6%), random forest models predicting gloss judgments revealed that optic flow-based features (five features) achieved higher accuracy (76.7%). Crucially, when actual gaze trajectories were replaced with random trajectories, the performance of the luminance-based model significantly decreased, whereas the optic flow-based model maintained its performance. These findings indicate that motion-based information contributes more robustly to gloss perception than static image information does and suggest that gaze-dependent sampling primarily supports the acquisition of localized image cues, whereas motion-based cues are more globally available. These findings highlight the importance of active exploration in shaping the availability and utilization of visual information for material perception, suggesting that the contribution of visual cues may depend on whether they are acquired through self-generated or externally driven sampling.", "SubmissionID": 304}, {"Day": "Monday", "Time": "15:30–17:00", "SessionID": 39, "Topic": "Material Perception", "Title": "Predicting gloss perception across asymmetric scene conditions", "Author": "Zoe Goll", "CoAuthors": "Jacob R. Cheeseman, Roland W. Fleming", "Abstract": "Perceived gloss depends not only on the reflectance of a surface, but also on distal scene factors such as illumination, viewpoint, and object shape. As a result, the discriminability of two surfaces can vary substantially across scene conditions ranging from easily discriminable to perceptually equivalent. Here, we investigate whether perceived equivalence and discriminability of two surfaces across asymmetric scenes can be predicted using image-computable models.\n\nWe rendered surfaces with five levels of surface roughness using combinations of ten illuminations, ten viewpoints, and ten shapes. We then calculated perceived visual differences between neighbouring roughness levels within each combination of scene factors using a visual difference predictor (VDP; Mantiuk et al., 2023). Based on the average of the predicted perceptual differences within each scene, we selected three scenes with the highest differences (“high-VDP”) and three with lowest differences (“low-VDP”). If VDP predicts gloss perception across asymmetric scene conditions, sensitivity to gloss changes should differ the most between those scene sets. To test this, we fit psychometric functions for each scene based on observers’ gloss judgments in a 2AFC task comparing our chosen scenes to an asymmetric comparison with a near-median VDP value. We find that VDP predicts biases and sensitivity in gloss perception across different scenes, even though it is based on measuring visibility of differences within particular scenes. Specifically, in the “low-VDP” scenes, surfaces appeared rougher and sensitivity to gloss changes was reduced.\n\nThese findings suggest that image metrics such as VDP can not only predict sensitivity to material changes within a scene, but can be a useful tool for predicting bias and sensitivity across asymmetric scene conditions.", "SubmissionID": 307}, {"Day": "Monday", "Time": "15:30–17:00", "SessionID": 39, "Topic": "Material Perception", "Title": "Beyond Vision: How Sound Shapes Predictions of Material Dynamics", "Author": "irem tuncel", "CoAuthors": "Ayça Kömüryakan, Dicle Dövencioğlu", "Abstract": "Humans effortlessly infer the physical behavior of the things around them without formal knowledge of physics, a capacity described as “intuitive physics”. While this internal physical engine relies primarily on visual input, its multisensory foundations remain underexplored. Here, we examined how observers predict materials’ dynamic behaviors using audiovisuals of real-world materials, and whether material sounds modulate these judgments. In two experiments, participants predicted material behavior across five categories (fine granular, coarse granular, metals, hard metals, fluids). In Experiment 1, participants (n = 30) rated silent videos in 120 trials:  15 (materials) × 2 (exploratory behaviors: shaking, pouring) × 4 (dynamic behaviors: piling, splattering, spreading, and resting). Experiment 2 (n = 23) used the same design but included congruent and incongruent natural material sounds. Results revealed a systematic effect of material structure on participants’ predictions of material dynamics regardless of the sound condition. As the particle size of materials increased from fine to coarse granulars to metals and hard materials, piling up ratings consistently decreased, whereas splattering predictions increased. Fluids deviated from this trend, unsurprisingly receiving the highest ratings for splattering and the lowest for piling up. Fluids were also predicted to spread the most, followed by hard materials, granulars, and metals. Predictions for resting showed less consistent structure. Presenting the material sounds influenced judgments in a selective manner, affecting specific material dynamics (e.g., reliably increasing splattering ratings of fluids, piling up of hard materials and fine granulars, resting of metals and coarse granulars) rather than producing a general shift in ratings across conditions. Our findings support an overall visual reliance for predicting materials’ behavior, while suggesting that sounds can enhance material-specific inferences under certain conditions. Ongoing work isolating auditory signals will further clarify the independent and combined contributions of sensory modalities to material-related intuitive physics.", "SubmissionID": 308}, {"Day": "Monday", "Time": "15:30–17:00", "SessionID": 39, "Topic": "Material Perception", "Title": "Seeing Materials from Sparse Motion: The Role of Configurational Information", "Author": "Amna Malik", "CoAuthors": "Lisanne Neubert, Katja Doerschner", "Abstract": "Motion alone can evoke vivid impressions of materials, even in the absence of texture, color, or surface information. This is well demonstrated by dynamic dot materials (DDMs), displays that depict materials using only a few dots attached to or embedded within a moving object. However, it remains unclear which features of these displays our visual system extracts to infer material.  DDMs carry three potentially informative cues: global shape, conveyed by the overall configuration of moving dots, local motion, conveyed by the trajectories of individual dots, and relative motion, conveyed by the dynamic configurational relations among neighboring dots. We tested the contributions of global shape and local motion in a separate study. Here, we target relative motion by manipulating dot density and by scrambling the dot configuration within DDMs. Lowering dot density reduces the amount of available relative motion and weakens the shape information in the display. Scrambling dots completely disrupts this configurational information. We rendered DDMs at five density levels ranging from low to high, depicting materials from five different categories (smoke, liquid, jelly, rigid-breakable, and fabric). For each animation, we rendered an original and a scrambled version (representative stimuli: https://tinyurl.com/dynamic-dot-materials). 125 observers viewed these animations and classified them as depicting independent motion, structured motion, or recognizable material. Our results show that intact DDMs were frequently perceived as materials even at low to medium density, whereas scrambled DDMs were rarely perceived as materials, despite sharing identical motion statistics. Increasing the dot density in intact condition shifted the probability of responses from independent motion to material percept. This suggests that the visual system relies on configurational dynamics of moving dots to infer material from sparse motion. Increasing the dot density increases the reliability with which configurational relations and shape information can be recovered, thereby aiding the perception of material from motion.", "SubmissionID": 424}, {"Day": "Monday", "Time": "15:30–17:00", "SessionID": 39, "Topic": "Material Perception", "Title": "Skin parameters predict individual differences in surface pleasantness", "Author": "Müge Çavdan", "CoAuthors": "Nedim Goktepe", "Abstract": "Perceptual judgements of physical objects and their properties, such as the smoothness of fuzzy skin of a peach, are typically highly consistent across individuals, whereas affective evaluations (e.g., pleasantness) tend to be more divisive. While previous work has linked such variability to prior experience and dispositional factors, the potential contribution of individual differences in skin properties remains largely underexplored. This is notable given the established role of skin parameters in shaping the perception of haptic features.  To fill this gap, we conducted a study in which 56 participants explored surfaces varying in physical roughness (18.3, 25.8, 46.2, 58.5, 125, 269, 425 µ) using their index finger and rated perceived roughness and pleasantness in counterbalanced sessions. Skin hydration and elasticity were measured prior to and after each session. Expectedly, participants were able to discern different roughness levels as indicated by the increase in perceived roughness with increasing physical roughness. Next, we modelled pleasantness ratings of participants as a function of physical roughness using linear and quadratic functions. In the quadratic group, pleasantness varied minimally across small differences in roughness but showed stronger changes across wider ranges of roughness. Interestingly, for some individuals, pleasantness was highest at the intermediate roughness levels.  Model comparison based on the Bayesian Information Criterion (ΔBIC > 2) was used to classify participants into two groups. This resulted in an even number of participants assigned to each response profile. Individuals exhibiting a quadratic relationship between roughness and pleasantness showed significantly higher skin hydration both before and after the pleasantness session. Similarly, these individuals showed a greater skin elasticity, although this difference was observed only prior to the pleasantness session. Together, these group differences suggest that people with more hydrated and elastic skin tend to have higher pleasantness thresholds when exploring rough surfaces.", "SubmissionID": 452}, {"Day": "Monday", "Time": "15:30–17:00", "SessionID": 39, "Topic": "Material Perception", "Title": "Hearing Softness: Pitch and Temporal Qualities of Sounds Influence Material Perception", "Author": "Defne Akkuş", "CoAuthors": "Ayşe Sanem Seçan, Dicle Dövencioğlu", "Abstract": "Material perception emerges from the integration of multiple sensory modalities, and it is increasingly understood that sound-symbolic words can elicit particularly vivid material impressions, especially when they are presented spoken. At the same time, a growing body of work shows that prosodic variation in speech systematically shapes how people perceive and evaluate objects, actions, and affective states, yet its role in material perception remains largely unexplored. For instance, it is unclear whether prosodic variation alone can alter representations of material quality. To test this, we conducted three psychophysical experiments using a two-interval forced-choice paradigm to examine how pitch and temporal rate influence perceived material qualities. Participants selected which of the two sounds better matched material-related adjectives that capture core softness dimensions, such as wetness, roughness, granularity, surface softness, and compliance. In Experiment 1 (N=31), manipulations were applied to Turkish sound-symbolic words. Robust, dimension-specific effects emerged: pitch modulated judgments of heaviness, silkiness, and wetness, whereas temporal rate influenced judgments of heaviness and roughness, demonstrating systematic effects of prosody in perceived material qualities. In Experiment 2 (N=31), the same manipulations were applied to natural material sounds. Similar but weaker effects were observed, suggesting that prosody, in a broader sense, can influence material perception beyond language, though to a lesser extent. In Experiment 3 (N=24), pitch and temporal manipulations were applied to pure tones (beeps) as a non-verbal control. No consistent trends emerged, indicating that low-level acoustic variation alone is insufficient to elicit patterns of judgment in material perception. Together, these findings suggest that prosodic characteristics of verbal and non-verbal signals modulate perceived material properties through interactions with semantic and sensory context, and provide new evidence for the context-dependent nature of multisensory material representations.", "SubmissionID": 456}, {"Day": "Monday", "Time": "15:30–17:00", "SessionID": 37, "Topic": "Aesthetics and Art", "Title": "Gallery of Fakes: An Eye-tracking Investigation of How Perceived Inauthenticity Impacts the Aesthetic Appreciation of Faces vs. Artworks", "Author": "Long Feng Huang", "CoAuthors": "Jonathan Cant, Oshin Vartanian", "Abstract": "Is an object any less beautiful just because it is a fake? Authenticity status can have a rather complex and multifaceted effect on the aesthetic perception of various stimulus categories. Previous work has shown that copies and forgeries of paintings tend to receive lower monetary and aesthetic evaluations compared to the original artwork (Locher et al., 2015; Rabb et al., 2018), whereas faces with makeup or plastic surgery tend to elicit lower social/moral judgments, but are not penalized in aesthetic ratings compared to natural faces (Liang et al., 2023). These findings highlight a point of potential nuance in the aesthetic appreciation of inauthentic stimuli, modulated by the stimulus type. However, there has yet to be any work directly comparing the costs of “fake beauty” in artworks versus faces, despite the substantial parallels in their social implications (e.g., greater monetary profits through the misrepresentation of identity). As such, we implemented an eye-tracking paradigm to characterize the aesthetic and oculomotor signatures of perceived authenticity status. Participants were first primed with a label corresponding to a high (faces = natural, paintings = original), medium (faces = makeup, paintings = copy), or low authenticity status (faces = plastic surgery, paintings = forgery), and were then shown an image of a human face or still-life painting. Their free-viewing eye movements were recorded during the stimulus presentation period, and they were subsequently asked to rate the image on their familiarity, liking, impressiveness, and desire to engage with it. The results of this experiment will contribute novel insights into the cognitive impact of perceived authenticity on the aesthetic appreciation of faces versus artworks, providing a holistic view into the psychophysiological effects of “fake beauty” and revealing possible consequences associated with modern image manipulation in contexts such as advertising, news, social media, and entertainment.", "SubmissionID": 11}, {"Day": "Monday", "Time": "15:30–17:00", "SessionID": 37, "Topic": "Aesthetics and Art", "Title": "Designing resilient cities: Greenery, rectilinearity, and sociality as key factors in aesthetic preferences", "Author": "Roxane Ayral", "CoAuthors": "Sarah Khazaz, Adeline Lacroix, Anastasiia Sharova, Frédéric Dutheil, Martial Mermillod", "Abstract": "Urban nature-based solutions are increasingly recognized for their role in climate change adaptation; however, their success also depends on their visual appeal, which can influence public acceptance and engagement. This study investigates how visual features—specifically building shape, presence of greenery, and cues of sociality—affect aesthetic evaluations of architecture, drawing on principles from neuroaesthetics and visual perception research. Forty-three participants (41 females, Mage =20.93, SDage =4.34, ages 18–44) were divided into three experimental groups (positive or negative semantic information, and control) and asked to rate the aesthetics of buildings varying in perceived shape, greenery, and sociality using a visual analogue scale. Results showed a preference for rectilinear forms, the inclusion of greenery, and higher sociability cues, with a notable interaction between building shape and greenery. Semantic information did not significantly influence aesthetic ratings. These findings underscore the role of visual cues and their interactions in shaping environmental aesthetic preferences, offering insights for both architectural design and future research on visual perception in urban environments.", "SubmissionID": 27}, {"Day": "Monday", "Time": "15:30–17:00", "SessionID": 37, "Topic": "Aesthetics and Art", "Title": "Aesthetically Reframing the Unwanted: Perceptual Modulation of Evaluative Judgments for Negatively Connoted Medical Stimuli", "Author": "Claus-Christian Carbon", "CoAuthors": "Alexander Pastukhov", "Abstract": "Medical assistive devices are strongly associated with negative affective priors, providing a useful test case for examining how perceptual and multisensory factors modulate evaluative judgments under biased conditions. We investigated whether systematic variation in visual presentation, spatial context, and haptic access alters the perceptual representation of ostomy products along dimensions of aesthetics, ergonomics, and activity-related affordances. Across two experiments, we combined continuous spatial arrangement paradigms with forced-choice psychophysics and eye tracking. In Experiment 1, participants arranged physical products along adjective-defined continua (e.g., beautiful–ugly, dynamic–static, user-friendly–complicated) under visual-only versus visuo-haptic conditions, enabling the extraction of perceptual scaling functions and cross-dimensional structure. In Experiment 2, participants performed paired-comparison judgments on images of products presented on the body (frontal vs. lateral viewpoints), while gaze behavior was recorded to assess attentional allocation and feature weighting. Results show that evaluative judgments are systematically modulated by low- and mid-level perceptual cues, despite strong negative priors. Contextualized body presentations shift judgments toward increased perceived normality and activity compatibility, particularly for lateral views that reduce canonical object salience. Products exhibiting features consistent with everyday object categories (e.g., textile-like appearance) are mapped closer to positive regions in perceptual space, suggesting category-based predictive influences. Visuo-haptic integration selectively enhances judgments along ergonomics-related dimensions, indicating modality-specific weighting in multidimensional evaluation. Eye-tracking data reveal that attentional selection is biased toward features diagnostic for category reclassification, supporting a predictive processing account in which perceptual inference minimizes conflict between sensory input and prior expectations. These findings demonstrate that evaluative representations of negatively connoted objects are plastic and context-dependent, and can be systematically shifted through controlled manipulation of perceptual variables. The study provides a framework to reframe an entire product sector such a medical assistive devices.", "SubmissionID": 81}, {"Day": "Monday", "Time": "15:30–17:00", "SessionID": 37, "Topic": "Aesthetics and Art", "Title": "Quantifying Beauty – Comparing the results of ratings and pairwise comparisons", "Author": "Barbara F. Mühlbauer", "CoAuthors": "Bettina Rolke", "Abstract": "In most empirical aesthetic research, data on the aesthetic appeal of stimuli is obtained by asking participants to rate them on a Likert scale, requiring them to indicate, for example, their perceived beauty on a scale from 1 (not at all beautiful) to 7 (very beautiful). This rating method has many advantages, as it is easy to implement and allows multiple dimensions of an aesthetic impression to be evaluated simultaneously. Pairwise comparison on the other hand can be useful when small effect sizes are at play or individual differences are of interest.\n\nIn two studies, we compared the two methods and investigated (a) whether measuring aesthetic judgments using both methods yields comparable results and (b) how stable the individual aesthetic judgments are over time for the two methods. In the first study, we compared judgments of the beauty of chair images repeating each judgment ten times. The beauty assessments obtained using the two methods were very similar. Furthermore, regardless of method, repeated measurements within participants were strongly correlated, suggesting that their perception of beauty is consistent and does not change substantially over time. In contrast to this, taste typicality, the correlation between one participant and the leave-one-out average of all other participants, was only moderately positive on average, indicating a wide range of opinions. In the second study, we tested whether these results would generalize to other stimuli by using abstract artworks. Similar results were obtained, except for even lower values of taste typicality in ratings between participants. In summary, this systematic comparison of the two evaluation methods provides insight into their respective advantages and disadvantages, which will be discussed in the poster.", "SubmissionID": 99}, {"Day": "Monday", "Time": "15:30–17:00", "SessionID": 37, "Topic": "Aesthetics and Art", "Title": "What can visual perceptual sensitivity tell us about individual differences in appreciation?", "Author": "Eline Van Geert", "CoAuthors": "Johan Wagemans", "Abstract": "To what extent can differences in how we visually perceive images and patterns explain differences in how we appreciate them? In this study, we assessed individuals’ pairwise preferences for image pairs within five different sets (images of paintings, abstract patterns, natural scenes, photographs of neatly organized compositions, and natural textures) at two timepoints (two months apart). For 253 participants, we also measured threshold-level sensitivity for differences in lightness, chroma, hue, shape, orientation, and size using interleaved staircases, for two reference values per feature dimension. Moreover, participants completed several questionnaires to characterize their perceptual and aesthetic processing abilities and experience (incl. VAIAK, VAST-R). Preliminary analyses indicate that individual differences in perceptual sensitivity were positively correlated across features (r = .01–.44), and that perceptual sensitivity was positively correlated with aesthetic sensitivity as measured with the VAST-R (r = .17–.30). Furthermore, especially orientation and shape sensitivity correlated positively with preferences for order (except for paintings; r = .04–.34) and with preferences for complexity in natural scenes (r = .19–.30). Further analyses will dive deeper into modeling the perceptual sensitivity data and explore how different person characteristics, like individual differences in perceptual sensitivity, personality, and art expertise, interconnect in predicting individual differences in aesthetic appreciation across different stimulus sets.", "SubmissionID": 120}, {"Day": "Monday", "Time": "15:30–17:00", "SessionID": 37, "Topic": "Aesthetics and Art", "Title": "Art wins: Higher Valuation Responses to Op Art Compared to Matched Optical Illusions", "Author": "Amy Sung", "CoAuthors": "Minsuk Sung, Claus-Christian Carbon, Christian Wallraven", "Abstract": "The question of how we approach visual art differently from non-art has long been of interest in perceptual science and empirical aesthetics. Here, we used two visually similar yet conceptually distinct categories of images to probe this question: Op Art and optical illusions. The former takes inspiration from the latter, but is approached as an object of aesthetic appreciation, whereas the latter is used primarily as a study object in perceptual science.\n\nWe asked 47 Op Art-naïve participants to review 48 randomized stimuli in a 2×2 design with factors Type (Op Art vs optical illusions) and Color (achromatic vs chromatic). Optical illusions were selected to resemble the Op Art works as closely as possible. Participants reported how much they would be willing to pay for each image. Total viewing time and normalized valuation were analyzed as dependent variables. \n\nA repeated-measures ANOVAs revealed a significant Type × Color interaction for valuation (F(1,45)=6.70, p=.013). The main effect showed that Op Art was valued more highly overall than illusions, but the effect of color reversed across stimulus type: chromatic illusions were valued more highly than achromatic ones, whereas achromatic Op Art was valued more highly than chromatic Op Art. A comparable interaction pattern was also observed for viewing time (F(1,46)=10.39, p=.0023), with correlations between viewing time and valuation positive and similarly strong in all four categories (r >.431).\n\nOverall, our results show that Op Art was valued more than illusion stimuli, despite the broad visual similarity between the two categories. At the same time, the robust positive correlations indicate that valuation and viewing engagement are closely linked across stimulus categories. Our findings constitute a first step into exploring the features of Op Art in perceptual science with future work diving into comparison of computational descriptors.", "SubmissionID": 152}, {"Day": "Monday", "Time": "15:30–17:00", "SessionID": 37, "Topic": "Aesthetics and Art", "Title": "Eyes-CREAM: From Eyes to Compositional Relations—An Esthetic Annotation Model", "Author": "Doreen Hii", "CoAuthors": "Maarten Leemans, Lisa Koßmann, Johan Wagemans", "Abstract": "Artistic composition plays a vital role in aesthetic appreciation. Even when individual elements are visually appealing, a poor spatial organization can diminish the overall aesthetic quality of an artwork. While effective composition can enhance aesthetic appeal, the concept of composition remains abstract and difficult to quantify. To bridge the gap between objective metrics and subjective appreciation, we hypothesize that humans process composition by spontaneously establishing the spatial relations between different image regions. This internal structure can be extracted in the form of contours by analyzing their gaze patterns.\n\nMoving beyond basic photographic rules (such as the rule of thirds, central emphasis, or the presence of leading lines), this project introduces a model to automatically extract “compositional annotation” contours from viewer gaze patterns. These annotation contours capture both the relationships among visual elements and the higher-level geometric structure emerging from them. We used an eye tracking dataset comprising 40 photographs and 40 paintings with strong composition, viewed by 43 participants. The eye-movement data are first processed using an edge bundling algorithm. Then, each visual stimulus is divided into small grids to extract localized directional flow vectors. Using Gestalt principles of proximity and good continuation, prominent flow vectors are interpolated to generate the final annotation contours. Initial results indicate that the model successfully generates meaningful compositional contours from eye movement data. Future work will validate the annotated composition contours against expert annotations.\n\nBy transforming the abstract artistic concept of composition into concrete mathematical contours, this work bridges human perception and computational aesthetics as a step towards human-like machine evaluation and perhaps even generation of visual aesthetics.", "SubmissionID": 176}, {"Day": "Monday", "Time": "15:30–17:00", "SessionID": 37, "Topic": "Aesthetics and Art", "Title": "Physical Plausibility, Animacy, and Pleasantness in Bouncing Motion", "Author": "Michele Vicovaro", "CoAuthors": "Giulio Contemori, Giulia Parovel, Martina Passaggi, Marco Bertamini", "Abstract": "Bouncing is a perceptually rich event in which an object falls under gravitational acceleration and collides with a rigid surface. Across four experiments, we examined how the physical parameters of a bouncing event influence judgments of physical plausibility, perceived animacy, and motion pleasantness. Experiments 1 and 2 showed that bounces with a physically plausible coefficient of restitution (C ≤ 1) were judged as more physically plausible and less animate than bounces violating energy conservation (C > 1). Moreover, motions consistent with gravitational acceleration (i.e., uniformly accelerated or decelerated) were perceived as more physically plausible than motions with constant velocity. Physically implausible bounces were not only judged as more animate, but also as more pleasant, indicating a positive association between animacy and pleasantness. However, pleasantness was strongly modulated by kinematic structure: bounces with uniform acceleration or deceleration were rated as more pleasant than constant-velocity bounces, despite this factor having little impact on perceived animacy. Experiment 3 showed that this effect cannot be reduced to familiarity, as it persisted when the motion was rotated by 180 degrees. Finally, Experiment 4, using eye-tracking, suggests that this effect may be driven by perceptual fluency: uniformly accelerated or decelerated motions are more predictable and easier to track. Overall, the findings highlight the interplay between physical plausibility, perceived animacy, and motion pleasantness in the perception of dynamic events.", "SubmissionID": 180}, {"Day": "Monday", "Time": "15:30–17:00", "SessionID": 37, "Topic": "Aesthetics and Art", "Title": "Perceptual and Aesthetic Sensitivity to Systematically Manipulated Image Composition", "Author": "Lisa Koßmann", "CoAuthors": "Milan Meulemans, Eline Van Geert, Stefanie De Winter, Michiel Willems, Johan Wagemans", "Abstract": "Image Composition is said to influence human preference, yet it has rarely been\noperationalized and tested empirically in rich images. In this study, we focus on three art-\ntheoretical principles often mentioned to underlie composition: Balance, Emphasis, and\nRepetition. In three online experiments, we directly manipulated and validated them\nseparately, and tested their effects on aesthetic preference.\nUsing a mix of generative AI and manual editing, we generated 180 images consisting of 60\nmotifs (realism and fantasy), with three intensity levels of each Composition principle (less,\nbase, more). In addition to participants' rankings, we recorded demographic backgrounds, art\ninterest and knowledge, and the qualitative reasoning behind their choices.\nTo verify our stimuli, our first Experiment (N=37) had participants rank image triplets from\n\"least\" to \"most\" for each compositional principle. Results from Plackett–Luce (PL) models\nshowed that the manipulations performed as expected in nearly every instance, with only three\nexceptions.\nIn Experiment 2 (N=152) we asked participants to rank image triplets with the same motif by\ntheir compositional quality or personal preference. While both criteria followed the expected\npatterns of “more” being ranked above the baseline condition and “less” being ranked below it\n(all PL), composition rankings showed a significantly stronger effect than preference rankings in\nthe \"more\" condition (Z = 2.05, p = 0.041, Wald-type -test).\nTo further test these effects, Experiment 3 (N=348) utilized a 2AFC design where participants\nchose between image pairs (across motifs) based on composition or preference. Analysis of\nitem-level worth estimates (PL) indicated that, on average, the experimental manipulation\nsuccessfully shifted rankings of composition, yet failed to produce a consistent effect on\nparticipant preference.\nAcross three experiments, our manipulations consistently influenced participants' rankings and\nchoices regarding image composition but had a much weaker or negligible impact on\nparticipants' personal preferences.", "SubmissionID": 184}, {"Day": "Tuesday", "Time": "09:00–10:30", "SessionID": 2, "Topic": "Clinical, Developmental, and Applied", "Title": "Unsupervised Discovery of Oculomotor Deficits in Progressive Supranuclear Palsy via Deep Temporal Clustering of Saccade Velocity Profiles", "Author": "Maha Habibi", "CoAuthors": "Alexander Kress, Donald Brien, Annette Janzen, Douglas Munoz, Wolfgang Oertel, Frank Bremmer", "Abstract": "Background/Objective: Traditional saccade analysis in Progressive Supranuclear Palsy (PSP) relies heavily on established discrete metrics (e.g., peak velocity, amplitude). While these metrics hold clinical value, they discard the continuous temporal dynamics of the eye movement. In this study, we propose a novel, featureless computational approach using deep sequence modeling to uncover disease-specific oculomotor phenotypes (OculoMotifs).\n\nMethods: High-resolution continuous gaze data from PSP patients and healthy controls (CTRL) were segmented into individual saccades. Instead of extracting summary statistics, the unextracted, variable-length velocity sequences were fed directly into a bidirectional Gated Recurrent Unit (GRU) network. After training the model to classify subjects using a multiple-instance learning framework with attention, we sought to interpret the learned physiological representations. We extracted the high-dimensional hidden states from the trained GRU encoder for each individual saccade. To mitigate the curse of dimensionality, we applied Principal Component Analysis (PCA) to compress the feature space, followed by unsupervised K-Means clustering to map the saccades into distinct behavioral subtypes based purely on their temporal dynamics.\n\nResults: This data-driven clustering revealed profound structural differences in the oculomotor repertoires of the two groups. The network autonomously isolated specific saccadic phenotypes (OculoMotifs), such as distinct downward/oblique trajectories with robust velocity profiles, that were abundant in healthy controls but entirely absent in the PSP cohort. Other saccade subtypes were significantly rarer in the patient group, directly reflecting the oculomotor limitations caused by the disease.\n\nConclusion: In conclusion, using AI to analyze continuous eye movements is not just highly accurate for diagnosis; it also helps to discover new, interpretable signs of the disease. By examining how the model groups these movements, we can understand and explain which eye functions are impaired due to neurodegeneration.\n\nSupported by HMWK (project number: LOEWE/5/A005/519/06/00.006(0007)/E39)", "SubmissionID": 353}, {"Day": "Tuesday", "Time": "09:00–10:30", "SessionID": 2, "Topic": "Clinical, Developmental, and Applied", "Title": "Individual differences in children’s decision making in visual motion and orientation tasks: understanding the sources of variability", "Author": "Lucy McKeown", "CoAuthors": "Catherine Manning", "Abstract": "Previous studies have shown that children’s visual perception becomes faster and more accurate with age. These studies have focused predominantly on mean differences across age groups, but a key unresolved issue is the large amount of variability across children. In this pre-registered study, an unselected sample of 200 children aged 7 to 10 years participate in visual motion and orientation tasks, at two time points in order to address this issue. By assessing test-retest reliability of children’s performance, we aim to show whether there are meaningful differences between children, or alternatively whether measurement noise alone is the source of variability in previous research. Assuming that there is meaningful variation, we aim to see whether characteristics related to neurodiversity predict performance on motion and orientation tasks.\n\nChildren are asked to respond according to the overall direction of moving dots and the orientation of gratings in visual motion and orientation tasks respectively. Children are tested at two time points (7-18 days apart), and the order of the two tasks is counterbalanced across participants. Based on a preliminary analysis of 53 participants, we see moderate test-retest reliability on motion (ICC=0.50) and orientation (ICC=0.64) tasks. We also find that higher autistic quotient scores are associated with increased accuracy in the orientation task. This supports the idea that autistic traits may be related to prioritising accuracy when making decisions. No other relationships between the developmental characteristics (reading ability, intolerance of uncertainty, or ADHD strengths and weaknesses) and performance are shown to be significant. In the full dataset, these relationships will be explored further and supplemented with diffusion model analysis to decompose performance into distinct processing stages.", "SubmissionID": 409}, {"Day": "Tuesday", "Time": "09:00–10:30", "SessionID": 2, "Topic": "Clinical, Developmental, and Applied", "Title": "Pointing performance of low vision individuals when selecting a target among flankers in virtual reality : effect of pointing techniques and pointing visual feedback", "Author": "Camille Bordeau", "CoAuthors": "Célia Passerel, Eole Lapeyre, Ambre Denis-Noël, Jean-Baptiste Melmi, Marianne Vaugoyeau, Carlos Aguilar, Iliana Huyet, Caroline Topart, François Devin, Frédéric Matonti, Pierre Kornprobst, Eric Castet", "Abstract": "Individuals with Central visual Field Loss (CFL) have difficulty to perform visually-guided pointing tasks in Virtual Reality (VR). To improve the accessibility of VR pointing tools, we investigated the ability of these individuals to point at a target among flankers that induced different levels of crowding. A psychophysical approach in a controlled VR environment was used with different pointing conditions. \n\nExperiments were implemented with the open-source PTVR toolbox (https://ptvr.inria.fr/) in a VR headset (Vive Pro). Patients with CFL (N = 60) had to select a 2° diameter target dot by pointing at it under monocular viewing. Pointing was achieved with a hand-contingent pointer seen as a « laser beam » or with a head-contingent pointer seen as a 6° diameter reticle (crossed design). The target was displayed alone or inbetween two vertically-aligned identical flanker dots. Target/flankers distance (Δ) varied from 7.4° to 2.6°. In two independent groups, the target started to flicker as soon as it was pointed at (feedback condition) or not (no-feedback condition). Selection was validated by pressing the hand controller’s trigger. Pointing performance was assessed by measuring selection accuracy and selection times. \n\nMain results show that average accuracy for head- and hand-pointing are about 0.96 and 0.89 respectively. For both techniques, accuracy decreases when Δ decreases. The rate of this decrease is higher with hand-pointing than with head-pointing, and is similar for both feedback conditions. On average, head-pointing induces lower selection times than hand-pointing. \n\nThis study describes conditions where CFL persons are able to efficiently use hand- and head-pointing techniques with similar accuracy. This should allow patients having neck, or hand, weaknesses to choose hand-, or head-pointing respectively. Our work also provides quantitative recommandations to improve pointing for low vision individuals when interfaces contain packed items inducing crowding.", "SubmissionID": 435}, {"Day": "Tuesday", "Time": "09:00–10:30", "SessionID": 2, "Topic": "Clinical, Developmental, and Applied", "Title": "Visual discomfort to flicker and dynamic bandpass noise in autistic and non-autistic children", "Author": "Samantha Tyler", "CoAuthors": "Catherine Manning", "Abstract": "Autistic children often experience differences in sensory processing including heightened reactivity to visual information (e.g., flickering light or motion) which can cause discomfort. However, little is known about the exact visual parameters that cause discomfort in autistic children, and whether this differs from non-autistic children. In this pre-registered study, autistic and non-autistic, cognitively able children aged 6 to 14 years rated their visual discomfort for uniform flicker and dynamic bandpass noise stimuli using a visual analogue scale. \n\nUniform flicker stimuli flickered sinusoidally between two grey levels (0.8 Michelson contrast) at temporal frequencies of 1.875, 3.75 or 15Hz. Dynamic bandpass noise stimuli were presented at varied central spatial frequencies and spatial frequency bandwidths, with 1 octave filtered central temporal frequencies of 1 or 16Hz, unfiltered temporal frequencies, or translational drift at 1 or 16Hz.  \n\nPreliminary analyses of 17 autistic and 27 non-autistic children reveal increased visual discomfort for higher temporal frequencies (15-16Hz) for uniform flicker and dynamic bandpass noise in both autistic and non-autistic children. Dynamic bandpass noise was rated higher for visual discomfort than static bandpass noise. Autistic children showed a larger increase in visual discomfort from 1Hz to 16Hz compared to non-autistic children for dynamic bandpass noise. Surprisingly, autistic children showed reduced visual discomfort ratings overall compared to non-autistic children, although this may be due to a higher proportion of girls in the non-autistic sample to date.  \n\nThese preliminary data suggest visual discomfort is greater for temporal frequencies at which the early visual system has peak sensitivity, supporting the notion there are universal principles leading to visual discomfort of temporal visual information. They also suggest, while autistic and non-autistic children may differ in how they rate visual discomfort relative to their own baseline, autistic children may be more greatly affected by increases in temporal frequency compared to non-autistic children.", "SubmissionID": 442}, {"Day": "Tuesday", "Time": "09:00–10:30", "SessionID": 2, "Topic": "Clinical, Developmental, and Applied", "Title": "Allocentric visuospatial working memory is selectively preserved against age-related cognitive decline", "Author": "Stella Wernicke", "CoAuthors": "Paul Bays", "Abstract": "In visuospatial working memory (VSWM), both egocentric information relative to the observer and allocentric information about the spatial relationships between objects can contribute to recall. Previous work (Aagten-Murphy & Bays, 2019) found that resources for storing information from these two sources are limited, but independent. In adults, VSWM declines with age, but whether the two memory systems deteriorate equally is not known. \n\nTo disentangle the contributions of ego- and allocentric processing to age-related VSWM decline, we conducted two online experiments with a total of 160 young (18–30 years) and older (60–70 years) neurotypical healthy adults. In Experiment 1, participants viewed an array of colored disks and, after a brief delay, reported the remembered location of the disk matching a color cue. A larger gray disk was either present throughout the entire trial (LM-PRESENT), supporting its use as a spatial landmark, or only during stimulus presentation (LM-ENCODING). In Experiment 2, the single landmark disk was replaced by a cluster of smaller disks; we manipulated the reliability of allocentric information by varying the width of their distribution. During the delay, a new cluster was drawn from the same distribution (LM-PRESENT) or the cluster disappeared (LM-ENCODING). \n\nWe fit the data with a model optimally combining egocentric location information with allocentric information about location relative to the landmark when it is visible at recall (LM-PRESENT only). Allocentric precision is assumed to peak at the location of the landmark and decline exponentially with distance from it. While egocentric memory fidelity was lower in older than in younger adults, as expected (BF10 = 78), we found evidence against age-related differences in peak allocentric precision (BF10 = 0.359) and its decline with distance (BF10 = 0.522). This dissociation indicates selective preservation of allocentric working memory during healthy aging and establishes a baseline for investigating neurodegenerative disorders.", "SubmissionID": 458}, {"Day": "Tuesday", "Time": "09:00–10:30", "SessionID": 2, "Topic": "Clinical, Developmental, and Applied", "Title": "The Effect of Executive Dysfunction on Visuospatial Skills in Mild Cognitive Impairment", "Author": "Özden Erkan OĞUL", "CoAuthors": "Özden Erkan Oğul, Özden Erkan Oğul", "Abstract": "Aim: Understanding the relationship between executive functions and visuospatial skills in mild cognitive impairment (MCI) is important for identifying early indicators of cognitive decline. The present study aimed to investigate the relationship between executive function problems and visuospatial functions in Mild Cognitive Impairment.     \n\nMethod: A total of 104 patients diagnosed with MCI were included in this retrospective study. Global cognitive function was assessed using the Standardized Mini-Mental State Examination. Executive functions were evaluated with a battery including the Clock Drawing Test, verbal fluency tests (K-A-S, animal naming, and fruit naming), Trail Making Test time difference (TMT-TD), and Stroop Test time difference. Visuospatial abilities were assessed using the Benton Judgment of Line Orientation (BJLO) and Benton Facial Recognition Test (BFRT), while attention was evaluated using Digit Span Tests. Participants were divided into two groups based on executive functioning: impaired executive functioning (IEF) (n = 59) and preserved executive functioning (PEF) (n = 45), and analyzed accordingly.\n\nResults: The IEF group showed statistically significantly lower performance in line orientation among visual-spatial skills (p<0.05), while face recognition performance did not show a significant difference between the groups (p>0.05). Detailed analyses revealed that individuals with impaired TMT had statistically significantly lower BJLO test scores compared to those with TMT test scores within the norm (p<0.05), but Stroop test performance did not change according to visual perceptual skills (p>0.05). \n\nConclusion: This study highlights the interaction between executive skills, particularly cognitive flexibility and decision-making, and spatial skills in MCI.", "SubmissionID": 486}, {"Day": "Tuesday", "Time": "09:00–10:30", "SessionID": 2, "Topic": "Clinical, Developmental, and Applied", "Title": "Visual discomfort to spatial frequency statistics of natural images in autistic and non-autistic adults", "Author": "Isobel Kennerley", "CoAuthors": "Samantha Tyler, Catherine Manning", "Abstract": "Visual discomfort has been linked to deviations from the spatial frequency statistics observed in natural scenes, which generally follow a 1/f distribution. Atypical sensory processing is widely reported in autism, and some evidence suggests sensory sensitivity may vary by gender. However, it remains unclear whether deviations from natural image statistics differentially influence visual discomfort in autistic and non-autistic individuals, and whether such effects vary by gender.  \n\nThe present study investigated whether autistic individuals report greater visual discomfort than non-autistic individuals when viewing natural images that vary in their deviation from the 1/f spatial frequency distribution, and whether these effects differ by gender.  \n\n170 participants (78 autistic, 92 non-autistic) completed an online image-rating task in which they viewed one of five 200-image subsets from the McGill Calibrated Colour Image Database and rated each image as “comfortable” or “uncomfortable.” Participants’ screens were calibrated during the study, so each image was displayed at approximately 10° visual angle. The spatial frequency structure of each image was extracted, and images were categorised into low, medium, and high deviation from 1/f. The proportion of images rated as uncomfortable within each category was analysed using a 2×2×3 mixed-design ANOVA. \n\nResults revealed a significant main effect of group, with autistic participants reporting a higher proportion of images as uncomfortable than non-autistic participants. A significant main effect of spatial frequency deviation was also observed, however pairwise comparisons were not significant. No effects of gender or interactions were found.  \n\nThese findings indicate that autistic individuals report greater visual discomfort, while the influence of spatial frequency deviations appears modest for natural images. This is inconsistent with the suggestion that visual discomfort is related to deviation from natural image statistics. The results highlight group differences and provide a basis for future research under more controlled conditions to identify contributing factors.", "SubmissionID": 502}, {"Day": "Tuesday", "Time": "09:00–10:30", "SessionID": 2, "Topic": "Clinical, Developmental, and Applied", "Title": "The effects of extended virtual reality (VR) use on visual and sensorimotor functioning and visually-induced motion sickness (VIMS)", "Author": "Polina Andrievskaia", "CoAuthors": "Behrang Keshavarz", "Abstract": "Our perception of the surrounding environment depends on the successful integration of sensory inputs, including information from the visual and proprioceptive systems. This is especially necessary when interacting with simulated environments, such as virtual reality (VR). Over the past 30 years, VR technology has gained rapid popularity in domains such as military training, education, and healthcare, with an estimated 171 million users worldwide. Yet, some studies indicate that up to 80% of individuals may experience visually-induced motion sickness (VIMS) while using VR, exhibiting symptoms such as eyestrain, blurred vision, and dizziness. Our understanding of side effects lasting beyond VR usage is also inconclusive; for example, reduced sensorimotor performance has been observed up to 6 hours after VR exposure, and more severe aftereffects have been reported following prolonged use. These symptoms may be attributed to the accommodation-vergence conflict that arises in VR: whereas accommodation and vergence are normally coupled to maintain clear vision in the real world, these mechanisms are decoupled in VR as the visual scene is presented at a fixed distance \n\nThe proposed study will therefore examine the effects of extended VR exposure on VIMS, visual functioning, and sensorimotor performance. Participants will engage in a VR exercise game for 40 minutes, with subjective reports of VIMS and performance on sensorimotor (eye-hand coordination) and visual functioning (depth, acuity, motion perception, near-point accommodation and convergence, and binocular accommodation and vergence) tasks assessed before and after game exposure. Preliminary results reporting VIMS severity, visual functioning, and sensorimotor coordination variation before and after VR exposure will be presented. An increase in subjective VIMS scores and a reduction of sensorimotor and visual functioning performance is anticipated. Such findings may contribute to the continued development and improvement of virtual technologies for a wide range of users.", "SubmissionID": 572}, {"Day": "Tuesday", "Time": "09:00–10:30", "SessionID": 2, "Topic": "Clinical, Developmental, and Applied", "Title": "Counterintuitively Enhanced Masking Performance in Adults Born Preterm", "Author": "Elif Sude Bayram", "CoAuthors": "Nisanur Bilgiç, Gülsüm Su, Zahide Pamir", "Abstract": "Preterm birth can lead to a range of motor, cognitive, and perceptual complications, including poorer performance across various visual tasks in both children and adults. Despite differences in visual perception, the neural mechanisms remain largely unknown. One potential mechanism affected by preterm birth is cortical reentrant processing, which characterizes the bidirectional flow of information within the visual system and constitutes a core component of visual perception. Developmental evidence suggests that feedback processing is not yet fully mature in early infancy and that this mechanism may be particularly vulnerable to the effects of preterm birth. Visual masking paradigms provide a useful tool for investigating these bidirectional processing dynamics. Within this framework, preterm birth may disrupt the balance between feedforward and feedback processes, thereby altering the dynamics of visual information processing. In the present study, we tested this possibility by comparing masking performance between adults born preterm and those born at term. The experiment employed an object substitution masking (OSM) paradigm with five trailing mask durations (0, 50, 100, 150, and 300 ms). Data were collected from adults born at term (N = 23) and preterm (N = 19). Accuracy was measured using a four-alternative forced-choice task. The results revealed no significant interaction between mask duration and group, but significant main effects of mask duration (p < 0.001) and group (p < 0.001). Overall, individuals born preterm showed higher accuracy (72%) than those born at term (60%). This pattern was observed when both the target and the mask were black, but not when both were white  (preterm vs. term accuracy: 70% vs. 67%). These findings demonstrate a counterintuitively better performance in adults born preterm in a masking paradigm, likely reflecting atypical development of reentrant mechanisms, more specifically, those related to feedback processing, involved in visual perception following preterm birth.", "SubmissionID": 580}, {"Day": "Tuesday", "Time": "09:00–10:30", "SessionID": 2, "Topic": "Clinical, Developmental, and Applied", "Title": "Does Executive Function Resolve Spatial Interference, and Does Navigation Strategy Influence this Interaction?", "Author": "Chinwe Ekwuaju", "CoAuthors": "Ellen Seiss, Alastair Smith, Calvin Laursen, Mathew Green, Tara Zaksaite", "Abstract": "Spatial navigation in dynamic environments requires not only the formation of spatial representations but also the ability to resolve interference between competing representations of overlapping routes. While the role of the hippocampus in spatial memory is well established, less is known about how executive control processes support navigation under conditions of interference. To address this gap, the present study carried out two experiments.\n The first experiment (N = 40) aimed to examine whether core components of executive function, working memory updating, mental set shifting, and inhibitory control predict susceptibility to proactive and retroactive interference during spatial navigation. Participants completed a virtual navigation task comprising three routes designed to induce interference through overlapping landmarks. Executive function was assessed using the Digit Span task, Stop-Signal Task, Trail Making Test, and Wisconsin Card Sorting Test. \n\nPreliminary findings showed that accuracy was numerically lower at interference intersections compared to unique intersections in both proactive (Route 2) and retroactive (Route 3) conditions; however, these differences did not reach statistical significance. No significant associations were observed between executive function measures and interference performance. However, updating ability was significantly associated with more efficient initial route learning, suggesting that executive control contributes to route encoding and acquisition under standard task condition. \n\nBuilding on this rationale, the second experiment (N = 77) introduced an instructional manipulation to systematically guide encoding strategy, contrasting landmark-based associative encoding with sequence-of-turns encoding. By constraining how participants encode spatial information, this experiment examined how encoding strategy affects interference-related demands. Data collection for this experiment has been completed, and analysis is ongoing. Findings from Experiment 2 will be presented at the conference.", "SubmissionID": 599}, {"Day": "Tuesday", "Time": "09:00–10:30", "SessionID": 2, "Topic": "Clinical, Developmental, and Applied", "Title": "Pseudoneglect Does Not Decrease with Reduced Arousal Following Sleep Deprivation – A Study Using Both Free Visual Exploration and Behavioral Measures", "Author": "Alexandra Smus", "CoAuthors": "Wiktor Więcławski, Wojciech Żukowski, Marek Binder", "Abstract": "Phenomenon of pseudoneglect manifests as a subtle attentional bias toward left hemisphace that occurs frequently in a healthy population. Although being easily replicable and sharing some of the attributes with the unilateral neglect syndrome, its’ mechanisms remain unclear. Several studies pointed to arousal as a key factor modifying its’ magnitude, or even presence.\n\nOur aim was to replicate those findings, while also disentangling the effects of two main drivers of low arousal: sleep deprivation and circadian rhythms. \n\nIn order to investigate whether reductions in arousal influence pseudoneglect, an experiment with 44 right-handed participants (29 women, 0 non-binary) between 18 and 30 years old was conducted. First, during a baseline phase, subjects had to maintain a healthy sleep schedule, which was monitored by actigraphy. It was followed by an experimental night with a full sleep deprivation, during which they performed the free-viewing task, greyscale task and the landmark task under three conditions: normal arousal in the evening (8 p.m.), reduced arousal at the circadian trough (5 a.m.), and following all-night sleep deprivation (9 a.m.). Arousal and vigilance were carefully monitored using behavioral measures. \n\nAs expected, arousal levels were lowest at 5 a.m. and 9 a.m., without differences between them. However, visual exploration patterns as measured with the three tasks did not differ across conditions, with all sessions showing a robust and comparable leftward bias.  \n\nThese findings suggest that transient reductions in arousal, whether induced by circadian phase or sleep deprivation, do not diminish  pseudoneglect. Our results contribute to the ongoing debate on the mechanisms underlying  spatial attentional biases  and  indicate  that factors other than global arousal may play a more critical role. \n\n Financial support: the study was supported by a grant awarded to Aleksandra Smus by the Rada Kół Naukowych Uniwersytetu Jagiellońskiego (RKN/2025/2A/020)", "SubmissionID": 608}, {"Day": "Tuesday", "Time": "09:00–10:30", "SessionID": 26, "Topic": "Perception and Action", "Title": "Vanishing balls: Representational momentum in real, accelerating motion", "Author": "Constanze Hesse", "CoAuthors": "Patric Bach, Martin Giesel", "Abstract": "Observers typically tend to perceive the final position of an occluded moving object as displaced forward along its trajectory, an effect known as Representational Momentum (RM). Most evidence for RM effects comes from screen-based studies using implied motion or constant velocity. Here, we examined RM in a more ecologically valid setting using real, accelerating motion.\n\nParticipants viewed balls (cricket vs. tennis) rolling down a 3m long inclined track while wearing noise-cancelling headphones. Occlusion was triggered at three randomly selected positions (102, 146 and 192 cm) using embedded markers and shutter glasses. In Experiment 1 (N=20), participants sat mid-track and followed the ball with head and eye movements, reporting its last seen position prior to occlusion. In a second condition, they estimated the moment the ball reached the end of the track after occlusion using button presses. In Experiment 2 (N=20), participants viewed the ball rolling towards them from the end of the track (i.e., without head movements, reduced sensorimotor engagement), again reporting its last seen position.\n\nWithout head movements, robust forward displacement was observed across all occlusion points. With head movements, RM was present only for the early occlusion but not for later ones. This challenges the notion that forward displacement arises directly from oculomotor processes. Two accounts may explain this pattern. First, head movements may enhance continuous sensory updating, reducing reliance on prediction. Alternatively, tracking may rely mainly on velocity signals and only partly incorporate acceleration, which could contribute to changes in perceived position as motion unfolds. In the timing task, endpoint estimates were more accurate for later occlusions, with early occlusions showing an overestimation of time-to-end, consistent with limited use of acceleration information.\n\nTogether, the results show that RM for real, accelerating motion depends on viewing conditions, highlighting an interaction between predictive processes and online sensorimotor information.", "SubmissionID": 190}, {"Day": "Tuesday", "Time": "09:00–10:30", "SessionID": 26, "Topic": "Perception and Action", "Title": "A Repulsive Bias Away from the Straight-Ahead in Perceived Heading as Determined by Continuous Psychophysics", "Author": "Bjoern Joerges", "CoAuthors": "Mahir Rafi, Laurence R. Harris", "Abstract": "Earlier work has shown that perceived heading can be either biased towards the straight-ahead or away from the straight-ahead. An egocentric-allocentric distinction has been suggested as a potentially unifying solution, where egocentric responses lead to attraction towards the straight-ahead while allocentric responses are connected to repulsion from it. We investigated the egocentric prediction of this hypothesis using a novel, egocentric heading perception task based on continuous psychophysics. We immersed participants in a virtual environment where they experienced optic flow consistent with self-motion that changed every 200 ms based on a random walk, i.e., the direction for the next interval was determined by adding a value sampled from a normal distribution with a mean of 0 and a standard deviation of 10° to the current direction. Participants continuously aligned a joystick with their perceived heading. Each heading (0-360° in the x-z plane) was equally likely to occur. Participants performed this task with either SLOW or FAST simulated self-motion and in a CONTROL condition in which they had to align the joystick with an arrow that was continuously changing its direction rather than with their perceived heading. We found repulsive biases away from the straight-ahead for all three conditions, with the CONTROL condition displaying the weakest bias and the SLOW condition showing the strongest bias. Finding such repulsive biases in our egocentric task goes against the egocentric versus allocentric explanation for biases during heading estimations. However, our results are consistent with another account of biases in heading perception (Sun et al., 2025 PLOS Computational Biology) that posits that smaller response ranges lead to attraction while wider response ranges (such as our 360°) lead to repulsion.", "SubmissionID": 192}, {"Day": "Tuesday", "Time": "09:00–10:30", "SessionID": 26, "Topic": "Perception and Action", "Title": "Eye-head c
