oordination in twisting movements with different amounts of rotation", "Author": "Yusuke Sato", "CoAuthors": "", "Abstract": "Gymnasts use visual information to achieve spatial orientation and to control their bodies while airborne. Previous research has reported that during turning movements involving 180° and 360° rotations about the longitudinal axis, gymnasts exhibit gaze patterns characterized by gaze stabilization at takeoff and before and after landing, as well as patterns showing brief gaze stabilization during the turn. However, it remains unclear whether similar gaze strategies are used in movements involving a greater amount of rotation. Therefore, the purpose of this study was to clarify the coordination of eye and head movements during a straight jump with one-and-a-half turns and to examine how this coordination differs from that observed in twisting movements involving up to 360° of rotation. Participants were male collegiate gymnasts. The experimental task was a straight jump with one-and-a-half turns, involving a 540° rotation about the longitudinal axis. Eye movements were measured using electrooculography (EOG). Simultaneously, head movements were recorded using two digital high-speed cameras. Head rotation angles were calculated from the video recordings, and their relationship to eye movements was analyzed. The results showed that while the head rotated continuously in one direction, the eyes repeatedly moved in the opposite direction. In other words, in a 540° twisting movement, the strategy observed in jumps with a half or full turn, namely a large predictive gaze shift toward the forward-facing direction at landing, may be less likely to occur. These results suggest that gymnasts may use different gaze strategies for spatial orientation depending on whether the twisting movement involves up to 360° or 540° of rotation.", "SubmissionID": 193}, {"Day": "Tuesday", "Time": "09:00–10:30", "SessionID": 26, "Topic": "Perception and Action", "Title": "The contribution of proprioception to size constancy in perception and action: an fMRI study", "Author": "Mirko Tommasini", "CoAuthors": "Placido Sciortino, Philippe Chouinard, Irene Sperandio", "Abstract": "Size constancy allows the visual system to maintain stable representations of object size despite changes in viewing distance, supporting accurate perception and action. Although extensively studied, the mechanisms underlying size constancy remain only partially understood, particularly regarding the contribution of non-visual signals such as proprioception.\n\nHere, we investigate how proprioceptive depth cues are integrated with retinal information to support size constancy in both perception and action. We conducted an fMRI experiment using glow-in-the-dark spheres presented at two viewing distances (near vs. far) and two physical sizes (2.5 cm vs. 5 cm). The experiment was performed under restricted viewing conditions (darkness; monocular viewing through a 1-mm pinhole) to remove all depth cues. Participants were asked to either grasp or manually estimate its diameter with their right hand, while their left hand held the pedestal on which the sphere was placed, providing a measure of distance.\n\nRegions of interest were independently defined using an object localizer to identify ventral and dorsal stream regions, including the lateral occipital complex (LOC) and intraparietal sulcus (IPS), and a retinotopic localizer to map early visual cortex (V1). In addition, a region of interest in the primary somatosensory cortex (S1) was defined based on coordinates derived from the literature. To further characterize the directionality of information flow within this network, we performed Dynamic Causal Modeling (DCM), allowing us to test how proprioceptive and visual signals interact at the level of effective connectivity.\n\nOur findings reveal a functional dissociation between visual pathways: ventral stream regions within LOC are primarily sensitive to task demands and object size, whereas dorsal stream regions within IPS are preferentially modulated by viewing distance. These findings suggest that size constancy emerges from complementary contributions of ventral and dorsal pathways, integrating retinal and proprioceptive information to support stable perception and action across changes in distance.", "SubmissionID": 195}, {"Day": "Tuesday", "Time": "09:00–10:30", "SessionID": 26, "Topic": "Perception and Action", "Title": "Material properties are accounted for during motor-imagery", "Author": "Christian Houborg", "CoAuthors": "Tom Becker, Roland W. Fleming", "Abstract": "To successfully grasp objects, we have to take their physical properties—such as compliance, surface friction, orientation and weight—into account. These different properties are often estimated visually. However, there are cases when such properties cannot be seen directly (e.g., the weight of an opaque milk carton depends on how full it is, but this cannot be seen directly). Here we sought to test whether the imagined or expected properties of objects impact both real and imagined actions. Thirty participants carried out two counterbalanced tasks. In one task, participants were to reach, grasp and transport a cylinder made of brass or styrofoam to a target location. The material was either visible or wrapped in thin paper and placed in front of the participants at four different orientations (0°, 60°, 90°, 120°). Participants were informed of the material hidden beneath the paper. Movements were tracked with a Qualisys infrared motion tracking system and timings for each phase were calculated by identifying key frames of hand and object movements. The second task consisted of motor-imagery, where participants had to imagine carrying out the movements. Participants rested their dominant hand at the resting position while pressing a button with their non-dominant hand to collect timings of their imagined movements. After each trial, participants provided a rating on a 4-point scale of imagery vividness and difficulty. For analysis, trials with reaction times 3 standard deviations outside of the participant means were excluded as outliers before performing a repeated measures ANOVA. Material knowledge affected reaching and transport phases for both imagined and performed movements with and without visual material cues, indicating that mere knowledge of an object’s constituting material alone carries information of properties useful for action-planning and execution.", "SubmissionID": 230}, {"Day": "Tuesday", "Time": "09:00–10:30", "SessionID": 26, "Topic": "Perception and Action", "Title": "Testing models of the cognitive structure of perceivable human actions", "Author": "Nick Barraclough", "CoAuthors": "George Wightman", "Abstract": "Several models have been proposed to explain the cognitive structure underpinning our perception of human actions. These studies have conceptualized this structure as a domain specific ‘action space’ defined by a limited number of important dimensions that describe the meaningful information on which we evaluate actions. However, these different models have disagreed on both the number of dimensions, and what action qualities each dimension represents. To help resolve these differences we retested Vinton et al.’s (2023) 4-D action space model whilst considering additional qualities identified by other models. We combined Vinton’s original dataset where participants rated 240 different controlled actions against 23 action characteristics, with ratings of the same actions against 8 new characteristics derived from all the other action space model dimensions. We used an EFA-to-CFA approach to determine the optimal model of action space and assess which action qualities define that space. Action space was best modelled by 5-factors. Two substantial dimensions originally identified by Vinton (Friendliness, Formidableness) each explained 18-19% of the variance. Whilst 3 smaller dimensions each explained 10-8% of the variance; these included Abduction (as per Vinton) and additionally Locomotion and Environmental Interaction. We interpret this representation of action space as having 2+3 dimensions. We confirm previous research showing friendliness and formidableness are the two most important action qualities and likely represent action specific signals of the social cognition dimensions of warmth and competence respectively. Differences between earlier studies of action space can be attributed to non-representative samples of actions or the use of static images of actions.", "SubmissionID": 250}, {"Day": "Tuesday", "Time": "09:00–10:30", "SessionID": 26, "Topic": "Perception and Action", "Title": "Shared and idiosyncratic components of spontaneous blink timing profiles during sports driving", "Author": "Ryota Nishizono", "CoAuthors": "Yasuharu Koike, Makio Kashino, Naoki Saijo", "Abstract": "Natural behaviour requires continuous regulation of vision, attention, and action. However, underlying shared cognitive-state dynamics are difficult to recover in extended visuomotor tasks because overt performance and physiology vary substantially across individuals. We examined whether spontaneous eye blink behaviour, an underused behavioral marker linked to visual-cognitive state and broader task-related processes, reveals common structure during simulated sports driving. Eleven non-expert drivers completed repeated laps in a high-fidelity formula-car simulator on a race track while wearing a head-mounted eye tracker. Sessions manipulated temporal demand using fast and slow pace instructions. Blink events were aligned to position along the track and summarized as spatial blink-intensity profiles, allowing comparison across laps, drivers, and pacing conditions. Despite apparent between-driver differences in overall blink rate and profile shape, blink timing showed reliable within-driver locking to course position across laps. We then fit a parsimonious latent-template model that decomposed each individual profile into a shared course-locked component, an individual sensitivity to that component, and an individual intercept. This shared structure was similar across fast and slow sessions, whereas faster driving was associated with a lower overall blink level. Blinking was reduced during dynamically demanding parts of driving, especially under braking and higher lateral acceleration, indicating a close relationship between blink timing and the control state of the vehicle. At the same time, the full spatial organization of blinking was not accounted for by these kinematic factors alone, suggesting contributions from other course-linked factors. These findings show that spontaneous blinking during naturalistic driving is not merely noisy physiology, but contains reproducible structure linked to the temporal and spatial organization of behaviour. More broadly, the results position blink timing as an accessible behavioural marker for studying active vision and internal-state dynamics in ecologically rich tasks.", "SubmissionID": 288}, {"Day": "Tuesday", "Time": "09:00–10:30", "SessionID": 26, "Topic": "Perception and Action", "Title": "Visual aftereffects emerge from non-visual reaching adaptation", "Author": "Yuqing Zhao", "CoAuthors": "Jiaping Lin, Wenyuan Wang, Jinquan Wang, Juan Chen", "Abstract": "Although it is well established that motor behaviors modulate early sensory processing, the nature and functional role of these top‑down signals remain unclear. Here, to address this question, we tested whether repeated execution of reaching movements in a single direction (denoted as reaching adaptation) could selectively modulate visual orientation tuning and induce a visual orientation aftereffect. This reaching-adaptation paradigm was inspired by the classic visual-adaptation paradigm, which is widely used to test for feature-specific neural populations versus shared representations across features or even modalities. If reaching adaptation induces aftereffects similar to visual adaptation, it would suggest that feedback signals during reaching selectively modulate visual orientation tuning. We found that reaching without visual feedback led to the following presented visual bar being perceived towards the direction of the reach, i.e., an attractive aftereffect. This finding was consistently observed for both leftward and rightward adaptation and for both left and right hands. Hierarchical drift-diffusion modeling (HDDM) further showed that this effect was primarily mediated by changes in sensory evidence accumulation, rather than being solely attributable to decision-level processes. The existence of cross-modal adaptation indicates a shared representation between feedback of reaching direction and visual orientation. Consistent with a shared representation, we also found that the vertical reaching direction on the next trial was attracted toward the orientation of a visual bar presented on the previous trial. Together, these findings demonstrate that even without visual feedback, the top-down feedback signals from motor to sensory cortex do not merely modulate global states such as arousal or attention; instead, they carry feature‑selective information that bidirectionally interacts with visual features to enhance each other’s response gain.", "SubmissionID": 301}, {"Day": "Tuesday", "Time": "09:00–10:30", "SessionID": 26, "Topic": "Perception and Action", "Title": "Seeing others act: the dissociation between sensory processing and top-down cognitive control during joint agency", "Author": "wang wenyuan", "CoAuthors": "Yihui Zhang, Qiantu Lai, Yuqing Zhao, Yanli Wang, Jinquan Wang, Juan Chen", "Abstract": "Humans perceive self-generated and other-generated sensory information differently. While joint action toward a common goal is thought to allow the brain to \"adopt\" a partner's actions into its own predictive framework, direct neural evidence for this sensorimotor internalization remains elusive. We investigated this by training pairs of participants to perform simultaneous keypresses. Before and after training, EEG was recorded while participants listened to auditory stimuli generated by themselves, their partner, or a computer. Behaviorally, training significantly reduced keypress asynchrony and increased subjective Sense of Agency (SoA) ratings for the partner. Neurally, we observed classic sensory attenuation (reduced N1 and P2 amplitudes at fronto-central sites) for self-generated compared to computer-generated sounds. Critically, no such attenuation occurred for partner-generated sounds even after training. Furthermore, while the temporal Tb component showed attenuation for the self, it exhibited sensory enhancement for the partner. Beyond primary sensory processing, we examined top-down modulatory mechanisms using the theta-band weighted phase lag index (wPLI) between fronto-central and temporal regions. Theta wPLI was significantly lower for self-generated than computer-generated sounds. Notably, the wPLI for partner-generated sounds decreased after training, and this reduction correlated with the subjective increase in SoA. These results suggest a functional dissociation in joint agency: while primary sensory levels maintain a clear distinction between self and other, top-down cognitive control mechanisms are adapted to treat a partner's actions similarly to one's own. These findings challenge the notion of a complete sensorimotor \"merging\" in joint action, pointing instead to a high-level integrative framework.", "SubmissionID": 302}, {"Day": "Tuesday", "Time": "09:00–10:30", "SessionID": 26, "Topic": "Perception and Action", "Title": "Attunement to Object Size Affects Locomotor Strategies During Fly Ball Interception", "Author": "Joan Lopez-Moliner", "CoAuthors": "Brett Fajen", "Abstract": "Prominent heuristics for fly ball interception, such as LOT and GOAC models, rely on optical angles and their higher order derivatives but have largely ignored the possible role of the object's physical size. However, attunement to object size could play a role in the control of locomotor interception by allowing fielders to scale optical variables. This study tested the hypothesis that when intercepting moving objects on foot, fielders' movements are influenced by an adaptation or attunement to the objects’ physical size. Participants intercepted fly balls in a virtual reality environment via a head-mounted display. Balls were projected to eight possible landing locations surrounding the subject's initial position. To test the attunement hypothesis, the experiment manipulated ball size across blocks. In Block 2, the ball size (diameter) was 0.15 m on 90% of trials, but increased to 0.18 m on 10% \"catch trials\". In Block 4, the ball was 0.18 m on 90% of trials, but decreased to 0.15 m on 10% catch trials. This design allowed for the comparison of fielders' trajectories for physically identical stimuli where the only difference was the size to which the fielder was attuned. As predicted, baseline trajectories were similar on matched normal trials. However, trajectories diverged significantly on catch trials, suggesting that subjects’ movements were affected when they were not properly attuned to the ball’s physical size.  Crucially, individual subjects exhibited two diametrically opposed behavioural patterns on catch trials. When presented with an unexpectedly small ball, one group of participants retreated backward, consistent with misinterpreting the slower optical expansion as a distant, high-altitude ball. Conversely, another, larger group moved forward, consistent with misinterpreting the exact same information as a slow-moving ball dropping short. These findings demonstrate that fielders become robustly attuned to physical size, employing idiosyncratic control strategies to resolve optical ambiguities during interception.", "SubmissionID": 329}, {"Day": "Tuesday", "Time": "09:00–10:30", "SessionID": 19, "Topic": "Face Perception and Recognition", "Title": "The unseen face in the crowd: Ensemble perception incorporates invisible face", "Author": "Shao-Min (Sean) Hung", "CoAuthors": "Ning-Ting Hsu, Po-Jang (Brown) Hsieh", "Abstract": "Our visual system rapidly extracts ensemble statistics from multiple visual stimuli. However, it remains elusive whether awareness of individual items is necessary for ensemble perception. Here, we tested whether ensemble statistics incorporates unseen stimuli. In each trial, participants judged the mean emotion intensity of three faces, with an additional concurrently presented and interocularly suppressed face. We found that the average emotion rating of the three faces was biased toward the emotion intensity of the unconscious face, suggesting that the ensemble perception incorporates the invisible stimulus. In subsequent experiments, we first ruled out the possibility that the effect was driven by response bias. Furthermore, by including either suppressed emotional or neutral faces, we found that the ensemble emotion judgment could be biased in either direction. This effect persisted even when different emotions were randomly intermixed within the same block, suggesting that the effect was not driven by demand characteristics following a break in suppression. Together, our results show that ensemble perception integrates both conscious and unconscious faces, broadening its known limits.", "SubmissionID": 24}, {"Day": "Tuesday", "Time": "09:00–10:30", "SessionID": 19, "Topic": "Face Perception and Recognition", "Title": "Quantity over quality? The impact of the number of faces to learn and of their appearance on the robustness of facial representations", "Author": "Wenrui Li", "CoAuthors": "Christel Devue", "Abstract": "For decades, researchers have sought to identify the factors that support robust face learning. Prior work has shown that exposure to varied images improves later recognition. Because image variation can include changes in viewing conditions, pose, expression, or appearance, our research has focused specifically on the role of facial appearance—kept stable or made variable through changes such as hairstyle, hair colour, or makeup. This focus was rooted in the idea that an efficient face‑learning system should refine memory representations only when necessary, after exposure to changes in appearance. Some of our earlier studies showed that memory representations were more robust when participants learned four faces with variable appearances compared to four faces with stable appearances. However, other studies found either no difference between the two conditions or better performance for stable faces when only two faces were learned per condition. To clarify these discrepancies, we conducted a preregistered study manipulating both the number of faces to learn (four, eight; between‑subjects) and appearance (stable, variable; within‑subjects). 236 participants learned faces from the same set of static images. As predicted, recognition performance was higher in the four‑face condition than in the eight‑face condition, indicating a cost of increased learning load. We also found a main effect of appearance, but no significant interaction between appearance and number of faces. Nonetheless, paired comparisons revealed higher recognition performance for variable faces in the eight‑face condition, whereas no difference between appearance conditions was observed when only four faces were learned. These findings suggest that learning load strongly influences recognition performance, and that the effect of appearance may depend on the allocation of limited memory resources in a given learning context. Learning load may therefore help explain inconsistencies in the face‑learning literature and should be considered in future research.", "SubmissionID": 32}, {"Day": "Tuesday", "Time": "09:00–10:30", "SessionID": 19, "Topic": "Face Perception and Recognition", "Title": "Decoding Neural Responses to Real and Synthetic Faces: Evidence from EEG", "Author": "Dalia Israel", "CoAuthors": "Genevieve Quek, Manuel Varlet, Tijl Grootswagers", "Abstract": "The increasing realism of synthetic AI-generated faces presents challenges for human visual perception and judgement. Although behavioural studies suggest that observers cannot reliably distinguish real from synthetic faces unless under certain conditions, recent work suggests that they evoke differentiable neural processes. The present study investigated what drives the neural decoding of real from synthetic faces. Electroencephalography (EEG) signals were recorded while participants viewed 900 real and synthetic faces varying in realism (realistic vs. unrealistic), availability of information (external vs. internal features), face regions (whole vs. segmented face) and orientation (upright vs. inverted). Time-resolved multivariate pattern analysis was used to decode stimulus category (real vs. synthetic) from neural activity, separately for each manipulation (e.g., whole vs. segmented). Results indicated that neural responses to real and synthetic faces were reliably separable over brief time windows, and that neural discriminability between real and synthetic faces may be modulated by the realism of the stimuli, the availability of information and the facial region (eyes, mouth). These findings provide further evidence that EEG-based decoding may capture early neural sensitivity to differences between real and synthetic faces, even when behavioural performance do not reliably separate these categories. This suggests that the visual system may encode subtle differences between real and synthetic faces at early stages of processing. More broadly, this work contributes to understanding how the human visual system adapts to increasingly realistic synthetic stimuli, with implications for models of face perception and the detection of AI-generated content.", "SubmissionID": 80}, {"Day": "Tuesday", "Time": "09:00–10:30", "SessionID": 19, "Topic": "Face Perception and Recognition", "Title": "Behind the Mask: A New Viewpoint on Face Identity Recognition at First Glance.", "Author": "Clara Cron", "CoAuthors": "Pauline Thomas, Bruno Rossion, Stéphanie Caharel", "Abstract": "The human visual system demonstrates remarkable efficiency in rapidly and accurately recognizing individual faces. However, this ability can be compromised by variations in viewing conditions, such as changes in viewpoint, or by the occlusion of critical facial features, for instance by face masks. Moreover, although numerous studies have shown that face masks substantially impair facial identity recognition, most have relied on the use of facial stimuli presented in a frontal view, over extended durations, as well as on explicit behavioral tasks. Here, we aimed to explore the impact of viewpoint and mask-wearing on the implicit recognition of facial identity at first glance. To this end, electroencephalographic (EEG) recordings were conducted on 25 participants during the presentation of the same (unfamiliar) face identity at a frequency of 6 Hz, with the insertion every fifth image of different face identities, leading to a face identity recognition (FIR) response at 1.2 Hz (6 Hz/5) and its harmonics (2.4 Hz, etc.) directly observable in the frequency spectrum. Different 60-s stimulation sequences were presented with unmasked and masked faces and from different viewpoints (frontal, ¾ right and ¾ left), while participants performed a bar color change detection task. The neural FIR response recorded over the bilateral occipito-temporal cortex was markedly reduced by mask-wearing. Furthermore, while no effect of viewpoint was found for masked faces, the FIR response was significantly reduced for three-quarter views compared to frontal views for unmasked faces. Overall, our findings highlight a frontal-view advantage for first-glance face recognition, facilitating the extraction of facial features and promoting holistic face processing. They also underscore a substantial impact of mask-wearing on face recognition, with no viewpoint-related optimization, resulting from the occlusion of lower-face features and the disruption of holistic face perception.", "SubmissionID": 94}, {"Day": "Tuesday", "Time": "09:00–10:30", "SessionID": 19, "Topic": "Face Perception and Recognition", "Title": "Seeing Faces: Exploring Perceptual Disorders in Glaucoma Patients Through Event-Related Potentials", "Author": "Stephanie Caharel", "CoAuthors": "César Amad, Manon Careme, Jean-François Rouland, Quentin Lenoble, Muriel Boucart", "Abstract": "Glaucoma is an age-related ocular pathology characterized by a progressive degeneration of the optic nerve and retinal ganglion cells. Without medication, it leads to a visual field defect, starting in the periphery and progressing towards the center. Behavioral studies have reported face recognition deficits in patients with glaucoma. However, the origin and nature of this impairment remained unclear. The present study aimed to explore the neural correlates underlying face perception deficits in this pathology using event-related potentials (ERPs), with a particular focus on the N170 occipito-temporal component, a well-established electrophysiological marker of face structural encoding and holistic face processing. During ERPs recording, 17 patients with open-angle glaucoma and 17 age-matched control participants performed an orientation decision task involving two categories of stimuli (faces and cars), presented in both upright and inverted orientations. In both groups of participants, the accuracy rate on the behavioral task was high (approximately 97%). Contrary to the P1 component, the N170 exhibited a significantly delayed latency and lower amplitude in patients. Additionally, although the N170 amplitude was larger for faces than for cars in both patients and controls, the two groups differed primarily in their response to faces, suggesting a specific impairment in the structural encoding of faces in glaucoma patients, leading to the extraction of an inadequate facial representation. Finally, when the two groups were combined, a weak face inversion effect was observed on the N170 amplitude, indicating impaired holistic face processing; however, this effect may reflect an overall effect of aging. In conclusion, this study confirmed abnormalities in face perception in patients with glaucoma and extended previous behavioral findings by highlighting that these alterations would arise at early perceptual stages of face processing, as indicated by the modulations of the N170 component.", "SubmissionID": 95}, {"Day": "Tuesday", "Time": "09:00–10:30", "SessionID": 19, "Topic": "Face Perception and Recognition", "Title": "Developmental changes in Mooney face perception from early childhood to adulthood", "Author": "Nanako Yamanaka", "CoAuthors": "Ryuto Takashima, Megumi Kobayashi, Nobu Shirai", "Abstract": "Humans can robustly perceive faces from limited information. A well-known example is the perception of Mooney faces— two-tone black-and-white face images with degraded individual features (e.g., eyes and mouth) (Mooney, 1957). The detection of Mooney face is observed even in infants (Doi et al., 2009; Otsuka et al., 2012; Yamanaka et al., 2025). However, little is known about how this ability develops beyond infancy. To fill this gap, we examined this ability from early childhood to adulthood. \n\nParticipants were divided into three age groups: fourteen 4–10 years, twelve 15–18 years, and eight adults. Upright face preference (Chien, 2011) was measured using Mooney faces with four levels of degradation (Levels 1–4). Level 1 stimuli were comparable in visibility to those previously shown to be detectable by infants (Yamanaka et al., 2025). The experiment consisted of two blocks. In the first block, upright and inverted Mooney faces with the same degradation level were presented side-by-side across 32 trials. The second block presented upright and inverted photographic faces across 8 trials. Each trial lasted 10 seconds, and participants’ gaze was recorded using an eye tracker.\n\nBecause a two-way mixed-design ANOVA revealed no significant main effect of age group and relevant interaction, data were pooled across age groups for further analysis. Two-tailed one-sample t-tests against chance level (0.5) showed significant upright face preference for Level 1 (t(33) = 3.17, p = .003, d = 0.54), Level 2 (t(33) = 3.41, p = .002, d = 0.80), Level 3 (t(33) = 4.19, p < .001, d = 0.74), and photographic faces (t(33) = 3.52, p = .001, d = 0.38). These findings suggest that participants aged 4 years through adulthood can reliably detect Mooney faces up to Level 3.", "SubmissionID": 108}, {"Day": "Tuesday", "Time": "09:00–10:30", "SessionID": 19, "Topic": "Face Perception and Recognition", "Title": "Face and Scene Learning: A Trade-Off in the Context of Appearance Variability", "Author": "Kevin Nguy", "CoAuthors": "Maëlys de Marneffe, Christel Devue", "Abstract": "In daily life, we meet individuals in varying contexts, and their appearance may change to varying degrees between encounters. Although variability in appearance may initially make face learning more challenging, prior research has demonstrated that it ultimately enhances recognition accuracy (Devue & de Sena, 2023, Cognition). Here, we investigated whether memory advantages from exposure to variable appearances come at the cost of memory for contextual information and for face-scene associations. We hypothesised that inner features of faces that were learned with variable appearances would be memorised in a robust but decontextualized manner, leading to improved recognition performance for faces but not for scenes or face-scene associations. In contrast, we expected that faces with a stable appearance and the surrounding scenes should be memorised in a global manner, yielding relatively poorer face recognition with better scene recognition and stronger face-scene associations. To test these hypotheses, we conducted a pre-registered study (N = 64) examining how variability in appearance (stable vs. variable hair colour and style) influences face and scene learning. Participants learned six images of eight new faces, each embedded in two distinct scenes. After a 5-min delay, face recognition was tested using pictures displaying only inner facial features. Scene recognition and memory for face-scene associations were also tested to investigate memory for the extrinsic context and decontextualisation, respectively. Eye-tracking data were collected throughout the entire experiment to determine the spatial distribution of visual attention. Results show better overall recognition for scenes associated with stable faces and for their association. A trend also suggests that exposure to variability may improve inner-feature recognition, even though these features were fixated less in that condition. Taken together, these findings suggest that variability in facial appearance favours the encoding of inner facial features at the expense of contextual information.", "SubmissionID": 118}, {"Day": "Tuesday", "Time": "09:00–10:30", "SessionID": 19, "Topic": "Face Perception and Recognition", "Title": "Robust face identity codes in the Super-Recogniser brain", "Author": "martina ventura", "CoAuthors": "Tijl Grootswagers, Timothy Cottier, James Dunn, Manuel Varlet, David White, Genevieve Quek", "Abstract": "Super-Recognisers are individuals with an exceptional ability to remember and individuate human faces. Processing differences between super-recognisers and typical viewers are typically inferred from behavioural tasks that explicitly ask participants to attend to face identity, but the neural mechanisms underpinning these differences are not understood. Building on recent work showing differences in brain activity between super-recognisers and typical viewers (e.g., Faghel-Soubeyrand et al., 2024; Nador et al., 2025), we asked whether super-recognisers superior abilities are founded on differences in the dimensional structure of neural face identity coding. We recorded 64-channel electroencephalography as 23 Super-Recognisers and 21 typical controls viewed rapid sequences of faces representing 40 different identities (10 different images of each person). For each participant, we used time-resolved Representational Similarity Analysis to derive pairwise dissimilarities for the 40 identities, then examined how consistent this representational geometry was between each pair of observers using correlation. Our results showed that compared to controls, Super-Recognisers exhibited heightened consistency with each other during a mid-latency interval (300-500ms). Moreover, while identity information was reliably decodable in both groups, individual identities were more separable for Super-Recognisers during this same time window. These results suggest that Super-Recognisers have more differentiated neural representations of face identity than typical viewers do, and that dimensional structure of face identity codes is meaningfully related to superior performance on overt face recognition/matching tasks.", "SubmissionID": 127}, {"Day": "Tuesday", "Time": "09:00–10:30", "SessionID": 19, "Topic": "Face Perception and Recognition", "Title": "A Reexamination of Infants’ Discrimination of Mooney Faces", "Author": "RYUTO TAKASHIMA", "CoAuthors": "Nanako Yamanaka, Megumi Kobayashi, Nobu Shirai", "Abstract": "Some previous studies suggest that infants use various strategies to discriminate between faces  and that face discrimination is highly robust to information degradation (e.g., masks, caricatures). We previously investigated the ability of 6–18-month-old infants to discriminate between faces in the Mooney face condition (faces degraded into two-toned black-and-white images) (Takashima et al., 2025), employing the visual paired comparison task (e.g., DeBolt & Oakes, 2023), a simplified version of the habituation method. We found no evidence that infants could discriminate individuals from Mooney faces. However, it is possible that a more sensitive experimental method with longer habituation trials may reveal evidence of Mooney face discrimination in infancy.\n\nIn the present study, we conducted an experiment using a familiarity/novelty preference procedure with 6–18-month-old infants (final sample: N = 24). The experiment began with six familiarization trials (15 seconds × 6 trials). In each familiarization trial, a pair of Mooney faces depicting the same individual was presented side by side. After the six familiarization trials, two test trials (10 seconds × 2 trials) followed. In each test trial, two Mooney faces were presented side by side: one depicting the same individual as in the familiarization stimuli and the other depicting a novel individual. Infants’ gaze behavior toward the visual stimuli was recorded using an eye tracker. \n\nWe expected that if the infants could discriminate between individuals from Mooney faces, they would show significant visual preferences for the novel face in the test trials. However, no significant novelty preference was observed (two-tailed one-sample t-test: t (23) = 1.70, p = .102[NS1] , d = 0.35). Given that the much more sensitive method adopted in the present study failed to find evidence of face discrimination, infants in this age range may be unable to discriminate individuals from Mooney faces.", "SubmissionID": 128}, {"Day": "Tuesday", "Time": "09:00–10:30", "SessionID": 19, "Topic": "Face Perception and Recognition", "Title": "Visual Preferences for Familiar Faces in Chimpanzees: Effects of Social Separation and Long-term Memory.", "Author": "愛子 大出", "CoAuthors": "Ikuma Adachi, Tomoko Imura", "Abstract": "Chimpanzees (Pan troglodytes) are highly social primates that, like humans, generally exhibit visual preferences for the faces of conspecifics and kin. However, previous findings on visual preferences for familiar individuals have been inconsistent: some studies report preferences for former groupmates, whereas others find no such bias for current groupmates. To determine whether these preferences reflect simple familiarity or long-term memory associated with social separation, we examined the effect of cohabitation recency on visual attention in this species.\n\nIn Experiment 1, using eye tracking, we presented pairs of images consisting of either a \"past groupmate\" or a \"current groupmate\" alongside a \"novel individual.\" We measured total looking time and first-look latency (the time required to first orient to each stimulus). The results clearly revealed a significant preference for familiar individuals—indicated by longer looking times—only when images of past groupmates were presented. No significant differences were found in first-look latencies, suggesting that familiarity did not modulate initial reflexive orienting.\n\nIn Experiment 2, we examined whether this preference was driven by the \"recency of the photograph\" or by \"social separation.\" We paired novel faces with images of current groupmates taken either in the \"past\" (approximately 20 years ago) or \"recently\" (within 1 year). No significant familiar-face preferences or latency differences were observed in either condition. This indicates that the visual novelty of older photographs alone does not elicit a preference.\n\nThese findings suggest that visual preferences for faces in chimpanzees are not induced by simple familiarity or by the visual novelty of older photographs, but rather by the social context of long-term separation. This study demonstrates that chimpanzees maintain robust long-term representations of former social partners even after decades of separation. Furthermore, these results suggest that such social memories are reflected in sustained looking behavior rather than in initial visual orienting.", "SubmissionID": 143}, {"Day": "Tuesday", "Time": "09:00–10:30", "SessionID": 42, "Topic": "Eye Movements", "Title": "Does a stabilized image-like visual stimulus disappear?　—Phenomenological investigation of the percept of visual images driven by miniature eye movements—", "Author": "Akira Imai", "CoAuthors": "Keisuke TAKAHASHI, Kai MOTOORI, Haruki MIZUSHINA", "Abstract": "This study developed a device to present visual stimuli synchronized and coupled with miniature eye movements of flick (microsaccade), drift, and tremor. Using this custom-made device, we presented a stabilized retinal image-like stimulus to investigate changes in the percept of visual images. Eye movements were sampled at 500 Hz, output as analogue data, and input into the device. The attenuation and gain variable frequency filters installed in the presentation device were adjusted according to the characteristics of the three types of miniature eye movements. By activating and/or deactivating these filters individually, the data were transmitted to a presentation screen equipped with 1,024 (32×32) red LEDs (subtended 0.81º×0.81º ), each with a diameter of 2 mm (subtended 1.53’), to generate a stabilized retinal image-like stimulus. When a Necker cube, the letter “HB”, and other figures (e.g., face) were individually presented on a 0.81º×0.81º screen for one minute of observation, the following introspections were reported by nine participants: a) All participants reported that the image generally “became blurred” and disappeared partially; b) some perpendicular lines of the Necker cube disappeared and reappeared intermittently; c) when luminance of the stimulus was decreased (19.85 to 3.11 cd/m2), the characters “HB” disappeared almost completely and later reappeared; d) individual attenuation of flick or drift did not markedly change the percept of the stabilized image; e) when tremor was attenuated alone, the percept changed relatively to that of the stabilized image, suggesting that percept of the stabilized image may rely mainly on tremor movement. These findings suggest that among the three types of eye movements, tremor may have a greater influence on the percept of the stabilized image, while flick and drift may interact in a supportive manner. Additional studies are required to elucidate the detailed properties and functions of miniature eye movements.", "SubmissionID": 16}, {"Day": "Tuesday", "Time": "09:00–10:30", "SessionID": 42, "Topic": "Eye Movements", "Title": "Intermittent Utilization of Sensory Input in Human Visuomotor Tracking", "Author": "ZHONGTING CHEN", "CoAuthors": "Yuqi You", "Abstract": "Whether visuomotor control continuously incorporates sensory input or relies on intermittent updates remains debated. While most prior studies naturally assume continuous moment-to-moment integration of incoming information, alternative accounts propose that visuomotor control is primarily driven by intermittent internal predictions, with only occasional input-driven corrections.\n\nHere, we analyzed human tracking performances with continuously moving targets using a mixture modeling approach. At each time point, responses were assumed to arise either from a Kalman filter–based tracking process (“update”), in which sensory inputs are incorporated, or from an input-independent state (“no-update”), in which responses are decoupled from current sensory information. A global parameter, termed update sparsity, quantified the proportion of time during which responses were not driven by incoming input.\n\nAcross four experiments manipulating target color channels and trajectory structure, update sparsity was found to be consistently high (85%–95%) and systematically increase with regularity of the target moving trajectory. This pattern indicates that participants incorporated visual information into motor control only intermittently, relying less on online sensory input when target motion was more predictable. These findings suggest that the contribution of sensory input is dynamically modulated rather than continuously enforced.\n\nTogether, the results challenge the assumption of continuous sensory integration in visuomotor control and instead support a framework in which control is dominated by internal prediction, with sensory information incorporated in a temporally sparse, intermittent manner. This model also provides a quantitative account of how visuomotor control balances prediction and online sensory input under varying environmental structure.", "SubmissionID": 39}, {"Day": "Tuesday", "Time": "09:00–10:30", "SessionID": 42, "Topic": "Eye Movements", "Title": "Tool Perception as a Temporally Dynamic Evaluative Process: Evidence From an Eye-Tracking Study", "Author": "Irene Florean", "CoAuthors": "Luigi Valio, Maria Antonella Brandimonte, Giovanni Federico, Donatella Ferrante", "Abstract": "Recent accounts of tool perception have moved beyond manipulation-based views, proposing that tool processing reflects a dynamic process recently conceptualized as action reappraisal, integrating semantic, mechanical, and sensorimotor information. However, how tools are processed in isolation versus context, how attention is allocated to both tools and objects, and how these processes unfold over time remain unclear.\n\nIn an eye-tracking study, participants (N = 30) freely observed isolated tools, thematically consistent tool-object pairs, and inconsistent pairs over a 2800 ms time window. Growth Curve Analysis was used to examine (1) the proportion of looking toward functional versus manipulation areas of the tool across all conditions, and (2) the proportion of looking toward the tool versus the object in paired conditions.\n\nVisual attention toward tool areas differed across conditions over time. Early attention was mainly focused on functional areas across all conditions. In the isolated condition, however, attention toward the manipulation area already increased within the first 500 ms. Over time, attention shifted toward manipulation areas and stabilized in the consistent and isolated conditions during the late stage. In contrast, the inconsistent condition showed a less linear trajectory, with a late re-engagement of functional areas.\n\nAnalysis of tool–object dynamics showed that visual exploration systematically started from the object and then shifted toward the tool in both paired conditions. Crucially, attention to the object remained higher in the inconsistent condition across most of the time window.\n\nThese findings suggest that tool perception unfolds as a temporally dynamic evaluative process. The object appears to define the action problem, whereas the tool constrains how the action can be implemented. When this mapping is unclear, attention to the object remains higher and tool processing returns to earlier evaluative stages. Overall, the results provide support for reasoning-based accounts of tool perception.", "SubmissionID": 58}, {"Day": "Tuesday", "Time": "09:00–10:30", "SessionID": 42, "Topic": "Eye Movements", "Title": "Mapping a perceptual feature space for transsaccadic object correspondence", "Author": "Fabian Parth", "CoAuthors": "Alexander C. Schütz, Filipp Schmidt, Roland W. Fleming, Dominik Endres", "Abstract": "Peripheral vision is primarily used to select potential targets for further inspection in foveal vision. Across saccades, presaccadic peripheral information must be combined with the matching postsaccadic foveal input. This transsaccadic object correspondence (TOC) is established by using specific features, such as shape, texture, displacement, size, and contrast. While previous studies demonstrated the relevance of individual features, it remains unclear how multiple features are weighted and how they interact in TOC.\n\n \n\nTo explore TOC in a multidimensional stimulus space, we created a photorealistic \"fruit morph\" stimulus set. This involved independently morphing an eggplant and an orange along the feature dimensions of texture/color and shape. With 100 steps for each feature, this resulted in a continuous space of 10,000 images. We conducted a postsaccadic target selection task where observers made a horizontal saccade towards a peripheral stimulus object. Perisaccadically, this object was replaced by two vertically displaced candidates, and observers executed a corrective saccade to the candidate perceived as the closest match.\n\n \n\nThis configuration required at least three stimuli differing in shape/texture coordinates. To determine discriminability thresholds and estimate feature weights for specific correspondence probabilities, we applied an information-theoretic approach for multidimensional adaptive sampling. We maximized the mutual information between model parameters and the expected response in every trial, using a gradient-based optimizer.\n\n \n\nWe demonstrate that a multidimensional perceptual stimulus space can be mapped based on binary response data from corrective saccades. Even though the stimulus space is continuous, we find that features are not equally weighted in TOC. Instead, texture is twice as important as shape in establishing transsaccadic object correspondence in our stimulus set. This illustrates how multiple object features are integrated and traded off when establishing correspondence across eye movements.", "SubmissionID": 64}, {"Day": "Tuesday", "Time": "09:00–10:30", "SessionID": 42, "Topic": "Eye Movements", "Title": "From saliency to semantics: a large-scale lifespan study on gaze and scene understanding", "Author": "Diana Kollenda", "CoAuthors": "Hannah Wilkening, Benjamin de Haas", "Abstract": "Moment-to-moment gaze shifts are fundamental to exploring complex visual environments in high detail. But what governs the decision of where to look next? While early models emphasized low-level visual saliency, recent evidence suggests that high-level semantic relevance, specifically global scene understanding (SU), is a superior predictor of spatial gaze distribution. To quantify an object’s relevance for SU, we utilized a computational approach recently validated by Murlidaran and colleagues: we automatically generated multiple AI-provided descriptions of a scene, visually blocking every object in turn. For each blocked object we computed the resulting semantic dissimilarity to the description of the original scene using Sentence-BERT embeddings. By mapping these difference scores back onto their corresponding object pixel masks, we generated a map of object weights for global scene understanding. We then compared the gaze patterns from 6,720 participants (ages 5–72) across 40 naturalistic scenes with visual objects including people. By correlating object dwell time distributions with SU maps, automatically generated local meaning maps (DeepMeaning, Hayes and Henderson), and low-level-saliency, we observed two key findings: First, we replicated that SU-relevance is the strongest predictor of gaze behavior, a result that holds across all age groups. Second, while the predictive power of low-level saliency declines during the first two decades of life, the influence of SU-relevance and local meaning maps significantly increases. These results reveal a clear developmental transition from stimulus-driven saliency toward meaning-driven exploration, with global scene understanding emerging as the primary driver of gaze decisions as the visual system matures.", "SubmissionID": 83}, {"Day": "Tuesday", "Time": "09:00–10:30", "SessionID": 42, "Topic": "Eye Movements", "Title": "Looking back: Individual regression rates during reading covary with returns during scene viewing", "Author": "Malin Styrnal", "CoAuthors": "Alex L. White, Benjamin de Haas", "Abstract": "Eye movements offer a unique window into visual perception and cognitive processes. Research on reading has shown that regressive saccades – eye movements that revisit previously fixated words – are associated with comprehension and reading difficulties such as dyslexia. Nevertheless, regressions can also occur when fluent readers are confronted with simple texts. Our aim was to investigate whether regressions are driven by reading-specific processes or reflect general mechanisms of visual sampling.  Using an individual differences approach, we conducted an eyetracking study with 128 German university students. Participants first read lines from a German encyclopedia for children and completed a multiple-choice comprehension test, confirming that all participants read and understood the lines without problems. Participants then completed a free-viewing task of 200 naturalistic scenes. This allowed us to quantify individual regression rates during reading, as well as return rates – the tendency to move the eyes back to previously fixated objects or regions during scene viewing. The results revealed robust individual differences with high internal consistency for both, the frequency of regressive saccades during reading and return saccades during scene viewing (r = 0.944 for reading and r = 0.930 for scene viewing). Notably, these measures were significantly correlated across participants (r = 0.24, p < .01), suggesting they share overlapping mechanisms. We aim to further explore these mechanisms in ongoing work. Specifically, we hypothesize that both individual regression and return rates are related to poorer executive control of saccades. We therefore predict that participants with higher rates of return and regressive saccades also show a weaker performance in antisaccade tasks. Ultimately, this research could reveal which general mechanisms of visual sampling shape reading and – perhaps – reading-related difficulties.", "SubmissionID": 90}, {"Day": "Tuesday", "Time": "09:00–10:30", "SessionID": 42, "Topic": "Eye Movements", "Title": "When Minds Wander and Blank: Oculomotor Signatures of Endogenous Distraction", "Author": "Davide Buzzi Reschini", "CoAuthors": "Leonardo Chelazzi", "Abstract": "To an external observer, we may appear fully engaged with the external environment, while our conscious experience is frequently hijacked by self-generated content or by states of mental absence, systematically distracting us from the task at hand. States of Mind Wandering (MW) and Mind Blanking (MB) occur throughout daily experience, with individuals spending 30-50% of waking hours in task-unrelated thoughts. Despite growing recognition, these phenomena are inconsistently conceptualized as endogenous forms of distraction competing with external attentional demands. To address these limitations, we developed a novel paradigm investigating how internally oriented states function as distractors and interact with salient external distractors. We implemented a modified version of Sustained Attention to Response Task (SART) with Go/No-Go responses, featuring a saccadic response for all trials and manual response for GO trials. To modulate the emergence of MW and MB, we also included a reverse SART task, in which the ratio between Go and No-Go trials is inverted. Mental states were assessed with the Experience-Sampling method, while eye tracking recorded gaze parameters, allowing us to extract oculomotor measures including saccadic reaction times, spatial accuracy and rate of saccadic omission. While the reverse SART was not effective in modulating the emergence of off-task mental states, we found that both behavioral and oculomotor performance was significantly lower during MW and even more so during MB. In addition, we also discovered an interaction between mental states and the presence of visual distractors, which was significant during MW but not during MB, showing a distinct impact of the distractor during MW. The results of this study contribute to the characterization of frequent off-task mental states by providing objective markers with eye-tracking measures, to better understand how they impact daily functioning.", "SubmissionID": 135}, {"Day": "Tuesday", "Time": "09:00–10:30", "SessionID": 42, "Topic": "Eye Movements", "Title": "Pre-saccadic attention enhances peripheral object perception regardless of scene-based spatial expectations", "Author": "Louise Kauffmann", "CoAuthors": "Nathalie Guyader, Carole Peyrin, Eva Aprile, Clara Carrez-Corral, Louise Kauffmann", "Abstract": "During visual scene perception, visual acuity is maximal at fixation and decreases with eccentricity. Although pre-saccadic attention has been shown to enhance perception of simple stimuli at eccentric locations, it remains unclear whether this benefit extends to object perception in the context of complex scenes processing and whether it interacts with perceptual effects of context-based predictions. The present study addressed these questions using two gaze-contingent display experiments. Experiment 1 examined whether saccade preparation toward an object improves its perception compared to a saccade toward another location or no saccade. Participants maintained central fixation while covertly attending to scene images. A spatial cue indicated a parafoveal location and specified whether participants should saccade toward it or maintain fixation. The cue could indicate either a target object’s location or another location in the scene. The target object disappeared either when participants initiated a saccade or after a brief delay if they maintained fixation. Participants were then presented with an object, either the target or a distractor absent from the scene, and indicated whether they had previously seen it. Results revealed higher accuracy in trials with a saccade toward the target object than another location or without a saccade. Experiment 2 tested whether this benefit interacts with spatial expectations in the scene context. The cue always pointed to the target object’s location, and the spatial congruence of the object within the scene was manipulated (expected or unexpected location). Participants either performed a saccade toward the cued location or maintained fixation. We again observed higher accuracy when a saccade was made to the target object than when no saccade was initiated. However, this effect was not modulated by the object’s spatial congruence within the scene. Overall, the results demonstrate a robust benefit of pre-saccadic attention for peripheral object perception independently of context-based spatial expectations.", "SubmissionID": 153}, {"Day": "Tuesday", "Time": "09:00–10:30", "SessionID": 42, "Topic": "Eye Movements", "Title": "Eye tracking metrics for evaluating the cognitive impact of spectacle lens design", "Author": "Yannick Sauer", "CoAuthors": "Rajat Agarwala, Jenny Loren Witten, Sandra Gisbert Martinez, Patrick Michel, Judith Ungewiss, Siegfried Wahl", "Abstract": "With increasing age, our eyes lose the capability to focus on close objects. A common solution for this condition, called presbyopia, are Progressive Addition Lenses (PALs), spectacle lenses with different areas for far and near vision. The gradual change of correction power between these areas unavoidably leads to optical aberrations, causing peripheral blur that can impact performance and cognitive demand in everyday tasks. Changes in pupil size and blink rate have been linked to cognitive load in controlled laboratory tasks, but their validity in more naturalistic settings with gaze and vergence changes remains unclear.\n\nHere, we test whether these eye tracking metrics can evaluate the cognitive impact of different PAL designs. Thirty-two experienced PAL wearers performed a pegboard task, a visuomotor near task requiring fine hand-eye coordination. Each participant performed the 3-minute test three times with each of two PAL designs: an optimized PAL, which uses wearer-specific parameters to reduce peripheral blur, and a standard PAL. Both lens pairs were worn in a mobile eye tracker frame. In this within-participant design, we evaluated task performance, subjective cognitive load (NASA-TLX questionnaire) and eye tracking metrics as objective markers for cognitive demand, including mean pupil diameter, pupil size variability, and blink rate.\n\nThe optimized PAL design significantly improved task performance and reduced subjective cognitive load. While the pupil measures showed no significant differences, blink rate is significantly higher with the improved PAL, indicating reduced cognitive demand.\n\nWe conclude that pupillometry-based cognitive load markers might be less sensitive in naturalistic tasks with frequent gaze changes. However, blink rate can support the evaluation of the cognitive impact of lens blur. The results underscore the benefit of optimized lens design and suggest blink rate as an objective metric for vision correction solutions.", "SubmissionID": 155}, {"Day": "Tuesday", "Time": "09:00–10:30", "SessionID": 42, "Topic": "Eye Movements", "Title": "Primed for Action: How Humans Decode Actions from Almost Nothing", "Author": "Filip Rybansky", "CoAuthors": "Sadegh Rahmaniboldaji, Andrew Gilbert, Frank Guerin, Anya Hurlbert, Quoc Vuong", "Abstract": "Why do humans find actions easy to recognise compared to state-of-the-art machines? While machines struggle with naturalistic egocentric action videos, people can recognise them from minimal spatiotemporal features. We previously identified Minimal Recognisable Configurations (MIRCs) in Epic-Kitchens-100 videos which were correctly (Easy) or incorrectly (Hard) categorised by our computer-vision network. High-level (e.g., active object, active hand) and mid-level (e.g., orientation, motion) critical features for action recognition were determined from these MIRCs. Here we used eye-tracking to converge on critical features and establish whether people’s eye-movements can explain why machines found some actions hard. We further tested whether contextual top-down information can affect people’s performance and eye movements, as machines predominantly use bottom-up information. Participants (N=36) were briefly presented with a static prime image (400ms), then viewed the original or MIRC video and identified the action while eye movements were recorded. Primes were the middle frame of the original video. Objects were removed or the frame was phase-scrambled to progressively reduce contextual information. Normalised Scanpath Saliency (NSS) was used to compare which features predicted where participants looked. Active objects (NSS=1.60) and orientation (NSS=1.16) were the best predictors, outperforming active hands (NSS=0.75). The predictive ability was higher for features in Hard (NSS=0.69) than Easy (NSS=0.51) videos. For priming, unedited primes produced higher accuracy and shorter first fixation durations (78%, 299ms) than phase-scrambled primes when viewing MIRCs (57%, 330ms). Our results suggest that egocentric action recognition is dominated by the active object and edge orientation features. Furthermore, contextual priming facilitates recognition and initial gist extraction, but not further search for visual features. Overall, participants were more likely to fixate critical features for Hard videos and could recognise Easy videos by fixating regions with lower feature activation. Incorporating human strategies such as increased attention to critical features can improve action recognition by machines.", "SubmissionID": 160}, {"Day": "Tuesday", "Time": "09:00–10:30", "SessionID": 11, "Topic": "Spatial Vision", "Title": "Near-vision scene categorization across eccentricities using a Humphrey-inspired spatial framework", "Author": "Pauline Olivier", "CoAuthors": "Nina Simon, Cynthia Faurite, Nathalie Guyader, Louise Kauffmann, Carole Peyrin", "Abstract": "Ageing is associated with progressive visual changes, including reduced access to fine details, particularly in near vision due to declining accommodative capacity. Despite their ecological relevance, near-vision constraints are rarely considered in studies investigating visual processing across the visual field. The present study introduces a novel scene categorization paradigm that organizes the scene display to align with the Humphrey 30-2 visual field test, a standardized clinical test used to evaluate visual field sensitivity across eccentricities. This organization enables sampling of categorization performance across eccentricities in near vision. This work constitutes a feasibility study conducted in young adults with normal vision to validate the methodological implementation of this approach before its application to ageing populations. Grayscale photographs of indoor and outdoor scenes were presented binocularly at a viewing distance of 30 cm within concentric annular regions spanning 0° to 30° of visual angle. Stimuli were designed using a partition of the visual field into five cortically equivalent annular regions based on a cortical magnification function, ensuring that each region corresponded to an equivalent surface of primary visual cortex. The eccentricity boundaries were 0-2.8°, 2.8-7.1°, 7.1-12.7°, 12.7-20.1°, and 20.1-30.0°. Participants performed a categorization task (indoor vs. outdoor) while maintaining central fixation. On each trial, a stimulus corresponding to one of the five eccentricity regions was presented. Stimuli were displayed for 200 ms in Experiment 1, based on Humphrey perimetry duration, and for 100 ms in Experiment 2, based on rapid scene categorization tasks. Performance varied across eccentricities in a non-monotonic manner, with higher error rates at central locations and better performance at near-peripheral positions, indicating that scene categorization in near vision does not rely solely on central vision, consistent with previous findings. These findings demonstrate that the proposed paradigm provides a reliable framework for assessing visual performance across eccentricities in near vision.", "SubmissionID": 26}, {"Day": "Tuesday", "Time": "09:00–10:30", "SessionID": 11, "Topic": "Spatial Vision", "Title": "Age-related changes in visual field asymmetries", "Author": "Julia Papiernik-Kłodzińska", "CoAuthors": "Marisa Carrasco, Marek Binder, Renate Rutiku", "Abstract": "Visual perception is not uniform across the visual field. Extensive research indicates that performance in a wide range of visual tasks is typically superior along the horizontal relative to the vertical meridian (horizontal–vertical anisotropy, HVA) and enhanced along the lower compared to the upper vertical meridian (vertical meridian asymmetry, VMA). While the HVA becomes more pronounced through adolescence and the VMA emerges during adolescence (Carrasco et al., 2025), it remains unclear whether and how they evolve across the adult lifespan. Neuroimaging evidence links individual differences in the VMA in a visual working memory task to microstructural properties of the early visual cortex that vary with age (Papiernik-Kłodzińska et al., 2026). This raises the possibility that aging alters the spatial organization of visual performance.\n\nTo test this, we compare young (18–30 years) and older (60–80 years) adults in an orientation discrimination task. Gabor patches are presented at four cardinal locations (upper, lower, left, and right) at 6° eccentricity, with contrast individually thresholded to achieve ~80% accuracy across the locations prior to the main task.  During the task, participants indicate whether the target stimulus is tilted clockwise or counterclockwise from the vertical. Fixation is monitored using eye-tracking, and trials with fixation breaks are repeated at the end of each block. Older adults are screened using the Montreal Cognitive Assessment (MoCA) to ensure a cognitively healthy sample.\n\nWe will report HVA and VMA indices derived from discriminability (d′) differences across locations and assess age-related differences in their magnitude. We hypothesize that aging reshapes polar angle asymmetries in visual performance, potentially reflecting underlying neuroarchitectural changes in the aging visual system.", "SubmissionID": 31}, {"Day": "Tuesday", "Time": "09:00–10:30", "SessionID": 11, "Topic": "Spatial Vision", "Author": "Matteo Valsecchi", "CoAuthors": "Nino Sharvashidze, Matteo Toscani", "Abstract": "Previous research has shown that exposure to textures with center-periphery discontinuities can, under some conditions, lead to the illusory impression of a uniform texture, in which the quality of the central stimulus extends to the periphery (e.g., Otten et al., 2017). Furthermore, it has been shown that for the texture composed by dots and lines, if the lines connect the dots, the apparent numerosity of the dots is reduced (e.g. Franconeri et al., 2009; He et al., 2009).\n\nIn our first experiment, we verified that the illusion of uniformity also applies to the connectedness of dots. We had observers judge whether the dots in the peripheral region of a texture were connected, while orthogonally manipulating the connectedness of the central region. The results confirmed that, despite not being informative, the central portion of the texture produced a congruent bias on peripheral perception: dots in the periphery appeared more connected when the central portion was connected, and vice versa.  \n\nIn our second experiment, we investigated whether the illusory connectedness induced by the central stimulus also biases the perceived numerosity of the peripheral stimulus. To this end, observers compared the number of dots in a peripheral sector of the texture with that in a subsequent central probe. The physical density of dots in the peripheral sector varied between trials, and the presence of connected or unconnected dots in the center varied orthogonally. The PSE tracked peripheral numerosity, confirming that observers attended to the peripheral stimulus; however, there was no significant effect of the connectedness of the central stimulus, failing to provide evidence for an effect of illusory connectedness. \n\nWe speculate that other perceptual biases, such as the general reduction in perceived peripheral numerosity or other biases related to stimulus regularity, might have dominated the observers’ judgements, overshadowing the effect of connectedness.", "SubmissionID": 50}, {"Day": "Tuesday", "Time": "09:00–10:30", "SessionID": 11, "Topic": "Spatial Vision", "Title": "Examining spatial and temporal processing of low spatial frequency sine and square gratings", "Author": "Maryam Jannati", "CoAuthors": "Felix A. Wichmann", "Abstract": "Early vision models aim to explain how visual information is encoded in the first stages of the visual system. Interest in such models has grown in recent years, as they improve human–machine alignment when used as pre-processors for deep neural networks (DNN) (Dapello et al., 2020). Progress, however, partly depends on high-quality data to constrain the parameters of nonlinear models (Wichmann, 1999).\n\nOne influential study in the field of spatial vision is Campbell and Robson (1968). In it, they propose that the initial encoding of visual information is in independent, narrowly tuned spatial-frequency channels. Despite its influence, the study relied on only two observers and the method of adjustment, making the data less than ideal for constraining the parameters of early vision models. An often overlooked finding is the elevated square-over-sine sensitivity ratio at low spatial frequencies, exceeding the predicted value of 4/π. This has been attributed to harmonics of low-frequency stimuli falling into more sensitive mid-frequency channels.\n\nThis hypothesis can be tested by reducing harmonic contributions. Short presentation durations or high temporal frequencies shift the contrast sensitivity function (CSF) from bandpass to lowpass (Kelly, 1979), which should lower the square-over-sine ratio toward 4/π . Green, Corwin, and Schor (1981) confirmed this using 25ms presentations, though again with limited participants and the method of adjustment.\n\nHere, we replicate and extend these classic findings using a two-interval forced-choice (2IFC) design with sufficient participants and trials to ensure statistical power. We test spatial frequencies of 0.25, 0.5, 1, and 2 cpd across presentation durations of 33, 333, and 1067 ms, along with a 15Hz flicker condition. This design allows us to probe both spatial and temporal summation.\n\nTogether, our experiments provide a much extended replication of a seminal spatial vision study, making the results suitable for constraining parameters of early vision models.", "SubmissionID": 85}, {"Day": "Tuesday", "Time": "09:00–10:30", "SessionID": 11, "Topic": "Spatial Vision", "Title": "Improving a fast and modular image-computable psychophysical spatial vision model", "Author": "Jannik Reichert", "CoAuthors": "Felix A. Wichmann", "Abstract": "To explain the initial encoding of pattern information in the human visual system, the standard psychophysical spatial vision model is based on channels specific to spatial frequency and orientation with the human contrast sensitivity function (CSF) as the envelope of the sensitivities of the individual channels, followed by divisive normalization (contrast gain-control). Schütt and Wichmann (2017, Journal of Vision) developed an image-computable implementation of the standard model and showed it to be able to explain data for contrast detection, contrast discrimination and oblique masking and to some extent natural-image masking. Furthermore, the model induces a sparse encoding of luminance information. Reichert and Wichmann (2024, VSS) provided a modern, efficient, automatically differentiable implementation of this model in the deep-learning framework PyTorch enabling easy and fast training of model parameters on image data.\n\nWe extend Reichert and Wichmann's implementation by allowing learning of the lapse rate as a hyper-parameter. This can drastically improve its deviance (up to 100 %) on the same contrast-discrimination data as Schütt and Wichmann. We capture the dependence of the fitted parameters on presentation duration. Moreover, we discuss individual differences in the fitted parameters and how these differences might in addition be captured.\n\nAn advantage of our model is its modularity and automatic differentiation because this facilitates rapid implementation, addition, and testing of new components of the standard spatial vision model. We use the model’s fast inference, specifically, to estimate confidence intervals for and the loss landscapes between model parameters.\n\nFurthermore, our extensible framework allows the integration of this psychophysically validated model into larger image-processing pipelines with elements such as retINRF (Velasco-Salido et al., 2026, ECCV) to account for retinal processing or downstream convolutional neural networks (CNNs) such as VOneNet (Dapello et al., 2020, NeurIPS), where it may increase performance or energy efficiency due to its relative simplicity.", "SubmissionID": 89}, {"Day": "Tuesday", "Time": "09:00–10:30", "SessionID": 11, "Topic": "Spatial Vision", "Title": "Enhancing the Sensitivity of the Redundant Target Paradigm", "Author": "Doris Schmid", "CoAuthors": "Karin Ludwig, Thomas Schenk", "Abstract": "The redundant target effect refers to the well-established principle that responses are faster to two simultaneous targets than to one. Beyond its theoretical interest, the phenomenon has attracted attention as a tool to probe residual visual capacities (controversially termed “blindsight”) within the blind field of patients suffering from homonymous hemianopia. Residual visual capacities are inferred when the redundant target significantly accelerates responses, even when it is presented in the blind field. Yet, a recent review showed that classic versions of the redundant target paradigm (RTP) have limited sensitivity, with almost half of patients failing to show the effect for one versus two targets presented in their sighted hemifield, meaning the RTP frequently misses even undisputed visual capacities.\n\nThis study aimed to enhance the sensitivity of the RTP through optimizing the experimental design in healthy participants. In Experiments 1 and 2, target saliency (1: numerosity, 2: size), asymmetric configurations, and bimanual versus unimanual responses were investigated: the largest redundancy gains occurred for bimanual responses and asymmetric configurations, specifically a low-saliency target in the single condition and an additional high-saliency target in the redundant condition. As manipulating size yielded a slight advantage, this approach was adopted in Experiment 3. \n\nIn Experiment 3, the presumed blind-field (large) target was further advantaged by presenting it slightly before the small target. Healthy participants were asked to respond only to the small target, while the large target preceded it by variable stimulus-onset asynchronies (SOAs). Reaction time benefits increased with SOAs. At the single-case level, 85% of participants showed a significant effect at the longest SOA, rising to 96% when trials across SOAs were combined, underscoring the importance of increasing the number of trials. This optimized RTP could thus provide a highly sensitive test of blindsight.", "SubmissionID": 105}, {"Day": "Tuesday", "Time": "09:00–10:30", "SessionID": 11, "Topic": "Spatial Vision", "Title": "Scene visibility is shaped by interactions between central and peripheral visual field information", "Author": "Clara Carrez-Corral", "CoAuthors": "Carole Peyrin, Louis Goerig, Alexia Roux-Sibilon, Louise Kauffmann", "Abstract": "Past studies have shown mutual interactions between information extracted in central and parafoveal or peripheral vision in the context of scene categorization, where information from one visual field influences categorization in the other one. The present study examined whether such interactions also influence scene visibility across the visual field. Experiment 1 (n = 32) addressed the influence of peripheral information on scene visibility in central vision while Experiment 2 (n = 29) addressed the opposite. In both experiments, scene information in the target visual field (a central disk in Experiment 1 or a peripheral ring in Experiment 2) was embedded in noise and participants performed a scene-in-noise and a noise-in-scene detection task. providing complementary measures of scene visibility. We manipulated information available in the non-target visual field which was either congruent, incongruent or meaningless relative to the target visual field. Detection thresholds were estimated using adaptive 1up-1down staircases, to obtain Scene-in-Noise and Noise-in-Scene detection thresholds for each condition of visual information in the non-target visual field. Results showed that in both experiments meaningful and structured information in the non-target visual field (congruent or incongruent) improved scene perception in the target visual field compared to meaningless information. Experiment 2 indicated that peripheral scene visibility is further improved by the presence of congruent central information. These findings are interpreted in the context of the predictive processing framework, suggesting that high-level information extracted in one visual field can be used to generate predictions that improve perception of degraded information in the remaining visual field.", "SubmissionID": 159}, {"Day": "Tuesday", "Time": "09:00–10:30", "SessionID": 11, "Topic": "Spatial Vision", "Title": "The ERP Neural Response to Symmetry is Dependent upon Temporal Order", "Author": "Elena Gheorghiu", "CoAuthors": "Annabelle Coogans, Teymoor Ali, Benjamin Dering", "Abstract": "The difference in the Event Related Potential (ERP) response to symmetry and noise, termed the Sustained Posterior Negativity (SPN) is believed to be a task-invariant biomarker of automatic symmetry perception. Most ERP studies of symmetry have used single-interval forced-choice (1IFC) designs, disregarding the temporal order of events and their continuity/predictabil
