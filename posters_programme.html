ing paradigm with no feedback, symbolic feedback, or socio-emotional feedback to examine the training and generalization effects. For clinical validation, an additional 12 children with ASD (ages 7–11) were enrolled to investigate the mechanism underlying these trainings, using pupillometry as a physiological marker of arousal engagement.\n\nBrief BM emotion training with feedback significantly improved BM recognition accuracy relative to no feedback. However, the generalization was modulated by feedback type and autistic traits. In individuals with low-traits, both feedbacks facilitated transfer to untrained BM actions. In contrast, individuals with high-traits exhibited such within-category transfer only following socio-emotional feedback. Critically, socio-emotional feedback not only enhanced facial emotions recognition but also reduced misclassification of untrained BM emotions in the high-trait group, indicating broader cross-category generalization. Data from children with ASD further revealed that socio-emotional feedback evoked stronger physiological arousal, which predicted cross-category generalization of learning.\n\nThese findings demonstrate that socio-emotional feedback uniquely engages arousal-related mechanisms to strengthen emotional representations, providing a scalable approach to mitigate social cognitive difficulties in ASD and subclinical populations.", "SubmissionID": 588}, {"Day": "Wednesday", "Time": "09:00–10:30", "SessionID": 36, "Topic": "Social Perception and Emotion", "Title": "How emotional valence affects generalisation", "Author": "Tara Zaksaite", "CoAuthors": "Ellen Seiss, Nicola Gregory, Andy Wills", "Abstract": "Generalisation is a basic principle of learning. It describes the phenomenon where previous experiences can influence our attitudes and perceptions of similar novel stimuli or events. Generalisation mechanisms have also been shown to influence the maintenance of anxiety, due to a proliferation of negative cues within one’s environment. However, most of the studies investigating the link between generalisation and anxiety have used negative outcomes, such as electric shocks. Therefore, it remains unclear whether greater generalisation in anxiety is seen for negative items only, or constitutes a more general mechanism of greater generalisation, regardless of item valence. This study investigated the link between emotional valence and generalisation levels, using stimuli associated with negative, positive, and neutral outcomes. Contrary to existing literature, neutral items were found to have greatest levels of generalisation, compared with positive or negative items.", "SubmissionID": 597}, {"Day": "Wednesday", "Time": "09:00–10:30", "SessionID": 36, "Topic": "Social Perception and Emotion", "Title": "The impact of embodied social cues on spatial attention and eye movements", "Author": "Hafiza Afsar", "CoAuthors": "Andrew Bremner, Wieske van Zoest", "Abstract": "Social cues such as others' eye gaze and pointing gestures bias attention. Previous work suggests that the pointing cue may be more powerful than the gaze cue in directing covert attention. However, it is unclear how 1) eye movements impact these two different social cues, and 2) whether the effectiveness of social cues affect the relationship between covert and overt orienting. In two experiments, we monitored the gaze of participants as they completed a visual discrimination task which involved identifying odd digits. Nonpredictive central gaze and pointing cues gazed at or pointed in the direction of the target (valid trials) or away from the target (invalid trials). In Experiment 1, participants were freely permitted to make eye movements, whereas in Experiment 2 participants were constrained from making eye movements. Across the two experiments, independent of whether eye movements were allowed or not, the results showed that the pointing cue had a larger validity effect on manual response times than the gaze cue. Additionally, in Experiment 1, saccades landed closer to the target position on valid trials compared to invalid trials and this difference was larger for the pointing cue compared to the gaze cue. Cue validity did not impact saccade latency. In manual RT, a three-way interaction between cue-type, validity and Experiment showed that the interaction between the validity effect and cue-type was larger in Experiment 1 compared to Experiment 2; this specifically showed that eye movements had a greater effect on the pointing cue than the gaze cue. These findings indicate that the relationship between oculomotor performance and spatial attention depends on cue-type and support the view that attentional orienting is not strictly tied to eye movements or motor preparation.", "SubmissionID": 600}, {"Day": "Wednesday", "Time": "09:00–10:30", "SessionID": 36, "Topic": "Social Perception and Emotion", "Title": "Gaze-cueing and racial biases in Black, South Asian and White adults", "Author": "Makayla Ward", "CoAuthors": "Sarah R. Beck, Andrew J. Bremner, Wieske van Zoest", "Abstract": "People tend to follow the gaze of others, and this can be influenced by a range of social factors. The gaze-cueing effect refers to being quicker and more accurate to respond to information that are cued by the gaze of another person. This present research uses eye-tracking to understand how this gaze-cueing effect is moderated by race. Most previous work suggests that observers are more likely to follow the gaze of their racial ingroup, compared to their outgroup, though ingroup biases are not always found. Additionally, race-related gaze-cueing research often compares two races (e.g. Black or White, or East Asian and White). To be more inclusive, the present study, run in the UK and reflecting the UK population, includes Black, South Asian and White participants, and Black, South Asian and White gaze-cue stimuli. Race is seldomly researched in relation to cognitive processes, which prompts an investigation into how racial identity may interact with a well-studied phenomenon, like the gaze-cueing effect. This experiment depicts a standard gaze-cueing task, using reaction time and eye-tracking data, to consider the interaction between the racial identity of the viewer and the cue. From preliminary evidence, there is a significant validity effect in standard reaction time across all racial groups. There is also an observable difference in validity based on oculomotor evidence on landing position, but this is not consistently observed in saccadic latency. Further, when investigating the impact on racial identity, manual latency does not show significant effects between groups, but there are subtle differences in oculomotor performance. Developing understanding about how social constructs can influence subtle signals may allow for further insight into how identity interacts with basic attentional processes. Utilising information about childhood and current environmental racial diversity also provides opportunities to comprehend the impact of potential relevance of socialisation over the lifespan.", "SubmissionID": 601}, {"Day": "Wednesday", "Time": "15:30–17:00", "SessionID": 20, "Topic": "Face Perception and Recognition", "Title": "iTrak: Using A Novel Approach To Show That Preferred Fixation Location Remains Stable In Adults", "Author": "Siobhan McCourt", "CoAuthors": "Miguel Eckstein, Matt Peterson, Brad Duchaine", "Abstract": "Individuals show consistent preferences for the position at which they first fixate on a face, known as their preferred fixation location (PFL). While stable within individuals, the vertical position of this PFL varies widely across observers. Each observer also has an optimal fixation location (OFL), where recognition performance is highest. Typically, PFLs and OFLs are closely aligned, and performance declines rapidly as fixation moves away from this point (retinotopic tuning). Stability in these positions over time seems advantageous to ensure observers reliably fixate their OFL. However, preliminary evidence of higher PFLs in younger adults than older adults (Peterson et al., 2019) and decline in discrimination for eyes but not mouths as adults age (Fry et al. 2023) indicate that one’s PFL position may drift down the face with age. We investigate the age-related shift in PFLs and the link between PFL and retinotopic tuning using iTrak, a novel approach to ascertaining first fixation locations remotely. iTrak presents a target face followed by a grid of character bigrams each for 200ms, and the participant's report of which character bigram they saw indicates their first fixation position. In this study, participants completed a sex discrimination task in a free-fixation paradigm to generate their PFLs and a forced-fixation paradigm to estimate retinotopic tuning curves. The free-fixation task (N=43, age range=18-64) showed no correlation between age and vertical PFL (r=-.05, p=.73). The forced-fixation task (N=19) showed a negative correlation between distance from PFL and sex discrimination performance (r=-.52, p=.02). These findings indicate that PFLs remain stable with age, while the match between PFLs and OFLs demonstrates that iTrak effectively determines eye position. Our future research will aim to validate the iTrak method further by comparing the eye position data it generates to that collected with laboratory-based eye-tracking.", "SubmissionID": 164}, {"Day": "Wednesday", "Time": "15:30–17:00", "SessionID": 20, "Topic": "Face Perception and Recognition", "Title": "Ambient and focal dichotomy in face perception", "Author": "Dina DAGHER", "CoAuthors": "Thérèse COLLINS, Karine DORÉ-MAZARS", "Abstract": "Eye movements reflect exploration strategies that correspond to two processing modes: an ambient mode at the beginning of exploration (short fixations – large saccades), associated with rapid and global information extraction, followed by a focal mode (long fixations – small saccades), linked to finer and more selective sampling. The aim of the current study is to establish a functional link between these modes, their perceptual consequences, and their neural signatures. \n\nIn an eye-tracking experiment, a set of faces was presented to 22 participants who performed two forced-choice tasks presented in separate counterbalanced blocks: (1) Ensemble: estimate the average emotion of the faces; (2) Identity: identify one of the faces among those presented. The set size (4, 8, 12 faces) and presentation duration (500, 1500, 3500 ms) were randomly selected for each trial. \n\nThe results replicate the oculomotor signatures of the two modes, with an increase in fixation duration during exploration, and reveal a dissociation: for the ensemble task, performance was better for short durations but was not modulated by face number, reflecting early and rapid processing. Conversely, the identity task showed an effect of face number and presentation duration, with better performance for smaller sets and longer presentations. This is consistent with an initial ambient mode supporting rapid extraction of global information, followed by a more detailed analysis during the focal mode.\n\nA second study using EEG will test whether ambient and focal modes are also characterized by distinct neural patterns, thereby linking oculomotor behavior, neural representations and information processing modes.", "SubmissionID": 171}, {"Day": "Wednesday", "Time": "15:30–17:00", "SessionID": 20, "Topic": "Face Perception and Recognition", "Title": "Spatially Structured Emotional Regularity Enhances Working Memory for Faces", "Author": "Yueyao Hu", "CoAuthors": "Luyan Ji", "Abstract": "Structured regularities across multiple items can support visual processing. However, whether such regularities in emotional faces can be extracted to facilitate working memory, and whether this facilitation is modulated by emotional valence, remains unclear. To address these questions, we conducted two behavioral experiments using working memory tasks. Participants were required to memorize multiple faces with varying emotional intensities and, after a delay, adjusted a test face to match the intensity of the cued face. In Experiment 1, four faces were arranged horizontally. In the structured condition, emotional intensity increased linearly from left to right. In Experiment 2, faces were arranged in a 2 × 2 grid. In the structured condition, emotional intensities increased clockwise from a starting position, with four possible starting positions creating four regularity patterns. In both experiments, the unstructured condition involved random assignment of the four intensities to positions. The results showed that in Experiment 1, memory precision was higher in structured than in unstructured conditions. In Experiment 2, this facilitation effect was consistently observed across all regularity types, indicating that the benefit generalized across spatial configurations rather than being specific to a particular one. In addition, across both experiments, memory precision was higher for negative than for positive emotions. Taken together, these findings suggest that spatially structured regularities in emotional faces can be extracted to facilitate working memory performance. Moreover, this facilitation is robust across spatial configurations and is modulated by emotional valence, with a bias toward negative emotions.", "SubmissionID": 179}, {"Day": "Wednesday", "Time": "15:30–17:00", "SessionID": 20, "Topic": "Face Perception and Recognition", "Title": "How do People Use Social Information From Avatars in a Virtual Reality Search Task?", "Author": "Rachael Taylor", "CoAuthors": "Lisa Huerta, Mike Burton, Markus Bindemann", "Abstract": "Virtual Reality (VR) is a useful tool for behavioural research due to its ability to immerse users within naturalistic environments whilst retaining control over experimental variables. Thus, VR can help bridge the gap between two distinct methodologies: highly controlled laboratory studies in sterile settings, and more ecologically valid but noisier real-world research. Here, we show how VR can be used to explore how people utilise cues given by avatars in a visual search task. In this experiment, we placed participants in an immersive beach environment populated by several high-fidelity avatars. The task was to find a target shell close to each avatar, with the avatars either giving helpful or unhelpful cues to the location of the target. We informed half of the participants that an avatar that gave a happy facial expression when approached would provide helpful information, while an avatar that gave a disgusted expression would provide unhelpful information. The other half of participants were not informed of this contingency. We measured how long it took participants to find the target shell, focusing on the effects of instruction given and the helpfulness of the avatars. We found that the helpfulness of the avatar impacted search times, but only when participants were given explicit instruction to attend to the social cues of the avatar. This demonstrates that people are capable of using social information given by avatars to aid them in visual search, but may not do so intuitively. The findings of this study show how VR can be used to explore social cognition in more naturalistic contexts.", "SubmissionID": 210}, {"Day": "Wednesday", "Time": "15:30–17:00", "SessionID": 20, "Topic": "Face Perception and Recognition", "Title": "Magnetoencephalography reveals the neural time course of illusory face perception in vertically symmetrical random noise images", "Author": "Kateryna Marchenko", "CoAuthors": "Colin Clifford, Erin Goddard", "Abstract": "The perception of illusory face-like form in random patterns or objects, referred to as face pareidolia, is thought to reflect a coarse internal template used by the visual system to detect biological faces early on in the visual processing hierarchy. The visual features of real-world face pareidolia exemplars can vary widely (e.g., illusory faces seen in clouds versus power sockets), which makes it difficult to control for variation in low- to mid-level image features across stimuli. Here, we measured the neural activity associated with illusory face perception in randomly generated fractal noise patterns, matched exactly in symmetry and image statistics, using magnetoencephalography (MEG). We then applied multivariate pattern analysis (MVPA) to investigate the time course of the neural representations of fractal noise stimuli reported by observers as containing versus not containing illusory faces. We further compared these data with the time course of neural responses to images of biological human faces and regular (not face-like) objects. For classifying the presence versus absence of pareidolic faces in the fractal noise stimuli, the classifier exhibited above chance decoding accuracy from soon after stimulus onset, reaching a peak accuracy of over 65% at around 500ms, just after stimulus offset. Furthermore, cross decoding analyses, whereby the classifier was trained on brain activity in response to biological faces and random non-face objects and tested on fractal patterns that did and did not evoke pareidolia, similarly showed above chance accuracy from early after stimulus onset. Such cross decoding indicates that the neural representations of real face images and pareidolia-inducing noise patterns contain shared information regarding the presence of face-like structure in a stimulus.", "SubmissionID": 224}, {"Day": "Wednesday", "Time": "15:30–17:00", "SessionID": 20, "Topic": "Face Perception and Recognition", "Title": "Attentional biases in engagement with and disengagement from ambiguous facial expressions", "Author": "a19.7k7r Chuo University", "CoAuthors": "Atsunori Ariga", "Abstract": "Ambiguous facial expressions have frequently been shown to bias emotion recognition depending on individual traits and contextual information (e.g., Richards et al., 2002). Furthermore, facial ambiguity can influence social impressions (Kaminska et al., 2020). These findings suggest that ambiguous facial expressions are socially important stimuli. However, it remains unclear whether such expressions capture attention. The present study investigated attentional engagement and disengagement biases toward ambiguous facial expressions using a modified dot-probe task (Rudaizky et al., 2014). We predicted the attentional biases upon engagement with and/or disengagement from ambiguous facial expressions due to their social significance. In Experiment 1, the results did not provide significant evidence for attentional engagement or disengagement biases toward ambiguous facial expressions. However, against the prediction, we observed a trend suggesting that attention was more easily disengaged from ambiguous expressions than from neutral expressions, though it was not significant. This earlier disengagement may indicate that ambiguous facial expressions are quickly interpreted based on the current social context or the viewer’s traits or state. In Experiment 2, we tested this hypothesis in a preregistered study by refining the method used in Experiment 1. We directed participants’ attention to facial expressions by including catch trials and then obtained similar results to those in Experiment 1. These findings suggest that ambiguous facial expressions do not necessarily capture attention, but instead may facilitate interpretation during the registration, allowing viewers to efficiently make appropriate behavioral responses in social situations.", "SubmissionID": 318}, {"Day": "Wednesday", "Time": "15:30–17:00", "SessionID": 20, "Topic": "Face Perception and Recognition", "Title": "Effects of Face Masks on Trustworthiness Judgments and Person Identification", "Author": "Yuiko Sakuta", "CoAuthors": "", "Abstract": "Since the COVID-19 pandemic, mask wearing has become widespread, increasing the frequency with which people encounter masked faces in daily life. However, masks occlude the lower half of the face, potentially impairing person identification and facial expression recognition. As emotional cues become less visible, impressions of trustworthiness may also be affected. The present study examined the effects of mask wearing on impression formation and person identification. If masks hinder facial recognition and thereby influence impression formation, individuals who experience greater difficulty identifying a person across masked and unmasked conditions should judge masked faces as less trustworthy (Hypothesis 1). In addition, participants may form weaker representations of age groups encountered less frequently in daily life, making them harder to identify than more familiar groups (Hypothesis 2). Fifty-one university students participated. In Task 1, participants viewed paired images of the same person with and without a mask and indicated which face appeared more trustworthy. In Task 2, they judged whether pairs of masked and unmasked faces depicted the same individual. For female faces, participants who more frequently judged the two images as depicting the same person tended to rate unmasked faces as more trustworthy, whereas those who made fewer such judgments tended to rate masked faces as more trustworthy. For male faces, unmasked faces were generally rated as more trustworthy. Stimulus-level analyses indicated that “different person” judgments increased particularly for women in their 20s and men in their 60s. Overall, Hypothesis 1 was not supported, whereas Hypothesis 2 received partial support. Because most participants were male, recognition accuracy for opposite-sex faces may have been lower. Future research should further examine the relationship between person identification and impression formation to clarify underlying mechanisms in face perception.", "SubmissionID": 334}, {"Day": "Wednesday", "Time": "15:30–17:00", "SessionID": 20, "Topic": "Face Perception and Recognition", "Title": "Optimizing transcranial electrical stimulation for enhancing face identification", "Author": "Robin Young", "CoAuthors": "Bryan Leong Qi Zheng, Alejandro J. Estudillo, Sarah Bate, Kho Siew Kei", "Abstract": "Face identification is an essential skill used in everyday social interactions, contributing to one’s social and personal life. It is also important in forensic scenarios that rely on identification of others, such as eyewitness identification and identity checkpoints. Brain damage or abnormal development can lead to impairments in face identification, which in turn can have negative consequences for both mental health and national security. Thus, finding methods to improve face identification is crucial. Transcranial electrical stimulation (TES) is an emerging method for enhancing face identification; however, research pertaining to its efficacy has been inconsistent (Willis et al., 2019). This is likely due to the different tasks and stimulation parameters employed across studies. This study aims to determine the optimal stimulation parameters (transcranial direct current vs. random noise stimulation) for improving face identification. Initial findings (N = 34) from a repeated measures ANOVA showed no significant effects of stimulation type on face identification. These results, while unexpected, are consistent with some literature reporting inconsistent effects of TES, likely due to individual differences (Kho et al., 2023). However, a larger sample may yield different results. Nonetheless, findings from this research will allow significant advancements in neuroscience and practical interventions in visual cognition.\n\nReferences\n\nKho, S. K., Keeble, D., Wong, H. K., & Estudillo, A. J. (2023). Null effect of anodal and cathodal transcranial direct current stimulation (tDCS) on own-and other-race face recognition. Social Neuroscience, 18(6), 393-406.\n\nWillis, M. L., Costantino, A. I., Nitsche, M. A., Palermo, R., & Rivolta, D. (2019). Anodal tDCS and high-frequency tRNS targeting the occipitotemporal cortex do not always enhance face perception. Frontiers in neuroscience, 13, 78.", "SubmissionID": 381}, {"Day": "Wednesday", "Time": "15:30–17:00", "SessionID": 20, "Topic": "Face Perception and Recognition", "Title": "´Who’s left out? A systematic analysis of exclusion criteria in developmental prosopagnosia research", "Author": "Randi Starrfelt", "CoAuthors": "Matilde J. Sterup, Ida D. Henriksen, Ro J. Robotham, Erling Nørkær", "Abstract": "Developmental prosopagnosia (DP) is a neurodevelopmental condition characterized by severely impaired face recognition. Over the last ~20 years, research on DP has increased substantially, but many core questions remain unresolved. By systematically analyzing the exclusion criteria applied in studies of DP, we aim to characterize the participants included in this research, and in particular those who are not. \n\n266 unique studies of DP were published from 1991 to 2025, and 186 of these describe exclusion criteria. A total of 300 specific criteria were used in different combinations across studies (mean = 3,9 criteria), with the most common (’Abnormal vision’) used in 54 papers. Following an iterative categorization process, we identified 11 overall categories of exclusion criteria. The most frequent were: Neurological (128 papers); Visual (112); Other developmental (86); and Psychiatric (78). \n\nBy mapping out the specific criteria and overall categories, we show that the exclusion of participants in studies of DP has at the same time been A) strict (many exclusion criteria applied) and B) unsystematic (the same criteria not applied across studies). A) raises the concern that the population of DPs studied to date may in essence be ’super prosopagnosic,’ i.e., representing particularly pure and dramatic cases with few comorbidities or associated deficits. This has been important for establishing DP as an entity independent from e.g., autism, but it makes it difficult to establish how DP may relate to other neurodevelopmental or psychiatric conditions. B) indicates that the same type of cases may not be included across studies. This may have contributed to the perceived heterogeneity of DP but leaves it unknown if the syndrome itself is heterogeneous, or whether this reflects selection bias. Importantly, as consensus criteria for who are included and excluded from the DP group are not established, estimating the prevalence of DP remains impossible.", "SubmissionID": 405}, {"Day": "Wednesday", "Time": "15:30–17:00", "SessionID": 20, "Topic": "Face Perception and Recognition", "Title": "Idiosyncratic visual sampling reflects functional differences in facial information use", "Author": "Lisa Stacchi", "CoAuthors": "Roberto Caldara", "Abstract": "Over the past decade, individual differences in visual sampling strategies during facial identity processing have attracted growing interest. These differences are stable over time, generalize to real-world scenarios, and relate to neural responses. However, the core functional role of these interindividual differences remains unclear. Specifically, it is still unresolved whether they reflect simple preferences in where observers fixate to extract facial information, or meaningful differences in the visual information used to recognize identity. To address this question, we tested a large sample of young healthy adult Western observers in a face identification task. Observers first performed the task under free-viewing conditions while their eye movements were recorded, allowing us to characterize their sampling strategy. Based on these data, we identified groups of observers with similar fixation patterns (e.g., preferential fixation of the eyes or the mouth). In a complementary task, participants completed the same recognition paradigm using a Bubbles reverse-correlation technique, enabling us to identify the diagnostic facial information each observer used for successful identification. The resulting single-subject classification images were then aggregated according to the observer groups derived from the eye-movement data. Our results reveal systematic differences across groups, indicating that observers who sample faces differently rely on distinct subsets of facial information to perform the task. Specifically, observers who preferentially fixated the eyes relied more on information from this region, whereas those who sampled the mouth relied more on information from lower facial regions. Importantly, differences in sampling strategies and information use were not predictive of overall recognition accuracy. Our findings demonstrate that idiosyncratic sampling strategies reflect a genuine functional difference in information use. Together, they provide the first direct mechanistic explanation of idiosyncratic gaze behavior during face identification, suggesting that observers do not rely on the same facial information and further questioning the universality of these strategies.", "SubmissionID": 430}, {"Day": "Wednesday", "Time": "15:30–17:00", "SessionID": 44, "Topic": "Eye Movements", "Title": "Pre-saccadic modulation of vergence response", "Author": "Dilara Erişen", "CoAuthors": "Guillaume Masson, Frank Bremmer, Martin Szinte, Baptiste Caziot", "Abstract": "We use a combination of saccades and vergence to redirect our gaze across direction and depth in three-dimensional space. Vergence eye-movements typically precede saccadic eye-movements, demonstrating that the visual system is able to dynamically extract disparities not at the fovea to drive vergence. Here, we investigated the vergence responses induced by brief pre-saccadic disparity steps. The stimulus consisted of three random-dot stereograms (RDSs), each 7° in diameter, presented at fixation, 8° above fixation, and 8° below fixation. Each trial started with a randomized interval of central fixation. Then, a cue instructed the participants either to make a saccade to one of the peripheral RDSs or to continue fixating at the center. Following a random delay after cue onset (150 - 350 ms), a disparity step (target) of -1.5°, -0.75°, 0°, 0.75°, or 1.5° was introduced either at the center or at the peripheral RDSs resulting in four conditions: i. central cue and central target; ii. central cue and peripheral target; iii. peripheral cue and central target; and iv. peripheral cue and peripheral target. The target was presented for 100 ms before the screen turned blank. Participants responded to disparity steps in all conditions, but the strength of this vergence response was modulated by the saccadic plan. In the fixation conditions, vergence responses were stronger for disparity steps at the fovea (i) than in periphery (ii) as expected. Remarkably, in the saccadic condition, responses were stronger for peripheral target (iv) than for central target (iii). Moreover, vergence responses at the fovea when the participants made a saccade to periphery (iii) were weaker than when they maintained central fixation (i), suggesting some disengagement of attention from the pre-saccadic location. Together, our results demonstrate that vergence responses are modulated by saccadic planning.\n\nSupported by German Research Foundation (Project numbers: 524696675; EXC-3066 TAM)", "SubmissionID": 359}, {"Day": "Wednesday", "Time": "15:30–17:00", "SessionID": 44, "Topic": "Eye Movements", "Title": "Testing models of sensory cue integration with physiological measurements", "Author": "Peter Scarfe", "CoAuthors": "Anna Horwood, Patricia Riddell", "Abstract": "Contemporary models of sensory cue integration propose that by combining sensory cues we gain a more precise sensory estimate compared to that available from the cues in isolation. This is achieved by weighting cues in proportion to their relative reliability, and their reliability relative to a priori information about the perceptual property being estimated. Cue weighting is typically measured behaviourally, e.g. via a two alternative forced choice experiment. However, theoretically, one could determine cue weighting using data from any level of the perceptual hierarchy, e.g. from physiological response through to perceptual decision.\n\nHere, we derive equations allowing one to test cue integration using cue weights inferred from the gain function relating physiological responses to a varying driving stimulus. We apply this model to an extensive preexisting data set of vergence and accommodative responses (measured with a Remote Haploscopic Photorefractor) to distance targets (0.5, 1, 2 and 3 dioptres) varied to isolate individual cues of disparity, blur and angular subtense (Horwood and Riddell, 2008).\n\nWe find that combined cues physiological gain functions can be predicted by that of individual cues. This being clearer for vergence compared to accommodative responses. Our results offer a novel way in which to test models of sensory cue integration, which complements current behavioural methods. We highlight the assumptions and limitations of this approach, as well as its ability to disambiguate between competing models of cue integration.", "SubmissionID": 382}, {"Day": "Wednesday", "Time": "15:30–17:00", "SessionID": 44, "Topic": "Eye Movements", "Title": "Bridging the Latency Gap: A Neurocomputational Model of Predictive Remapping", "Author": "Nikolai Stocks", "CoAuthors": "", "Abstract": "Visual perception remains remarkably stable across saccadic eye movements despite rapid and large displacements of the retinal image. This stability is thought to rely, in part, on predictive remapping processes that update spatial representations in anticipation of eye movements. However, the functional role and temporal characteristics of these mechanisms remain debated. In this study, we investigate neural dynamics in the lateral intraparietal area (LIP) of monkeys performing a spatial foraging task, which investigates spatial updating during visual search, described by Mirpour & Bisley (2016). The data revolves around neural activity profiles in present and future receptive fields across saccades under different stimulation conditions (target, distractor, empty). We use a neurocomputational model of spatial perception based on gain fields, integrating retinal input with corollary discharge (CD) and proprioceptive eye-position (PC) signals to generate distributed spatial representations.\nBy systematically manipulating model components, we isolate the contributions of individual signals to the observed dynamics. Our results show that predictive remapping, arising from the interaction of corollary discharge, proprioceptive eye-position, and presaccadic visual signals, is sufficient to account for the rapid emergence of postsaccadic representations in LIP. While the required phasic CD signal peaks around saccade onset, the PC signal update has to be late after saccade.", "SubmissionID": 400}, {"Day": "Wednesday", "Time": "15:30–17:00", "SessionID": 44, "Topic": "Eye Movements", "Title": "Skilled badminton players maintain gaze on the opponent’s upper body in a live return task", "Author": "Hiroshi Ueda", "CoAuthors": "Ren Sogabe, Makio Kashino", "Abstract": "Anticipating an opponent’s action is critical in badminton return, yet little is known about how gaze behavior is temporally organized around shuttle impact. This study examined the temporal structure of gaze behavior in a live badminton return task, comparing skilled and less-skilled players under ecologically valid conditions. Eighteen male university badminton players (10 skilled, 8 less-skilled; response-time analysis: n = 17) returned 40 randomized shots (smash, cut, drop, clear) while wearing a mobile eye tracker. Gaze was analyzed relative to shuttle impact, focusing on fixation onset and duration within three areas of interest: the opponent’s upper body, lower body, and the racket–shuttle contact point. Performance was assessed using return errors and response time derived from waist-mounted acceleration. \n\nSkilled players made fewer return errors than less-skilled players (1.9 vs. 9.3) and responded faster (147 vs. 204 ms). Their typical gaze pattern was “shuttle → upper body → contact point” (9/10), whereas many less-skilled players mainly shifted gaze directly from the shuttle to the contact point (6/8). Skilled players fixated the opponent’s upper body for longer (383 vs. 79 ms) and the contact point for a shorter duration (227 vs. 426 ms). They also shifted gaze to the contact point later than less-skilled players (172 vs. 350 ms before impact), indicating that they maintained gaze on the opponent’s upper body until closer to shuttle impact. In contrast, the onset of the first upper-body fixation did not differ between groups. Upper-body fixation duration was negatively correlated with response time.\n\nThese findings suggest that rather than simply looking at different locations, skilled players differ in how they time the shift of gaze from predictive body cues to impact-related information. This timing-dependent visual strategy may be important in badminton and may also reflect a more general principle of anticipation in fast interceptive actions.", "SubmissionID": 413}, {"Day": "Wednesday", "Time": "15:30–17:00", "SessionID": 44, "Topic": "Eye Movements", "Title": "Sensory, motor and cardiac coupling during visual foraging", "Author": "Philippa Johnson", "CoAuthors": "Natalie Iino Hayes, Hillel D. Gottesmann, Ayelet N. Landau", "Abstract": "Natural vision involves active exploration of the environment, with observers choosing when and where to sample information. Observers must therefore navigate the inherent trade-off between exploiting high quality information during visual fixations and exploring for information in different locations by making a saccade. Previous work demonstrates that perceptual sensitivity and the probability of making saccades fluctuate at 4 to 8 Hz. This suggests a temporal segregation of exploration and exploitation in natural vision, reflected in the rhythmic alternation between fixations and saccades. Furthermore, these rhythms might be modulated by other endogenous biological fluctuations, like the cardiac cycle, which induces variation in perceptual and saccadic processes. To investigate how these rhythmic processes are nested across timescales, we have designed a novel visual foraging task that allows measurement of perceptual and saccadic rhythms during continuous, naturalistic behaviour. Participants make freely initiated saccades between multiple gratings, and respond to brief low-contrast targets that are displayed on top of the currently fixated grating. The probability of a target appearing depletes as a function of time fixating that grating, encouraging visual exploration of the display. We can therefore investigate detection performance in conjunction with the timing of freely-initiated saccades and microsaccades. Preliminary analyses of pilot data (n=5) suggest the presence of fast (~8Hz) oscillations in detection rates following saccade landing on a new grating. Future analyses on a full dataset of 40 participants will investigate how (micro)saccadic rhythms are coupled to perceptual rhythms and the slower cardiac cycle. Overall, we aim to show the interplay of biological rhythms that underlie natural vision and provide a mechanistic account of the temporal coordination of exploratory visual behaviour.", "SubmissionID": 482}, {"Day": "Wednesday", "Time": "15:30–17:00", "SessionID": 44, "Topic": "Eye Movements", "Title": "VoroGaze AOI: A User-Friendly Voronoi-Based Shiny App for Fixation Analyses", "Author": "Matthew Green", "CoAuthors": "Alejandro Estudillo", "Abstract": "Choosing areas of interest (AOIs) in eye-tracking research is often a subjective process that not only raises questions about the reliability and validity of the results, but also makes comparisons across studies difficult. The Voronoi tessellation method divides an image into regions around predefined landmarks such that each location is assigned to its nearest landmark. This method has been proposed as a more objective solution that is robust to noise, particularly for faces and other stimuli with clearly defined features. However, commercial software has not implemented Voronoi-based AOI analysis, meaning that applying this method often requires complex custom coding. To address this issue, we present VoroGaze AOI, a user-friendly Shiny app for AOI creation and fixation analysis, which runs in a standard web browser. Users simply upload a fixation report and the relevant stimuli, and place landmarks on each stimulus. The app then computes AOIs based on these landmarks and generates fixation summaries. VoroGaze AOI will be made freely available to all interested researchers.", "SubmissionID": 492}, {"Day": "Wednesday", "Time": "15:30–17:00", "SessionID": 44, "Topic": "Eye Movements", "Title": "The Cardinal Bias: Intrinsic Structure of Visual Exploration Revealed by Eye Movements", "Author": "Ying Wang", "CoAuthors": "Yi Jiang, Ying Wang", "Abstract": "The human visual system optimizes its behavior when exploring the environment, allocating eye gaze based on stimulus salience, task goals, and statistical probabilities. However, it remains largely unknown where gaze naturally falls when these guiding factors are absent, neutralized, or isotropic. Here, we report a robust “Cardinal Bias” in eye-movement patterns during visual search. When searching for a weak target embedded in 1/f noise within a circular display, participants directed more fixations toward the four cardinal directions (up, down, left, right) than toward the four oblique ones, despite equal target probabilities on these axes and randomized background textures. Remarkably, this cardinal preference persisted even when targets never appeared along the cardinal and oblique axes, or when they followed a uniform distribution within the search display, albeit target probabilities reshaped the distribution of fixations. In addition, participants were unaware of this cardinal bias, and naive online participants could not predict it, suggesting that visual exploration follows a hidden structure without explicit efforts. Eye movements have long been considered guided by a priority map that integrates various attentional factors. Our findings provide novel evidence that this priority map possesses an intrinsic mode independent of obvious guiding factors, implying a spatial reference frame aligned with Earth’s gravity for visual exploration.", "SubmissionID": 498}, {"Day": "Wednesday", "Time": "15:30–17:00", "SessionID": 44, "Topic": "Eye Movements", "Title": "Transsaccadic integration of facial information", "Author": "Carolin Hübner", "CoAuthors": "Lucy Braxmeier", "Abstract": "If an object of interest appears in the periphery, an observer typically makes a saccade to place it in their fovea. The visual system can be highly efficient in this scenario by using both separated target inputs - peripheral and foveal information - optimally for perception. This process is called optimal transsaccadic integration and has been shown for low- to mid-level visual features. It is unknown whether this efficacy holds for more complex perceptual judgements and higher-level visual features. Here, we addressed this open question and tested optimal transsaccadic integration of facial information.\n\nSixteen participants judged the sex of faces (female or male) they saw either only presaccadically in the periphery, only postsaccadically in the fovea, or across saccades at both retinal locations. If participants integrate optimally, perception across saccades should be more precise than perception of only one of the inputs alone and match predicted precision by maximum-likelihood estimation (MLE). We measured perceptual precision by fitting psychometric functions per condition and participant and deriving the just-noticeable difference (JND). We also derived the points of subjective equality (PSE) to investigate perceptual bias.\n\nWe found JNDs to be significantly lower (i.e. higher precision) in the transsaccadic condition compared to the best JNDs from the single-input conditions. In addition, transsaccadic JNDs matched JNDs predicted by maximum-likelihood estimation. These results suggest optimal transsaccadic integration of facial information. PSEs revealed a robust male bias in the periphery and no bias in the fovea and across saccades. Further comparison to MLE predictions revealed that peripheral and foveal biases were weighted optimally by their reliabilities across saccades.\n\nOur results demonstrate that optimal integration can extend to complex perceptual judgements, such as the sex of faces. This suggests that transsaccadic integration is not limited to low- or mid-level features but may also operate on more abstract representations.", "SubmissionID": 504}, {"Day": "Wednesday", "Time": "15:30–17:00", "SessionID": 44, "Topic": "Eye Movements", "Title": "Age effects on value-based gaze allocation in natural images", "Author": "Jutta Billino", "CoAuthors": "Wolfgang Einhäusser, Jutta Billino", "Abstract": "Our environment provides a plethora of visual information that requires efficient attentional selection, typically associated with gaze shifts. Whereas basic oculomotor parameters are remarkably robust during aging, there is evidence for substantial age effects when naturalistic stimuli are explored. In particular, there seems to be a bias towards appetitive stimuli. At the same time, object-level visual salience might become more relevant in the face of declining sensory capacities. We investigated age effects on gaze behavior and how those are shaped by valence and visual salience. A total of 32 older adults (60-80 years) and 31 younger adults (20-36 years) participated in our study and their gaze behavior was recorded during free viewing of natural scenes in which object valence and salience were varied systematically. We found that salience drives gaze guidance similarly in both older and younger adults. In contrast, we found a more pronounced modulation of gaze parameters by valence in older adults than in younger adults. In particular, appetitive valence reduced time to first fixation and increased dwell time. The variability of gaze control was not linked to individual differences in executive functions, indicating separate underlying mechanisms. Our findings corroborate that gaze guidance in natural images is subject to age effects and suggest a dominant role of top-down processes.", "SubmissionID": 537}, {"Day": "Wednesday", "Time": "15:30–17:00", "SessionID": 44, "Topic": "Eye Movements", "Title": "Manual response planning as a cue elicits weak contextual saccadic adaptation", "Author": "Laurent Madelain", "CoAuthors": "Maxime Martel", "Abstract": "Contextual saccadic adaptation refers to the oculomotor system’s ability to maintain distinct adaptive states depending on context. Previous work, including ours, has established that this process is highly selective. Specifically, motor-related cues directly affecting the saccade drive contextual adaptation, whereas purely perceptual cues are largely ineffective. This is consistent with the idea that contextual adaptation depends on how strongly a cue engages motor processes relevant to the saccadic system.\n\nHere, we asked whether manual response preparation can act as a contextual cue for saccadic adaptation, as in saccadic motor planning. Participants performed a double-step adaptation task in which two opposite intra-saccadic step (ISS) directions were paired with two contexts. During fixation, a symbolic arrow indicated which hand (left or right) to use. Participants prepared the response before the saccade and executed the button press within 300 ms after saccade onset. The mapping between response hand and ISS direction was counterbalanced across participants.\n\nWe reasoned that if motor preparation alone is sufficient, manual response preparation should allow contextual saccadic adaptation, whereas if contextual learning is specific to oculomotor planning, no effect should be observed.\n\nWe observed an intermediate pattern: four out of nine participants showed significant contextual adaptation, but the effect remained weaker than with strongly motor-related cues such as saccade sequences. \n\nThese findings may reflect a gradient of motor relevance. Manual response preparation can partially structure adaptation, possibly through eye–hand coordination, but remains insufficient to serve as a robust contextual cue for separate adaptive states. In contrast, cues directly shaping the saccadic motor plan are the most effective, suggesting that contextual learning primarily depends on effector-specific motor planning.", "SubmissionID": 549}, {"Day": "Wednesday", "Time": "15:30–17:00", "SessionID": 44, "Topic": "Eye Movements", "Title": "", "Author": "Tomer Bouhnik", "CoAuthors": "", "Abstract": "Hamutal.Slovin@biu.ac.il", "SubmissionID": 612}, {"Day": "Wednesday", "Time": "15:30–17:00", "SessionID": 13, "Topic": "Spatial Vision", "Title": "Brain Responses to Visual Symmetry in Early Infancy", "Author": "Peter J. Kohler", "CoAuthors": "Aurore Maloh, Lara Pierce", "Abstract": "Visual symmetry is abundant in natural and man-made environments and plays an important role in object recognition and perceptual organization. Brain imaging studies have demonstrated robust responses to reflection symmetry in several regions of visual cortex, often using dot patterns with one or more axes of reflection. Another approach has used the wallpaper groups, 17 regular textures that comprise the complete set of possible symmetries in the 2D plane. Each wallpaper group contains a unique combination of fundamental symmetries, including reflection and rotation. While reflection typically produces the strongest brain responses, adult visual cortex also responds robustly to the other symmetry types present in the wallpaper groups, including rotation. Here we extended this work to infants, recording brain responses to reflection (group PMM) and rotation (group P4) from 18 participants aged 2-8 months using high-density electroencephalography (EEG). Infants viewed full-field (24º visual angle) wallpaper textures in a Steady-State Visual Evoked Potentials paradigm in which PMM and P4 textures alternated with matched phase-scrambled control images that preserved low-level visual properties while removing global structure. This paradigm allows separate measurement of symmetry-specific responses and low-level image update responses driven by contrast changes at each image transition. Image update responses were robust for both PMM and P4, indicating that our infant participants were equally willing to look at the stimuli in both conditions. We also found adult-like responses to reflection symmetry in infants, but rotation symmetry produced responses that were much less adult-like, and perhaps not measurable at all. To our knowledge, these are the first measurements of brain responses to symmetry in early infancy. Our results suggest a learned component of symmetry processing and raise the possibility that infants may learn to perceive reflection earlier than rotation, possibly due to differential exposure during the initial months of life.", "SubmissionID": 519}, {"Day": "Wednesday", "Time": "15:30–17:00", "SessionID": 13, "Topic": "Spatial Vision", "Title": "Temporal dynamics of acuity and contrast sensitivity with uncrowded and crowded stimuli in healthy and amblyopic observers", "Author": "Julia Haldina", "CoAuthors": "C. Maria Teutsch, Sven P. Heinrich", "Abstract": "Visual acuity (VA) in healthy observers depends on stimulus presentation duration, reflecting multiple temporal mechanisms across different time scales. Amblyopia has been associated not only with crowding but also with altered temporal processing. However, evidence remains inconclusive. Contrast sensitivity (CS) has been proposed as a clinically relevant, although frequently ignored, measure of visual performance. We investigated how stimulus duration affects VA and CS in healthy and amblyopic observers under conditions of crowding. By comparing optotype and grating stimuli, we aimed to differentiate between shape recognition and resolution acuity, and to investigate their differential temporal dynamics, particularly in amblyopia. The Freiburg Visual Acuity and Contrast Test (FrACT) was used with crowded and uncrowded Landolt Cs as well as sinusoidal gratings. VA and CS were assessed at presentation durations of 0.1 s, 1.0 s, and 10 s in healthy participants and compared to amblyopic observers. In healthy participants, uncrowded VA was significantly better at 1.0 s compared to 0.1 s for all stimuli, with a further small but significant improvement at 10 s. Compared to uncrowded VA, crowded VA was identical at 0.1 s but worse at 1.0 s and 10 s. CS increased significantly with duration for crowded and uncrowded optotypes as well as for gratings, but was not affected by crowding. Preliminary amblyopic data suggest, as expected, increased crowding; effects of presentation duration are qualitatively similar but appear less pronounced. This study extends previous findings on duration effects to crowded optotypes and to CS in healthy observers and provides an initial account of duration effects in amblyopic vision. The differential effects of crowding on VA versus CS may be related to the involvement of partly different neuronal substrates. In amblyopia, the present pilot data are consistent with the assumption of altered temporal aspects of processing.", "SubmissionID": 532}, {"Day": "Wednesday", "Time": "15:30–17:00", "SessionID": 13, "Topic": "Spatial Vision", "Title": "Do Visual Field Asymmetries Affect Ensemble Perception?", "Author": "Gizem Tanseli KASPAR", "CoAuthors": "Sabrina Hansmann-Roth", "Abstract": "Peripheral vision is characterized by lower spatial resolution, larger receptive fields and systematic crowding that reduces access to individuated elements. Additionally, visual field asymmetries have been reported in the literature with weaker crowding, higher spatial frequency and contrast sensitivity in the lower visual field compared to the upper visual field. There has also been an advantage reported along the horizontal meridian that the performance is weaker along the vertical meridian. Constraints such as crowding are explained by compulsory pooling or integration of information across space, in which the visual system may rely on summary representations rather than detailed encoding of individual items. Ensemble perception has been suggested as a mechanism that allows observers to obtain summary statistics from groups of objects. However, it remains unclear whether these summary representations are computed uniformly across the visual field or whether they are constrained by visual field asymmetries. We investigated whether accuracy (deviation from the ensemble mean) and variability (the circular standard deviation of orientation judgments across trials) vary across visual field locations or remain location independent. Participants were presented with a fixation cross and 9 white lines for 150 ms. Afterwards, participants were presented with a single white line in the center and were asked to adjust the line so that it matched the average orientation of the lines from the previous display. Our results showed that the accuracy and variability of the adjustment responses revealed no clear asymmetries across the visual field. Although peripheral vision is not uniform for individuated object perception (as evidenced by crowding), pooling across multiple items in an ensemble task may reduce the impact of these asymmetries. In individuation tasks such as crowding, pooling affects access to individual elements and enhances these asymmetries.", "SubmissionID": 552}, {"Day": "Wednesday", "Time": "15:30–17:00", "SessionID": 13, "Topic": "Spatial Vision", "Title": "Illusory Motion Parallax in Virtual Reality: The Role of Scene Context and Viewing Geometry", "Author": "Danial Kordmodanlou", "CoAuthors": "Nikolaus Troje", "Abstract": "Under natural viewing conditions, binocular disparity and motion parallax are ordinarily coupled cues to three-dimensional structure. In stereoscopic virtual reality, however, binocular disparity can be presented without the head-contingent viewpoint updates that define motion parallax, creating conditions in which a physically static scene appears to move with the observer. The present study investigates this illusory motion parallax and evaluates the hypothesis that it arises from predictive processing: disparity-defined depth generates an expectation of motion parallax, and when that expected signal is absent, the resulting mismatch is experienced as reversed parallax. \n\nAcross five experiments in head-mounted virtual reality, we examine the perceptual conditions under which this illusion emerges and how its strength is modulated. Experiment 1 demonstrates that the effect depends on binocular disparity and disappears under monocular viewing. Experiment 2 shows that the perceived motion follows the direction predicted by reversed parallax. The central contribution of the study concerns the role of scene context and viewing geometry. Experiment 3 demonstrates that the illusion is strongly shaped by surrounding scene structure, with the largest effects in minimal scenes and weaker effects in more structured environments. Experiment 4 reveals that the illusion increases with steeper viewing angles. Experiment 5 shows that the illusion weakens as observer distance from the display increases. Taken together, these findings indicate that illusory motion parallax is not a fixed consequence of cue conflict, but a context-sensitive percept shaped by both environmental structure and the observer’s spatial relation to the display. \n\nThese results support a forward-model account in which stereoscopic depth generates predictions of head-coupled parallax, and the absence of the expected signal is experienced as motion. More broadly, they show that depth-cue integration in immersive displays depends jointly on predictive mechanisms, scene context, and viewing geometry.", "SubmissionID": 559}, {"Day": "Wednesday", "Time": "15:30–17:00", "SessionID": 13, "Topic": "Spatial Vision", "Title": "Transcranial alternating current stimulation affects visual crowding and redundancy masking differently: A resting-state EEG study", "Author": "İrem Onin-Yırıkoğulları", "CoAuthors": "Bilge Sayim, Lütfü Hanoğlu, Nihan Alp", "Abstract": "The ability to recognize objects in peripheral vision is fundamentally limited by surrounding objects. This phenomenon, visual crowding (VC), has been causally linked to beta oscillations (15-25 Hz) in the right parietal cortex: higher parietal beta power predicts improved crowding performance, and online 18-Hz tACS over P4 selectively boosted beta power and reduced crowding. A related but distinct phenomenon, redundancy masking (RM), is the systematic underreporting of identical items. While RM and VC share characteristics, such as their dependence on eccentricity and inter-item spacing, several key differences suggest that their underlying neural mechanisms are different. We applied online 18 Hz tACS over P4 to compare the effects of parietal beta stimulation on VC and RM, testing whether they rely on shared or dissociable oscillatory dynamics. \n\n In a within-subject design, participants (N=8) completed two sessions, one active tACS and one sham, separated by one week to prevent carryover effects. In each session, 5-min eyes-closed resting-state EEG was recorded before and after stimulation to assess tACS-induced changes. Both tasks were performed under online 18-Hz tACS over P4. VC stimuli were verniers flanked by lines; RM stimuli were arrays of lines (set sizes: 3-5). Participants reported the offset direction in the Vernier task, and the perceived number of lines in the RM task.\n\nActive tACS produced higher VC accuracy compared to sham, replicating the finding that beta-tACS reduces crowding. Conversely, active tACS increased RM compared to sham. While post-stimulation EEG power changes were not significant, the direction of beta change (+0.21 dB) followed a trend consistent with previously reported beta upregulation associated with reduced crowding. These findings suggest a dissociation between neural mechanisms of VC and RM. Parietal beta oscillations may play opposing functional roles depending on tasks and stimuli, facilitating discrimination of crowded targets and deteriorating detection of items in repeating patterns.", "SubmissionID": 560}, {"Day": "Wednesday", "Time": "15:30–17:00", "SessionID": 13, "Topic": "Spatial Vision", "Title": "The role of spontaneous fluctuations in attention in perceptual filling-in", "Author": "Anna Razafindrahaba", "CoAuthors": "Kenshu Koiso, Peter de Weerd, Mark J. Roberts", "Abstract": "Filling-in occurs during the perceptual disappearance of a blank figure presented on a textured background.Current models propose a two-stage process: the figure’s boundary representation weakens through adaptation, allowing the background texture to spread into the figure’s region via long-range horizontal connections in early visual cortex. Here we tested whether attention, which modulates lateral connectivity in early visual cortex, also influences filling-in. First, we found that filling-in was preceded by a reduced pupil size, which is related to general arousal and selective attention. To differentiate between a reduction in general arousal and selective attention leading to filling-in, we used electroencephalography to track alpha oscillations as a neural correlate for attention. Furthermore, we modelled a typical alpha power lateralized distribution from recordings during a standard lateralized attention paradigm and assessed the correlation of the alpha power distribution preceding filling-in onset with this model. We found a high lateralization of alpha power and a high correlation with the lateralization task a few seconds preceding filling-in onset, suggesting that attention is directed towards the figure before filling-in. In addition to the electroencephalography measurements, we ran a parallel psychophysics study with a novel gradual continuous performance task (gradCPT) to track attentional states in a dual-task paradigm preceding filling-in. The results from this task suggested that that filling-in episodes were preceded by distributed low attention across the visual field before filling-in. The results target together suggest that low attentional states predict perceptual filling-in. Low attentional states may reduce figure-ground segregation and thereby may facilitate the spreading of background-related activity from the background into the cortical region occupied by the figure – resulting in perceptual filling-in.", "SubmissionID": 565}, {"Day": "Wednesday", "Time": "15:30–17:00", "SessionID": 13, "Topic": "Spatial Vision", "Title": "Individual differences in masked grating detection reveal spectrum-dependent efficiency across target and mask types", "Author": "Alex Baldwin", "CoAuthors": "Annabel Wing-Yan Fan, Alex Baldwin", "Abstract": "The noise-masking function describes how the threshold contrast for detecting a target can be elevated by the simultaneous presentation of masking noise. These functions can be fit by the Linear Amplifier Model (LAM), accounting for performance across the range of external noise magnitudes with two parameters: equivalent input noise and efficiency. Under a linear filter model, variation of the spatial frequency spectrum of the masking noise would have a linear scaling effect on its effectiveness. In this study, we tested this prediction to see how the spectrum of the masking noise influences LAM parameter estimates.\n\nWe measured thresholds from 18 healthy adults for sine-wave (1F), square-wave (1F+), and missing-fundamental (3F+) gratings, both without noise and masked by 1D white or pink noise. The mean difference in threshold between 1F+ and 1F gratings was consistent with detection mediated by the fundamental component. Individual differences supported this interpretation: 1F+ thresholds were predicted by 1F thresholds (R² = 50%), but not by 3F+ thresholds.\n\nAt the group level, efficiency estimates showed a significant effect of grating type but not of noise type. However, analyses of individual differences revealed a different pattern. Efficiency for detecting 1F gratings in white noise did not predict efficiency in pink noise (R² = 1%). Similar comparisons for 1F+ and 3F+ gratings were also weak (R² = 25% and 20%, respectively). Thus, efficiency estimates for the same stimulus do not appear to generalise across noise spectra.\n\nThese findings indicate that parameters derived from noise-masking are not invariant to the spectral relationship between the target and noise stimuli. This challenges interpretations of LAM fits that assume independence from out-of-band frequencies, and suggests that detection performance may be affected by interactions across channels. More broadly, the results highlight the importance of the choice of noise spectrum used in noise-masking studies.", "SubmissionID": 571}, {"Day": "Wednesday", "Time": "15:30–17:00", "SessionID": 13, "Topic": "Spatial Vision", "Title": "Beyond visual resolution: Redundancy masking as a limiting factor of foveal vision", "Author": "Emre Türkmen", "CoAuthors": "L-Miao Li, Wolf Harmening, Bilge Sayim", "Abstract": "Visual resolution—the ability to resolve fine spatial detail—is highest at the fovea. Hence, individual elements are most accurately discriminated within foveal vision. However, individuation of multiple items is not determined by resolution alone. In redundancy masking, a compression of information by the visual system, items in peripheral vision that can be resolved are not perceived. Whether redundancy masking occurs in the fovea is unclear. Here, we investigated this question. \n\nParticipants were presented with arrays of three to five lines for 83.3 ms. We varied eccentricity (0.5° and 1°; inter-line spacing: 0.03°), directions from fixation (left, right, up, and down), and line width (0.03°, 0.04°, and 0.05°; length = 0.4°). Eye tracking ensured that stimuli were presented only after participants maintained fixation for one second. In the main experiment, participants reported how many lines they perceived (enumeration task). After the main experiment, a two-line resolution task was used to measure resolution. Observers often reported fewer items than were presented, across both eccentricities and in all directions. The magnitude of underreporting increased as line width decreased and the number of lines increased. \n\nThe results showed that participants with higher accuracy in the resolution task had less underreporting in the enumeration task. Importantly, underreporting despite sufficient visual resolution points to a limitation independent of resolution. Based on a pre-specified criterion (>90% in the resolution task), we excluded participants with lower accuracy. Underreporting remained substantial, and the correlation was no longer observed. \n\nThese results show that redundancy masking also occurs in the fovea, despite its peak visual resolution. Strong underreporting persisted when visual resolution was clearly sufficient, indicating that resolution cannot account for the effect. Taken together, these findings suggest that redundancy masking is another limitation in foveal vision, resulting in systematic underreporting of items.", "SubmissionID": 595}, {"Day": "Wednesday", "Time": "15:30–17:00", "SessionID": 13, "Topic": "Spatial Vision", "Title": "", "Author": "Floortje Bouwkamp", "CoAuthors": "", "Abstract": "Human vision relies on two complementary streams: foveal vision provides high acuity within a narrow field, while peripheral vision covers a wide field at lower resolution. Despite these striking differences, we experience a unified visual world. How the brain constructs this unified percept from two fundamentally different streams — and whether it does so by replacing one with the other or by actively integrating both — remains unresolved.\nWe address this question using the uniformity illusion, in which sustained fixation on a stimulus that differs in orientation between (para)foveal and peripheral regions causes the whole pattern to appear uniform, typically governed by the foveal feature. This illusion offers a unique window into foveal-peripheral interaction: it isolates the moment at which the brain imposes a unified representation on conflicting inputs, and allows us to ask whether peripheral signals are suppressed and replaced, or whether both streams remain active and are weighted according to their reliability.\nWe recorded magnetoencephalography (MEG) while participants viewed orientation-defined textures in a factorial design crossing orientation difference magnitude with physical stimulus change. Rapid Invisible Frequency Tagging (RIFT) was applied separately to foveal and peripheral regions at distinct frequencies, providing continuous, independent measures of neural excitability in each stream. Critically, nonlinear interactions between the two tagged streams generate intermodulation components — a direct index of foveal-peripheral signal integration that cannot arise from parallel processing alone.\nBy contrasting illusory uniformity with veridical uniformity and with prediction-confirming stimulus changes, we can dissociate the neural signatures of perceptual state, signal weighting, and active integration. Together, these measures address whether the unified visual percept reflects active filling-in or Bayesian integration of conflicting foveal and peripheral signals.", "SubmissionID": 614}, {"Day": "Wednesday", "Time": "15:30–17:00", "SessionID": 4, "Topic": "Multisensory and Other Senses", "Title": "Modulatory Role of Fronto-Parietal Beta-Band tACS in Stream-bounce Illusion", "Author": "Sudenur Özkan", "CoAuthors": "Hayriye Aktas-Dincer, Yildirim Meric, Seyma Koc Yilmaz, Hulusi Kafaligonul", "Abstract": "The stream-bounce illusion is an established paradigm for investigating the dynamics of audiovisual processing, in which temporally proximate sound significantly increases the likelihood that two moving objects are perceived as bouncing rather than streaming. Previous findings indicate that beta-band oscillatory synchronization (~20 Hz) within a fronto-parieto-occipital network is associated with this illusion. However, it remains unclear whether frequency-specific modulation of this activity can causally influence perceptual outcomes. To address this, we applied frequency-specific transcranial alternating current stimulation (tACS) over the fronto-parietal network while participants performed a classical stream-bounce task. Participants were randomly assigned to two frequency control groups (n = 13 per group), both receiving 19 Hz beta, sham, and a group-specific control stimulation in the theta and gamma bands (5 Hz and 41 Hz, respectively). The behavioral results showed a significant main effect of SOA, with bounce perception decreasing monotonically as the temporal gap between visual and auditory events increased, in line with stream-bounce literature. Relative to sham, theta stimulation was associated with significantly reduced bounce perception, whereas gamma and beta stimulation showed no significant difference. A significant interaction between SOA and beta stimulation was observed, suggesting beta stimulation weakened the suppressive effect of SOA on bounce perception, potentially reflecting a widening of the temporal binding window. An additional analysis comparing sham performance across the two control groups revealed no significant difference, confirming baseline equivalence. These findings provide causal evidence that beta-band oscillatory activity modulates the temporal window of audiovisual processing, extending correlational findings and highlighting the frequency-specific nature of oscillatory contributions to multisensory perception, with broader implications for understanding atypical multisensory processing in clinical populations.\n\nFunding. The Scientific and Technological Research Council of Türkiye (BIDEB 2211-A).", "SubmissionID": 319}, {"Day": "Wednesday", "Time": "15:30–17:00", "SessionID": 4, "Topic": "Multisensory and Other Senses", "Title": "Can a vestibular training reduce dizziness and motion sickness?", "Author": "Heiko Hecht", "CoAuthors": "Christoph von Castell", "Abstract": "Motion sickness comes in many forms, car sickness, air sickness, or cybersickness. As the vestibular system is involved in all of these cases, dizziness or disorientation, nausea, and eye-strain are often named as the major symptoms. We investigated whether a vestibular training can reduce these symptoms. The training consisted of a short (8 min) exercise routine. Volunteers performed the training over the course of two weeks. We measured subjective and objective symptoms after exposure to a nauseating virtual bicycle ride before and after the training period. In addition to dizziness and motion sickness ratings, we assessed postural reactions to a rotating and pitching visual environment while standing upright, as well as post-rotatory motion sensations. The results show that two weeks of training significantly reduced dizziness, whereas the improvement of nausea was surprisingly small. We discuss the potential of the training to serve as a resilience training against different forms of motion sickness.", "SubmissionID": 332}, {"Day": "Wednesday", "Time": "15:30–17:00", "SessionID": 4, "Topic": "Multisensory and Other Senses", "Title": "Movement Reduces Tactile Intensity While Prediction Preserves Precision", "Author": "Pierangelo Nicolás D'Onofrio Pacheco", "CoAuthors": "Eckart Zimmermann", "Abstract": "Somatosensory gating is often described as reduced tactile intensity during\n\nmovement, yet it remains unclear whether this bias reflects motor preparation or\n\nrequires a movement episode. We investigated tactile gating by dissociating\n\nperceptual bias from discrimination precision in vibrotactile intensity judgments\n\nacross two experiments. In Experiment 1, a Go/NoGo cue determined whether\n\nparticipants executed or withheld a movement, and the tactile probe was delivered\n\nafter the cue when participants knew whether movement would occur. Perceived\n\nintensity showed a clear execution dependency: bias shifts were present on Go trials\n\nbut absent on NoGo trials, in both active and passive movement contexts. In\n\ncontrast, discrimination precision showed additional sensitivity to control state, with\n\nselective modulation when an action was prepared and then cancelled (Active\n\nNoGo). In Experiment 2, we tested whether bias can emerge before movement onset\n\nby presenting tactile probes in a pre-movement interval versus during movement\n\nexecution. Perceived intensity was already reduced in the pre-movement period\n\nrelative to a stationary baseline, whereas discrimination precision remained stable\n\nunder predictable kinematics. Together, these findings indicate that typical intensity-\n\nbias gating tracks movement occurrence (and is not explained by foreknowledge\n\nalone), while pre-movement contexts can already bias intensity judgments without\n\ndegrading discrimination. More broadly, somatosensory gating comprises dissociable\n\ncomponents: an execution-linked bias in perceived intensity and a precision\n\ncomponent that is sensitive to predictive/control demands.", "SubmissionID": 352}, {"Day": "Wednesday", "Time": "15:30–17:00", "SessionID": 4, "Topic": "Multisensory and Other Senses", "Title": "Similarities Between Multisensory Integration of PPPD Patients and Controls", "Author": "Joshua Haynes", "CoAuthors": "Andrew Jones, Rebecca Champion, Boris Otkhemezuri, Graham Bell, Debbie Cane, Rosa Crunkhorn, Monty Silverdale, James Lilleker, Alan Carson, Paul Warren", "Abstract": "Persistent Postural Perceptual Dizziness (PPPD) is a functional neurological disorder characterised by chronic dizziness and balance impairment. One theory suggests symptoms arise from inappropriate multisensory integration, with atypical overweighting of visual relative to vestibular information. We are currently investigating multisensory integration of PPPD patients and age and IQ matched control participants in two tasks: i) heading recovery and ii) Scene-Relative Object Movement (SROM) discrimination.\n\nIn this interim analysis we present data on a subset of our larger study (30 patients and 25 control participants). Participants were presented with self-movement information and judged (2AFC) either the direction of self-movement (Left/Right) relative to straight ahead (heading task) or SROM (Up/Down) of another object in the scene (SROM task). Self-movement information was provided physically via a 6 degrees-of-freedom motion platform, visually via optic flow presented in a head-mounted display, or using both modalities. The motion of the self or the object was controlled by interleaved Kesten staircases, which enabled us to obtain psychometric parameters for the perceptual bias and precision.\n\nAt the group level, there are clear signs of integration in the heading task, but less evidence for integration in the SROM task. Critically, there is little evidence for differences in integration between patient and control groups in either task. In particular, we find no evidence for overweighting of visual relative to vestibular information about self-movement in PPPD. Furthermore, while individual differences in integration are present, this is true for both groups.\n\nAlthough our data collection is ongoing, these preliminary findings present a challenge to the integration hypothesis of PPPD, since we find no overweighting of visual information for patients, and similar integration for patients and controls across both tasks.", "SubmissionID": 370}, {"Day": "Wednesday", "Time": "15:30–17:00", "SessionID": 4, "Topic": "Multisensory and Other Senses", "Title": "The effect of recent perceptual history on the stream/bounce effect", "Author": "Philip Grove", "CoAuthors": "Chengzhou Lu", "Abstract": "The stream/bounce illusion arises when two identical targets approach from opposite sides of a display, coincide at the point of coincidence (POC), and continue to the opposite sides. Observers typically perceive the motion as “streaming”, in which the targets pass through each other with their motion unchanged, or as “bouncing”, in which the targets reverse direction at the POC. When a brief transient at the POC is presented, responses are biased toward bouncing. In transient free trials, responses are biased toward streaming when these trials are intermixed in a block. Previously, Grove et al. (2016) reported support for the cognitive inference account of this illusion by rendering the motion trajectories unambiguous with vertical offsets of the targets. Target histories were manipulated by targets shifting their trajectories up to four times before the POC. Bounce responses increased with the number of trajectory switches. Here we expand on this approach by making the targets visually distinct, employing random dot patches that differed in dot density by 0, 10, 20, 30, or 40%. Target histories were manipulated by swapping the targets’ identities 0, 1, 2, 3, or 4 times before the POC. The magnitude of the stream bounce effect - the difference in the percentage of reported bounces between sound and no sound trials - increased with the number of identity swaps. Interestingly, this effect was largest for targets whose identity differed most, contrary to the effec
