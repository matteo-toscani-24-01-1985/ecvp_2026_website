l framework of touch-to-vision associations and explore a practical application of translating colour for blind individuals. Moreover, the results provide further insights into how visual experience influences haptic processing.", "SubmissionID": 157}, {"Day": "Monday", "Time": "09:00–10:30", "SessionID": 3, "Topic": "Multisensory and Other Senses", "Title": "The effect of auditory cue on visual search processing: the relation between the pip-and-pop effect and audiovisual integration capacity", "Author": "Xiaoyu Tang", "CoAuthors": "Rong Zhang", "Abstract": "The pip-and-pop effect describes the phenomenon wherein a nonspatial auditory signal significantly enhances visual search efficiency for a single target in a dynamic array, which may depend on audiovisual integration. However, how individual differences in audiovisual integration capacity modulate this effect remains unclear. The present study provides the first systematic examination of the relation between audiovisual integration capacity and the pip-and-pop effect across two experiments. In Experiment 1, we replicated the classic pip-and-pop effect using a dynamic single-target visual search task and found that individual audiovisual integration capacity significantly and positively predicted search performance specifically when auditory cues were present, but not in the no-sound condition. This dissociation suggests that audiovisual integration capacity selectively facilitates behavioral performance when auditory information is available to guide search. In Experiment 2, we extended this investigation to a dynamic dual-target visual search task. Although auditory cues enhanced dual-target identification accuracy overall, audiovisual integration capacity predicted behavioral performance in both the with-sound and no-sound conditions under high task load, reflecting shared demands on multiple-object tracking and attentional resources. Across both experiments, audiovisual integration capacity was not significantly correlated with the difference-based pip-and-pop benefit score, highlighting the multifaceted nature of the pip-and-pop effect, which likely involves additional mechanisms beyond audiovisual integration alone. These findings demonstrate that individual differences in audiovisual integration capacity may serve as an important modulating factor in the pip-and-pop effect, with its expression critically dependent on task load and the specific cognitive demands of the search context.", "SubmissionID": 197}, {"Day": "Monday", "Time": "09:00–10:30", "SessionID": 3, "Topic": "Multisensory and Other Senses", "Title": "Intercepting accelerating targets with the help of sound", "Author": "Eli Brenner", "CoAuthors": "Jeroen BJ Smeets", "Abstract": "We know that people are very poor at visually judging acceleration, and consequently do not consider visual estimates of acceleration when intercepting moving targets. As a result, their interceptive movements end up slightly behind accelerating targets and ahead of decelerating ones. If the target repeatedly accelerates in the same manner, people quickly learn to compensate for such errors. But if the acceleration varies from trial to trial, they keep making systematic errors. We have previously shown that providing information about the acceleration in the form of different background images (ice for a constant velocity; sand for strong deceleration) does not help cope with acceleration. Here we examined whether an accompanying sound rather than a background image does help. We interleaved accelerating targets that were accompanied by a sound that increased in both volume and frequency with decelerating targets that were accompanied by a sound that decreased in volume and frequency. Adding such sounds reduced the systematic errors associated with ignoring acceleration considerably. The sounds did not provide actual information about the acceleration. Neither did the sounds influence the time taken to perform the interceptive movements. Presumably participants learnt to aim further ahead of the moving target when they heard the sound with increasing volume and frequency than when they heard the other sound.", "SubmissionID": 208}, {"Day": "Monday", "Time": "09:00–10:30", "SessionID": 3, "Topic": "Multisensory and Other Senses", "Title": "From Eye Movements to Auditory Pitch Perception: Saccades Exert a Weaker Influence than Keypresses on Perceived Self-generated Tones", "Author": "Lilian Nguyen", "CoAuthors": "Adrien Paire, Dorine Vergilino-Perez, Céline Paeye", "Abstract": "Sensory attenuation refers to reduced neural and perceptual responses to self-generated tones compared to tones triggered externally, due to predictive mechanisms.  \n\nOur previous study showed that the strength of action-outcome coupling (SAOC) influences the perception of sound loudness. Indeed, we observed that the perceived intensity of tones triggered by keypresses (strong coupling) was attenuated, in contrast to tones triggered by ocular saccades (weak coupling).\n\nBuilding on this earlier study, we investigated the influence of SAOC on perceptual attenuation for pitch. To date, no behavioral study has demonstrated any sensory attenuation effect regarding pitch perception, although it has been suggested that attenuation may manifest in this case as a change in the ability to perceive pitch differences. \n\nA total of 140 participants were divided into three groups. They performed a pitch discrimination task in which test tones of varying frequency were triggered either by a saccade, a keypress, or played after a cue (no action required, or “passive” group). Test tones were presented 150 ms or 1500 ms after the action (or cue).  \n\nResults revealed lower discrimination sensitivity in the keypress group compared to the passive group (Cohen's d = 0.66). In contrast, no significant difference was found between the saccade and passive groups. Also, in the keypress group only, we observed a small effect of delay (Cohen's d = 0.14), with reduced sensitivity at the shorter interval. \n\nThis reduced perceptual sensitivity for keypress-triggered tones may reflect sensory attenuation. Importantly, the absence of a significant difference between the saccade and passive groups, together with the small size of the delay effect, suggests that this reduction in sensitivity cannot be explained by dual-task interference alone. \n\nThese results are consistent with the hybrid model of Dogge et al. (2019), which posits that different predictive mechanisms underlie sensory attenuation depending on the SAOC.", "SubmissionID": 233}, {"Day": "Monday", "Time": "09:00–10:30", "SessionID": 24, "Topic": "Perceptual Learning and Memory", "Title": "Coarse (but Not Fine) Top-Down Control Over Consciousness: Evidence From VWM-Driven Conscious Access", "Author": "Yiyang Xu", "CoAuthors": "Mowei Shen, Yingtao Fu, Hui Chen", "Abstract": "Human visual consciousness is inherently limited, such that only a fraction of incoming information reaches awareness at any given moment. Visual working memory (VWM), the core system responsible for maintaining goal-relevant information, has been identified as a key driver of this prioritization. Specifically, stimuli that match the contents of VWM gain access to awareness more rapidly when initially suppressed from consciousness. However, it remains unclear at which representational level—coarse or fine—this top-down modulation operates. The present study addresses this question through a series of experiments that combine a VWM task with the breaking Continuous Flash Suppression (b-CFS) paradigm, in which high-contrast dynamic masks suppress target stimuli from awareness. Experiments 1a and 1b compared coarse (color) and fine (gap orientation) features within the same Landolt ring stimuli, revealing that only color matching in VWM facilitated conscious access. Experiments 2a and 2b extended this dissociation to the shape dimension, demonstrating facilitation for simple shapes (coarse) but not for complex polygons (fine). Experiments 3a and 3b further showed that VWM-driven conscious access operates at a categorical level of color representation and is neither enhanced by nor sensitive to precise color information. Finally, Experiments 4 and 5 employed global–local stimuli to identify the locus of this constraint. Experiment 4 showed that fine-level information under CFS suppression is resistant to top-down modulation, whereas Experiments 5a and 5b revealed that fine-level representations maintained in VWM are also ineffective as top-down signals. Taken together, these findings suggest that VWM facilitates conscious access in a coarse, but not fine-grained, manner. This constraint appears to arise from limitations in both unconscious visual processing and the representation of fine-grained information in VWM.", "SubmissionID": 41}, {"Day": "Monday", "Time": "09:00–10:30", "SessionID": 24, "Topic": "Perceptual Learning and Memory", "Title": "Development of visual expertise in medical education", "Author": "Viljami	Salmela", "CoAuthors": "Salla Skön, Ilona Södervik, Alexander Salava", "Abstract": "Visual reasoning skills are critical across medical specialties. Prior work shows experts achieve higher diagnostic accuracy with fewer saccades and longer fixations than novices. We examined how medical students learn to identify skin conditions during a dermatology course and compared their performance with experts, with a focus on diagnosis-specific differences. Fifth-year medical students (N=394) completed an online image-identification task in three sessions: before, during, and after the course. In a laboratory study, experts (N=7) performed the same task once with eye-tracking, and students (N=13) completed it twice (pre/post-course). On each trial, participants saw a written diagnosis and eight images and selected the matching image, then rated confidence. Each session included 47 diagnoses (most common in Finland) presented twice. The target image was randomly chosen from 15–30 exemplars.  Across sessions, students’ accuracy rose from 68% to 86%, decision times fell from 9.7 to 8.7 s, and confidence (5-point Likert) increased from 2.9 to 3.8. Substantial differences emerged across diagnoses: for the 12 easiest conditions, accuracy exceeded 90% pre-course; for the 10 most difficult, accuracy remained below 75% post-course. Based on item characteristic curves, diagnoses were clustered into eight categories, revealing category-specific learning patterns. The lab study replicated the main behavioural findings. Despite improvements, students (62% to 82%; 9.7 to 8.1 s) did not reach expert performance (97% correct, 6.4 s). Students’ average number of fixations decreased from 34 to 21, matching experts. Experts’ mean fixation duration was 217 ms; contrary to expectations, students’ fixation duration were longer and increased from 220 to 249 ms. Eye-tracking metrics varied less across diagnoses than did behavioural performance. These results indicate that in dermatology, visual expertise development is strongly diagnosis-dependent and likely reflects both perceptual and rule-based learning. Results suggest teaching resources should be concentrated on diagnoses that remain difficult to learn. ", "SubmissionID": 69}, {"Day": "Monday", "Time": "09:00–10:30", "SessionID": 24, "Topic": "Perceptual Learning and Memory", "Title": "Visuomotor learning enhances visual acuity and contrast sensitivity", "Author": "Hossein Abbasi", "CoAuthors": "Brigitte Röder", "Abstract": "Visual perceptual learning (VPL) has been shown to improve contrast perception. Neural responses in rodents’ primary visual cortex (V1) have been shown to exhibit greater enhancement when animals perform VPL while running than in a stationary state, while results in primates are less clear. The present study examined which visual functions benefit from adding locomotion to a VPL task. Participants were assigned to one of three groups (control [n = 23], visual-manual training group [n = 20], and visuomotor training group [n = 22]). Participants in the two training groups completed assessment sessions before, immediately after, and one month after five sessions of VPL. The visuomotor group performed the training by using a Wobble board to select the relevant visual stimulus; the visual-manual group responded with a mouse while sitting at a table. Participants of the control group did not participate in any training sessions and completed only three assessment sessions. During assessment sessions, Landolt-C visual acuity, Vernier acuity, contrast sensitivity function (CSF), and surround modulation were measured. In the VPL task, the visual target was defined as a uniquely oriented Gabor stimulus among other Gabor stimulus distractors. All stimuli were presented at the individual cut-off spatial frequency, with their contrast adjusted based on participants’ performance. The individual cut-off spatial frequency was defined as the spatial frequency corresponding to 50% contrast, extracted from the CSF curve. The visuomotor group showed larger improvements in Landolt-C visual acuity, Vernier acuity, and surround suppression compared to the other groups. Notably, these group differences increased after one month. Additionally, contrast sensitivity significantly improved immediately after visuomotor training. The present findings suggest that adding locomotion to a VPL task may enhance visual learning. As has been demonstrated for motor learning, visuomotor training seems to involve longer consolidation.", "SubmissionID": 42}, {"Day": "Monday", "Time": "09:00–10:30", "SessionID": 24, "Topic": "Perceptual Learning and Memory", "Title": "Facilitated but less selective visual cortical plasticity in children than in adults revealed by task-irrelevant perceptual learning", "Author": "Dominik Aschenbrenner", "CoAuthors": "Zhiyan Wang, Sebastian Frank", "Abstract": "Task-irrelevant visual perceptual learning (TIVPL) is a form of visual cortical plasticity characterized by enhanced detection sensitivity for features repeatedly exposed during the performance of another task. Theories of TIVPL suggest that it is tightly constrained by the contingency of internal reinforcement signals elicited by important events in the performed task, such as detecting a target among distractors. However, compared with adults, previous studies found evidence that TIVPL is less selective in children, suggesting that visual cortical plasticity may be subject to weaker constraints during childhood. Here, we investigated this hypothesis in children (7-12 years old) and college-age adults using psychophysics and functional near-infrared spectroscopy (fNIRS). Over the course of three sessions on separate days, participants (fifteen per age group) practiced a rapid-serial-visual-presentation (RSVP) task at central fixation in which they detected the presence or absence of target images within a stream of distractor images. Together with the RSVP, task-irrelevant coherent motion directions were exposed in the visual surroundings. One direction was predominantly (66% probability) exposed in target-present RSVP-trials (paired direction). Another direction was predominantly (66% probability) exposed in target-absent RSVP-trials (unpaired direction). While performing the task, fNIRS (NIRx Medical Technologies) was recorded over occipital areas. Prior to and following the exposure period, detection performance for each motion direction was assessed. Children enhanced detection performance for paired and unpaired directions to a similar extent, whereas the enhancement was greater for the paired than the unpaired direction in adults. fNIRS recordings showed that activity (corresponding to oxygenated hemoglobin) in occipital areas was comparable between paired and unpaired directions in children but greater for paired than unpaired directions in adults. This suggests that TIVPL is less tightly constrained by the contingency of internal reinforcement signals in children than in adults, consistent with facilitated, yet less selective, visual cortical plasticity during childhood.", "SubmissionID": 57}, {"Day": "Monday", "Time": "09:00–10:30", "SessionID": 24, "Topic": "Perceptual Learning and Memory", "Title": "Not How Much You Remember, but How You Use It: Visual Working Memory Capacity as Strategic Stabilization", "Author": "xutao zheng", "CoAuthors": "Chenxiao Guan, Jie He, Meng Zhang, Mowei Shen, Jifan Zhou", "Abstract": "Visual working memory (VWM) capacity is traditionally conceptualized as a limit on how much information can be maintained. However, increasing evidence links VWM capacity to attentional control and the regulation of cognitive resources. In natural tasks, memory use is not fixed but voluntarily determined, raising a critical question: how are individual differences in VWM capacity expressed when memory use is flexible?\n\nWe addressed this question using a copying task that allows participants to trade off internal memory and external sampling. Across two experiments (N = 120), participants freely decided how many items to encode during each sampling episode. VWM capacity was measured independently using a visual change detection task. We manipulated task structure in two ways: sampling cost, which alters the incentive to rely on memory, and time pressure, which constrains the opportunity to adjust strategies.\n\nIncreasing sampling cost reliably led participants to encode more items per sampling episode, replicating adaptive trade-offs between memory and resampling. However, this manipulation did not reveal any reliable relationship between VWM capacity and memory usage. In contrast, imposing time pressure produced robust capacity-related effects. Higher-capacity individuals showed more concentrated and less variable memory deployment across sampling episodes, accompanied by a reduction in mean usage.\n\nThese findings suggest that VWM capacity in natural tasks is not primarily expressed as greater memory quantity. Instead, under constraint, capacity differences emerge in the stability of resource allocation. This dissociation highlights the importance of task structure in revealing individual differences and supports the view that VWM capacity reflects strategic control over memory use rather than storage limits alone.", "SubmissionID": 103}, {"Day": "Monday", "Time": "09:00–10:30", "SessionID": 24, "Topic": "Perceptual Learning and Memory", "Title": "Transient downregulation of excitatory activity facilitates skill learning in older adults", "Author": "Sebastian Frank", "CoAuthors": "Markus Becker, Ricarda Jacob, Antonia Wittmann, Ulrike Frank, Savanna Babu, Zhiyan Wang", "Abstract": "Previous studies have shown that the ability to acquire new skills is preserved into older age, suggesting that Hebbian-like synaptic plasticity in sensory-motor areas remains intact. At the same time, there are intrinsic biological changes in the aging brain, including an increase in neural activity, which constrain transient glutamatergic signaling required to induce synaptic plasticity. Here, we investigated whether older adults engage neuronal mechanisms that transiently regulate levels of excitatory activity in early sensory areas, thereby enabling the induction of synaptic plasticity. Participants (60 – 79 years old, n = 20) trained on a visual orientation detection task leading to visual perceptual learning (VPL), a type of visual skill learning. The concentration of glutamate, a major excitatory neurotransmitter, was measured in a volume-of-interest in the occipital lobes (primarily consisting of early visual areas V1 and V2) with functional magnetic resonance spectroscopy (fMRS) before, during and after training. The results showed that training enhanced detection performance for the trained orientation, consistent with VPL, whereas no improvement was observed for an untrained control orientation. Glutamate concentration decreased within an interval of twenty minutes after the end of training relative to the pretraining concentration. A mediation analysis showed that this reduction of glutamate mediated the impact of pretraining glutamate levels on the formation of VPL. In contrast, a control group of young adults (18 – 30 years old, n = 20) increased glutamate concentration associated with VPL over the same posttraining interval. These results suggest that transient downregulation of excitatory activity in early sensory areas facilitates the induction of synaptic plasticity and supports skill learning in older adults.", "SubmissionID": 106}, {"Day": "Monday", "Time": "09:00–10:30", "SessionID": 24, "Topic": "Perceptual Learning and Memory", "Title": "The electrophysiology of iconic memory: Evidence from a partial report task", "Author": "Davide Bonfanti", "CoAuthors": "Sonia Mele, Elena Bertacco, Chiara Mazzi, Silvia Savazzi", "Abstract": "Despite extensive research, a thorough characterisation of the electrophysiological mechanisms underlying iconic memory is still missing. The aim of this study, therefore, was to exploit a partial report paradigm to disentangle neural activity associated with stimulus perception and icon formation and maintenance from that associated with post-perceptual processes. A total of 26 participants took part in the study. We recorded EEG while they performed a partial report task. They were shown circular arrays composed of six letters and lasting 100 ms. Afterward, an acoustic cue informed the participant on which side of the stimulus to report. The majority of the electrophysiological differences occurred in the time window between 850 and 1100 ms and consisted of a positive deflection over parieto-occipital electrodes ipsilateral to the side to report. We also performed a linear regression between participants’ accuracy and components’ amplitude, finding a positive relationship between accuracy and P1, and negative relationships between accuracy and P3, a component peaking at ~730 ms that we termed Visual Code Reactivation (VCR), and another component peaking at ~1060 ms that we termed Task-dependent Information Filtering (TIF). We also detected a negative correlation between the number of intrusions and TIF amplitude. Our results shed light on the distinct processes involved in iconic memory, suggesting the distinction between processes responsible for encoding and maintaining the neural trace of the visual stimulus and higher-order, task-related functions devoted to selecting an information subset for conscious report. In this regard, the TIF component could represent a filtering mechanism, preventing irrelevant information from being further processed. In conclusion, our results are the first detailed description of the electrophysiological processes sustaining iconic memory. They also have potential implications for the consciousness debate, particularly regarding the overflow argument, of which they could constitute an electrophysiological confirmation.", "SubmissionID": 117}, {"Day": "Monday", "Time": "09:00–10:30", "SessionID": 24, "Topic": "Perceptual Learning and Memory", "Title": "Outcome history shapes implicit perceptual learning without awareness of the eye of origin", "Author": "Tatia Buidze", "CoAuthors": "Xinye Wang, Ayelet Landau", "Abstract": "Positive outcomes can shape visual processing for behaviourally relevant features such as locations, objects, or stimulus attributes. It remains unclear, however, whether such modulation can also arise when the source of those outcomes is not consciously accessible. To address this question, we employed a dichoptic visual detection task in which ongoing stimulation to both eyes was perceptually fused into a single centrally presented grating. Detection targets consisted of a brief Gaussian contrast decrement that appeared in one eye only, while target intensity was manipulated to estimate detection threshold. Crucially, although the target appeared in one eye, its eye of origin was not consciously accessible to participants. We first established baseline detection performance for each eye without eye-specific outcome differences. In a subsequent phase, we introduced a hidden eye-specific outcome structure: successful detections from one eye were followed by positive outcomes with high probability (100%), whereas successful detections from the other eye were followed by positive outcomes with low probability (20%). Because perceptual learning is strongly confounded by generic practice and baseline visual asymmetries, we analysed trial-by-trial responses using a continuous Generalised Linear Mixed Model to isolate outcome-related changes in performance. The model indicated greater learning-related improvement for the eye associated with the higher probability of a positive outcome, after controlling for baseline-dependent constraints, despite participants having no conscious awareness of the eye-specific contingency. These findings suggest that asymmetric feedback can modulate eye-specific perceptual learning. They are consistent with an implicit ocular prioritisation account, in which differential outcome history biases processing in eye-specific channels without requiring conscious or top-down attention. More broadly, the findings suggest that outcome-dependent learning may extend to early sensory stages where eye-specific information remains partially segregated.", "SubmissionID": 145}, {"Day": "Monday", "Time": "09:00–10:30", "SessionID": 24, "Topic": "Perceptual Learning and Memory", "Title": "Multidimensional Statistical Learning of Spatiotemporal Regularities", "Author": "Yuhao Tian", "CoAuthors": "Yi Jiang, Ying Wang", "Abstract": "To navigate the visual environment, the human brain must extract regularities that span across space and time. While temporal and spatial regularities can be acquired in isolation via statistical learning (SL), the joint acquisition of multidimensional regularities remains poorly understood. Here, we present a novel and robust form of visual SL for spatiotemporal regularities. Across four experiments, participants spontaneously learned regularities defined by coincident binding of temporal order and spatial configuration in visual chunks, even when regularities were task-irrelevant and remained unnoticed. This learning effect demonstrated remarkable generalization across (i) distinct spatial structures, (ii) varied temporal parameters, (iii) different combinatorial units (pairs vs. triplets), and (iv) multiple behavioral measures, including explicit familiarity judgments and implicit change-detection tasks. We further examined the relationship between this multidimensional SL and unidimensional SL using correlation and principal component analyses. Converging evidence revealed both domain-general and domain-specific components, moderated by observers’ awareness levels as identified by assessment types and confidence ratings. Relatively implicit measures yielded dissociable or even antagonistic patterns between temporal and spatial learning, whereas relatively explicit measures captured a positive coupling among all unidimensional and multidimensional effects. Together, these findings demonstrate reliable acquisition of spatiotemporal regularities, which engages an awareness-dependent hierarchical mechanism for integrating visual information over the spatial and temporal domains.", "SubmissionID": 170}, {"Day": "Monday", "Time": "09:00–10:30", "SessionID": 24, "Topic": "Perceptual Learning and Memory", "Title": "Bias in plain sight: Eye markers of contextual effects in visual working memory", "Author": "Weronika Rozycka", "CoAuthors": "Andrey Chetverikov", "Abstract": "Visual working memory (VWM)—the ability to maintain and use visual information—is\n\ncrucial for many daily tasks, from navigation to grocery shopping. However, context can\n\nsignificantly affect our memories: the presence of similar items during memorization can\n\nnot only reduce the memory accuracy but also bias the recall. Here, we investigate the\n\ninformation-processing dynamics underlying these biases by examining eye movements\n\nand pupillary responses during the encoding and reporting of colors. Participants\n\nmemorized the colors of two squares, with similarity between their mean colors and color\n\nheterogeneity within each item manipulated across trials. They later reported the average\n\ncolor of each square using a color wheel. We first replicated the findings of Chetverikov and\n\nHansmann-Roth (2016), demonstrating that the relative noise distribution between the\n\nmemorized items influences the strength and direction of biases in line with the recently\n\nproposed Demixing Model. Preliminary results further suggest that eye movements and\n\npupil size during encoding predict memory accuracy and biases. Finally, analysis of the\n\nresponse phase indicated that participants' gaze is often drawn to non-targets near the end\n\nof the response, even when the behavioral responses are biased away from those non-\n\ntargets. This suggests that gaze position and pupil size provide a valuable source of\n\ninformation about internal dynamics of visual-information encoding and decision-making\n\nduring the response, potentially clarifying how observers differentiate signals\n\ncorresponding to different stimuli.", "SubmissionID": 237}, {"Day": "Monday", "Time": "09:00–10:30", "SessionID": 24, "Topic": "Perceptual Learning and Memory", "Title": "Visualizing Memory with AI: Generative Text-to-Image Models in Free Recall Tasks", "Author": "Petr-Jan Plos", "CoAuthors": "Wilma Bainbridge, Filip Dechterenko", "Abstract": "Research on long-term visual memory has traditionally investigated the free recall of visual scenes through verbal descriptions. Bainbridge and colleagues (2019) later introduced drawing as a method of free recall; however, the level of detail captured in such drawings remains uncertain due to differences in drawing ability. Building on this approach, the present study examined whether generative multimodal models (GMMs) could serve as an alternative tool for assessing scene memory. We employed a design similar to drawing-based recall research while possibly overcoming limitations in participants’ drawing skills.\n\nParticipants (N=52) first memorized 20 images from one of two scene categories (streets or rooms). The images were AI-generated, allowing us to create highly similar pairs depicting very similar scenes; participants studied only one image from each pair. Then they completed a digit span task, followed by the free recall phase, consisting of recreating the previously viewed images using a text-to-image model (ChatGPT-4o). Afterwards, they completed a two-alternative forced-choice (2AFC) task with foils that were highly similar to the memorized images. To evaluate the generated outputs, independent raters (N=80) attempted to match each generated image to its original source image in an 8-alternative matching task, providing a measure of recognizability. We then analyzed the effects of textual properties of the conversation transcripts, such as frustration levels and the number of objects or words, on recognizability of the final generated image. The raters selected the correct image significantly more often than expected by chance (probability correct=53%, effect size h=0.91). In addition, respondents selected the target pair (target image or very close distractor) in 94% of cases. Textual properties were not significantly related to image recognizability. Overall, the findings suggest that GMMs may offer a high-fidelity alternative to traditional hand-drawn recall methods for studying long-term visual memory for scenes.", "SubmissionID": 239}, {"Day": "Monday", "Time": "09:00–10:30", "SessionID": 24, "Topic": "Perceptual Learning and Memory", "Title": "Differential Network Metrics as Predictors of Specificity and Transfer in Perceptual Learning", "Author": "LIN ZHONG", "CoAuthors": "Gong-Liang Zhang, Cong Yu", "Abstract": "Visual perceptual learning is characterized by specificity to trained conditions. Understanding\n\nthe mechanisms behind this specificity remains a fundamental topic in perceptual learning\n\nresearch. In a previous ERP study (Zhang-et-al., 2013), half the participants (n=14) in Vernier\n\nlearning exhibited location specificity (TI<0.5), while the other half demonstrated learning\n\ntransfer (TI>0.5) across the visual hemifield. Here, we examined small-world network metrics to\n\ncompare the changes in the topological properties of the whole-brain network between the\n\nspecificity and transfer groups.\n\nWe established functional connectivity between each pair of EEG channels by calculating the\n\nphase-locking value using a wavelet transform in the beta band. We then applied a threshold to\n\nobtain undirected binary small-world networks for each participant at trained and transfer\n\nlocations before and after training. From these networks, we calculated the clustering coefficient,\n\nindicating local interconnectedness, and the shortest path length, reflecting global information\n\nintegration.\n\nBefore training, both groups exhibited similar small-world properties, characterized by high\n\nclustering coefficients and short path lengths. After training, while both groups displayed similar\n\nthreshold reductions, the specificity group showed higher clustering coefficient (p=.003) and\n\nlonger path length (p<.001), whereas the network metrics of the transfer group remained\n\nunchanged (ps>.111). Additionally, when the transfer effects were tested at the untrained\n\nlocation, the specificity group demonstrated trends (ps<.007) in network metrics similar to those\n\nat the trained location, while the transfer group displayed higher clustering coefficient (p=.035)\n\nwith unchanged path length.\n\nWe conclude that whether learning is location-specific is pre-determined by training-induced\n\nchanges in network properties. While the transfer group maintained both local and global\n\nefficiencies, the specificity group exhibited over-optimized local efficiency at the expense of\n\nglobal efficiency, which likely hinders learning transfer. These results provide crucial insights\n\ninto the mechanisms of specificity and transfer in perceptual learning from the perspective of\n\nbrain network dynamics.", "SubmissionID": 293}, {"Day": "Monday", "Time": "09:00–10:30", "SessionID": 30, "Topic": "Colour and Brightness Perception", "Title": "The Well-Tempered Color Wheel: Toward a Unified Pedagogical Model for Additive and Subtractive Color Systems", "Author": "Oğuz Sağdıç", "CoAuthors": "", "Abstract": "**The Well-Tempered Color Wheel:\n\nToward a Unified Pedagogical Model for Additive and Subtractive Color Systems**\n\nTraditional color education relies heavily on historical color wheel models that inadequately reflect the perceptual and physical foundations of human color vision. In particular, the widely used twelve-hue red–yellow–blue color wheel conflates additive and subtractive color systems and misrepresents complementary color relationships. These inconsistencies contribute to persistent conceptual confusion, especially in contexts that require accurate reasoning across both digital and printed media.\n\nThis study introduces the Well-Tempered Color Wheel, a perceptually coherent model that unifies additive and subtractive colors within a single diagrammatic framework. The proposed model defines complementary color relationships through numerical inversion in red–green–blue space and aligns these relations with subtractive color behavior. Inspired by musical temperament systems, slight perceptual adjustments are introduced to achieve global symmetry, consistent color opponency, and pedagogical clarity.\n\nUnlike traditional color wheels, this model explicitly incorporates achromatic reference points—including black, white, and gray—in order to stabilize luminance and contrast relationships. This structure enables intuitive visualization of both light-based and pigment-based color mixing while preserving the instructional advantages of a twelve-hue format.\n\nThe Well-Tempered Color Wheel does not propose new perceptual mechanisms. Instead, it offers a representational correction that aligns commonly used educational and experimental color diagrams with established principles of color perception. By integrating additive and subtractive color logic within a unified perceptual framework, the model clarifies fundamental misconceptions regarding primaries, complements, and system boundaries.\n\nThis approach has direct implications for visual perception research, experimental stimulus design, and interdisciplinary color education. The proposed model supports more accurate reasoning about color contrast, complementarity, and inversion across media, providing a robust perceptual reference tool for both scientific and educational applications.", "SubmissionID": 12}, {"Day": "Monday", "Time": "09:00–10:30", "SessionID": 30, "Topic": "Colour and Brightness Perception", "Title": "Scotopic population receptive field properties throughout the visual hierarchy", "Author": "Deena Elul", "CoAuthors": "Ayelet McKyton, Netta Levin", "Abstract": "Scotopic vision has several low-level limitations relative to photopic vision, including reduced acuity and a foveal scotoma. High-level visual abilities such as reading and face recognition are retained, although the cortical mechanisms supporting this remain incompletely characterized. Here, we used population receptive field (pRF) modeling to examine cortical representations of the visual field under scotopic conditions, focusing on pRF eccentricity and size across the visual hierarchy.\n\nFourteen normally sighted subjects completed pRF mapping during fMRI scanning under photopic and scotopic conditions, using a stimulus that incorporated faces, houses, and letters to engage higher-level regions. A Gaussian model was fit to each voxel’s responses to estimate pRF size and position. Retinotopic areas (V1, V2d, V3d, V2v, V3v, hV4) were defined individually based on photopic pRF data, while category-selective regions (FFA, OFA, PPA, TOS, MT+) were defined using a photopic functional localizer.\n\nAs expected, fewer voxels responded to the pRF stimulus under scotopic than photopic conditions, and responsive voxels exhibited higher mean eccentricity. However, when restricting analysis to voxels responsive in both conditions, there were only limited differences in mean eccentricity or in the overall distribution across eccentricity bins. Additionally, pRF sizes were smaller under scotopic conditions in most regions (V1, V2d, V3d, V3v, hV4, PPA, TOS) at 5-8-deg eccentricity.\n\nThese findings indicate that pRF modeling with complex stimuli can effectively probe scotopic representations in high-level visual cortex. The shift towards peripheral processing under scotopic conditions appears to result at least partially from loss of the central visual field representation. Reduced pRF sizes under scotopic conditions may reflect either modeling artifacts or compensatory adaptations to low resolution in the rod system. Further work is needed to clarify these effects and extend them to additional visual regions.", "SubmissionID": 43}, {"Day": "Monday", "Time": "09:00–10:30", "SessionID": 30, "Topic": "Colour and Brightness Perception", "Title": "The impact of simulated colour vision defects on game performance", "Author": "Sirawit Ketchan", "CoAuthors": "Catherine Porter, Ketan Parmar, Christine Dickinson", "Abstract": "Background: Congenital colour vision defect (CCVD) affects approximately 8% of males and 0.5% of females, with red-green defects being the most common type. Digital games are a common leisure activity that requires visual processing under different task demands. This study investigates whether simulated red-green CCVD affects game performance.\n\nMethods: Two games with different visual demands were used: Zuma’s Revenge (pattern-based matching task) and Star Wars Battlefront II (dynamic action shooting task). Participants who are experienced with game play and with normal colour vision completed six visual conditions: normal vision, simulated protan, simulated deutan, mild protan simulation, mild deutan simulation, and greyscale. Performance was measured using game scores. Short interviews were conducted after each condition to explore perceived difficulty.\n\nResults: Preliminary data from 10 participants showed a significant effect of visual condition on performance in Zuma’s Revenge, F(5,45) = 19.95, p < .001, partial η² = .689. Significantly lower performance in the greyscale condition compared to normal, protan, mild protan, and mild deutan conditions (all p ≤ .007). Significant differences were also observed between normal and deutan (p = .003). In contrast, no significant effect of condition was found for Star Wars Battlefront II, F(5,45) = 0.748, p = .592, partial η² = .077, with similar mean scores across conditions. Interview responses indicated that simulated colour vision defects were perceived as more challenging and less enjoyable, even though the performance was not significantly affected.\n\nConclusion: The impact of simulated colour vision defects on game performance appears to depend on task demands. Pattern-based tasks showed greater performance differences, whereas dynamic environments may rely more on motion and other visual cues. These findings support the feasibility of using game-based tasks as an outcome measure in future research involving individuals with congenital colour vision defects.", "SubmissionID": 97}, {"Day": "Monday", "Time": "09:00–10:30", "SessionID": 30, "Topic": "Colour and Brightness Perception", "Title": "Independent adjustment of luminosity, saturation and hue for probing the color appearance of simultaneous contrast", "Author": "David Alleysson", "CoAuthors": "", "Abstract": "We present a method that allows the luminosity (k), saturation (s) and hue (ξ) of a stimulus pattern displayed on a computer screen to be varied independently. The display’s color space resides in a metric vector space where the angles between RGB vectors encode their spectral correlations. The parameters ksξ define a hyperboloid (k determines the surface level, s its eccentricity, and ξ the angular position on the hyperboloid) that is contained within a cone. In the first configuration the cone’s surface intersects the RGB vectors. In the second configuration the cone and hyperboloid are oriented so that their constant‑saturation planes are orthogonal to the vector representing the spectral luminous‑efficiency function V(λ). A subsequent hyperbolic rotation aligns the zero‑saturation condition (s = 0) with the gray axis. The apertures of both the cone and the hyperboloid were expanded to obtain independence between luminosity and saturation. We carried out a simultaneous‑contrast experiment in which participants adjusted the color of a circular stimulus on a neutral‑gray background to match the appearance of the same circle surrounded by a color‑inducing annulus. The test set consisted of three isoluminant desaturated colors—red, green and blue—while the inducing set comprised six isoluminant saturated color—red, yellow, green, cyan and magenta. Prior to the main task, a training session required participants to first match the color of a test pattern (chosen from the test set) to that of a different reference circular pattern, both presented on neutral gray. This second configuration produced more accurate adjustments, as indicated by a smaller distance between test and reference during training and a larger adjustment distance during the experimental phase. Analyses showed that adjustments were consistently opposite to the inducing annulus and that an interaction existed between the test and inducing patterns.", "SubmissionID": 101}, {"Day": "Monday", "Time": "09:00–10:30", "SessionID": 30, "Topic": "Colour and Brightness Perception", "Title": "Quantifying the Munker–White effect using an interactive colour-matching application", "Author": "Jorge Montalva-Colomer", "CoAuthors": "Fernando Brusola-Simón, Ignacio Tortajada-Montañana, Diego Fernández-Casal, Pablo de Haro-Ortega, José Antonio Cuesta-Barrios", "Abstract": "Colour perception is strongly shaped by visual context, as illustrated by Munker–White-type colour assimilation illusions: the same physical colour can appear different when viewed against backgrounds with non-uniform geometric and chromatic characteristics. Although the phenomenon is well known, there are few systematic quantitative data on the magnitude and direction of these perceptual deviations, which limits comparisons across studies and the development of predictive models.\n\nWe present an interactive application developed in Python with the support of artificial intelligence tools, designed to quantify in a reproducible manner the chromatic variation induced by the Munker–White illusion using colour-matching tasks. In each trial, a fixed-colour target patch is shown with a superimposed pattern of coloured stripes (a Munker–White-type stimulus), alongside a physically identical comparison patch presented without stripes on a neutral background. Conditions are parameterised by three chromaticities: the stimulus colour, the background colour, and the colour of the superimposed stripes. Six base patterns are used and, for each, an inverted condition swaps the background and stripe colours while keeping the stimulus constant, yielding 12 adjustment conditions.\n\nEach observer adjusts the colour specifications of the sample patch using controls that manipulate CIE LCh values (lightness, chroma and hue) until an apparent match with the reference patch is achieved. The difference between the physical colour and the adjusted colour provides a direct measure of effect magnitude for each condition, expressible via ΔE metrics in CIELAB space. Preliminary results from one observer show robust perceptual shifts on the order of several tens of ΔE units, with sign reversals when the background–stripe relationship is inverted. This tool enables the generation of standardised quantitative data on the Munker–White effect and provides a foundation for future models capable of predicting colour appearance as a function of visual context.", "SubmissionID": 115}, {"Day": "Monday", "Time": "09:00–10:30", "SessionID": 30, "Topic": "Colour and Brightness Perception", "Title": "Prototypical colour selections and their associations with emotion concepts across 35 countries", "Author": "Myriam Ouznadji", "CoAuthors": "Domicele Jonauskaite, Déborah Epicoco, Christine Mohr, Alessia Garzilli, C. Alejandro Parraga, International Colour Emotion Association Survey Group", "Abstract": "Colours and emotions are tightly linked, seemingly on a universal level. However, previous cross-cultural studies often relied on presenting colour terms rather than colour patches, limiting insights into how colour relates to emotions as a perceptual stimulus. Here, we investigated colour-emotion associations with a novel two-step approach examining i) what participants chose as prototypical colours for the 11 basic colour categories and turquoise, and ii) how these self-selected colour patches are associated with 20 emotion concepts. \n\nWe collected these data within the framework of the International Colour-Emotion Association Survey. At data extraction, we had data from 6995 participants across 35 countries and 38 languages. Participants were asked to first select the best example for each colour category (i.e., the prototypical colour) using a digital colour picker. Then, participants used the Geneva Emotion Wheel to associate each self-selected prototypical colour with one, several, or none of the 20 emotion concepts. \n\nWe examined the variability of the median colour choices per country in terms of hue, lightness, and chroma in the CIE LCh colour space. The highest agreement across countries was observed for white on lightness and chroma (SD = 0.00), and for red on hue (circular SD = 0.75). Conversely, the lowest agreement was observed for blue on lightness (SD = 7.03), turquoise on hue (circular SD = 15.9), and green on chroma (SD = 5.87). For colour-emotion associations, their overall patterns showed high similarity across countries, with an average pattern correlation of r = 0.92 (range = 0.73-0.96). Similarly, correspondence analysis indicated consistent spatial relationships between colour categories and emotion concepts structured primarily along the dimensions of valence-lightness (55.6% of explained variance) and arousal-warmth (21.7% of explained variance). These results support the universality and stability of colour-emotion associations across countries when working with both, colour terms and self-selected prototypical colours.", "SubmissionID": 139}, {"Day": "Monday", "Time": "09:00–10:30", "SessionID": 30, "Topic": "Colour and Brightness Perception", "Title": "Language-specific structure of color space: Linking language and perception in Cantonese and Hakka", "Author": "Songyang Liao", "CoAuthors": "Yuyuan Yang, Claus-Christian Carbon", "Abstract": "Color naming varies across languages, yet little is known about how fine-grained differences between closely related languages structure color space and their relationship with perceptual factors like color categorization and appreciation. Cantonese and Hakka are two major Sinitic varieties spoken in southern China. They share a common writing system and cultural background, but differ substantially in phonology and vocabulary. This makes them particularly suitable for isolating linguistic effects from broader cultural differences. We recruited university students from Guangdong province (Hakka speakers: N = 27, mean age = 21; Cantonese speakers: N = 78, mean age = 22). All participants were fluent in Mandarin in addition to their respective languages. We first compiled non-basic color terms for each language (Hakka: 56; Cantonese: 68) based on interviews, dictionaries, and online sources. During the experiment, we presented participants with color terms from their respective languages and asked them to select the corresponding color appearances using a custom color-picker interface (sRGB), which we then transformed into CIELAB space. Cluster analyses revealed systematic differences between the two languages. Both groups exhibited eight cluster centers but with distinct category structures (Cantonese: red, yellow, green, teal, blue, purple, white, black; Hakka: red, yellow, green, purple, brown, white, grey, black). Critically, in the blue–teal–green region, Cantonese partitioned the color space into three distinct clusters. In contrast, Hakka showed a single broader cluster spanning this region, with its centroid located between the Cantonese green and teal clusters, indicating a coarser categorical structure. These findings demonstrate that closely related languages can systematically differ in how they segment color space, even within a shared cultural and geographical context. Building on the Sapir–Whorf hypothesis, we will next examine whether these language-specific structures relate to differences in perceptual sensitivity, providing a controlled test of language-perception relationships.", "SubmissionID": 140}, {"Day": "Monday", "Time": "09:00–10:30", "SessionID": 30, "Topic": "Colour and Brightness Perception", "Title": "Mapping a spatially varying metric in RGB color space using large-scale behavioral data", "Author": "Karl Gegenfurtner", "CoAuthors": "Johanna Gegenfurtner, Doris Braun, Andrea van Doorn, Jan Koenderink", "Abstract": "Current color difference metrics are based on sparse measurements of subsets of the three-dimensional color space. Recovering the full structure of perceptual sensitivity would require dense behavioral data across many color locations that until now seemed to be out of reach of experimental methods.\n\nWe developed Colympics, a gamified psychophysical paradigm designed to obtain such data more efficiently. Observers view displays containing 50 colored items and select those that do not match the majority (reference) color under time pressure, receiving rewards for correct responses and penalties for errors. Target colors differ from the reference along multiple directions and amplitudes. Each unit of measurement therefore yields 50 binary decisions for a single reference color. A full dataset consists of 35 reference colors arranged on a body-centered cubic lattice in RGB space. Across 28 observers, this resulted in more than 100,000 decisions, with individual datasets ranging from approximately 1,600 to 21,000 decisions and stable performance between 67% and 77% correct.\n\nAt each sampled location, perceptual distances were characterized by combining responses across directions in color space. This yields a local description in the form of a symmetric positive-definite tensor, corresponding to an ellipsoid of equal perceptual difference. These local estimates were aggregated across observers into a median metric field using the Frobenius norm, while preserving anisotropy and orientation.\n\nComparison of individual ellipsoids with the median field shows substantial agreement in shape and orientation after removing overall size (median similarity 0.745 on a scale from 0 to 1). At the same time, observers differ systematically in sensitivity, reflected in approximately twofold variation in ellipsoid size. Agreement is stronger at the observer level than at the stimulus level.\n\nThis approach provides a promising route toward a color space metric that can be adapted to stimulus conditions and that captures individual differences in perceptual sensitivity.", "SubmissionID": 276}, {"Day": "Monday", "Time": "09:00–10:30", "SessionID": 30, "Topic": "Colour and Brightness Perception", "Title": "Peripheral limits of chromatic sensitivity in head-centered coordinates for ideal HMD design", "Author": "Masamitsu Harasawa", "CoAuthors": "Yamato Miyashita, Kazuteru Komine, Yasuhito Sawahata", "Abstract": "An \"ideal\" head-mounted display (HMD) can be defined as one that provides a visual experience indistinguishable from that obtained with the naked eyes. To achieve this, display performance should match or exceed the capabilities of the human visual system, while avoiding unnecessary excess that would result in inefficient resource use. To determine ideal HMD specifications, it is therefore essential to characterize human visual performance with eye movements allowed and to describe visual sensitivities in head-centered coordinates.\n\nThe experimental apparatus comprised four curved displays (each with a radius of curvature of 1,000 mm and a visual angle of 69 degrees width) arranged on a virtual sphere centered at the observer’s right eye and placed radially in the upward, downward, nasal, and temporal directions. The visual stimuli were natural scenes and their pixelwise shuffled counterparts, which disrupted spatial structure while preserving pixel-level statistics. In each stimulus, peripheral regions were achromatized while maintaining the original luminance distribution. Observers viewed the stimuli monocularly with free eye movements, while their heads were stabilized using a chinrest.\n\nA two-interval forced-choice task was employed, in which intact and partially achromatized stimuli were presented. Observers reported the interval containing an achromatic region. The eccentricity of the chromatic–achromatic boundary for each direction was adaptively estimated using the QUEST procedure.\n\nThreshold eccentricities did not differ significantly between stimulus types, indicating that spatial structure had little influence on the extent of the color-sensitive region. The mean threshold eccentricities were approximately 55 (upper), 68 (lower), 64 (nasal), and 82 degrees (temporal), which closely matched the peripheral eccentricity limits for detecting spatial frequency components above 1 cpd, as reported in our previous study.\n\nThese results characterize the color-sensitive area in head-centered coordinates and offer practical guidelines for pixel arrangement and rendering precision in HMD systems aiming for ideal visual fidelity.", "SubmissionID": 286}, {"Day": "Monday", "Time": "09:00–10:30", "SessionID": 30, "Topic": "Colour and Brightness Perception", "Title": "The effect of stimulus duration on various simultaneous contrast effects: an exploratory online study", "Author": "沙永 金子", "CoAuthors": "Kohske Takahashi", "Abstract": "Previous reports suggest that simultaneous contrast effects, such as lightness/brightness contrast (Kaneko & Gilchrist, 2020; Kaneko & Murakami, 2012), color contrast (Kaneko & Murakami, 2012), or the tilt illusion (Wenderoth & Johnstone, 1988), were stronger in shorter duration conditions. The simultaneous contrast effect is observed across many other visual features, but it is unclear whether this temporal dependency is generalized to other variations. \n\nIn this study, we explored the effect of duration on five varieties of simultaneous contrast effects: brightness, color, luminance contrast (Chubb illusion), spatial frequency, and tilt. The experiment was conducted online. The target stimulus was presented repeatedly on the left side of the display, and the adjustable probe stimulus (which remained visible throughout) was presented on the right. The participant’s task was to adjust the probe’s brightness/color/contrast/spatial frequency/tilt with a slider to match the appearance of the test. Each presentation of the test and its surround was for 1, 5, or 30 frames, but it was repeated multiple times with a 30-frame blank interval in between until the adjustment was complete. Each condition was repeated twice in a session.\n\nData collected from participants who completed all the trials (N=82 after outlier removal) showed a weak to moderate within-condition reliability (Pearson’s r between .19 and .62). We replicated the stronger effects in the shorter-duration condition for brightness contrast and the tilt illusion, but not for color contrast. In addition, the results suggest the enhancement of the effect at shorter durations for spatial frequency and luminance contrast. Our preliminary data suggest that the stronger contrast effect in brief presentations may be common across various visual features. We discuss the pros and cons of an online study of visual psychophysics involving temporally sensitive stimuli.", "SubmissionID": 295}, {"Day": "Monday", "Time": "15:30–17:00", "SessionID": 1, "Topic": "Clinical, Developmental, and Applied", "Title": "Polarization Perception and Neural Adaptation in Haidinger's Brush Psychophysics: From Normative Data to Albinism", "Author": "Luca Battaglini", "CoAuthors": "Dominga Ortolan, Sara Zambon, Gianluca Ruffato", "Abstract": "Haidinger's brushes (HB) are entoptic phenomena arising from dichroic absorption of polarized light by macular carotenoids aligned within Henle's fiber layer (HFL). Despite their potential as a non-invasive psychophysical index of macular integrity, key parameters governing their perception remain poorly characterized.\n\nIn a first study, we systematically investigated the role of neural adaptation in HB perception in 37 healthy individuals. Using a custom apparatus combining two blue LED sources (468 nm) with a rotating linear polarizer, we measured rotational speed thresholds (RST) across seven polarization levels. RST decreased linearly with the logarithm of polarization level, establishing a quantitative framework linking neural adaptation dynamics to macular pigment density. The estimated average polarization threshold was 9.7 ± 1.2%, lower than previously reported values, attributable to the broader range of rotational speeds explored. Critically, lower RST at maximum contrast predicted lower polarization thresholds, suggesting RST as a robust individual-level biomarker of macular function.\n\nBuilding on this normative framework, we then applied the paradigm to three individuals with oculocutaneous albinism — a condition characterized by reduced macular pigment density and disrupted HFL architecture. Remarkably, all participants perceived polarization-dependent entoptic phenomena at 100% polarization, but reported qualitatively atypical patterns: asymmetric, peripherally localized, with aberrant motion descriptors. No false alarms occurred at 0% polarization. These deviations likely reflect HFL disorganization rather than pigment absence.\n\nTogether, these findings establish HB psychophysics as a sensitive, accessible tool for probing macular structural integrity across physiological and pathological conditions.", "SubmissionID": 36}, {"Day": "Monday", "Time": "15:30–17:00", "SessionID": 1, "Topic": "Clinical, Developmental, and Applied", "Title": "Measuring affective influences on sustained attention in ME/CFS, using a modified Gradual-Onset Continuous Performance Task", "Author": "Anosha	Altaf", "CoAuthors": "Doug J K Barrett", "Abstract": "Cognitive difficulties in myalgic encephalomyelitis/chronic fatigue syndrome (ME/CFS) are often reported during sustained attention and executive control tasks. Neuroimaging studies suggest that these difficulties may reflect impaired recruitment and regulation of task-relevant networks, alongside difficulty in managing effort and internally driven signals, such as fatigue. The gradual-onset continuous performance task (gCPT) measures variability in reaction time (RT) as an index of attentional state. This study used a modified gCPT to examine whether affective stimuli influence attentional performance over time in young healthy adults (n = 23). Displays contained sequences of faces that morphed linearly from one face to the next and participants reported the gender of each face with a speeded button press. Blocks contained neutral-only or mixed neutral and emotional expressions. Trial-to-trial RT fluctuations indexed attentional instability, with extreme RT deviations classified as out-of-zone. Context sensitivity reflected differences between neutral-only and mixed-block trials, allowing examination of how emotional context influenced performance. Preliminary analyses indicated that attentional performance varied as a function of task context, with differences observed in RT, attentional stability, and behavioural response profiles. Extreme RT deviations were more frequent in neutral-only blocks than mixed blocks, and attentional stability changed over time. Behavioural profile analyses further suggested substantial individual differences in how participants responded to emotional context. These findings provide a behavioural baseline for testing whether attentional stability and sensitivity to emotional context are altered in ME/CFS.", "SubmissionID": 616}, {"Day": "Monday", "Time": "15:30–17:00", "SessionID": 1, "Topic": "Clinical, Developmental, and Applied", "Title": "Visual-Inertial Egocentric Metric Depth Estimation for Tabletop Activities of Daily Living", "Author": "Yaroslava Nalivayko", "CoAuthors": "Isabell Wochner", "Abstract": "Neurodegenerative movement disorders such as Parkinson’s disease or essential tremor impact the patient’s ability to independently perform the tabletop activities of daily living (ADLs) such as drinking and eating. While exoskeleton assistive devices offer a great opportunity to support these patients in tabletop ADLs by suppressing the pathological components of the intended movement, they require motion trajectory estimation, intention prediction, and scene understanding for effective assistance. \n\nDepth estimation is especially crucial for determining the relative position of the tabletop objects-of-interest to the patient. Current depth estimation approaches either leverage special hardware (e.g. stereo cameras), which is not available in our mobile sensor setup, or fine-tuning of deep monocular metric methods with a vigorously gathered dataset. Such a dataset would require tens of experimental setups with different tables and users in various environments with an egocentric depth camera.\n\nWe address this challenge by exploiting the biomechanical constraints of a person sitting at a table and utilizing inertial measurements in addition to monocular visual information from the Neon eye-tracking eyeglasses. Although the hardware setup of Neon is not sufficient for visual-inertial odometry, it is nonetheless useful for improvement over visual-only metric depth estimation.\n\nThe novelty of our method lies in the use of inertial measurements for table normal estimation, which allows us to reliably calculate metric depth of table plane pixels and, by using deep relative depth estimation and depth prior incorporation, of tabletop objects. After building a scene depth map during system initialization, we utilize visual feature tracking to estimate camera pose and scene depth after motion, maintaining a robust understanding of the scene in real-time. Our method achieves the mean distance estimation error of 2.5 cm with the runtime of 0.01 seconds per frame compared to 11 cm and 0.48 seconds of Depth Anything 3.", "SubmissionID": 109}, {"Day": "Monday", "Time": "15:30–17:00", "SessionID": 1, "Topic": "Clinical, Developmental, and Applied", "Title": "Objective quantification of panretinal visual function using flicker-ERG thresholds", "Author": "Sven Heinrich", "CoAuthors": "Ceren Şimşek, Julia Haldina", "Abstract": "Assessment of retinal function in advanced panretinal disease is challenging, as the measurement range of standard clinical measures like visual acuity or conventional electroretinography (ERG) is often exceeded. While the psychophysical \"full-field stimulus threshold\" (FST) has gained importance in the context of gene therapy, its subjective nature introduces variability due to non-retinal factors such as cognitive processes and individual decision criteria. In a pilot study with healthy participants, we tested a method to objectify retinal function by determining photopic electroretinographic thresholds using weak full-field 30-Hz flicker stimuli superimposed on a luminance pedestal. We recorded responses at nine flash strengths around the perceptual threshold. In contrast to standard clinical flicker ERG recordings, to enhance the signal-to-noise ratio for near-threshold responses, twenty 3-second segments were averaged. Response amplitudes were quantified using Fourier analysis, and a retinal sensitivity score was determined by extrapolating statistically significant responses to zero amplitude. Initial results demonstrate that specifically tailored ERG protocols can reliably quantify retinal function near or even below the perceptual threshold. The ERG-based threshold provides a more direct, objective measure of retinal function than FST, independent of post-retinal processing. The approach piloted here can easily be extended to patients with advanced panretinal disease to monitor disease progression and evaluate efficacy in gene therapy trials.", "SubmissionID": 146}, {"Day": "Monday", "Time": "15:30–17:00", "SessionID": 1, "Topic": "Clinical, Developmental, and Applied", "Title": "Robust across trates and staits; The stability of the attentional spotlight across autism spectrum disorder, aging, and task manipulations", "Author": "Beleke de Zwart", "CoAuthors": "Sjoerd Stuit, Dirk van Moorselaar, Stefan Van der Stigchel", "Abstract": "Visual attention helps us navigate our surroundings by continuously selecting relevant spatial information for more extensive processing. Here, spatial attentional selection is often conceptualized as an attentional spotlight. Previous data suggests there might be stable differences between individuals in the size of the spotlight directly related to trait differences such as a diagnosis of Autism Spectrum Disorder (ASD). Here, we aimed to replicate and extent previous work on these trait differences by including individuals with- and without an official diagnosis of ASD and including a sample of older adults. Besides investigating trait differences in the spotlight size, we also addressed state differences by manipulating task characteristics, specifically cue size and target predictiveness. To this end, we conducted a series of experiments with an exogenous cueing paradigm in which we varied the distance from the cue to the target to map the attentional spotlight. \n\nResults showed no trait differences in the spatial characteristics of the attentional spotlight between individuals with a diagnosis of ASD and individuals without a diagnosis. Furthermore, while overall performance was lower for the older adults compared to younger adults, our results indicated that the size of the attentional spotlight remains similar between age groups. Regarding the state differences of the spotlight size, we found that the size of the cue does not influence performance and that target predictability only selectively benefits top-down expectations near the cued location, not farther locations. Together, our results indicated no group differences in the spatial characteristics of the attentional spotlight across heterogeneous samples. Furthermore, as measured by our paradigm, the size of the spotlight appears relative stable despite our modulations, suggesting the size of the spotlight is surprisingly stable.", "SubmissionID": 158}, {"Day": "Monday", "Time": "15:30–17:00", "SessionID": 1, "Topic": "Clinical, Developmental, and Applied", "Title": "Atypical responses to spatial frequency and contrast in the color and motion preferring columns of extrastriate cortex in individuals with amblyopia", "Author": "Antony Morland", "CoAuthors": "Jan Skerswetat, Eric Gaier, Peter Bex, David Hunter, Shahin Nasr", "Abstract": "Amblyopia is a monocular visual deficit that persists after optical correction and is often a result of strabismus or anisometropia. The deficit is attributed to atypical visual processing in the brain. We examined how extrastriate visual cortex responded to different contrasts and spatial frequencies in a group of amblyopes (n=16) and controls (n=8). We used high-resolution fMRI to assess how motion- and color-selective columns in visual areas V2-V4 are tuned to spatial frequency and contrast and how this tuning is influenced by amblyopia. We measured responses in motion and color selective columns to five, log-spaced, spatial frequencies (0.1-5.8 c/deg) and five, log-spaced, contrasts (1.25-99%). We tested binocularly and each eye separately in different sessions. For both groups, and all eye conditions, the contrast sensitivity and spatial frequency preference showed differences between motion and color columns in cortical representations of 3-8° eccentricity, but not for 0-3°. The differences at 3-8° manifested in tuning to lower spatial frequencies in motion than color selective columns.  In the representation of 0-3°, color and motion columns were similarly tuned to high spatial frequencies.  Group differences were most pronounced in the representation of 0-3° for monocular conditions – particularly for the amblyopic eye - and were not limited to color selective columns.   However, the group differences interacted significantly with column, spatial frequency, contrast and, predictably, the eye stimulation condition. Atypical visual processing in amblyopia therefore manifests as different spatial frequency responses that depend on the eye of stimulation and the cortical column. The results indicate that amblyopia is not limited to atypical processing in color preferring columns, which depend on preferential inputs from parvocellular units. The magnocellular stream, which inputs preferentially to motion columns, is also affected.", "SubmissionID": 191}, {"Day": "Monday", "Time": "15:30–17:00", "SessionID": 1, "Topic": "Clinical, Developmental, and Applied", "Title": "Microstructural reorganization of cerebral white matter measured with 7T-MRI in adult amblyopia", "Author": "Cecilia Barachini", "CoAuthors": "Miriam Acquafredda, Laura Biagi, Michela Tosetti, Maria Novella Maglionico, Michele Figus, Irene Di Marco, Guido Marco Cicchini, Alessandro Sale, Maria Concetta Morrone, Jan Kurzawski, Paola Binda", "Abstract": "Amblyopia is a developmental disorder caused by abnormal visual input early in life, leading to persistent visual deficits and reorganization of the visual cortex and optic radiations. However, alterations extend beyond the visual areas and tracts; previous studies reported changes of white matter integrity in non-visual areas, including increased fractional anisotropy (FA) in the bilateral uncinate tracts of adult amblyopes compared with controls (Tsai et al., 2019).\n\nHere we extended these results using 7T diffusion-weighted MRI and whole brain probabilistic tractography, which we complemented with the automated reconstruction (pyAFQ) of 30 white matter tracts. Fractional anisotropy (FA) and mean diffusivity (MD) derived from the diffusion tensor were extracted from each tract to quantify microstructural properties; we focused on associative tracts and studied 15 individuals with mild monocular anisometropic amblyopia (Snellen acuity in the worse eye between 0.5 and 6/10, between 16 and 49 years old) and 23 controls (no visual deficit; between 22 and 40 years old). Repeated-measures ANOVAs including age as covariate revealed a significant tract-by-group interaction for both FA (F = 2.085, p = .022 after Greenhouse-Geisser correction) and MD (F = 2.090, p < .001). The group-difference was significant in three major tracts (all outside the occipital lobe): left posterior arcuate, right superior longitudinal, and left uncinate. This consisted of reduced MD together with increased FA in amblyopes.  \n\nOur findings indicate that amblyopia is associated with widespread microstructural reorganization extending beyond the visual cortex. For associative tracts, the changes are not necessarily disruptions, as we find enhanced organization indices in amblyopes compared with controls. This might reflect the relatively mild clinical profile of our sample, which selectively included non-strabismic individuals with relatively preserved visual acuity.\n\nThis research was funded by the ERC-CoG grant PredActive.", "SubmissionID": 219}, {"Day": "Monday", "Time": "15:30–17:00", "SessionID": 1, "Topic": "Clinical, Developmental, and Applied", "Title": "Beyond low-level vision: magnocellular contribution to mirror image discrimination", "Author": "Marie Houbben", "CoAuthors": "Gilles Vannuscorps", "Abstract": "The magnocellular and parvocellular pathways of the visual system are known to contribute different types of low-level information to visual perception. Here, we tested the hypothesis that the magnocellular pathway may also contribute to the ability to discriminate mirror images. This hypothesis was motivated by three lines of evidence. First, damage to the dorsal stream has been shown to affect patients’ ability to discriminate mirror images. Second, the occipito-parietal dorsal stream mostly receives magnocellular pathway inputs. Third, neuropsychological case studies reported patients whose difficulty to discriminate mirror images depended on the extent to which the stimuli engaged the magnocellular pathway. We will present the results of four complementary studies supporting this hypothesis. In study 1, magnocellular efficiency (indexed by flicker fusion threshold) correlated with the specific difficulty of children diagnosed with dyslexia in detecting mirror errors (relative to phonological errors) in a lexical decision task. In study 2, magnocellular efficiency correlated with the difficulty of adults diagnosed with dyslexia in discriminating mirrored geometrical shapes. In Study 3, we show that this relationship is specific to aspects of orientation processing assumed to depend on the dorsal stream. Finally, Study 4 showed that decreasing magnocellular efficiency by fast flicker adaptation disproportionately impairs the detection of mirror errors compared to phonological ones in a lexical decision task. Together, these findings provide evidence that the magnocellular stream contribution extends beyond low-level vision, playing a functional role in mirror image discrimination. It also offers new insights into possible origins of mirror errors in dyslexia.", "SubmissionID": 248}, {"Day": "Monday", "Time": "15:30–17:00", "SessionID": 1, "Topic": "Clinical, Developmental, and Applied", "Title": "A subcortical-prefrontal pathway for unconscious visual categorization in humans", "Author": "Juan Chen", "CoAuthors": "Zhiqing Deng", "Abstract": "While subcortical pathways are known to support residual vision in blindsight, their role in high-level perceptual processing in the healthy human brain remains poorly understood. We employed functional magnetic resonance imaging (fMRI) and continuous flash suppression (CFS) to investigate the subcortical representation of \"toolness\" (tools vs. non-tools) and shape (elongated vs. stubby) during unconscious processing. Both univariate and multivoxel pattern analysis (MVPA) revealed significant toolness representation in the ventral anterior (VA) nucleus of the left thalamus, and the left striatum (STR) of the basal ganglia. At the cortical level, this unconscious representation was restricted to Area 9a and anterior 10p within the dorsolateral prefrontal cortex (DLPFC), bypassing primary visual areas. Background connectivity analysis showed that elongated tools selectively increased functional coupling between the bilateral VA and left Area 9a, and between the right VA and left STR. Furthermore, dynamic causal modeling (DCM) identified a functional thalamocortical pathway originating in the left VA and projecting to the left Area 9a that specifically contributed to toolness representation under CFS. These findings provide evidence for a dedicated subcortical-prefrontal shortcut in healthy humans that facilitates high-level visual categorization entirely outside of conscious awareness. This circuit likely reflects an evolutionary mechanism for the rapid, unconscious processing of ecologically relevant objects through their motor affordances.", "SubmissionID": 297}, {"Day": "Monday", "Time": "15:30–17:00", "SessionID": 1, "Topic": "Clinical, Developmental, and Applied", "Title": "The Neural Correlates of Visual Discomfort and the Relationship with Autistic-Like Traits", "Author": "Georgina Mohan", "CoAuthors": "Ali Mazaheri, Samantha Tyler, Cathy Manning", "Abstract": "Visual discomfort is common in the general population and heightened in clinical groups such as migraine and epilepsy. A prominent theory suggests that this discomfort arises from cortical hyperexcitability, supported by findings that certain visual features associated with discomfort (e.g., high contrast, striped patterns, mid-range spatial frequencies) also elicit increased neural responses. However, the neural mechanisms of visual discomfort are as of yet unclear. Moreover, autistic individuals who have also been observed to report frequent discomfort to these same parameters as well as show early evidence of atypical neural excitability remain under-researched in the discomfort literature. Therefore, this study aims to clarify which visual parameters are most uncomfortable, how these map onto neural markers of excitability, and how autistic-like traits may affect visual discomfort and the neural response. Adults from the general population (N = 31 so far) viewed contrast-reversing gratings presented at a temporal frequency of 7.2 Hz that varied in spatial frequency and either luminance contrast or chromatic separation and colour pairing. Participants then rated their visual discomfort for each on a visual analogue scale. EEG recorded steady-state vis
