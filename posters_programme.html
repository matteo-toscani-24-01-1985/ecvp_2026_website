ity over time. Here, we use a 2IFC design in two separate experiments (symmetry vs. colour detection), combined with machine learning models, to examine how temporal order and task affect ERP responses to symmetry. Critically, if the SPN response is automatically generated by the presence of symmetry, no temporal-order effects or task differences would be present. We used three conditions: two fixed-order where the stimuli in each trial were the same, i.e., symmetry before noise (SN) or vice-versa (NS), and a random condition where each trial could be either SN or NS. We found that (a) for fixed SN trials the classic SPN effect was observed (symmetry lower than noise 250-600 ms after stimulus onset) while for fixed NS trials this effect reversed for the symmetry detection task, and was absent in the colour detection task; (b) N1 component was found to encode stimulus position, with larger amplitude for first stimulus; (c) P1 component showed sensitivity to symmetry with amplitude being larger for symmetry compared to noise; (d) classification of single trial EEG epochs using EEGNeX and EEGConformer achieved highest accuracy for fixed-order conditions (~72%/~64%), but performance dropped to chance (~49%/~52%) when models trained on one fixed-order condition (SN) were tested on the other (NS). These findings suggest that decoding relied on condition-specific temporal structure rather than a general symmetry response, contradicting the notion that the SPN reflects a task-invariant automatic process, and highlighting the role of stimulus predictability and presentation order in shaping ERP-based to symmetry perception.", "SubmissionID": 252}, {"Day": "Tuesday", "Time": "09:00–10:30", "SessionID": 11, "Topic": "Spatial Vision", "Title": "Cardiac cycle and visual performance: beyond a categorical phase effect", "Author": "Yusuke Haruki", "CoAuthors": "Yuko Yotsumoto", "Abstract": "Visual perception is not isolated from the bodily rhythm. A growing literature suggests that the phase of the cardiac cycle, namely cardiac systole and diastole, modulates visual perception. However, the underlying mechanism remains unclear. Here, we asked whether a simple 2IFC contrast discrimination task is modulated by the cardiac phase at which stimuli are presented. \n\nIn our pilot study, ten participants judged which of two sequentially presented Gabor patches had higher contrast. Using online physiological signal processing, one stimulus was timed to a systolic anchor (250 ms after the preceding ECG R-peak) and the other to a diastolic anchor (75% of the current R–R interval). The contrast difference between the two Gabors was parametrically varied, and external visual noise (Low/High) was added to manipulate visual sensitivity independently. R-peaks were re-detected offline from raw ECG; only trials in which the two stimuli fell in opposite cardiac phases were retained for analysis, yielding around 739 trials per participant. \n\nPsychometric fitting confirmed that external noise elevated the JND (Low = 0.061, High = 0.079). However, the previously reported cardiac phase effect, defined as the mean accuracy difference between systole-target and diastole-target trials, was not significant in either noise condition. In an exploratory analysis, we asked whether trial-by-trial variability in cardiac timing, rather than categorical phase, could explain performance. For each trial, we computed the mismatch between the predicted and actual timing of the next heartbeat, estimated from preceding R–R intervals. The directional mismatch related to accuracy: trials on which the next heartbeat arrived later than predicted were associated with better discrimination. These findings suggest that visual contrast discrimination is sensitive not to a fixed systole–diastole dichotomy but to beat-to-beat deviations in cardiac timing, pointing to a dynamic rather than categorical link between cardiac signals and vision.", "SubmissionID": 257}, {"Day": "Tuesday", "Time": "09:00–10:30", "SessionID": 7, "Topic": "Scene and Object Perception and Recognition", "Title": "Estimating the difficulty of segmentation tasks using ideal observers and neural networks", "Author": "Lars C. Reining", "CoAuthors": "Swantje Mahncke, Constantin A. Rothkopf, Thomas S. A. Wallis", "Abstract": "Visual segmentation is still an open problem in both biological and machine vision. Understanding how segmentation can be performed optimally requires a setting where the generative process of an image is fully known. Dead leaves images provide exactly this. They are synthetic images generated by layering randomly shaped, colored, and textured objects. Importantly, they capture many statistical regularities of natural images while the generative process is known. This allows the derivation of the Bayes-optimal ideal observer for segmentation.\n\nHowever, exact inference for this ideal observer is computationally tractable only for small patches of up to 3×3 pixels, and the number of possible segmentations grows super-exponentially with patch size, making the ideal observer infeasible for larger patches. Neural networks offer a potential solution: as general function approximators, they have been shown to approximate the decisions of ideal observers and solve segmentation problems, though whether this extends to approximating an ideal observer for segmentation remains to be investigated.\n\nFirst, we evaluate the ideal observer for dead leaves segmentation. We show that it is well calibrated and identify image features that make segmentation easier or harder. We then train fully convolutional neural networks on dead leaves segmentation using ground-truth segmentations and compare their predictions to those of the ideal observer on 3×3 patches. The network not only achieves comparable performance but also produces similar predictions, indicating that both models make similar errors. This holds not only in-distribution but also across many out-of-distribution conditions, though predictions diverge further from the training distribution. Finally, we evaluate network generalization to larger 7×7 patches, where the ideal observer is intractable, and find that the network achieves reasonable segmentation performance.\n\nThese results suggest that neural networks trained on ground truth segmentation can be used to approximate ideal observer segmentation and help in estimate task difficulty.", "SubmissionID": 25}, {"Day": "Tuesday", "Time": "09:00–10:30", "SessionID": 7, "Topic": "Scene and Object Perception and Recognition", "Title": "How stable is preference for visual curvature across stimuli and over time?", "Author": "Erick Gustavo Chuquichambi", "CoAuthors": "Samuel Palacios, Enric Munar", "Abstract": "Visual contour is relevant to object perception and affective evaluation. Substantial evidence supports a reliable hedonic preference for curvilinear contours over angular ones. However, recent studies indicate that this preference is modulated by contextual and individual factors. A possible source of heterogeneity is individual differences in hedonic sensitivity to curvilinear and angular stimuli. The objective of this study is to investigate the intra-individual and temporal consistency of hedonic sensitivity to curvature across four types of stimuli: meaningless shapes, indeterminate paintings, drawings of everyday objects, and interior spaces. One hundred participants rated their liking of the stimuli three times over a two-week period in a test-retest task. Ninety-two participants completed the third session, in which they also rated the perceived curvilinearity of the stimuli. The results show that, in all three sessions, participants did not show a significant preference for curvature in interior spaces or objects, although a slight tendency towards it was observed. In the other two stimulus types, curvature preference was clearly significant across sessions. Hedonic sensitivity to curvature for each participant and stimulus type was calculated as the difference between the estimated individual slopes for angular and curved stimuli. The correlations among stimulus types within each session were moderate to high, and gradually increased from the first to the third session. The correlations between sessions were high for meaningless shapes, and moderate to high for paintings and objects. However, test-retest reliability results showed that temporal consistency varied depending on the stimulus type, highlighting intra-individual variability. This research contributes to our understanding of hedonic sensitivity to curvature by offering insights into its dynamics across stimuli and time points. We propose that consistency may serve as a criterion supporting the existence of a given hedonic preference.", "SubmissionID": 30}, {"Day": "Tuesday", "Time": "09:00–10:30", "SessionID": 7, "Topic": "Scene and Object Perception and Recognition", "Title": "Low confidence for perceptual completion of partially occluded objects", "Author": "Cemre Baykan", "CoAuthors": "Pascal Mamassian, Alexander Schütz", "Abstract": "The visual system is very good at completing the missing information in proximal gaps that are caused by anatomical constraints (e.g. scotomas) and in distal gaps that are caused by partial occlusion from other objects or by self-occlusion. Previous studies have shown that perceptual completion of proximal gaps occurs outside of our awareness and that observers report high confidence for the inferred information in those gaps. Here, we investigated whether similar metacognitive biases would emerge for perceptual completion of distal gaps when some stimulus parts are physically absent. We ran three experiments using stimuli that were either intact (full stimulus), partially cutout (stimulus with gap), partially occluded (amodal completion) or induced (modal completion). In Experiment 1, participants performed an orientation discrimination task and a confidence rating for their perceptual decision. In Experiment 2, participants performed a Vernier acuity task and a confidence rating for their perceptual decision. In Experiment 3, participants performed a continuity-discontinuity decision task for two consecutive stimuli and made a forced-choice confidence judgment selecting the decision they felt more confident about. We examined whether participants report high confidence for amodal and modal completion in comparison to a full stimulus or a stimulus with gap. Across three experiments with different tasks, we found that participants had the highest confidence for full (non-occluded) stimuli, whereas amodal and modal completion led to comparable confidence as stimuli with gap. These findings show that there is low confidence for perceptual completion of distal gaps. Moreover, seeing a physical gap or an occlusion had similar effects on confidence judgments. In combination with previous research, our results suggest that the visibility of gaps in sensory information and occlusion critically influence metacognitive confidence.", "SubmissionID": 34}, {"Day": "Tuesday", "Time": "09:00–10:30", "SessionID": 7, "Topic": "Scene and Object Perception and Recognition", "Title": "Is visual memory platonic? Image memorability transfers to scene descriptions", "Author": "Benjamin de Haas", "CoAuthors": "Sophie Halstenberg, Ben de Haas", "Abstract": "Some images are consistently remembered better than others (Isola et al., 2011). This inherent image memorability can be predicted surprisingly well by a residual neural network which is sensitive to semantic image features (ResMem; Needell & Bainbridge, 2022). Large-scale human data also suggests that memorability is mostly driven by semantic features (Kramer et al., 2023). This raises the question whether image memorability depends on visual features or at least in part is independent of modality. Here, we tested whether the memorability of scene images transfers to short textual descriptions of those scenes. Across multiple surprise memory experiments we confirm that this is the case, regardless of whether scene descriptions were generated by humans or multimodal large language models. Furthermore, new images produced with generative AI from descriptions alone reproduce the memorability of original images. Together, these findings provide strong evidence that the memorability of scene images does not hinge on visual features on display, and that language serves as an efficient and faithful compression of memory-relevant visual content. They are consistent with the notion of converging representations across vision and language modalities, in line with recent proposals in the context of AI (Huh et al., 2024) and reminiscent of Plato’s concept of an ideal reality. We plan to test whether this alignment between visual and semantic memory is specific to surprise memory of scenes or generalises to other types of images and tasks.", "SubmissionID": 40}, {"Day": "Tuesday", "Time": "09:00–10:30", "SessionID": 7, "Topic": "Scene and Object Perception and Recognition", "Title": "What Does \"Curvy\" Mean to You?: Distinct Patterns in the Perceptual Space of Curvature", "Author": "Mira Icgoren", "CoAuthors": "Seohee Han, Dirk B. Walther", "Abstract": "Curvature is widely treated as a fundamental dimension of visual shape perception, yet its perceptual structure and defining features remain underspecified. We asked how curvature-related shape variation is organized in perceptual space and which geometric features observers use when judging similarity. In Experiment 1, we constructed a controlled space of 1D line-contour stimuli that parametrically varied smoothness, number of vertices, and turning angle, and participants performed a triplet odd-one-out task under either general or curvature-focused instructions. In Experiment 2, we extended this approach to 2D abstract shapes that independently varied smoothness, number of vertices, and range of vertices, again collecting odd-one-out similarity judgments. From these relational judgments, we derived pairwise similarity estimates and used representational similarity analysis with multidimensional scaling to reconstruct the implied perceptual spaces. Across both instruction conditions and both stimulus sets, curvature-related similarity could not be reduced to a single axis: accurate reconstructions required multiple dimensions, some of which were selectively associated with particular physical features while others reflected joint contributions from several features. Clustering of participant-level feature weights revealed stable subgroups that, for 1D contours, relied primarily on either smoothness or number of vertices, and for 2D shapes, on either smoothness or a joint weighting of vertex number and range. These findings indicate that curvature is a multidimensional perceptual construct emerging from the integration of several geometric cues, and that perceived “curvature” depends on how observers differentially weight these cues when organizing shape similarity.", "SubmissionID": 76}, {"Day": "Tuesday", "Time": "09:00–10:30", "SessionID": 7, "Topic": "Scene and Object Perception and Recognition", "Title": "From image statistics to perception: Dead Leaves as controlled naturalistic stimuli", "Author": "Swantje Mahncke", "CoAuthors": "Thomas S. A. Wallis, Lynn Schmittwilken", "Abstract": "A central goal of vision science is to understand how the visual system processes natural inputs. Across many tasks, including rapid scene categorization, perceptual grouping, and visual search, performance depends strongly on low-level image statistics. In natural scenes, however, these statistics are tightly entangled with semantic content. This makes it difficult to isolate their respective contributions to perception.\n\nDead leaves images provide a controlled intermediate stimulus between simple laboratory patterns and fully natural images. They are generated by sequentially layering simple shapes, or leaves, sampled from parameterized distributions. The resulting images are cluttered and capture key statistical regularities of natural scenes, including power spectra, contrast distributions, and occlusion structure. At the same time, they contain minimal semantic content. This makes them well suited for studying how statistical regularities affect visual inference.\n\nHere, we introduce deadleaves, an open source Python package for generating standardized yet highly customizable dead leaves stimuli. The package enables researchers to dissociate image statistics from semantics, construct controlled stimulus sets matched to natural image statistics, and probe their role across perceptual tasks in humans and computational models. It supports precise manipulation of object geometry, and appearance, and provides exact ground truth segmentation with full generative control.\n\nWe present the core features of deadleaves and demonstrate its use in applications to natural image statistics, perceptual organization, image segmentation, and aesthetics. Together, this framework provides a flexible testbed for studying the role of low level image statistics across a wide range of visual behaviors.", "SubmissionID": 92}, {"Day": "Tuesday", "Time": "09:00–10:30", "SessionID": 7, "Topic": "Scene and Object Perception and Recognition", "Title": "Perceived Meaning of Scene Patches: Effects of Eccentricity and Surrounding Context", "Author": "Thore Pingpank", "CoAuthors": "Franz Faul, Antje Nuthmann", "Abstract": "In order to select scene regions for foveal inspection, the visual system must estimate the meaning of potential fixation targets. In naturalistic scenes, targets are typically processed with the limited spatial resolution of the visual periphery. However, existing semantic models of fixation prediction do not account for differences between central and peripheral vision. In order to test the hypothesis that such differences also influence perceived meaning, we extended the Meaning Map approach (Henderson & Hayes, 2017), which aggregates ratings of isolated scene patches into spatial distributions of meaning. We examined how these ratings change when patches are viewed in parafoveal and peripheral vision. Using a gaze-contingent paradigm, circular patches (2.25° diameter) were maintained at fixed eccentricities (up to 12° visual angle) to prevent direct foveation. Participants rated how meaningful (i.e., informative or recognizable) the patches were. We hypothesized that meaning recognition would decrease with increasing eccentricity. This pattern was supported overall; however, in a substantial subset of cases, meaning ratings were higher in the periphery, driven by both stimulus properties and participant strategies. These findings suggest that the standard instruction we used may not generalize to extrafoveal vision. In an ongoing follow-up experiment, we therefore altered the instructions by asking participants to rate the usefulness of patches for an unspecified follow-up task. Unlike the previous experiment, the patches were not only presented in isolation, but also surrounded by meaningless textures or blurred scene content. We expect that meaning perception is facilitated by truthful scene context and complicated by uninformative textures. Collectively, the present data suggest that semantic models of attention and fixation should consider that eccentricity and context shape meaning perception outside foveal vision.", "SubmissionID": 98}, {"Day": "Tuesday", "Time": "09:00–10:30", "SessionID": 7, "Topic": "Scene and Object Perception and Recognition", "Title": "Boats in the sky and dolphins in the grass: Neural markers of object-background semantic consistency in adults and young infants", "Author": "Genevieve Quek", "CoAuthors": "Zhen Zeng, Jordan Ratcliffe, Pauline Trichet, Jessica Chin, Manuel Varlet, Tijl Grootswagers", "Abstract": "Humans are highly attuned to the statistical regularities of our visual environment, including the surrounding context in which we tend to encounter specific objects. Existing work shows that we recognise and remember objects in semantically-consistent scenes better than those in inconsistent ones, and that the former evoke stronger neural representations in the brain. Behavioural and eye-tracking evidence indicates that sensitivity to object-scene relations emerges within the first year of life; however, the neural mechanisms supporting semantic consistency effects in infancy have yet to be established. Here we addressed this by recording scalp EEG from a large infant sample aged 2-12 months (n = 61) and adult observers (n = 22) as they viewed upright and inverted objects superimposed on semantically consistent or inconsistent backgrounds (e.g., dolphin-water vs. dolphin-grass). Decoding analyses of adult data revealed robust representations of both object and background categories which were strengthened by consistent object-background relations between 200-300ms. Both decoding types were also modulated by object orientation, but over a briefer and earlier time window. For infants, decodable object representations (e.g., dolphin vs. tractor vs. airplane …) were only evident for upright object presentations, and strongest when those upright objects appeared on semantically consistent backgrounds. In the infant sample, decoding of the background scene itself (e.g., grass vs. water vs. sky) was comparatively stronger, emerging regardless of the superimposed object’s orientation or semantic consistency. These results contribute to the emerging field of infant neural decoding and provide new insight into how knowledge of object–scene relationships develop over the first year of life.", "SubmissionID": 147}, {"Day": "Tuesday", "Time": "09:00–10:30", "SessionID": 7, "Topic": "Scene and Object Perception and Recognition", "Title": "Near-optimal feature combination for superordinate classification of unencountered objects", "Author": "Emily A-Izzeddin", "CoAuthors": "Filipp Schmidt, Christian Houborg, Henning Tiedemann, Roland W. Fleming", "Abstract": "Visually classifying objects into superordinate classes like “animal” or “plant” is challenging because radically different items (e.g., “peacock”, “shark”) must be grouped together. This becomes even harder when facing entirely novel objects that have never been encountered before. We sought to uncover the visual features and computations underlying superordinate classification for such novel objects. We probed participants’ visual feature spaces by having them generate sixteen unfamiliar (i.e., made up) and eight familiar (i.e., real) exemplars for 10 superordinate classes (animal, building, clothing, furniture, appliance, instrument, plant, tool, vehicle, and a general “object” class). Thirty-two other observers then classified and rated typicality for these drawings. Their responses were correlated strongly with the classes that prompted the drawings, and typicality ratings were consistently much lower for unfamiliar than for familiar drawings. This confirmed that observers can generate genuinely novel yet easily classifiable drawings. We then asked 180 further participants to mark and label the drawings’ defining “parts” (e.g., “head”, “window”, “handle”). There was high distinctiveness in features between classes, which presumably aids superordinate classification. However, we also observed sparse, highly variable features within classes, substantiating the computational challenge of superordinate classification. Importantly, we found that classification of unfamiliar object drawings was extremely well predicted by an optimal Bayesian classifier that derives its classification from feature likelihoods and priors yielded from familiar objects (r = 0.9). Therefore, superordinate classification appears to combine semantic-level features approximately optimally to generalise to novel exemplars. We suggest that we use such compositional feature representation both for classifying objects together despite substantial differences in visual appearance, and to imagine—and draw—new things.", "SubmissionID": 151}, {"Day": "Tuesday", "Time": "09:00–10:30", "SessionID": 7, "Topic": "Scene and Object Perception and Recognition", "Title": "Keeping track of object files for identical objects", "Author": "Melis Ince", "CoAuthors": "Carolin Hübner, Martin Rolfs", "Abstract": "Object files are temporary representations that store and update object-specific information across spatial and temporal gaps (Kahneman et al., 1992). They can be measured as object-specific preview benefits (OSPB): following a preview of digits displayed within separate and visually distinct objects, reaction times are faster to a target digit that reappears in the same object, compared to it reappearing in a different object. We examined whether OSPBs can be established using visually identical objects rather than geometrically distinct shapes. Trials started with a preview display showing single digits within two Gabor patches. The digits then disappeared for 300 ms, during which patches either blinked briefly (static condition), moved continuously, or suddenly jumped to a new location. Finally, a target digit appeared in one of the two Gabors, which participants were asked to rapidly identify via button press. The target could be one of the previewed digits appearing in the same or a different object, or a new digit altogether. Catch trials, in which the preview paired a digit with a letter, were interleaved throughout, ensuring attention to the preview display (Sasi et al., 2023). Three groups of participants (Exp 1: n=21; Exp 2: n=20; Exp 3: n=19) completed this task, which differed across experiments in the number of possible target digits, retinal eccentricity, or surface features of objects. In Experiment 1 (four possible digits, 6.36 dva eccentricity), we found a significant OSPB only in the static condition. Experiment 2 (three possible digits, 4.24 dva eccentricity) showed an OSPB in the static and continuous condition. In Experiment 3, we added surface features to the Gabors to enhance object distinctiveness. With this variant, we found an OSPB in the continuous condition only. In addition to these differences, our findings demonstrate that distinct temporary object representations can be established between highly similar objects.", "SubmissionID": 166}, {"Day": "Tuesday", "Time": "09:00–10:30", "SessionID": 40, "Topic": "Computational Modelling and Neural Mechanisms", "Title": "Divisive-normalisation improves CNN training efficiency and generalisation", "Author": "Michael Spratling", "CoAuthors": "Heiko Schütt", "Abstract": "Deep neural networks exhibit robustness and generalisation issues not seen in humans. They are also less data-efficient learners than humans, requiring considerably more training samples to accurately identify novel exemplars of known categories. Building-in mechanisms to improve generalisation could mitigate both issues by reducing reliance on learning appearance variations from data. We show that a biologically-inspired divisive-normalisation mechanism can improve the generalisation and data-efficiency of Convolutional Neural Networks (CNNs) when trained on ImageNet1k. We implement a novel activation function, HAND (Homeostasis, Accelerating Nonlinearity, Divisive-nomalisation), where the homeostasis is implemented with batch normalisation to keep neurons active, the accelerating nonlinearity is a squaring operation, and divisive-normalisation closely matches the standard formulations and is applied across all channels in each feature map. A ConvNeXt using HAND as the activation function requires 25 training epochs to reach the same accuracy on the test-data as the unmodified model achieves after 200 epochs. Furthermore, when using an equal number of training epochs, HAND produces higher accuracy on the test-set and similar or improved generalisation performance on the common corruptions data, across different CNN architectures trained using a variety of data augmentation techniques. When the volume of training data is reduced and unevenly distributed between classes (Long-tailed ImageNet) the improvements in performance are even larger. Using the ModelvsHuman benchmark to assess generalisation, both in terms of accuracy and consistency with human categorisation decisions, shows HAND is beneficial when the number of parameter updates, or the number of training samples, is limited. These improvements do not come at the cost of a reduced ability to reject samples from unknown classes. On the contrary, out-of-distribution detection is generally improved. HAND can, therefore, reduce the required training time and/or the required volume and variety of training data, helping to reduce the divergence between CNNs and human image classification.", "SubmissionID": 67}, {"Day": "Tuesday", "Time": "09:00–10:30", "SessionID": 40, "Topic": "Computational Modelling and Neural Mechanisms", "Title": "Evaluating Bayesian Representational Similarity Measures between Neural Networks", "Author": "Sezan Oral", "CoAuthors": "Heiko H. Schütt", "Abstract": "Deep learning models are successful models of visual perception, motivating efforts to better understand their internal processing. Although various methods have been proposed to compare representations, it remains unclear which methods one should use. Here, we expand and extensively test BayesCompare, a Bayesian approach based on linear readouts to measure the similarity of network representations. In BayesCompare, the dissimilarity between two representations is computed using a divergence, Bhattacharyya or Kullback-Leibler (KL), or a distance, Jensen-Shannon (JSD), Total Variation, 2-Wasserstein, or Hellinger, between prior predictive distributions. We evaluate BayesCompare in comparison to representational similarity analysis (RSA), GULP, distance correlation, Jaccard similarity and centered kernel alignment using 5 instances each of six ImageNet-trained neural network architectures trained with slightly different recipes. First, we quantify each method's ability to retrieve the corresponding layer from instances of the same architecture with the silhouette score. All tested metrics can discriminate corresponding layers from other layers decently (all silhouette scores ≥ 0.75). However, our KL divergence, Bhattacharyya, and JSD measures yield particularly high scores, showing that BayesCompare can improve layer retrieval over existing methods. Second, because layers transform features incrementally, representational similarity should decrease the more processing steps occur between layers. We quantify how well metrics fulfill this expectation using Kendall's Tau. All divergences within BayesCompare yield very similar results, matching existing methods as well, which sometimes score slightly higher and sometimes slightly lower. Third, we measure the metrics' consistency under different random image sets and set sizes with the intraclass correlation coefficient. All BayesCompare metrics yield highly reliable results even with a set size of 50, while RSA shows the lowest consistency. These results establish BayesCompare as an effective way of measuring representational similarity while being easy and fast to compute and give strong guidance on which variants one should use.", "SubmissionID": 84}, {"Day": "Tuesday", "Time": "09:00–10:30", "SessionID": 40, "Topic": "Computational Modelling and Neural Mechanisms", "Title": "Scaling the Map: Task-Adaptive Assembly Supports Flexible Hierarchical Navigation", "Author": "Xin Yan", "CoAuthors": "Zitong Yang, Shengyuan Wang, Xiaowei Ding", "Abstract": "While humans navigate hierarchical structures by composing modular sub-maps, the neural architecture supporting this flexibility remains unclear. A resource-rational system faces a fundamental trade-off: integrating all scales into a unified map would impose high metabolic costs and risk interference between global and local coordinates. Alternatively, the brain might maintain representations in a disaggregated format, binding them selectively as task demands dictate. Leveraging a novel hierarchical navigation paradigm, we tested whether the brain implements a dynamic binding mechanism. Using fMRI and representational similarity analysis, we found that the medial orbitofrontal cortex (mOFC) consistently maintained a scale-invariant global scaffold. Critically, the hippocampus (HPC) selectively encoded fine-grained local details only when required, with the strength of this representation predicting individual behavioral accuracy. Rather than being directly integrated into the mOFC scaffold, these modular hippocampal representations were bridged by the medial prefrontal cortex (mPFC) to enable functional assembly. These findings reveal that compositional cognitive maps are maintained as discrete, modular units, assembled into a functional whole via mPFC-mediated binding—a mechanism that balances representational efficiency with behavioral flexibility.", "SubmissionID": 114}, {"Day": "Tuesday", "Time": "09:00–10:30", "SessionID": 40, "Topic": "Computational Modelling and Neural Mechanisms", "Title": "Bayesian linear encoding to evaluate models on neuroimaging data", "Author": "Juan Jesus Torre Tresols", "CoAuthors": "Sezan Oral, Heiko SCHÜTT", "Abstract": "Introduction. Evaluating the similarity of deep neural networks to human brain data is a crucial method to test mechanistic models of cognition. Several methods to perform these evaluations exist, and although each method approaches the problem from a different angle, recent research suggests that available metrics may not be optimal: very different networks achieve similar performance in large scale benchmarks and fitting seems to push network representations to be too similar to discriminate them from each other. \n\nMethods. We evaluate a Bayesian linear encoding model that allows for the computation of brain similarity without explicitly fitting the feature weights by operating on the kernel matrix. To assess the reliability of our method, we calculate the correlation of model rankings between subjects, for our method and other state of the art methods. We use two DNNs in our initial evaluation: ResNet50 and ViT/B-16.\n\nResults. Preliminary results show a slightly higher correlation across subjects for our method (mean τ=0.91), than for a frequentist encoding model (mean τ=0.88). \n\nConclusion. Our proposed method constitutes an interesting addition to existing tools for brain similarity, achieving slightly better results while being much faster to compute and avoiding common steps such as dimensionality reduction and hyper-parameter setting through cross-validation by operating on the model‘s kernel matrix.", "SubmissionID": 144}, {"Day": "Tuesday", "Time": "09:00–10:30", "SessionID": 40, "Topic": "Computational Modelling and Neural Mechanisms", "Title": "Content-specific and raw occipital alpha oscillations serve distinct functional role in predictive visual perception", "Author": "dorottya hetenyi", "CoAuthors": "Peter Kok", "Abstract": "Predictions about future events significantly influence how we process sensory signals. In previous work, we demonstrated that predicted shape representations exhibit oscillatory activity in the alpha band (10–11 Hz) during pre-stimulus intervals. Here, we extended these findings by having participants perform a shape identification task that directly relied on the shape predictions, allowing us to link the neural correlates of prediction to subjective perception. We used magnetoencephalography (MEG) combined with multivariate decoding to examine the content and frequency characteristics of perceptual predictions and relate them to behaviour. The shape identification task involved auditory cues predicting which shape was likely to appear. To make the identification of the shapes challenging, they were embedded in white noise. First, we found that valid prediction cues improved both identification accuracy and reaction times. Signal detection theory analyses revealed that participants were significantly biased toward reporting the predicted shape (i.e., reduced criterion), without a change in sensitivity (i.e., similar d-prime). We replicated our previous finding that predicted shape representations fluctuate in the alpha band (10–11 Hz). Logistic regression analyses further revealed that this content-specific alpha power predicted perceptual biases induced by the predictions. That is, when content-specific alpha power was high, participants were more likely to perceive the predicted shape. In contrast, higher raw sensor-level occipital alpha power was associated with a greater likelihood of reporting the unpredicted shape. These results suggest that content-specific alpha fluctuations and general occipital alpha power serve distinct functions in visual perception. Taken together, our findings demonstrate that sensory predictions are represented in pre-stimulus alpha oscillations and that these oscillatory signals shape how we perceive the world.", "SubmissionID": 216}, {"Day": "Tuesday", "Time": "09:00–10:30", "SessionID": 40, "Topic": "Computational Modelling and Neural Mechanisms", "Title": "Learning-Based Neurodynamical Model of Perception-Action Coupling", "Author": "Xinrui Jiang", "CoAuthors": "Martin A. Giese", "Abstract": "Visual perception and action execution influence each other reciprocally. These bidirectional interactions recruit a wide network of cortical areas. It remains poorly understood how such coupled dynamic neural representations of action perception and control are established by learning.\n\nMETHODS: We propose a neural model that is based on neural fields that represent visual and motor dynamics. The vision field receives external inputs derived from real image sequences of hand movements, where observed poses are extracted using a deep neural network model. The motor field encodes actions in terms of self-sustained propagating activity and generates the output that drives a hand avatar, thereby enabling closed-loop visuomotor feedback. Connectivity in the neural field model is established through Hebbian learning from sequential and correlated sensorimotor activity. Model behavior is evaluated under conditions matching behavioral experiments in which the congruence between executed and observed actions is systematically varied.\n\nRESULTS: After learning, each neural field supports sequential selectivity. The coupling between the visual and the motor field supports synchronous localized activity patterns in both fields. The trained model reproduces several psychophysical results on perception-action interaction within a unified framework. Specifically, the model captures the modulation of visual performance during concurrent motor execution, and higher visual-motor relative-phase variability in the anti-phase than in the in-phase condition.\n\nCONCLUSIONS: Our model provides a theoretical account of how coupled dynamic representations for action perception and control can be established by Hebbian learning. It offers predictions about how learning shapes the strength and structure of the coupling between these representations.", "SubmissionID": 231}, {"Day": "Tuesday", "Time": "09:00–10:30", "SessionID": 40, "Topic": "Computational Modelling and Neural Mechanisms", "Title": "Oscillatory and aperiodic neural dynamics jointly organize visual perception over time", "Author": "Gianluca Marsicano", "CoAuthors": "Michele Deodato, David Melcher", "Abstract": "Temporal integration is a fundamental operation in vision, allowing the nervous system to accumulate sensory evidence over brief intervals and maintain stable perception despite internal noise and external uncertainty. A prominent proposal is that rhythmic neural activity in the alpha band (~8–13 Hz) provides a temporal scaffold for perception, with its frequency defining the temporal resolution of perceptual processing. However, empirical evidence remains inconsistent, with debates over mechanisms linking alpha oscillations to perception, potential confounds between detection and integration, and growing recognition that both oscillatory and aperiodic neural dynamics may jointly shape visual temporal processing. To address this challenge, we developed a novel sustained visual integration paradigm designed to minimize detection confounds and account for perceptual bias, combined with resting-state EEG to probe interactions between aperiodic and oscillatory neural dynamics in visual temporal integration. Participants (n = 83) viewed sustained alternating gratings varying in alternation speed, inducing the perception of either two interchanging gratings (segregation) or a fused plaid (integration). Faster individual alpha rhythms predicted higher temporal resolution (i.e., increased segregation), while a steeper aperiodic spectrum (i.e., lower neural noise) predicted a steeper psychometric slope, indicating greater perceptual precision. Individuals with slower alpha frequencies and flatter spectra (i.e., higher neural noise) showed stronger serial dependence on prior judgments, indicating reduced sensory precision and increased weighting of prior experience. Subjective confidence increased with faster alpha rhythms, reflecting the clarity of sensory evidence and its consistency with previous responses. Together, these findings suggest that perceptual interpretation, confidence, and history effects in temporal integration reflect the joint influence of alpha rhythms and aperiodic neural activity. Mechanistically, faster alpha rhythms and lower neural noise may enhance perceptual resolution by generating more precise sampling frames per time unit, leading to finer temporal perception, reduced reliance on prior experience, and greater subjective confidence.", "SubmissionID": 279}, {"Day": "Tuesday", "Time": "09:00–10:30", "SessionID": 40, "Topic": "Computational Modelling and Neural Mechanisms", "Title": "Baseline Visual Capacity Gates the Efficacy of High-Frequency tRNS on Spatial Resolution", "Author": "Simay Üner", "CoAuthors": "Irem Akdogan, Hulusi Kafaligonul", "Abstract": "Transcranial random noise stimulation (tRNS) is a promising neuromodulatory approach for altering visual cortical processing, yet findings remain inconsistent regarding how different stimulation frequencies modulate neural mechanisms. These inconsistencies may partly reflect high inter-individual variability, potentially driven by state-dependency and task demands. To address this, we investigated how baseline visual capacity predicts the responsiveness to frequency-specific tRNS. Healthy adults completed demanding orientation discrimination tasks under high-frequency (101-640 Hz), low-frequency (0.1-100 Hz), and sham stimulation over the visual cortex. To capture individual differences in baseline visual state, visual capacity was assessed using a separate contrast detection task. Moving beyond single-point accuracy, visual performances were psychophysically modeled using the complete contrast sensitivity function (CSF), allowing the extraction of specific structural limits, including the spatial frequency at peak sensitivity, the high-frequency cutoff, and integrated-area parameters. Results confirm that tRNS effects were fundamentally state-dependent rather than uniformly facilitatory. Specifically, hf-tRNS improved visual resolution and overall visibility primarily in individuals whose baseline visual states allowed them to benefit from the stimulation, whereas these effects were absent under lf-tRNS. Our findings reveal a distinct mechanistic divergence between frequency ranges, suggesting that hf-tRNS, but not lf-tRNS, selectively interacts with the existing contrast sensitivity profile to refine spatial resolution. We suggest that this frequency-specific engagement potentially reflects the recruitment of fast-spiking inhibitory interneurons, which may lead to enhanced lateral inhibition and improved discrimination. Furthermore, by demonstrating that these effects are gated by baseline visual capacity, we provide a framework to account for the inter-individual variability and conflicting results prevalent in neuromodulation research. Therefore, we highlight that incorporating individual baseline states into stimulation protocols is essential for achieving consistent and predictable neuromodulatory outcomes. (Supported by TUBITAK 424K278, BIDEB 2211; BAGEP Award of the Science Academy-Turkiye).", "SubmissionID": 312}, {"Day": "Tuesday", "Time": "09:00–10:30", "SessionID": 40, "Topic": "Computational Modelling and Neural Mechanisms", "Title": "A multivariate approach linking alpha activity and aperiodic EEG features to perception and cognition", "Author": "Junlian Luo", "CoAuthors": "Marina Kunchulia, Khatuna Parkosadze, Michael Herzog, David Pascucci", "Abstract": "Perceptual science is often driven by the aim of linking behavioral phenomena to neural activity, such as relating the EEG alpha rhythm (8–12 Hz) to perception and cognition. Almost all studies in the field correlate the outcome of one single perceptual or cognitive task with the individual alpha frequency or power. Here, we adopted a multivariate approach, using a protocol that combines resting-state and task-based EEG recordings (N = 22) with a battery of eight canonical tasks, including orientation discrimination, temporal integration, bistable perception, the Stroop task, spatial attention, visual search, and working memory. We assessed associations between behavioral measures (accuracy and reaction times) and EEG features, including alpha peak frequency and amplitude, as well as aperiodic slope and offset. We found only weak and sparse correlations among behavioral measures, with stronger consistency mainly for reaction times across tasks, but not for accuracy. EEG features show moderate test–retest reliability but no clear or consistent relationship with behavior. Overall, these results indicate that the relationship between EEG alpha features and perceptual and cognitive performance is far from a simple one-to-one mapping and instead exhibits substantial heterogeneity.", "SubmissionID": 315}, {"Day": "Tuesday", "Time": "15:30–17:00", "SessionID": 17, "Topic": "Attention", "Title": "Categorical storage of de-prioritized visual working memory content", "Author": "Surya Gayet", "CoAuthors": "Dan Wang, Samson Chota, Stefan van der Stigchel", "Abstract": "Multiple items can be maintained in visual working memory (VWM) with different levels of priority (e.g., relevant now versus later). An emerging view, largely based on neuroimaging work, is that VWM content is stored in early visual cortex only when fine-grained detail is required. This occurs when items are prioritized, for instance to support precise recall or perceptual comparison. Instead, when VWM content is deprioritized, storage relies more on downstream regions, including parietal cortex where representations were shown to be more categorical.\n\nThis framework leads to a clear prediction. If deprioritized items are stored in regions that do not support fine detail, then retrieving them into a prioritized state should reveal a loss of precision. Critically, such representations should also become more categorical.\n\nWe tested this prediction using an existing dataset of three experiments (Wang et al., 2025). Participants memorized two colors for two consecutive delayed reproduction tasks using a continuous color wheel. One item was prioritized (cued for imminent report), whereas the other was temporarily deprioritized (relevant for later report). To quantify categorical structure, we conducted separate behavioral experiments (using the same experimental setup as Wang et al.) to identify color categories and map their prototypes and boundaries.\n\nResults showed that recall precision was lower for previously deprioritized items, indicating information loss. Also, color reports were generally biased toward (rather than away from) category prototypes, demonstrating influences of category membership on recall. Crucially, this bias was strongest for previously deprioritized items.\n\nThese findings show that deprioritized VWM contents are stored in a more categorical format, consistent with a transfer from early visual cortex to higher-level regions. Although this flexibility supports efficient resource allocation, it comes at a cost: transfers are not lossless and systematically transform memory content. Categorical coding may support robust behavior in natural contexts, despite reduced precision.", "SubmissionID": 201}, {"Day": "Tuesday", "Time": "15:30–17:00", "SessionID": 17, "Topic": "Attention", "Title": "Emotional valence does not automatically shift spatial attention: evidence from the conceptual cueing effect", "Author": "Tianwen Chen", "CoAuthors": "Arezoo Pooresmaeili", "Abstract": "Embodied cognition theories share the idea that mental concepts are represented through combinations of sensorimotor features, yet how these features are selected and organised into concepts is debated. In the conceptual cueing effect, abstract words direct spatial attention to locations congruent with their valence (e.g. ‘HAPPY’ orients upwards; Meier & Robinson, 2004). Existing theories disagree on how this link between word semantics and spatial directions is established. Conceptual Metaphor Theory (CMT) explains that activating abstract concepts automatically shifts spatial attention towards semantically congruent locations because concepts are inadvertently re-expressed in terms of sensorimotor relations. Theory of Event Coding (TEC) instead holds that the influence of abstract concepts on spatial attention is modulated by the task relevance of their associated spatial features. Clarifying which theory best explains the association between spatial directions and abstract concepts is key to understanding how concepts are represented in an embodied manner.  \n\nIn two experiments, we examined conditions necessary for observing the conceptual cueing effect, thereby testing the explanations offered by the CMT and TEC. We adopted a previous study’s paradigm wherein participants viewed a centred cue word and discriminated the shape of a subsequent target appearing above or below the fixation point (Gozli et al., 2013). Participants responded to emotional (e.g. ‘JOY’ or ‘SAD’) or directional (e.g. ‘ABOVE’ or ‘BELOW’) cue words, while varying the task relevance of cue valence across two conditions. We compared participants’ reaction time, hit rate, eye movements, and pupillometric responses. Although our setup elicited strong spatial cueing effects using explicit directional cues in all conditions, we did not obtain a clear cue-target congruence effect with emotional cues as described in the original study. These results challenge the Conceptual Metaphor Theory, as they indicate that at least for emotional words, spatial attention is not automatically directed to the valence-congruent spatial locations.", "SubmissionID": 222}, {"Day": "Tuesday", "Time": "15:30–17:00", "SessionID": 17, "Topic": "Attention", "Title": "Attention Modulates Duration Perception for Accelerating but Not Uniform Motion", "Author": "Gergely Gerstmayer", "CoAuthors": "Jason Clarke", "Abstract": "In a prior study, we showed that both visual gravity and uniform motion (operationally defined\n\nas linear acceleration and non-accelerating radially expanding optic flow, respectively) produced\n\nsystematic distortions in duration reproduction. Specifically, reproductions increased with\n\nmagnitude (e.g., stronger acceleration or faster speed), showing overestimation at 500 ms, a\n\nmotion-type-dependent indifference point at 1000 ms, and underestimation at 2000-3000 ms,\n\nwith uniform motion reproduced longer than gravitational motion. Because temporal\n\ndistortions are often linked to attentional processes, we tested whether attention modulates\n\nthe effects of magnitude (H1) and motion type (H2). Building on our previous study, thirty-two\n\nadults (M age = 28.7) performed a dual task: they viewed the same gravitating (1g, 2g, 3g) or\n\nuniformly moving (9.8, 19.6, 29.4 m/s) radial optic flow for 500, 1000, 2000, or 3000 ms with a\n\nword or nonword presented during the animation, followed by a duration reproduction and a\n\nlexical decision response. Attentional load was manipulated via lexical frequency (lower\n\nfrequency English words = high load; higher frequency = low load). Attentional load significantly\n\nreduced lexical sensitivity (d' = 2.39 vs. 1.64 for low and high load, respectively; z = 14.44, p <\n\n.001) and shifted criterion from neutral to conservative (c = 0.04 vs. 0.47 for low and high load,\n\nrespectively; z = 16.60, p < .001). Critically, attentional load affected temporal reproduction, \n\nwith gravitating motion producing longer reproduction in high load (p < .05, partial η² = .15; Δ =\n\n18.47 ms), supporting H2 but not H1, since the magnitude function did not interact with\n\nattentional load. The results showed that attention does not uniformly account for temporal\n\ndistortions; instead, its influence depends on motion type, with accelerating motion (but not\n\nuniform motion) relying on attentional resources during temporal encoding.", "SubmissionID": 256}, {"Day": "Tuesday", "Time": "15:30–17:00", "SessionID": 17, "Topic": "Attention", "Title": "Test-retest reliability of split-field pupillometry in the assessment of pseudoneglect", "Author": "Wiktor Więcławski", "CoAuthors": "Jakub Cacek", "Abstract": "Measuring spatial biases in the orienting of covert attention is inherently challenging. Traditionally, research on pseudoneglect and hemispatial neglect has relied on tasks requiring overt behavioral responses, which substantially constrain the scope of investigation. Recently, however, split-field pupillometry (also known as the split-screen task) has been proposed as an alternative approach.\n\nWhen the screen is split vertically into two halves with opposite luminance (white-left/dark-right vs. dark-left/white-right), spatial biases can be inferred by comparing PLR amplitudes across conditions. For example, a stronger response to the left hemifield is typically interpreted as evidence of pseudoneglect, as reported at the group level in prior studies. Conversely, patients with hemispatial neglect tend to exhibit stronger PLR responses to the right hemifield.\n\nTo evaluate the suitability of split-field pupillometry for studying individual differences and repeated-measures designs, its test–retest reliability must first be established. In the present study, 30 neurologically healthy participants completed a split-field pupillometry task across three separate sessions, each spaced at least 24 hours apart. Measurement consistency was quantified using intraclass correlation coefficients derived from Bayesian hierarchical models.\n\nIn this sample, the reliability of the spatial pupil bias index (defined as the difference in PLR amplitude between left- and right-sided stimulation) ranged from poor to moderate, indicating substantial within-subject variability across sessions. Although a larger sample size might improve the precision of these estimates, the current findings suggest that split-field pupillometry may have limited utility for certain experimental designs requiring stable individual-level measures. Reliability may, however, be higher in clinical populations, such as patients with hemispatial neglect.", "SubmissionID": 262}, {"Day": "Tuesday", "Time": "15:30–17:00", "SessionID": 17, "Topic": "Attention", "Title": "Many experimental studies of visual attention are massively underpowered", "Author": "Gregory Francis", "CoAuthors": "Evelina Thunell", "Abstract": "Rosenholtz (2024) argued that visual attention required a Khunian paradigm shift to address unexplained anomalies in studies of visual attention. While we agree that experimental studies produce conflicting results, we show that such conflicts are to be expected, given the quality of many experimental studies. In particular, many studies use sample sizes that have a low probability of showing statistical significance for the effects of interest.  For example, based on data from around 75,000 participants, the classic Posner spatial cuing task shows a difference of response times for valid and invalid cues of around 39 milliseconds, with a standard deviation for the difference of 107 milliseconds. Calculations show that to have 80% power to demonstrate a basic cuing effect requires a sample of N=62, but a meta-analysis of spatial cuing studies indicates that experimental studies typically use N=18, which corresponds to power of 36%. Worse still, many modern studies investigate deviations in the basic effect. A study looking for a difference between the cuing effect for a control group and an experimental group that produces half the cuing effect requires samples of N1=N2=480 to produce power of 80%. Studies with the typical sample size have power of only 8%, so they should produce anomalies; but these anomalies do not need to be explained because they largely represent noise. Many other paradigms for visual attention have similar characteristics. The problem is easily addressed by including power analyses as a standard part of experimental design.", "SubmissionID": 265}, {"Day": "Tuesday", "Time": "15:30–17:00", "SessionID": 17, "Topic": "Attention", "Title": "Roles of Early Visual Cortex in Global Interaction Between Attention and Visual Consciousness: Evidence from TMS", "Author": "xilei zhang", "CoAuthors": "Haiyan Kong, Liang Wang", "Abstract": "Clarifying the interactive process between attention and consciousness is a key issue. We previously developed a novel paradigm that dissociates top-down and bottom-up attention while simultaneously probing visual awareness. By combining stereo-electroencephalography (SEEG) data, we found that top-down attention does not directly promote conscious experience, but rather facilitates it by inducing a global attentional capture process marked by global coupling between the frontal brain and the posterior brain. Under this globally coupling state, how the activity of the early visual cortex affects the global attentional capture process and conscious experience, as well as which aspects of conscious experience are influenced, are the questions further addressed in this study. Combining this paradigm with transcranial magnetic stimulation (TMS) of the early visual cortex in the unilateral hemisphere, we performed interventions at three time points (0 ms/100 ms/200 ms relative to image onset) and asked participants to verbally report the visibility level and specific content of the images. The phosphenes induced by TMS were contralateral to the visual field, indicating that TMS successfully altered the local visual activity. However, the attentional capture effect was not modulated by TMS stimulation, and this effect was symmetric between the two stimulation hemispheres, suggesting that attentional capture is indeed a global effect. In terms of conscious experience, TMS improved both visibility rating and content coding of consciousness. Importantly, the intervention effect on the visibility rating was hemispherically symmetric, while the effect on consciousness content was significantly different between the two hemispheres. These results indicate that the early visual cortex is involved in both the global mechanism that determines the visibility level of conscious experience and the local mechanism that determines the content of conscious experience. The above findings provide new insights into the role of the early visual cortex in the interaction between attention and visual consciousness.", "SubmissionID": 273}, {"Day": "Tuesday", "Time": "15:30–17:00", "SessionID": 17, "Topic": "Attention", "Title": "Does attention to different body parts cause differences in body size adaptation?", "Author": "Amy Olivia Smith", "CoAuthors": "", "Abstract": "The misperceptions of one’s body shape and size are a growing health concern. Perceiving oneself to be larger or smaller than one really is (body size and shape misperception) can contribute to health concerns such as eating disordered behaviours, high body dissatisfaction, and poor mental health. Visual adaptation has been identified as a mechanism that may explain these misperceptions.\n\nVisual adaptation is the phenomenon whereby exposure to a certain body type (e.g., very thin bodies) causes an aftereffect whereby subsequently viewed bodies appear distorted in the opposite direction (heavier than they really are). Attention has been shown to modulate the direction and magnitude of this effect. For example, individuals with higher levels of body dissatisfaction pay more attention to thin ‘idealised’ bodies and consequently experience more pronounced aftereffects of body size overestimation (Stephen et al., International Journal of Eating Disorders, 52(1), 79-87). \n\nHere we looked at whether attention to specific areas of the body drive this adaptation effect – an aspect that has not previously been investigated. The experiment employed a modified Posner cueing task to manipulate participants visual attention to specific body areas. In a three by two between-subjects design, participants were directed to either the shoulders, stomach, or lower legs on either a narrow or a wide body using an arrow cue. Adaptation was measured by comparing their body size perception before and after the Posner adaptation task. Body size perception scores were assessed using the method of adjustment producing points of subjective normality. The results showed that the Posner design was successful at inducing aftereffects in the opposite direction to the size of the adaptation body. We observed no difference between directing attention towards different body areas possibly suggesting that body size adaptation is not dependent on which areas of the body are attended.", "SubmissionID": 278}, {"Day": "Tuesday", "Time": "15:30–17:00", "SessionID": 17, "Topic": "Attention", "Title": "Preparatory global feature-selective attention to colour", "Author": "Søren Krogh Andersen", "CoAuthors": "Melisa Menceloglu, Taosheng Liu", "Abstract": "Many experiments in humans and animals have observed a “global” facilitation of attended features across the entire visual field, even when spatial attention is focused on a single location. Such global selection of attended features is assumed to enable guided visual search. However, global facilitation of features has only been observed while attention is actively focused on a relevant stimulus. This differs from the situation in visual search, where the target location is not yet known during the search. Here, we investigated whether the global spread occurs during preparatory attention, before the presentation of the attended physical stimulus, which would provide empirical support for its role in guiding visual search.\n\nParticipants attended to superimposed fields of either orange or blue randomly moving dots on either the left or right side of fixation with the task of detecting brief coherent motion targets. Recordings of steady-state visual evoked potentials elicited by the flickering stimuli allowed concurrent measurement of the time course of feature-selective attention in visual cortex on both the attended and the unattended sides.\n\nWhen the onset of dots on the attended side was delayed relative to the unattended side, we observed a global feature-selective enhancement prior to the onset of the attended side dots. We propose that this spread of preparatory attention to relevant features is crucial for guided visual search.", "SubmissionID": 299}, {"Day": "Tuesday", "Time": "15:30–17:00", "SessionID": 17, "Topic": "Attention", "Title": "Gradual Change Blindness to Blur: Implications for Video Coding", "Author": "Ali Raza Syed", "CoAuthors": "Steven Le Moan, Daniel Simons", "Abstract": "Large changes can go unnoticed if they coincide with a visual disruption. Even changes occurring right in front of us can go undetected when they occur slowly and continuously. This change blindness presents a compelling opportunity for perception-driven video coding: gradually increasing compression ratio (and thus reducing video quality) may go unperceived under certain conditions. We carried out a preliminary proof-of-concept study in which we studied the effect of change blindness on gradually increasing blur. We systematically varied display duration and blur level in phase-scrambled images. We first established a baseline threshold. The observed detection thresholds were similar to predictions from the ViCE blur discrimination model, validating that model for scene images. We then measured detection when blur was introduced gradually. Thresholds were significantly higher, both when participants knew where the change would occur (location cued) and when they had to search for it (location uncued). In the absence of a cue, we were able to substantially blur the entire image before the change was detectable, suggesting non-trivial perceptual headroom that compression pipelines could potentially exploit. With both cued and uncued gradual changes, detection occurred earlier with longer stable display times between increments. This gradual change blindness could be exploited for compression algorithms via gradual blur as pre-processing.", "SubmissionID": 392}, {"Day": "Tuesday", "Time": "15:30–17:00", "SessionID": 34, "Topic": "Cognition, Decision Making, and Confidence", "Title": "Good times for vision science: reading the time from an analogue clock as a visual task", "Author": "Marek Pedziwiatr", "CoAuthors": "Magdalena Miśkowiec, Antonia Franaszek-Traczewska, Marek Pedziwiatr", "Abstract": "Reading the time from an analogue clock is a visual task with three advantages that rarely coincide: it is naturalistic, can be easily studied under experimental control, and requires specific skills. Yet, unlike other such tasks (e.g. reading text), it has received little attention in the scientific literature. Here, we aim to fill this gap and establish ‘clock reading’ as an experimental task for vision science. To break this new ground, we conducted two crowd-sourced online experiments (total N = 866). The first experiment assessed the difficulty of reading 144 different times (from midnight to noon) separated by five-minute intervals. On each trial, participants saw a numeral-free clock face for two seconds and typed the time they read afterwards. To minimize within-experiment learning, we divided the sample into twelve groups, and each group saw only 13 unique times (including a training trial). The average accuracy of responses per participant was 0.7. Intriguingly, it was markedly lower for times with the minute hand located on the left side of the dial. The second experiment had an identical trial structure, but it used a 24-element subset of the 144 times that, based on the first experiment, covered the range of times spanning from the easiest to read to the most difficult ones. It tested whether the presence of numerals and longer presentation duration affect clock reading accuracy. We found that the former factor had a stronger facilitatory effect than the latter. Overall, our results show that the procedure from the second experiment provides a good measure of an individual’s ability to read the time from an analogue clock. Therefore, it can be used in future research on still unexplored perceptual and cognitive aspects of clock reading. Funding: National Science Centre, Poland (2024/55/D/HS6/02157) and Polish National Agency for Academic Exchange NAWA (Ulam Programme).", "SubmissionID": 481}, {"Day": "Tuesday", "Time": "15:30–17:00", "SessionID": 34, "Topic": "Cognition, Decision Making, and Confidence", "Title": "Distinguishing objective and subjective prediction error in the human brain", "Author": "Jessye Clarke", "CoAuthors": "Kirsten Rittershofer, Jan Willem de Gee, Daniel Yon, Clare Press", "Abstract": "Under predictive coding accounts of perception, the brain continuously generates predictions about incoming sensory input, with mismatches between predictions and actual input generating prediction error signals that drive learning and perceptual updating. Prediction error signals have been shown to evoke amplified neural responses in sensory, striatal, and brainstem regions. In prior work, these prediction error signals have typically been characterised using the objective statistics of the environment - for example, by contrasting high- versus low-probability events, or by modelling trial-by-trial prediction error magnitudes using normative learning models. However, while it seems that predictions errors may be processed implicitly, some error signals are accompanied by conscious experience – for example, a subjective experience that an event was unexpected. Due to the focus on objective statistics, little is known about the mechanisms by which subjective experience of structure drives perception and learning. Intriguingly, recent behavioural work from our lab (Clarke et al, 2026) has shown that reported expectations and surprise explained more unique variance in perceptual decision speed and accuracy than that captured by objective stimulus statistics and model-derived prediction errors. To investigate the neural mechanisms supporting the representation of subjective relative to objective probabilistic structure, we recorded fMRI in 30 participants performing an auditory-visual associative learning task, in which visual Gabor orientations were predicted by preceding auditory tones with 75% or 25% probability. Participants rated the expectedness of each outcome on every trial, allowing us to compare subjective prediction error magnitude against objective prediction errors derived from different computational learning models. We show how brainstem, sensory and frontal structures differentially encode probabilistic structure and our subjective experience of it. Specifically, we consider how subjective experience of expectation and expectation violation may shape the neural encoding of prediction errors in ways that have been overlooked with previous focus on pure objective structure.", "SubmissionID": 488}, {"Day": "Tuesday", "Time": "15:30–17:00", "SessionID": 34, "Topic": "Cognition, Decision Making, and Confidence", "Title": "Colours of Consciousness: Testing Predictive Mechanisms of Subjective Experience through Synesthetic Training", "Author": "Anna Umurzakova", "CoAuthors": "Tessa van Leeuwen, Luke Miller, Rob van Lier, Olympia Colizoli", "Abstract": "Understanding how the brain generates subjective experience remains a fundamental challenge. The Predictive Processing Framework (PPF) proposes a bold answer: conscious perception reflects the brain’s predictions rather than incoming sensory input directly. If true, systematically altering predictions should directly alter what we experience; this claim has rarely been tested empirically.\n\nWe address this question using grapheme–colour synesthesia (GCS) as a model of prediction-driven perception. In GCS, achromatic letters reliably evoke colour experiences, illustrating how internal models shape perceptual content. We manipulate prediction strength in non-synesthetes (N = 24) using a longitudinal “reading-in-colour” paradigm, in which participants are trained on systematically coloured texts with parametrically varied letter–colour probabilities and letter frequencies. Their performance is compared to that of developmental synesthetes (N = 24).\n\nParticipants complete behavioural and pupillometry sessions before and after training. Subjective colour experience is assessed using detailed questionnaires, while pupil dilation indexes prediction error and information gain. Using information-theoretic measures, we test whether physiological responses scale with model-derived estimates of information gain, and whether the intensity of reported colour experience scales with the strength of learned predictions, indexed by pupil dynamics.\n\nThis approach enables a direct, quantitative link between computational theory, physiological signals, and phenomenology. By showing that experimentally induced predictions shape both physiology and conscious experience, this work provides a stringent test of the PPF’s central claim. More broadly, this work contributes to the development of pupil dynamics as a tractable, non-invasive marker of subjective experience and offers a framework for studying how the brain constructs perceptual reality.", "SubmissionID": 528}, {"Day": "Tuesday", "Time": "15:30–17:00", "SessionID": 34, "Topic": "Cognition, Decision Making, and Confidence", "Title": "Paradoxical influences of prediction are resolved across time", "Author": "Kirsten Rittershofer", "CoAuthors": "Yuyang Wang, Rebecca Nako, Martin Eimer, Peter Kok, Daniel Yon, Clare Press", "Abstract": "It is widely thought that the brain uses expectations to optimise perception, yet theoretical accounts disagree about the form of this optimisation. Bayesian accounts propose that perception is biased towards expected events, rapidly generating more veridical experiences, whereas cancellation accounts argue that unexpected inputs are perceptually prioritised as they are more informative. A recent opposing process theory reconciles these views by proposing a temporal reversal in prioritisation: perceptual processing is pre-emptively biased towards what is expected, followed by later enhancement of only particularly surprising inputs that are informative for learning and model updating. \n\nWe tested this account across two EEG studies using time-resolved decoding. In Study 1, we leveraged expectations acquired over a lifetime of experience concerning action outcomes. Participants observed avatar action outcomes that were either expected or unexpected given their own movements. Decoding revealed a temporal reversal: representations of task-relevant expected outcomes were enhanced from before stimulus onset, followed by a later post-stimulus advantage for unexpected outcomes.\n\nStudy 2 examined whether this later advantage for unexpected events depends on the degree of surprise. Participants learned cue-outcome relationships that were subsequently violated during the EEG session, allowing outcome probability to be parametrically manipulated. Behavioural performance tracked trial-wise surprisal, indicating sensitivity to graded outcome probabilities. Preliminary decoding results suggest that later enhancement occurs selectively for highly surprising outcomes.\n\nTogether, these results support the opposing process theory. By exerting distinct influences across time, expectations can render perception more veridical, while still allowing for the accurate perception of particularly surprising events that are important for updating our beliefs or ongoing courses of action.", "SubmissionID": 529}, {"Day": "Tuesday", "Time": "15:30–17:00", "SessionID": 34, "Topic": "Cognition, Decision Making, and Confidence", "Title": "Distinct Representations of Probabilistic Context in Perception and Eye Movements", "Author": "saleha siddiqui", "CoAuthors": "Barnabas Molnar, Rana Banai-Tizkar, Anna Montagnini, Frederic Chavane, Jozsef Fiser", "Abstract": "Perceptual decisions and eye movements are shaped by sensory information and expectations about the environment, reflecting experience-dependent internal models. Yet, they do not always adapt to context in the same way, suggesting they may rely on partly different internal representations. \n\nIn direction-biased motion tasks, anticipatory eye movements track the most frequent direction while perceptual discrimination is sometimes biased toward the least frequent one. Less is known about visually-guided eye movements. Here we ask whether perception and eye movements rely on a shared representation of context in a direction-biased random dot kinematogram (RDK) task, or distinct computational strategies.\n\nThirteen observers (N = 13) performed a direction discrimination task in two conditions, reporting leftward or rightward motion in an RDK in a 2-AFC decision-making paradigm, while eye movements were recorded. The experiment comprised two phases: an adaptive staircase to estimate RDK direction discrimination thresholds, followed by a main task in which motion coherence varied randomly across trials. Crucially, motion direction probabilities shifted from unbiased (50/50) to biased (80/20), either abruptly (JUMP) or gradually (RAMP).\n\nIn the JUMP condition, perceptual decisions were robustly biased toward the less frequent direction, a counterintuitive effect that persisted across trials and replicated prior findings, including an independent online experiment (N = 24). This deviates from normative predictions that favor the more frequent direction. Anticipatory eye movements were instead biased toward the more frequent direction, as was early visually guided smooth pursuit, though the latter appeared primarily driven by recent trial history with no clear influence of global probability. In the RAMP condition, the same pattern of oculomotor adaptation was observed, whereas the perceptual bias toward the less frequent direction was reduced, though it remained present. Together, these preliminary findings suggest a partial dissociation between perceptual and oculomotor processes, potentially governed by distinct internal representations of probabilistic context.", "SubmissionID": 536}, {"Day": "Tuesday", "Time": "15:30–17:00", "SessionID": 34, "Topic": "Cognition, Decision Making, and Confidence", "Title": "The effect of word meaningfulness on recognition performance during brief presentation", "Author": "Rytis Stanikunas", "CoAuthors": "Aldona Radzeviciene, Vytautas Jurkuvenas, Remigijus Bliumas", "Abstract": "We investigated whether memory has a greater capacity for meaningful words compared to random letter strings in brief presentations.\n\nThe study consisted of two experiments. Both experiments involved presenting a 3 x 4 letter array for a duration of 50 ms. The first experiment was performed without masking, while in the second experiment, masking was presented immediately after the stimulus presentation. The array consisted either of random letters or meaningful four-letter words. Each session included 100 trials with a random presentation of either letters or words. After each presentation, subjects reported what they had seen by filling an empty array with all remembered letters in their correct spatial positions. \n\nWe found that the number of correctly identified letters increased when the letters formed meaningful words. This effect was observed in both masking and non-masking conditions. In the random letter condition, subjects recalled between 2 to 5 letters without a mask and 1 to 3 letters with a mask. In the meaningful word condition, subjects recalled 1 to 3 words (4 to 12 letters) without a mask and 1 word (4 letters) with a mask. These findings suggest that information is not stored in memory as visual information and later accessed letter by letter by attention; rather, it is passed to the semantic center for analysis immediately after the stimulus display. Additionally, we noted substantial individual variability in recalling meaningful words from brief presentations.", "SubmissionID": 540}, {"Day": "Tuesday", "Time": "15:30–17:00", "SessionID": 34, "Topic": "Cognition, Decision Making, and Confidence", "Title": "Does the visual adaptation of causality spread across objects?", "Author": "Laura van Zantwijk", "CoAuthors": "Maria Fischer, Mathilda Maier, Sven Ohl", "Abstract": "Humans report a vivid impression of launching when one object approaches another object, which moves in the s
