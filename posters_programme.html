ual evoked potentials (SSVEP), and autistic-like traits were measured using the Autism Quotient. Preliminary findings suggest that autistic-like traits were unrelated to both discomfort and SSVEP amplitude. Additionally, although the stimuli rated as more uncomfortable (high contrast, large chromatic separation, red colour pairs) often produced the largest SSVEP amplitudes, there was an inconsistency for spatial frequency. While mid-frequency gratings (3cpd) elicited the largest SSVEP amplitude, both low (0.5cpd) and mid spatial frequencies were rated as more uncomfortable than high (9cpd). Our findings so far suggest that visual discomfort does not map directly onto cortical excitability for all visual parameters. The spatial frequency rated as most uncomfortable does not elicit the strongest neural response, challenging the hyperexcitability account of visual discomfort.", "SubmissionID": 317}, {"Day": "Monday", "Time": "15:30–17:00", "SessionID": 1, "Topic": "Clinical, Developmental, and Applied", "Title": "Aperiodic EEG Slopes Reveal Baseline and Load-Dependent Visual Exposure in Migraine", "Author": "Irem Akdogan", "CoAuthors": "Seyma Koc Yilmaz, Ilkem Guzel, Omer Enes Akgun, Doga Vuralli, Hayrunnisa Bolay, Hulusi Kafaligonul", "Abstract": "Migraine has been associated with altered visual processing during the interictal period, including visual hypersensitivity and increased susceptibility to sensory exposure. One proposed mechanism is an altered excitation/inhibition (E/I) balance in the visual cortex, which impairs filtering and hence increases internal neural noise. In EEG, the aperiodic spectral exponent has been suggested to reflect internal noise at the population level and E/I balance in cortical activity, but its representation in migraine remains unclear.\n\nWe used equivalent noise paradigms designed to challenge sensory processing. We measured the aperiodic spectral exponent (1/f slope) and individual alpha frequency (IAF) during eyes-open (EO) and eyes-closed (EC) resting states before and after demanding equivalent noise tasks in patients with episodic migraine without aura (n=13) interictally and healthy non-headache controls (n=12). We aimed to assess both trait-like group differences and state-dependent changes following visual exposure.\n\nBehaviorally, migraineurs showed impaired performance and diminished sensitivity relative to controls, reflected in elevated internal noise estimates, particularly during motion estimation. Migraineurs showed a reduced aperiodic exponent relative to healthy controls, together with a slower IAF across states, suggesting altered baseline cortical dynamics within an occipito-parietal ROI. Following the equivalent noise tasks, migraineurs exhibited a significantly flatter aperiodic exponent during EO recovery across a broad electrode cluster.  Within-group comparisons showed that migraineurs had steeper slopes during EC than EO in pre- and post-task, while controls showed this difference only in the pre-task period. \n\nMigraineurs exhibit a distinct adaptation failure to visual stimulation, characterized by a sustained shift in aperiodic activity, indicating disrupted E/I balance and elevated internal noise. While eye closure partially reduces this neural noise, the recovery remains incomplete. Therefore, aperiodic EEG measures offer a physiological marker of sensory overload in migraine (Funding: The Scientific and Technological Research Council of Turkiye, 225K067).", "SubmissionID": 335}, {"Day": "Monday", "Time": "15:30–17:00", "SessionID": 5, "Topic": "Visual Search", "Title": "Top-down control of attention via search for targets and via inhibition of distractors are not two sides of the same coin", "Author": "Valentin Pellegrini", "CoAuthors": "Ulrich Ansorge", "Abstract": "Current theory discusses links between two types of top-down control of attention during visual search. On one hand, observers can configure (positive) top-down search templates in their memory that guide attention towards searched-for stimuli matching the template. On the other, observers can inhibit known distractors in a top-down way. However, it is debated how top-down inhibition of (attention capture by) distractors works. First, participants could use (negative) templates to proactively inhibit capture by template-matching distractors. Second, alternatively, top-down inhibition might work reactively, following attention capture by a distractor matching the negative template. Here, we investigated how efficiently observers used top-down templates for inhibition during negative search, and how the resulting performance effect corresponds to the individual observer’s top-down-dependent capture during positive search. During positive search, in an adapted Additional-Singleton-Protocol, observers searched for a color-defined target. Besides the singleton-target, displays contained several non-singleton distractors and one singleton-distractor in a non-target color or in a template-matching (target-similar) color. Here, distraction by target-similar distractors exceeded that by non-target color distractor, indicating individually varying degrees of top-down dependent attention capture. During negative search, observers searched for a singleton-target that was missing a predefined distractor color present either in a singleton-distractor, or in all (non-singleton) distractors. Behavioral and eye-tracking data suggested that an individual’s degree of top-down dependent capture during positive search was not related to the same individual’s degree of inhibition of the matching (singleton) distractors during negative search. In fact, during negative search, distractors matching the template for inhibition captured attention and reduced search efficiency, as predicted by reactive inhibition theory. These findings suggest that top-down templates for inhibition do not operate proactively, as positive search templates do, challenging the idea of a common origin of different types of top-down control of attention during visual search.", "SubmissionID": 8},{"Day": "Monday", "Time": "15:30–17:00", "SessionID": 5, "Topic": "Visual Search", "Title": "Dynamic visual search modelled with foveated observer", "Author": "Hertta Leinonen", "CoAuthors": "Ilmari Kurki, Viljami Salmela", "Abstract": "A natural part of vision is scanning the environment with eye movements, reflecting the foveated nature of the visual system. Our everyday environment is dynamic, often requiring rapid decisions based on shifting visual input. While a great deal is known about how we gather visual information in static settings, dynamic environments remain less studied and poorly understood. We studied how object movement and velocity affect visual search. We measured the eye movements and behavioural data of 16 participants in a visual search experiment with five different object velocities: 0, 3, 6, 8, and 11 deg/s (random-walk motion). The stimulus comprised 10 Gabor patches at different orientations (vertical target and distractors at ±25° or 50° from the target), against a background of dynamic Gaussian noise. Peripheral visibility was measured in a separate detection experiment. Increasing object velocity impaired search performance, with slower reaction times (β = 0.0249 s/velocity, p = .002) and reduced accuracy (β = −0.0048, p = .001). Critically, there was no speed–accuracy trade-off, and interactions in scanpath length (β = 22.12 deg, p < .001) and fixation dispersion (β = −3.13 deg²/velocity, p < .001) indicated that higher velocities primarily altered search behaviour in target-absent searches, leading to more constrained visual exploration. To account for human performance, we modelled dynamic visual search using a novel foveated evidence-accumulation Bayesian observer model. The model uses sensory noise and decision criterion as free parameters while being constrained by replayed human eye movements and sensitivity (visibility), allowing us to isolate perceptual limitations from oculomotor strategies. This straightforward foveated observer model with temporal accumulation explained the increase in reaction times and decrease in performance in dynamic search. Overall, the core difficulty of visual search in dynamic environments lies in perceptual constraints imposed by object velocity, rather than in altered search strategies.", "SubmissionID": 70 },{"Day": "Monday", "Time": "15:30–17:00", "SessionID": 5, "Topic": "Visual Search", "Title": "Sharing Practices in Vision Research: Current Approaches and Future Directions", "Author": "Hayward J Godwin", "CoAuthors": "Giovanna Del Sordo, Haden Dewis, Peter  T Darch, Erin Buchanan, Michael C Hout", "Abstract": "Sharing data and other outputs from scientific research can be useful for several different purposes. These include: (1) analytic reproducibility, which involves re-running existing analyses reported in an associated paper; (2) direct replication, which involves reusing the software/materials needed to run an experiment; and (3) secondary data analyses, which involve analyzing shared datasets to ask new research questions. Here, we report on our recent projects examining sharing practices in vision research to provide an overview of our field’s current approaches, as well as highlighting ways that we can collectively improve our sharing practices. At present, the sharing of metadata is limited, which makes it difficult for others to reuse existing datasets. Without metadata, other researchers are often forced to make ‘educated guesses’ about shared files and their contents (e.g., identifying which files are raw data, and what variables are represented in each column of a dataset). Dataset producers diverge considerably regarding column naming conventions, representing a significant barrier to dataset reuse in the absence of accompanying metadata. Raw data is rarely shared, making it difficult for others to conduct secondary data analyses. Finally, shared outputs are generally difficult to find via internet searches, because research outputs shared online are often not linked clearly to associated publications (e.g., titles and abstracts are often not included alongside shared outputs). Despite these issues, there are several simple routes that we review in order to move forward and enhance sharing practices, ensuring that outputs are not only more easily found by others, but more easily reused by others as well. These focus on enhancing the metadata shared by researchers alongside their outputs, including the use of the ‘Find It – Access It – Reuse It’ scorecard that we have recently developed.", "SubmissionID": 203 }, {"Day": "Monday", "Time": "15:30–17:00", "SessionID": 5, "Topic": "Visual Search", "Title": "The Effect of Person Presence And Object Salience On Visual Search Time In Virtual Reality", "Author": "Lisa Huerta", "CoAuthors": "Rachael Taylor, Mike Burton, Markus Bindemann", "Abstract": "Visual perception research often employs two distinct methodologies: highly controlled laboratory experiments and more-ecologically valid but less controlled real-world studies. Virtual reality (VR) offers a middle ground between these two methods, allowing for immersion within complex environments whilst retaining experimental control. Here, we demonstrate how such VR methods can be used to study visual search behaviour. We used high-fidelity avatars to explore the combined effect of person presence and stimulus salience on visual search time. Participants were asked to locate books in a virtual library. In half of the trials, the target objects presented had high or low salience. In addition, avatars were present in half of the trials and absent for the remaining trials. Our data shows that participants were faster to locate high compared to low salience objects. In addition, target objects were located faster when avatars were absent than present. However, the effect of avatar presence was only observed for low saliency targets, suggesting that person presence only distracted from the search when targets were harder to find. This experiment serves to validate these animated avatars as useful research tools to study visual perception in complex settings and solidifies VR as a method to understand social cognition in naturalistic contexts.", "SubmissionID": 22}, {"Day": "Monday", "Time": "15:30–17:00", "SessionID": 5, "Topic": "Visual Search", "Title": "Reliable but Distinct: Visual Search Across Tasks", "Author": "Sandali Liyanagoonawardena", "CoAuthors": "Werner Schneider, Michael Herzog", "Abstract": "Visual tests often show weak inter-correlations despite good test-retest reliability. These findings limit the applicability of these tests since test validity is low. Here, we tested to what extent visual search tasks correlate with each other.\n\nWe used four conjunction tasks that varied in shape, colour, and orientation (n=32) and a letter search task (upright T among Ls). Each task was performed with three set sizes (2, 4, and 8 items). To evaluate test-retest reliability, each task was repeated four times.  \n\nReliability was moderate to strong in nearly all conditions except one. Conjunction search tasks based on shape, color, and orientation were moderately to strongly correlated with each other. The letter search was only weakly correlated with these tasks. This dissociation may reflect reliance on different underlying mechanisms in feature-based and object-based search. This interpretation is further supported by factor analysis, which identified three factors. While the first four tasks loaded strongly onto the first two factors, the letter search task loaded primarily onto the third factor with minimal associations with the first two factors. Hence, these findings highlight how correlational analyses can provide insights into distinct underlying mechanisms in visual search.", "SubmissionID": 52}, {"Day": "Monday", "Time": "15:30–17:00", "SessionID": 5, "Topic": "Visual Search", "Title": "Not All Searches Are Equal: Prevalence Effects Differ in Interactive Search Compared to Visual Search", "Author": "Haden Dewis", "CoAuthors": "Cheryl Metcalf, Martin Warner, Hayward Godwin", "Abstract": "When carrying out a search for a target, manipulation with the environment and/or the individual objects within it may be required to successfully detect the target. These searches are known as interactive searches. Many real-life interactive searches involve searching for targets that are unlikely to be present or are said to have low target prevalence. Here, we conducted two experiments to examine the exhaustiveness of interactive search, focusing on whether searchers were less exhaustive when prevalence was low. For both experiments, we found a standard low prevalence effect for response accuracy, such that low prevalence targets were more likely to be missed than high prevalence targets. However, we found strong evidence against the influence of prevalence upon all measures of exhaustiveness during target-absent trials. In other words, contrary to traditional low prevalence visual search findings, changes in response accuracy were not a result of reductions in exhaustiveness. We conclude that, during interactive search, even when prevalence is low, searchers utilize a ‘no stone unturned’ strategy. When following this strategy, searchers become unwilling to provide an ‘absent’ response without checking most, if not all, possible places, regions or areas in a display that could contain a target.", "SubmissionID": 71}, {"Day": "Monday", "Time": "15:30–17:00", "SessionID": 5, "Topic": "Visual Search", "Title": "Semantic scene structure guides visual search: Evidence from conceptual object clustering in real-world scenes", "Author": "Alexandra Theodorou", "CoAuthors": "John Henderson", "Abstract": "Visual search in naturalistic scenes is remarkably efficient, yet the scene properties that drive this efficiency remain poorly understood. While visual clutter has been shown to be a real-world analogue of set size, less is known about whether the semantic organization of a scene, how meaningfully its objects cluster together in conceptual space, independently shapes search behavior. Here we operationalize object set size in both semantic and physical space using k-medoids clustering of object labels in ConceptNet Numberbatch semantic representational space, and object segmentations as proxies for spatial object clusters (Tachihara et al. 2025). Fifty participants searched for arbitrary target objects in 115 familiar real-world indoor scenes spanning six categories (kitchen, bathroom, office, bedroom, living room, dining room) while eye movements were recorded. Scene-level weighted correlations revealed that semantic clustering reliably predicted mean search reaction time (r = 0.343, p < .001). Scenes with more semantic clusters, reflecting greater conceptual fragmentation of the object inventory, were associated with slower search. While spatial clustering did not independently predict search behavior in our models, the semantic clustering effect was confirmed in generalized linear mixed effects models controlling for target eccentricity and target size. These results suggest that the conceptual organization of a scene's object inventory shapes attentional guidance during search, with implications for how semantic representations support visual cognition in naturalistic environments.", "SubmissionID": 77}, {"Day": "Monday", "Time": "15:30–17:00", "SessionID": 5, "Topic": "Visual Search", "Title": "Catching insects: threatening images which do not capture attention", "Author": "Daniel Suchy", "CoAuthors": "Ulrich Ansorge", "Abstract": "In visual search tasks, threatening stimuli such as snakes or spiders capture attention more than neutral stimuli. This suggests a threat advantage in the capture of human visual attention. Our project focuses on such a potential threat advantage for insects. In altogether 6 experiments (N = 132), we asked observers to search for photographs and sketches of insects (of various species) among neutral images. So far, results suggest that a threat advantage does not apply to insects. Even though observers rate insect images consistently as more threatening than neutral images (e.g., plants, birds), insect images do not capture attention more than neutral images. Our results also question the established understanding of threat advantage, showing that manipulations such as priming can mimic threat advantages in visual search.", "SubmissionID": 199}, {"Day": "Monday", "Time": "15:30–17:00", "SessionID": 5, "Topic": "Visual Search", "Title": "Modelling visual foraging: the role of errors and assumptions in theory building", "Author": "Anna Hughes", "CoAuthors": "Alasdair Clarke", "Abstract": "Visual foraging is a continuous search behaviour in which a participant searches for multiple items. The cognitive factors that affect visual foraging behaviour have now been studied in a range of experimental paradigms: for instance, studies have shown that the perceived value of targets affects selection decisions, and that the difficulty of the foraging task affects how people make choices between sticking with the same target type or switching to another. We have built a theory of target-by-target visual foraging behaviour that uses parameters informed by these experimental results (implemented as a generative Bayesian model, FoMo). Here, we consider how studying the limitations of this model can help us to develop our psychological theories of foraging behaviour. Firstly, we consider an example where human behaviour diverges from FoMo model predictions, discussing what these model ‘errors’ can tell us, and how they led us to implementing methods for modelling ‘scanning’ strategies in FoMo. Secondly, building models involves making our assumptions explicit, which can help us identify aspects of behaviour we do not yet fully understand. We illustrate this with an example where we studied the effect of target scarcity on foraging behaviour. Finally, we consider how we can use baseline models to further explore areas for improving FoMo, using an example where we tested a new target selection decision rule for the model. To conclude, we discuss how these principles may be more broadly applicable to computational modelling work and theory building in vision science.", "SubmissionID": 281}, {"Day": "Monday", "Time": "15:30–17:00", "SessionID": 5, "Topic": "Visual Search", "Title": "Modeling two distinct modes in visual search: Implications for V1 mechanisms in bottom-up attention", "Author": "Junhao Liang", "CoAuthors": "", "Abstract": "We analyzed behavioral and gaze data from a visual search task designed to test the V1 Saliency Hypothesis (V1SH). Observers searched for a target \"homo-pair\" of disks (both black or both white) embedded in a cluttered scene of uniformly oriented \"hetero-pairs\" (one black and one white disk). The orientation of each pair was defined by the line connecting the disk centers. Target pairs were oriented either parallel or perpendicular to background distractors, randomly interleaved across 400 trials. A V1 neuron's on/off receptive subfield is more activated by the white/black disk in the stimulus. Because V1 neurons are suppressed by nearby neurons tuned to similar orientations, a target parallel—rather than perpendicular—to background hetero-pairs suffers less iso-orientation suppression. This triggers a higher V1 firing rate, making the parallel target more salient according to V1SH. Search behavior fell into two distinct modes: an exploratory mode, characterized by multiple saccades and a reaction time (RT) distribution with a high mean and heavy tail; and a rapid saliency-driven mode, where observers reported the target with zero to a few saccades, yielding an RT distribution with a short mean and light tail. To assess learning effects, we used Markov Chain Monte Carlo methods to fit RT data to a Hidden Markov Model, assuming the probability that a trial triggers the saliency-driven mode changes linearly with trial experience. Results show that parallel targets have a significantly higher probability of triggering the saliency-driven mode. Crucially, this \"parallel advantage\" is robust in early trials and maintains its magnitude without growing as experience increases. These findings support V1SH, demonstrating that V1 is the neural mechanism underlying bottom-up attention—an inherent mechanism that does not require learning.", "SubmissionID": 287}, {"Day": "Monday", "Time": "15:30–17:00", "SessionID": 5, "Topic": "Visual Search", "Title": "Prior Learning Influences Attentional Suppression after Target Relocation in Contextual Cueing", "Author": "Chengyu Fan", "CoAuthors": "Artyom Zinchenko, Thomas Geyer", "Abstract": "Visual search can be facilitated by repeated visuospatial contexts that guide attention towards likely target locations (contextual cueing). Prior work has employed different target-context mappings: target locations may be uniquely associated with specific repeated contexts (fixed mapping) or shared across repeated and nonrepeated displays (variable mapping). Although both regimes yield contextual cueing behaviorally, they differ in cue predictiveness and may therefore rely on distinct underlying representational formats. Variable mappings reduce cue predictiveness, favoring independent learning of the target location and the distractor context, whereas fixed mappings promote learning of specific target-distractor associations.\n\nOur study examined how these differences affect contextual adaptation after the relocation of the target in previously learned contexts, with the lateralized ERP component, distractor positivity (PD), as an indicator of distractor suppression. In Experiment 1 (N = 50), participants performed a visual search task involving repeated and nonrepeated contexts (variable mapping). Following an initial learning session, the target was relocated within an otherwise unchanged context in the relocation session. The results showed that behavioral contextual cueing was disrupted after relocation, and an early PD emerged at the new target location, indicating suppression of the relocated, but now task-relevant target position. Because the initial target location was not uniquely associated with a specific context during learning, it might not evoke strong misleading predictions and was therefore not actively suppressed. In Experiment 2 (N = 25), nonrepeated displays were removed and repetitions of the invariant contexts were doubled (fixed mapping). Following target relocation, an early PD was instead observed at the old target position, reflecting suppression of previously learned but now misleading context-target associations. \n\nThese findings suggest that attentional suppression is shaped by the structure of prior learning: variable mappings engage suppression of newly relevant target location, whereas fixed mappings recruit suppression of context-target bindings to overcome memory-driven biases.", "SubmissionID": 347}, {"Day": "Monday", "Time": "15:30–17:00", "SessionID": 5, "Topic": "Visual Search", "Title": "First Things First: Selection Behavior in Real-World and Virtual Interactive Search.", "Author": "Emma deverill", "CoAuthors": "Haden Dewis, Iris Russell, Kimberley Hendricks, Yanru Wang, Guido Maiello, Cheryl Metcalf, Martin Warner, Hayward Godwin", "Abstract": "Interactive search, an extension of visual search, describes search tasks that require both visual inspection and physical manipulation of objects. In visual search, attentional selection is often guided by similarity to the target. However, in interactive search all relevant visual information is not always immediately available, requiring searchers to decide how to interact with their environment to uncover obscured visual information. Here, we investigated selection behavior in interactive search across two independent experiments. In both experiments, participants searched four cubes to locate a target “T” shape attached to one face of one of the cubes. In Experiment 1, participants physically interacted with tangible cubes, picking them up and rotating them whilst their interactions were recorded using optical motion-capture. In Experiment 2, participants performed an analogous task in a virtual environment, using a mouse to click and rotate cubes presented on a computer screen. In both experiments, two cubes contained a letter on each face (information-rich) whereas the remaining two contained a letter on only one face (information-poor). We predicted that participants would adopt an “easy-first” strategy, prioritizing the inspection of information-poor cubes before information-rich cubes. Our reasoning here was that whilst objects containing more shapes would provide a greater quantity of visual information to the searcher, examining these cubes would also come at a cost in terms of processing time and cognitive effort. Analyses revealed a divergence in selection behavior across environments. In real-world interactive search, participants preferentially inspected information-rich cubes with no change in this preference over trials, whereas in virtual interactive search, participants prioritized information-poor cubes, and this bias increased as trials progressed. These findings suggest that the weighting of time and effort costs relative to the likelihood of an object containing the target differs between otherwise equivalent real-world and virtual tasks.", "SubmissionID": 356}, {"Day": "Monday", "Time": "15:30–17:00", "SessionID": 23, "Topic": "Illusions and Imagery", "Title": "Illusions that are not Illusions: Misleading cross-level comparisons", "Author": "Hans Strasburger", "CoAuthors": "Michael Bach", "Abstract": "Visual illusions – as Oliver Braddick has provocatively argued – are too broad a category to be characterized by simple criteria such as non-veridicality or perceptual error. In the present analysis, we want to elaborate, in the context of Dejan Todorovic’s augmented framework for illusions, on a class of classical visual illusions which we propose to call “misnamed illusions”. The common characteristic of these is that the percept is veridical even though it is based on differing physical attributes. Within Todorovic’s framework, the alleged perceptual error in many pictorial displays arises not within perceptual appearance but stems from a comparison between heterogeneous representational domains, like physical measurement and appearance. Examples include Adelson’s checkerboard and the Lotto-Purves Colour Cube. There, the alleged mismatch between luminance and brightness or brown and orange colour arises as a consequence of the perceptual mechanism of colour constancy. In a simplified framework for a general audience, we can thus distinguish between misnamed illusions, which arise from misleading cross-level comparisons, and genuine illusions, in which the discrepancy is intrinsic to perceptual appearance itself, i.e., relations that are directly available for comparison within the same perceptual field. As an example for a genuine colour illusion, we would put forward the “Lilac chaser”.", "SubmissionID": 238}, {"Day": "Monday", "Time": "15:30–17:00", "SessionID": 23, "Topic": "Illusions and Imagery", "Title": "EEG correlates of perceptual (un)certainty are not due to variability in signal timing", "Author": "Mareike Wilson", "CoAuthors": "Ellen Joos, Lukas Hecker, Sven P. Heinrich, Ludger Tebartz van Elst, Jürgen Kornmeier", "Abstract": "Information available to our senses is inherently incomplete and varies in ambiguity and visibility. This results in variability of stability and certainty of perceptual interpretations. We compared the EEG evoked by ambiguous and low-visibility stimuli with that of disambiguated and high-visibility stimulus variants. The amplitudes of two Event-Related Potentials (ERPs) (P200 and P400) showed an inverse relationship with perceptual uncertainty (“ERP Uncertainty Effects”) across very different stimulus categories and complexity levels. The ERP analysis does not resolve whether amplitude effects reflect differences in strength or temporal variability of neural signals across stimulus repetitions. In this study, we investigated this question by analysing the EEG data in the frequency domain. \n\nUsing four stimulus types, we presented Necker lattices and smiley faces with either low or high perceptual certainty. Stimuli were presented discontinuously and participants (n=21) indicated their percept by key press. We analysed the EEG with a time-frequency analysis, comparing total power and phase variability (Intertrial Coherence, ITC) between low and high certainty stimulus variants in the 4-8 Hz frequencies (reflecting the P200 and P400 ERPs). \n\nWe replicated the ERP Uncertainty Effects, with high perceptual certainty having higher power compared to low perceptual certainty. For the Necker lattices, the ITC did not significantly differ between perceptual certainty levels. For the smiley faces, there was a significant difference between the ITC in the P400 time window with perceptual certainty having less temporal variability. However, this ITC difference could not explain the ERP Uncertainty Effects. \n\nOur results indicate that the ERP Uncertainty Effects arise from differences in signal strength and not temporal variability. This suggests these effects result from the number and strength of underlying neural generators. The ITC difference for the smiley faces seem to be independent of the ERP Uncertainty Effects and might be due to the unique processing of faces.", "SubmissionID": 242}, {"Day": "Monday", "Time": "15:30–17:00", "SessionID": 23, "Topic": "Illusions and Imagery", "Title": "Predictability of stimulus ambiguity but not of timing modulates perceptual (un)certainty estimation", "Author": "Shalila Freitag", "CoAuthors": "Mila Mijatovic, Maximilian Billian, Ludger Tebartz van Elst, Mareike Wilson, Jürgen Kornmeier, Ellen Joos", "Abstract": "Sensory input though inherently noisy can be more or less reliable. Less reliable input, like the ambiguous Necker lattice, induces perceptual uncertainty, while reliable input, like disambiguated variants thereof, induces perceptual certainty. In EEG correlates, this is reflected in low (uncertainty) and high (certainty) ERP (event related potential) amplitudes. These “ERP (Un)Certainty Effects” are quite large (Cohen’s d of 0.6 - 1.2) and generalize over multiple stimulus categories and complexities. These findings, however, are based on experimental paradigms in which per condition only one stimulus variant was shown repeatedly with fixed blank screen ISI (interstimulus intervals). In these studies, predictability of successive stimuli was high and so far, it is unknown how this impacts the ERP Uncertainty Effect. Here, we tested the influence of predictability of stimulus ambiguity (i.e., induced perceptual certainty level) as well as predictability of timing on the ERP Uncertainty Effects.\n\nIn Experiment 1 (n = 20), predictability of ambiguity in consecutive stimuli was removed by presenting both stimulus variants (ambiguous and disambiguated) in random order but with fixed ISI of 0.4 s. In Experiment 2 (preliminary, n = 15), predictability of timing was removed by showing stimuli with three mean ISI in jittered or non-jittered conditions (0.3 s – jitter: ± 0.01 s, 1 s – jitter: ± 0.1 s and 3 s – jitter: ± 0.2 s). Both stimulus variants were shown in separate conditions ensuring predictability of ambiguity.\n\nRandomized presentation of both ambiguous and disambiguated variants did not produce ERP Uncertainty Effects. In contrast, neither ISI length nor the presence or absence of a temporal jitter had an influence on the effects.\n\nIt seems that predictability of stimulus ambiguity is essential for perceptual certainty estimation. When predictability of ambiguity is given, however, it is robust to modulations of ISI duration and predictability of timing.", "SubmissionID": 244}, {"Day": "Monday", "Time": "15:30–17:00", "SessionID": 22, "Topic": "Illusions and Imagery", "Title": "Listening to negative music sharpens visual size perception", "Author": "Chao Wang", "CoAuthors": "Bochun Yang, Lihong Chen", "Abstract": "Emotions profoundly influence visual perception, yet it remains unclear whether negative emotions induced by music can cross-modally modulate visual size perception, and what causal role the dorsolateral prefrontal cortex (DLPFC) plays in this process. Using a prime paradigm and the classic Ebbinghaus illusion as an index of visual size perception, the present study addressed these questions using high-definition transcranial direct current stimulation (HD-tDCS) technique. Participants performed a size-matching task following prior exposure to music excerpts that induced positive, negative, or neutral emotional states. Experiments 1 and 2 consistently revealed that negative music significantly reduced the illusion magnitude compared to neutral or positive music. Experiment 3 applied tDCS over bilateral DLPFC (F3/F4) and found that active stimulation eliminated or even reversed the emotion-induced modulation of the illusion. Experiments 4 and 5 used HD-tDCS to independently manipulate excitability of the left or right DLPFC. Results consistently showed that under sham stimulation, negative music significantly reduced the illusion magnitude than positive music. However, enhancing (anodal) or suppressing (cathodal) excitability of either the left or right DLPFC eliminated this emotional modulation. These findings provide clear evidence that music-induced negative emotions cross-modally modulate visual size perception, and the DLPFC plays a critical causal role in this process. This study advances our understanding of cross-modal emotion-perception interactions and has implications for non-invasive neuromodulation interventions in affective disorders.", "SubmissionID": 148}, {"Day": "Monday", "Time": "15:30–17:00", "SessionID": 23, "Topic": "Illusions and Imagery", "Title": "Alpha-band MEG reveals shared representations of perceived and imagined simple visual features", "Author": "Rebecca Keogh", "CoAuthors": "Sophie Smit, Roger Koenig, Tabea-Maria Haase, Lina Teichmann, Anina Rich", "Abstract": "Visual imagery is the ability to generate images in the mind’s eye without concurrent retinal input. While previous fMRI research has shown that low-level features such as orientation and colour can be decoded from imagery in visual regions, MEG and EEG decoding has primarily focused on complex categorical stimuli (e.g. houses and faces). Here, we targeted low-level visual features, specifically colour and shape, to investigate whether such information can be reliably decoded within category using MEG (e.g. red triangle vs red circle). Participants with moderate to strong imagery ability (verified via the binocular rivalry imagery paradigm) imagined simple coloured shapes for six seconds and rated their imagery vividness on a trial-by-trial basis while undergoing MEG. We applied time-resolved multivariate pattern analysis to examine when perceptual and imagery-related information was represented in MEG signals. Cross-decoding between perceptual and imagery conditions revealed shared representations selectively in the alpha band. During imagery, shape information (circle vs triangle) emerged earlier than shape–colour conjunctions (e.g. red circle vs red triangle). Colour alone could not be reliably decoded, potentially reflecting limitations in task design or weaker feature-specific representations. The emergence of shared representations primarily in the alpha band aligns with recent evidence suggesting that alpha oscillations support top-down reinstatement of sensory information during a range of cognitive tasks.", "SubmissionID": 289}, {"Day": "Monday", "Time": "15:30–17:00", "SessionID": 23, "Topic": "Illusions and Imagery", "Title": "EEG correlates of the bias towards vertical motion perception during observation of the ambiguous motion quartet", "Author": "Juergen Kornmeier", "CoAuthors": "Hoffmann Michael, Michael Bach", "Abstract": "The motion quartet consists of two dot pairs being alternatively present and absent at the diagonal corners of a centrally (visual field) located imaginary rectangle. Observers’ perception becomes ambiguous and alternates between two dots apparently moving either horizontally or vertically, with a bias towards vertical motion in the case of equal horizontal and vertical dot distances (aspect ratio =1). This vertical motion bias has been explained by less effortful intra-hemispheric processing in the case of vertical motion percepts, compared to more effortful inter-hemispheric processing of horizontal motion percepts. In the present study we tested this hemisphericity hypothesis. \n\nFive motion quartet stimuli with different degrees of subjective ambiguity (varying point aspect ratios: 0.5, 0.7, 0.85, 1, 1.2) were presented discontinuously in separate experimental blocks and 13 participants indicated reversals in perceived motion direction by key press. We compared latency and amplitude of event-related potential (“ERP”, resulting from the EEG) correlates of horizontal and vertical motion percepts, expecting shorter latencies and smaller amplitudes of motion ERPs for vertical compared to horizontal motion percepts. \n\nIn an exploratory analysis, we identified two ERP components with larger amplitudes for vertical compared to horizontal motion percepts: One earlier ERP component at about 150 ms after stimulus onset with a posterior distribution, followed by a later component at about 280 ms and with both posterior and anterior activity clusters. We found no EEG evidence for timing differences in the processing of the two perceived motion directions. \n\nOur results suggest a pattern of recurrent activity between posterior and anterior brain areas underlying the well-known vertical bias in perception of the ambiguous motion quartet. Whether, and if yes, how our EEG results are related to the hemisphericity hypothesis, needs to be shown in follow-up studies.", "SubmissionID": 322}, {"Day": "Monday", "Time": "15:30–17:00", "SessionID": 23, "Topic": "Illusions and Imagery", "Title": "Repositioning Perceptual Illusions as a Medium for Active Learning in Higher Education", "Author": "Nuno De Sá Teixeira", "CoAuthors": "Rodrigo Freitas", "Abstract": "While perceptual illusions are widely used as illustrative tools in teaching Sensation and Perception courses, they are often reduced to passive, in-class demonstrations, limiting their potential to foster deep conceptual understanding. Given their intrinsically interactive nature, perceptual illusions instead lend themselves to active, student-centred learning approaches. The present work introduces and examines the pedagogical project Illusions Workshop, implemented in an undergraduate Psychology course on Perception and Attention, which seeks to reposition illusions as a central medium for active learning.\n\nOver the course of a semester, students worked in small groups to collaboratively design and construct interactive demonstrations of perceptual phenomena. This process was supported by access to a dedicated workshop space equipped with digital fabrication tools (e.g., 3D printers and laser engravers) and a range of construction materials (e.g., cardboard and foam board). In parallel, students conducted theoretically grounded analyses of the perceptual mechanisms underlying their chosen phenomena, drawing on the relevant scientific literature. The integration of conceptual and hands-on components was continuously supported through structured tutoring and formative feedback.\n\nThe project culminated in a public dissemination event - “Illusions Day” - during which students presented their demonstrations to the academic community, combining scientific communication with experiential and inquiry-based learning. The pedagogical impact of the initiative was evaluated using a pre-post design, incorporating both multiple-choice items targeting core concepts in perception research and open-ended questions addressing understanding and engagement.\n\nThe findings are discussed in terms of their implications for disciplinary learning in perception science, the development of transferable skills (including problem-solving, project planning, collaboration, and science communication), and student engagement within higher education contexts.", "SubmissionID": 403}, {"Day": "Monday", "Time": "15:30–17:00", "SessionID": 23, "Topic": "Illusions and Imagery", "Title": "Does imagination really modulate pupil size?", "Author": "Blake Saurels", "CoAuthors": "Daniel Gardner, Loren Bouyer, Derek Arnold", "Abstract": "The pupil constricts in response to light. Imagining a bright light has also been shown to subtly constrict the pupils. It has been suggested that pupil size modulation via the imagination relies on the same neural architecture as real sensory information processing. We have made several attempts to directly and conceptually replicate this effect of pupil size modulation via imagery, and have found mixed results. Interestingly, the strength of the effect seems to be contingent on the type of imagined content (e.g., realistic scenes seem to work better than basic shapes), and how the person is told about the to-be-imagined content (e.g., priming with examples vs. text-based descriptions). We relate these findings to several self-report measures of the imagination, and it remains to be seen if these modulations will prove to be a useful means of distinguishing people who report having weak or vivid imagined visual experiences.", "SubmissionID": 416}, {"Day": "Monday", "Time": "15:30–17:00", "SessionID": 23, "Topic": "Illusions and Imagery", "Title": "Does the pen really levitate? Testing the possibility of demand characteristics in reports of the illusion of levitation", "Author": "Melika Miralem", "CoAuthors": "Andrea Helen Bøe, Sarah Rongved, Vebjørn Ekroll", "Abstract": "Reports of the illusion of levitation suggest that objects can appear to float mid-air when their physical support is visually occluded. The present study examines whether such reports reflect a genuine perceptual experience or are potentially influenced by demand characteristics, i.e., participants’ interpretation of the experiment's purpose and subconscious change in behavior to fit the presumed goal of the study. In our 2 × 3 between-subjects design, participants are randomly assigned to one of the six experimental conditions. The first factor is stimulus visibility: in one condition, participants directly view a pen positioned in a way that may give the impression of levitation, whereas in another condition they are positioned so they cannot see the pen as levitating and are only asked to imagine it as such. The second factor is the type of occluder used to “hide” the support underneath the putatively levitating objects: a small occluder, a wide occluder or a transparent control occluder. By assessing spontaneous mentions of levitation in an open-ended report, followed by a rating of the extent to which the pen appears to be levitating on a 0–10 scale, we test whether participants in the non-visible condition are as likely to report levitation as those in the visible condition. Similar patterns of reporting across conditions might suggest that reports of levitation are not driven by visual perception alone, as would be inferred from the previous studies on the illusion of levitation. The results of our research are forthcoming and will be presented at the conference.", "SubmissionID": 471}, {"Day": "Monday", "Time": "15:30–17:00", "SessionID": 23, "Topic": "Illusions and Imagery", "Title": "Visuospatial perspective-taking within different reference frames: The role of perspective change and mental rotation strategies", "Author": "Ioanna Markostamou", "CoAuthors": "Irene Sperandio", "Abstract": "Mental representations of space can be generated and communicated within different reference frames and perspectives. Visuospatial perspective taking can also be affected by the degree of perspective change, which refers to the angular disparity between the physical and the target perspective. The present study investigated for the first time the effects of angular disparity and individual differences in mental rotation strategies on people’s ability to process spatial relations within different spatial reference frames (SRFs). Sixty-three healthy adults completed a task involving third-person-, object-, and environment-centered judgements of spatial relations between two objects under orthogonal and non-orthogonal degrees of perspective change while their use of self-based and object-based mental imagery strategies was also recorded. Results revealed significantly lower accuracy rates and higher response latencies in environment-centred spatial processing compared to third-person- and object-centred processing. Furthermore, performance was overall slower and less accurate under non-orthogonal angular disparity conditions compared to orthogonal perspective changes; however, environment-centred accuracy was comparable across the two angular conditions. Finally, irrespective of the degree of perspective change involved, both self-based and object-based mental rotation strategies were used across all SRFs and associated with better performance. However, individuals favoured a self-based mental rotation strategy, particularly in the third-person- and object-centred frames. These findings confirm that at least partially distinct systems are involved in mentally representing space under different SRFs and that spatial perspective taking can be more challenging under non-orthogonal degrees of perspective change. The present findings also highlight the importance of mental visual imagery abilities in the form of self- and object-based mental rotation strategies in efficient spatial perspective taking.", "SubmissionID": 480}, {"Day": "Monday", "Time": "15:30–17:00", "SessionID": 23, "Topic": "Illusions and Imagery", "Title": "Time-to-collision estimation within and beyond the Oppel-Kundt illusion", "Author": "Christoph von Castell", "CoAuthors": "Heiko Hecht", "Abstract": "In the Oppel-Kundt illusion (OKI), a horizontal interval filled with vertical lines appears longer than an adjacent unfilled interval of the same physical length. In a previous study, we demonstrated that the OKI affects time-to-collision (TTC) estimation of an object moving through the space covered by the illusion. This temporal effect is comparable in magnitude to its spatial counterpart. In the present study, we investigated whether this effect extends into peri-illusional space. In 540 trials per participant (N = 30), a circular object moved from left to right at three speeds and was occluded at the end of the left interval. In a prediction-motion task, participants judged when the object would reach the end of the right interval. The left interval remained unfilled and constant, whereas the right interval varied independently in length and filling. We varied the relationship between the moving object and its background in three ways. First, we separated the object’s trajectory from the illusion by displacing it vertically below it. Second, the object remained below the illusion space, and we extended the three vertical lines defining the beginning and end of the intervals so that the lines reached into the space traversed by the object. Third, we reduced these lines to three dots such that the space below the object was equally segmented without intersecting its trajectory. Our results show that the effect of the OKI on TTC estimates extends into peri-illusional space. Surprisingly, extending the end lines of the intervals reduced this effect, whereas the illusion was almost fully restored when the interval boundaries were indicated by dots. Our findings suggest that the elongated end lines of the extrapolation interval define a new space that is not affected by the illusion, whereas isolated points do not.", "SubmissionID": 490}, {"Day": "Monday", "Time": "15:30–17:00", "SessionID": 23, "Topic": "Illusions and Imagery", "Title": "Illusion of absence: Capturing the perception of occluded space using EEG", "Author": "Pier Pascal Forster", "CoAuthors": "Sebastian Jentschke, Subhankar Karmakar, Andrey R. Nikolaev, Vebjørn Ekroll, Rob van Lier", "Abstract": "", "SubmissionID": 607}, {"Day": "Monday", "Time": "15:30–17:00", "SessionID": 28, "Topic": "Motion Perception and Optical Flow", "Title": "Reflexive attention to biological motion formed by arrows with opposing orientation: Impaired in individuals with high autistic traits", "Author": "Xinyi Huang", "CoAuthors": "Li Wang, Yi Jiang", "Abstract": "Biological motion (BM) is a potent social signal capable of guiding human attention, a phenomenon termed social attention that underpins adaptive behavior and interpersonal interaction. Although extensively studied in laboratory settings, social attention is typically examined using simplified, isolated cues, leaving unresolved whether it possesses reflexive properties distinct from nonsocial attention. This study developed a dual-cue paradigm that embedded oppositely-oriented arrow cues within BM sequences, directly assessing reflexive nature of BM-induced attention using a conflict-resilience criterion. Results confirmed that BM cues, despite being reduced to kinematic information within incongruent directional signals, robustly directed attention. Furthermore, this potency persisted even for local BM signals lacking global configuration but disappeared upon removal of essential biological characteristics, highlighting the crucial role of local motion cues in guiding attention under perceptual conflict. Crucially, BM-driven reflexive attention was negatively correlated with autistic traits. Individuals with higher autistic traits failed to utilize BM cues to direct attention, yet showed intact arrow-driven attention, manifesting specific deficits in social rather than nonsocial attention. These findings uncover an intrinsic processing advantage for social signals in complex contexts that appears compromised with increasing autism-like characteristics, providing a novel paradigm with profound implications for early diagnosis and intervention in autism.", "SubmissionID": 47}, {"Day": "Monday", "Time": "15:30–17:00", "SessionID": 28, "Topic": "Motion Perception and Optical Flow", "Title": "Perception of object velocity during visual simulation of ego movement", "Author": "Martin Bossard", "CoAuthors": "Loïc Chomienne", "Abstract": "Moving observers need to be able to estimate the displacement of other objects in the scene in order to avoid collisions. Previous studies have reported that the visual system uses information in optic flow to subtract the retinal motion component due to self-movement to recover scene-relative object motion – a mechanism called flow parsing. This study investigates whether such mechanism plays a role in speed perception. Using a two-interval forced-choice procedure, participants were confronted in one of the two intervals to randomly moving dots (the reference condition) and in the other to a cloud of dots moving radially – either expanding or contracting. During each intervals participants were confronted to a probe moving horizontally toward the centre of the screen, and were asked to indicate which of the two was going faster. In the reference condition, the probe velocity was fixed at 3,6 deg.s-1. In radial conditions, it was adjusted using four interleaved staircases starting at 4,2 or 3,0 deg.s-1, in expanding or contracting flow. To prevent reliance on strategies unrelated to speed perception, both the initial position (i.e., eccentricity) and the duration of probe presentation were randomly varied. Our results show that radial motion plays a role in the perception of the probe’s speed in comparison to random motion. In accordance to flow parsing theory, participants judge the velocity of probe as slower in contracting optic flow and as faster in expanding optic flow. As a next step, we aim to extend this paradigm to biological motion. Because it provides structured, articulated kinematic cues that enhance motion perception, we hypothesize that this type of movement strengthens scene-relative object motion perception. In applied context of driving simulation this raises the question of how we perceive the movement of a pedestrian about to cross the road in front of us.", "SubmissionID": 234}, {"Day": "Monday", "Time": "15:30–17:00", "SessionID": 28, "Topic": "Motion Perception and Optical Flow", "Title": "Why do changes in pupil diameter cause illusory visual motion?", "Author": "George Mather", "CoAuthors": "Patrick Cavanagh", "Abstract": "In the Rotating Snakes (aka Peripheral Drift) motion illusion a stationary pattern that contains repeated asymmetrical luminance gradients can appear to move episodically, triggered by saccadic eye movements, pattern onsets, and blinks. Last year we reported evidence from pupillometry that the illusory movement is caused by transitory changes in the retinal luminance of the pattern due to reflexive changes in pupil diameter following eye movements, pattern onsets and blinks. In this research we tested whether computational models of human cortical motion processing can account for apparent motion induced by luminance change.\n\n The Adelson-Bergen motion energy sensor is widely used to model low-level motion detection, but our implementation of the standard model was unable to account for the illusion. We therefore tested a variant of the model in which the responses of direction-selective units were half-wave rectified prior to computing motion direction, creating separate ON and OFF sensors consistent with responses in cortical neurons. Both types of sensor were found to signal motion in asymmetrical illusion patterns, in the correct direction for OFF sensors and in the reverse direction for ON sensors. \n\n OFF signals are already known to evoke stronger cortical responses that ON signals in humans, macaques and mice, and OFF stimuli are 25% more effective at driving motion perception than ON stimuli. If OFF responses in our model are weighted more strongly that ON responses in the direction computation, the ON/OFF model can predict the direction of the illusion. The weighted ON/OFF model can also explain the motion seen in a number of standard displays (as can the original Adelson-Bergen model). Variations in reported illusion strength in the population could be due to individual differences in ON/OFF weighting and in pupil motility.\n\nSupported by Leverhulme Trust Emeritus Fellowship EM-2023-043 (GM), and NSERC Discovery RGPIN-2019-03989 (PC).", "SubmissionID": 236}, {"Day": "Monday", "Time": "15:30–17:00", "SessionID": 28, "Topic": "Motion Perception and Optical Flow", "Title": "Interaction Rules as a Framework for Collective Motion Perception Beyond Templates", "Author": "Michelle Kuhn", "CoAuthors": "Markus Lappe", "Abstract": "The visual system excels at segmenting objects from dynamic, non-rigid motion. While internal templates could facilitate the recognition of objects in biological motion (e.g. point-light walkers) or elastic deformations (e.g. point-light cloth), fluid systems such as bird swarms, smoke or water, lack a fixed geometry for a template. Instead, they underlie motion or interaction rules based on physical forces or intra-system dynamics. We hypothesize that the visual system extracts these rules as a functional substitute for templates.\n\nUsing a novel 'Point-Light Swarm' (PLS) stimulus, we investigated whether 'alignment' as an interaction rule can be detected in collective 2D motion. Alignment was implemented based on Vicsek’s algorithm by which motion directions of all points within a defined spatial interaction-relation are replaced by the average direction (Vicsek, Phys. Rev. Lett., 1995).\n\nIn two experiments, we varied the presentation duration (1500, 500, 100 ms) and the initial configuration (random or grid-based locations) of the PLS. In the first experiment, we used a distance-based interaction algorithm and varied interaction radii. To investigate the effect of the number of neighbours, we used a topological (neighbour-based) interaction framework in the second experiment. Participants had to detect the presence of alignment in a 2-AFC task.\n\nResults show that sensitivity (d') increases with the amount of interaction, either through larger radii or more neighbours, before reaching a plateau. Increase was stronger and plateau level was higher for 1500 ms and 500 ms stimulus-duration than for 100 ms. These findings show that alignment in PLS motion can be detected rapidly, even at duration of 100ms, but benefits from longer presentation duration. This implicates that the visual system either better integrates cues that are present at 100 ms over longer time or utilizes emergent cues that only develop after the initial 100 ms due to the interaction rules.", "SubmissionID": 240}, {"Day": "Monday", "Time": "15:30–17:00", "SessionID": 28, "Topic": "Motion Perception and Optical Flow", "Title": "Conflicting motion cues in Gabor stimuli: evidence for separate position- and phase-based motion mechanisms", "Author": "Alexandra Hibble", "CoAuthors": "Paul Azzopardi", "Abstract": "Visual motion can be described by changes in the phase of Fourier components (phase cues), and changes in the position of salient features (position cues). Gabor stimuli can be constructed which place these cues in opposition, by displacing the gaussian window (position cue) in a different direction to the phase displacement of the sinusoid carrier (phase cue). We propose that these cues are processed by two independent motion systems with distinct spatiotemporal frequency sensitivities across the retina, with higher spatial frequency sensitivity for phase cues and a steeper eccentricity-dependent decline for position cues.\n\nWe tested reported motion direction for two-frame apparent motion Gabor stimuli (n=7), rendered in 6 conditions: phase displacement only; position displacement only; or containing simultaneous phase and position displacements in conflicting motion directions of 45, 90, 135, and 180o. Stimuli were presented at 7 spatial frequencies at the fovea and 10 degrees eccentricity (fovea: 0.81 cpd to 16 cpd; periphery: 0.3 cpd to 5.9 cpd), for 50 trials for each condition.\n\nReported motion direction in the conflicting conditions at the fovea was biased towards the position cue, with a small but significant effect of the phase cue, particularly at higher spatial frequencies. In the periphery, the phase cue exerted a stronger effect on reported motion direction that could not be compensated for by simple scaling of spatial frequency between the fovea and periphery, supporting our proposal of two independent systems with changing spatiotemporal sensitivity across the retina. Furthermore, we demonstrated that participants’ own sensitivity to phase and position cues, measured in the isolated cue conditions, predicted the weighting of the phase cue in determining reported direction for the 4 conflicting cue conditions, at both fovea and periphery, across all spatial frequencies.", "SubmissionID": 264}, {"Day": "Monday", "Time": "15:30–17:00", "SessionID": 28, "Topic": "Motion Perception and Optical Flow", "Title": "The role of visual contextual cues on motion extrapolation: A single horizon line biases the Representational Horizon", "Author": "Rodrigo Freitas", "CoAuthors": "Samuel Silva, Nuno Alexandre De Sá Teixeira", "Abstract": "The perceived offset position of a moving target is systematically displaced forward, in the direction of motion (Representational Momentum; RM), downward, in the direction of gravity (Representational Gravity; RG), and along the horizon implied by the visual context (Representational Horizon; RH). The latter has been shown to depend on visual context orientation, particularly in exterior settings where horizon cues are salient. Building on this evidence, the present study examined whether RH can be reliably biased by minimal visual cues that efficiently imply a horizon axis and investigated their differential impact on motion extrapolation phenomena. Participants observed moving targets following various trajectories, overlaid on a randomly chosen visual context depicting either a combined ground and sky gradients, an isolated ground or sky gradient, or a single horizon line context rotated -22.5º, 0º, or 22.5º relative to the true vertical. Upon the target's vanishing, participants indicated its last seen location with a trackball. Spatial localizations were subjected to a discrete Fourier decomposition procedure to obtain independent estimates of RM, RG, and RH. Outcomes showed that RH direction consistently followed the horizon implied by the visual context across all conditions. Furthermore, RM magnitude increased with the sky gradient and decreased with the ground gradient, indicating sensitivity to ecological features. These findings underscore the pivotal role of horizon information in visuospatial orientation and contribute to a better understanding of extrapolation phenomena.", "SubmissionID": 373}, {"Day": "Monday", "Time": "15:30–17:00", "SessionID": 28, "Topic": "Motion Perception and Optical Flow", "Title": "The Role of Size and Texture in the Perceived Onset Position of a Moving Target", "Author": "Rodrigo Freitas", "CoAuthors": "Samuel Silva, Nuno Alexandre De Sá Teixeira", "Abstract": "When observers are asked to indicate the spatial location at which a moving target first appears, their judgements are systematically displaced backward along the direction of motion, a phenomenon coined as the Onset Repulsion Effect (ORE). Previous research has shown that this effect is particularly pronounced for ascending targets, revealing a vertical anisotropy in onset spatial localization. Furthermore, by manipulating perceived target mass through kinematic information or direct sensorimotor experience, prior studies have shown that the magnitude of the ORE increases for targets judged as heavier. These findings have led to the proposal that the ORE may reflect a cognitive tendency to attribute a \"natural history\" to dynamic events, similar to the preparatory windup before throwing an object, resulting in a backward overcompensation of onset location. The present study investigated whether visual cues commonly used to infer object mass in everyday perception, namely size and texture, modulate onset spatial localization. Two experiments were conducted in which participants localized the onset position of moving targets that varied in size alone (Experiment 1) or in size combined with surface texture (Experiment 2). The results revealed that target size reliably modulates the magnitude of the ORE, with larger targets producing greater backward displacements, thus extending previous findings to visual size cues. In contrast, surface texture had no effect on onset localization, suggesting that the ORE is selectively sensitive to mass-related information and that its modulation depends on the representational level at which such information is inferred. The results are discussed in relation to stored representations of object dynamics and the role of embodied causal expectations in shaping spatial localization.", "SubmissionID": 375}, {"Day": "Monday", "Time": "15:30–17:00", "SessionID": 28, "Topic": "Motion Perception and Optical Flow", "Title": "Tuning flow parsing effects with Gabor patch stimuli", "Author": "Paul Warren", "CoAuthors": "Joshua Haynes, Rebecca Champion", "Abstract": "The flow parsing (FP) mechanism contributes to recovery of scene‑relative object movement during observer self‑movement and is thought to operate via global filtering (subtraction) of optic flow. FP‑consistent behaviour has been robustly demonstrated using optic‑flow fields composed of limited‑lifetime elements, but it remains unclear to what extent FP depends on low‑level stimulus attributes that are more precisely controlled in narrowband stimuli. Clarifying this dependency could provide insights for the neural implementation of FP.\n\nWe measured FP effects using hemifields of mini‑Gabor patches, providing oriented narrowband local motion signals. In a preliminary experiment, patch attributes were manipulated to signal movement towards elements either at a single depth or at random depths within the scene. 50 Gabor patches were sampled uniformly in the scene and oriented, as a function of location, to signal global expansion or contraction. In Same‑Depth (S) conditions, Gabor spatial frequency, diameter and depth were 3 cpd, 2° and 1m respectively. In Random‑Depth (R) conditions, depths were sampled randomly between 0.5 and 1.5 m and Gabor parameters were scaled appropriately with depth. Across conditions, patch speeds were consistent with forward or backward observer motion at 0.75 m/s. Participants made 2AFC leftward/rightward movement judgements for a probe presented 5° from central fixation, in the hemifield opposite the flow. Probe velocity was controlled by interleaved Kesten staircases and psychometric functions were fitted to the resulting data. FP was characterised by the bias in the point of subjective stationarity. \n\nFP‑consistent biases were observed in S and R conditions, but were larger for R, suggesting this stimulus provides more robust input to the FP mechanism. These results demonstrate that FP can be driven by local narrowband stimuli, offering a promising tool for probing low‑level computations and neural pathways underlying FP.", "SubmissionID": 385}, {"Day": "Monday", "Time": "15:30–17:00", "SessionID": 41, "Topic": "Computational Modelling and Neural Mechanisms", "Title": "Distinct ERP subtypes generalize across tasks and observers and are associated with endogenous EEG fluctuations, not stimulus encoding", "Author": "Lea Zamora", "CoAuthors": "David Pascucci", "Abstract": "Human perception and behavior exhibit structured fluctuations over time, often interpreted\nas reflecting latent internal states. Such states can be derived from both behavioral and neural\ndata, typically yielding a small number of recurring patterns, some of which generalize across\ntasks. However, the relationship between behaviorally and neurally defined states remains\nunclear, as neural states show inconsistent associations with behavior. Here, we addressed\nthree questions using a multitask EEG dataset (face and motion detection; VEPCON) and a\ntrial-clustering approach applied to single-trial ERPs. We tested whether neural states (1)\nrecur across tasks, (2) reflect differences in stimulus processing, and (3) are associated with\nprestimulus activity. Clustering revealed two states in each task. A state classifier trained in\none task generalized to the other, indicating that at least one state recurs across tasks with a\nstable topography. Despite marked differences in ERP morphology, we found no evidence for\ndifferences in stimulus processing: decoding, ERP components (e.g., N170), and mixed-model\nanalyses showed no consistent effects of state. In contrast, states were reliably associated with\ndifferences in prestimulus EEG activity, particularly in the location and magnitude of alpha\nbursts. Overall, these results suggest that neural states identified via trial clustering can\ngeneralize across tasks but are primarily linked to endogenous prestimulus fluctuations rather\nthan differences in stimulus-related processing.", "SubmissionID": 330}, {"Day": "Monday", "Time": "15:30–17:00", "SessionID": 41, "Topic": "Computational Modelling and Neural Mechanisms", "Title": "Evaluating Linear-Quadratic-Gaussian Models of Continuous Psychophysics Across Mouse- and Eye-Tracking Datasets", "Author": "Aleksandrs Koselevs", "CoAuthors": "Veronica Pisu, Ömer Yıldıran, Chloe Lam, Saivydas Villani, Pascal Mamassian, Dominik Straub, Constantin Rothkopf, Guido Maiello", "Abstract": "Continuous psychophysics is a successful paradigm  to estimate visual functions (Bonnen et al., 2015): using a target-tracking task, harder-to-see targets are tracked less faithfully. Tracking performance can be quantified from the peak, lag, and width of the cross-correlation between target and tracking velocities, but these measures are intercorrelated. Fitting a Kalman filter model to the tracking data yields a single observation-noise parameter, but, like cross-correlation parameters, it conflates perception with motor and cognitive factors. To address this issue, we fitted a Linear-Quadratic-Gaussian (LQG) model (Straub & Rothkopf, 2022) to estimate separate parameters for visual noise, motor noise, and cognitive costs. We analysed five datasets (Bonnen et al.’s original dataset plus four in-house datasets; pooled N=27) spanning mouse- and eye-tracking, with manipulations of visual and motor noise. LQG parameter estimates differed in magnitude between mouse- and eye-tracking datasets. Across the mouse-tracking data, intercorrelations between cross-correlation parameters and the visual noise parameter from the LQG model suggested that the visual noise parameter provided a reliable summary index of cross-correlation metrics (peak–noise: r=−0.32; lag–noise: r=0.44; width–noise: r=0.31; all p<.001). Eye-tracking data largely replicated this pattern (peak–noise: r=−0.34; lag–noise: r=0.47; all p<.05), with one exception: the relationship between width and visual noise was reversed (r=−0.27, p<.05). Surprisingly, despite these intercorrelations, the visual noise, motor noise, and cognitive costs parameters extracted from the LQG model did not consistently track the experimental manipulations of visual and motor noise imposed in our in-house datasets. Overall, our findings indicate that the LQG framework is promising and can be applied to different types of tracking data and experimental manipulations. However, our results also motivate extending the framework to incorporate more sophisticated models of motor control and decision making, to better partition tracking performance into perceptual, motor, and cognitive components.", "SubmissionID": 371}, {"Day": "Monday", "Time": "15:30–17:00", "SessionID": 41, "Topic": "Computational Modelling and Neural Mechanisms", "Title": "Temporal Dynamics of Structural and Semantic Information During Visual Neural Decoding", "Author": "Feyzanur Polat Kamis", "CoAuthors": "Anna Jasmine Kokino", "Abstract": "According to visual hierarchy theory, when we perceive an image, we first detect its contours and edges before accessing the high-level semantic content of the image. While this processing hierarchy is well established in the literature, the precise EEG time points at which structural and semantic information become separately decodable remain unclear. To address this gap, we investigated the temporal dynamics of structural, object-level, and semantic visual information decoding from human EEG recordings.\n\nWe used the THINGS-EEG2 dataset containing EEG recordings from 10 participants viewing 16,540 unique object images. For each image, we computed seven visual target representations spanning the processing hierarchy. Full-image and background-removed visual embeddings were obtained using CLIP (Contrastive Language-Image Pre-training), a vision-language model that encodes images into a rich semantic embedding space. For structural representations, we first extracted edge maps using DexiNed, a deep edge detection network. Rather than encoding these edge maps with CLIP, which we found produces nearly identical embeddings for all edge maps regardless of content, we instead applied HOG (Histogram of Oriented Gradients), that captures local gradient orientations directly from pixel values, yielding highly discriminative structural embeddings.Semantic embeddings were generated from BLIP-2 captions at scene and object levels. Separate MLP decoders were trained across six non-overlapping windows (0–800ms) and evaluated using zero-shot retrieval.\n\nPreliminary results show that decoding accuracy peaks between 100 and 300ms after stimulus onset. Structural HOG features show a directional advantage in early windows (100–200ms) relative to semantic targets, providing initial support for a temporal hierarchy, though the separation remains modest. Background context contributes minimally to decoding, with isolated object and full image conditions tracking almost identically. By the time of the conference, we aim to refine our decoding pipeline to further isolate these temporal stages, providing stronger empirical support for a hierarchical account of visual processing.", "SubmissionID": 394}, {"Day": "Monday", "Time": "15:30–17:00", "SessionID": 41, "Topic": "Computational Modelling and Neural Mechanisms", "Title": "Retinotopic specificity of the perceptual effects of focused transcranial ultrasound stimulation of the primary visual cortex", "Author": "Keanu Toomer", "CoAuthors": "Faye Pratas, Giorgio Ganis, Elsa Fouragnan, Julien Besle", "Abstract": "Non-invasive magnetic and electrical stimulation have been extensively used to investigate the causal role of visual areas in perception, yet their focal resolution remains insufficient to effectively dissociate neighbouring but functionally distinct regions of the visual cortex. Transcranial ultrasound stimulation (TUS) presents a novel opportunity to modulate neural activity of sub-regions within the early visual cortex with millimetre precision. While the neuromodulatory effects of TUS have been demonstrated by sonicating broad regions of the primary visual cortex (V1), the perceptual effects and spatial specificity of TUS within V1 remain unexplored. Here, we investigate whether TUS targeting a retinotopically defined sub-region of V1 produces a change in perception at a predicted location in visual space. Using structural and functional MRI, we create individualised full-field retinotopic maps by fitting population receptive field models and combining them with a surface-based Bayesian prior. We then model the acoustic propagation of ultrasound into retinotopically labelled V1 and project these results into visual space, allowing us to identify an \"active\" location predicted to receive the highest acoustic intensity, therefore the strongest perceptual effects, and a nearby \"control\" location in V1 predicted to receive negligible acoustic energy. Participants then complete a two-alternative forced-choice orientation discrimination task during neuronavigated TUS to V1, with stimuli presented at either the \"active\" or \"control\" location on each trial. TUS trials are interleaved with sham trials, accounting for TUS auditory confounds, in a double-blind design. We hypothesise TUS will produce measurable changes in orientation discrimination performance restricted to the \"active\" visual location predicted by our modelling. Pilot results are expected at the time of this poster presentation. In characterising the spatial specificity of TUS perceptual effects, this approach establishes a framework for future studies to dissociate the causal contributions of early visual areas to perception at an unprecedented scale for non-invasive neuromodulation.", "SubmissionID": 398}, {"Day": "Monday", "Time": "15:30–17:00", "SessionID": 41, "Topic": "Computational Modelling and Neural Mechanisms", "Title": "Suggestions that there is no visual binding problem ignore evidence", "Author": "Derek Arnold", "CoAuthors": "", "Abstract": "The visual binding problem refers to an apparent need to integrate information concerning different types of visual feature from signals spread across functionally specialised regions of cortex. In a seminal ECVP keynote address, Peter Lennie argued that the visual binding problem does not exist, as visual neurons tend to encode for multiple visual features in tandem, so there is no need to recombine the products of specialised visual analyses. Subsequent review articles have reiterated these arguments, and have reasserted that there is no visual binding problem. But these arguments have ignored key evidence of situations where the perceptual binding of colours and of movements fails, and where the wrong combinations of colour and of movement can become bound in perception. In this presentation I will demonstrate two such situations, and another two situations where specialised components of the human visual system promote different experiences of a stimulus that do not cohere, but rather engage in a perceptual rivalry. I will also point out that arguments against the existence of a visual binding problem have mis-characterised evidence of links between selective visual deficits and focal brain damage. Lennie’s contribution to vision science was seminal. It led to evidence suggesting that the visual binding problem is not the same problem that was once envisaged. However, ignoring evidence that substantiates the existence of occasionally erroneous perceptual binding processes will not make the binding problem go away. It would just mean that models and theoretical accounts of human vision are only partially informed", "SubmissionID": 412}, {"Day": "Monday", "Time": "15:30–17:00", "SessionID": 41, "Topic": "Computational Modelling and Neural Mechanisms", "Title": "Shape-based Figure-Ground Organization in Vision Transformers", "Author": "Matthias Tangemann", "CoAuthors": "Benjamin Lo, Zygmunt Pizlo, Kaleem Siddiqi, Dirk B. Walther, Sven Dickinson", "Abstract": "Separating figure from ground is a fundamental aspect of perceptual organization. In the human visual system, figure-ground o
