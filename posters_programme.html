t of vertical trajectory shift. These results add to existing support for the cognitive inference account of the illusion and show different outcomes for identity-based manipulations and spatial manipulations of the stream/bounce display.", "SubmissionID": 408}, {"Day": "Wednesday", "Time": "15:30–17:00", "SessionID": 4, "Topic": "Multisensory and Other Senses", "Title": "How action consequences induce regression to the mean", "Author": "Saskia Johnen", "CoAuthors": "Eckart Zimmermann", "Abstract": "We have shown previously that the perceived intensity of self-produced stimuli regresses toward the mean. Classic accounts of sensory attenuation research rely on movement and movement plans. However, this approach is confounded by co-occurring sensations like visual and tactile feedback when e.g. moving your arm towards a key to press it, which might distract attention from the produced stimulus. Here, we disentangle these components by isolating the factors of movement, prediction, and tactile feedback in order to differentiate between prediction and distraction by self-generation. Participants were asked to judge the loudness of two consecutive tones after either performing a movement to trigger the first tone, receiving a tactile stimulus during the presentation of the first tone, or experiencing both together. The results showed that predictability did not influence auditory regression; the effect was present regardless of whether the tone was predictable or not. The involvement of an additional action or stimulus was sufficient to produce the regression compared to a neutral baseline. In a second experiment, participants performed a similar task but received different levels of vibrotactile distraction while listening to the first tone. The results showed that the level of vibrotactile distraction influenced the regression: the stronger the distraction, the steeper the regression. We conclude that regression to the mean, expressed as sensory attenuation and enhancement, is driven by distraction and independent from movement planning. As a result of distraction, listeners become less precise and rely more strongly on their mean hearing level, which the regression indicates to be around 60 decibel.", "SubmissionID": 464}, {"Day": "Wednesday", "Time": "15:30–17:00", "SessionID": 4, "Topic": "Multisensory and Other Senses", "Title": "When self-generated touch is not just attenuated: Magnitude estimation reveals changes in perceptual sensitivity", "Author": "Hanna-Lena Boll", "CoAuthors": "Eckart Zimmermann", "Abstract": "Classical accounts for sensory perception propose that self-generated stimuli are perceived as weaker because of predictive forward models, whereas movement-related tactile gating leads to a general reduction in perceived intensity. However, most evidence is based on tasks where two stimuli are directly compared and do not address how perception changes across a broader range of intensities. Here, we used magnitude estimation to examine how self-generated and movement-related vibrotactile stimuli are perceived across multiple intensities. Participants performed goal-directed finger movements on a keyboard while receiving vibrotactile stimulation either during movement, at keypress on the active finger, or at keypress on the passive finger, alongside a no-movement baseline. The relationship between physical and perceived intensity was modelled using Stevens’ power law, allowing to dissociate changes in overall response level and sensitivity for intensity differences. Results reveal clear differences between conditions. Compared to the baseline condition, stimulation during movement resulted in reduced perceptual sensitivity. In contrast, both self-generated conditions showed increased sensitivity, with participants distinguishing more strongly between different intensities. Notably, this effect was most pronounced when stimulation occurred on the active finger. While stimulation during movement leads to a general reduction in perceived intensity, consistent with tactile gating, self-generated stimulation shows a different pattern. This challenges the idea that action-related perception is primarily characterized by attenuation. Instead, it suggests that the brain flexibly adjusts perceptual sensitivity depending on context. Rather than uniformly reducing self-generated input, the sensory system enhances differences when signals are behaviorally relevant and suppresses them when they are not. Our results point to a dynamic reweighting of sensory information, rather than a simple reduction of predicted input. The underlaying mechanism may support more precise sensorimotor behavior by enhancing the distinction between weaker and stronger sensory signals, therefore allowing for finer control and adjustments.", "SubmissionID": 465}, {"Day": "Wednesday", "Time": "15:30–17:00", "SessionID": 4, "Topic": "Multisensory and Other Senses", "Title": "Designing an SSEP-compatible redundant signals paradigm: Tag–target interactions shape multisensory effects", "Author": "Alex Backler", "CoAuthors": "Thomas Otto, Justin Ales", "Abstract": "Multisensory integration enhances perception and behaviour, often leading to shorter reaction times when multiple signals are presented simultaneously, a phenomenon known as the redundant signals effect (RSE). In many cases, multisensory speed-ups exceed predictions from statistical facilitation and violate so-called Miller’s bound, suggesting genuine cross-modal interactions. To enable future investigation of the neural mechanisms underlying this effect, we developed a novel RSE paradigm compatible with steady-state evoked potentials (SSEP). Auditory (noise sounds) and visual (Gabor patches) stimuli were frequency-tagged using amplitude modulation (sound) and phase modulation (vision), with tag frequencies counterbalanced (2.5 vs. 3.75 Hz). Behavioural targets were changes in carrier frequency and Gabor orientation. In a 2×2 design (n=19), targets were presented either synchronous or asynchronous with modality-specific frequency tags. Visual, but not auditory, responses were slower when targets were synchronous with their corresponding frequency tag. Critically, in multisensory conditions, this slowing increased the RSE and produced larger violations of Miller’s bound. To further probe this synchrony effect, a second experiment (n=20) manipulated visual tagging and target features. When phase modulation defined the behavioural target, unisensory response times were unaffected, and neither RSE nor violations of Miller’s bound were modulated. In contrast, when orientation changes served as targets alongside phase tagging, visual responses were selectively slowed, consistent with a masking-like interaction. These findings demonstrate that interactions between frequency tagging and target features can systematically bias behavioural measures of multisensory integration.  This highlights the importance of stimulus design in SSEP-compatible paradigms and identifies frequency tag–target combinations as a critical factor in studying the neural basis of multisensory processing.", "SubmissionID": 469}, {"Day": "Wednesday", "Time": "15:30–17:00", "SessionID": 4, "Topic": "Multisensory and Other Senses", "Title": "Processing of spatial and pitch auditory deviants in visually impaired children", "Author": "Chiara Ansaldo", "CoAuthors": "Carolina Tammurello, Helene Vitali, Claudio Campus, Monica Gori", "Abstract": "Human auditory system is highly sensitive to changes in the sound environment, enabling rapid detection of salient events through automatic and controlled attention. However, it remains unclear how early sensory experience, particularly reduced visual experience, influences the salience of auditory changes, especially for spatial localization. Individuals with visual impairment (VI) may exhibit enhanced auditory abilities due to cross-modal plasticity, raising the question of whether and how pitch and spatial features interacts.\n\nWe tested 22 children (13 sighted, mean age = 10.2 years; 9 VI, mean age = 9.52 years) using an active auditory oddball task with three deviant conditions: spatial, pitch, and combined (pitch+space). Behavioral performance was assessed using Signal Detection Theory measures (d′, criterion) and reaction times (RT) analyzed with generalized linear mixed-effects models (GLMMs). Neural activity was recorded with a 64-channel EEG system to examine event-related potentials (ERPs).\n\nA significant group x condition interaction for d′ (p = 0.005) showed that sighted children maintained comparable sensitivity across conditions, whereas VI children exhibited higher sensitivity in the combined condition compared to spatial condition (p = 0.003). RT analyses revealed a significant group x condition interaction (p = 0.007), driven by VI children responding faster in the combined condition compared to pitch condition (p = 0.002), while no significant differences were observed in sighted group. \n\nExploratory ERP analyses suggest possible group differences in early auditory components (P2a, P2b), whereas later components (P300) appear broadly comparable across groups.\n\nNo overall auditory advantages emerged for either group. However, these findings suggest that reduced visual experience may shape how auditory features contribute to perceptual salience and attentional guidance, particularly under conditions requiring multi-feature integration.", "SubmissionID": 485}, {"Day": "Wednesday", "Time": "15:30–17:00", "SessionID": 4, "Topic": "Multisensory and Other Senses", "Title": "The Dynamic Weight Illusion—A novel illusion revealed in immersive mixed reality", "Author": "Fabrizio Lepori", "CoAuthors": "Veronica Pisu, Vivian C. Paulun, Guido Maiello", "Abstract": "Humans can easily infer an object’s weight from both its appearance and its physical interactions with the environment. Alongside static cues such as size and material, dynamic cues (e.g. motion and deformation) provide informative evidence about mass, yet they are difficult to isolate and manipulate in real-world experiments. Here, we used immersive mixed-reality (MR) to examine whether visual deformation cues affect perceived heaviness under visuo-haptic conflict, and whether such effects resemble classic size- and material-weight illusions, where “lighter-looking” objects are perceived as heavier than identically weighted “heavier-looking” objects. In a preliminary Virtual Reality study, participants (N=22) provided vision-only weight ratings for virtual objects varying in size, material appearance, or dynamic interaction–depicted by animations of objects impacting and deforming a cloth surface to varying degrees. These ratings confirmed the expected ordering of heaviness judgments based on visual information and allowed us to select stimulus pairs that elicited comparable vision-only weight expectations in each condition. We used these selected pairs in a subsequent MR experiment where participants (N=21) lifted identical physical cubes via handles while viewing co-registered virtual counterparts. High-precision motion capture ensured accurate alignment between the physical objects and their virtual renditions during lifting, allowing manipulation of visual cues while physical mass was held constant. Smaller-looking objects were judged as heavier despite identical mass (p<.001), replicating the size-weight illusion. In contrast, material appearance did not produce a material-weight illusion (p=.718). Strikingly, dynamic cues produced an illusion in the opposite direction: objects that produced a larger cloth deformation were judged as heavier (p<.001). Our findings suggest that representations of object weight are qualitatively different when inferred from observed dynamics rather than size and material, leading to weight illusions in opposite directions.", "SubmissionID": 491}, {"Day": "Wednesday", "Time": "15:30–17:00", "SessionID": 4, "Topic": "Multisensory and Other Senses", "Title": "Interaction of Location and Frequency in Tactile Action Priming", "Author": "Mrunal Chavan", "CoAuthors": "Knut Drewing", "Abstract": "Touch research has typically treated mechanoreceptive channels as independent sensory filters (Bolanowski et al., 1988) and action control as operating on abstract spatial codes (Gallace & Spence, 2008). Here, we tested whether vibration frequency is integrated with location during tactile priming. Building on four-channel models that distinguish RA I and Pacinian pathways (Bolanowski et al., 1988), we presented suprathreshold vibrotactile primes (~0.2 RMS, 120ms) and targets (1.0 RMS, 120ms) at 40Hz and 240Hz. Prime and target were separated by a 250 ms interval, allowing them to be perceived as distinct events (Kuroki & Nishida, 2024). Participants performed a 2AFC localization task. Stimuli were delivered to ring and index fingers of the right hand, which defined the left and right target locations, respectively, and participants reported target location with spatially corresponding left/right keypresses using their left hand. Prime-target pairs were arranged in a 2×2 design crossing Location Congruency and Frequency Congruency. Reaction times were analysed with linear mixed-effects models and accuracy with generalized linear mixed-effects models. The critical effect was a robust Location Congruency × Frequency Congruency interaction, significant in both reaction time and accuracy, p<0.001, indicating violation of simple additivity between spatial frequency factors. Crucially, on same-location trials, prime and target frequency still interacted strongly in both reaction time and accuracy, p<0.001, demonstrating a within-channel advantage over cross-channel pairings; within-channel pairings were 30.8ms faster at 40Hz and 26.4ms faster at 240Hz. The reaction-time model further revealed a three-way interaction with target frequency, p=0.001, showing that tactile spatial priming is not channel-neutral, the binding effect differed across 40 and 240Hz targets: the efficiency of the spatial decision depends on the frequency relationship between prime and target. These findings suggest that a vibrotactile prime carries forward an integrated location and frequency trace, revealing that spatial and channel information are rapidly combined in touch.", "SubmissionID": 531}, {"Day": "Wednesday", "Time": "15:30–17:00", "SessionID": 22, "Topic": "Illusions and Imagery", "Title": "The role of volitional control in distinguishing mental imagery from perception", "Author": "Giulia Cabbai", "CoAuthors": "Nadine Dijkstra", "Abstract": "Perceptual reality monitoring (PRM), the ability to distinguish mental images from external perception, is known to be affected by imagery vividness. However, vividness is unlikely to be the only factor at play: hyperphantasics, who experience exceptionally vivid imagery, do not typically hallucinate. Here, we investigated whether volitional control is an additional determining factor of PRM by testing whether involuntary imagery is more likely to be mistaken for perception than voluntary imagery.\n\nWe developed a novel method to induce involuntary imagery in a controlled way. N=139 participants underwent a training session where sounds were repeatedly paired with specific images, leading to involuntarily experiencing these images when sounds alone were played. Participants then performed a task where sounds triggered associated images during concurrent presentation of congruent or incongruent visual stimuli, and indicated whether a stimulus was present (detection) and its identity (discrimination). A separate sample (N=64) performed the same task but voluntarily generated the images indicated by the sounds. \n\nThe paradigm successfully elicited involuntary conscious imagery in 83% of participants (as indicated by self-reports). Both imagery types led to more presence responses for congruent than incongruent trials, but crucially, this congruency effect was larger for involuntary imagery. Furthermore, this extended to discrimination responses, suggesting involuntary imagery more strongly affected not only whether but also what participants perceived.\n\nThese findings suggest that volitional control, alongside vividness, is a key determinant of PRM, which has important implications for understanding conditions characterized by involuntary imagery, such as PTSD and psychosis.", "SubmissionID": 23}, {"Day": "Wednesday", "Time": "15:30–17:00", "SessionID": 22, "Topic": "Illusions and Imagery", "Title": "Generative adversarial learning explains why imagination feels less real as we grow up", "Author": "Ataol Burak Özsu", "CoAuthors": "Nora Petrova, Tessa Dekker, Nadine Dijkstra", "Abstract": "Because sensory input is often incomplete and ambiguous, the brain uses prior experience to make educated guesses about what it is seeing. To do so, it develops internal models generating predictions about incoming sensory signals.  These same models can also generate sensory signals in the absence of input, through imagination. However, as generative models develop with age, it seems that our ability to generate vivid imaginations decreases rather than increases. In this work, inspired by a machine learning framework called Generative Adversarial Networks (GANs), we test the hypothesis that this paradox could arise from an interaction between the generative model and a separate reality monitor.\n\nGANs learn a generative model via an adversarial feedback loop with a discriminator. The discriminator learns to distinguish real images from generated images, while the generator learns to generate images that are realistic enough to fool the discriminator. We trained GANs on two different image sets and tracked the adversarial dynamics throughout training. Results show that in both datasets, early in training, low-quality generated images were more often misclassified as real compared to later stages, despite later images being more realistic.\n\nOur results suggest that, in early development, poor imagination may be more easily mistaken for reality because the reality monitoring system is underdeveloped. In later stages of development, although world models remain relatively stable, the reality monitoring system continues to improve, making imagery feel less real.\n\nFollow-up analyses provided concrete hypotheses about the development of world models and reality monitoring. In both datasets, the development of high-level visual features scaffolded the generation of low-level features in generated images. Additionally, the discriminator relied on representations distinct from those used in object classification for reality inferences.\n\nOverall, this framework explains key developmental phenomena and makes testable predictions about the development of imagination and reality monitoring.", "SubmissionID": 28}, {"Day": "Wednesday", "Time": "15:30–17:00", "SessionID": 22, "Topic": "Illusions and Imagery", "Title": "The Influence of Scene Context on Imagery-Perception Confusions", "Author": "Paz Bar-Tal", "CoAuthors": "Hugo Spiers, Marius Peelen, Nadine Dijkstra", "Abstract": "The scene context shapes how we perceive objects within it. When objects are ambiguous, we rely on scene information to identify them. Contextual expectations arise from our inner models of the world, enabling efficient action in our surroundings. However, contextual influences may extend beyond object identification. Our brain constantly updates predictions to make sense of the world, and these predictions may also shape what we judge as real versus imagined. Previous behavioral studies show that simultaneous imagery increases perceptual detection responses, suggesting imagery is sometimes confused for perception. Here, we asked whether scene context enhances this confusion. In two online experiments (N₁=98; N₂=73), participants detected objects that gradually appeared within congruent or incongruent scenes. In half of the blocks, participants simultaneously imagined the stimulus while detecting it and in the other half they only detected the stimulus. On every trial, participants gave a detection response and an imagery vividness rating. Both experiments showed a main effect of imagery, as well as an interaction between imagery and scene congruency on detection responses, suggesting participants were more likely to confuse imagery for perception when it was congruent with the scene. Computational modeling suggests that scene context increases the sensory strength of imagery, thereby increasing the likelihood it crosses a ‘reality threshold’. These results extend laboratory findings to ecologically valid settings and reveal that contextual expectations shape not only what we perceive, but also whether we judge it as real. This deepens our understanding of how the brain navigates the boundary between perception and imagination.", "SubmissionID": 29}, {"Day": "Wednesday", "Time": "15:30–17:00", "SessionID": 22, "Topic": "Illusions and Imagery", "Title": "Drawings of visual hallucinations vary systematically as a function of the parameters of hallucination-induction stimuli", "Author": "Trevor Hewitt", "CoAuthors": "Ethan J. Grove, Anestis Lalidis Mateo, Anil K. Seth, David J. Schwartzman", "Abstract": "Visual hallucinations occur across contexts ranging from psychedelic experiences to neurological disorders, yet their phenomenological structure remains difficult to characterize. Stroboscopic light stimulation provides a controlled means to rapidly induce vivid visual hallucinations under laboratory conditions. These hallucinations reliably include geometric forms theorised to reflect low-level visual processing in a manner similar to other low-level hallucinations. While this phenomenon serves as an experimental model of hallucinations that originate from lower-order brain regions, research has traditionally relied on verbal reports or rating scales that fail to capture their geometric complexity.\n\nTo address this, we developed and validated novel image-recreation methods in which participants use an interface to produce images of their visual hallucinations. Across three experiments with over 200 participants, we show that quantitatively measured low-level image features are reliably recoverable at the population level using these methods.\n\nWe applied this paradigm to establish a quantitative mapping between stroboscopic parameters and hallucinatory phenomenology across stimulation frequencies ranging from 2.5 to 80 Hz. Increasing frequency was associated with higher perceived brightness and reduced contrast, despite constant overall light luminance. We found that beta band stimulation (15 Hz) produced hallucinations which were higher in detail and complexity than other frequencies, challenging the long-standing notion that alpha-band stimulation maximises hallucination intensity. Further, we observed a broader repertoire of geometric forms than typically described in existing observations and computational models.\n\nAn improved characterization of the contents of visual hallucinations across contexts can provide new empirical constraints on how the functional architecture of the cortices constructs visual experiences in normal and altered states.", "SubmissionID": 100}, {"Day": "Wednesday", "Time": "15:30–17:00", "SessionID": 22, "Topic": "Illusions and Imagery", "Title": "Decoding imagination: Reading the mind’s eye", "Author": "Nina Rimorini", "CoAuthors": "Pinar Göktepe Kavis, Jean-Paul Calbimonte, Ruxandra I. Tivadar, Chantal Berna", "Abstract": "Mental imagery, i.e., a sensory experience occurring without external stimulation, has been shown to contribute to disorders such as post-traumatic stress disorder but also chronic pain and anxiety. It is a promising therapeutic target. While the neural mechanisms of mental imagery largely overlap with those of perception, the temporal dynamics of when and how a mental image might be elicited or changed remain underexplored. \n\nThis project aims to track complex mental imagery in healthy individuals using high-density electroencephalography (EEG) and multivariate pattern analysis. Currently, we seek to decode neural representations of imagined complex scenes under two conditions: structured imagery, prompted by a strict visual stimulus (Experiment 1), and less restricted imagery, prompted by a brief description (Experiment 2). \n\nSo far, five healthy adults (mean age ± SD: 27±2.5; 4 men), out of a planned sample of seventy, have completed both experiments. Each experiment consisted in 120-150 trials per scene category (family, nature, pipe), with a 3-sec prompt, a 3-sec imagery period and a 1000-1200ms inter-stimulus interval. \n\nPreliminary decoding results from data collected up to early August 2026 will be presented, including: (1) cross-validated decoding of visual stimulus data from Experiment 1 (e.g., decoding accuracy, confusion and temporal generalization matrices), and (2) decoding of mental imagery under varying degrees of restriction (Experiments 1 and 2) using classifiers trained on visual data from Experiment 1. Based on prior evidence of strong overlap between perception and imagery, we expect significant decoding of complex imagined scenes with these classifiers. \n\nThese results may indicate how information about complex scenes can be decoded from brain activity under varying degrees of control, and whether temporal EEG dynamics differ between perception- and imagery-based neural patterns. This approach will then be applied to a third experiment examining freely occurring imagery (i.e., people’s “happy place”) elicited by an auditory cue.", "SubmissionID": 102}, {"Day": "Wednesday", "Time": "15:30–17:00", "SessionID": 22, "Topic": "Illusions and Imagery", "Title": "Testing interference between visual imagery and perception in visual cortex", "Author": "Maëlle Lerebourg", "CoAuthors": "Marius V. Peelen", "Abstract": "Visual imagery relies on top-down activation of visual cortex representations that are also activated when perceiving these objects. However, most evidence for this comes from studies without any concurrent visual input, while such top-down signals would typically have to co-exist with simultaneous bottom-up input in daily life. Given their neural overlap, we hypothesized that concurrent imagery and perception can result in mutual interference, especially if the representations of imagined and perceived content are similar. To investigate competitive interactions within visual cortex, we asked participants to imagine or perceive objects from three real-world object categories (fruits, tools, crockery) on their own, or while other objects from one of these categories were simultaneously presented in the periphery. Using fMRI, we measured multivariate voxel activity patterns evoked by (1) imagery of a single object, (2) perception of a single object, (3) concurrent imagery and perception, and (4) perception of multiple objects. Our design allows us to investigate and quantify imagery-perception interaction across the visual hierarchy, and compare it to competition between multiple perceived objects. Preliminary analyses show that imagery in isolation evokes reliable neural activity resembling perception in early visual cortex. This imagery signal is, however, strongly reduced by concurrent visual input, even though the visually-presented objects were presented at a different retinotopic location than the imagined object. Further analyses will focus on comparing the effect of distracting visual input between early and higher-level visual regions and the effect of category-matching vs. mismatching visual input, shedding light on the interactions between bottom-up input and top-down signals in visual cortex.", "SubmissionID": 104}, {"Day": "Wednesday", "Time": "15:30–17:00", "SessionID": 22, "Topic": "Illusions and Imagery", "Title": "State-Dependent Neural Architecture of Mental Imagery: Insights from Hypnosis and NREM Parasomnias", "Author": "Ruxandra Tivadar", "CoAuthors": "Nina Rimorini, Amelia Morel, Geoffroy Solelhac, Chantal Berna", "Abstract": "Mental imagery (MI) is central to everyday human experience, and is progressively understood as part of the pathophysiology of different illnesses, including some sleep disorders such as non-rapid eye movement (NREM) parasomnias. Nevertheless, there are open questions about the neural underpinnings of naturally occurring MI processes, how these can be modulated (e.g. by hypnosis), and how these are affected by neuropsychological disorders. We hypothesized that the neural mechanisms of MI should change following a hypnotic induction, and should differ between healthy participants and patients with NREM parasomnias.\n\nWe measured electroencephalography (EEG) while people were engaged in a MI task (i.e. “happy place” MI), that we administered following or not a hypnotic induction to healthy participants and patients with NREM parasomnias. Patients completed the same task again after following a treatment using either hypnosis or standard of care (i.e. psychoeducation). \n\nAssuming that the brain can be considered a complex system, we applied measures of neural information content to quantify changes in hypnotic and non-hypnotic MI, as these measures have been previously shown to successfully describe human awareness and consciousness levels. In addition, microstate characteristics have also been found to vary with similar tasks (i.e. meditation, mind wandering) and neuropsychological disorders. We thus investigated whether measures of signal complexity, and microstate characteristics and their dynamics, change with hypnosis. \n\nIn healthy participants (N= 41), we found that brain complexity during MI changes with a hypnotic induction, but only for participants with medium susceptibility. Hypnosis modulates both state characteristics and dynamics of microstates, but susceptibility does not. Patients (N = 41) show drastically reduced complexity during MI when compared to controls, unaffected by suggestibility. Analyses are ongoing.\n\nThese preliminary results show that a hypnotic induction changes essential characteristics of brain processes involved in MI, and that these processes are impacted by disease.", "SubmissionID": 129}, {"Day": "Wednesday", "Time": "15:30–17:00", "SessionID": 22, "Topic": "Illusions and Imagery", "Title": "Feeling of Presence Is Associated with Interoceptive Accuracy and Multisensory Experiences under Sensory Deprivation", "Author": "Ayumi Ikeda", "CoAuthors": "Takahiro Kawabe", "Abstract": "Feeling of Presence (FoP) refers to the feeling that another intentional agent is present nearby when, in fact, there is no one else (Nenadalová & Řezníček, 2025). To better understand the factors associated with FoP, we examined how internal bodily information (interoception) and subjective sensory experiences are related to FoP. Participants performed a change-report task under sensory deprivation conditions, reporting perceived changes in the room using a lever to indicate the perceived intensity of environmental changes. The degree of lever tilt was used as an operational measure of FoP intensity, with greater tilt reflecting a stronger FoP. Despite no actual changes, participants reported perceived changes, and FoP intensity correlated with interoceptive accuracy (p < .05). After the task, participants completed a questionnaire in which they indicated the sensory modalities associated with their experience of FoP. Participants reported the perceived change through multiple sensory modalities: visual (20.8%), auditory (54.2%), skin sensations (50.0%), a general feeling (e.g., “it just felt that way”; 64.6%), and other modalities (6.3%). Participants also rated the intensity of perceived changes for each modality (1–100 scale). FoP intensity correlated with visual sensations (p < .001), skin sensations (p < .001), general feeling (p < .05), and overall perceived changes (p < .05). Additionally, interoceptive accuracy correlated with skin sensations (p < .05) and perceived changes (p < .05). A linear model revealed significant effects of skin sensations (p < .001), other modalities (p < .05), overall perceived changes (p < .005), and unusual experiences (p < .05) to FoP intensity. These findings suggest that FoP is associated with individual differences in interoceptive sensitivity and subjective sensory experiences, including hallucinatory-like perceptions. The observed correlations indicate that both internal bodily information and reported perceptual changes are systematically related to FoP under sensory deprivation.", "SubmissionID": 142}, {"Day": "Wednesday", "Time": "15:30–17:00", "SessionID": 22, "Topic": "Illusions and Imagery", "Title": "A visually anchored scale for visual imagery reveals dissociable perceptual dimensions and category-specific structure", "Author": "Heida Maria Sigurdardottir", "CoAuthors": "Dagur Árnason, Marelle Mäekalle, Vaka Vésteinsdóttir, Árni Gunnar Ásgeirsson", "Abstract": "Visual imagery varies widely across individuals, from aphantasia (no imagery) to hyperphantasia (highly vivid imagery), yet most measurement tools rely on verbal self-report with limited external anchoring. We introduce the Visual Imagery Visually Anchored Scale (VIVAS), which asks participants to reconstruct mental images of objects from six categories (animals, buildings, faces, food, manmade objects, and novel objects) along three perceptual dimensions (opacity, sharpness, and color saturation) using visually presented anchors. VIVAS was administered to a probability-based panel randomly selected from the National Registry of Iceland; 205 participants were included.\n\nVIVAS dimensions were highly related but not interchangeable: individual differences in color imagery reliably dissociated from those of opacity and sharpness; visual imagery may therefore partly separate into structural clarity and chromaticity. Imagery also differed systematically across categories. Novel objects elicited the weakest imagery, highlighting a central role for familiarity in shaping imagery strength. Food items showed selectively enhanced color imagery, consistent with the functional importance of color for evaluating edibility and with the overlap between food- and color-selective regions in visual cortex. Structural clarity showed minimal category specificity beyond familiarity effects.\n\nVIVAS total scores did not differ by gender, age, education, or device type, supporting robustness for online administration. VIVAS correlated moderately with the Vividness of Visual Imagery Questionnaire (VVIQ), well below the ceiling set by each instrument's reliability, and individual-level dissociations were striking: some participants scoring in the bottom 10% on one measure fell in the top quartile on the other. Verbal and visually anchored measures therefore capture complementary, and sometimes divergent, facets of imagery with implications for how aphantasia and hyperphantasia are defined and identified. These findings position VIVAS as a reliable, visually grounded complement to existing verbal questionnaires; it captures both overall imagery strength and meaningful dimension- and category-specific structure that standard self-report tools cannot easily assess.", "SubmissionID": 174}, {"Day": "Wednesday", "Time": "15:30–17:00", "SessionID": 31, "Topic": "Colour and Brightness Perception", "Title": "Revolutions Around a Hue Circle: Individual Differences in Steady-State Visual Evoked Potentials May Reveal Six Lobes and Complex Cardinal Opponency in Cortical Chromatic Coding", "Author": "David Peterzell", "CoAuthors": "", "Abstract": "Kaneko et al. (2025) analyzed individual differences in steady-state visual evoked potentials (SSVEPs) recorded occipitally in response to a flickering checkerboard swept around a cone-contrast hue circle. By examining inter-individual correlational patterns and applying nonmetric multidimensional scaling (NMDS), they identified lobes at six primary and four secondary hue positions, as well as four dimensional components. Building on that work, I argue here that five aspects of those results challenge simple opponent-process explanations and motivate new models of cortical color coding.\n\n1.  No simple opponency. Neither the correlational nor the NMDS components showed sidelobes appearing 180° opposite the test stimulus, and no dimension aligned cleanly with either cardinal axis.\n\n2.  Six primary lobes, separated by ~60°, were evident in the correlational patterns and first two NMDS dimensions, consistent with prior electrophysiological and psychophysical literature.\n\n3.  Four additional lobes emerged in the third and fourth NMDS dimensions. The 10 lobe positions coincide with the psychophysical hue-scaling components from Emery et al. (2023), with lobes spaced approximately every 30° in the full four-dimensional solution.\n\n4.  Complex opponency. All four dimensions show multi-lobe opponent structure with poles at non-complementary, non-cardinal hue angles.\n\n5.  Complex cardinal opponency. Three dimensions show a dominant peak at a cardinal hue direction, opposed by multiple non-complementary lobes.\n\nThese patterns raise fundamental questions: do the patterns observed in group data reflect genuine neural mechanisms within individual observers? Do these candidate neural codes influence color perception? I hypothesize that the answer is yes in both cases. Future work using masking paradigms can directly address the first; the second remains an open target for perceptual studies.", "SubmissionID": 296}, {"Day": "Wednesday", "Time": "15:30–17:00", "SessionID": 31, "Topic": "Colour and Brightness Perception", "Title": "Estimating L:M cone ratio with an objective SSVEP based version of the OSCAR test.", "Author": "Dana Turner", "CoAuthors": "Jenny M. Bosten, John D. Mollon, Anna Franklin, Ana Rozman", "Abstract": "Previous research has established that the ratio of long- to medium wavelength-sensitive cones in the human retina (L:M cone ratio) varies substantially between individuals. It is unclear how the retinal cone mosaic develops in early life and what environmental factors may contribute to variation in L:M cone ratio. Existing research has been limited to adults as methods typically involve heterochromatic flicker photometry (HFP), where the observer adjusts the relative intensities of two alternating lights until minimal flicker is perceived. One such test is the Objective Screening of Colour Anomalies and Reductions (OSCAR) test (Jordan & Mollon, 1997, Colour Vision Deficiencies XIII, Kluwer) which uses a unique waveform where red and green LEDs modulate their amplitudes in counterphase around a constant mean. This has the advantage that the stimulus appears a stable yellow throughout the range of counterphase modulation depths. However, the OSCAR test and other existing tests cannot be used with infants as infants are unable to make adjustments or report what they perceive.\n\nWe propose a novel method of measuring perceived flicker without a requirement for participant responses, using steady-state visually evoked potentials (SSVEPs) measured with electroencephalography (EEG). We measured SSVEPs from the occipital lobe in adult participants in response to a CRT-based version of the OSCAR test. Our CRT-based OSCAR test cycled through a range of possible depths of 26.67 Hz counterphase modulation of the red and green primaries. We derived L:M cone ratio estimates as the minima of SSVEP responses as a function of counterphase modulation depth. We discuss our preliminary findings and ways to maximise the efficiency of the method.  One future application of the method will be to use it to estimate L:M cone ratio in infants longitudinally to characterise cone ratio development.", "SubmissionID": 333}, {"Day": "Wednesday", "Time": "15:30–17:00", "SessionID": 31, "Topic": "Colour and Brightness Perception", "Title": "Food-selectivity and colour tuning curves in the ventral visual pathway", "Author": "Ian Pennock", "CoAuthors": "Chris Racey, Ana Rozman, Jenny Bosten", "Abstract": "Trichromatic vision is crucial for evaluating food objects. This seems to be reflected in the newly-discovered ventral food streams – these regions of the ventral visual pathway are both food-selective and colour-biased. However, it is not currently known how the neural representations of food and colour are connected in these regions. Are there colour tuning curves in the ventral food streams for canonically coloured objects (e.g., when an image of a banana is presented on a display do the ventral food streams show activation patterns shaped as a tuning curve centred around yellow)? We set up a 3T fMRI study to investigate whether there are food-specific colour tuning functions in the ventral food streams. Four participants took part in four 1h scan sessions. We identified food-selective regions by using a functional localiser: we showed participants images of food, faces, places and objects in grayscale and colour on a colour calibrated display. To measure putative colour tuning functions, each participant saw 2 food objects rendered in greyscale and in 5 different hues (original hue, and hue-rotated: -90°, -37°, 37° and 90°), where saturation and luminance were controlled. Food-colour stimuli were presented peripherally for 2s while participants performed a central 2N-back task. After the scan sessions, participants took part in two behavioural tasks to select typical food colours and rate the naturalness of the food objects. We found food-selective ROIs in the ventral visual pathway that also respond to colour (vs grayscale non-food objects). Our preliminary analysis of stimulus responses in the food-selective ROIs did not reveal consistent colour tuning curves. We speculate that the 2N-back task may have been too cognitively demanding to activate the neural representations of the food colours, especially when the food objects were presented in the periphery.", "SubmissionID": 357}, {"Day": "Wednesday", "Time": "15:30–17:00", "SessionID": 31, "Topic": "Colour and Brightness Perception", "Title": "Disadvantage of active visual search for a coloured target in immersive virtual environments", "Author": "Hamed Karimipour", "CoAuthors": "David Foster, Yan Lu, Boris Otkhmezuri, Kinjiro Amano, Paul Warren", "Abstract": "Everyday human vision typically involves active exploration of three-dimensional environments, with freedom to move and change viewpoint. Yet many perceptual judgments are still studied using simplified stimuli on computer displays in passive viewing conditions, with unclear implications for real-world performance in outdoor three-dimensional scenes. One way to investigate how viewing mode affects visual perception is through surface-colour judgments during target search in immersive virtual reality scenes. Twenty-two complex virtual reality scenes modelled on outdoor hyperspectral images were used to compare surface-colour matching under active and passive observation. On each trial, a swatch was presented whose colour was sampled from the selectable scene area, and participants attempted to find the surface from which it came. In the active condition, they stood in 3D scenes and could move their head and body to explore beyond the initial viewpoint of each scene, although both targets and selectable surfaces were restricted to the regions initially visible from that viewpoint. In the passive condition, participants were seated and viewed a virtual monitor displaying 2D screenshots of the regions, taken from the initial viewpoint of the corresponding active scenes. Twenty participants completed both viewing conditions, wearing a head-mounted display in each condition. A preliminary analysis showed that passive visual search was more accurate and somewhat faster than active visual search. These findings suggest that making viewing more realistic in immersive environments does not necessarily improve visual judgments. One possible explanation is that active viewing in those environments increases attentional demands, despite providing a more natural mode of observation.", "SubmissionID": 367}, {"Day": "Wednesday", "Time": "15:30–17:00", "SessionID": 31, "Topic": "Colour and Brightness Perception", "Title": "A systematic characterisation of steady-state visually evoked potentials as a function of contrast, spatial and temporal frequency and colour", "Author": "Ana a.rozman@abdn.ac.uk", "CoAuthors": "Lucy Somers, Jasna Martinovic, Jenny Bosten", "Abstract": "The human visual system transforms light into perceptual experiences of colour through a series of retinal and cortical processes. While early stages of colour information processing by the visual system are well characterised, cortical colour mechanisms remain less understood. Contrast sensitivity functions (CSFs), typically measured with behavioural psychophysics, have been widely used to describe how sensitivity to achromatic and chromatic contrast varies as a function of spatial and temporal stimulus properties. Steady-state visually evoked potentials (SSVEPs) can be measured as electroencephalography (EEG) signals at the temporal frequency of a modulating stimulus. Whilst SSVEPs are commonly used to address a range of questions about perception, attention and cognition more generally, our understanding of how low-level stimulus properties impact SSVEP amplitudes remains limited. This in turn limits the interpretability of results derived from SSVEPs. Specifically, SSVEP contrast response functions (CRFs) remain to be characterized in detail over a range of spatial and temporal frequencies and colour axes. We measured SSVEP-based CRFs for gratings varying systematically across colour axes (cardinal and intermediate cone-opponent axes and luminance), temporal frequencies (1.5–40 Hz), and spatial frequencies (0.15–7.5 cycles per degree). We present results from three participants and describe our process of optimising the signal-to-noise ratio (SNR) in our analysis pipeline. Our work provides a base for linking psychophysical CSFs with EEG-derived CRFs captured using SSVEPs. Systematic EEG-derived CRFs can be used to improve the design and interpretation of studies using SSVEPs to investigate visual perception.", "SubmissionID": 376}, {"Day": "Wednesday", "Time": "15:30–17:00", "SessionID": 31, "Topic": "Colour and Brightness Perception", "Title": "Effects of coloured lighting on perceived atmosphere", "Author": "Giulio Palma", "CoAuthors": "Jamie Cheeseman, Nicholas J. Kelley, Erich W. Graf, Christoph Witzel", "Abstract": "Architects, artists, and designers have long used coloured lighting to shape the atmosphere of scenes and artworks. The complex sensory, cognitive, and emotional nature of perceived atmosphere has been challenging to its scientific investigation. Nevertheless, we have previously shown in a series of online studies that associations between lighting colours and atmosphere in pictures are systematic, robust, and largely independent of depicted scene content. The results also suggested that colour–atmosphere relationships are categorical rather than based on gradual colour similarity. We thus investigated how different atmospheres are distributed across continuous colour space in a controlled laboratory experiment. Participants adjusted the chromaticity of lighting rendered in CIELAB to maximise atmospheres in pictures. This was done for 15 atmosphere descriptors across five AI-generated scenes designed to reflect different lighting applications. Results showed that participants associated atmosphere descriptors with similar colours as in the online studies. Consistent with the online studies, \"tense\" atmospheres (i.e., \"scary\", \"hostile\", and \"threatening\") produced associations with both red and green across observers. In this case, the average adjustment is not representative, as it corresponds to a colour between red and green that participants almost never adjusted for tense atmospheres. Therefore, we binned colour matches across participants to dissociate atmosphere similarity from colour similarity. Using principal component analysis, we mapped the atmosphere descriptors into a three-dimensional space defined by their colour associations. In this space, cognate atmosphere descriptors (e.g., cosy, calm, and relaxed) clustered, showing that colour-based similarities reflect relationships between atmospheres. Colour-based similarities between pairs of atmosphere descriptors were positively correlated between laboratory and online studies despite their methodological differences. Together, these findings show that coloured lighting systematically affects perceived atmosphere, and that these effects generalise across fundamentally different scenes. The resulting colour-based atmosphere space can guide manipulations of perceived atmosphere through coloured lighting in professional practice.", "SubmissionID": 407}, {"Day": "Wednesday", "Time": "15:30–17:00", "SessionID": 31, "Topic": "Colour and Brightness Perception", "Title": "Impact of Change in ipRGC Stimulation Levels on Process of Adaptation and Time Required", "Author": "Akari Kagimoto", "CoAuthors": "Tomoko Abe, Shino Okuda, Katsunori Okajima", "Abstract": "Recent reports have indicated that intrinsically photosensitive retinal ganglion cells (ipRGCs) affect color perception as well as brightness, suggesting that they may influence the chromatic adaptation process. \n\nTo identify the trends in the temporal changes in chromatic response under lighting conditions with varying levels of ipRGC stimulation, we prepared five lighting conditions only the level of ipRGCs stimulation varied while the luminance and chromaticity of the front wall were held constant. The experiment was conducted in the white-surfaced space equipped with two color-changing (RGB) luminaires and two tunable white LED luminaires. The luminance of the front wall was 105 cd/m2 and the xy-chromaticity values were (0.333, 0.333). A total of 20 different lighting scenarios were established by combining these five lighting conditions. After an initial 6-miniutes adaptation period under the first lighting condition, the lighting was switched to the test condition. Participants evaluated color appearance of the front of the wall under the test lighting conditions at intervals of 0, 10, 20, 30, 60, 120, 180, 240 seconds using the elemental color scaling method. The participants were three females in their twenties. It was shown that the saturation of the lighting decreased as a function of adaptation duration, but ipRGCs stimulation intensity was switched from low to high, the color appearance was greenish, conversely, when it was switched from high to low, the color appearance was reddish. It was also shown that except for one participant, the chromatic response returned to zero within 240 seconds under all lighting conditions. These results indicate that not only cones but also ipRGCs contribute to color perception and color adaptation.", "SubmissionID": 427}, {"Day": "Wednesday", "Time": "15:30–17:00", "SessionID": 31, "Topic": "Colour and Brightness Perception", "Title": "Can Colour Signal Urban Economic Status? The Role of Chromatic Information in Perceiving Urban Inequality and Wealth", "Author": "Shoaib Nabil", "CoAuthors": "Matthias Gobel, John Maule", "Abstract": "Economic inequality can harm social cohesion and interpersonal connectedness (Gobel & Carvacho, 2024). Inequality may be salient at different levels of urban geography and different levels of cognition. \n\nIn an earlier investigation, we examined whether low-level visual statistics of urban environments can signal economic conditions. We obtained a dataset of over 3,000 colour-calibrated GoPro images from London, and paired the locations with local economic data. We found that chromatic statistics including hue and brightness distributions, average chromaticity difference (Penacchio et al., 2023), and pixel-level greenness were strong predictors of Gini coefficient – an objective measure of economic inequality calculated at the neighbourhood level (Suss, 2023) - and median house price (Nabil et al., ECVP 2025).\n\nIn the present experiment, we asked whether viewers can successfully predict economic conditions from images, and how colour affected this judgment. Participants (N = 80) viewed our GoPro images presented as virtual tours of London streets. Following the prior evidence that colour could signal objective inequality, we presented both colour and greyscale versions of the same streets as a between-participant condition. We found that participants' perception of income inequality and overall wealth of neighbourhoods was unaffected by the removal of colour. Moreover, participants successfully predicted the relative wealth of the streets in both conditions, though their estimate of income inequality within a neighbourhood was inaccurate. Their responses on affective states, social engagement, ethnic diversity and perceived greenness provided further insights into how people perceive urban areas with varying economic conditions and varying visual statistics.\n\nThe combined results show that, although the economic conditions of modern urban environments may be predicted from their chromatic visual statistics, people are not tuned into this signal when they make socio-economic judgments based on street appearance alone. These results have implications for our understanding of how sensory information influences socio-economic judgments.", "SubmissionID": 500}, {"Day": "Wednesday", "Time": "15:30–17:00", "SessionID": 31, "Topic": "Colour and Brightness Perception", "Title": "Colour Effects on Facial Anger Perception: a Personalised Colour Paradigm with Neurodivergent and Neurotypical Participants", "Author": "Ruoxi Yin", "CoAuthors": "Jemima Unwin Teji, Peter Raynham", "Abstract": "Colour is a well-established modulator of emotion perception, with the red-anger link being the most consistently reported association. However, its mechanism remains debated, spanning physiological cues, semantic priming, and culturally learned associations. A further complication is that colour preference is highly individual, so paradigms using uniformly applied group-level colours (e.g., a fixed red) may lack explanatory power, particularly for neurodivergent (ND) individuals who differ in both facial emotion decoding and sensory processing.\n\nThis paradigm disentangles perceptual and individual-level factors in colour-driven emotion perception. Participants completed continuous trait measures (Autism Spectrum Quotient, Adult ADHD Self-Report Scale, Obsessive-Compulsive Inventory-Revised, Empathy Quotient) and a Farnsworth-Munsell 100 Hue test. Each participant then selected personal comfort and clarity colours by adjusting hue, chroma, and lightness. Four colour conditions were generated per participant: comfort, clear, opposite of comfort, and an achromatic (lightness-only) baseline.\n\nFace stimuli (FACES database) were preprocessed to retain only lightness information (L* channel), and each participant's selected a*b* values were applied to produce personalized L*a*b* stimuli. On each trial, two colour-conditioned versions of different faces were presented sequentially for 2 s each, followed by a forced-choice judgment of which appeared angrier. Each participant completed 72 trials, with face-colour pairings fully counterbalanced so that every face appeared in every colour condition. This design isolates colour effects from luminance confounds, dissociates contributions of hue, chroma, and lightness, and counterbalances group-level colour-emotion associations across participants.\n\nEight participants (4 ND, 4 NT) completed a pilot of this paradigm. Preliminary results suggest that faces shown in each participant's comfort colour were selected as angrier significantly less often than in other conditions, across both ND and NT participants. Exploratory patterns across ND trait scores and colour sensitivity suggest that variability in colour-driven emotion effects may track continuous individual traits rather than a categorical ND/NT distinction.", "SubmissionID": 524}, {"Day": "Wednesday", "Time": "15:30–17:00", "SessionID": 31, "Topic": "Colour and Brightness Perception", "Title": "Bright Is White: The Role of the Brightest Area Cue in Virtual Reality", "Author": "Rachel Gil Rodriguez", "CoAuthors": "Lara Karl, Karl Gegenfurtner", "Abstract": "The brightest region in a scene is a well-known cue for human colour constancy and is widely exploited in camera white-balancing algorithms under varying illumination. This principle is often referred to as the “bright is white” assumption, namely that the visual system treats the brightest relevant surface in a scene as a proxy for the illuminant. However, its relative contribution remains debated, in particular in complex and naturalistic environments.\n\nThis study investigates the role of the brightest area cue in colour constancy experiments, with a focus on how experimental design and scene complexity influence its effectiveness.\n\nA controlled 3D virtual environment was created using Unreal Engine and presented via a Varjo Aero headset. Building on prior findings, we hypothesised that the impact of silencing the brightest area cue depends on the availability of other cues. We designed a new scene containing multiple objects that convey the brightest area information, all consistently positioned within the participants’ field of view. Two conditions were tested: (1) a Baseline condition with all cues available, and (2) a Maximum Flux condition in which the brightest area cue was silenced. Illumination conditions included neutral, yellow, and blue lighting.\n\nWe observed a significant decrease in colour constancy performance in the Maximum Flux condition compared to the Baseline. This contrasts with prior work using more complex scenes where performance remained stable despite cue removal, but aligns with earlier studies employing simplified environments.\n\nThese results support the hypothesis that the contribution of the brightest area cue is strongly modulated by scene design and cue availability. When the white objects are large and relevant, silencing the cue reduces performance. This highlights the importance of experimental context in studying perceptual mechanisms and suggests that colour constancy relies on a flexible integration of multiple cues rather than a single dominant factor.", "SubmissionID": 550}, {"Day": "Wednesday", "Time": "15:30–17:00", "SessionID": 31, "Topic": "Colour and Brightness Perception", "Title": "A common framework for comparing brightness and contrast under spatial context", "Author": "Joris Vincent", "CoAuthors": "", "Abstract": "A surrounding region modulates both brightness and contrast perception, and gain control models have been proposed for both—suggesting a common underlying mechanism. Yet the two domains are rarely studied with the same methods and stimuli, making cross-domain comparison difficult. Perceptual scaling provides a common framework to address this. Perceived brightness and contrast can each be expressed as perceptual scales: functions of stimulus properties and contextual factors such as surround contrast or orientation. Maximum Likelihood Conjoint Measurement (MLCM) estimates such scales from pairwise comparisons, agnostic to stimulus domain—quantifying how each stimulus factor contributes to perception. Previously, we (Vincent, Aguilar, Maertens; ECVP 2024) established this using MLCM to measure brightness induction effects, showing it captures induction across a broad luminance range.\nHere, I extend perceptual scaling to contrast perception and its context effects. A high-contrast surround reduces perceived contrast—an effect known as surround suppression—and does so in an orientation-selective manner: parallel surrounds suppress more strongly than orthogonal ones. For achromatic gratings, perceptual scales show stronger suppression for parallel than orthogonal surrounds. For chromatic (red-green) gratings, I find the same pattern, but with an additional selectivity: color. A red-green surround suppresses a red-green center; a blue-yellow surround does not—regardless of orientation. Suppression thus requires the surround to match the center in both color and orientation simultaneously.\nCross-domain comparison also requires comparable stimuli. Surround suppression is classically measured with bipolar gratings; brightness induction with uniform fields. Intermediate stimuli—unipolar gratings and oriented noise textures—share the spatial structure of gratings but retain center-surround luminance differences, bridging the two domains. With shared methods and comparable stimuli, gain control model predictions become directly testable, opening the possibility of a single model class that predicts how context affects both perceived brightness and contrast.", "SubmissionID": 586}, {"Day": "Thursday", "Time": "09:00–10:30", "SessionID": 15, "Topic": "Ensemble, Numerosity, Texture, and Serial Processing", "Title": "Behavioural Training Fails to Reduce Plant Awareness Disparity in Numerosity Perception", "Author": "Enrico Pitocco", "CoAuthors": "Silvia Guerra, Andrea Ghiani, Marco Roccato, Ambra Perugini, Ines Haka, Marco Bertamini, Luca Battaglini", "Abstract": "Despite plants accounting for most of Earth’s biomass, humans systematically neglect them and underappreciate their ecological relevance. This phenomenon, termed Plant Awareness Disparity (PAD), extends beyond explicit attitudes or knowledge deficits to influence basic perceptual and cognitive functions, including numerosity estimation. Previous research shows that the number of plant stimuli is consistently underestimated compared to animals and inanimate objects. Whether this bias can be reduced through repeated task practice, however, remains an open question. In the current work, a total of 54 participants took part in five repeated testing sessions requiring rapid numerosity judgments of briefly presented arrays containing animal, mineral, or plant images. We examined category-specific changes in performance across sessions using mixed-effects modelling of estimation errors. Our results revealed a robust practice effect between the first and second sessions, indicating improved overall performance with repeated exposure to the task. Importantly, this improvement was not accompanied by any reduction in the plant-specific bias. Throughout all sessions, plant numerosities remained systematically underestimated compared with both animal and object stimuli. Taken together, our findings support the view that PAD reflects a more persistent feature likely rooted in semantic processing rather than in low-level perceptual constraints. Thus, interventions aimed at reducing PAD may be more effective if they focus on conceptual representations and understanding of the role of plants in the environment, rather than relying solely on repeated exposure or simple task practice.", "SubmissionID": 344}, {"Day": "Thursday", "Time": "09:00–10:30", "SessionID": 15, "Topic": "Ensemble, Numerosity, Texture, and Serial Processing", "Title": "Visual serial dependence in joint action contexts", "Author": "David Pascucci", "CoAuthors": "Jacopo Barbiero, Yuri Markov, Sandro Rubichi, Cristina Iani", "Abstract": "Serial dependence in perceptual decision-making has typically been studied in individual tasks, where observers are biased by the history of stimuli and responses they experience alone. Here, we investigated the role of social interaction by embedding an orientation reproduction task in a joint context. Pairs of participants viewed the same oriented stimulus, while the task to report the orientation was randomly assigned to one of them on each trial. We measured serial dependence bias and response precision as a function of whether the preceding trial was performed by the same observer, a human co-actor, or a computer. In a first experiment, we found dissociable effects of the joint context on bias and precision: while an attractive bias toward previous orientations was observed across all conditions, response precision increased when participants performed the task with a human co-actor compared to a computer. In a second experiment, we assigned different response tools to the observer and the co-actor to control for response-related effects. We replicated the increase in precision in the joint condition. Additionally, we found modulations of the bias due to the type of response tool only when the same observer acted on consecutive trials. These findings suggest that social interaction with a human co-actor leads to increased precision in stimulus encoding, while serial dependence operates across agents. In addition, a component of serial dependence linked to stimulus–response mapping appears to remain specific to the individual.", "SubmissionID": 377}, {"Day": "Thursday", "Time": "09:00–10:30", "SessionID": 15, "Topic": "Ensemble, Numerosity, Texture, and Serial Processing", "Title": "The Role of Feature Covariation in Serial Dependence", "Author": "Geoffrey Gallagher", "CoAuthors": "Brynjólfur O´Shea, Sabrina Hansmann-Roth", "Abstract": "Information from the past can bias our interpretation of the present. A commonly observed example of this is serial dependence, where current stimulus reports seem to incorporate features of prior stimuli. This effect has been observed across multiple stimulus dimensions, including orientation, facial identity, duration, and numerosity. Serial dependence might be so widespread because stimuli often do not change much over time, meaning that recent stimuli generally remain informative when interpreting ambiguous current stimuli.\n\nSimilarity of task-irrelevant stimulus features has been found to enhance serial dependence. For example, moving stimuli which are the same colour produce stronger serial dependence in motion direction judgements. Possibly because this similarity creates the impression of stimuli as persistent objects.\n\nHowever, real-world objects often exhibit more complex feature relationships, where multiple attributes covary. For example, an object’s apparent shape and colour may change together as a function of lighting or viewpoint. In such cases, covariation between features could signal meaningful change rather than stability. Thus, secondary features may not only promote perceptual continuity but also provide cues indicating changes in primary features.\n\nIn the present study we aimed to test the effect of secondary feature covariation on serial dependence. Participants completed an orientation reproduction task using Gabor stimuli whose colour either covaried systematically with orientation or varied randomly. We hypothesized that covarying secondary features might reduce serial dependence by acting as task-relevant cues which reduce stimulus uncertainty.\n\nPreliminary results indicate that feature co-variation reduces serial dependence compared to stimuli with uncoupled features. These results refine our understanding of the conditions under which serial dependence arises and highlight how feature relationships can modulate perceptual stability.", "SubmissionID": 386}, {"Day": "Thursday", "Time": "09:00–10:30", "SessionID": 15, "Topic": "Ensemble, Numerosity, Texture, and Serial Processing", "Title": "Perception of total length, mean size and numerosity of line segments", "Author": "Milo Toumine", "CoAuthors": "Frederic Devinck, Arash Sahraie", "Abstract": "The visual system efficiently extracts summary statistics from sets of objects, including mean size and numerosity. However, preliminary findings indicated that the total perceived length of sets of line segments is systematically underestimated, suggesting that cumulative magnitude is not directly perceived. Here, we tested whether the perceived total length (T) can be approximated by the product of perceived mean size (M) and perceived numerosity (N) for sets of n line segments.\n\nIn a within-subject design, 16 participants completed three blocked conditions where psychometric functions were obtained for the mean length (M), total length (T), and numerosity (N) of the test set containing 4, 8 or 12 (n) line segments.\n\nData were analysed using Generalized Linear Mixed Models (GLMMs). In the total length condition, points of subjective equality (PSEs) revealed a strong underestimation relative to the reference, increasing monotonically with n whilst precision (inverse of the just-noticeable difference, JND) degraded in parallel. In the mean length condition, PSEs indicated a moderate overestimation, with bias varying across values of n. However, precision remained stable, consistent with an efficient averaging mechanism. In the numerosity condition, PSEs showed underestimation at the smallest n, reduced and similar at larger values, with precision unaffected.\nThus, only total length showed a deterioration of both accuracy and precision with increasing n.\n\nThe multiplicative model failed to predict the observed biases in the total length condition, with the discrepancy growing with n, and tended to underestimate the observed JNDs.\nExtending previous studies on area perception to line segments, our results support a reliance on indirect, noisy computation rather than direct extraction of cumulative length.", "SubmissionID": 440}, {"Day": "Thursday", "Time": "09:00–10:30", "SessionID": 15, "Topic": "Ensemble, Numerosity, Texture, and Serial Processing", "Title": "Recent history attracts and repels perceptual decisions depending on surprise", "Author": "Aaron Kaltenmaier", "CoAuthors": "Clare Press", "Abstract": "Past sensory experience shapes our perceptual decision-making in the now. Popular models frame these effects as either attracted towards or repelled away from recent percepts. For example, after previously seeing a vertically-oriented edge, an attraction involves reporting off-vertical edges as more vertical and repulsion means seeing them as more horizontal. The last decade has seen different explanations for such intriguing dependencies, with some accounts highlighting a possible role for predictive processes – under the assumption that we predict the world should remain stable. However, present accounts are unable to explain what determines whether predictive influences are attractive or repulsive. We therefore turn to a new model that explains paradoxical serial dependence influences in terms of prediction. This ‘opposing processes’ model proposes that effects might turn from attractive to repulsive depending on the level of surprise elicited by the mismatch between predictions – in this case past events – and sensory evidence. We test this model on a large amount of recently-collated trial-by-trial data from 22 different orientation and motion direction continuous reproduction studies. Across the entire dataset, we show that our model outperforms previously-proposed alternatives. Specifically, our model uniquely accounts for the flip from attraction to repulsion according to the level of deviation between current and past events – attraction with small deviations and repulsion with larger discrepancies. We additionally show that this flip occurs with smaller deviations when there is higher perceptual precision, in line with a mechanism of strong counter-factual evidence leading to surprise-mediated repulsion. A final analysis predicts the amplitude and direction of trial-by-trial predictive biases on perceptual decision-making using Kullback-Leibler (KL) divergence. These findings thus account for apparently contradictory findings of serial dependence, including null results, and show how these contradictions may relate mechanistically to those found in the predictive processing literature.", "SubmissionID": 511}, {"Day": "Thursday", "Time": "09:00–10:30", "SessionID": 15, "Topic": "Ensemble, Numerosity, Texture, and Serial Processing", "Title": "Serial dependence across the visual field: perceptual stability without polar angle asymmetries", "Author": "Björk Wanjiru Reynisdóttir", "CoAuthors": "Gizem Tanseli Kaspar, Sabrina Hansmann-Roth", "Abstract": "The visual system integrates current inputs with past information to reduce noise and stabilize perception over time, a phenomenon known as serial dependence. Such integration often results in an attractive biases toward previously seen inputs, particularly under uncertain conditions. Uncertainty in visual perception is especially pronounced in peripheral vision due to retinal and cortical constraints. Consistent with this, prior work has demonstrated stronger serial dependence in the periphery compared to central vision. In addition, perceptual performance varies across the visual field, with known polar angle asymmetries favoring the horizontal over the vertical meridian and the lower over the upper visual field. However, the influence of these asymmetries on serial dependence remains largely unexplored. The present study aimed to address this by examining whether the polar angle asymmetries modulate the strength of serial dependence. Twenty participants performed an orientation adjustment task with stimuli presented above, below, left, or right of fixation at 9 degrees in the visual periphery. In addition, data from a separate study examining visual field asymmetries in an orientation averaging task were reanalyzed to extend these findings to serial dependence when summary statistics are extracted. Serial dependence was observed across all locations, but neither its magnitude nor response precision differed as a function of polar angle. In contrast, serial dependence was significantly stronger when consecutive stimuli appeared at the same spatial location, in line with previous findings of retinotopic specificity. At the same time, its persistence across locations suggests contributions beyond strictly retinotopic mechanisms. Together, these findings indicate that while serial dependence is not strictly location-specific, it is modulated by the location coherence between current and previous visual inputs.", "SubmissionID": 526}, {"Day": "Thursday", "Time": "09:00–10:30", "SessionID": 15, "Topic": "Ensemble, Numerosity, Texture, and Serial Processing", "Title": "Category-specificity in stimulus-history effects", "Author": "Irene Burgio", "CoAuthors": "Guido Marco Cicchini, Elisa Castaldi", "Abstract": "A coherent perceptual experience requires distinguishing, over time, information belonging to the same object from information signaling a new one. This balance between continuity and sensitivity to change relies on stimulus-history effects: perception can be attracted to prior input (serial dependence), promoting continuity, or repelled from it (adaptation), facilitating the detection of novel objects. If these mechanisms support segmentation, they should be tuned to features defining object identity. Color is a highly salient feature that segments the visual scene into meaningful categories. Within this structured environment, perceiving numerosity separately for each group provides information about resources and threats, guiding ecologically relevant behaviors. Accordingly, prior categorical context may modulate the strength and direction of stimulus-history effects in numerosity perception. Previous work showed that adaptation to high numerosities produces stronger underestimation when the subsequent stimulus shares the same color than when colors are incongruent. Here, we asked whether the same holds for other history effects. Twenty-two adults performed a numerosity estimation task. In two sessions, low and high numerosity ranges were associated with different colors (blue and green), followed by a third interleaved session preserving the numerosity–color mapping. In single-range sessions, responses expanded to cover the full response range. In the interleaved session, responses instead converged toward the global mean of the two numerosity ranges. Crucially, random interleaving created both category repetition and alternation streaks, enabling a direct test of how local categorical statistics shape stimulus-history effects. We observed attractive serial dependence at the 1-back lag, convergence toward neutrality at the 2-back lag, and a repulsive, adaptation-like effect at longer lags. Critically, short-lag attraction was category-independent, whereas long-lag repulsion emerged only under category repetition. These findings suggest that stimulus-history effects operate dynamically depending on temporal and categorical structure of the environment, with category-general attraction promoting continuity and feature-specific repulsion supporting differentiation.", "SubmissionID": 530}, {"Day": "Thursday", "Time": "09:00–10:30", "SessionID": 15, "Topic": "Ensemble, Numerosity, Texture, and Serial Processing", "Title": "Interaction between Metacognitive Factors & Biases In Visual Perception", "Author": "Daniil Grigorev", "CoAuthors": "Aysecan Boduroglu", "Abstract": "Serial Dependence (SD) is a sequential perceptual bias and captures influences of recent history on current visual percepts. While the low-level perceptual origins of SD are well investigated, its modulation by high-level metacognitive factors, e.g., confidence, is not as clear. In the current study, we investigated how local and global confidence judgments influence the magnitude of SD in a delayed orientation estimation task. We also examined whether the relationship between local and global confidence judgments is modulated by SD effects. Participants reproduced orientations of Gabor patches and rated both trial-based (local) and block-level (global) confidence across blocks varying in set size (3, 6, or 9). This design also allowed us to test whether global confidence estimates were directly impacted by local confidence and block set size. Contrary to existing evidence, we observed a serial dependence effect that was not modulated by local confidence judgments, both for the previous and the current target responses. In addition, global confidence showed no signs of a reliable SD effect. However, a serial effect was observed for metacognitive estimates themselves. Linear mixed-effects models showed that both previous confidence and current error independently predicted local confidence. Global confidence was influenced by prior global confidence estimates and block-wise error, but not set size. Taken together, these findings show the dynamic nature of metacognitive computation in relation to recent perceptual history. One's confidence can be predicted from one's own past at different levels, yet the evidence on how much this alters perceptual biases, as SD, is limited.", "SubmissionID": 541}, {"Day": "Thursday", "Time": "09:00–10:30", "SessionID": 15, "Topic": "Ensemble, Numerosity, Texture, and Serial Processing", "Title": "Serial dependence in ensembles depends on representation coherence", "Author": "Sabrina Hansmann-Roth", "CoAuthors": "Huginn Gunnarsson, Ingvar Helgi Árnason", "Abstract": "Serial dependence describes the attractive bias of current perceptual reports toward recently observed stimuli and is often interpreted as an adaptive mechanism that stabilizes perception over time. Previous work has shown that serial dependence increases under conditions of uncertainty, suggesting that observers rely more strongly on prior information when current sensory input is unreliable. However, most studies have examined single-item stimuli, leaving open how these principles generalize to ensemble perception, where observers extract summary statistics from multiple elements. While recent work has demonstrated serial dependence in ensemble representations, it re
