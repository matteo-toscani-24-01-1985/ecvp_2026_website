mains unclear whether variability within ensembles modulates the strength of this effect.\n\nHere, we investigated serial dependence in an orientation averaging task. On each trial, participants viewed nine oriented Gabors and subsequently reported the mean orientation. Ensemble variability was manipulated by varying the spread of orientations within each display. Contrary to predictions based on uncertainty alone, we found that serial dependence was stronger for low-variability ensembles and reduced for high-variability ensembles.\n\nThis effect cannot be attributed to stimulus similarity, as ensemble means were randomly sampled and did not differ systematically across variability conditions. Accordingly, average orientation differences between consecutive trials were similar for low- and high-variability ensembles. Instead, our findings show that variability modulates serial dependence in a manner that contrasts with previous accounts based on uncertainty. This suggests that temporal integration depends not only on uncertainty, but also on the coherence of the current ensemble representation. Low-variability ensembles may provide a more stable summary signal, allowing stronger influence from previous stimuli, whereas high-variability ensembles may yield less coherent representations, weakening temporal integration despite increased uncertainty.  In addition, our findings raise the possibility that, although uncertainty in single-object paradigms is known to modulate serial dependence, variability within ensemble representations may not be used to guide temporal integration in the same way.", "SubmissionID": 596}, {"Day": "Thursday", "Time": "09:00–10:30", "SessionID": 15, "Topic": "Ensemble, Numerosity, Texture, and Serial Processing", "Title": "", "Author": "Marika Constant", "CoAuthors": "", "Abstract": "Predictions are widely argued to modulate visual processing, both in terms of expectation suppression/surprise enhancement effects during stimulus processing, and in terms of pre-activated sensory templates prior to stimulus onset. However, the precise neural mechanisms, temporal dynamics, and feature-specificity of these effects have remained unclear, in part due to challenges in assessing them in humans in a temporally-resolved and feature-specific manner. Here, to address these challenges, we study the effects of predictability on bottom-up visual processing using magnetoencephalography (MEG) and Rapid Invisible Frequency Tagging (RIFT) —  an emerging method to track top-down modulation of early visual cortical activity. Participants view a continuous stream of snowflake-shaped stimuli composed of two overlapping symbols, a “+” and an “x”. Each trial consists of a pre-stimulus period in which the snowflake template is shown, followed by a stimulus period in which one symbol is highlighted relative to the other. Stimuli are presented in either a repeating rhythm (xx++) or an alternating rhythm (x+x+), with occasional violations creating expected and surprising events. The different rhythms allow us to control for the number of stimulus repetitions, disentangling surprise from low-level adaptation effects. The two symbols are invisibly frequency-tagged at different frequencies, enabling continuous, stimulus-specific tracking of cortical responses both during the pre-stimulus template period and during stimulus processing. With this approach, we can reveal precisely which feature information is modulated in early visual cortex by predictability and surprise, along with the temporal dynamics of those modulations. Together, these findings will clarify the neural mechanisms of visual expectation effects and demonstrate that RIFT can track feature-specific cortical modulations beyond covert spatial attention — opening the door to a much broader range of cognitive and perceptual phenomena.", "SubmissionID": 613}, {"Day": "Thursday", "Time": "09:00–10:30", "SessionID": 10, "Topic": "3D and Stereo Vision", "Title": "Seeing the Bias: Hemifield‑Dependent Remapping of Sensory, Sighting, and Acuity Eye Dominance", "Author": "Lujia Jian", "CoAuthors": "Dorita Chang", "Abstract": "Eye dominance may refer to sensory, sighting, and acuity dominance, yet their correspondence across the visual field is unclear. Here, we indexed these three dominance metrics across 17 visual field locations: the fovea and 16 locations at 3° and 6° eccentricities along 8 polar angles. Sensory dominance was indexed with a dichoptic motion coherence threshold task, sighting dominance with a pointing alignment task, and acuity dominance with a grating acuity task. Results revealed that along the horizontal and oblique meridians, both sensory and sighting dominance shifted from foveal dominance toward the left eye in the left hemifield and toward the right eye in the right hemifield. There were no shifts in sensory or sighting dominance along the vertical meridian. In contrast, acuity dominance exhibited weak overall magnitude and lacked systematic field-variations. Consistent with their spatial similarities, sensory dominance significantly predicted sighting dominance across the visual field, and this within-subject correlation was selective to the meridians exhibiting hemifield asymmetries. Acuity dominance showed negligible correlations with the other two metrics. We speculate that both sensory and sighting eye dominance tap into binocular combination processes at the primary visual cortex (V1), where the contralateral eye is weighted more strongly due to structural asymmetries across the visual pathway. In contrast, acuity dominance likely reflects monocular optical and retinal factors independent of binocular interactions, explaining its spatial invariance and weak correlations with other dominance metrics.", "SubmissionID": 292}, {"Day": "Thursday", "Time": "09:00–10:30", "SessionID": 10, "Topic": "3D and Stereo Vision", "Title": "Neural Signatures of Eye Dominance", "Author": "Dorita Chang", "CoAuthors": "Ka Yee Kam, Junyu Wang, Chenyi Qian, Lujia Jian, Qingzi Zheng, Xiaoyue Yang", "Abstract": "Eye dominance is a multifaceted phenomenon, yet it is often studied as a unitary construct. Using 3T fMRI, we examined whether the neural mechanisms underlying acuity (resolution), sighting (spatial/motor), and sensory (suppressive) dominance reflect shared or divergent processes. To isolate these mechanisms while controlling for visual input, we used identical orthogonal sinusoidal gratings (45/135 deg) across all experimental conditions. Sensory eye dominance was assessed under an event-related design, by presenting orthogonal gratings dichoptically to induce rivalry.  This allowed for the mapping of alternations between ‘dominant’ and ‘non-dominant’ eye percepts.  Acuity and sighting dominance were evaluated using a block design where gratings were presented monocularly to either the dominant or non-dominant eye.  Finally, observers were tested under binocular presentation wherein identical gratings were presented to both eyes.  In all conditions, participants were asked to indicate whether the perceived grating was tilted clockwise or counterclockwise.  By maintaining constant visual input and task demands across conditions, we dissociate the neural correlates of \"eyedness\" based on functional demand. In line with behavioural data from our laboratory, we find that eye dominance is not a unitary property of the visual system, but rather a dynamic, task-dependent allocation of neural resources across both early circuits (V1) – presumably reflecting interocular suppression – and across the dorsal and ventral streams.", "SubmissionID": 303}, {"Day": "Thursday", "Time": "09:00–10:30", "SessionID": 10, "Topic": "3D and Stereo Vision", "Title": "Examining the Role of Sensory Eye Dominance on Perceptual Memory", "Author": "Qingzi Zheng", "CoAuthors": "Dorita H. F. Chang", "Abstract": "Sensory eye dominance (SED) refers to preferential weighting of one eye’s information over the other. Here, we examined whether perceptual memory could be a functional advantage of SED. To index SED, we used two types of tasks: a rivalrous task that presented letters of opposite contrasts to each eye and an integrative task that involved the dichoptic presentation of coherent and randomly moving dots to the two eyes. To test perceptual memory, we presented two sine-wave gratings of random orientations sequentially and asked observers to remember the target (first) grating’s orientation while ignoring the second, distractor grating. Observers adjusted a white line to match their memory of the target grating’s orientation. Perceptual memory accuracy was quantified as an orientation error, calculated as the response angle minus the target‘s angle. We manipulated the distractor grating’s orientation, which could be different from that of the target grating in either the clockwise or the counterclockwise directions. We also manipulated which eye the target and the distractor gratings were presented to: they could be presented to both eyes, both to the dominant eye only, both to the non-dominant eye only, or one to each eye. We found that memory errors were biased by both the distractor’s orientation (e.g., clockwise distractors led to clockwise memory errors, and vice versa) and the eye to which the target and the distractor were presented to. Memory errors were smaller when the target and the distractor were presented to different eyes than when they were presented to the same eye, and this advantage was only found when the target was presented to the dominant eye. That is, the dominant eye exhibited reduced memory interference by a perceptually similar distractor.  The data suggest that SED affects the strength of encoding of information in perceptual memory.", "SubmissionID": 337}, {"Day": "Thursday", "Time": "09:00–10:30", "SessionID": 10, "Topic": "3D and Stereo Vision", "Title": "Effects of Focal Distance Mismatch in Binocular Displays on Visual Performance", "Author": "Daniel Spiegel", "CoAuthors": "", "Abstract": "Purpose: This study explores the impact of display focal distance (DFD) mismatch, defined as the difference in focal distances presented to each eye by a stereoscopic display, on visual performance. Understanding how DFD mismatch affects visual performance is critical for optimizing augmented reality (AR) and virtual reality (VR) systems, where mismatches in focal distance can disrupt depth perception and visual comfort.\n\nMethods: Thirty-nine participants with normal vision (monocular acuity >20/25, stereopsis <70 arcmin) performed a visual discrimination task using four Landolt Cs. The experiment systematically varied DFD mismatch between 0.0D and 2.0D, simulating different focal distances for each eye. The nominal (mean) DFD was kept at 1.0D. Our task relied on binocular fusion and focus latency, a metric sensitive to both binocular fusion and focus, measured via AEPsych adaptive sampling. The latency values were normalized to baseline (0.0D DFD mismatch). Both AR and VR conditions were tested, with DFD mismatch applied only to the stimulus (AR) or both stimulus and background (VR).\n\nResults: Increasing DFD mismatch resulted in significant declines in visual performance, with the latency increasing by ~200ms (~35–40%) at 2.0D mismatch. Cumulative distribution analysis showed that a DFD mismatch of 0.25D or less caused minimal performance impact (<10% in <5% of participants), consistent with clinical guidelines. The effect was similar across AR and VR conditions. These findings can inform product design: maintaining DFD mismatch ≤0.25D in AR/VR devices minimizes perceptual risk and supports optimal user experience.", "SubmissionID": 406}, {"Day": "Thursday", "Time": "09:00–10:30", "SessionID": 10, "Topic": "3D and Stereo Vision", "Title": "Concurrent Use of Visual Information from Different Horizontal Directions with Independently Controlled Binocular Viewing", "Author": "Yasunobu Katsumata", "CoAuthors": "Norihito Yamada, Yasuyuki Inoue, Takayoshi Hagiwara, Michiteru Kitazaki", "Abstract": "Human observers normally rely on coordinated eye and head movements to obtain visual information outside the current field of view. If the horizontal viewing directions of the two eyes are controlled independently like as chameleon, visual inputs from different directions can be made available at the same time. However, when different scene information is presented to the two eyes, interocular conflict may induce binocular rivalry or suppression, limiting the effective use of information from both views. It therefore remains unclear whether spatially separated visual information can be used concurrently under independently controlled binocular viewing. We examined this question in a virtual reality experiment with 24 participants. The experiment used a 2 x 2 within-subjects design. Viewing control was either head-only viewing or head movement combined with independent control of the two eyes using an analogue stick. Task condition was either a single visual search task or a dual task combining the same search task with an additional frontal reaction task. In the search task, participants searched for targets appearing around the observer and reported the number displayed on the target surface. In the reaction task, they responded to a color change in a frontally presented object. Reaction times in the frontal reaction task were significantly shorter with independent binocular control than with head-only viewing. This reduction was not accompanied by an overall increase in search time. Search time also showed no main effect of task, indicating that adding the frontal reaction task did not produce a significant overall cost in search performance. These results do not demonstrate fully parallel processing of information from different directions. They suggest, however, that independently controlled binocular viewing can allow observers to use spatially separated visual information concurrently in a way that improves frontal reaction performance without an overall decrement in visual search.", "SubmissionID": 419}, {"Day": "Thursday", "Time": "09:00–10:30", "SessionID": 10, "Topic": "3D and Stereo Vision", "Title": "Contributions of internal noise and efficiency to the stereoscopic anisotropy", "Author": "Ichasus Llamas-Cornejo", "CoAuthors": "Ignacio Serrano-Pedraza", "Abstract": "A well-known anisotropy exists in human stereopsis: the visual system exhibits higher sensitivity to horizontal sinusoidal disparity corrugations at low spatial frequencies than to vertical corrugations. The underlying mechanism, cortical locus or functional role of this effect remains unclear. Various theories have attempted to explain it through the size of summation fields or the number of available channels, but none provides a clear explanation. In this study, we used a noise masking paradigm to isolate and quantify the roles of internal noise and processing efficiency in the anisotropy. We measured disparity thresholds at four spatial frequencies (0.1, 0.2, 0.4, and 0.8 cpd) masked by white noise of different power densities using a Bayesian staircase procedure. As predicted, detection thresholds increased as a function of noise power. Fitting an equivalent noise model to the threshold data revealed that the horizontal mechanism's performance advantage is driven by both a reduction in internal noise and a higher efficiency relative to the vertical mechanism. Interestingly, while efficiency reached its maximum at 0.2 cpd for both orientations, the horizontal mechanism maintained higher efficiency across all spatial frequencies tested. Our data provide strong evidence for orientation-specific mechanisms in disparity computation, demonstrating that internal noise is a key contributor to the observed stereoscopic anisotropy.", "SubmissionID": 432}, {"Day": "Thursday", "Time": "09:00–10:30", "SessionID": 10, "Topic": "3D and Stereo Vision", "Title": "SimpleStereo: Keeping Stereo Vision in Retinal (vs World) Coordinates + QualiaNet: An Experience-Before-Inference Network", "Author": "Paul Linton", "CoAuthors": "", "Abstract": "We present two computational models – SimpleStereo and QualiaNet – which reflect the two stages – Experience and Inference – of visual processing on our account. 1. EXPERIENCE: SimpleStereo models our visual experience of stereo vision as a retinal disparity map relative to fixation. This keeps stereo vision in retinal (rather than world) coordinates, and rejects the idea that stereo vision is attempting to reconstruct 3D geometry. SimpleStereo departs from traditional models of stereo vision in three fundamental ways: First, it keeps stereo vision in absolute (vs relative; Parker, 2007) disparity, since depth being nearer vs. further than fixation is a fundamentally different visual experience. Second, it rejects thinking of stereo matching in terms of a geometric “correspondence problem” (Marr & Poggio, 1979). Instead, stereo vision fuses whatever is on the two foveae, and then depth from disparity radiates outwards from that initial retinal anchor. Third, it rejects depth from disparity as geometric reconstruction. Instead, the Linton Stereo Illusion demonstrates that depth from disparity is simply a linear function of retinal disparity. Pilot data suggests z = 5.4x, where x is disparity, and z is the x-axis angular size match (in degrees) of the perceived z-axis depth. The resulting model of stereo vision transforms our understanding of visual space from a fully articulated 3D space, to fixation plus nearer/further than fixation. 2. INFERENCE: QualiaNet seeks to infer the 3D world based on this impoverished model of visual space. On our account, stereo vision does not provide us with absolute distance. Instead, we infer absolute distance based on “a cognitive association between (a) vivid stereo depth and (b) closer distances (reflecting our experience of an environment where disparity falls-off with distance2)” (Linton, 2018). We demonstrate that a CNN (QualiaNet) can learn to accurately estimate absolute distance based simply on a disparity map relative to fixation.", "SubmissionID": 569}, {"Day": "Thursday", "Time": "09:00–10:30", "SessionID": 10, "Topic": "3D and Stereo Vision", "Title": "Investigating the detection and discrimination of perceived depth from disparity with stimuli that target either local or global stereopsis", "Author": "Tara Nichols", "CoAuthors": "Alex Baldwin", "Abstract": "Some individuals with otherwise normal vision have been found to exhibit deficits in stereopsis. The reported prevalence of this “stereo-anomaly” varies from 2% to 30% and seems to depend on the stimulus and task design. Recent work (Baldwin et al. 2024, iScience 27:109879) found 17% of individuals who could detect a disparity-defined target in a spatially bandpass random dot stereogram (RDS) could not discriminate the direction of disparity (with a further 14% simply having more difficulty with the discrimination task). In this study, we set out to determine whether the deficit identified in global stereopsis (with bandpass RDS stimuli) would transfer to the case where targets are shown in local stereopsis (bandpass circles). We recruited 25 adults with normal vision and measured stereoacuity thresholds across four tasks: local detection, local discrimination, global detection, and global discrimination. In each of our tasks, disparity was controlled by a pair of interleaved staircases. Stereoacuity thresholds were obtained by fitting a psychometric function. Comparing the two stimulus types (local and global) and tasks (detection and discrimination) using a linear mixed-effects model, we found thresholds were significantly higher (≈2×) for local stereopsis compared to global stereopsis. There was no significant effect of task. In contrast with Baldwin et al (2024), we did not find any participants were unable to perform the global discrimination task, though the distribution of the discrimination/detection threshold ratios was bimodal. Three individuals had specific difficulty with the local discrimination task, to the extent that thresholds could not be estimated from their data. The stereo-anomaly evident in our data is milder than that reported in previous studies. We consider this may be due to subtle differences in stimulus and task design, and in the method used to present dichoptic stimuli (polarisation here, compared to anaglyph in some previous work).", "SubmissionID": 573}, {"Day": "Thursday", "Time": "09:00–10:30", "SessionID": 10, "Topic": "3D and Stereo Vision", "Title": "", "Author": "Frederick  A.A. Kingdom", "CoAuthors": "", "Abstract": "fred.kingdom@mcgill.ca", "SubmissionID": 611}, {"Day": "Thursday", "Time": "09:00–10:30", "SessionID": 27, "Topic": "Perception and Action", "Title": "Visual Awareness and Action: Testing Dual-Task Immunity in Online Motor Corrections to Unperceived Changes", "Author": "Didem Taskiran", "CoAuthors": "Frederic Göhringer, Thomas Schenk", "Abstract": "Humans often act in dynamically changing environments that require rapid motor adjustments, and the motor system is capable of modifying ongoing actions in response to unperceived changes. Goodale et al. (1986) demonstrated that participants could adjust their pointing movements to compensate for targets that were displaced during saccadic eye movements, even though they were unaware of the displacement. The current study examines whether such adjustments remain robust under cognitive load and systematically tests whether target shifts truly go undetected. Participants perform pointing tasks with gaze-contingent target shifts, under single- and dual-task conditions. In this paradigm, the target is displaced during a saccade and due to visual sensitivity being highly reduced during saccades (known as saccadic blindness), these displacements typically go unnoticed. To test whether the motor system is immune to the dual-task interference, eye and hand movement parameters were compared between single- and dual-task conditions. Results showed clear dual-task interference in primary saccades, which were slower (as measured by reaction time and peak velocity) and less accurate in the dual-task condition. This reduction in performance was subsequently compensated by larger and more frequent secondary saccades. Additionally, the increase in pointing errors as a function of target displacement amplitude was steeper in the dual-task condition. Finally, a separate two-alternative forced-choice (2AFC) task which measured perceptual awareness to target displacements, revealed chance-level performance across most displacement magnitudes, with above-chance performance only for the largest displacement in the direction of the saccade. Overall, the findings suggest that increased cognitive load disrupts online motor corrections to environmental changes, even when perceptual awareness of those changes is limited.\n\nGoodale, M. A., Pelisson, D., & Prablanc, C. (1986). Large adjustments in visually guided reaching do not depend on vision of the hand or perception of target displacement. Nature, 320(6064), 748-750.", "SubmissionID": 340}, {"Day": "Thursday", "Time": "09:00–10:30", "SessionID": 27, "Topic": "Perception and Action", "Title": "The role of vision in the size-weight illusion", "Author": "Franz-Peter Schwarzacher", "CoAuthors": "", "Abstract": "The size-weight illusion (SWI) – smaller objects are perceived as heavier than larger objects of equal mass – remains incompletely understood despite over a century of research (Nicolas et al., 2012). Building on Buckingham and Goodale (2010), the present study examined the contribution of online visual feedback to sensorimotor and perceptual manifestations of the SWI.\n\nParticipants lifted three cubes of different size but identical mass, while grip and load forces were continuously recorded via a force transducer. A between-subject design was employed across three vision conditions, differing in the degree of visual information available during lifting: full vision (unobstructed view of both object and sensor), only early vision (neither object nor sensor visible during lifting), and sensor only vision (sensor visible; object occluded). Visual access was manipulated using LCD-goggles and a physical occlusion cover.\n\nForce analysis revealed comparable grip and load force profiles under full-vision and sensor only vision conditions. In contrast, complete visual occlusion during lifting resulted in globally elevated grip and load forces, indicating a greater reliance on conservative force estimates in the absence of any visual feedback. Critically, these findings demonstrate that appropriate anticipatory force calibration can be achieved without direct visual access to the object during lifting. With respect to perceptual outcomes, both the occluded and limited-vision conditions were associated with an attenuation of the perceptual SWI relative to full vision, implicating visual feedback as a modulatory factor in the conscious experience of the illusion.\n\nBuckingham, G., & Goodale, M. A. (2010). Lifting without seeing: The role of vision in perceiving and acting upon the size weight Illusion. PLoS ONE, 5(3), 3–6. https://doi.org/10.1371/journal.pone.0009709\n\nNicolas, S., Ross, H. E., & Murray, D. J. (2012). Charpentier’s papers of 1886 and 1891 on weight perception and the size-weight illusion. Perceptual and Motor Skills, 115(1), 120–141. https://doi.org/10.2466/24.22.27.PMS.115.4.120-141", "SubmissionID": 351}, {"Day": "Thursday", "Time": "09:00–10:30", "SessionID": 27, "Topic": "Perception and Action", "Title": "Quantifying the impact of monocular visual blur on control of upper-limb movements in virtual reality", "Author": "Niamh Wragg", "CoAuthors": "Billy Hargreaves, Rachel Coats, Carlo Campagnoli", "Abstract": "Accurate reach-to-grasp movements are necessary for everyday tasks and rely on binocular visual information to support visuomotor planning and online control. Previous research in real-world environments have demonstrated that monocular visual blur alters reach-to-grasp kinematics, evidenced by reduced movement speed and impaired grasp accuracy. However, research identifying thresholds at which this occurs, as well as the extent of individual differences in visuomotor function, remain limited.  \n\nWe sought to identify the threshold at which monocular visual impairment begins to impact the planning and execution of prehension. We conducted experiments in virtual reality (VR), which offers a platform for the precise manipulation of visual input, including the ability to tailor visual blur to each individual or experimental condition, and allows for the efficient switching between conditions. We investigated the threshold of motor impairment by degrading vision monocularly at 5 levels of increasing blur. Participants were required to reach, grasp, and lift a virtual object, which was calibrated with a real-world object to ensure accurate haptic feedback while grasping. Upper-limb kinematics were quantified using motion capture to assess markers of movement planning and execution, such as reach velocity, grip aperture and deceleration time. We hypothesised that movement kinematics will be increasingly impacted with greater severity of monocular visual blur. We predicted slower movement velocities and altered grip aperture scaling, reflecting changes in visuomotor planning and control. Preliminary results showed increased movement time, lower peak velocities and altered grip aperture scaling under stronger blur.  \n\nThis study improves our understanding of the visual threshold at which monocular visual impairments impact motor planning and control and may inform clinical thresholds for intervention for individuals with monocular visual impairments. Future research may provide insight into how VR may be utilised in the development of cost-effective and accessible at-home visual interventions and further non-clinical research on visually-guided action.", "SubmissionID": 384}, {"Day": "Thursday", "Time": "09:00–10:30", "SessionID": 27, "Topic": "Perception and Action", "Title": "Shape-related biases in volume and weight perception", "Author": "Veronica Pisu", "CoAuthors": "Erich Graf, Wendy Adams", "Abstract": "In the shape-weight illusion, objects are perceived as lighter or heavier depending on their shape. For example, spheres are perceived as heavier than tetrahedrons of matched weight and volume. Opposite biases occur in size perception: spheres appear smaller than volume‑matched tetrahedrons. If perceptually smaller objects are perceived as heavier, this pattern would be consistent with the size-weight illusion, whereby the smaller of two weight‑matched objects feels heavier. However, perceived size alone does not account for the shape-weight illusion across all shapes, and surface area has been proposed as an alternative predictor of perceived weight. Alternatively, a 'sensorimotor mismatch' could contribute to the illusion, whereby forces misapplied based on perceived size may influence perceived weight. For example, objects that appear larger may be grasped with excessive force and consequently be perceived as lighter. We measured the shape-weight illusion using four shapes (sphere, tetrahedron, cuboid, and H‑shape; presented in three sizes), chosen to decorrelate perceived volume and surface area. Thirty participants provided magnitude estimates of object volume in a visual task and of object weight in a visuo‑haptic lifting task. Objects were lifted via a handle equipped with force-torque transducers to record grasping forces and torques. We observed clear shape‑related biases: cuboids and spheres were perceived as the largest and smallest shapes, respectively; spheres and tetrahedrons were perceived as the heaviest and lightest. Thus, there were discrepancies between size and weight biases, but these were not explained by surface area. Additionally, we observed systematic differences in grip force and torque, but found no evidence for a sensorimotor mismatch. Instead, force patterns were aligned with shape‑dependent stabilisation requirements during lifting. We propose that sensorimotor factors related to grasp stability – such as grip force and torque during lifting – may contribute to the shape-weight illusion alongside perceived volume.", "SubmissionID": 399}, {"Day": "Thursday", "Time": "09:00–10:30", "SessionID": 27, "Topic": "Perception and Action", "Title": "Visually-guided human grasping behaviour with fully articulated hands", "Author": "Frieder Hartmann", "CoAuthors": "Guido Maiello, Giacomo Aldegheri, Christian Houborg, Fabrizio Lepori, Constantin A. Rothkopf, Roland W. Fleming", "Abstract": "Humans possess a remarkable capacity to grasp and handle objects. To achieve this seemingly effortless task, we need to visually select appropriate contact regions on the surface of the object and shape the multiple joints of our hand accordingly to reach a stable grasp. Despite the wide range of possible grasps in everyday behaviour, most research has been conducted under highly constrained conditions, often emphasizing precision grip grasps and reducing hand-object contact to mere points rather than extensive regions. Here, we aimed at characterizing human grasps under more natural conditions by removing these constraints and allowing for full articulation of the hand. Our contribution is two-fold: First, we developed a method to measure contact regions on hands and objects by combining components from deep learning, motion tracking and computer graphics to reconstruct a full 3D mesh of the hand and object from video data, which allowed analyses of both hand poses and hand-object contact. Then, we collected a comprehensive dataset (N=40) of human grasping behaviour featuring a wide variety of objects and tasks across multiple sessions. First, participants pantomimed grasps from a standard taxonomy of 33 grasp types. Second, participants each grasped 14 (out of total of 28) objects with (1) precision grip (2) multi-digit and (3) unconstrained conditions. Third, we examined the influence of the task which participants performed with the object (use; hand over; turn horizontally; turn vertically; heft). Our results showed that participants rarely used precision grip, yet they were highly consistent in their grasping strategies, which manifested in consistent contact regions and highly stereotyped hand poses across repetitions and participants. Our findings both demonstrate a novel way to measure hand-object contact during grasping and extend our insights into grasping behaviour to more naturalistic scenarios.", "SubmissionID": 468}, {"Day": "Thursday", "Time": "09:00–10:30", "SessionID": 27, "Topic": "Perception and Action", "Title": "How visual and auditory cues affect preferred distances in human-drone interaction", "Author": "Elisabeth Wögerbauer", "CoAuthors": "Christoph von Castell, Heiko Hecht", "Abstract": "Drones are becoming increasingly common in everyday environments, which raises the question if and how they impinge on one’s personal space when interacting with a drone. Personal space requirements serve protective and regulatory functions, and a variety of cues influence when we start to feel intrusion into our personal space. In this study, we investigated how the visual size and the acoustic properties of a delivery drone affect the closest comfortable approach distance. In a virtual reality setting, participants completed a stop-distance task in which a drone approached them and they had to make it stop at the closest comfortable distance. We manipulated three factors: the drone’s physical size (small, medium, or large); the pitch of its motor sound (-40%, -20%, original sound, +20%, or +40%; matched for subjective loudness); and its overall volume (two levels). All three factors significantly affected the preferred distance to the drone: participants allowed smaller drones to approach more closely than larger ones. Louder noise increased the space requirement, and lower-pitched noise afforded closer proximity as compared to high-pitched noise. These findings have direct implications for the design of the drone itself as well as for the design and evaluation of the personal space requirements in human-drone interaction.", "SubmissionID": 489}, {"Day": "Thursday", "Time": "09:00–10:30", "SessionID": 27, "Topic": "Perception and Action", "Title": "Immersive environments influence egocentric target representation", "Author": "Meaghan McManus", "CoAuthors": "Katja Fiehler", "Abstract": "When using virtual reality, people sometimes walk into objects or walls even when in a familiar real world environment. We have shown that while immersed in virtual reality and pointing to previously seen objects in the real world, pointing endpoints are based primarily on the locations of objects in the current virtual environment. On each trial participants performed a simple walking task in virtual reality and then pointed to the remembered location of the real-world door. The virtual environment could be aligned or misaligned to the real world. We found that participants were either just pointing at what they could see or that the egocentric representation of the unseen environment was overwritten by the currently seen environment. This indicates that egocentric target representations are weakened when performing tasks in virtual environments.\n\nTo further test this, 20 participants performed a similar walking task and had to point to the location of the door in the real world while they saw either a virtual replica of the real world room or just a black environment. In a preliminary analysis we found that after walking, pointing was not affected by the visual input. This suggests that the egocentric target representation was overwritten. However, if participants had been stationary, they pointed closer to the virtual (instead of the real world) door when pointing with vision compared to when being in the dark environment. This suggests that participants were primarily pointing based on what they saw, i.e. they relied more strongly on environmental (allocentric) than egocentric cues; however, they might still have access to the egocentric target representation.", "SubmissionID": 533}, {"Day": "Thursday", "Time": "09:00–10:30", "SessionID": 27, "Topic": "Perception and Action", "Title": "Color, Geometry and Gender: Spatial Navigation Strategies in Non-Euclidean Virtual Reality", "Author": "Sandra Arranz-Paraíso", "CoAuthors": "Jesus Mayor, Javier Alegre, Daniel López-Fernández", "Abstract": "Virtual reality (VR) enables environments that violate Euclidean geometry; for example, corridors can overlap in physical space while appearing entirely distinct to the user. Such partially non-Euclidean spaces offer a practical strategy for expanding virtual worlds within constrained physical areas, yet their effects on spatial cognition remain poorly understood. We investigated how partial non-Euclidean geometry affects path integration and homing performance. Thirty-six participants (23 men, 13 women; ages 18-56) navigated four VR labyrinths using an Oculus Quest 2: two Euclidean and two partially non-Euclidean, each with or without colored wall cues. Mazes were matched for goal distance (~16 m) and the number of bifurcations (7). Movement data were recorded and processed to extract trajectories, distance, time, and errors. There was no significant increase in navigational errors in non-Euclidean mazes (p = .59), despite traveling substantially greater distances (60.75 m vs. 30.50 m, p < .001, r = .34). These findings align more closely with cognitive graph theory (localized, path-based spatial representations) than with the global metric maps predicted by cognitive map theory. Colored walls significantly reduced wrong turns on the outward journey (p = .05, r = .13), serving as navigational cues. However, color had no significant effect on return navigation, suggesting that landmark benefits do not persist through the homing phase. No statistically significant gender differences were found. These results show that partially non-Euclidean VR spaces are navigable without increased error, supporting their use in immersive applications.", "SubmissionID": 555}, {"Day": "Thursday", "Time": "09:00–10:30", "SessionID": 27, "Topic": "Perception and Action", "Title": "Global and Local Environmental Statistics Jointly Shape Visually Guided Motor Planning", "Author": "David Whitney", "CoAuthors": "Tianhe Wang", "Abstract": "Visually guided action depends on balancing speed and accuracy. This speed–accuracy tradeoff (SAT) is usually treated as a fundamental constraint, often framed as a single optimization between time and error. Yet the brain also uses prior information and environmental statistics to improve performance, and the computations that enable this remain unclear. Standard models of visuomotor control emphasize Bayesian inference, in which prior information is combined with sensory input to estimate the current state. Here, we show instead that adaptive motor planning relies on two complementary computations that exploit different statistical structures in the environment. One process uses global summary statistics to speed planning for frequently encountered targets, consistent with use-dependent learning. By shifting decision boundaries, it accelerates action selection and reduces planning variability, but also introduces an attractive bias toward the mean trajectory. A second process tracks local, trial-by-trial statistics and generates a repulsive sequential bias tuned to environmental autocorrelation, counteracting this error. In visually guided reaching movements, these sequential effects matched efficient coding predictions and conflicted with Bayesian accounts: current movements were biased away from previous movements, variability decreased when successive reaches were similar, and the repulsive bias increased with intrinsic motor variability. Together, these findings support a factorized control architecture in which global statistics speed action selection while local statistics preserve accuracy, showing how visually guided movements can become both faster and more accurate without simply relaxing the SAT.", "SubmissionID": 568}, {"Day": "Thursday", "Time": "09:00–10:30", "SessionID": 27, "Topic": "Perception and Action", "Title": "Impact of novel action semantics on the early visual processing of objects", "Author": "Rémi Lafitte", "CoAuthors": "Solène Kalénine, Yannick Wamain", "Abstract": "Action semantics refer to multimodal representations encompassing manipulation knowledge (e.g., object grasp and use), functional knowledge (e.g., tool function), and sensory consequences related to object use. In support of embodied cognition approaches, action semantics was found to enhance object processing in various identification tasks. The present research aims to investigate whether novel action semantics can also enhance early stages of visual processing. To that aim, we are running an ongoing experiment (n=8/66) to test the effect of novel action semantics on object detection. Healthy young adults (age=23±1.6, 6 women) were exposed to novel 3D objects in virtual reality and had to learn their name and function in one of two training conditions (n=4 by group) varying in manipulation experience (functional use vs. perceptual judgments). We used breaking Continuous Flash Suppression (bCFS), and its variant, reverse-bCFS, to study access to and disappearance from consciousness, respectively. We also used an exogenous version of the Posner-cueing task to investigate attentional capture of learned objects (presented as cue). Facilitation or inhibition effects were calculated as RT[valid object cue – invalid object cue]. Preliminary bCFS results indicate that object detection was faster in the functional use group than in the perception group (median RTs: 4.5±2.9 vs. 6.5±1.8 s, d=0.82). Congruently, reverse-bCFS data suggest that object disappearance from consciousness was slower in the functional use group than in the perception group (median RTs: 5.2±2.7 vs. 3.6±2.9 s, d=0.58). In the Posner-cueing task, inhibition magnitude was similar between the functional use and perception groups (mean RTs: -19.8±8.3 vs. -18.7±12.1 ms, d=-0.10). These preliminary results suggest that high-level object features related to action semantics can elicit faster access to consciousness. Forthcoming data will further help to determine to what extent action semantics may have a top-down facilitatory effects on object detection.", "SubmissionID": 603}, {"Day": "Thursday", "Time": "09:00–10:30", "SessionID": 1, "Topic": "Clinical, Developmental, and Applied", "Title": "Polarization Perception and Neural Adaptation in Haidinger's Brush Psychophysics: From Normative Data to Albinism", "Author": "Luca Battaglini", "CoAuthors": "Dominga Ortolan, Sara Zambon, Gianluca Ruffato", "Abstract": "Haidinger's brushes (HB) are entoptic phenomena arising from dichroic absorption of polarized light by macular carotenoids aligned within Henle's fiber layer (HFL). Despite their potential as a non-invasive psychophysical index of macular integrity, key parameters governing their perception remain poorly characterized. In a first study, we systematically investigated the role of neural adaptation in HB perception in 37 healthy individuals. Using a custom apparatus combining two blue LED sources (468 nm) with a rotating linear polarizer, we measured rotational speed thresholds (RST) across seven polarization levels. RST decreased linearly with the logarithm of polarization level, establishing a quantitative framework linking neural adaptation dynamics to macular pigment density. The estimated average polarization threshold was 9.7 ± 1.2%, lower than previously reported values, attributable to the broader range of rotational speeds explored. Critically, lower RST at maximum contrast predicted lower polarization thresholds, suggesting RST as a robust individual-level biomarker of macular function. Building on this normative framework, we then applied the paradigm to three individuals with oculocutaneous albinism — a condition characterized by reduced macular pigment density and disrupted HFL architecture. Remarkably, all participants perceived polarization-dependent entoptic phenomena at 100% polarization, but reported qualitatively atypical patterns: asymmetric, peripherally localized, with aberrant motion descriptors. No false alarms occurred at 0% polarization. These deviations likely reflect HFL disorganization rather than pigment absence. Together, these findings establish HB psychophysics as a sensitive, accessible tool for probing macular structural integrity across physiological and pathological conditions.", "SubmissionID": 36}, {"Day": "Thursday", "Time": "09:00–10:30", "SessionID": 1, "Topic": "Clinical, Developmental, and Applied", "Title": "Visual-Inertial Egocentric Metric Depth Estimation for Tabletop Activities of Daily Living", "Author": "Yaroslava Nalivayko", "CoAuthors": "Isabell Wochner", "Abstract": "Neurodegenerative movement disorders such as Parkinson’s disease or essential tremor impact the patient’s ability to independently perform the tabletop activities of daily living (ADLs) such as drinking and eating. While exoskeleton assistive devices offer a great opportunity to support these patients in tabletop ADLs by suppressing the pathological components of the intended movement, they require motion trajectory estimation, intention prediction, and scene understanding for effective assistance. \n\nDepth estimation is especially crucial for determining the relative position of the tabletop objects-of-interest to the patient. Current depth estimation approaches either leverage special hardware (e.g. stereo cameras), which is not available in our mobile sensor setup, or fine-tuning of deep monocular metric methods with a vigorously gathered dataset. Such a dataset would require tens of experimental setups with different tables and users in various environments with an egocentric depth camera.\n\nWe address this challenge by exploiting the biomechanical constraints of a person sitting at a table and utilizing inertial measurements in addition to monocular visual information from the Neon eye-tracking eyeglasses. Although the hardware setup of Neon is not sufficient for visual-inertial odometry, it is nonetheless useful for improvement over visual-only metric depth estimation.\n\nThe novelty of our method lies in the use of inertial measurements for table normal estimation, which allows us to reliably calculate metric depth of table plane pixels and, by using deep relative depth estimation and depth prior incorporation, of tabletop objects. After building a scene depth map during system initialization, we utilize visual feature tracking to estimate camera pose and scene depth after motion, maintaining a robust understanding of the scene in real-time. Our method achieves the mean distance estimation error of 2.5 cm with the runtime of 0.01 seconds per frame compared to 11 cm and 0.48 seconds of Depth Anything 3.", "SubmissionID": 109}, {"Day": "Thursday", "Time": "09:00–10:30", "SessionID": 1, "Topic": "Clinical, Developmental, and Applied", "Title": "Objective quantification of panretinal visual function using flicker-ERG thresholds", "Author": "Sven Heinrich", "CoAuthors": "Ceren Şimşek, Julia Haldina", "Abstract": "Assessment of retinal function in advanced panretinal disease is challenging, as the measurement range of standard clinical measures like visual acuity or conventional electroretinography (ERG) is often exceeded. While the psychophysical \"full-field stimulus threshold\" (FST) has gained importance in the context of gene therapy, its subjective nature introduces variability due to non-retinal factors such as cognitive processes and individual decision criteria. In a pilot study with healthy participants, we tested a method to objectify retinal function by determining photopic electroretinographic thresholds using weak full-field 30-Hz flicker stimuli superimposed on a luminance pedestal. We recorded responses at nine flash strengths around the perceptual threshold. In contrast to standard clinical flicker ERG recordings, to enhance the signal-to-noise ratio for near-threshold responses, twenty 3-second segments were averaged. Response amplitudes were quantified using Fourier analysis, and a retinal sensitivity score was determined by extrapolating statistically significant responses to zero amplitude. Initial results demonstrate that specifically tailored ERG protocols can reliably quantify retinal function near or even below the perceptual threshold. The ERG-based threshold provides a more direct, objective measure of retinal function than FST, independent of post-retinal processing. The approach piloted here can easily be extended to patients with advanced panretinal disease to monitor disease progression and evaluate efficacy in gene therapy trials.", "SubmissionID": 146}, {"Day": "Thursday", "Time": "09:00–10:30", "SessionID": 1, "Topic": "Clinical, Developmental, and Applied", "Title": "Robust across trates and staits; The stability of the attentional spotlight across autism spectrum disorder, aging, and task manipulations", "Author": "Beleke de Zwart", "CoAuthors": "Sjoerd Stuit, Dirk van Moorselaar, Stefan Van der Stigchel", "Abstract": "Visual attention helps us navigate our surroundings by continuously selecting relevant spatial information for more extensive processing. Here, spatial attentional selection is often conceptualized as an attentional spotlight. Previous data suggests there might be stable differences between individuals in the size of the spotlight directly related to trait differences such as a diagnosis of Autism Spectrum Disorder (ASD). Here, we aimed to replicate and extent previous work on these trait differences by including individuals with- and without an official diagnosis of ASD and including a sample of older adults. Besides investigating trait differences in the spotlight size, we also addressed state differences by manipulating task characteristics, specifically cue size and target predictiveness. To this end, we conducted a series of experiments with an exogenous cueing paradigm in which we varied the distance from the cue to the target to map the attentional spotlight. \n\nResults showed no trait differences in the spatial characteristics of the attentional spotlight between individuals with a diagnosis of ASD and individuals without a diagnosis. Furthermore, while overall performance was lower for the older adults compared to younger adults, our results indicated that the size of the attentional spotlight remains similar between age groups. Regarding the state differences of the spotlight size, we found that the size of the cue does not influence performance and that target predictability only selectively benefits top-down expectations near the cued location, not farther locations. Together, our results indicated no group differences in the spatial characteristics of the attentional spotlight across heterogeneous samples. Furthermore, as measured by our paradigm, the size of the spotlight appears relative stable despite our modulations, suggesting the size of the spotlight is surprisingly stable.", "SubmissionID": 158}, {"Day": "Thursday", "Time": "09:00–10:30", "SessionID": 1, "Topic": "Clinical, Developmental, and Applied", "Title": "Atypical responses to spatial frequency and contrast in the color and motion preferring columns of extrastriate cortex in individuals with amblyopia", "Author": "Antony Morland", "CoAuthors": "Jan Skerswetat, Eric Gaier, Peter Bex, David Hunter, Shahin Nasr", "Abstract": "Amblyopia is a monocular visual deficit that persists after optical correction and is often a result of strabismus or anisometropia. The deficit is attributed to atypical visual processing in the brain. We examined how extrastriate visual cortex responded to different contrasts and spatial frequencies in a group of amblyopes (n=16) and controls (n=8). We used high-resolution fMRI to assess how motion- and color-selective columns in visual areas V2-V4 are tuned to spatial frequency and contrast and how this tuning is influenced by amblyopia. We measured responses in motion and color selective columns to five, log-spaced, spatial frequencies (0.1-5.8 c/deg) and five, log-spaced, contrasts (1.25-99%). We tested binocularly and each eye separately in different sessions. For both groups, and all eye conditions, the contrast sensitivity and spatial frequency preference showed differences between motion and color columns in cortical representations of 3-8° eccentricity, but not for 0-3°. The differences at 3-8° manifested in tuning to lower spatial frequencies in motion than color selective columns.  In the representation of 0-3°, color and motion columns were similarly tuned to high spatial frequencies.  Group differences were most pronounced in the representation of 0-3° for monocular conditions – particularly for the amblyopic eye - and were not limited to color selective columns.   However, the group differences interacted significantly with column, spatial frequency, contrast and, predictably, the eye stimulation condition. Atypical visual processing in amblyopia therefore manifests as different spatial frequency responses that depend on the eye of stimulation and the cortical column. The results indicate that amblyopia is not limited to atypical processing in color preferring columns, which depend on preferential inputs from parvocellular units. The magnocellular stream, which inputs preferentially to motion columns, is also affected.", "SubmissionID": 191}, {"Day": "Thursday", "Time": "09:00–10:30", "SessionID": 1, "Topic": "Clinical, Developmental, and Applied", "Title": "Microstructural reorganization of cerebral white matter measured with 7T-MRI in adult amblyopia", "Author": "Cecilia Barachini", "CoAuthors": "Miriam Acquafredda, Laura Biagi, Michela Tosetti, Maria Novella Maglionico, Michele Figus, Irene Di Marco, Guido Marco Cicchini, Alessandro Sale, Maria Concetta Morrone, Jan Kurzawski, Paola Binda", "Abstract": "Amblyopia is a developmental disorder caused by abnormal visual input early in life, leading to persistent visual deficits and reorganization of the visual cortex and optic radiations. However, alterations extend beyond the visual areas and tracts; previous studies reported changes of white matter integrity in non-visual areas, including increased fractional anisotropy (FA) in the bilateral uncinate tracts of adult amblyopes compared with controls (Tsai et al., 2019).\n\nHere we extended these results using 7T diffusion-weighted MRI and whole brain probabilistic tractography, which we complemented with the automated reconstruction (pyAFQ) of 30 white matter tracts. Fractional anisotropy (FA) and mean diffusivity (MD) derived from the diffusion tensor were extracted from each tract to quantify microstructural properties; we focused on associative tracts and studied 15 individuals with mild monocular anisometropic amblyopia (Snellen acuity in the worse eye between 0.5 and 6/10, between 16 and 49 years old) and 23 controls (no visual deficit; between 22 and 40 years old). Repeated-measures ANOVAs including age as covariate revealed a significant tract-by-group interaction for both FA (F = 2.085, p = .022 after Greenhouse-Geisser correction) and MD (F = 2.090, p < .001). The group-difference was significant in three major tracts (all outside the occipital lobe): left posterior arcuate, right superior longitudinal, and left uncinate. This consisted of reduced MD together with increased FA in amblyopes.  \n\nOur findings indicate that amblyopia is associated with widespread microstructural reorganization extending beyond the visual cortex. For associative tracts, the changes are not necessarily disruptions, as we find enhanced organization indices in amblyopes compared with controls. This might reflect the relatively mild clinical profile of our sample, which selectively included non-strabismic individuals with relatively preserved visual acuity.\n\nThis research was funded by the ERC-CoG grant PredActive.", "SubmissionID": 219}, {"Day": "Thursday", "Time": "09:00–10:30", "SessionID": 1, "Topic": "Clinical, Developmental, and Applied", "Title": "Beyond low-level vision: magnocellular contribution to mirror image discrimination", "Author": "Marie Houbben", "CoAuthors": "Gilles Vannuscorps", "Abstract": "The magnocellular and parvocellular pathways of the visual system are known to contribute different types of low-level information to visual perception. Here, we tested the hypothesis that the magnocellular pathway may also contribute to the ability to discriminate mirror images. This hypothesis was motivated by three lines of evidence. First, damage to the dorsal stream has been shown to affect patients’ ability to discriminate mirror images. Second, the occipito-parietal dorsal stream mostly receives magnocellular pathway inputs. Third, neuropsychological case studies reported patients whose difficulty to discriminate mirror images depended on the extent to which the stimuli engaged the magnocellular pathway. We will present the results of four complementary studies supporting this hypothesis. In study 1, magnocellular efficiency (indexed by flicker fusion threshold) correlated with the specific difficulty of children diagnosed with dyslexia in detecting mirror errors (relative to phonological errors) in a lexical decision task. In study 2, magnocellular efficiency correlated with the difficulty of adults diagnosed with dyslexia in discriminating mirrored geometrical shapes. In Study 3, we show that this relationship is specific to aspects of orientation processing assumed to depend on the dorsal stream. Finally, Study 4 showed that decreasing magnocellular efficiency by fast flicker adaptation disproportionately impairs the detection of mirror errors compared to phonological ones in a lexical decision task. Together, these findings provide evidence that the magnocellular stream contribution extends beyond low-level vision, playing a functional role in mirror image discrimination. It also offers new insights into possible origins of mirror errors in dyslexia.", "SubmissionID": 248}, {"Day": "Thursday", "Time": "09:00–10:30", "SessionID": 1, "Topic": "Clinical, Developmental, and Applied", "Title": "A subcortical-prefrontal pathway for unconscious visual categorization in humans", "Author": "Juan Chen", "CoAuthors": "Zhiqing Deng", "Abstract": "While subcortical pathways are known to support residual vision in blindsight, their role in high-level perceptual processing in the healthy human brain remains poorly understood. We employed functional magnetic resonance imaging (fMRI) and continuous flash suppression (CFS) to investigate the subcortical representation of \"toolness\" (tools vs. non-tools) and shape (elongated vs. stubby) during unconscious processing. Both univariate and multivoxel pattern analysis (MVPA) revealed significant toolness representation in the ventral anterior (VA) nucleus of the left thalamus, and the left striatum (STR) of the basal ganglia. At the cortical level, this unconscious representation was restricted to Area 9a and anterior 10p within the dorsolateral prefrontal cortex (DLPFC), bypassing primary visual areas. Background connectivity analysis showed that elongated tools selectively increased functional coupling between the bilateral VA and left Area 9a, and between the right VA and left STR. Furthermore, dynamic causal modeling (DCM) identified a functional thalamocortical pathway originating in the left VA and projecting to the left Area 9a that specifically contributed to toolness representation under CFS. These findings provide evidence for a dedicated subcortical-prefrontal shortcut in healthy humans that facilitates high-level visual categorization entirely outside of conscious awareness. This circuit likely reflects an evolutionary mechanism for the rapid, unconscious processing of ecologically relevant objects through their motor affordances.", "SubmissionID": 297}, {"Day": "Thursday", "Time": "09:00–10:30", "SessionID": 1, "Topic": "Clinical, Developmental, and Applied", "Title": "Aperiodic EEG Slopes Reveal Baseline and Load-Dependent Visual Exposure in Migraine", "Author": "Irem Akdogan", "CoAuthors": "Seyma Koc Yilmaz, Ilkem Guzel, Omer Enes Akgun, Doga Vuralli, Hayrunnisa Bolay, Hulusi Kafaligonul", "Abstract": "Migraine has been associated with altered visual processing during the interictal period, including visual hypersensitivity and increased susceptibility to sensory exposure. One proposed mechanism is an altered excitation/inhibition (E/I) balance in the visual cortex, which impairs filtering and hence increases internal neural noise. In EEG, the aperiodic spectral exponent has been suggested to reflect internal noise at the population level and E/I balance in cortical activity, but its representation in migraine remains unclear.\n\nWe used equivalent noise paradigms designed to challenge sensory processing. We measured the aperiodic spectral exponent (1/f slope) and individual alpha frequency (IAF) during eyes-open (EO) and eyes-closed (EC) resting states before and after demanding equivalent noise tasks in patients with episodic migraine without aura (n=13) interictally and healthy non-headache controls (n=12). We aimed to assess both trait-like group differences and state-dependent changes following visual exposure.\n\nBehaviorally, migraineurs showed impaired performance and diminished sensitivity relative to controls, reflected in elevated internal noise estimates, particularly during motion estimation. Migraineurs showed a reduced aperiodic exponent relative to healthy controls, together with a slower IAF across states, suggesting altered baseline cortical dynamics within an occipito-parietal ROI. Following the equivalent noise tasks, migraineurs exhibited a significantly flatter aperiodic exponent during EO recovery across a broad electrode cluster.  Within-group comparisons showed that migraineurs had steeper slopes during EC than EO in pre- and post-task, while controls showed this difference only in the pre-task period. \n\nMigraineurs exhibit a distinct adaptation failure to visual stimulation, characterized by a sustained shift in aperiodic activity, indicating disrupted E/I balance and elevated internal noise. While eye closure partially reduces this neural noise, the recovery remains incomplete. Therefore, aperiodic EEG measures offer a physiological marker of sensory overload in migraine (Funding: The Scientific and Technological Research Council of Turkiye, 225K067).", "SubmissionID": 335}, {"Day": "Thursday", "Time": "09:00–10:30", "SessionID": 6, "Topic": "Visual Search", "Title": "Does distractor homogeneity have the same effects on visual search and visual foraging?", "Author": "Mustafa Zeyd Söyük", "CoAuthors": "Anna Schubö, Jeremy M. Wolfe", "Abstract": "In visual search, greater distractor-distractor similarity makes search easier while greater target-distractor similarity makes search harder (Duncan & Humphreys, 1989). While this principle is widely supported in single-target visual search paradigms, it’s unclear whether distractor homogeneity has a similar impact on multiple-target visual foraging tasks. In our foraging tasks, observers repeatedly search for multiple targets within “patches” under time constraints and are allowed to decide when to move to a new patch. From an optimal foraging perspective, the Marginal Value Theorem (MVT) (Charnov, 1976) predicts that the current patch should be left once the instantaneous rate of target collection drops below the overall rate in the environment. This paradigm therefore enables simultaneous investigation of foraging efficiency and patch-leaving behavior. The present study tested how distractor homogeneity affects visual foraging behavior in perceptual (color) and categorical (letter) foraging tasks. Distractor homogeneity was manipulated within subjects. Results showed a dissociation across the tasks. In the categorical letter foraging task, higher distractor homogeneity was associated with improved foraging performance, reflected as higher target collection rates and fewer uncollected targets across different levels of distractor homogeneity. Patch-leaving behavior remained also consistent with MVT, showing that observers adjusted their leaving decisions based on their overall collection rate. However, the homogeneity conditions did not produce expected differences in foraging performance during perceptual color foraging. These findings indicate that distractor homogeneity affects visual foraging behavior differently across domains and highlight the need for further investigation into the underlying perceptual mechanisms of foraging in dynamic visual environments.", "SubmissionID": 374}, {"Day": "Thursday", "Time": "09:00–10:30", "SessionID": 6, "Topic": "Visual Search", "Title": "Neural representations of relational-based attentional template in frontoparietal network", "Author": "xianming dai", "CoAuthors": "Mengyuan Gong", "Abstract": "Goal-directed attention relies on attentional templates – internal representations of target stimuli. While traditional views hold that templates represent exact feature values (e.g., specific color or orientation), recent theories propose a functional distinction between a relational “guiding template” (e.g., 'redder') and a veridical “target template” (e.g., red). To isolate the guiding template and its neural substrates, we conducted a behavioral (Experiment 1, N = 20) and an fMRI (Experiment 2, N = 20) experiment using a cued visual search task. In both experiments, participants reported the orientation of a target bar located inside a circle matching the cued color. Behavioral results from Experiment 1 showed that distractors matching the relational property of the cue (e.g., “redder” than the uncued color) captured significantly more attention than distractors that were equidistant in color space but mismatched the relational property (e.g., “yellower”). In Experiment 2 (fMRI, N = 20), multivoxel pattern analysis revealed that the frontoparietal network, specifically the inferior frontal junction (IFJ) and intraparietal sulcus (IPS), represented the relational information during preparatory attention. Crucially, the cross-decoding of neural activity patterns in these regions, performed across distinct color pairs sharing the same feature relationship, was reliably above chance level. Representational similarity analysis (RSA) further corroborated that these templates were structured by relational rather than feature proximity. Together, our findings identify the critical brain regions underlying the relational format of target template during attentional guidance.", "SubmissionID": 415}, {"Day": "Thursday", "Time": "09:00–10:30", "SessionID": 6, "Topic": "Visual Search", "Title": "Salient intra-object features dominate the contents of the visual search template: Electrophysiological evidence", "Author": "Aysenur Talya Dinc", "CoAuthors": "Merala Siya, Alina Khomenkova, Chris R. H. Brown", "Abstract": "When searching for an object, we must mentally represent its features as a ‘search template’ (aka attentional set). Although evidence suggests we can search for multiple features simultaneously, it remains unclear whether we do so when searching for a multi-feature target. Based on the hypothesis that individuals use the most efficient 'good enough' template, we predicted that participants would prioritise only the most salient target feature. Participants (N = 18) searched a 4-item array for a ring-shaped target defined by two colours: a salient primary colour (80% proportion of the ring) and a secondary colour (20% proportion). They judged target presence/absence and identified an embedded line orientation on target-present trials (44% of trials). To assess which specific features were prioritised, target-absent trials contained a probe colour on one non-target ring, matching either the primary feature, secondary feature, or a task-irrelevant feature. Probes were either large (80% proportion of ring) or small (20%), allowing assessment of bottom-up salience as well. Behaviourally, the primary colour produced notably greater interference, particularly as a large probe. ERP results revealed that both primary and secondary colour (but not irrelevant) probes elicited an N2pc, reflecting attentional selection; however, the large primary feature probe elicited a substantially larger N2pc than all other probes, and was closest in magnitude to the target N2pc. Notably, despite only eliciting a moderate N2pc, the small primary colour probe was the only probe to elicit an N1pc, consistent with early attentional orienting. Together, these findings suggest that individuals prioritise the most salient target feature during visual search, and rapidly engage, then discount, items sharing this feature that are implausible targets. The current results are therefore consistent individuals utilising a 'good enough' template strategy by prioritising intra-object salient features, despite multiple features being task-relevant and required to identify the target.", "SubmissionID": 441}, {"Day": "Thursday", "Time": "09:00–10:30", "SessionID": 6, "Topic": "Visual Search", "Title": "Investigating the learning of statistical regularities during visual foraging.", "Author": "Ali Batikh", "CoAuthors": "Andreas Lazartigues, Sabrina Hansmann-Roth, Jérôme Tagu", "Abstract": "In contrast to traditional visual search paradigms that focus on detecting a single target, visual foraging tasks require identifying multiple targets among distractors within a single display. This makes them particularly useful for examining how attention is allocated over time. Building on previous findings from single-target visual search studies, we explored whether sensitivity to statistical regularities can guide target selection during visual foraging. To address this question, we used an exhaustive conjunction foraging task in which both targets and distractors varied along two features: shape and color. Two types of statistical regularities were compared, namely frequency and conditional probability. Participants had to search for and select (with the computer mouse) all the targets that appeared randomly within two of the sixteen possible screen quadrants. In the Probability condition, targets always co-occurred across a specific pair of quadrants (conditional probability = 1), meaning that when targets were present in one quadrant, they were also present in its paired location, although such events were relatively infrequent overall. In the Frequency condition, targets appeared more often overall, but their co-occurrence across paired quadrants was less consistent (conditional probability = 0.5). Participants completed 200-trial learning phase, followed by a 20-trial switch phase in which targets appeared in novel quadrant pairings. Reaction times were analyzed separately for initial selections and interquadrant transitions. In addition, mouse trajectories were examined as an index of spatial exploration. It was hypothesized that both reaction times and trajectory length would progressively decrease over the course of the learning phase, reflecting acquisition of spatial regularities, and subsequently increase during the switch phase following disruption of these regularities. At the time of submission, we have conducted two experiments with 40 and 16 participants, respectively. Preliminary findings show learning effects, as indicated by reductions in both reaction times and trajectory-length measures over time.", "SubmissionID": 448}, {"Day": "Thursday", "Time": "09:00–10:30", "SessionID": 6, "Topic": "Visual Search", "Title": "Low salience intra-object features are neglected from the visual search template: Evidence from Inattentional blindness", "Author": "Alina Khomenkova", "CoAuthors": "Calvin Laursen, Christopher Brown", "Abstract": "Everyday visual tasks, such as locating a friend in a crowd, require complex visual search. Unweighted scanning is inefficient, meaning we are thought to rely on top-down attentional templates of a target object’s features. However, little is known about how multiple features within a single object affect visual search. Does it involve analysis of all relevant features?, or do we use a ‘good enough’ template which selectively focuses on the most salient features? We explored this using an inattentional blindness paradigm across two pre-registered experiments. Participants searched a photo-realistic crowd scene for a person wearing clothing made up of two colours: a large-proportion salient primary colour (e.g., green) and a smaller secondary colour (e.g., purple; counterbalanced), and identified the person's gender. Midway through the task, an unexpected star-shaped stimulus appeared in the periphery. This critical stimulus was varied across groups, and was either the primary colour, secondary colour, or a task-irrelevant (e.g., orange) colour (counterbalanced). Immediately after, participants were probed on their awareness of its location and shape. After refining awareness criteria in Experiment 1 (N = 236; group sizes = 75-84; https://osf.io/vg4cy), participants were most likely to notice the critical stimulus when it matched the primary colour. Notably, the secondary colour was no more likely to be detected than the irrelevant colour. This pattern was replicated in a larger pre-registered sample in Experiment 2 (N = 360; 120 per group; https://osf.io/3psyd), with primary colour detected most frequently, and secondary colour detection no different than the irrelevant colour. These findings demonstrate that intra-object feature salience shapes the contents of top-down attentional templates. Low-salience features appear to be excluded from the template, leading to increased inattentional blindness. This suggests that visual search is not a comprehensive analysis of all target features, but is instead driven by the most perceptually dominant ones.", "SubmissionID": 460}, {"Day": "Thursday", "Time": "09:00–10:30", "SessionID": 6, "Topic": "Visual Search", "Title": "Cross-modal foraging for human action", "Author": "Ivan Makarov", "CoAuthors": "Runar Unnthorsson, Árni Kristjánsson, Ian Thornton", "Abstract": "Human foraging tasks are used to study how attention operates when multiple targets must be selected over time. Previous work has shown that visual synchrony can improve foraging performance consistent with accounts based on local grouping of targets (Makarov et al., 2024, 2025). However, cross-modal cues were only effective in these studies when participants explicitly searched for visual targets defined in terms of a specific temporal rate, a rate also shared by the sound or haptics cues. Here, we begin to explore whether these patterns also apply to a dynamic action-based task using point-light figures. Participants completed a time-limited task in which one of four actions (chopping, mowing, pumping or sweeping) was specified as the target action at the start of each trial. Actions were taken from the Vanrie & Verfaillie (2004) motion capture database. Participants selected as many targets as possible within 60 seconds. At any moment, 40 figures were visible in a 10 × 6 grid, including 10 targets and 30 distractors. The point-light figures were rotated randomly in depth and had limited lifetime, fading in and out and reappearing at new locations, creating a continuously changing display that reduced grid-based search strategies while maintaining a constant target/distractor ratio. Target actions were presented under three conditions: asynchronous (action-phase randomized for each target), visually synchronized, and visually synchronized with sound (e.g., a chopping sound for chopping). Distractor figures were sampled randomly from 16 additional actions and had no synchronization with respect to phase. Preliminary results replicate our previous findings with non-biological stimuli: There was a clear advantage for visual synchronization, but no additional benefit for adding a congruent sound.", "SubmissionID": 461}, {"Day": "Thursday", "Time": "09:00–10:30", "SessionID": 6, "Topic": "Visual Search", "Title": "The Efficiency of Multiple Distractor Inhibition During Visual Search", "Author": "Brandi Drisdelle", "CoAuthors": "Martin Eimer", "Abstract": "In daily life, we encounter visually salient distractions that must be managed to successfully navigate our environment. Research has demonstrated that attentional capture by highly salient stimuli can be avoided under certain circumstances. Most studies, however, focus on the inhibition of a single salient distractor, and less is known about whether multiple salient distractions presented simultaneously influence one another during inhibition. Across four experiments, using behavioural and ERP measures, we examined how spatial proximity and feature similarity between two salient distractors influence their inhibition during visual search. Observers searched for a shape-defined target among target-coloured (non-salient) distractors and one or two salient nontarget-colour distractors, which could have the same or two different colours. Behavioural measures revealed efficient suppression of both one and two salient distractors, indexed by faster response times when a salient distractor was present (Experiment 1) and reduced probe report accuracy at salient versus non-salient distractor locations (Experiment 2). Crucially, when there were two distractors, the magnitude of suppression was not influenced by their spatial layout (adjacent vs separated) or colour (same vs different), indicating that these factors do not affect suppression efficiency. In the ERP experiments, the lateralised Pd component was used to track inhibition of individual salient distractors, by placing one distractor laterally and the other on the midline. Pd was smaller for adjacent compared with separated distractors, while distractor features (same versus different colour) had no effect (Experiment 3). This Pd reduction did not reflect reduced suppression but instead perceptual grouping of adjacent lateral and midline distractors, reducing overall Pd amplitude relative to displays with two lateral salient distractors (Experiment 4). Overall, results indicate that the suppression of two salient distractors and single-item suppression are similarly efficient, and that multiple-item suppression is not sensitive to the spatial layout or colour of distractors.", "SubmissionID": 501}, {"Day": "Thursday", "Time": "09:00–10:30", "SessionID": 6, "Topic": "Visual Search", "Title": "Generative models can explain (or at least help us understand) individual differences in cognition", "Author": "Alasdair Clarke", "CoAuthors": "Anna Hughes, Amelia Hunt", "Abstract": "Nearly all experiments in cognition and visual perception involve taking multiple measurements from each participant. This includes taking multiple recordings of the same concept (e.g., recording response time on a number of trials), and taking multiple measurements per trial (e.g., response time and accuracy). The number of measurements expands as we add in eye-tracking metrics, EEG statistics, and so on. Researchers interested in individual differences typically assume that these measurements are i) mutually independent and ii) free from confounds, before taking simple summary statistics and then applying correlation procedures. A general theme of research on individual differences in our field has be
