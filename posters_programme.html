c, inanimate stimuli, suggesting that the underlying mechanism may not depend on animacy. The present study tested the categorization failure hypothesis, which proposes that uncategorizable stimuli automatically evoke immediate negative evaluation, even without conscious recognition. Across two experiments, we manipulated stimulus exposure duration (17, 50, or 283 ms) and measured likeability and recognition rates for unmorphed (original, categorizable) and morphed (uncategorizable) stimuli: geometric figures (Experiment 1) and faces (Experiment 2). If negative evaluations are triggered automatically by categorization failure, they should implicitly emerge for morphed, uncategorizable stimuli prior to explicit recognition. The results supported this prediction. For morphed, uncategorizable stimuli, likeability remained consistently low regardless of exposure duration, while recognition improved. That is, negative evaluations were observed even at the shortest exposure duration, at which participants reported no explicit recognition. On the other hand, both likeability and recognition rates for original, categorizable stimuli correlatively increased with longer exposure duration. These findings suggest that automatic categorization failure leads to early, implicit negative evaluation, independent of animacy or explicit recognition. The results provide insight into the temporal dynamics of affective processing and offer a unified account of the uncanny valley phenomenon across different types of stimuli free from the animacy-based discussion.", "SubmissionID": 82}, {"Day": "Tuesday", "Time": "15:30–17:00", "SessionID": 35, "Topic": "Social Perception and Emotion", "Title": "Efficiency of Gaze and Covert Attention Allocation to Gesture-Like Peripheral Cues", "Author": "Inka Schmitz", "CoAuthors": "Geert Brône", "Abstract": "Gaze and gestures are central components of social interaction, but little is known about how visual attention is allocated to gestures in dynamic conversational contexts. In natural conversations, observers typically fixate faces while gestures occur in peripheral regions, suggesting that gesture perception may rely strongly on covert attention.\n\nWe developed a novel experimental paradigm designed to approximate conversational turn-taking under controlled conditions.\n\nParticipants stood in front of a large presentation screen displaying two stick figures positioned at conversational distance and size, forming a naturalistic three-person situation. Digits were presented in rapid succession in parallel at both “face” locations. Sometimes digits were replaced by target stimuli. The side on which the targets appeared switched from time to time. Participants were instructed to detect these targets and responded via button press.\n\nInformation about the upcoming target side – analogous to a change of speaker – was conveyed by peripheral cues presented below the face locations, within the gesture space. Crucially, efficient task performance required maintaining fixation on the relevant face location while extracting cue information mainly from the periphery. A control group performed the identical task, but stimuli were embedded in visually matched, non-social configurations instead of stick figures. Eye movements were recorded using head-mounted eye tracking.\n\nEye-movement data showed that gaze remained predominantly directed at the target stream regions, with only limited overt shifts toward the cue locations. Nevertheless, behavioral results (hit rates) revealed reliable cueing benefits, indicating that participants effectively used peripheral information to anticipate the target locations.\n\nThis work demonstrates that conversational gaze behavior can be approximated experimentally and suggests that maintaining fixation on the face region, while processing gestures peripherally, may serve as an efficient and functionally advantageous strategy in conversations. These results further highlight the critical role of covert attention in processing communicative gestures during dynamic social interactions.", "SubmissionID": 123}, {"Day": "Tuesday", "Time": "15:30–17:00", "SessionID": 35, "Topic": "Social Perception and Emotion", "Title": "Decoding Bodily Emotion Dimensions: Interdependence Between Valence, Arousal, and Sociality", "Author": "Rongdi Zhang", "CoAuthors": "Miao Cheng, Ken Fujiwara, Yoshifumi Kitamura, Chia-huei Tseng", "Abstract": "Dimensional theories map affective states across different dimensions, such as arousal (strength or intensity), valence (degree of pleasantness or unpleasantness), and dominance (the degree of control an individual perceives). While facial, semantic, and vocal stimuli have demonstrated supporting evidence for the interdependence of emotional dimensions underlying general core affect, it remains unknown whether the bodily emotional expressions share the same dimensional construct across different emotion categories. We address this gap by asking 134 participants (62 Taiwanese and 72 Japanese) to rate their perceived arousal (0 = low, 10 = high), valence (-5 = negative, 5 = positive), and sociality (0 = towards self, 10 = towards others) on 486 point-light displays of 6 professional performers from a multi-cultural bodily emotion database, DIEM-A. The stimuli include four basic emotions (anger, fear, joy, and sadness) and five social emotions (gratitude, guilt, jealousy, pride, and shame) at three intensity levels (high, medium, and low). We discovered significant interrelations among the three dimensions. Regarding the valence-arousal relationship, a quadratic model outperformed linear fitting, revealing the lowest arousal ratings for neutral stimuli and gradually increasing arousal ratings as perceived valence increased toward both positive and negative sides for all emotions. Additionally, the valence-sociality relationship differed by emotion category: valence was positively associated with sociality for social emotions but showed no significant correlation for basic emotions. These findings provide empirical evidence that bodily emotion perception shares a similar valence-arousal structure with established models of affect and uniquely introduce sociality as a critical third dimension for differentiating social from basic emotions in bodily actions. This study advances a more holistic dimensional model of bodily emotion, suggesting that the visual perception of biological motion inherently encodes social intent alongside core affect.", "SubmissionID": 285}, {"Day": "Tuesday", "Time": "15:30–17:00", "SessionID": 35, "Topic": "Social Perception and Emotion", "Title": "Temporal dynamics of neural representations of social and object relations", "Author": "Murat Tunca", "CoAuthors": "Violette Munin, Liuba Papeo, Daniel Kaiser", "Abstract": "Understanding the physical world requires understanding how things are related to each other in visual scenes. The temporal dynamics of relational representations remain largely unexplored. In this study we used electroencephalography (EEG) to investigate the time course of relational representations in minimalistic social and non-social visual scenes. Participants viewed pairs of humans (e.g. two humans shaking hands) or objects (e.g. an egg and an egg cup) (200 ms). Each pair was shown in a typical configuration for interacting (‘typical’ pairs), and an atypical configuration (‘atypical’ pairs) in which the items’ positions were swapped. In addition, pairs varied along different dimensions: Human pairs differed for type of interaction (communicative or physical) and interaction structure (reciprocal or transitive); whereas object pairs differed for functional structure (functionally constrained or interacting objects). EEG signals were analyzed using time-resolved representational similarity analysis (RSA). Results showed an early dissociation between social and non-social scenes beginning around 50 ms after stimulus onset. We also observed a typicality effect for human pairs where typical and atypical configurations produced distinct neural representations from ~90 ms. Typicality effects were much less pronounced for object pairs. Additional analyses revealed distinct neural representations for reciprocal versus transitive human pairs (from ~200 ms), and functionally constrained versus interactive object pairs (from ~160 ms). Together these findings demonstrate that relational information is rapidly encoded during visual perception, and suggest that social interactions evoke particularly strong and early relational representations in the visual system.", "SubmissionID": 325}, {"Day": "Tuesday", "Time": "15:30–17:00", "SessionID": 35, "Topic": "Social Perception and Emotion", "Title": "Learned social interaction history prioritizes face perception and attentional selection", "Author": "Qingsong Tan", "CoAuthors": "Ke Jia, Mengyuan Gong", "Abstract": "Extensive research shows that experience shapes perception and attentional biases toward statistical regularities, yet less is known about how learning social relationships – one of the most fundamental forms of human knowledge – tunes processing toward social entities. Here, we combined behavioral tasks and EEG to examine whether associating faces with social interactions alters subsequent face processing. Participants (N = 24 adults) were trained to associate specific faces with either face-to-face (interacting) or back-to-back (non-interacting) dyads. In a subsequent cued visual search task, targets preceded by face cues previously associated with interacting dyads were detected significantly faster than those associated with non-interacting dyads. This behavioral advantage was accompanied by an enhanced N2pc component that signaled increased attentional allocation. To characterize the underlying neural dynamics, we applied time-resolved multivariate pattern analysis to discriminate neural patterns elicited by faces based on their social interaction history (interacting/non-interacting vs. neutral). Results showed significantly higher decoding accuracy for faces associated with interacting dyads between 175 and 300 ms after cue onset. Furthermore, temporal generalization analysis showed that neural representations were more generalizable for faces with a history of social interaction compared to those associated with non-interacting dyads. These findings suggest that social interaction history is rapidly incorporated into face representations, forming robust and stable codes that guide subsequent face selection. Our results reveal a mechanism by which learned social context tunes the neural dynamics of face perception and prioritizes socially meaningful stimuli.", "SubmissionID": 343}, {"Day": "Tuesday", "Time": "15:30–17:00", "SessionID": 35, "Topic": "Social Perception and Emotion", "Title": "Coordination of mutual gaze in face-to-face and video-mediated communication", "Author": "Kristen Lott", "CoAuthors": "Avantika Utam, Nikolaus F. Troje", "Abstract": "Mutual gaze is an important social signal involved in regulating the exchange of information during human communication. Previous research has typically characterized mutual gaze using aggregate measures, such as total duration or frequency, and has been largely constrained to face-to-face contexts. While informative, this approach is limited for two reasons. First, using aggregate measures overlooks the dynamic coordination of gaze between partners, such as when, and under what conditions, mutual gaze is achieved following direct gaze initiation. Second, a majority of human communication now takes place over video-mediated platforms (e.g., Zoom) where genuine, bidirectional mutual gaze is not possible. To examine how video-mediated communication affects the coordination of mutual gaze during communication, we recorded eye gaze and head orientation from dyads while they played a game of Heads-Up in three conditions: (1) regular face-to-face, (2) face-to-face through a screen-sized window cut into a barrier (to control for the smaller field of view), and (3) over Zoom using two iPads inserted into the same barrier. To determine whether mutual gaze occurred more often than expected by chance, we used a Monte Carlo simulation to generate expected values by randomly placing participant’s gaze events within the session while preserving their duration. Results showed that the probability of initiating mutual gaze after direct gaze onset was greater than what was expected by chance in the face-to-face conditions, but not in Zoom, suggesting that communication over this platform affects typical mutual gaze coordination. Further, the probability of initiating mutual gaze after direct gaze onset was dependent on the gaze angle of the responder from the initiator. Together, these findings provide insight into the impact of communication media on mutual gaze coordination.", "SubmissionID": 391}, {"Day": "Tuesday", "Time": "15:30–17:00", "SessionID": 35, "Topic": "Social Perception and Emotion", "Title": "Eye-movement manifestations of differential safety-behaviour strategies in social anxiety", "Author": "Jastine Antolin", "CoAuthors": "Ellen Seiss, Nicola Gregory", "Abstract": "Social-cognitive theories (e.g. Clark & Wells, 1995) suggest individuals with social anxiety (SA) employ both avoidance and impression management safety-behaviours to reduce anxiety. The avoidance sub-type manifests primarily as eye-contact avoidance. Cognitive behavioural therapies aim to reduce eye-contact avoidance in SA in favour of increased engagement with positive social cues (e.g. Yoshinaga et al., 2024).\n\n However, both safety-behaviour types are thought to increase feelings of self-focussed attention, increasing anxiety. Despite the theory, the relationship between SA, feelings of self-focus and objective attention measured by eye-tracking, have not been examined during a live social interaction. \n\nTherefore, we recorded eye-movements of non-clinical participants with high (HSA;  N= 34), moderate (MSA; N = 34), and low (LSA; N = 18) SA during a live video call where a confederate interviewer displayed different  emotional expressions (positive, neutral, negative) and where participants’ self-camera was either visible or not (directly manipulating self-focus, as in Vriends et al., 2017). State anxiety, state social anxiety, and feelings of self-focus were also measured. \n\nHSA participants reported greater self-focus, and higher state SA, which was unaffected by self-camera visibility. HSA made fewest fixations to the interviewer’s eyes/face, particularly when the confederate had a neutral/negative expression. The MSA group made more fixations to the interviewer’s eyes than the HSA group, despite reporting equivalent state anxiety.  All participants increased interviewer-directed gaze during a positive expression whilst reducing interviewer-directed gaze when the self-camera was visible. \n\nThis study provides the first evidence for differential safety-behaviour strategies according to SA level: HSA showed avoidance, whereas MSA showed behaviour consistent with impression management: making more eye contact, a socially desirable behaviour. Self-focus was highest in HSA individuals, suggesting avoidance may be associated with higher self-focus than impression management, but turning the self-camera on/off did not impact feelings of self-focus.", "SubmissionID": 410}, {"Day": "Tuesday", "Time": "15:30–17:00", "SessionID": 38, "Topic": "Aesthetics and Art", "Title": "The effect of dementia on art over a lifespan: do portraits tell a more personal story of cognitive decline?", "Author": "Pik Ki Ho", "CoAuthors": "Thomas Wilcockson", "Abstract": "For an individual to create art a range of perceptual and cognitive functions are required. Our previous research has demonstrated that perceptual and cognitive systems are impaired as a result of developing dementias (e.g. Wilcockson, et al., 2019). Recently, our research indicated that linguistic analysis could be utilised to identify within an author’s writing career their use of language was affected by dementia (Pattison, Begde, & Wilcockson, 2026). This was found to be ten years prior to a dementia diagnosis, indicating a long preclinical period for dementias. Therefore, these results indicate that it is possible to retroactively analyse the work of artists who ultimately receive a dementia diagnosis to identify when in their career their perceptual and cognitive systems are impaired as a result of their developing dementia. In order to explore this hypothesis in the visual arts, six artists were identified; three artists who created art who ultimately received a dementia diagnosis and three artists who created art into their old age but did not experience dementia. For each artist, a subset of paintings was collected, with each painting created at a different period across the artist’s lifespan. Image statistics were then calculated for each of the pieces of art, so that we could analyse within-subject changes in art style, but also between-subject differences between dementia and normal ageing artists. Overall, the results would indicate whether the early stages of cognitive decline affect the creation of art, potentially ten years earlier than clinical diagnosis. If this is the case, then it may ultimately be possible to consider using art as a diagnostic marker for cognitive decline.", "SubmissionID": 214}, {"Day": "Tuesday", "Time": "15:30–17:00", "SessionID": 38, "Topic": "Aesthetics and Art", "Title": "Colour, Balance, Dynamics, and Liking in Self‑Arranged Suprematist Compositions: An Interactive Art Study", "Author": "Doris Braun", "CoAuthors": "Vanessa Kremer, Katja Doerschner", "Abstract": "What makes a composition engaging? Drawing on the formal vocabulary of Suprematist art, this study explored how colour, compositional instruction, and personal preference influence the creation and aesthetic evaluation of self‑arranged works. Ten Suprematist art works were rendered as paper cut‑outs in two conditions: an original chromatic palette and a monochromatic variant featuring black shapes on a white background. Each of twenty art naïve participants produced three distinct compositions (“stable,” “dynamic,” and “interesting”) by arranging the cut‑outs before transcribing them digitally. Participants then rated their own works and the originals on perceived balance, stability, dynamism, liking, and interest. They started with the black shapes, two weeks later they repeated the process with the chromatic ones. \n\nCompositionallayouts were quantified with measures of symmetry, mass distribution, spatialdispersion, and angular deviation from cardinal axes. Findings indicated that in stablecompositions shapes were vertically stacked near the lower pictorial field, whereas in dynamic compositions shapes displayed larger angular deviations and a more dispersed spatialspread. Interesting compositions were characterized by greater variation inorientation and positioning; the chromatic set produced slightly largerdeviations.\n\nInthe rating data, colour heightened the sense of balance in stable arrangements,amplified the impression of dynamism in both the original and self‑createddynamic works, but had no significant effect on perceived stability.Compositions labeled “interesting” received the highest liking and balancescores, colour further boosted both liking and perceived interest.\n\nOur results suggest that perceived attractiveness and aestheticpreference are contingent on the task directive, the number of shapes used,structural variety in orientation and placement, and that shape colourprimarily serves as an affective amplifier for dynamism, balance, and liking.This study demonstrates the value of participatory construction paradigmspaired with individualized preference ratings for probing the perceptualorganization principles that govern artwork interpretation.", "SubmissionID": 218}, {"Day": "Tuesday", "Time": "15:30–17:00", "SessionID": 38, "Topic": "Aesthetics and Art", "Title": "Towards tRanslational Inclusive Art & Design, Co-designed by Science, designers and the General Public, Used by Designers: lessons from real-world data collection", "Author": "Jasmina Stevanov", "CoAuthors": "László Talas, Jay Davies, Ute Leonards", "Abstract": "Current approaches to evaluating public art often rely on metrics such as community engagement, aesthetic value, and economic impact, but do not consider alignment with cognitive and perceptual capacities and diverse cultural and socio-economic backgrounds, as these factors can make environments feel either welcoming and engaging or, conversely, overwhelming and alienating. In this project, we introduce a co-design approach that simulates and tests different artwork designs within their intended environments in a virtual test space, while quantifying experience through physiological markers of engagement. We report on a case study in Higher Education in which we co-developed, in collaboration with professionals, and test-trialled a prototype contextualised design tool using VR technology. Participants were fitted with an Oculus Quest 1 headset and were able to freely explore the space by walking before sitting on one of the physical seats provided. Once seated, grey moveable floor-to-ceiling panels appeared to enclose the seating area. The panels changed designs between stress-inducing, high-contrast repetitive patterns, nature images, and abstract counterparts generated from the same images using neural style transfer techniques, allowing control over semantic content while varying abstraction. Participants’ experiences were captured through audio recordings and physiological measures (E4 wristband: BVP, HR, EDA, skin temperature, accelerometer), time-locked to panel transitions. Time-series transformer networks applied to BVP and EDA data achieved high classification accuracy when training and validation sets were drawn from the same participant pool. However, accuracy dropped substantially when validation involved entirely unseen participants. The reasons for this reduced generalisability are discussed. Findings also highlighted that nature images in a built space intended for conversation felt out of context and distracting. This illustrates the need for the development of contextualised tools to define and measure sensory stressors of environments in relation to their intended purpose.", "SubmissionID": 254}, {"Day": "Tuesday", "Time": "15:30–17:00", "SessionID": 38, "Topic": "Aesthetics and Art", "Title": "Influence of Olfactory Stimuli on Aesthetic Evaluation and Impression of Paintings", "Author": "Shino Okuda", "CoAuthors": "Akihisa Takemura, Katsunori Okajima", "Abstract": "Recent museum exhibitions increasingly incorporate multisensory experiences; however, empirical research comparing viewers' impressions with and without ambient scents remains limited, as most existing literature focuses on case studies within specific gallery environments. This study investigated how olfactory stimuli influence the subjective impression of paintings, the perceived time of day and season, through a controlled psychophysical experiment.\n\nFour distinct paintings served as visual stimuli: \"Terraces in Cagnes,\" \"L'Estaque,\" \"Peonies, Lilas and Tulips\" (Renoir), and \"Le Moulin Rouge\" (Lautrec). Four aroma oils, ylang-ylang, cardamom, Japanese cypress, and geranium, were selected as olfactory stimuli. Twenty female participants first evaluated the paintings alone, then evaluated 16 unique painting–scent combinations using the Semantic Differential method with 15 adjective pairs and categorical scales for the perceived time of day (six categories) and season (four categories).\n\nThe results showed that olfactory information significantly influenced visual evaluations. Geranium increased \"bright\" ratings, especially for \"Peonies, Lilas and Tulips\". Notably, for this still-life, which was frequently categorized as \"nighttime\" in the visual-only condition, the addition of scents significantly decreased \"night\" ratings. While the low-luminosity background in this painting may serve as a visual cue for nighttime, the results suggest that olfactory stimuli re-directed the viewers' attention toward the vivid floral subjects. This shift in attentional focus potentially modulated the perceived time of day by overriding ambient visual features. Factor analysis further revealed that the addition of cardamom and geranium resulted in higher overall ratings for “pleasant” and “clear,” whereas ylang-ylang led to lower “pleasant” ratings.\n\nFindings suggest that scents do not merely provide background atmosphere but actively modulate cross-modal perception, affecting both sensory attributes and temporal interpretations. This research highlights the potential of integrated olfactory–visual design in enhancing the aesthetic experience in gallery environments.\n\n*This study was supported by JSPS KAKENHI Grant Number JP23KK0185.", "SubmissionID": 258}, {"Day": "Tuesday", "Time": "15:30–17:00", "SessionID": 38, "Topic": "Aesthetics and Art", "Title": "The Perception of Biolocomotion: Revisiting Michotte’s ‘Caterpillar Effect’", "Author": "GIULIA PAROVEL", "CoAuthors": "Marko Nikolic, Michele Vicovaro", "Abstract": "Beyond his seminal and widely recognized work on perceptual causality, Michotte also explored the phenomenon of biolocomotion, demonstrating how single moving shapes can evoke the impression of a living being. Specifically, he described an autonomous movement generated by a rectangle alternating the motion of its ‘head’ and ‘tail’ sections. This creates the phenomenal impression of a ‘self-advancing caterpillar’ through phenomenally elastic and organic cycles of expansion and contraction.\n\nIn this study we investigated the optimal conditions for the perceived naturalness and pleasantness of this effect. Thirty-two participants viewed 18 animations of a black rectangle (initial length: 2.5 cm) moving in caterpillar mode. We manipulated three variables: expansion length (0.5L, L, 2L), speed (2.47, 4.94, 9.88 cm/s), and direction. Participants rated naturalness and pleasantness on a 0-1 scale and provided qualitative descriptions of any perceived animal resemblance. Results show a significant interaction between length and speed: short motions were perceived as more natural at slow-to-medium speeds, while fast speeds were preferred for long motions. Overall, naturalness follows an inverted U-shaped function of the log-ratio between length and speed. While pleasantness followed similar patterns, speed exerted a stronger independent effect, with higher speeds generally rated more positively. Qualitative analysis revealed that ‘caterpillar’ descriptions strongly correlated with both naturalness and pleasantness. However, the two constructs do not completely overlap, as not all ‘caterpillar’ stimuli were judged equally pleasant. Notably, associations with other crawling animals (e.g., snakes, worms, or snails) correlated negatively with both ratings. This suggests that naturalness and pleasantness do not merely reflect any association with a living creature, but rather how the motion of a living being appears prototypical.", "SubmissionID": 300}, {"Day": "Tuesday", "Time": "15:30–17:00", "SessionID": 38, "Topic": "Aesthetics and Art", "Title": "Boundary Extension in Renaissance frescos", "Author": "Marco Bertamini", "CoAuthors": "Giulio Contemori, Veronika Knedlíková Wanková, Marco Bertamini", "Abstract": "Boundary Extension (BE; Intraub et al., 1992) refers to a systematic bias; individuals tend to remember having seen a wider portion of a scene than was presented. We tested whether the same effect is found for scenes in Renaissance frescoes, given the use of linear perspective to create a sense of space. We conducted four online experiments. Participants were presented with pairs of images and judged differences in viewing distance, from −2 (“much closer”) to +2 (“much farther”). In the first experiment, BE was replicated using 40 photographs of outdoor scenes taken with a 35 mm lens. In the second experiment, the same design was applied to 40 images from Renaissance frescoes, which were matched in size to the photographs. In this case, BE was not observed. The third experiment included 30 photographs and 30 frescoes from the previous experiments, with the two types interleaved, and confirmed BE only for photographic stimuli. This discrepancy could be due to the absence of depth-of-field (DoF) in frescoes. A fourth experiment was conducted where frescoes were digitally manipulated. Blur was applied to peripheral regions through a custom MATLAB script designed to approximate naturalistic DoF, with a progressive blur corresponding to a simulated aperture of f/4. Blur was only present in the baseline image (the intermediate view). Although previous studies have found evidence of BE with artificially induced DoF (Hafri et al., 2022), our results did not show evidence of BE in frescoes. This may be due to the nature of the images, which may not depict sufficiently open or panoramic scenes, or to limitations in the realism of the simulated DoF or of the frescoes compared to photographs. It can also be important that observers are aware that they are looking at frescos, which by definition are flat images on walls.", "SubmissionID": 393}, {"Day": "Tuesday", "Time": "15:30–17:00", "SessionID": 38, "Topic": "Aesthetics and Art", "Title": "Symmetry, Curvature, and Boundary Complexity in Haptic and Visual Aesthetic Appreciation", "Author": "Berin Softa", "CoAuthors": "Amna Malik, Müge Cavdan, Katja Dörschner", "Abstract": "Aesthetic judgments play a fundamental role in everyday experiences of objects,  environments, and in the appreciation of art - for example, when admiring a smartphone for its sleek design or when enjoying the dynamics in a line drawing. While most research on aesthetic judgments has focused on visual objects, recent work indicates that touch elicits aesthetic experiences (e.g., Carbon & Jakesch, 2012). Yet, a direct comparison of aesthetic judgments in vision and touch is still scarce. Here, we systematically examined how symmetry, global curvature, and boundary complexity of 2D raised black shapes on white square backgrounds influence aesthetic judgments across the two modalities. Employing a within-participant design, 12 participants either explored (blindfolded) a given shape with their dominant index finger for 15 seconds or visually inspected it for the same amount of time. Following each exploration, the stimulus was rated on a 100-point scale on aesthetic appeal, and in two separate blocks, also judged on perceived symmetry and complexity, respectively. The order of blocks was the same across participants. An LMM analysis with the fixed factors modality, symmetry, global curvature, and boundary complexity revealed that overall, aesthetic appeal differed in visual and haptic modalities. In terms of stimulus features, the results show that only symmetry determined appeal, with symmetric shapes being rated as more appealing, in both modalities. We also find a strongly significant two-way interaction between global curvature and modality: while pointy shapes were judged more appealing visually, curvy shapes were preferred haptically. Taken together, these results suggest that, while visual and haptic aesthetic judgments may be governed by some common principles, each modality may also be sensitive to different factors, such as global shape curvature. These modality-specific idiosyncrasies might arise from the distinct ways eyes and hands explore the environment to meet different affective and functional needs.", "SubmissionID": 404}, {"Day": "Tuesday", "Time": "15:30–17:00", "SessionID": 38, "Topic": "Aesthetics and Art", "Title": "The Effects of Contrast Modulations on Aesthetic Appreciation and Eye Movements in Monet’s Paintings", "Author": "İnci Ayhan", "CoAuthors": "SUHEYLA AYDEMIR, NUR SILA KARDAS, GIZEM GUNENDI", "Abstract": "Aesthetic appreciation is shaped by the way the visual system processes information through two primary pathways: The dorsal-stream, which is primarily involved in spatial processing, motion, and visually guided action and is often linked to the processing of luminance-defined information, and the ventral-stream, which is more strongly associated with object recognition and hue-contrast processing. Although most experimental aesthetics research focused on semantic ambiguity, the present study examines lower-level perceptual ambiguity, which arises from the selective reduction of specific contrast type. Impressionist painters such as Claude Monet appear to have exploited this phenomenon through equiluminance, producing shimmering and spatially unstable visual impressions as in “Impression, Sunrise”. Sixty-six Boğaziçi University students viewed five original Monet paintings and digitally manipulated versions of selected regions of interest (ROIs) presented in three conditions: luminance-contrast-only, hue-contrast-only, and mixed-contrast. Eye movements were recorded and aesthetic appreciation was assessed with the AEQ and ARS scales. We hypothesised that the hue-contrast-only and luminance-contrast-only conditions would elicit fewer but longer fixations, along with higher aesthetic ratings, reflecting increased cognitive effort to resolve perceptual ambiguity. Results, on the other hand, showed that aesthetical preference scale scores and total fixation counts remained stable across conditions, suggesting that Monet's compositional structure is sufficiently robust to preserve its integrity despite ROI-based contrast manipulations. However, ROI fixation duration percentages were found to be higher in the hue-contrast-only condition, indicating that the allocation of visual attention across focal regions may be directly shaped by contrast condition. Significant effects of presentation was also observed, with ROI fixation duration percentages decreasing following repeated exposure. Moreover, interactions between contrast condition and painting suggested that the impact of contrast is modulated by the unique layout of each artwork. Overall, the results suggest that Monet’s compositional structure constrains gaze robustly, while local attentional allocation remains sensitive to ROI-based contrast manipulations.", "SubmissionID": 517}, {"Day": "Tuesday", "Time": "15:30–17:00", "SessionID": 38, "Topic": "Aesthetics and Art", "Title": "Audiovisual emotional congruency modulates gaze dispersion and aesthetic evaluation of paintings", "Author": "Funda Yılmaz", "CoAuthors": "Tessa M. van Leeuwen, Rob van Lier", "Abstract": "Audiovisual congruency shapes aesthetic experience, yet the role of visual exploration in this process remains poorly understood. Building on prior fMRI work demonstrating increased cortical activation under audiovisual emotion incongruency (Yilmaz et al., 2025), we investigated how pairing paintings with emotionally congruent or incongruent music affects gaze behavior and beauty ratings. Sixty-one participants viewed happy or sad paintings accompanied by music that was either emotionally matched (e.g., sad painting, sad music) or mismatched (e.g., happy painting, sad music). Eye movements were recorded, and gaze dispersion, which is defined as the spatial variance of fixation patterns, was used to quantify exploratory viewing. Aesthetic evaluation was assessed via beauty ratings after each trial. First, the results of a generalized linear mixed-effects model showed that incongruent music-painting combinations significantly increased gaze dispersion, indicating broader, less focused visual exploration under emotional incongruency. A second generalized linear mixed effects model then examined whether gaze dispersion predicted beauty ratings. Although the spatial distribution of fixations was largely stable across conditions, individual differences in dispersion reliably predicted aesthetic experience: people with more dispersed gaze reported lower beauty ratings. Importantly, audiovisual congruency moderated this relationship, revealing a robust negative effect of gaze dispersion on beauty that was significantly enhanced under incongruent conditions. These findings can suggest that aesthetic experience is not determined solely by stimulus properties but depends on how people visually engage with the paintings. Future analyses will examine the influence of individual differences on gaze behavior, including arts and music experience, cognitive flexibility, personality traits, and emotional state, to reveal how distinct participant clusters differ in their exploratory behavior. Furthermore, we will investigate the degree to which gaze patterns remain consistent within individuals.", "SubmissionID": 539}, {"Day": "Tuesday", "Time": "15:30–17:00", "SessionID": 38, "Topic": "Aesthetics and Art", "Title": "Empathy in artworks: Combining evidence from pupillometry, facial EMG and self-reports", "Author": "Anastasia Maria Kesoglou", "CoAuthors": "Efi Kyprianidou, Anastasia Maria Kesoglou", "Abstract": "Empathic responses to visual art have been shown to engage multiple pathways with psychophysiological evidence generally stronger for figurative than non-figurative content (Gerger, Pelowski, & Leder, 2017). In non-figurative artworks, patterns and forms engage empathic processes differently, potentially reflecting a greater reliance on top-down cognitive interpretation given their lack of animate content (Melcher & Bacci, 2013). Yet objective evidence which does not rely on self-reports studies single aspects of empathy. Grounded in the distinction between cognitive, affective, and motor empathy, the focus of this multi-modal psychophysiological study is to investigate whether empathic responses towards non-figurative art (abstract artworks and landscapes that retain natural scenes without human figures) can be measured objectively and be compared to figurative artworks. Participants (N=27, m=12/f=15; Mean age=33.50, SD=5.90) viewed abstract, landscape, and figurative artworks across three condition blocks: cognitive empathy (valence identification), affective empathy (intensity of felt emotion), and passive viewing. Responses were assessed using self-reports, pupillometry, and facial EMG on a baseline-corrected and valence-specific basis. Participants showed accurate cognitive-based empathic responses in all three artwork types (figure, landscape, abstract) while affective-based empathic responses were more intense for figurative and landscape art, but also evident for abstract art. Motor empathic responses were detected for all artwork types, as evidenced by significant facial muscle activation above baseline. Results suggest that prevailing theories of aesthetic empathy are differentially operative across the three empathic pathways. Motor empathic responses across all artwork types support embodied simulation as a content-independent mechanism (Freedberg & Gallese, 2007), while the content-independence in valence identification suggests a top-down interpretive engagement during cognitive empathy. Sharing emotion even with abstract art—though with reduced intensity, suggests that affective empathy may depend on the availability of a hypothetical persona (Levinson, 1996), an experiential referent possibly more readily evoked by depictions of natural scenes.", "SubmissionID": 543}, {"Day": "Wednesday", "Time": "09:00–10:30", "SessionID": 18, "Topic": "Attention", "Title": "Preserved covert attention but altered oculomotor dynamics in myopia", "Author": "Katia Steinfeld", "CoAuthors": "Marisa Carrasco", "Abstract": "GOAL: Covert attention enhances visual perception across the visual field, often with pronounced effects in the periphery, where sensory uncertainty is highest. Individuals with myopia, even when corrected, exhibit reduced acuity and contrast sensitivity in the peripheral visual field compared to emmetropes. Here, we investigated whether  the extent of covert attention effects and their corresponding oculomotor responses vary as a function of myopia.\n\nMETHODS: Participants, all with corrected-to-normal vision, performed two-alternative forced-choice (2AFC) tasks to discriminate the orientation of tilted Gabor patches. Stimuli were presented at 6° eccentricity on the horizontal meridian while participants maintained central fixation. Endogenous (voluntary) and exogenous (involuntary) attention were manipulated using informative central and uninformative peripheral cues, respectively,  shortly before the stimuli appeared. Cues were valid, invalid, or neutral, and presented randomly. Tilt thresholds for each participant were determined using a Weibull staircase (80% accuracy). Microsaccades were recorded throughout the trial.\n\nRESULTS: Both groups exhibited robust endogenous and exogenous attentional effects: valid cues increased performance (d’), while invalid cues decreased performance, compared to neutral cues. The magnitude of these attentional benefits and costs were comparable between myopes and emmetropes. In both experiments, participants exhibited a microsaccade bias toward the target during the response preparation period, however, this bias was significantly reduced in the myopic group. \n\nCONCLUSION: Myopia, a condition associated with axial eye elongation and typically developing in late childhood, leads to peripheral visual deficits. Our findings indicate that covert attention remains functional in myopia and may partially compensate for these sensory deficits in corrected-to-normal adults. However, the attenuated microssaccades dynamics suggest that, while attentional benefits are preserved, downstream processes–potentially related to decision stages–may be altered in myopia.", "SubmissionID": 423}, {"Day": "Wednesday", "Time": "09:00–10:30", "SessionID": 18, "Topic": "Attention", "Title": "Sustained and selective attention in multiple object tracking", "Author": "Nika Adamian", "CoAuthors": "Søren K. Andersen", "Abstract": "Selective attention supports many aspects of perception and goal-directed behaviour, yet its relationship to everyday attentional experience remains poorly understood — laboratory studies typically examine attention over timescales of only a few seconds, while measures of real-world attention rely predominantly on vigilance-based tasks. To address this, we examined selective attention during multiple object tracking in two experiments, both using frequency-tagging and steady-state visual evoked potentials (SSVEPs) to index prioritisation of targets over distractors. \n\nExperiment 1 focused on individual differences, asking whether trait distractibility reflects the strength of selective attention or the ability to sustain it. Forty-eight participants completed a multiple object tracking task and a validated inattention questionnaire. Unexpectedly, participants with higher distractibility scores showed steeper improvements in tracking accuracy across the session, outperforming less distractible individuals by the end. At the neural level, ASRS scores were positively correlated with overall SSVEP amplitudes, yet the strength of attentional selection -- the difference in SSVEPs elicited by targets and distractors -- did not vary with self-reported distractibility, suggesting that this trait is associated with stronger sensory responses rather than impaired selective attention.\n\nExperiment 2 employed a continuous tracking paradigm, removing inter-trial breaks to quantify time-on-task effects. Participants completed a continuous 20-minute tracking task where SSVEPs indexed selection within each 60-second interval. Attention modulation indices (AMIs) weakened progressively within each trial, yet the average trial AMI strengthened across the session, suggesting that attention is not just sustained but dynamically updated throughout the experimental task. Selection was also reduced immediately preceding tracking errors, confirming that lapses in sustained attention predict tracking failures. \n\nTogether, these findings show that selective attention during multiple object tracking reflects both trait-like individual differences and time-varying dynamics that can help characterise attention in everyday life.", "SubmissionID": 522}, {"Day": "Wednesday", "Time": "09:00–10:30", "SessionID": 18, "Topic": "Attention", "Title": "Behavioral and Neural Correlates of Selective Attention in Adults Born Preterm", "Author": "Hilal Cimen", "CoAuthors": "Can Dora Akcan, Zahide Pamir", "Abstract": "Preterm birth has been linked to long-term visual–perceptual difficulties, yet the underlying neural mechanisms remain unclear. These difficulties are most commonly attributed to dorsal stream dysfunction, although evidence remains inconsistent. An alternative account proposes a more global impairment in visual processing. To test this, we combined psychophysics and fMRI to examine selective attention in adults born preterm and term-born controls. Participants performed letter (8 control, 9 preterm) and motion tasks (6 control, 6 preterm) under attended and unattended conditions, with peripheral distractors presented either simultaneously or sequentially. In the attended condition, they detected luminance decreases in the peripheral distractor; in the unattended condition, they identified a central letter or motion while ignoring peripheral distractors. Perceptual grouping was manipulated to dissociate top-down and bottom-up attentional influences. Psychophysical results showed that motion thresholds were significantly affected by perceptual grouping (p = 0.002) and distractor presentation (p = 0.008), with higher thresholds in no-grouping and sequential conditions. There was a strong main effect of attention in letter tasks (p < 0.001), along with interactions between attention and distractor presentation (p = 0.004) and among attention, grouping, and birth status (p = 0.01). Notably, the preterm group showed a smaller increase in thresholds between attended and unattended conditions in the no-grouping condition. fMRI analyses (7 control, 7 preterm) that focused on V1, V4, and hMT+ regions, revealed a significant interaction between attention and birth status in V4 (p = 0.01), displaying that the control group but not the preterm group showed higher BOLD signals in attended conditions. A similar pattern was numerically observed in hMT+. Additionally, sequential distractor presentation elicited higher BOLD responses across groups (p = 0.02), supporting biased competition. The results indicate a partially differentiated pattern of selective attention between preterm- and term-born adults.", "SubmissionID": 534}, {"Day": "Wednesday", "Time": "09:00–10:30", "SessionID": 18, "Topic": "Attention", "Title": "Evaluating Rapid Invisible Frequency Tagging (RIFT) in a dry EEG system using a gamified Posner task", "Author": "Lindsey Fraser", "CoAuthors": "Francis Gingras, Jérémy Lamontagne, Ryan Hanson, Daniel Fiset", "Abstract": "Rapid invisible frequency tagging (RIFT) is a promising method for noninvasively monitoring spatial attention. In the RIFT paradigm, luminance modulations at >50 Hz are used to embed invisible flicker in a high-speed display. A growing body of literature shows that this flicker produces robust steady-state evoked responses in the visual cortex and beyond. The relative amplitude and coherence of the response serve as clear metrics of dynamic spatial attention, distinct from overt gaze behaviour. Thus, RIFT offers a unique window into attention while remaining completely undetectable to the participant.\n\nNo study to date has examined RIFT in dry-electrode EEG. Given the comfort and accessibility of dry electrode headsets, establishing a proof of concept for RIFT in dry EEG is a critical step toward real-world BCI and performance-monitoring applications where wet EEG and MEG are impractical. In addition, characterizing the impact of mental load and attentional resource allocation on the RIFT response is essential for developing a comprehensive RIFT analysis pipeline for online operator performance monitoring.\n\nIn this work, we present SpaceRIFT, a gamified Posner cueing paradigm. Participants maintain central fixation while four peripheral display regions are tagged at distinct frequencies (Experiment 1) and phases (Experiment 2). A valid-cue phase establishes baseline attentional modulation, followed by a \"damaged computer\" phase in which cue reliability is degraded. Neural responses are recorded using either dry-electrode EEG (Wearable Sensing) or wet-electrode EEG (Brain Vision).\n\nAnalyses will characterize the functional frequency range and phase resolution supported by dry-electrode EEG, establishing the operational RIFT window available in an accessible, deployable system, and relate behavioural indices of mental load and cue reliability to trial-wise neural responses. We expect that dry electrode EEG will support a well-defined operational RIFT window, with converging behavioural–coherence relationships aligned with wet EEG benchmarks.", "SubmissionID": 553}, {"Day": "Wednesday", "Time": "09:00–10:30", "SessionID": 18, "Topic": "Attention", "Title": "Top-down temporal attention influences visual perception through frequency-distinct modulations", "Author": "Christina Bruckmann", "CoAuthors": "Assaf Breska", "Abstract": "Just as attention gates our conscious perception in space, the brain proactively prioritizes moments in time based on temporal regularities and allocates resources accordingly, resulting in performance benefits at attended moments. However, the neural mechanisms underlying temporal attention are not yet fully understood. One intriguing possibility relies on the now established link between fluctuations in visual perception and the neural state at the moment of stimulus presentation, such as the momentary phase of endogenous oscillations. Through this, temporal attention might affect visual perception if knowing the timing of an upcoming stimulus could be used to proactively align the optimal oscillatory phase to the moment of the predicted target onset. While this has been shown for periodic streams and attributed to oscillatory entrainment, it is unclear whether such mechanism is also involved in aperiodic, memory-based attention. In a series of experiments, we investigated whether temporal attention as guided through memorized time intervals operates through phase alignment in the occipital cortex. Participants conducted challenging visual discrimination tasks under delayed response protocols, to minimize involvement of anticipatory motor activity. Temporal predictions were provided through periodic streams or cue-interval memorized associations, and participants provided both objective discrimination performance and subjective perception. We found that memory-based temporal cueing increased phase alignment in the delta band (0.5-3 Hz) to an equal degree as rhythmic entrainment. However, alpha band (8-12 Hz), where the temporal window of optimal perception is much narrower, did not show clear phase modulation. Additionally, temporally guided anticipatory suppression of alpha-band amplitude was decoupled from the observed perceptual benefits of both subjective and objective perception. Taken together, these results show that low-frequency phase alignment can occur in the absence of oscillatory entrainment, and reveal that temporal attention changes interactions between alpha activity and behaviour compared to spontaneous fluctuations.", "SubmissionID": 557}, {"Day": "Wednesday", "Time": "09:00–10:30", "SessionID": 18, "Topic": "Attention", "Title": "Are attentional state fluctuations impervious to task load?", "Author": "Xin Liu", "CoAuthors": "Doug Barrett, Aurelio Bruno, David Souto", "Abstract": "Our ability to focus visual attentional resources fluctuates on a moment-to-moment basis, producing periods of stable and unstable performance (Esterman et al., 2013; Rosenberg., 2026). While increasing task load typically impairs performance, it remains unclear whether impairments arise from modulating fluctuations between underlying optimal and suboptimal attentional states. Here, we used reaction time variability and pupillometry to index fluctuations in attentional state in a novel orientation discrimination task. Task difficulty was manipulated block-wise by the presence or absence of task irrelevant colour variation in displays.\n\nWe expected fluctuations in performance to depend on task difficulty, such that increased load would alter the temporal structure of attentional state fluctuations. While the presence of colour distractors reduced accuracy significantly, this did not affect reaction time variability. Independently of colour distractors, lower accuracy was observed during periods of high reaction time variability, while pupil size was associated with reaction time variability but not performance directly. We found no reliable evidence that colour distractors modulated reaction time variability or pupillometric markers of attentional fluctuation. Instead, the observed relationship between pupil size and reaction time variability suggests these fluctuations were largely independent of our load manipulation and may reflect intrinsic factors.", "SubmissionID": 558}, {"Day": "Wednesday", "Time": "09:00–10:30", "SessionID": 18, "Topic": "Attention", "Title": "The effects of attention and causal structure on the neural representation of naturalistic movies", "Author": "Marisa Monika Amalie Birk", "CoAuthors": "Ingmar de Vries, Eva Berlot, Christoph Huber-Huber, Moritz Wurm, Floris de Lange", "Abstract": "Events are often linked by cause-and-effect relationships that our brain uses to anticipate future perceptual inputs, such as dark clouds preceding a rainstorm. Here, we investigated how disrupting these causal relationships influences neural representations of perceptual features. Specifically, we tested whether the brain updates its internal models automatically after a prediction is violated or requires top-down attention. \n\nIn a MEG experiment, 54 participants watched 8-minute-long movies while either attending to the movies or performing a distraction task. In the attended condition, catch trials required participants to judge whether the movie continued in an expected manner, whereas in the distraction condition they judged whether briefly appearing shapes were the same or different. This design allowed us to assess whether predictions were formed automatically or required top-down attention. Crucially, the movies were also played either forward or backward. Because natural events unfold in a fixed causal order, reversing the movies produces clear violations of the underlying causal structure without altering the frame-by-frame visual input. \n\nWe used dynamic RSA, a novel extension of representational similarity analysis, in which temporally variable models of stimulus features are compared to neural data. This allows us to test directly when and to what extent these features are represented in the brain.  \n\nPreliminary analyses showed that low-level visual features including luminance and optical flow were represented in a lagged manner (360-560 ms and 100-120 ms, respectively) in early visual regions (V1, V2, and V3/V4). Attention enhanced these representations, whereas reversing the causal structure produced no consistent effect on representational dynamics. Body posture was represented in LOTC at 300-500 ms, with neither attention nor movie direction modulating this representation. \n\nThese preliminary findings suggest that while attention shapes early sensory processing, neural representations of both low-level and higher-level visual features may be robust to violations of causal event structure.", "SubmissionID": 564}, {"Day": "Wednesday", "Time": "09:00–10:30", "SessionID": 18, "Topic": "Attention", "Title": "Attentional deployment in the visual field includes both task- and observer-specific components", "Author": "Thomas Alrik Sørensen", "CoAuthors": "", "Abstract": "Visual attention studies often distribute stimuli on an imaginary circle to minimise foveal and low-level confounds (e.g., Sørensen, Vangkilde, & Bundesen, 2015). While the Theory of Visual Attention (TVA; Bundesen, 1990) formally allows spatial variation, it is frequently applied in ways that assume homogeneity across the visual field and is seldom examined directly (with rare exceptions, e.g., hemifield lateralisation; Habekost & Rostrup, 2006). Here, we challenge this assumption by demonstrating systematic and stable spatial structure in attentional deployment.\n\nRevisiting data from Sørensen, Vangkilde, and Bundesen (2015), we estimate attentional weights (w) across six equidistant spatial positions over repeated sessions and task contexts. Replicating previous reports of inter-individual spatial biases (Nordfang, Staugaard, & Bundesen, 2018), we observe pronounced and idiosyncratic deviations from spatial uniformity. Critically, these spatial profiles exhibit substantial within-subject stability across sessions, forming an attentional “fingerprint” of the observer.\n\nImportantly, previous work has demonstrated that attentional measures can be highly sensitive to methodological factors, including eye movements and practice effects (Petersen & Kyllingsbæk, 2013). In contrast, the spatial weighting profiles observed here remain robust across sessions, indicating that they capture stable aspects of attentional deployment rather than transient task artefacts.\n\nHowever, these fingerprints are not fixed. Partial-report paradigms systematically reshape spatial weighting profiles across sessions, whereas whole-report paradigms yield comparatively stable configurations. This dissociation suggests that partial report engages adaptive or strategic control processes that dynamically modulate spatial selection.\n\nTogether, these findings indicate that attentional weights reflect both stable individual structure and task-dependent dynamics. More broadly, they challenge the comparability of TVA-derived parameters across paradigms and highlight the need to account for individual spatial profiles when interpreting measures of visual attention.", "SubmissionID": 566}, {"Day": "Wednesday", "Time": "09:00–10:30", "SessionID": 18, "Topic": "Attention", "Title": "The brain inhibits salient, but not non-salient, distractors in the control of eye-tracking.", "Author": "Trevor Crawford", "CoAuthors": "", "Abstract": "Numerous studies have examined factors that influence whether attention is captured by distractors, often focusing on the roles of bottom-up factors like target salience and top-down control. While these studies tend to emphasize the capture of attention, in everyday situations, we are typically adept at suppressing visual distractions to focus on the object of interest. This raises key questions: How is suppression of distractors achieved? Is attention solely drawn to the most salient object, or does processing at the distractor's location play a role? How long does this inhibition last, and is it based on the distractor’s identity or location? Can this inhibition handle multiple distractors, and how important is distractor saliency?\n\nTo address these questions, the Inhibition of Recent Distractor (IRD) Task, introduced by Crawford et al. (2005), (Smith & Crawford 2024) was used. In this task, a peripheral target is presented along with a distractor, followed by a new target appearing either at the previous target’s location (T-T), a new location (T-N), or the previous distractor’s location (T-D). Initial findings showed active inhibition of the distractor’s location for up to 5 seconds, which is location-based. Recent studies confirmed the IRD effect and highlighted the importance of distractor saliency in suppressing multiple distractors.\n\nReferences:\n\nCrawford, T. J., Higham, S., & Hill, S. (2005). The Inhibitory Effect of Recent Distracter. Vision Research, 45(27), 3365-3378. https://doi.org/10.1016/j.visres.2005.07.024\n\nSmith, E., & Crawford, T. (2024). The inhibitory effect of a recent distractor: Singleton vs multiple distractors. Experimental Brain Research, 242(7), 1745-1759. https://doi.org/10.1007/s00221-024-06846-3", "SubmissionID": 605}, {"Day": "Wednesday", "Time": "09:00–10:30", "SessionID": 33, "Topic": "Cognition, Decision Making, and Confidence", "Title": "Limits of Cross-Task Generalisation of Category-Selective Neural Codes", "Author": "Nicholas Myers", "CoAuthors": "Jan Derrfuss, Nicholas Myers", "Abstract": "Recent work has demonstrated that tasks with shared underlying structure can share neural task representations, even if the tasks operate over distinct stimuli, leading to the proposal that many tasks are solved using reusable amodal neural representations. For example, prefrontal populations that are category-selective in one task (e.g., distinguishing cats from dogs) are also selective in another task (e.g., distinguishing sports cars from sedans). Such generalisation can accelerate learning and better use limited neural resources. However, when stimuli can be encountered in multiple tasks and therefore require different task-specific stimulus-response mappings, neural cross-task generalisation can lead to interference, making generalised representations inefficient. Tasks with low cross-task interference may thus favour generalisation, while tasks with high potential interference may favour independent, task-specialised representations. Here we examined how neural task representations adapt when they suddenly transition from a low- to a high-interference regime. 32 human participants completed a new visual category learning paradigm as we measured task-specific category-selective neural patterns using electroencephalography. Participants learned to categorise simple visual shapes in two separate categorisation tasks consisting of distinct stimulus sets and distinct category boundaries. In the low-interference session (day 1), category-selective neural patterns generalised between tasks, indicating the use of a shared, task-independent categorisation code. In the next session (day 2) we created interference by introducing new stimuli which were shared across both tasks but needed to be categorised differently in them. While we could still decode categories in both tasks, these codes no longer generalised between tasks, indicating that interference led to task-specific neural representations. Curiously, the previously learned stimuli continued to be represented in a task-generalised code. Taken together, our results show that efficient, generalisable neural task codes adapt flexibly to resolve interference by warping neural category representations to maintain generalisation where possible while orthogonalising stimulus representations with potential interference.", "SubmissionID": 378}, {"Day": "Wednesday", "Time": "09:00–10:30", "SessionID": 33, "Topic": "Cognition, Decision Making, and Confidence", "Title": "Causality perception under visual uncertainty", "Author": "Lina Eicke-Kanani", "CoAuthors": "Lukas Maninger, Anna-Lena Eckert, Christina Schmitter, Benjamin Straube, Thomas Wallis", "Abstract": "Causality perception occurs in simplified 2D animations of two-object collisions, where a launcher approaches a stationary target that moves upon contact (“launching displays”). Observers viewing centre-to-centre collisions usually report perceiving more causality, the more launcher and target moving direction are aligned. In this work, we extend a previous account that views causality perception as a mismatch between an observer’s real-time observation of the target moving angle and their initial prediction of the target moving angle. Here, we investigated whether observers’ perception of the launcher moving angle is retrospectively influenced by a later observation of the target moving angle. We expected that participants assess the compatibility between predictions and observations to evaluate causality, but also reconcile violations of predictions by retrospectively adjusting their observation of the pre-collision state (postdiction).\n\n32 participants performed three randomly-interleaved tasks on consecutive trials: 1. viewing a launching display until the collision and indicating the predicted target trajectory 2. viewing a full launching display (pre- and post-collision) and rating the causality of the collision on a slider scale and 3. viewing a full launching display (as in 2) and then indicating the launcher’s starting point.\n\nBoth predictions of target trajectory and postdictions of launcher starting point showed a repulsion away from cardinal directions. Observers’ postdictions seemed to show a weak, but systematic dependence on target moving angle, supporting the idea of a retrospective reconciliation of mismatching sensory evidence in launching displays. A probabilistic model implementing a predictive mechanism of causality perception produced causality judgments that aligned well with our behavioural data. This model shows that prediction, postdiction and causality judgments exhibit a direction-dependence. In our current account, we cannot discriminate between predictive and retrospective components of causality judgments, which remains an objective for future research.", "SubmissionID": 396}, {"Day": "Wednesday", "Time": "09:00–10:30", "SessionID": 33, "Topic": "Cognition, Decision Making, and Confidence", "Title": "The effect of self-generated action on visual perception: testing magnocellular and parvocellular contributions", "Author": "Tuğçe Dalmış", "CoAuthors": "Gizem Y. Yildiz, Roy Mukamel, Bianca van Kemenade", "Abstract": "Voluntary actions are thought to modulate sensory processing through predictive mechanisms such as efference copies. While attenuation of self-generated stimuli is well established in tactile and auditory domains, evidence in vision remains inconsistent, with studies reporting attenuation, enhancement, or no effect. One possible source of this variability is the involvement of different visual pathways. In eye-movement paradigms using simple grating stimuli, low- and high-spatial-frequency information has been shown to be differentially affected by action, suggesting pathway-specific modulation. However, it remains unclear whether similar effects generalize to voluntary button presses and more complex naturalistic stimuli. \n\nPresent behavioral study investigated whether action-related modulation depends on spatial frequency, thereby biasing magnocellular (low spatial frequency; LSF) and parvocellular (high spatial frequency; HSF) processing. Participants (N = 34) categorized briefly presented naturalistic images (cats, birds, cars, airplanes) as animate or inanimate under active (self-triggered) and passive (externally triggered) conditions. Stimuli were filtered to isolate LSF and HSF information. \n\nAccuracy was significantly higher for LSF than HSF stimuli, indicating robust effects of spatial frequency. However, no significant differences were observed between active and passive conditions, and no interaction between action and spatial frequency emerged. Reaction times showed a similar pattern. Finally, exploratory analyses of run effects and individual differences indicated learning-related improvements across runs, but provided no additional evidence for reliable action-related effects.\n\nThese findings suggest that, within this paradigm, self-generated actions do not reliably modulate visual perception, even when low- and high-spatial-frequency processing is selectively engaged. More broadly, they indicate that action-related effects in vision may depend on stimulus characteristics, task design, or the type of action used to generate sensory consequences, and may therefore be more subtle or context-dependent than in other sensory modalities.", "SubmissionID": 401}, {"Day": "Wednesday", "Time": "09:00–10:30", "SessionID": 33, "Topic": "Cognition, Decision Making, and Confidence", "Title": "Distort Enough and It Lives: Dynamic Local Shape Deformations Drive Animacy Perception", "Author": "Saliha Arabacı", "CoAuthors": "Y. Emre Türkmen, Katja Doerschner, Dicle Dövencioğlu", "Abstract": "Prior work showed that local shape distortions can parametrize rigid and non-rigid transparent layers. Here, we investigated the role of non-rigid motion in animacy perception through local shape distortions. Two psychophysical experiments were conducted using the Eidolon Factory, a toolbox that enables parametric distortion of images along two independently controlled dimensions: intensity (reach) and locality (grain). In the first experiment, we examined whether dynamic local shape distortions and movement direction were sufficient to elicit animacy attribution. We used a 2 (movement type: animate vs. inanimate) x 2 (motion direction: upward vs. downward) x 4 (shape type: ellipse to rounded rectangle) within-subjects design (N = 16). Participants adjusted distortion parameters such that each stimulus either appeared to them being self-propelled (animate) or being dragged (inanimate). Results revealed that reach values of the observer settings were significantly higher in the self-propelled condition than in the dragged condition, while grain values did not differ systematically. Reach values for upward motion were also significantly higher than those for downward motion, whereas no significant difference was observed in grain values. Shape type did not elicit any effects on either reach or grain values. Based on these results, we conducted a forced choice experiment, using a 2 (movement type: self-propelled vs. dragged) x 2 (movement direction: upward vs. downward) within-subjects design (N = 28). Here, participants viewed nine pairs of clips consisting of stimuli at three reach levels and three grain levels with either upward or downward motion and selected the stimulus they perceived as animate. Findings confirmed that reach values are the primary cue driving animacy judgments, and that participants reliably distinguished animate from inanimate stimuli despite substantial inter-individual variability. Together, these results suggest that low-level local shape distortions constitute a viable and parametrically controllable cue for perceived animacy.", "SubmissionID": 402}, {"Day": "Wednesday", "Time": "09:00–10:30", "SessionID": 33, "Topic": "Cognition, Decision Making, and Confidence", "Title": "Task Relevance in Response Priming with Occlusions: A Feature Flip-flop Across Occluders Thickness", "Author": "Xin Ying Lee", "CoAuthors": "Thomas Schmidt", "Abstract": "This study investigates how stimulus visibility modulates response priming across two visual dimensions, colour and shape. Participants performed a priming task with coloured shapes (red/blue circles/squares) presented at fixation, responding to a subsequent target based on either its colour or shape. Prime visibility was manipulated using a pair of grey occluders positioned either horizontally or vertically, with occluder thickness varied in width to reduce the visibility of the prime. Robust priming effects were observed in both tasks. We found that priming was task-dependent: only the colour of the prime influenced responses in the colour task, whereas only the shape of the prime influenced responses in the shape task. The respective task-irrelevant features did not display measurable priming effects, consistent with a dimension-specific gating mechanism. We refer to this pattern as a “feature flip-flop,” whereby only task-relevant features are permitted to activate the motor response. In addition, priming magnitude decreased with increasing occluder thickness, indicating that reduced prime visibility weakens response activation. Importantly, the feature flip-flop pattern persisted across visibility levels. These findings suggest that response priming is jointly constrained by stimulus visibility and task-dependent conditions, highlighting the role of action-trigger conditions in controlling feature-to-response activation.", "SubmissionID": 434}, {"Day": "Wednesday", "Time": "09:00–10:30", "SessionID": 33, "Topic": "Cognition, Decision Making, and Confidence", "Title": "Latent states in continuous perception revealed by a hierarchical Bayesian HMM", "Author": "Emre Alagöz", "CoAuthors": "Bugay Yıldırım, David Pascucci", "Abstract": "Human performance in perceptual, mnemonic, and cognitive tasks naturally fluctuates. Recent research using Hidden Markov Models (HMMs) applied to forced-choice tasks has linked these fluctuations to transitions between different modes of processing: an external mode, in which perception more faithfully reflects the sensory input, and an internal mode, in which perceptual decisions are biased by prior experience. Here, we extend this framework to continuous report tasks, an increasingly common paradigm, using a hierarchical Bayesian HMM. The proposed model classifies trial-by-trial perceptual decisions as arising from an internal mode (modeled as attractive serial dependence), an external mode, or an uncertain mode in which observers guessed. We applied this model to a publicly available dataset of motion direction reproduction. We found that the proposed approach successfully identified latent states and their transition dynamics across most observers in the current dataset. In particular, it distinguished states characterized by strong serial dependence from more unbiased responses and further captured variations in response precision across states. In ongoing work, we aim to benchmark model performance and optimize parameters across a large collection of datasets. This approach has the potential to provide a general tool for characterizing internal state dynamics in perceptual performance using continuous report measures.", "SubmissionID": 446}, {"Day": "Wednesday", "Time": "09:00–10:30", "SessionID": 33, "Topic": "Cognition, Decision Making, and Confidence", "Title": "Symbiotic Brain-Machine Drawing via Visual Brain-Computer Interfaces", "Author": "GAO WANG", "CoAuthors": "Yingying Huang, Lars Muckli, Daniele Faccio", "Abstract": "Brain-computer interfaces (BCIs) are evolving from research prototypes into clinical, assistive, and performance enhancement technologies. Despite the rapid rise and promise of implantable technologies, there is a need for better and more capable wearable and non-invasive approaches whilst also minimising hardware requirements.  We present a non-invasive BCI for iterative selection-based mind-drawing that infers a subject's internal visual intent through iterative selection of adaptive visual probes presented on a screen encoded at different flicker-frequencies and analyses the steady-state visual evoked potentials (SSVEPs). Gabor-inspired or machine-learned policies dynamically update the spatial placement of the visual probes on the screen to explore the image space and reconstruct simple imagined shapes within approximately two minutes or less using just single-channel EEG data. Additionally, by leveraging stable diffusion models, reconstructed mental images can be transformed into realistic and detailed visual representations. Whilst we expect that similar results might be achievable with e.g. eye-tracking techniques, our work shows that symbiotic human-AI interaction can  increase BCI bit-rates by more than a factor 5x, providing a platform for future development of AI-augmented BCI.", "SubmissionID": 454}, {"Day": "Wednesday", "Time": "09:00–10:30", "SessionID": 33, "Topic": "Cognition, Decision Making, and Confidence", "Title": "Progressive Reconfiguration of Perceptual Decision-Making by Learned Expectations", "Author": "Kensuke Utsumi", "CoAuthors": "Junya Hara, Yuichi Tanaka, Hiroshi Higashi", "Abstract": "Decisions in uncertain environments rely on the accumulation of sensory evidence, guided by prior expectations. Predictive coding theories propose that expectations modulate the precision with which evidence is weighted; in drift-diffusion models (DDMs), this precision corresponds to the slope of drift rate, mirroring the perceptual gain in predictive coding. Yet, how learned expectations dynamically reconfigure evidence accumulation over time remains poorly understood. Here, we extend DDMs with three components for expectation-driven modulation: starting-point bias (motor-preparation bias), drift intercept (directional bias), and drift slope (perceptual gain).\n\nTo test this model, we collected behavioral data in a two-stage cued proportion judgment task, where participants judged whether black or white dots were more numerous after a cue. Twenty participants first completed a learning stage (100 trials) to learn cue-stimulus associations. During this stage, color cues (red/white) were statistically linked to the dominant color of the dot stimulus (e.g., red cues predicted white-dominant displays). In the test stage (300 trials), cues retained no predictive validity (coherence: 0.35--0.65). To track how expectation-driven effects evolve over time, we partitioned the test stage into three phases (100 trials each) and fitted eight competing DDMs---each compnent independently cue-dependent or shared---in a hierarchical Bayesian framework. Models were compared using trial-level leave-one-out cross-validation based on the expected log pointwise predictive density (ELPD).\n\nCrucially, the best model shifted across phases. The first phase favored the motor-preparation-bias-only model, yet the null model remained competitive (ΔELPD = 0.94). The second phase favored the null model. In the third phase, however, the model with both motor-preparation bias and perceptual gain performed best.\n\nBy dissociating perceptual gain from motor-preparation bias, we demonstrate that learned expectations recruit perceptual gain as an additional component. This contribution emerged later yet persisted alongside the motor-preparation bias, which suggests that expectation-driven perceptual modulation is sustained rather than transient.", "SubmissionID": 462}, {"Day": "Wednesday", "Time": "09:00–10:30", "SessionID": 33, "Topic": "Cognition, Decision Making, and Confidence", "Title": "No evidence for choice-induced modulation of temporal binding in a replication of Barlas & Obhi (2013)", "Author": "Leonie Jozwiak", "CoAuthors": "Eckart Zimmermann", "Abstract": "When we generate a sensation, for instance by pressing a button to produce a tone, the time between action and ensuing sensation appears compressed. The phenomenon termed temporal binding is commonly studied using visual timing paradigms such as the Libet clock and has traditionally been interpreted as an implicit marker of the sense of agency, i.e., the feeling of having produced the action. According to this account, intervals between action and sensation are perceived as shorter when sensations are interpreted as consequence of one`s own actions. In contrast, recent findings challenge this idea and suggest that temporal binding arises from attention- and expectancy-based processes, rather than from a subjective sense of agency. \nIn the light of these developments, we have conducted a conceptual replication of Barlas & Obhi (2013), a study that presented evidence supporting an agency-based account. In their paradigm, they used three conditions in which participants could choose between either one, three or seven buttons to trigger a tone. Stronger temporal binding was found when participants had more choice options. The authors interpreted the increase in temporal binding to reflect enhanced agency under greater choice. In our conceptual replication of this study, however, we found no significant differences in binding strength between one, three or sev
