<script>
const posters=[{"Day": "Monday", "Time": "09:00–10:30", "SessionID": 9, "Topic": "3D and Stereo Vision", "Title": "Hardware and software for a binocular multifocal display system", "Author": "Tarek A Haila", "CoAuthors": "Thomas S. A. Wallis", "Abstract": "We introduce a variant of a multifocal display system that can be used monocularly and binocularly. The system has a Wheatstone stereoscope design and uses beamsplitters and first-surface mirrors to offer three physical depths at 2.5, 1.89, and 1.3 diopters. Light is provided by two commercial OLED monitors with native resolutions of 2560x1440px at 120 Hz, yielding resolutions of (30.3, 29.1), (40.2, 38.8), and (56.9, 55.1) pixels per degree at each depth plane horizontally and vertically, respectively. CAD drawings and component sources will be provided for the system.\n\n\n\n\nOur Python software package multifocal offers a user-friendly API to interface the system with popular stimulus presentation libraries such as PsychoPy. Basic drawing is handled in a 3D coordinate system, allowing the user to specify where in the virtual volume a stimulus should be drawn; multifocal then internally determines what should be drawn where on the physical monitor. We additionally implement depth-filtering techniques to blend light between two physical planes, which previous work has shown drives accommodation to intermediate depths. In addition, multifocal offers routines for photometric and geometric calibration. The photometric calibration allows color and luminance matching across the system's different planes using lookup tables and color correction models. The geometric calibration allows precise alignment of the drawing volume. For the binocular setup, it allows correct interpupillary and vergence calibration to enable correct image fusion.\n\n\n\n\nThe system's luminance range depends strongly on the selection of the optical elements, the deployed display, and the calibration state. For the current hardware, calibrating the display itself to approx. 250 cd/m2 will result in a usable luminance range of approx. [0.0 - 12.0] cd/m2 at the eye.\n\n\n\n\nThese hardware and software designs enable researchers to study human depth perception and address vergence and accommodation under laboratory conditions in ways impossible to do using conventional 2D displays.", "SubmissionID": 33}, {"Day": "Monday", "Time": "09:00–10:30", "SessionID": 9, "Topic": "3D and Stereo Vision", "Title": "An examination of behavioral characteristics during the execution of a button pressing task under observing 360-degree images", "Author": "Hisaki Nate", "CoAuthors": "", "Abstract": "I investigated the characteristics of depth perception during the observation of 360-degree video displayed on VR goggles (Meta Quest 3) and the motor models represented during reaching toward a target. In the experiment, participants observed 360-degree images through VR goggles. The subjects’ task was to press virtual buttons located 400 mm, 750 mm, and 1,200 mm away from the subjects’ initial position using a virtual hammer linked to a controller. In the 1,200 mm condition, the subjects had to walk to reach the button. The hammer’s trajectory was recorded. The results showed that while some participants were able to press the buttons, others experienced such a discrepancy between their perceived depth and the button’s actual position that they were unable to press the button on the first attempt. the time required to press the button increased exponentially as the distance to the button increased. One possible cause for this was that the error in subjective depth increased with distance, resulting in a suboptimal hammer trajectory. Other possibility was that the hammer’s travel time increased due to the greater distance. The results for the hammer trajectory length and tortuosity also increased exponentially with increasing the distance between the button and subjects. And the fractal dimension increased linearly. These results indicated that the increase was not due to the greater the distance, but rather that the hammer’s trajectory became more complex, thereby rejecting the hypothesis that the effect was caused by increased the distance. And these results suggested that when observing 360-degree images through VR goggles, the subject’s subjective depth error increases as the button moves further away from them. The error in perceived depth is thought to be caused by the fact that 360-degree video provides fewer depth cues than the real world.", "SubmissionID": 79}, {"Day": "Monday", "Time": "09:00–10:30", "SessionID": 9, "Topic": "3D and Stereo Vision", "Title": "Transitions in binocular rivalry qualitatively change with age", "Author": "Cemre Yılmaz", "CoAuthors": "Tamara Jellen, Maximilian Gerschütz, Andreas Bartels, Natalia Zaretskaya", "Abstract": "Our rich and complex subjective experience of sensory information is reduced by typical cognitive psychology paradigms to a few pre-defined discrete categories. In our previous study, we demonstrated the complexity of subjective visual experience during binocular rivalry. Rivalry occurs when dissimilar images are presented to each eye, resulting in conscious perception alternating between images separated by brief transition phases. We demonstrated that these transition phases occur in different yet categorizable perceptual forms, that they are affected by the type of stimuli, by contrast, and by attention.\n\nPrior studies established that dominance durations in binocular rivalry increase with age while transition durations remain unchanged. However, there may be qualitative changes in transition appearance, which are not captured by quantitative measures. We, therefore, tested eighty-nine healthy adults (ages 18-64) with binocular rivalry induced by three stimulus types (gratings, images, moving dots) as well as their combinations (e.g., image and moving dots). Following each stimulus block, participants provided verbal descriptions and sketches of their transition experiences that were further categorized using qualitative content analysis. \n\nOur results confirmed that while dominance durations increased with age, transition durations showed no measurable change. Crucially, we observed significant age-related changes in the appearance of transitions that depended on stimulus content. First, the overall variety of transitions and the frequency of immediate transitions decreased with age for moving dot stimuli, which are associated with dorsal stream processing. Second, piecemeal transitions, which are thought to reflect interocular grouping failure, become more frequent with age for gratings but less frequent for moving dot stimuli. Finally, the increased frequency of halves during rivalry between images and moving dots implies an age-related decline in global competitive interactions between ventral and dorsal streams.\n\nThese findings demonstrate that the aging visual system undergoes selective qualitative shifts in perceptual dynamics invisible to conventional quantitative measures.", "SubmissionID": 162}, {"Day": "Monday", "Time": "09:00–10:30", "SessionID": 9, "Topic": "3D and Stereo Vision", "Title": "Theta-burst stimulation of hMT+ modulates sensory eye dominance", "Author": "Junyu Wang", "CoAuthors": "Dorita H F Chang", "Abstract": "Sensory eye dominance (SED) reflects an imbalanced weighting of the two eyes' inputs and is linked to visuomotor deficits, at least in clinical extremes (e.g., amblyopia). While traditionally attributed to the gain control mechanisms in primary visual cortex, SED has been more recently shown to implicate higher cortical regions, most notably, the human middle temporal complex (hMT+).  Whether hMT+ plays a principal role in governing SED, or whether its engagement reflects mere stimulus properties (SED is often indexed using motion stimuli) remains to be teased apart.  Here, we tested whether theta-burst stimulation (TBS) of the right hMT+ modulates SED. We tested 60 adults with normal vision. In Experiment 1, 40 participants received either intermittent (iTBS) or continuous TBS (cTBS) over the right hMT+, completing dichoptic motion and orientation tasks before and after stimulation. Both of these tasks can be used to quantify SED by capturing interocular threshold differences but crucially differ in terms of stimulus features. We found that iTBS, but not cTBS, significantly reduced SED magnitude in both tasks and reduced motion discrimination reaction times (RTs). In Experiment 2, we investigated the temporal characteristics of TBS-induced changes in SED. 20 new participants received iTBS or cTBS, and their SED was indexed using the dichoptic motion task at baseline and at multiple time points extending over 60 minutes post-stimulation. iTBS reduced SED from 30 to 60 minutes post-stimulation relative to baseline. Again, cTBS produced no reliable effects on SED. Motion RTs improved immediately following iTBS, though this benefit was not sustained across repeated post-tests. Our data suggests that hMT+ contributes to binocular balance beyond its established role in motion processing, pointing to a more complex network that governs eye balance than is conventionally considered.", "SubmissionID": 228}, {"Day": "Monday", "Time": "09:00–10:30", "SessionID": 9, "Topic": "3D and Stereo Vision", "Title": "BOOK OF THE DARK: IMPORTANCE OF ENVIRONMENTAL CUES FOR PERCEIVED DISTANCE ANISOTROPY", "Author": "Oliver Tošković", "CoAuthors": "", "Abstract": "The anisotropy of perceived distance refers to upward distances being perceived as larger than physically equal downward distances or distances in front of us. This effect is mainly shown in situations with a reduced number of depth cues (dark room). Does perceived distance anisotropy depend on the number of depth cues present? Three experiments were performed, in which participants matched distances of stimuli in two directions, toward the horizon and zenith, but in situations with different amounts of depth cues present. In the first experiment, 29 participants matched distances of two dim light stimuli in a large dark room, monocularly and binocularly. In the second experiment, 17 participants matched distances of two red spheres in virtual reality, in two situations: empty dark space or with a brick wall surface on both directions. In the third experiment, 30 participants matched the distances of two white circles in an outdoor condition in the forest. Results of the first experiment showed a significant effect of direction on distance estimates, and no interaction with the viewing condition (monocular or binocular). In the second experiment, a difference in perceived distance in two directions is detected, with no interaction with the situation (empty space or brick wall). In the third experiment, the effect of direction on distance estimates is observed. In all experiments, the effect of perceived distance anisotropy is observed in the same direction; distances toward zenith were perceived as larger than physically equal distances toward the horizon. We can conclude that perceived distance anisotropy is invariant to the amount of environmental information, which may have implications for health-related behaviors involving spatial judgment and navigation in low-visibility conditions requiring interaction with the environment.\n\nThis research was supported by the Science Fund of the Republic of Serbia, #2424, Environmental Monitoring of Food and Waterborne Parasites – PARASITE_HUNTER.", "SubmissionID": 251}, {"Day": "Monday", "Time": "09:00–10:30", "SessionID": 9, "Topic": "3D and Stereo Vision", "Title": "Temporally demanding stereoscopic training drives effective binocular rebalancing", "Author": "Ka Yee Kam", "CoAuthors": "Dorita H. F. Chang", "Abstract": "Optimal binocular vision requires balanced integration of inputs from the two eyes, yet most observers exhibit some degree of sensory eye dominance (SED), an asymmetry in how the two eyes’ inputs are weighted.  While dichoptic perceptual training can reduce SED by enforcing binocular cooperation, it remains unclear as to whether stereoscopic training is able to promote binocular balance, despite the obvious reliance of stereopsis on balanced binocular input.  Here, we asked whether training on a random-dot stereogram (RDS) depth-discrimination task reduces SED in visually normal adults and whether manipulating difficulty through changes in disparity differences versus stimulus duration differentially affects the extent of rebalancing.  Fifty observers were randomly assigned to one of two RDS training tasks completed over three consecutive days (3,600 trials total). In the disparity-manipulation task variant, stimulus presentation duration was fixed, while task difficulty was adjusted by varying the disparity difference between target and reference planes.  In the duration-manipulation task variant, the disparity difference was held constant, and difficulty was modulated by varying presentation duration.  On each trial, participants judged whether the target plane appeared nearer or farther than the reference.  Participants’ performance on both depth task variants, along with their SED (dichoptic signal-noise task) were indexed before and after training.  Results revealed that training improved depth-discrimination performance not only on the trained task, but also on the untrained depth task.  Critically, both groups showed significant reductions in SED after training (i.e., more balanced interocular weighting), with a reliably larger reduction following duration-manipulation than disparity-manipulation training. These findings demonstrate that stereoscopic training drives measurable SED plasticity in visually normal adults and suggest that heightened temporal demands may be particularly effective at promoting binocular rebalancing, perhaps by limiting the temporal window within which interocular suppressive mechanisms can engage.", "SubmissionID": 284}, {"Day": "Monday", "Time": "09:00–10:30", "SessionID": 9, "Topic": "3D and Stereo Vision", "Title": "Combined Monocular Deprivation and Perceptual Learning Promotes Long-term Binocular Balance", "Author": "Chenyi Qian", "CoAuthors": "Dorita Chang", "Abstract": "Both short-term monocular deprivation (MD) and visual perceptual learning (VPL) have been shown to alter sensory eye dominance (SED) in adults, yielding a more balanced binocular percept. However, each approach has limitations: MD effects are transient, whereas VPL is time-consuming to conduct. Here, we combined these two approaches to examine whether this produces a more robust and long-lasting shift in SED while remaining efficient to implement. Participants were assigned to one of the four groups, each undergoing a 3-day modulation period: MD only, VPL only, MD followed by VPL, and VPL followed by MD. During MD, observers viewed a movie for 1 hour during which the non-dominant eye viewed low-passed images, and the dominant eye viewed intact images. During VPL, participants trained on a dichoptic motion discrimination task. SED was assessed using the dichoptic motion task before and after modulation, with post-modulation measurements conducted immediately after, at 30 minutes, 24 hours, 1 week, and 1 month after the final day. All groups that received VPL (either in isolation or in combination) showed a reduced SED (i.e., a more balanced percept) that persisted for at least 1 week after modulation. These improvements in SED were accompanied by learning-related improvements on the task (i.e., reduced motion discrimination thresholds). The MD-only group showed a reduced SED immediately after modulation, but returned to baseline within 30 minutes, with no concurrent improvement in task performance. These results suggest that a 3-day VPL protocol is sufficient to induce binocular plasticity that consolidates over time, whereas MD alone, even across repeated sessions, does not produce long-term benefits. We speculate that when MD is delivered in combination with VPL, the MD-induced homeostatic shift towards the deprived eye may render respective neurons more susceptible to subsequent VPL-driven consolidation, potentially leading to longer-lasting changes in binocular balance.", "SubmissionID": 290}, {"Day": "Monday", "Time": "09:00–10:30", "SessionID": 9, "Topic": "3D and Stereo Vision", "Title": "Measuring suppression-related attenuation of stimulus information in binocular rivalry", "Author": "Erin Goddard", "CoAuthors": "Erin Goddard", "Abstract": "Binocular rivalry (BR) is a perceptual phenomenon in which conflicting images presented to each eye cannot be fused into a stable percept, and perception spontaneously oscillates between the two images. While BR has been studied extensively, the role of attention in the neural dynamics of BR remains unclear. We used magnetoencephalography (MEG) to compare the neural information about a dominant BR percept and the associated suppressed stimulus, and how attention modulates this relationship. Participants (N = 16) viewed a stimulus with a rivalrous and non-rivalrous component, alternating whether their attention was directed to the rivalrous or non-rivalrous component. We used classification analyses to quantify the amount of information about each stimulus component contained in the MEG signal over time. As expected, classifier accuracy is greater for the attended than the unattended non-rivalrous stimulus, from ~200ms post stimulus presentation. For the BR stimulus, we decoded the image content of both dominant and suppressed stimuli, finding that information about the suppressed stimulus was surprisingly robust. Information about the suppressed stimulus was lower than the dominant stimulus, but was less attenuated than the unattended non-rivalrous stimulus. Overall, the decoding dynamics are consistent with the onset of BR involving similar processes to engaging covert spatial attention.", "SubmissionID": 291}, {"Day": "Monday", "Time": "09:00–10:30", "SessionID": 16, "Topic": "Attention", "Title": "Attention-Driven Excitatory Neurometabolic Dynamics in the Human Visual Cortex: Evidence from Task-Based fMRS", "Author": "Li-Hung Chang", "CoAuthors": "I-Ting Lee, Shang-Hua Lin, Rong-Rung Kuo, Ching-Po Lin", "Abstract": "Sustained attention, encompassing the maintenance of both external and internal focus over time, is essential to effective perception and learning. Distributed brain networks supporting sustained attention have been extensively documented, including prefrontal, cingulate, thalamic, and visual cortices. Although recent studies have highlighted the visual cortex's involvement in early-stage attention modulation, its underlying neurochemical mechanisms remain insufficiently understood. Our prior work has demonstrated that excitatory neurotransmitters, particularly glutamate (Glu) and the combined glutamate-glutamine signal (Glx), play a critical role in perceptual learning—a process that typically requires prolonged and focused attentional engagement. Here, we applied time-resolved functional magnetic resonance spectroscopy (fMRS) at 3T to examine whether sustained attentional demands modulate Glx levels in the visual cortex. Five healthy adults completed three noontime sessions across consecutive days using a block design with alternating rest and visual stimulation periods. A vigilance task during central fixation ensured continuous attentional engagement. Each session comprised four spectra acquired via the PRESS sequence (TR = 2s, TE = 30 ms, 160 time points) yielding 40 time-resolved data points (temporal resolution = 32s). Spectra with CRLB >15% were excluded for quality control, and attentional performance was quantified by vigilance task response accuracy. Time-resolved analysis revealed significantly elevated Glx concentrations during stimulation relative to rest blocks (F(443)=24.01, p<0.001), with no significant change in GSH, NAA, or creatine. In contrast, time- averaged spectra (temporal resolution = 320s) failed to capture this effect, underscoring the necessity of fine temporal resolution. Furthermore, Glx concentrations exhibited a significant positive correlation with attentional performance (r = 0.59, p = 0.041). Together, these findings demonstrate that visual cortical Glx is dynamically modulated by visual stimulation, with modulation magnitude further shaped by attentional demands, suggesting a potential link between attention-driven Glx signatures and early sensory processing mechanisms, possibly contributing to perceptual learning.", "SubmissionID": 21}, {"Day": "Monday", "Time": "09:00–10:30", "SessionID": 16, "Topic": "Attention", "Title": "Using Eye Tracking to Understand Imperfect Knowledge of both Object Identities and Object Locations in the Multiple Object Awareness Paradigm", "Author": "PRASAD MANE", "CoAuthors": "Haden Dewis, Arezoo Pooresmaeili, Hayward Godwin", "Abstract": "In everyday environments, people frequently need to maintain awareness of multiple moving objects simultaneously. Traditional Multiple Object Tracking (MOT) and Multiple Identity Tracking (MIT) paradigms typically assess performance using binary accuracy measures, which may underestimate the information observers retain about their environment. The Multiple Object Awareness (MOA) paradigm addresses this limitation by allowing multiple response attempts, enabling the measurement of graded awareness. Here we used the MOA paradigm in combination with eye tracking to examine whether observers retain partial information about both the locations and identities of moving objects. Across two experiments, participants were asked to track coloured squares moving within a display. After a period of time, all squares stopped moving and were replaced with grey disks. Participants were then asked to indicate the location of a target square. We analysed the number of clicks required to identify the target, spatial proximity of incorrect responses, colour similarity between selected items and the target, and eye movement behaviour during tracking. Our results indicated that incorrect selections were systematically closer to the target location and more similar in colour than expected by chance, indicating the presence of imprecise spatial and identity representations. Eye movement measures provided converging evidence linking this graded awareness to attentional and working memory allocation: greater fixation time on the target predicted fewer attempts required to locate it, whereas longer intervals since the last fixation were associated with reduced precision, particularly under higher tracking load. These findings provide converging evidence that visual awareness during multiple object tracking is graded rather than all-or-nothing.", "SubmissionID": 37}, {"Day": "Monday", "Time": "09:00–10:30", "SessionID": 16, "Topic": "Attention", "Title": "A model for perceptual traveling waves grounded in Normalization", "Author": "Jay Jawale", "CoAuthors": "André R. Zarza Tapia, David J. Heeger, Laura Dugué", "Abstract": "Attention rhythmically fluctuates at low frequencies (<20 Hz) creating cycles of increased and decreased perceptual performance, supported by brain oscillations at corresponding frequencies (VanRullen, 2016; Fiebelkorn and Kastner, 2019; Kienitz, Schmid and Dugué, 2022). Recent work showed that these oscillations can propagate across the retinotopic visual cortex as Traveling Waves –smooth phase shifts propagating across cortical space (Dugué and Chavane, 2025). Critically, behavioral empirical evidence suggests that traveling waves can modulate perceptual cycles in space, i.e., perceptual cycles can travel across the retinotopic space (Fakche and Dugué, 2024). Here, we propose a biophysically-plausible computational model to explain traveling waves in the primary visual cortex (V1) and predict the consequences on perceptual cycles. We make use of the principles developed in an existing V1 model of perceptual traveling waves during binocular rivalry –a phenomenon where the dominance of a rival image progressively shifts to the suppressed image as an illusory perceptual wave (Cardoso, Li, Heeger and Dugué, 2025). The model posits that these perceptual waves are driven by attentional modulation and mutual inhibition to drive competition between the rival images, and rely on the phenomenological principle of normalization –a canonical computation explaining how attentional allocation modulates visual cortex responses (Carandini and Heeger, 2012). We first extended this model using the ORGaNICs framework, a class of biophysically-plausible recurrent neural circuits which have divisive normalization as an emergent property (Heeger and Mackey, 2019). Using this framework applied to the neurophysiological constraints of V1, we replicated the previous model of binocular rivalry with an emphasis on biophysical plausibility. We then assessed the generalizability of the model predictions to empirical data other than binocular rivalry and in which perceptual cycles propagate across the retinotopic space. Together, we characterized the circuit-level mechanisms of traveling waves and offer a model to guide future behavioral predictions.", "SubmissionID": 53}, {"Day": "Monday", "Time": "09:00–10:30", "SessionID": 16, "Topic": "Attention", "Title": "Visual attention without multisensory support: single-channel perception constraints in military FPV drone operators", "Author": "Gilles Deles-Velins", "CoAuthors": "", "Abstract": "Military FPV (first-person view) drone operators work in a perceptual condition rarely studied in controlled settings: enclosed goggles deliver a single monocular video feed as the sole perceptual input, with no vestibular, proprioceptive, or aerodynamic feedback. Auditory input is further restricted by operational constraints. This configuration eliminates the multisensory redundancy that normally supports attentional reorienting. Models that predict graded, load-proportional exclusion of peripheral information would expect monitoring to resume as task demands decrease. The present data could suggest a different pattern.\n\nNine semi-structured interviews with military drone operators (Latvian National Guard and Ukrainian combat FPV pilots), analysed through thematic coding, identified attentional phenomena specific to this single-channel condition. Three convergent findings emerged. First, operators report that flight parameters displayed within the visual feed become functionally inaccessible during target engagement, with several describing complete loss of awareness of peripheral display elements, including active blinking alarms. Second, trainee pilots who attempt to shift attention from the video stream to flight parameters lose aircraft control instantaneously, suggesting a discrete attentional toggle rather than graded reallocation. Third, the attentionally accessible region contracts spatially toward the display centre during engagement, with parameters at screen edges remaining functionally undetected leading operators to reconfigure indicator layouts accordingly.\n\nTogether, these observations point to attentional exclusion that is discontinuous rather than graded, and spatially structured rather than uniform. Operators spontaneously compensate through a voice-linked co-pilot, the only available cross-modal channel. These convergent phenomena - arising under reduced sensorimotor embodiment and constrained multisensory integration - suggest that single-channel visual operation constitutes a distinct perceptual regime, with implications for understanding how bodily feedback contributes to attentional flexibility.", "SubmissionID": 134}, {"Day": "Monday", "Time": "09:00–10:30", "SessionID": 16, "Topic": "Attention", "Title": "Similar Effects but Separate Mechanisms: Attention in Multistability and Visual Search", "Author": "Alexander Pastukhov", "CoAuthors": "Kathrin Butzhammer, Noelle Frank, Maxin Hölscher, Claus-Chrisitan Carbon, Árni Kristjánsson", "Abstract": "Visual attention enables selective prioritization of relevant information, shaping both what we perceive and how efficiently we act on it. Two well-documented phenomena that reflect this influence are volitional control in multistable perception and attentional priming in visual search. In multistable perception, attention allows observers to bias or modulate perceptual alternations between competing interpretations of an ambiguous stimulus. In visual search, repeated selection of a target feature facilitates faster detection, reflecting attentional priming. Despite their conceptual similarities, it remains unclear whether these effects rely on shared underlying mechanisms.  Here, we directly compared these phenomena within the same participants by using a shared stimulus feature, the direction of a sphere’s rotation. In the multistable perception task, participants viewed an ambiguous rotating sphere and attempted to modulate the rate of perceptual switches between alternative rotation directions. In the visual search task, participants identified a target defined by its rotation direction, allowing us to quantify attentional priming through repetition benefits. This within-subject design enabled us to assess whether individual differences in attentional control generalize across tasks. Participants showed robust effects in both paradigms: they successfully influenced perceptual dynamics in multistable displays and exhibited reliable attentional priming in visual search. However, individual performance did not correlate across tasks. This dissociation suggests that, although both phenomena are shaped by selective attention and share similar behavioral signatures, they rely on mechanisms that are at least partially distinct. These findings clarify how attention operates across different perceptual contexts and highlight the importance of distinguishing between superficially similar effects when developing models of visual attention and perceptual selection. All data and analysis code are publicly available at https://doi.org/10.17605/OSF.IO/HJWSU", "SubmissionID": 154}, {"Day": "Monday", "Time": "09:00–10:30", "SessionID": 16, "Topic": "Attention", "Title": "Classifying Focused and Switched Attention Based on Eye Tracking Across Single and Dual Tasks", "Author": "Aimee Martin", "CoAuthors": "Aylin Kallmayer, Philipp Raggam, Kieran Smith, Benedikt Gollan", "Abstract": "Attention can be either allocated in a focused manner towards a single task or distributed across multiple tasks, requiring ongoing attentional switching. Distinguishing between these two attentional states is important in real world environments, such as driving, medical training, and aviation. The present study aimed to validate our Attention Type Classifier (ATC) that uses eye tracking data to differentiate between focused and switched attention. Participants wore mobile eye tracking glasses while completing two tasks intended to demonstrate two attentional states. In the single task, participants preformed a rapid serial visual presentation (RSVP) paradigm, where participants responded to infrequently shown numbers embedded within a stream of letters. This was expected to demonstrate focused attention due to the sustained attentional processing at a single task. In the dual task, participants performed the same RSVP at the centre, while simultaneously monitoring the four corners of the screen for a Gabor patch and reporting its orientation (e.g., tilted left or right). This required repeated shifts of attention between the central and peripheral tasks, therefore inducing attentional task switching. Results demonstrated that our ATC algorithm classified a significantly higher probability of switched attention during the dual task, compared to the single task. Behavioural data supported this, with reduced accuracy and slower reactions times observed under the dual task, indicating reduced attentional resources for the RSVP task. Accuracy did not differ between the central and peripheral tasks within the dual task, suggesting that attention was distributed in a similar manner across both single tasks rather than prioritising one task over the other. Overall, these findings demonstrate that eye movement patterns provide reliable markers of attentional states. The ability of our ATC algorithm to distinguish between focused and switched attention in controlled settings provides a foundation for extending this towards naturalistic environments.", "SubmissionID": 173}, {"Day": "Monday", "Time": "09:00–10:30", "SessionID": 16, "Topic": "Attention", "Title": "Traveling Waves in Attentional Orienting and Reorienting", "Author": "Yue Kong", "CoAuthors": "Kirsten Petras, David M. Alexander, Benjamin Rohaut, Laura Dugué", "Abstract": "Attention –the selection and facilitation of sensory information processing– is associated with low-frequency neural oscillations across distributed brain regions (Kienitz et al., 2022). Specifically, sustained attentional orienting is commonly associated with alpha-band oscillations (8-12Hz), whereas during attentional reorienting, theta-band oscillations (4-7Hz) dominate. Despite the inherently spatio-temporal nature of attention, most studies have examined it primarily in either the spatial or temporal domain alone, thereby limiting explanatory power. Recent work suggests that alpha oscillations propagate across the cortex as traveling waves during sustained orienting of spatial attention (Alamia et al., 2023; Fakche et al., 2024). Our latest work demonstrated that TMS-induced theta traveling waves causally contribute to visual search, highlighting their potential role in exploratory attention (Kong et al., 2026). Yet, the role of traveling waves across distinct attentional processes remains to be clarified. Here, we assessed the functional role of low-frequency traveling waves in attentional orienting and reorienting using simultaneous MEG-EEG recordings with psychophysics. Human participants (N=20) performed an orientation discrimination task where an auditory cue directed visual attention either toward the upcoming target location (valid –attention is sustained at that location) or the distractor location (invalid –attention reorients to the target location, i.e., exploration). We first confirmed successful attentional manipulation behaviorally (higher sensitivity in valid trials) and electrophysiologically (stronger alpha power in ipsilateral MEG-EEG sensors relative to the attended location in the cue-to-stimulus period). We then characterized single-trial traveling waves properties (i.e., direction, normalized velocity) and compared them across attentional conditions. Our results indicate that distinct patterns of low-frequency traveling waves differentiate sustained from exploratory attention. Moreover, combining MEG and EEG provides a complementary perspective on the spatio-temporal features of these traveling waves, shedding light on their potential anatomical pathways. Together, our findings support a functional role for low-frequency traveling waves in mediating sustained and exploratory attention.", "SubmissionID": 175}, {"Day": "Monday", "Time": "09:00–10:30", "SessionID": 16, "Topic": "Attention", "Title": "Real-time tracking of pupil-phase fluctuations reveals state-dependent changes in temporal attentional capacity during the attentional blink", "Author": "Yuta Suzuki", "CoAuthors": "Hsin-I Liao", "Abstract": "Pupil diameter is widely used as an index of arousal and neuromodulatory activity. For example, sustained changes in pupil diameter (i.e., baseline pupil size) have been linked to arousal levels and behavioral performance across a wide range of cognitive tasks. In addition to the sustained pupil responses, recent studies showed that pupil dynamics exhibit slow fluctuations (<0.2 Hz), which reflect ongoing brain-state transitions. Specifically, the slow pupil fluctuations correlate with large-scale neural dynamics, including sensory cortical activity and the default mode network. The finding suggests a possibility of using pupil-phase fluctuations to track cognitive performance, particularly in tasks that reflect temporal limits of cognitive capacity. Here we addressed this issue using an auditory attentional blink paradigm. Participants were required to detect two auditory targets (T1 and T2) embedded in rapid auditory streams. The effective attentional capacity was defined by the T2 detection rate given that T1 was detected correctly (T2|T1). In experiment 1, trial-by-trial analyses of the slow pupil fluctuations revealed a phase-dependent modulation. The probability of T2|T1 detection increased approximately 0–2 s following the onset of the pupil dilation phase. To test whether this phase-dependent modulation reflects a causal influence of ongoing brain-state, we implemented a closed-loop design in Experiment 2. Pupil diameter was monitored in real time, and target presentation was triggered during either the pupil dilation or constriction phases, respectively. Results showed that the target detection rate was better when the targets were presented during the pupil dilation phase than when they were presented during the pupil constriction phase, suggesting a potential influence of pupil phase on attentional capacity. Our results suggest that temporal attentional capacity is not fixed but fluctuates with ongoing brain-state dynamics, highlighting slow pupil fluctuation as a distinct physiological marker of cognitive state.", "SubmissionID": 182}, {"Day": "Monday", "Time": "09:00–10:30", "SessionID": 16, "Topic": "Attention", "Title": "The effects of action preparation on attentional resource allocation: behavioral and pupillometric evidence", "Author": "Roy Ramati", "CoAuthors": "Joo-Hyun Song, Yaffa Yeshurun", "Abstract": "Preparing a motor action has been previously shown to enhance perceptual discrimination, yet the mechanism underlying this enhancement remains unclear. One candidate account holds that action preparation results in allocating additional resources to task-relevant stimuli. The present study examined this hypothesis across two experiments using behavioral performance and the pupillary light response (PLR) as a measure of covert attentional resource allocation. \n\nGiven that the pupil responds rather slowly, Experiment 1 examined whether the action-preparation perceptual benefit extends to longer stimulus onset asynchronies (SOAs). Participants indicated whether two consecutive targets, separated by varying SOAs (300–1500ms), had the same orientation. In the ‘no-action’ condition participants only performed this discrimination task. In the ‘pointing’ condition they also directly acted on the 2nd target by pointing at it, thus, they were required to prepare the action during the SOA. Replicating prior findings, we observed a significant main effect of condition: perceptual sensitivity (d′) was higher in the pointing condition. Yet, there was no condition x SOA interaction, suggesting that action preparation enhanced perception robustly across a wide range of temporal intervals.\n\nExperiment 2 extended this paradigm by incorporating PLR measurements to directly probe attentional allocation. In this experiment, half of the screen was white and half black, and the targets appeared on either side, equally often. Given that covertly shifting attention into darker regions increases pupil size while covertly shifting attention to lighter regions decreases pupil size, the difference in pupil size between target-on-black and target-on-white trials serves as an index of attentional engagement. Results show larger pupil-size difference in the pointing condition than in the no-action condition, suggesting that action preparation actively recruits additional attentional resources. Together, these findings provide the first converging behavioral and physiological evidence that action-induced perceptual enhancement may be mediated by the allocation of attentional resources.", "SubmissionID": 188}, {"Day": "Monday", "Time": "09:00–10:30", "SessionID": 32, "Topic": "Cognition, Decision Making, and Confidence", "Title": "No empirical evidence for input-dependent noise in purely relative models of perceptual decision-making", "Author": "Angelo Pirrone", "CoAuthors": "Cesare Parise, Nathan Evans", "Abstract": "In perceptual binary decision-making tasks, higher overall stimulus intensity often leads to faster and less accurate responses. This effect has been explained with models where difference in evidence is accumulated to a decision threshold while processing noise increases with overall stimulus intensity. Here we present empirical evidence from brightness discrimination tasks inconsistent with the proposal that processing noise scales with stimulus intensity. First, in tasks where participants make a decision when prompted by the experimenter (interrogation protocol), data show that accuracy does not decrease with increasing stimulus intensity, contrary to what input-dependent noise would predict. Second, in a task where participants can respond in their own time (free-response protocol), we observe that confidence increases with stimulus intensity even for equal-alternative conditions. Depending on how confidence is defined, input-dependent noise predicts that confidence should either remain stable or decrease or vary systematically with reaction time. We show that all these predictions are not supported by data. Finally, although data consistent with input-dependent noise have been observed in two-stimuli tasks, input-dependent noise predictions should also hold for single-stimulus tasks. Analyses of single-stimulus tasks show no systematic relationship between stimulus intensity and either reaction time or accuracy. Taken together, these results cannot be explained by the input-dependent noise hypothesis. We show how these results can instead be explained by response competition models.", "SubmissionID": 14}, {"Day": "Monday", "Time": "09:00–10:30", "SessionID": 32, "Topic": "Cognition, Decision Making, and Confidence", "Title": "Predicting Human Viewpoint Preference with Deep Neural Network Embeddings", "Author": "Athanasios Bourganos", "CoAuthors": "Dirk Bernhardt-Walther", "Abstract": "Humans prefer some object views over others, but the representational basis of these judgments remains unclear. Rather than treating canonicity as a discrete category, we approach it as a continuous perceptual variable around three-dimensional objects. We collected human ratings of viewpoint canonicity across multiple perspectives of the same objects to obtain average canonicity measurements. Using these ratings, we estimate the canonical fields (the maps of perceptual privilege) for this object set. Using these human behavioral ratings as ground truth, we show that deep image models accurately predict human canonicity judgments when anchored to the most canonical perspective (the view with the highest average canonicity rating). Specifically, distances in high-dimensional feature spaces (latent spaces) between the preferred view and other views closely track human ratings. These results suggest that the statistical distributions of object views in large image datasets may reflect human canonicity bias, because we often photograph objects from canonical perspectives.", "SubmissionID": 169}, {"Day": "Monday", "Time": "09:00–10:30", "SessionID": 32, "Topic": "Cognition, Decision Making, and Confidence", "Title": "Integrating the Simon Effect into Task-Switching: A Study on Cognitive Stability and Flexibility", "Author": "Ping-shien Lee", "CoAuthors": "Anders Petersen", "Abstract": "Task-switching experiments have been used to study cognitive stability (maintaining focus on the current task goal) and flexibility (efficient shift between tasks). These constructs are typically benchmarked by the task-rule congruency effect and the switch cost. However, the task-rule congruency effect is largely shaped by learned, instructed category–response associations, theoretically distinguishing it from the congruency effects observed in standard conflict tasks (e.g., Stroop, Simon, and flanker tasks). Comparing with the former, congruency effects more directly capture the degree of perceptual conflict between target and distractor stimuli in the standard conflict tasks. To better examine the relationship between perceptual conflict control and task switching, we introduce a novel paradigm that integrates Simon stimuli within a task-switching design. This allows us to measure the Simon effect (conflict control) and switch cost (flexibility) simultaneously. Results showed significant effects for both the Simon effect and switch cost, confirming that the paradigm successfully captures both conflict control (stability) and cognitive flexibility. A mixed-effects model of the delta plots further suggests that the Simon effect is significantly higher for the switch condition than for the repeat condition. However, no relationship between Simon effect and switch cost was observed, indicating no trade-off between stability and flexibility.", "SubmissionID": 235}, {"Day": "Monday", "Time": "09:00–10:30", "SessionID": 32, "Topic": "Cognition, Decision Making, and Confidence", "Title": "Mind the snake in the shadows: Preattentive processing and autonomic responses to subliminal evolutionary threats", "Author": "Giosuè Addis", "CoAuthors": "Cecilia Dapor, Philippe A. Chouinard, Federica Meconi, Irene Sperandio", "Abstract": "In the course of evolution, human survival has largely depended on the ability to rapidly detect and respond to potential threats. Accordingly, the human visual system has evolved mechanisms that enable us to detect danger before conscious awareness. Previous studies have reported enhanced detection abilities and increased electrodermal activity in response to subliminal presentations of snake and spider images, with stronger effects in individuals with specific phobias. However, this advantage in the unconscious processing of evolutionarily threatening animals has not been consistently supported in the literature. Across two experiments, we subliminally presented spider and snake images, in both intact and scrambled versions, using the breaking Continuous Flash Suppression (bCFS) technique. In both experiments, we recorded the time required for the stimuli to break through suppression, as well as several physiological indices, including skin conductance, pupil dilation, and facial EMG. We also assessed participants’ levels of specific phobias using the Spider Fear Questionnaire (SPQ-12) and the Snake Anxiety Questionnaire (SNAQ-12) to investigate potential interindividual differences in physiological and behavioural responses. Additionally, in the second experiment, participants were asked to report how clearly they saw the stimulus and to categorize it. In both experiments, we observed shorter breakthrough times for snakes than for spiders, and faster responses to intact images than to their scrambled counterparts. Moreover, both animals were associated with higher electrodermal responses even before reaching visual awareness. In the first experiment, pupillometry analyses further revealed a clear preconscious advantage of threatening animals. When taking inter-individual differences in phobia level into account, the results suggest an avoidant response in arachnophobics compared to non-phobic participants. Together, our findings support the existence of a subcortical pathway that is preattentively activated to prepare the organism to react to potential threats. Moreover, this network appears to respond differently depending on individuals’ levels of phobia.", "SubmissionID": 261}, {"Day": "Monday", "Time": "09:00–10:30", "SessionID": 32, "Topic": "Cognition, Decision Making, and Confidence", "Title": "Reaction Times Reflect Distances in a Perceptual Similarity Space", "Author": "Ivana Kapounová", "CoAuthors": "Jiri Lukavsky", "Abstract": "People frequently diverge in their similarity judgments, reflecting underlying differences in the cognitive processes and object features they prioritize. This study examines how choice behavior and response speed are shaped by the similarity-based embedding of object representations. We build on the previous work by Hebart et al. (2020) using the THINGS database. This embedding captures perceived similarity as distances in a high-dimensional psychological space. \n\nFifty participants completed a two-alternative forced-choice similarity judgment task. On each trial, a target image was presented above two candidate images, and participants selected the object that was more similar to the target. Task difficulty was operationalized in two alternative ways: either as the difference or as the ratio of each candidate object’s similarity to the target. Log-transformed reaction times were predicted from trial difficulty and mean pairwise similarity using Bayesian multilevel models with by-participant random intercepts and slopes.\n\nReaction times varied systematically with representational distance, with easier trials yielding faster responses. Model comparison indicated that the difference metric provided a slightly better fit than the ratio metric. Slower participants showed stronger sensitivity to difficulty. The fixed effect of difficulty explained approximately 20% of the variance, whereas the full hierarchical model accounted for 42%, highlighting a substantial contribution of inter-individual variability. Our findings confirm that decision difficulty based on psychological distance predicts response speed, yet the substantial inter-individual variability uncovered by our hierarchical models suggests that people navigate these high-dimensional spaces using unique cognitive weights and feature priorities.", "SubmissionID": 320}, {"Day": "Monday", "Time": "09:00–10:30", "SessionID": 32, "Topic": "Cognition, Decision Making, and Confidence", "Title": "Opposing psychophysical laws in perceptual decision-making revealed by single-trial EEG modelling", "Author": "Gabriel Weindel", "CoAuthors": "Jelmer P. Borst, Leendert van Maanen", "Abstract": "Judging Gabor patches by their contrast can reveal properties of vision and decision-making processes hidden within the chain of processing that composes the reaction time (RT). In the case of visual contrast, Piéron's law states that increasing contrast results in a shorter reaction time following a negative power law. Fechner's law predicts that the time required to judge the difference in contrast between two patches is proportional to the logarithm of their physical intensity ratio. In this study, we demonstrate how these laws manifest in the RTs of participants performing a contrast discrimination task between two Gabor patches using electroencephalography (EEG). We manipulated the contrast of the Gabor patches so that the contrast difference remained constant while the pedestal contrast varied from trial to trial. We expected this manipulation to produce opposing effects on RT according to both laws: 1) increasing the pedestal contrast should decrease RT according to Piéron's law, and 2) should increase RT due to a more difficult decision according to Fechner's law.\n\nAt the behavioral level, the manipulation revealed that participants' accuracy followed Fechner's law while their RT exhibited a combination of both laws. We analyzed the EEG using the hidden multivariate pattern method that models the single-trial signal as a sequence of an unknown number of trial-recurrent, sequential and time-varying EEG topographies. In this task, five of these brain events summarized the EEG signal occurring within participants' RTs. The single-trial estimate of the timing of events associated with visual processing followed Piéron's law. The timing of the decision and motor-related event followed Fechner's law and their buildup predicted correct response proportions with a very high accuracy. Overall, this shows that using this EEG-RT modelling approach we can decipher between visual, decisional and motor processes happening during the RT.", "SubmissionID": 328}, {"Day": "Monday", "Time": "09:00–10:30", "SessionID": 32, "Topic": "Cognition, Decision Making, and Confidence", "Title": "Adding ambiguity into already ambiguous spatial models", "Author": "Calvin Laursen", "CoAuthors": "", "Abstract": "Ambiguity detection, understanding if a text describing the arrangement of objects/subjects that has more than one valid interpretation, in mental models, is not well understood. I explored the differences in people’s ability to detect ambiguity depending on the point at which ambiguity is introduced i.e., Second Premise vs, Third Premise. I found that people are significantly better at detecting ambiguity when underspecificity is introduced by the third premise i.e., causing a model with only one viable solution to have more than one, compared to when the third premise simply adds underspecificity to the first two premises that already have more than one viable solution. Indicating that adding ambiguity to unambiguous situations is easier to process/detect than adding additional ambiguity to ambiguity. I suggest that this may be due to the third premise, which introduces ambiguity, encouraging re-evaluation of the model as whole which does not occur when the third premise adds more ambiguity to an already ambiguous situation. However, additional research is required in order to ascertain whether this is the case", "SubmissionID": 336}, {"Day": "Monday", "Time": "09:00–10:30", "SessionID": 32, "Topic": "Cognition, Decision Making, and Confidence", "Title": "The Efficacy-Proximity Paradox: Visual Framing, Affective Persistence, and the Behavioral Breadth of Climate Action", "Author": "Minxuan Duan", "CoAuthors": "Feng Mao, Lory Barile, Zihao Zhao, Hong Xu", "Abstract": "Climate communication often heightens concern without translating it into action. This study examined how visual framing reorganizes cognitive, emotional, and behavioral pathways through which climate messages endure. These analyses are based on an interim subset of a preregistered study. Sixty-two participants (M_age = 26.68, SD = 8.39; 53.2% male) viewed 2025 climate images drawn from CNN, Herald Sun, and The Straits Times. Stimuli were coded for equivalence and assigned to hazard, solution, or mixed frames. Participants completed Q-sorts of 40 images on efficacy, importance, and proximity, reported affect during viewing, sorting, and 24 hours later, described content, and listed green actions.\n\nFraming altered the cognitive structure of the image sets. In the hazard condition, efficacy was unrelated to importance (r = .04, p = .815) and modestly associated with proximity (r = .31, p = .048). In the solution condition, efficacy was more strongly associated with importance (r = .51, p = .001) and proximity (r = .75, p < .001), exceeding hazard and mixed conditions. Within the mixed set, solution images were judged more efficacious than hazard images (r = .55, p < .001), whereas hazard images were judged more proximal (r_pb = -.36, p = .022). Thus, what felt psychologically close did not necessarily feel actionable.\n\nLinear mixed-effects models showed that most affective responses declined by 24 hours, including positive affect (B = -3.99, p = .001), negative affect (B = -5.62, p < .001), anxiety (B = -0.50, p = .013), awe (B = -0.46, p = .036), and disgust (B = -0.83, p < .001). Hope was the most durable emotion: it showed no reliable overall decline, and solution framing sustained higher hope than hazard framing (B = 0.77, p = .039). Greater 24-hour hope predicted broader action breadth, whereas greater 24-hour anxiety predicted narrower breadth.", "SubmissionID": 355}, {"Day": "Monday", "Time": "09:00–10:30", "SessionID": 32, "Topic": "Cognition, Decision Making, and Confidence", "Title": "Confirmation Bias Under Social Influence: Gaze and Pupillary Signatures of Attentional Amplification and Effortful Belief Updating", "Author": "Bin Zhan", "CoAuthors": "Yi Jiang", "Abstract": "Confirmation bias can preserve stable beliefs but also impair adaptive belief updating during social disagreement. Here, we tested whether this bias is implemented through dissociable attentional and arousal-linked mechanisms during social change of mind. Participants completed a two-stage social perceptual decision task: they first judged ambiguous visual images and rated confidence, then saw a dissenting advisor’s choice and confidence before deciding whether to stay or switch. Eye movements and pupil diameter were recorded during this revision phase. Participants showed a strong confirmation bias, staying with their initial choice more often than expected by indifference, despite initial accuracy on disagreement trials being near chance, and requiring the advisor to be much more confident before switching. Drift-diffusion modeling showed that evidence accumulation weighted self-confidence more strongly than advisor confidence, whereas a starting-point account was not supported. Participants also looked longer at their own confidence, and greater self-gaze predicted a higher probability of staying. An attentional drift-diffusion model favored a multiplicative mechanism in which gaze increased the impact of the attended confidence signal. In contrast, pupil dilation was larger on switch than stay trials. Together, these findings dissociate two components of confirmation bias: attentional sampling biases evidence in favor of the self, whereas pupil-linked arousal indexes the effort required to revise one’s mind.", "SubmissionID": 368}, {"Day": "Monday", "Time": "09:00–10:30", "SessionID": 32, "Topic": "Cognition, Decision Making, and Confidence", "Title": "Explicit expectations influence the content of false percepts", "Author": "Gemma Donnelly", "CoAuthors": "Joost Haarsma, Peter Kok", "Abstract": "False percepts are proposed to arise from overly strong top-down expectations (Corlett et al., 2019). However, a recent study (Haarsma et al., 2023) found that implicit expectations did not influence the contents of false percepts, and that expectations and false percepts activated different layers of early visual cortex, casting doubt on the hypothesis that expectations can lead to false percepts (Schmack et al., 2021). A potential reconciliation is that the implicit expectations in Haarsma et al. may not have been strong enough to cause false percepts, but stronger expectations can.\n\nThe current study used explicit expectation cues to strengthen top-down expectations. Following a behavioural training session to explicitly learn the association between two cues and orthogonal gratings, participants (N=32) were scanned using 7T fMRI and presented with a cue (tone) followed by either a low contrast (predicted) grating embedded in visual noise (50% of trials), or with noise only (50% of trials). The task involved reporting the grating orientation and confidence in having seen a grating.\n\nPerformance on grating present trials was significantly above chance and higher when confidence was high (M=83%) compared to low (M=60%). When no grating was presented, participants reported confidently seeing a grating on 56% of trials, suggesting false percepts did occur. Participants reported the expected (cue predicted) orientation in 55% of grating absent trials. This cue-driven effect was strongest when confidence was high (M=58%) compared to low (M= 49%).\n\nThese results suggest that explicit expectations, unlike implicit expectations, can influence the contents of false percepts. Future investigations will focus on the neural correlates of this phenomenon.", "SubmissionID": 372}, {"Day": "Monday", "Time": "09:00–10:30", "SessionID": 3, "Topic": "Multisensory and Other Senses", "Title": "Remapping peripersonal space through tool-based and movement training in virtual reality", "Author": "Christodoula Gavriel", "CoAuthors": "Irene Petrizzo, Ali Najm, Savvas Avraam, Marios Avraamides, Kyriaki Mikellidou", "Abstract": "Background: Peripersonal space (PPS) refers to the multisensory representation of the space immediately surrounding the body and is critical for rapid defensive and goal-directed actions. PPS is a plastic that can expand after tool use. This study examined whether PPS remapping depends specifically on goal-directed tool-based pulling actions, defined as pulling objects toward the body using a tool, or whether it can also be induced by general motor activity in virtual reality (VR).\n\nMethods: Thirty-four healthy adults (17 women) completed a fully within-subjects 3 × 2 design with Training Condition (Tool-Based Pulling Training, Torso Movement, Whole-Body Movement) and Time (Pre, Post). PPS was assessed using a visuo-tactile detection task in immersive VR. Reaction times to tactile stimuli at five distances were fitted with sigmoidal functions, and the inflection point (x₀) indexed the PPS boundary. Bootstrap resampling (12,000 iterations) was used to estimate boundary distributions and to assess nonparametric significance.\n\nFindings: Tool-based pulling training significantly expanded PPS (Pre: 1.01 m; Post: 1.45 m; p = .021). Torso movement (1.28 m; p = .180) and whole-body movement (1.31 m; p = .160) showed non-significant increases. Model fits were strong across conditions (R² = .96–.99), indicating robust boundary estimation.\n\nDiscussion: Goal-directed tool-based pulling actions selectively expanded PPS, whereas movement alone was insufficient. These findings suggest that functional actions bringing objects toward the body drive spatial remapping. VR-based tool-based pulling training may offer novel applications for enhancing near-body awareness and rapid responses in health, rehabilitation, and sport performance contexts.", "SubmissionID": 13},{"Day": "Monday", "Time": "09:00–10:30", "SessionID": 3, "Topic": "Multisensory and Other Senses", "Title": "Relationship between Floriography and Flower’s Name, Image and Aroma", "Author": "Akihisa	Takemura", "CoAuthors": "Tenta Yamanaka", "Abstract": "Recently, with the spread of flower aroma-based branding in companies, hotels, and stores, there is increasing potential for integrating floriography (the language of flowers) alongside visual and olfactory decorations. Therefore a sensory evaluation experiment was conducted to clarify the relationship between the impression received from the name, image, and aroma of a flower and its symbolism. Sixteen students (fourteen males, two females; mean age 21.8 years) were presented with the names, images, and aromas of twenty selected flowers. They answered free-response first impression, twenty five impression items related to floriography and questions regarding flower recognition. The percentages of persons who had seen the flower before and knew its name were significantly different among flowers in their name and image, but almost zero for all flowers in their aroma. The impression tended to be strongly influenced by this recognition rate. For example, for rose, which had high recognition rates for both name and image, the impressions for the name and image were similar, but the impression for aroma differed significantly from the other two, possibly due to the low recognition rate for aroma. Three impression items highly related to the flower symbolism were extracted for each flower, and their mean evaluation was compared to the average evaluation for all flowers. The origins of floriography generally fall into two categories: those based on the flower's appearance or aroma, and those based on myths or anecdotes. In the former case, the mean evaluation was often closer to the flower symbolism. This suggests that when using flowers in architectural spaces, it’s necessary to pay attention to the origins of floriography. Moreover, it’s necessary to account for the generally low recognition of flower symbolism among the public.", "SubmissionID": 59}, {"Day": "Monday", "Time": "09:00–10:30", "SessionID": 3, "Topic": "Multisensory and Other Senses", "Title": "Shaping Tastes: Categorical and Graded Crossmodal Correspondences between Visual Geometry and Basic Tastes", "Author": "PI-CHUN HUANG", "CoAuthors": "Yi-Chuan Chen, Yi-Chun Hung", "Abstract": "Crossmodal correspondences between visual features and gustatory sensations often follow systematic mapping rules. This study investigated the representational structure, bidirectionality, and robustness of associations between three basic tastes (sweetness, sourness, and bitterness) and two fundamental visual dimensions: angularity (round vs. angular) and symmetry (symmetric vs. asymmetric). Across three experiments, we employed a combination of explicit taste-matching and shape-matching tasks and Implicit Association Tests (IAT) to examine sweet–sour, sweet–bitter, and sour–bitter contrasts. Our results reveal a significant dissociation in how these visual dimensions encode taste information. Specifically, taste–angularity correspondences exhibited a categorical structure, where sweetness was consistently mapped to roundness, while both sourness and bitterness were grouped with angularity. In contrast, taste–symmetry correspondences followed a graded continuum, with sweetness, bitterness, and sourness ordered progressively along the symmetry-asymmetry axis. Furthermore, while bidirectional mappings were observed across most contrasts in explicit tasks, only the sweet–sour correspondence remained robust in the implicit measure, suggesting a stronger association that operates at an earlier processing stage. These findings indicate that visual geometry maps non-visual sensory attributes through distinct mechanisms—categorical for curvature and graded for symmetry—which are modulated by task demands and specific taste contrasts. Our results provide new insights into the hierarchical nature of how the visual system extracts and organizes crossmodal information.", "SubmissionID": 46}, {"Day": "Monday", "Time": "09:00–10:30", "SessionID": 3, "Topic": "Multisensory and Other Senses", "Title": "Presentation duration and feature information influence tactile correspondence mechanism in ambiguous apparent motion", "Author": "Meike Charlotte Kriegeskorte", "CoAuthors": "Bettina Rolke, Elisabeth Hein", "Abstract": "It is difficult to keep track of a moving object, because objects are not continuously visible and their trajectories often intersect. Despite this incomplete and ambiguous information, we must establish correspondence between the correct object instances to perceive an object as moving from one position to another. In everyday life, we mostly rely on visual information. Nevertheless, we perceive objects also with our other senses, such as audition and touch and we can establish correspondence based on tactile and auditory information. Harrar and Harris (2007) showed that tactile correspondence depends on spatiotemporal factors, in particular the time between stimulus presentations. They used the Ternus display, an ambiguous apparent motion display, in which a tactile stimulation can be perceived as either moving by one step to the position of a neighbouring stimulus or as moving across that stimulus to the position of a third stimulus. Which motion is perceived depends on how correspondence is established between the tactile stimuli. In vision and audition, correspondence is also influenced by other factors, e.g., the stimulus duration and the feature information, such as the object’s colour or the sound’s frequency. The aim of this study was to investigate whether these factors are also important for tactile correspondence. We used a tactile Ternus display and manipulated the duration of the Ternus elements and the tactile appearance of the stimulus. Our results showed that both stimulus duration as well as feature information influence the tactile apparent-motion percept. Thus, correspondence in all three modalities is influenced by the same factors. This suggests that they may all rely on a similar mechanism to connect objects across space and time.\n\nHarrar, V., & Harris, L. R. (2007). Multimodal Ternus: Visual, Tactile, and Visuo - Tactile Grouping in Apparent Motion. Perception, 36(10), 1455–1464. https://doi.org/10.1068/p5844", "SubmissionID": 62}, {"Day": "Monday", "Time": "09:00–10:30", "SessionID": 3, "Topic": "Multisensory and Other Senses", "Title": "An Ecological Model of Crossmodal Correspondences between Colour and Pitch", "Author": "Yihui Lu", "CoAuthors": "Gesine Blank, Nedim Goktepe, Grace O’Farrell, Daniel Oberfeld-Twistel, Christoph Witzel", "Abstract": "Human senses provide fundamentally different types of information; yet they are seamlessly integrated in a coherent multisensory experience that constitutes our perceived reality and helps us make sense of our environment. Crossmodal correspondences – perceived matches between signals from two different senses – allow access to multisensory experience by revealing how perceptual features are organised in the perceiver’s mind. In this study, we investigated the ecological origin of crossmodal correspondences, according to which such correspondences result from cumulative multisensory experience with the objects and materials in our perceptual environment. To test this account, we developed a quantitative ecological model that predicts colour-pitch correspondences by integrating ecological associations (objects and other phenomena) with each modality. For example, the model predicts the correspondence between blue and low pitch because both are associated with the sea and the sky. We tested the model in two experiments with different colour sets (24 colours varying in lightness, saturation and hue; 30 colours varying only in hue). Pitch was controlled by using 20 loudness-matched pure tones with Mel-scaled frequencies. Ecological associations were elicited from participants in response to the colours, and their associations with colour and pitch were measured. The model combined these measures to computationally predict independently measured colour-pitch associations. The ecological model successfully predicted colour–pitch correspondences in both experiments, explaining 70–80% of the variance, and approaching the estimated noise ceiling. Results were robust across different measures of ecological associations and alternative mathematical formulations of the model. The success of the ecological model shows that perceivers combine sensory features across modalities, such as colour and sound, in ways that match their concepts of environmental phenomena, such as sea, sky, blood, and plants. More generally, these findings clarify how our multisensory experience is shaped by the interpretation of meaningful, functionally relevant phenomena in our environment.", "SubmissionID": 87}, {"Day": "Monday", "Time": "09:00–10:30", "SessionID": 3, "Topic": "Multisensory and Other Senses", "Title": "Beyond Audiovisual Integration: Phonemic Features and Visual Articulatory Information Shape the McGurk Effect", "Author": "Yi-Chuan Chen", "CoAuthors": "Li-Li Yeh", "Abstract": "The McGurk effect is a speech illusion in which incongruent visual oral movements (e.g., /ga/) and auditory input (e.g., /ba/) are integrated to form a new percept (e.g., /da/). We examined whether two phonemic features that are prominent in Mandarin Chinese but not in English—aspiration and lexical tone—modulate the McGurk effect. Aspirated (/ph/) and unaspirated (/p/) consonants are both voiceless, with longer voice onset time for the former. Mandarin lexical tones are defined by fundamental frequency (F0) contours—Tone 1 (flat), Tone 2 (rising), Tone 3 (falling-rising), and Tone 4 (falling)—and are produced through laryngeal activity accompanied by subtle yet observable neck movements. In Experiment 1, aspirated (/pha/) and unaspirated (/pa/) syllables were paired with congruent (/pha/ or /pa/) or incongruent (/kha/ or /ka/) visual articulations, or else with a static face as an auditory-only control. In Experiment 2, the syllable /pa/ produced with four lexical tones was tested under the same three conditions. Participants judged whether the perceived speech matched a predesignated target syllable (i.e., /pha/ or /pa/ with a given tone). The McGurk effect was quantified by reduced accuracy in the incongruent relative to the congruent condition. Results showed that the McGurk effect was larger for the aspirated than the unaspirated consonant, and larger for Tone 1 than Tone 2. These differences could not be merely explained by performance in the auditory-only control. Our results demonstrate that the McGurk effect was susceptible to auditory phonemic features and visual movement beyond the oral area, including laryngeal-related movements in the neck. These findings suggest that the McGurk effect reflects the integration of phonetic gestures across articulatory domains, rather than a simple combination of auditory and visual signals, consistent with the view that speech perception is grounded in phonetic–gestural representations.", "SubmissionID": 133}, {"Day": "Monday", "Time": "09:00–10:30", "SessionID": 3, "Topic": "Multisensory and Other Senses", "Title": "Development of haptic cross-section recognition in school-aged children", "Author": "Margherita Di Gaudio", "CoAuthors": "Silvia Zanchi, Monica Gori", "Abstract": "Cross-sectioning requires inferring the two-dimensional shape produced by slicing a three-dimensional solid. This ability relies on spatial representation, manipulation of 3D and 2D forms, and extraction of geometric structure. Developmental evidence suggests these skills mature during childhood. We investigated whether haptic recognition of solids’ cross-sections, assessed with a haptic version of the Santa Barbara Solids Test, improves across development and whether shape complexity and cut type affect performance. Because this task is typically studied visually, we considered whether children’s haptic performance might depend on haptic cues or abstract mental representations.\n\nWe tested 37 typically developing children aged 6–11 years (M = 8.22, SD = 1.29). Children haptically explored 3D-printed solids and selected a cross-section among four 3D-printed options. Children in first and second grade completed 12 trials, whereas those in third and fourth grade completed 14 trials.\n\nAccuracy (correct/incorrect) was analysed with a binomial generalized linear mixed-effects model including age, shape, and cut as predictors, and subject as random intercept. Age, χ²(1) = 7.55, p = .006, and cut, χ²(1) = 16.68, p < .001, significantly predicted performance. Accuracy increased with age and was lower for diagonal than orthogonal cuts. The significant Age × Cut interaction, χ²(1) = 7.97, p = .005, indicates that age-related improvement was more pronounced for orthogonal than diagonal cuts. Shape was not significant, χ²(2) = 3.84, p = .147.\n\nResults suggest that haptic cross-section recognition improves with age, and diagonal cuts impose a greater processing cost than orthogonal cuts. Younger children showed a more diffuse error pattern, whereas older children’s errors appeared more concentrated in shape-cut configurations. This may reflect developmental differences in abstraction and spatial transformation. Future work will examine systematic error patterns and extend the paradigm to children with severe visual impairment; feasibility testing has begun in one participant.", "SubmissionID": 136}, {"Day": "Monday", "Time": "09:00–10:30", "SessionID": 3, "Topic": "Multisensory and Other Senses", "Title": "Conceptual colour understanding in the blind", "Author": "Nina Vreugdenhil", "CoAuthors": "Edward H.F. De Haan, Nicholas Root, Laura L. Becerra, William Brown, Kabir Kapadia, Darren J. Lipomi, Romke Rouw", "Abstract": "Crossmodal correspondences (CMCs) are associations between different sensory modalities. Although CMCs have been studied extensively, research has predominantly focused on the audiovisual domain, for example, the Bouba-Kiki effect, in which a round shape is associated with Bouba and a spiky shape with Kiki. CMCs are well-studied in the visual modality, but CMCs involving tactile surface properties (e.g.roughness, softness) have received relatively little attention. Here, we study tactile-to-colour crossmodal correspondences. \n\nImproved understanding of tactile-to-colour correspondences is not only of interest for a fundamentally improved understanding of CMCs, across diverse modalities. It may also provide insight into how colour is represented in the absence of vision, and thus offer a pathway for translating colour to blind individuals, who already rely heavily on touch. \n\nIn this study, we conducted several experiments to explore the underlying mechanisms of touch-colour associations and to provide a foundation for translating colour to blind participants.  \n\nFirst, a questionnaire on colour experience and CMCs was completed by 45 visually impaired participants (18 totally blind, 13 with very low vision <5%, 14 partially sighted). Totally blind participants still reported CMC colour associations, suggesting they maintain colour representations, whether acquired through prior visual experience or through language and learned representations.  \n\nSecond, we compare visually impaired and sighted participants on behavioural measures of touch-colour association tasks and haptic sensitivity tasks, to assess how visual experience affects touch-colour correspondences.  \n\nFinally, we will present preliminary fMRI findings on haptic processing in blind individuals, providing insight into potential functional reorganization of neural representations underlying haptic perception in the absence of visual experience.  \n\nTogether, these studies examine the theoretica
