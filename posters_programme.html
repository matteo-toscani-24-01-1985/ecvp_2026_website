en a lack of correlations. I argue that, on reflection, this shouldn’t be surprising, as the measurements we put into our correlations are imprecise composites of multiple causal factors. For example, it is well established that reaction times are influenced by learning and inter-trial serial dependencies. This means that participants in a hypothetical visual search experiment may all have identical “skill” in search, but could exhibit wildly different RTs due to differences in learning rates and serial dependency effects. I present simulated data to demonstrate how such processes can both mask correlations and produce spurious correlations. A potential solution to my hypothetical problem is the use of generative models with latent parameters. I provide an example in the form of FoMo, which decomposes performance in visual foraging into a small number of per-participant parameters.", "SubmissionID": 538}, {"Day": "Thursday", "Time": "09:00–10:30", "SessionID": 6, "Topic": "Visual Search", "Title": "N2pc as attention selection marker: insensitive to distributional distractor probabilities.", "Author": "Anton Lukashevich", "CoAuthors": "Sabrina Hansmann-Roth", "Abstract": "Previous research on Feature Distribution Learning (FDL) has shown that observers implicitly encode the probability distributions of distractor features in visual search displays. These representations are remarkably rich, extending well beyond simple summary statistics such as the mean. However, the neural mechanisms supporting the encoding and use of such feature probabilities remain poorly understood. In the present study, we examined whether learned distractor probabilities modulate the N2pc - a well-established electrophysiological marker of attentional selection. Twenty-four participants performed a modified FDL visual search task in which they searched for an oddly colored target among 36 colored diamonds and reported its location in the upper or lower half of the display. During an initial learning phase, the color distribution of distractors remained constant across trials to facilitate implicit statistical learning. In subsequent test trials, role reversals were introduced so that a former distractor color became the target, with its prior probability (as a distractor) systematically varied. Behavioral results confirmed successful implicit learning of distractor distributions: search times were significantly slower for targets whose colors were close to the mean of the previously learned distractor distribution compared to targets farther from it. In contrast, analysis of the N2pc component (measured as contralateral-minus-ipsilateral difference wave amplitude in the 200–300 ms post-stimulus window) revealed no modulation by distractor probability. These findings indicate that while observers form detailed probabilistic representations of distractor features that influence search efficiency, such learning does not directly scale the amplitude of early attentional selection as indexed by the N2pc. This dissociation suggests that statistical regularities in the environment may primarily affect later stages of processing or operate through more subtle temporal dynamics rather than the overall strength of attentional deployment. This work was supported by the Icelandic Centre for Research (Rannís grant 239774-052) awarded to S.H.R.", "SubmissionID": 551}, {"Day": "Thursday", "Time": "09:00–10:30", "SessionID": 6, "Topic": "Visual Search", "Title": "Looking-without-seeing in visual search occurs for salient but not non-salient targets", "Author": "Vladislav Aksiotis", "CoAuthors": "Li Zhaoping", "Abstract": "Attention in visual search is often controlled by both bottom-up saliency and top-down priority. According to the V1 Saliency Hypothesis and the Central-peripheral Dichotomy theory, gaze during search is guided exogenously by saliency signals generated in primary visual cortex (V1), particularly in the peripheral visual field, and by goal-directed target recognition, particularly in the central visual field. Liang et al. (2023) provided evidence in a search task for a homo-pair of dots (both white or both black) as a search target among uniformly oriented hetero-pairs of dots as non-targets. They observed a parallel advantage — the target was easier to find when it was parallel rather than perpendicular to the non-targets. This advantage is a signature of V1 saliency mechanisms (by properties of V1 responses to these dot-pairs). It indicated that the target was more salient than the non-targets to enable looking-without-seeing: the target captured gaze even when it was too peripheral to be recognizable in crowded non-targets, purely by its bottom-up saliency (Liang and Zhaoping, 2025).\n\nSince hetero-pairs evoke substantially weaker V1 responses than homo-pairs in isolation (Smith et al., 2002), a hetero-pair target among uniformly oriented homo-pairs should be non-salient and should not evoke looking-without-seeing. The current study tested this prediction.\n\nAs predicted, the hetero-pair target required a longer search time and exhibited instead a perpendicular advantage, signifying that it was indeed less salient than the non-targets. Furthermore, looking-without-seeing was absent, such that gaze during search relied exclusively on top-down looking-by-seeing. Specifically, the probability of a saccade reaching the target exceeded chance level only when the target’s eccentricity was sufficiently small to allow at least a partial recognition of the target before the saccadic onset.\n\nThese results, compared against our replication of Liang et al. (2023), demonstrate that bottom-up V1 saliency is necessary for peripheral gaze capture without recognition.", "SubmissionID": 591},  {"Day": "Thursday", "Time": "09:00–10:30", "SessionID": 6, "Topic": "Visual Search", "Title": "Graded Colour Salience in Pre-attentive Visual Search: Evidence from Set-Size Independent Detection", "Author": "Katsuaki	Sakata", "CoAuthors": "Yasuki	Yamauch", "Abstract": "It is widely recognised that certain colours attract attention rapidly, although their precise identity cannot be determined prior to perceptual processing. This observation implies the operation of pre-attentive mechanisms in visual attention. According to Feature Integration Theory, basic visual features such as colour are processed in parallel at a pre-attentive stage, producing feature-based pop-out that is independent of set size. However, subsequent developments, notably the Guided Search model, propose that parallel feature activation feeds into a priority map that guides focal attention. Within this framework, even in pop-out conditions, differences in feature salience may yield graded differences in detection latency. The present study examined colour salience using a visual search paradigm with 27 participants (aged 19–45 years) with normal trichromatic colour vision. Observers searched for a pre-specified target colour among multiple distractors and responded via key press. Red, green, and blue stimuli were positioned equidistant from the achromatic point in CIE 1976 L*a*b* colour space, and set size was varied across three levels. Reaction times were unaffected by set size, indicating efficient search consistent with feature-based pop-out as predicted by Feature Integration Theory. However, detection latency differed significantly across colours, with red detected more rapidly than green or blue. From the perspective of Guided Search, this pattern suggests that although colour-defined targets are processed in parallel, their relative salience differentially weights activation within the priority map. Importantly, colour salience is context-dependent, influenced by luminance, adaptation, task demands, and background contrast. The findings therefore do not imply intrinsic superiority of red, but rather demonstrate that, under pop-out conditions, chromatic signals can guide attention with graded efficiency.", "SubmissionID": 8}, {"Day": "Thursday", "Time": "09:00–10:30", "SessionID": 8, "Topic": "Scene and Object Perception and Recognition", "Title": "The impact of action semantics on visual expectancy learning", "Author": "Solene KALENINE", "CoAuthors": "Nicolas Slaski, Jérémie Jozefowiez", "Abstract": "Expectancy learning, the ability to anticipate future events on the basis of environmental cues, is a key component of adaptive behavior. It has been extensively studied through Pavlovian conditioning (pairing of a neutral stimulus with a biologically important event) in animals and contingency assessment task (after being exposed to a stimulus flow, the participants have to indicate whether a specific stimulus can be predicted on the basis of another) in humans. Because of its roots in the animal learning tradition, this kind of research have rarely looked at the impact of variables reflecting higher-order semantic relations between stimuli. \n\nThe present study assessed whether action semantics could impact expectancy learning in a visual contingency assessment task. Participants were exposed to rapid stimulus streams. Each stimulus represented an object and was presented for 300 ms. A stream involved two kinds of stimuli: cues and outcomes. At the end of a stream, participants performed predictive judgments about whether a specific outcome could be predicted from a specific outcome. Beside the objective predictive relation between the cues and outcomes, we manipulated the semantic relation between the target cues and outcomes which could either be related through an action semantics or semantically unrelated. \n\nWe found that irrespective of the objective predictive relations between the stimuli, action semantics were making participants more likely to judge there was a predictive relation between them. This suggests that higher-order semantic relations between stimuli might bias the detection of predictive relations between stimuli, independently of the objective statistical structure of the environment.", "SubmissionID": 194}, {"Day": "Thursday", "Time": "09:00–10:30", "SessionID": 8, "Topic": "Scene and Object Perception and Recognition", "Title": "Sensitivity in Scene Typicality Judgments: Linking Pairwise Choice and Rating Scales", "Author": "Jiri Lukavsky", "CoAuthors": "Charlotte Atzert, Niko Busch, Filip Dechterenko", "Abstract": "People do not treat categories as uniform sets; instead, they perceive some exemplars as more typical than others. These differences can reflect the internal structure of a category (e.g., variation among dog breeds) or more subtle feature cues (e.g., how typical a particular kitchen appears). In a previous study, participants rated the typicality of 1,500 images of kitchens, bedrooms, and living rooms on a 0–100 scale, with each image evaluated by 25–50 raters. We computed the mean typicality score for each image, but it remains unclear how sensitive participants are to variations on this scale and how those numeric differences translate into judgmental preferences.\n\nTo address this question, we selected 24 images from each category, sampling three images from each of eight typicality quantiles. Three new participant groups (N = 101 for kitchens, N = 114 for bedrooms, and N = 96 for living rooms) completed 276 binary-choice trials, selecting the more typical exemplar in each pair. Responses were modeled using a Bradley–Terry framework, and the resulting preference coefficients were compared with the previously obtained mean typicality ratings.\n\nThe two measures showed strong correspondence (r = .826 for kitchens, r = .869 for bedrooms, r = .924 for living rooms), allowing us to align the scales. The analysis indicated that a difference of approximately 10 points (9.3–11.6) on the 0–100 scale doubled the odds that participants selected the higher-rated exemplar in pairwise comparisons. Expressed differently, rescaling the original ratings to a 7-point Likert scale suggests that a 1-point difference between two images corresponds to a 73–78% probability of selecting the more typical exemplar (odds = 2.71–3.45). Our experiments show that the average typicality ratings are highly predictive of actual human choice behavior.", "SubmissionID": 204}, {"Day": "Thursday", "Time": "09:00–10:30", "SessionID": 8, "Topic": "Scene and Object Perception and Recognition", "Title": "Blended scenes deviate in typicality but preserve perceptual similarity", "Author": "Filip Dechterenko", "CoAuthors": "Charlotte Atzert, Niko Busch, Jiri Lukavsky", "Abstract": "When studying scene perception, an important factor is scene similarity. Recent advances in generative models allow us to create artificial scenes that are composites of several images, and these blends remain highly meaningful with respect to scene structure. In this study, we explored three questions: (1) How closely do blended scenes resemble their source images? (2) Can behavioral similarity judgments be predicted using deep feature representations? (3) How do blends differ from source images in perceived typicality? \n\nWe selected 115 images from four scene categories (two indoor, two outdoor). Using OpenAI's GPT-Image 1.5 model, we generated blends in three conditions: within the same category, between different categories within the same domain (indoor or outdoor), and across domains (combining indoor and outdoor scenes). These blends were evaluated in an online study (Prolific, N = 80) using a rating task in which participants viewed a blend alongside its two source scenes and adjusted a slider to indicate which source the blend more closely resembled. For each image, we extracted deep features from multiple layers of AlexNet (conv3, conv5, fc6, and fc7) pretrained on the Places365 database. We also estimated image typicality using the ChatGPT-4 model, leveraging our recent evidence that LLM-based typicality scores serve as a reliable proxy for human norms in scene categorization.\n\nResults showed strong agreement between behavioral similarity and deep-feature similarity (r > .70 across all tested convolutional and fully connected layers). Blended scenes were rated as markedly less typical than their source images, with typicality reduced by approximately 20-30% relative to the original value or the scale range. This decrease was observed not only for cross-category blends but also for within-category blends. These findings indicate that while deep features capture perceptual similarity well, the blends are perceived as atypical rather than as simple averages of their components.", "SubmissionID": 213}, {"Day": "Thursday", "Time": "09:00–10:30", "SessionID": 8, "Topic": "Scene and Object Perception and Recognition", "Title": "Dissociating contribution of convexity and perceived distance in allocation of attention to 2D stimuli", "Author": "Marianna Musa", "CoAuthors": "Carolina Maria Oletto, Umberto Granziol, Luca Battaglini, Marco Bertamini", "Abstract": "Some studies suggest preferential allocation of visual attention to objects perceived as near rather than far in 2D and 3D representations. However, when stimuli are depicted using 3D cues such as shading, they can modulate perceived depth but may fail to disambiguate important shape properties such as convexity, which can be influenced by shading-based cues (e.g., light-from-above). We investigated whether perceived distance and convexity can be dissociated by replicating the paradigm of West et al. (2013) and adapting it to 2D stimuli. In their study, convex/near and concave/far spheres were presented in a temporal order judgment task using different stimulus onset asynchronies (24, 48, 60, 120 ms) to test prior-entry effect (i.e., the tendency for attended stimuli to be perceived earlier in time). We conducted an exact replication, then isolated perceived distance with linear-perspective stimuli and convexity using 2D-closed-contours with a sinusoidal-boundary on one side. We hypothesised that convexity would produce a stronger prior-entry effect than concavity and that this effect would exceed that driven by perceived distance when both cues were present. When only distance cues were available, we expected a bias toward the near stimulus. We estimated the Point of Subjective Simultaneity (PSS) and compared reaction times (RT) between stimuli in each experiment. Replication showed a positive PSS and faster responses for near/convex stimuli. With 2D-distance alone, we found no reliable differences between stimuli. In contrast, with closed-contour, prior-entry favoured concave over convex parts. Although the hypotheses were partially supported, these results suggest that convexity and perceived distance rely on distinct mechanisms of attentional allocation in 2D vs. 3D stimuli. This divergence may be interpreted within a probabilistic framework of 2D contour processing, whereby inward (convex) curvature is more expected in closed shapes, whereas outward (concave) curvature is statistically less frequent and therefore more informative.", "SubmissionID": 268}, {"Day": "Thursday", "Time": "09:00–10:30", "SessionID": 8, "Topic": "Scene and Object Perception and Recognition", "Title": "Temporal Dynamics of Object Size Adaptation", "Author": "Serena Castellotti", "CoAuthors": "Alessandro Benedetto, Irene Burgio, Elisa Castaldi, Roberto Arrighi", "Abstract": "Perceptual experience is continuously shaped by recent sensory history through adaptive mechanisms that recalibrate neural representations. Previous work has shown that size adaptation alters perceived object size and is associated with activity in early visual cortex, yet its temporal dynamics remain unresolved. Moreover, recent evidence from numerosity adaptation indicates that the similarity between adaptor and test stimuli in their low-level features determines the strength of adaptation effects, suggesting that some adaptation phenomena may involve post-categorical processes.\n\nHere, we combined psychophysics and EEG to determine when size adaptation effects arise along the visual hierarchy and whether such recalibration is influenced by stimulus similarity. \n\nParticipants performed a 2AFC size discrimination task between two circular stimuli presented on either side of a central fixation point (baseline condition), with one stimulus fixed at 5° diameter and the other varying around this value. The same task was then performed following exposure to a large adapting circular stimulus for 4 seconds, with the color of the adaptor and test stimuli either matching (congruent condition) or differing (incongruent condition) across blocks.\n\nBehaviorally, adaptation to large stimuli induced a compression of perceived size, consistent with previous findings. Importantly, the magnitude of adaptation was modulated by feature congruency, with stronger effects observed in color-congruent compared to incongruent conditions. At the neural level, an early response around ~100 ms was the first component modulated by adaptation, although this modulation was not sensitive to color congruency. In contrast, congruency-dependent modulation emerged at a later stage, around ~200-300 ms and beyond, with enhanced responses for congruent relative to incongruent conditions.\n\nThese findings indicate a temporal dissociation between early adaptation effects and later modulation by feature congruency, suggesting that perceptual recalibration may not be limited to low-level sensory mechanisms but may depend on interactions across feature dimensions, consistent with object-based categorization processes.", "SubmissionID": 270}, {"Day": "Thursday", "Time": "09:00–10:30", "SessionID": 8, "Topic": "Scene and Object Perception and Recognition", "Title": "Response in the frequency-contrast plane: reproduction of modern psychophysics with image quality models.", "Author": "Nuria Alabau Bosque", "CoAuthors": "Paula Daudén-Oliver, Valero Laparra, Jesús Malo", "Abstract": "Models for image quality assessment are traditionally based on vision science and, more recently, on machine learning. Years ago, reproducing the classical human response to frequency-contrast patterns was enough to get good quality metrics (Daly, 1990; Teo and Heeger, 1994). For this reason, it is important to check the behaviour of current metrics with basic stimuli in this plane.\n\nIn this work, we use new data gathered using modern psychophysics in the frequency-contrast plane to evaluate image quality models. In this evaluation, models face the same task as humans in Maximum Likelihood Difference Scaling and Ordinal Embedding experiments. In particular, we compare 5 state-of-the-art models. We also evaluate the Mean Squared Error for convenient reference. \n\nIn this type of experiments, two stimuli and a reference stimulus are presented, then, the observer decides which is more similar to the reference. For models, we simulate the experiment by taking the distance computed by each metric between the reference and the two stimuli. In particular, the stimuli are Gabor patches or narrow band noise of certain frequency, orientation and RMSE contrast. These stimuli can come with a background with controlled frequency and orientation. In this setting, one can keep the frequency the same and change only the contrast (unidimensional case), or mix both variables (multidimensional case). \n\nIn our results, all models have a response that increases with contrast. Obviously, RMSE has a linear response, while some models certainly have a saturating response. Models have a limited frequency bandwidth, but not exactly like humans. Likewise, no model properly reproduces masking effects. In conclusion, no model faithfully reproduces human behaviour in the frequency-contrast plane. This finding is consistent with studies that suggest that a better performance in image quality does not imply models that reproduce low-level vision facts.", "SubmissionID": 339}, {"Day": "Thursday", "Time": "09:00–10:30", "SessionID": 8, "Topic": "Scene and Object Perception and Recognition", "Title": "Differentiating image-based strategies for viewpoint discrimination.", "Author": "Georgie Keggin", "CoAuthors": "Casimir Ludwig, Emma Stewart", "Abstract": "When we compare objects seen from different viewpoints, what information are we using? In classic studies of mental rotation, the linear relationship between response time and angular disparity between two viewpoints was taken as evidence that observers mentally rotate a structural, 3D representation of the object. However, angular disparity will often be correlated with the degree of change in the 2D image. Therefore, viewpoint comparison may reflect sensitivity to image-level cues rather than, or alongside, classic linear rotation.\n\nIn this study, we dissociate four candidate cues in a triadic viewpoint discrimination task: angular disparity, cumulative image displacement (CID), direct image displacement (DID), and static image similarity. Participants viewed a reference image alongside two comparisons and chose which was closer in viewpoint to the reference. We created a novel stimulus set with unfamiliar abstract 3D objects and geometrically regular objects to vary whether observers could infer the 3D structure of the objects. We included conflict trials in which different cues made divergent predictions.\n\nUsing mixed-effects logistic regression, we find that all four candidate cues significantly predicted choices, with image-based cues - particularly image similarity and DID - emerging as stronger predictors than CID and angular disparity, in terms of effect size. In conflict trials, choices were most strongly driven by image similarity, with accuracy falling substantially when only displacement-based cues supported the correct response. Participants also differed substantially in which cues they relied on, while most tracked image similarity, a minority relied more heavily on displacement-based cues and showed lower overall accuracy. These findings suggest that viewpoint comparison is not a unitary process - observers may not rely solely on mental rotation of a 3D structural representation, but instead favour 2D image-based heuristics, with meaningful individual variation in how different sources of visual information are weighted.", "SubmissionID": 366}, {"Day": "Thursday", "Time": "09:00–10:30", "SessionID": 8, "Topic": "Scene and Object Perception and Recognition", "Title": "Object-Scene congruency and visual similarity interact to support scene memory", "Author": "Sarwang Shekhar Dwivedi", "CoAuthors": "Maria Robinson, Alex Clarke", "Abstract": "We can remember a plethora of different scenes, but effective retrieval of scene information is selective and dependent on many factors. Prior research suggests that the memorability of an image is not only influenced by how visually similar it is to others, but also how congruent it is to the surrounding scene context (Pandya et al., 2024; Rémy et al., 2013). However, there is a dearth of literature investigating whether the visual similarities between different scenes, and object-scene congruency interact to predict scene memory.\n\nIn this study, participants rated the congruency of different object-scene pairs, followed by a surprise 3-alternate forced choice (3-AFC) memory task for scene images. Each trial consisted of a set of three images of same scene category. To test whether visual similarity has an influence on scene memory, and whether low or high-level visual features are relevant, we extracted feature representations through AlexNet (Krizhevsky et al., 2012), a Convolutional Neural Network (CNN) model. Feature values were extracted at each layer and averaged across the set to generate trial-level measures of visual similarity spanning from low-level visual features (brightness, contrast) to high-level constructs (eye, wheel etc.).\n\nGeneralised linear mixed effects models were first fitted to test whether feature-specific similarities and object-scene congruency interact to jointly predict scene memory. The results indicate that higher-level feature layers were found to negatively predict scene memory accuracy, such that greater visual similarity between images was linked to poorer performance. This effect was moderated by object–scene congruency; As congruency increased, the negative influence of similarity on recognition accuracy weakened. The findings suggest that schema-based knowledge about the world aids memory, such that object-scene congruency acts as a compensatory mechanism modulating the cognitive need to use more higher-level perceptual features to support scene memory.", "SubmissionID": 449}, {"Day": "Thursday", "Time": "09:00–10:30", "SessionID": 8, "Topic": "Scene and Object Perception and Recognition", "Title": "Object typicality in indoor scenes: Does the choice of response method matter?", "Author": "Natalie Šimčík", "CoAuthors": "", "Abstract": "Typicality ratings can be used to characterise objects in scenes, with recent work showing that object frequency and specificity are useful for scene categorisation (Wiesmann & Võ, 2023). In this study, we investigated whether the choice of response method affects typicality estimates for objects drawn from three indoor room categories. \n\nDuring a pilot experiment using preliminary subset of 35 stimuli, 45 Czech-speaking participants (37 women, 8 men; M(age) = 24.5, SD = 8.0) rated typicality for objects from indoor scene photographs (kitchen, bedroom, living room) using three methods: rank ordering (participants ordered list of objects from most to least typical for a given room), an object-anchored Likert scale (participants saw two images of the same object from different angles and rated how commonly it appears in each of three rooms), and a room-anchored Likert scale (participants were given room context and rated a list of objects for that room). All measures showed high inter-rater agreement (ICC(2,k) > .97; Kendall's W = .80 for kitchen and bedroom, .70 for living room) and strong cross-method convergence across all pairwise comparisons (Spearman ρ = .76 – .98).\n\nDespite this convergence, the response method affected absolute ratings: object-anchored task produced higher typicality estimates than room-anchored task across all rooms. This difference varied across room categories, being largest for the living room and smallest for the kitchen, potentially reflecting how strongly each room is associated with a fixed set of objects.\n\nAn expanded experiment, using a human-annotated object set derived from 1,500 indoor scene photographs, is currently underway and will allow these patterns to be examined with greater precision. Complete typicality ratings and their cross-method comparison will be presented at the conference.", "SubmissionID": 475}, {"Day": "Thursday", "Time": "09:00–10:30", "SessionID": 8, "Topic": "Scene and Object Perception and Recognition", "Title": "Dissociable effects of object relatedness and scene congruency on visual recognition", "Author": "Mingjie Gao", "CoAuthors": "Weina Zhu, Jan Drewes", "Abstract": "Visual object recognition is shaped by both global scene context and local relations between co-occurring objects, yet their relative contributions and temporal dynamics remain unclear. We examined how scene congruency and object relatedness jointly influence recognition in two experiments. In Experiment 1, participants categorized target objects embedded in semantically congruent or incongruent scenes. Reaction times revealed a reliable scene-congruency benefit, with faster recognition for targets appearing in congruent backgrounds. In Experiment 2, we added a second contextual object that was either related or unrelated to the target, together with a no-background baseline, while recording EEG. Behaviorally, object relatedness strongly modulated performance: targets were recognized more slowly and less accurately when paired with a related contextual object than with an unrelated one. Moreover, relatedness interacted with scene congruency: when the contextual object was related, congruent scenes facilitated recognition, whereas when it was unrelated, incongruent scenes produced faster responses. \n\nERP analyses revealed dissociable processing stages. In the no-background condition, relatedness modulated the N170, suggesting an early influence of foreground structure. Across conditions, unrelated pairs elicited larger P2 amplitudes, consistent with more efficient attentional selection. The N3 was sensitive to both scene congruency and object relatedness when a background was present, indicating later contextual integration, while the N4 was primarily affected by relatedness. Time-resolved MVPA further showed that object relatedness was decodable earlier and more robustly than scene congruency. \n\nTogether, these findings suggest that in multi-object scenes, local object-object structure can exert a stronger and more sustained influence on recognition than global scene gist.", "SubmissionID": 561}, {"Day": "Thursday", "Time": "09:00–10:30", "SessionID": 8, "Topic": "Scene and Object Perception and Recognition", "Title": "The role of behavioural goals in shaping representations in the ventral visual pathway", "Author": "Stefania Bracci", "CoAuthors": "Davide Cortinovis", "Abstract": "How does the brain represent the visual environment? Classic theories of object vision focus on object recognition; however, human object vision is far from being solved, and accumulating evidence points to the complexity of the multidimensional representational space that underlies visual representations. In a series of neuroimaging studies, we investigate the role of action-related dimensions in shaping the organisation of visual cortex representations.\n\nIn the first study, we examined responses to images of body parts and objects with different degrees of action-related properties. In the left lateral occipitotemporal cortex, we identified a topographically organised action gradient, with overlapping activations for bodies, hands, tools, and manipulable objects along a dorsal–posterior to ventral–anterior axis, culminating at the intersection of body parts and objects exhibiting higher action-related properties.\n\nIn the second study, we confirm and extend these results by showing that manipulable food, which conveys grasping affordances, maps onto the same action gradient in the lateral occipitotemporal cortex by overlapping with other manipulable and action-effector objects such as tools. Importantly, topographic deep neural networks trained on object recognition were unable to capture the same spatial organisation observed in the lateral occipitotemporal cortex.\n\nTogether, these results suggest that, to understand object vision, we need to move beyond object recognition, often considered the final goal of visual perception, and take into account the role of behavioral goals, such as object interaction, in shaping the organisation of object space in the visual cortex. Understanding the core mechanisms underlying this object space could inform the development of computational models that perceive and represent the world in a human-like manner.", "SubmissionID": 563}];
const favs=new Set(JSON.parse(localStorage.getItem('ECVP2026_FAVS')||'[]'));

let myOnly=false;

function showMy(){
    myOnly=!myOnly;
    render();
}

function saveFavs(){localStorage.setItem('ECVP2026_FAVS',JSON.stringify(Array.from(favs)));}
function s(v){return v==null?'':String(v);}
function toggleAbs(id){const e=document.getElementById('a_'+id);if(e)e.style.display=e.style.display==='block'?'none':'block';}
function toggleFav(id){if(favs.has(id))favs.delete(id);else favs.add(id);saveFavs();render();}
function render(){
 const q=document.getElementById('search').value.toLowerCase();
 const day=document.getElementById('dayFilter').value;
 const list=myOnly
    ? posters.filter(p=>favs.has(s(p.SubmissionID)))
    : posters;
 let out='',current='',count=0;
/*
 posters.forEach(function(p){
 */
 list.forEach(function(p,i){
   const txt=(s(p.Title)+' '+s(p.Author)+' '+s(p.CoAuthors)+' '+s(p.Topic)+' '+s(p.Abstract)).toLowerCase();
   if(q && !txt.includes(q)) return;
   if(day && s(p.Day)!==day) return;
   count++;
   if(s(p.Day)!==current){current=s(p.Day);out+='<div class="day">'+current+'</div>';}
   const sid=s(p.SubmissionID);
   /* const sid='p_'+i;*/

   const sel=favs.has(sid)?'selected':'';
   out+='<div class="card '+sel+'">';
   out+='<div class="title">'+s(p.Title)+'</div>';
   out+='<div class="meta"><b>'+s(p.Author)+'</b></div>';
   out+='<div class="meta">'+s(p.CoAuthors)+'</div>';
   /*
   out+='<div class="meta">'+s(p.Day)+' | '+s(p.Time)+' | Session '+s(p.SessionID)+'</div>';
   */
   out+='<div class="meta">'+s(p.Day)+' | '+s(p.Time)+' </div>';
   out+='<div class="topic">'+s(p.Topic)+'</div><br><br>';
   out+='<button onclick="toggleAbs(\''+sid+'\')">Abstract</button> ';
   out+='<button onclick="toggleFav(\''+sid+'\')">'+(favs.has(sid)?'★ Saved':'☆ Save')+'</button>';
   out+='<div class="abstract" id="a_'+sid+'">'+s(p.Abstract)+'</div></div>';
 });
 document.getElementById('stats').innerHTML='Showing '+count+' contributions. Saved: '+favs.size;
 document.getElementById('results').innerHTML=out;
}
function exportICS(){
 const map={Monday:'20260824',Tuesday:'20260825',Wednesday:'20260826',Thursday:'20260827'};
 let txt='BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//ECVP2026//EN\r\n';
 posters.forEach(function(p){
   const sid=s(p.SubmissionID);
   /* debugger; */
   if(!favs.has(sid)) return;
   let st='090000',en='103000';
   if(s(p.Time).includes('15')){st='153000';en='170000';}
   txt+='BEGIN:VEVENT\r\nSUMMARY:'+s(p.Title).replace(/\r|\n/g,' ')+'\r\n';
   txt+='DTSTART:'+map[s(p.Day)]+'T'+st+'\r\n';
   txt+='DTEND:'+map[s(p.Day)]+'T'+en+'\r\n';
   txt+='DESCRIPTION:'+s(p.Author)+'\r\nEND:VEVENT\r\n';
 });
 txt+='END:VCALENDAR';
 const blob=new Blob([txt],{type:'text/calendar'});
 const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='ECVP2026_MyProgramme.ics';a.click();
}
document.getElementById('search').addEventListener('input',render);
document.getElementById('dayFilter').addEventListener('change',render);
render();
</script>
