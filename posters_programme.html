en choice options. This failure to replicate the original effect calls into question the role of choice-induced agency for temporal binding and suggests that the effect may be better explained by more general cognitive processes.", "SubmissionID": 467}, {"Day": "Wednesday", "Time": "09:00–10:30", "SessionID": 33, "Topic": "Cognition, Decision Making, and Confidence", "Title": "Ticket to Change: Dynamic Descriptive Social Norms as a Route to Sustainable Travel Behavior", "Author": "Sabine Bremermann-Reiser", "CoAuthors": "Daniele Catarci, Ester Reijnen", "Abstract": "Climate change mitigation requires interventions to promote more sustainable travel behavior, and digital booking platforms may provide a promising way to do so. The present study tested whether dynamically implemented descriptive norms on these booking platforms can increase the probability of switching from plane to train. To test this assumption, observers (N = 517) were presented with a scenario of a mandatory school trip from Zurich to Vienna. Thereby participants were randomly assigned either to the control condition or to one of the two descriptive norm conditions (weak vs. strong). In the weak norm condition, the ticker, which displayed the number of peers who had already switched to train, slowly counted up from a low number (“16”), in the strong norm condition it counted up from a higher number (“162”). Contrary to our assumptions, the weak norm was more effective in promoting switching to train than the strong norm, relative to the control condition. One possible explanation is that the weak norm matched the size of a relevant peer group more, thereby increasing perceived social relevance. Furthermore, reaction time (RT) analysis revealed that in the control condition, but not in the descriptive norms conditions (weak, strong), participants showing longer RTs switched significantly less to the train–possibly due to the absence of a normative cue, longer RTs or deliberation facilitates the generation and weighting of counterarguments against the sustainable option. Alternatively, longer RTs may reflect increased decision conflict toward the default option (the plane) in the absence of a normative cue. Additionally, prior behavior–assessed as self-reported travel-related CO2 emissions–influenced switching to train: participants with stated lower previous CO2 emissions showed higher switching rates, particularly in the descriptive norm conditions (weak, strong). Overall, descriptive norms appear to influence judgement by perceived group relevance, deliberation processes, and prior behavior.", "SubmissionID": 472}, {"Day": "Wednesday", "Time": "09:00–10:30", "SessionID": 33, "Topic": "Cognition, Decision Making, and Confidence", "Title": "The Role of Food Product-Related Humor in Instagram Feeds", "Author": "Lars Bläuer", "CoAuthors": "Lea Laasner Vogt, Ester Reijnen", "Abstract": "Globally, obesity is on the rise. Furthermore, food products advertised on social media are\n\nmostly unhealthy. But how can healthier food products be promoted? Maybe trough productrelated\n\nhumor? To test this, 631 observers were presented with an artificial social media feed\n\nthat included a target post about chickpea pasta as a healthy food product. Thereby observers\n\nwere randomly assigned to one of the following target post conditions: A control condition\n\nwithout humor was compared with two humorous conditions (product-unrelated vs. productrelated).\n\nWhile the product-unrelated condition had no relation between humor and product\n\nfeatures (e.g., fiber content), there was one in the product-related condition. To assess the\n\neffects of these conditions in promoting healthy food products, we measured observers’\n\npurchase intention for the chickpea pasta. The results, however showed no differences\n\nbetween the conditions. But could humor also have an indirect effect, via mediator variables\n\n(e.g., perceived humor, post attitude, product attitude)? The subsequently calculated path\n\nmodel indeed, revealed two significant indirect effects. The use of product-unrelated humor\n\n(vs. control condition) had a negative indirect effect on purchase intention. Specifically,\n\nproduct-unrelated humor decreased product attitude, which in turn translated into a lower\n\npurchase intention. On the other hand, the use of product-related humor (vs. productunrelated)\n\nhad a positive indirect effect on purchase intention via perceived humor, post\n\nattitude and product attitude. Hence, humor only unfolds its persuasive potential when it is\n\nrelated to the product. To conclude, product-related humor might be able to promote healthier\n\nproducts on social media.", "SubmissionID": 473}, {"Day": "Wednesday", "Time": "09:00–10:30", "SessionID": 25, "Topic": "Perceptual Learning and Memory", "Title": "Perceptual Learning of Visual Crowding and Location-Specific Transfer in Patients with Central Vision Loss and Normally Sighted Controls", "Author": "Elena von Perponcher", "CoAuthors": "Mark W. Greenlee, Herbert Jägle, Tina Plank", "Abstract": "Individuals with central vision loss (CVL) frequently develop a preferred retinal locus (PRL) on the intact peripheral retina, adopting eccentric fixation as a compensatory strategy. Visual crowding impairs the recognition of peripherally presented targets when flanked by distractors and is considered a main obstacle to everyday visual functioning in CVL, affecting tasks such as word recognition and reading. Visual crowding has been shown to be reduced through perceptual learning.\n\nThirteen patients with CVL and 13 age-matched normally sighted controls completed an 8-day training protocol on a Landolt C gap detection crowding task with radially and tangentially arranged same-sized circle flankers. Learning success was operationalized as a reduction in critical target-to-flanker distance. Training was conducted at the PRL and an equally eccentric but unutilized control retinal location (CRL). Patients fixated at their PRL, while each matched control trained at the corresponding locations under central fixation. Pre- and post-training, all participants were assessed in letter visual acuity, Vernier hyperacuity, contrast sensitivity, a lexical decision task, and a reading test. All measures except reading were performed at both PRL and CRL.\n\nBoth groups showed significant learning across locations. Radial-tangential anisotropy was detected only in controls at both locations. Patients demonstrated better crowding performance at the PRL than the CRL, whereas controls showed no location-dependent difference. Transfer to word recognition and visual acuity was significant exclusively at patients' PRL, while controls improved comparably at both PRL and CRL. Reading speed improved in patients but not in controls. No changes in Vernier hyperacuity or contrast sensitivity were observed in either group.\n\nThese findings indicate location-specific transfer to other visual tasks in CVL patients after crowding training, reflecting preferential resource allocation to the PRL, and support perceptual learning as a rehabilitation approach for central vision loss.", "SubmissionID": 310}, {"Day": "Wednesday", "Time": "09:00–10:30", "SessionID": 25, "Topic": "Perceptual Learning and Memory", "Title": "Retrocueing benefits in visual working memory are disrupted by distraction but not by the need to maintain unprioritised memory contents", "Author": "Isabel Ellis", "CoAuthors": "Katherine Dyke, JeYoung Jung, Nicholas Myers", "Abstract": "Visual working memory (WM) declines with ageing. Predictive cues, directing attentional prioritisation of memory contents reliably improve accuracy and reduce reactions times in younger adults, but there is conflicting evidence regarding whether this ability declines or is maintained in older adults. While some work suggests preserved internal attention, it may 1) become more vulnerable to distraction by an intervening, attention-demanding task, or 2) rely on the ability to drop unprioritised contents to free up resources. Here we developed a visual WM retrocueing task to test these two possibilities. Younger (18-35) and older (60+) adults recalled two items per trial, allowing us to test a) cueing benefits when the cued item was tested first, b) when it was tested second after recalling an uncued item acting as a distractor, and c) any reduction in recall accuracy of uncued items compared to no-cue trials, suggesting that participants had dropped items to free resources for the cued item. Both younger and older adults benefitted when the cued item was recalled first, with the size of the benefit comparable between groups. This benefit came at no apparent cost to subsequent recall of an uncued item in either group, suggesting that cueing benefits do not require dropping other contents. However, when the cued item was recalled second, only the younger group showed a cue benefit. Therefore, preserved internal attention in ageing appears to be impaired by distraction but not by the need to maintain unprioritised contents. Eye-tracking and EEG data have also been recorded. Lateralised posterior alpha rhythms and microsaccades have been used as markers of internal attention in younger adults and we predict ageing effects which reflect those in behaviour. These neural and behavioural markers will give further insight into how these processes change as we age and how we might preserve WM ability.", "SubmissionID": 313}, {"Day": "Wednesday", "Time": "09:00–10:30", "SessionID": 25, "Topic": "Perceptual Learning and Memory", "Title": "Seeing an Event Isn’t Enough: Phenomenal Causality Modulates Attentional Capture But Not Automatically", "Author": "Wanna He", "CoAuthors": "", "Abstract": "Phenomenal causality is perceived solely from physical cues, reflecting the perceived necessity between two motions. It is perceived automatically and independently of higher-level reasoning. Some researchers suggest that phenomenal causality may function like a Gestalt cue, integrating two motions into a unified whole in a nature way, but this hypothesis has not been empirically tested. Prior work showing that Gestalt-based perceptual integration carries over into visual working memory (VWM) representation provides a basis for examining whether phenomenal causality yields a similar integrative effect.\n\nAcross three experiments, we investigated whether phenomenal causality shapes how VWM interacts with attention. Experiment 1 used a classical VWM-guided attention paradigm and manipulated causality through time interval. Participants memorized two disc colors and their causal relation before completing a visual search and a memory tasks. VWM-guided attention emerged only in the causality condition. Experiment 2 replicated this results by manipulating motion-path, again demonstrating that causally linked motions were represented as a single event in VWM that guided attention, whereas non-causal motions were not.\n\nExperiment 3 tested whether such integration occurs automatically. Participants memorized only one disc's color (i.e. target color) and completed a search task without intentionally encoding the discs' relation. If integration were automatic, both colors would be encoded and guide attention in the causality condition. However, results revealed only the target color guided attention, indicating that VWM does not automatically encode the non-target color even when it is perceptually organized by causality.\n\nTogether, it shows that phenomenal causality can restructure how multiple motions are represented and used to guide attention, but only when explicitly encoded. This work highlight event structure as a critical determinant of how VWM shapes attentional selection offering new insight into how dynamic event structure shapes cognition.", "SubmissionID": 331}, {"Day": "Wednesday", "Time": "09:00–10:30", "SessionID": 25, "Topic": "Perceptual Learning and Memory", "Title": "Beyond Intrinsic Priority: How Contextual Distinctiveness Modulates Social Information Selection", "Author": "Yueyao Liu", "CoAuthors": "Musi Xie, Jiaojiao Li, Wanna He, Pengmin Qin, Hui Chen", "Abstract": "The human visual system often prioritizes self-relevant stimuli, such as one's own name, a phenomenon termed the self-processing advantage (SPA). However, it remains a matter of debate whether this priority stems from a fixed, intrinsic quality of self-representation or a flexible process governed by contextual factors. In this study, we employed a modified attribute amnesia paradigm to investigate how the social composition of a visual display modulates the automatic encoding of person names into working memory.\n\nAcross a series of experiments, we manipulated contextual distinctiveness by varying the categorical composition of the potential name set, while holding task structure constant. Our results show that the SPA is highly sensitive to relative contextual distinctiveness. When the self-name serves as a unique social category, it reliably captures cognitive priority. Notably, this benefit extends to other familiar identities under high-distinctiveness conditions, indicating that uniqueness is a primary driver of automatic visual encoding. Conversely, when the self's distinctiveness is diluted within a diverse social context, the SPA is eliminated. Crucially, under matched competitive constraints where the self and another highly familiar identity share distinctiveness, self-relevance acts as a tie-breaker to reclaim processing priority. \n\nThese findings demonstrate that the self-processing advantage is not an inevitable intrinsic privilege but is flexibly shaped by relative contextual distinctiveness. This study highlights the dynamic nature of how the visual system prioritizes socially relevant information based on the informational structure of the immediate context.", "SubmissionID": 346}, {"Day": "Wednesday", "Time": "09:00–10:30", "SessionID": 25, "Topic": "Perceptual Learning and Memory", "Title": "A Unifying Framework of Competing History Biases and Memory Failures in Visual Working Memory Representations", "Author": "BUGAY YILDIRIM", "CoAuthors": "Aysecan Boduroglu", "Abstract": "We present an analytical framework to account for history biases in visual working memory (VWM) representations. A variety of history biases shape target representations, ranging from stable categorical attractors (intercardinal orientations, canonical colors) to transient session-level summaries (central tendency of the stimulus distribution) and trial-by-trial serial dependencies. These sources of bias have typically been treated independently, or those deemed irrelevant removed via residualization, post-hoc. The proposed framework offers a unified perspective that can comprehensively account for all these history biases in VWM representations. Specifically, we applied a stochastic model to an in-house rapid serial visual presentation attentional blink data where participants had to encode and reproduce two sequential targets’ orientations (T1 and T2). \n\nThe model assumes that VWM representations are continuous traces that drift and diffuse over delay, while simultaneously accounting for memory failures. T2 responses were best captured by a full model dependent on the memory state. Specifically, when T2 (subsequent target) is “remembered”, its representation drifts towards the stable categorical attractors (e.g., intercardinal orientations) and the global mean of the T2 orientation distribution while drifting away from the preceding target in the same trial (T1). When the T2 is “forgotten”, the model probabilistically assigns the response to one of three memory failure substates: a swap error (reporting T1 for T2), a categorical guess (e.g., an intercardinal orientation), or a random guess (a uniform response).\n\nTo further validate this analytical framework’s generalizability, we applied reduced variants of the model to serial dependence datasets, demonstrating how these overlapping biases dynamically influence VWM representations. The model is currently under further development. This framework unifies several lines of research and offers better understanding of human VWM without applying post-hoc statistical corrections to the data.", "SubmissionID": 349}, {"Day": "Wednesday", "Time": "09:00–10:30", "SessionID": 25, "Topic": "Perceptual Learning and Memory", "Title": "Training-induced enhancement of feedback to V1 during human visual skill learning", "Author": "Kenshu Koiso", "CoAuthors": "Ylka Kolken*, Kenzo Le Vaillant, Camilla Malvestiti, Federico De Martino, Peter De Weerd", "Abstract": "Visual perceptual learning (VPL) refers to experience-driven improvements in visual performance.  Attention plays a central role in facilitating VPL. Previous work has shown that attentional amplification is more pronounced for low contrast stimuli than for high contrast stimuli (input gain). We therefore hypothesized that training a visual discrimination at a range of contrasts would yield a larger performance enhancement at low compared to high contrasts. The low-level theory (LLT) of VPL, attributes training-induced improvements to hard-wired changes in early visual cortex. Therefore, contributions of feedback related to learning are expected to decline with increasing expertise. Reverse hierarchy theory (RHT) attributes training-induced improvements to enhanced read-out enabled by increased feedback or recurrent processing. Accordingly, especially for low contrasts, post-training skilled performance was expected to enhance feedback from high-level visual areas, which was anticipated to have limited spatial specificity. To test these ideas, we combined visual discrimination learning over a range of contrasts with ultra-high field 7T fMRI pre- and post-learning. The learning paradigm using orientation discrimination tasks included a first training phase in which participants were trained to establish an orientation threshold, and a second phase in which participants were trained to discriminate orientation differences fixed at their orientation discrimination threshold at increasingly lower contrasts. Comparing pre- and post-training MRI signals, we found a signal increase at lower contrasts within the V1 representation of the grading when attention was directed to the stimulus, mimicking input gain. Furthermore, after training, we also found a signal in the untrained visual field when attention was directed to the grating, which was especially pronounced at low contrasts. This finding is consistent with the idea that visual expertise is reflected in enhanced feedback contributions from high-level visual areas, as predicted by RHT.", "SubmissionID": 358}, {"Day": "Wednesday", "Time": "09:00–10:30", "SessionID": 25, "Topic": "Perceptual Learning and Memory", "Title": "When Complexity Helps You Remember (and Not Misremember)", "Author": "Oscar Solis", "CoAuthors": "Cameron Kyle-Davidson, Alex Wade, Karla Evans", "Abstract": "Visual episodic memory, particularly for rich and complex naturalistic images, strongly reflects the semantic structure that images carry, as well as the idiosyncratic details that make images distinct (Evans & Baddeley, 2018). Perception of the complexity of images also depends partly on semantics (Kyle-Davidson et al., 2023). Complexity and memorability are related: scene images that are perceived as more complex tend to be more memorable. In terms of signal detection, this is related to an increase in ‘hits’ and/or a reduction in ‘false-alarms’ (Kyle-Davidson et al., 2025). One account of this is that the processes underlying complexity perception might also underlie our ability to differentiate memories of similar, yet distinct, images. Here we examined the neural basis of complexity and memorability. Using the shared1000 subset of the Natural Scenes Dataset (1000 images, 8 subjects; Allen et al., 2022), we correlated single-trial beta estimates to measures of image complexity and memorability obtained from human observers. First, we find that activity correlated to complexity is present throughout the visual system and extends into regions classically associated with memory. Second, activity correlated with both complexity and memorability is present in early- to mid-level visual areas. However, this pattern differs in high-level visual areas when considering signal detection ‘hits’ and ‘false-alarms’. One neural population shows activity that is positively correlated with both complexity and image hit rate. A different population shows activity that is positively correlated with complexity and negatively correlated with image false-alarm rate, mirroring the reduction in false-alarm rates observed behaviourally for images that are perceived as more complex. These results position visual complexity as a potential organising principle in visual memory. It may act to increase the representational distance between otherwise similar images in memory, allowing us to distinguish between them.", "SubmissionID": 390}, {"Day": "Wednesday", "Time": "09:00–10:30", "SessionID": 25, "Topic": "Perceptual Learning and Memory", "Title": "Video gamer players exhibit enhanced localisation of stationary and dynamic objects", "Author": "Fiammetta Marini", "CoAuthors": "Bahar Yaman, Artyom Zinchenko, Harriet Batty, Mauro Manassi, Julia Föcker", "Abstract": "A core function of vision is to accurately localise objects across static and dynamic contexts. Although localisation abilities differ substantially between individuals, the sources of this variability remain unclear. One intriguing possibility is that prolonged exposure to environments that demand high spatial precision might play a crucial role in shaping these differences. Here, we tested whether visuo-spatial experience acquired through video gaming is linked to enhanced localisation performance.\nWe compared video game players (VGPs) and non-video game players (NVGPs) on localisation in static and dynamic contexts using a Position Adjustment task and a Multiple Object Tracking (MOT) task, and tested whether weekly gaming experience predicts performance. To explore potential mechanisms underlying differences in localisation abilities, we also measured serial dependence strength, a perceptual bias whereby current position judgements are attracted toward recently viewed locations. Specifically, we tested whether weaker serial dependence strength, which implies reduced temporal integration of spatial information over time, accounts for enhanced localisation accuracy.\nOur results showed that VGPs exhibited advantages in both static and dynamic localisation, with performance increasing as a function of gaming experience. Localisation performance was strongly correlated across tasks, indicating shared underlying processes. Critically, serial dependence strength did not differ between groups, suggesting that the VGPs’ advantage reflects higher-resolution spatial representations rather than reduced temporal integration.\nTaken together, these findings show that prolonged gaming experience is associated with superior spatial localisation, which does not rely on reduced temporal integration of spatial information. More broadly, they suggest that localisation of static and dynamic objects relies on shared, experience-dependent representational mechanisms.", "SubmissionID": 450}, {"Day": "Wednesday", "Time": "09:00–10:30", "SessionID": 25, "Topic": "Perceptual Learning and Memory", "Title": "Social-event chunking in working memory does not guarantee attentional guidance by bound color", "Author": "Xinlan Wang", "CoAuthors": "Jinglan Wu, Zaifeng Gao", "Abstract": "Visual working memory often guides attention toward matching information in the external world. However, it remains unclear whether an integrated representation stored in working memory allows all bound features to guide attention. Socially interactive biological motions can be chunked as unified social events rather than maintained as independent agents. Here we tested whether such social-event chunking also produces attentional guidance by a task-irrelevant feature bound to the remembered event. Participants memorized colored point-light displays depicting physical-contingency or communicative-contingency biological-motion interactions, and then performed a visual search task in which color was irrelevant. The search display either contained or did not contain a distractor whose color matched the remembered event. Across four experiments, we manipulated the organization of the remembered display, interaction type, and whether biological-motion events or color was task-relevant. When participants memorized dyadic social-interaction events, color-matching distractors did not reliably slow search, despite prior evidence that interacting agents can be chunked into a unified event representation. In contrast, reliable memory-driven capture emerged when the remembered display contained a single colored biological-motion item, and also when participants memorized the two colors carried by socially interactive biological motions. Moreover, interaction type modulated memory performance but not search reaction times. These findings reveal a dissociation between social-event chunking in working memory and attentional guidance: storing a social interaction as an integrated event does not necessarily make its task-irrelevant color an active template for visual selection. Thus, the active template guiding attention appears to be more selective than the integrated event representation maintained in working memory.", "SubmissionID": 457}, {"Day": "Wednesday", "Time": "09:00–10:30", "SessionID": 25, "Topic": "Perceptual Learning and Memory", "Title": "Chunking improves working memory via compression, not direct retrieval from long‑term memory", "Author": "Juan M. Chau", "CoAuthors": "Joel Shebioba, Anna Pitt, Matias J. Ison, Nicholas E. Myers", "Abstract": "Chunking, the grouping of multiple items into structured units, improves working memory (WM) performance, but the mechanism underlying this benefit remains debated. One account proposes that statistical regularities allow multiple items to be compressed into more efficient WM representations. Another proposes that structured associations are stored in long‑term memory (LTM) and reinstated at recall, offloading storage demands. In most experiments, these accounts predict identical behaviour. This study addressed this by introducing continuous trial‑to‑trial variations in the hues of learned colour pairs, allowing us to test whether chunking benefits depend on compressed memory for the current trial (WM) or on retrieval of long‑run feature means (LTM).\n\nAcross two delayed visual feature report tasks (N1=23, N2=24), chunking improved recall relative to unstructured arrays. Participants were reliably sensitive to trial‑specific feature changes, indicating that WM tracked the current display rather than retrieving LTM templates. However, responses were systematically biased toward each item’s long‑run mean, with stronger biases for chunkable trials. We next derived psychophysical models from the competing predictions of compression and LTM recall. Specifically, we formalised a compression account grounded in rate-distortion theory, which predicts that compression produces systematic biases towards the learned mean, whereas an LTM-retrieval mechanism should occasionally replace the true hue with the item’s learned mean. The compression-based biased‑representation model outperformed models based on LTM retrieval, indicating that chunking operates through compression in WM rather than reinstatement of LTM representations. Experiment 2 introduced retrospective cues during maintenance to test whether directing attention to a subset of items could reduce bias (effectively decompressing the chunked representation). Cues improved accuracy but did not reduce the LTM‑driven bias, showing that long‑term priors influence WM during encoding or early maintenance, not during recall. Overall, chunking enhances WM through efficient, prior‑guided compression during encoding.", "SubmissionID": 478}, {"Day": "Wednesday", "Time": "09:00–10:30", "SessionID": 25, "Topic": "Perceptual Learning and Memory", "Title": "Distinguishing Rembrandt from his pupils: evidence for tacit perceptual learning in a connoisseur-level task", "Author": "Maarten Wijntjes", "CoAuthors": "Jeroen Stumpel", "Abstract": "Visual experts can see things that are invisible to the non-expert, but how is expertise acquired? Can this expertise be transferred through verbal descriptions, or is the knowledge tacit and only acquired through feedback? A domain where visual expertise plays an important role, both in education and in professional authentication practice, is the arts. Various studies have shown that non-experts can learn to distinguish art styles, but the task difficulty was generally far below that of the art connoisseur. Here, we investigate whether a truly difficult task, even for connoisseurs, can be learned: distinguishing drawings of Rembrandt from those of his pupils (e.g. Govert Flinck, Ferdinand Bol). \n\nWe collected 288 drawing pairs (Rembrandt-pupil) that were matched on subject matter using CLIP embeddings. In the first experiment we let 30 participants perform a 2AFC task with feedback. To facilitate learning, a 200 word instruction by an expert was offered and could be consulted throughout. A minimum of 6 seconds viewing time per trial was imposed; the actual experiment took over one hour. Of the 22 participants who passed the catch-trial criterion (≥75%), 17 showed a positive logistic learning curve. The overall increase of 4% in accuracy was significant (t(21)=3.38, p=0.0028). \n\nTo investigate the effect of expert instruction we ran a second experiment, in smaller blocks (around 100 pairs) with 86 participants. In these shorter sessions, no learning effects were observed for both without (t(44)=1.42, p>0.05) and with (t(40)=1.43, p>0.05) instruction. More importantly, the effect of instruction on accuracy was absent (t(84)=1.16, p>0.05). \n\nThis study shows that visual expertise on a truly difficult task can be acquired but apparently does not require explicit instructions. Implication for art education is to develop more interactive visual learning tools aside from using textbooks.", "SubmissionID": 594}, {"Day": "Wednesday", "Time": "09:00–10:30", "SessionID": 29, "Topic": "Motion Perception and Optical Flow", "Title": "Memory load modulates visually induced self-motion perception (vection): Evidence from a dual-task paradigm", "Author": "Yasuhiro Seya", "CoAuthors": "", "Abstract": "Vection is defined as an illusory perception of self-motion induced by visual stimuli that occupy a large portion of the visual field and move coherently. Many studies have reported that vection can be modulated by various factors such as the size and speed of the stimuli. Although attention is known to modulate vection, its role remains unclear. The present study investigated this issue using a dual-task paradigm in which participants performed both vection and memory tasks. In the experiment, participants viewed a random-dot pattern moving upward or downward and pressed a key whenever they experienced vection. After each trial, they rated the strength of vection experienced on a scale from 0 to 100. The experiment comprised three conditions: a control (vection-only) condition, a memory-task condition, and a listening-task condition. In the latter two conditions, digits were presented auditorily one at a time through headphones. In the memory-task condition, participants were required to memorize sequences of three or five digits, whereas in the listening-task condition, they simply listened to the sequences without memorizing them. Results showed that vection strength was weaker in the memory-task condition than in the other conditions, whereas onset latency and duration of vection did not differ across conditions. These findings are discussed in terms of attentional resources.", "SubmissionID": 411}, {"Day": "Wednesday", "Time": "09:00–10:30", "SessionID": 29, "Topic": "Motion Perception and Optical Flow", "Title": "The speed–acuity test in normally sighted adults across lifespan", "Author": "Jeroen Goossens", "CoAuthors": "Karlijn Woutersen", "Abstract": "The speed–acuity (SA) test quantifies visual discrimination speed and visual acuity simultaneously by measuring reaction times to Landolt‑C orientation judgments across optotype sizes. Our previous work has demonstrated strong developmental effects on SA performance in children with normal vision, as well as clinically relevant delays in children with visual impairments. However, normative data for adults across lifespan are still lacking.\n\nNormally sighted adults, aged 18–75 years, were tested binocularly with the SA test. All participants (n=46) had normal ocular health as confirmed by a comprehensive ophthalmologic exam. Reaction times and accuracy were measured across multiple optotype sizes. Chronometric functions were fitted to the data using a drift‑diffusion decision‑making model, providing estimates of residual response time (tR), choice delay limit (A′²), and sensitivity (k′). Age effects were evaluated at the level of individual fitted parameters and with mixed‑effects nonlinear regression.\n\nThe results indicate that age‑related effects on SA-performance are present across adulthood but modest compared to those during childhood development. Residual response time shows only minimal age dependence (tR change ~0.5 ms/year), suggesting largely preserved sensory encoding and motor execution times. In contrast, the choice delay limit (A′²) increases significantly with age in the mixed‑effects model (P>0.05), reflecting longer decision times for small optotypes. Sensitivity shows a modest age‑related decline in individual‑level and bootstrap analyses (~1% per year). Fits of the mixed‑effects model are excellent (adjusted R² ≈ 0.95), allowing us to establish normative reference ranges for SA performance across lifespan.\n\nThese preliminary findings indicate that age‑related slowing in the SA-task primarily reflects subtle changes in perceptual decision processes rather than large increases in early sensory or motor delays. The resulting lifespan norms enable improved interpretation of individual SA-performance and facilitates future application in ageing and clinical populations.", "SubmissionID": 476}, {"Day": "Wednesday", "Time": "09:00–10:30", "SessionID": 29, "Topic": "Motion Perception and Optical Flow", "Title": "Interaction between the size of stimulus and luminance contrast in vection induced by lateral visual field stimulation", "Author": "kayoko murata", "CoAuthors": "Hidemi Komatsu, Makoto Ichikawa", "Abstract": "Vection, the illusory perception of self-motion induced by visual motion, has been demonstrated to depend strongly on the spatial and physical properties of visual stimuli. Previous studies have reported that the strength of vection increases as the size of the visual stimulus expands. This result highlights the importance of global integration of motion signals across a wide visual area. The strength of motion signals, such as luminance contrast in the visual stimulus, is considered an important factor in motion perception. However, the interaction between the size of stimulus area and luminance contrast in generating vection has not been sufficiently examined. In the present study, we presented the visual stimuli to the left and right visual fields using monitors positioned on both sides of the observer. Three levels of luminance contrast (0.13, 0.32, 0.99 in Michelson contrast) and three levels of stimulus size (with constant height and widths of 43.6, 116.2, and 163.9 degrees) were systematically manipulated. The results showed that when the stimulus area was small, no significant differences were observed across the luminance contrast levels. At the lowest luminance contrast level, vection latency was longer at the intermediate area while it was shorter at the largest size. At medium luminance contrast level, no clear effect of stimulus size was observed. In contrast, at the highest luminance contrast level, larger stimulus size induced faster, longer, and stronger vection. The relationship between contrast and stimulus area indicated that vection does not simply occur faster as the size of stimulus area increases; rather, the establishment of vection under low-contrast conditions requires a sufficiently large size of stimulus area.", "SubmissionID": 496}, {"Day": "Wednesday", "Time": "09:00–10:30", "SessionID": 29, "Topic": "Motion Perception and Optical Flow", "Title": "Perceived Trajectories Before Object Appearance: Effects of Occlusion Type and Motion Speed", "Author": "英海 小松", "CoAuthors": "Kayoko Murata", "Abstract": "The permanence of the visual world—the experience that objects persist in time and space despite temporary invisibility—is a fundamental aspect of vision. The occluded surface was perceived to be present even after it was hidden, and the appearing surface was perceived to be present even before it became visible. However, the extent of such perceptual persistence—how far before appearance or after disappearance an object's motion is perceived—remains unclear. In a previous study presented at ECVP2025, we compared two types of occlusion: (1) surface occlusion, in which occluding surfaces matching the background color were positioned at both edges of the display, gradually concealing the object as it moved behind them; and (2) luminance-based occlusion, in which the object decreased in brightness until it became indistinguishable from the background, without a defined occluding edge, based on the 'foggy tunnel effect'. Results revealed that the perceived trajectory was longer under luminance-based occlusion than under surface occlusion, and that the trajectory following disappearance was perceived as longer than that preceding appearance. However, some participants reported difficulty in indicating the starting position before the object's appearance, suggesting that the post-disappearance task may have interfered with the pre-appearance task. In the present study, we examined only the pre-appearance phase. The independent variables were occlusion types and three levels of object speed. Results replicated the occlusion-type effect, and faster-moving objects were perceived as traveling greater distances. Critically, the perceived trajectory before appearance was longer than in the equivalent condition at ECVP2025 and was comparable in length to the post-disappearance trajectory reported previously. These findings suggest that occluded motion perception extends back in time before appearance, analogous to boundary extension in memory, and beyond what representational momentum alone predicts.", "SubmissionID": 497}, {"Day": "Wednesday", "Time": "09:00–10:30", "SessionID": 29, "Topic": "Motion Perception and Optical Flow", "Title": "The effect of cross-scale interactions in the discrimination of global motion", "Author": "Omar Bachtoula", "CoAuthors": "Ignacio Serrano-Pedraza", "Abstract": "The combination of static coarse scales and moving fine scales at short durations produces an illusion in which stimuli are perceived as moving in the opposite direction to the actual motion. In this study, we assessed the presence of this cross-scale interaction at the global motion level. We conducted three experiments in which we used plaids (±45º) and measured the proportion of correct responses for four durations (25, 50, 100, and 200 ms). In the first experiment, we tested whether the cross-scale interaction appears in the pattern motion of plaids that combine high and low spatial frequencies and are windowed by isotropic Gaussians of different sizes. The cross-scale interaction only arose for the shorter durations and stimuli larger than 1 deg. In the second experiment, we tested the effect of the window elongation (vertical or horizontal). The cross-scale interaction showed an asymmetric behaviour, appearing only when the pattern motion of plaids occurred along the axis of elongation and not when it was orthogonal to it. However, those stimuli were equally visible in both elongated windows, suggesting that the asymmetry originates after the integration of local motion signals. We conducted a third experiment to test further test this idea, by using only oblique, parallel coarse- and fine-scale gratings within those elongated windows. The cross-scale interaction was equally strong in both windows, supporting the idea that the cross-scale interaction occurs after motion signals of the same scale have been integrated across orientations. However, based on the present evidence, we cannot rule out the possibility that the cross-scale interaction is inherited from the processing of local motion.", "SubmissionID": 510}, {"Day": "Wednesday", "Time": "09:00–10:30", "SessionID": 29, "Topic": "Motion Perception and Optical Flow", "Title": "Investigating the relationship between size and coherence in a novel motion perception paradigm.", "Author": "Richie Connors", "CoAuthors": "Frans Cornelissen, Bjørn Helland-Hansen, Minke de Boer, Frank Lindseth", "Abstract": "Purpose:\n\nRandom Dot Kinematograms (RDKs) are often implemented as stimuli in paradigms assessing motion perception. These paradigms typically consist of ‘local-field’ (taking up a small section of screen) or ‘full-field’ (spanning the whole screen) RDK targets. We developed a framework for implementing RDK stimuli whereby ‘local-field’ RDKs are embedded into a ‘full-field’ of random noise. By embedding RDKs, motion sensitivity can be assessed with various parameters (e.g. size, eccentricity) whilst responses are solely driven by the motion signal. This study sought to assess how our framework performs in reference to traditional RDK approaches, and whether it can reveal a known age-related decline in motion sensitivity. An additional aim was to investigate the relationship between target parameters of coherence and size, which were simultaneously modulated within our paradigm.\n\nMethods:\n\nThirty healthy participants were split into younger (24.3±4.8, N=15) and older (64.4±3.4, N=15) groups. Participants completed a 4-choice motion discrimination task. The RDK stimulus had 5 set levels of coherence (30-100%) and 5 set levels of size (3°-10°), with 10 repetitions of each condition (250 trials overall). We quantified the response time (RT) and motion discrimination thresholds across groups.\n\nResults:\n\nWe found younger participants required significantly lower motion discrimination thresholds for both coherence and size. For RT, we found younger participants were significantly faster than older participants, but only at higher coherence levels. Both coherence and size had significant main effects on RT, with faster responses as coherence and size increased. \n\nConclusion: \n\nOverall, we replicated traditional RDK paradigms by demonstrating lower discrimination thresholds as stimulus intensity increased. Further, we demonstrated an age-related decline in motion sensitivity, specifically in discrimination thresholds. Thus, our framework provides a comparable method of measuring sensitivity to motion to traditional RDK paradigms, whilst simultaneously allowing for more complex stimulus design.", "SubmissionID": 516}, {"Day": "Wednesday", "Time": "09:00–10:30", "SessionID": 29, "Topic": "Motion Perception and Optical Flow", "Title": "Tian Yuan, Li Wang, Yi Jiang", "Author": "Tian Yuan", "CoAuthors": "Li Wang, Yi Jiang", "Abstract": "tyuanjess@163.com", "SubmissionID": 609}, {"Day": "Wednesday", "Time": "09:00–10:30", "SessionID": 29, "Topic": "Motion Perception and Optical Flow", "Title": "Perceiving time to contact and vehicle collisions.", "Author": "Martin Banks", "CoAuthors": "", "Abstract": "Time-to-contact is the time remaining before a moving observer collides with an object ahead. The observer can in principle estimate that time from visual information alone by computing the angular size of the retinal image of the object divided by the time derivative of that size. Nearly all studies of the ability to estimate or discriminate time to contact have examined times close to the moment of collision: specifically, times of 3sec or less. I analyzed the information available in the expanding retinal image for a much larger range of times to contact. I found that estimating time to contact would be exceedingly difficult for times of 5sec or greater. This conclusion is supported by analyses of actual rear-end vehicle collisions. For example, Markkula et al. (2016) analyzed the data from numerous collisions and near collisions. Their data included videos of the driver's face and measurements of when braking and/or steering was begun in order to avoid collision. From this they determined when the driver looked at the road ahead or at the other objects such as the dashboard or rear-view mirror, Whenever time to contact with a stationary or decelerating vehicle ahead was less than 5sec, the driver reacted very quickly in an attempt to avoid a collision. But whenever the time was greater than 5sec, the driver reacted much more slowly. In other words, drivers did not perceive a collision as imminent when time to contact was greater than 5sec and therefore did not respond to the expanding image of the vehicle they were about to collide with. These real-world data are remarkably consistent with my analysis of the visual information available in the expanding image of the object ahead", "SubmissionID": 610}, {"Day": "Wednesday", "Time": "09:00–10:30", "SessionID": 21, "Topic": "Face Perception and Recognition", "Title": "Is facial composite effectiveness enhanced when local context and focus-of-attention instructions align?", "Author": "Amy Purcell", "CoAuthors": "Emma Portch, Alejandro Estudillo, Sarah Bate, Charlie Frowd", "Abstract": "Facial composites are best recognised when they contain accurately constructed internal features (the eyes, brows, nose and mouth). When external features (global facial shape, hair and ears) are consistently visible during construction they may (a) provide a useful context for internal feature development, or alternatively (b) distract constructors, compromising their ability to perform the critical latter task. Across two experiments we explore how internal feature accuracy varies according to three manipulations posed at construction: (a) the presence or absence of external features, (b) explicit focus-of-attention instructions (to the internal features overall, or the eye region), and (c) the visibility of another facial region, which may or may not additionally provide local context (i.e., the lower-face-half). Composite accuracy was assessed by asking those familiar with the target identities to attempt to recognise the composites constructed to resemble them. A cross-over interaction emerged: when external features were present, composites were better named when the lower-half region was visible and constructors were instructed to focus on the internal facial region, however, when external features were absent, composites were better named when constructors had been directed towards the eye region. Under these conditions it was less clear whether a visible lower-half was facilitative. Thus, results suggest that internal feature construction may benefit from the presence of a local context: available and adopted context may vary according to (a) which regions of the face are visible, and (b) the explicitly instructed focus-of-attention. Composite effectiveness appears best when manipulations align i.e., when external features are absent, the visible lower-half may act as a useful context for accurate construction of the important eye region; an aim further enhanced by congruent focus-of-attention instructions. When congruency exists - between available context and instructed focus - further facilitation may arise due to a reduction in intrinsic cognitive load.", "SubmissionID": 436}, {"Day": "Wednesday", "Time": "09:00–10:30", "SessionID": 21, "Topic": "Face Perception and Recognition", "Title": "Effects of Simulated Visual Impairment on the Representation and Recognition of Facial Emotions", "Author": "Chloe Lam", "CoAuthors": "Veronica Pisu, Isabelle Mareschal, Guido Maiello", "Abstract": "Visual impairment degrades the quality of visual information available for object processing, but its impact on facial emotion perception remains unclear. We examined how simulated visual impairment affects the representation and recognition of facial emotions in normally sighted participants wearing Cambridge Simulation Glasses (Goodman-Deane, 2013). In Studies 1 and 2 (N=40), participants used a genetic algorithm (Binetti et al., 2022) to refine avatar facial expressions to match one of four target emotions (happiness, sadness, fear, and anger) under normal vision and one of two levels of simulated impairment, tested across studies (Study 1: mild, 0.3 logMAR acuity loss;  Study 2: severe, 0.7 logMAR acuity loss). Participants (20 per study) completed eight emotion generation sessions—four with, four without simulation glasses, with order counterbalanced. Across 10 trials per session, participants selected face images that best matched target emotions and rated their satisfaction with final generated expressions. In both studies, participants increasingly chose expressions that more closely matched target emotions over trials (p<.001). Mild impairment did not significantly affect generated expressions or satisfaction levels (ps>.05). Conversely, under severe impairment participants generated expressions with stronger facial features (p=.011) and reported lower satisfaction with final selections (p<.001). To test whether these changes in internal representations influenced recognition, in Study 3 (N=15), participants completed a facial emotion recognition task under normal vision and severe simulated visual impairment using expressions generated in Study 2. As expected, recognition accuracy for expressions generated under normal vision was worse under simulated impairment than under normal vision (p<.001). However, for expressions generated under simulated impairment, recognition accuracy loss was reduced overall; for happy and sad expressions, recognition under simulated impairment was even better than under normal vision (ps<.01). These findings suggest that severe simulated visual impairment induces adaptive changes in internal representations that support robust emotion recognition under degraded viewing.", "SubmissionID": 439}, {"Day": "Wednesday", "Time": "09:00–10:30", "SessionID": 21, "Topic": "Face Perception and Recognition", "Title": "Face-selective regions encode visual properties of familiar faces that are similar to those extracted by deep neural networks", "Author": "Lucia Garrido", "CoAuthors": "Maria Tsantani, Idan Grosbard, Galit Yovel", "Abstract": "We recently showed that the fusiform face area (FFA) and the occipital face area (OFA) encode distinct information about faces (Tsantani et al., 2021). Participants were presented with naturalistic videos of moving faces (not speaking) of famous individuals, and we computed dissimilarities of brain patterns to different identities to build representational dissimilarity matrices (RDMs) for the face-selective regions. We found that the brain RDMs in the OFA correlated more with candidate models based on low-level stimulus properties, while the RDMs in the FFA correlated with higher-level properties (related to image-computable properties derived from a deep neural network OpenFace, and to human-based judgments).\n\n \n\nHere, we extended these analyses to additional image-computable models. We compared our brain RDMs to candidate model RDMs derived from different layers of a deep convolutional neural network (DCNN), a VGG16 network trained on the VGGFace2 database, after pre-processing and training as in Parkhi et al. (2015). We found that brain RDMs in OFA correlated significantly with earlier layers, but substantially less with later layers. Brain RDMs in FFA correlated more with later layers, though not significantly. \n\n \n\nWe will also show results from searchlight analyses for each of the image-computable models. Finally, we compared RSA results using brain RDMs computed as dissimilarities between patterns in response to identities (as in Tsantani et al., 2021) to results using RDMs computed as dissimilarities between patterns in response to specific face stimuli (there were six different stimuli per identity). While stimulus-based RDMs are overall less reliable than identity-based RDMs (likely because of having fewer trials, and thus less averaging), the results are broadly similar across both types of RDMs. \n\n \n\nOur results show that face-selective regions encode visual properties of familiar faces that have similarities to those extracted by DCNNs, and that the OFA and FFA encode progressively more complex visual features.", "SubmissionID": 459}, {"Day": "Wednesday", "Time": "09:00–10:30", "SessionID": 21, "Topic": "Face Perception and Recognition", "Title": "How does distinctiveness influence prioritisation in visual search for faces?", "Author": "Natalie Mestry", "CoAuthors": "Emma Smillie, Nick Donnelly", "Abstract": "Unfamiliar face recognition is critical in security settings, but is found to be error prone compared to familiar face recognition (Burton et al. 1999). Evidence suggests a capacity limitation in dual-target visual search for unfamiliar faces, resulting in the prioritisation of one target over another (Mestry et al., 2017). Distinctive faces are easier to recognise (Valentine, 1991) and are detected more effectively in dual-target search (Smillie et al., 2024).\n\n \n\nConceptual encoding is enhanced when faces are paired with names (Schwartz & Yovel, 2016) and such pairings are learned faster and retained in memory for longer when the names are distinctive (Stanhope & Cohen,1993). Together, these findings suggest that encoding benefits are strongest for distinctive names.\n\n \n\nThe present study examines the interaction of face and name distinctiveness during encoding, and whether this leads to prioritisation in visual search.\n\n \n\nParticipants completed an online visual search task learning six target faces in a 2 (encoding: together, individually) x 3 (face: distinctive, typical) x 2 (name: distinctive, typical, no name) x 4 (block) mixed design. In subsequent search trials, participants were asked to respond present if any of the six targets was shown, or absent if no target was present. Confidence ratings (0–100) were recorded for each response.\n\n \n\nAnalysis indicates target-absent trials are more accurate, with accuracy and response time improving over time. Distinctive face targets are prioritised in search; their accuracy remains stable and response time reduces across blocks. Typical face targets show poor accuracy from the start that declines over time, with responses time also decreasing. There were no effects of target name or encoding type. This suggests distinctive faces are robustly encoded and searched for efficiently, but typical faces were not, suggesting a capacity limitation. Implications for improving the encoding of typical faces and applied search contexts will be discussed.", "SubmissionID": 463}, {"Day": "Wednesday", "Time": "09:00–10:30", "SessionID": 21, "Topic": "Face Perception and Recognition", "Title": "Does that rock look like a face to you? Quantifying the face signal in pareidolic images", "Author": "Saivydas Villani", "CoAuthors": "Guido Maiello", "Abstract": "Most people have, at some point, noticed a face in a socket, a cloud, or the front of a car. Yet such impressions are not shared uniformly: an image that looks unmistakably face-like to one observer may appear unremarkable to another. This raises a central question for the study of face pareidolia: how much of the illusion is determined by the stimulus, and how much by the observer? Addressing this requires a validated psychophysical instrument that can decompose these sources of variance. To this end, following Hamilton et al. (2024) we fine-tuned computer-vision face-detection models on pareidolic images from the Faces in Things dataset, which includes single-rater annotations of how easy the pareidolic faces are to spot (Easy/Medium/Hard). Model confidence scores provided a quantitative estimate of stimulus-level face signals, which we used to stratify images along a “faceness” continuum. We then asked 103 human participants to detect, localise, and rate the faceness of 75 pareidolic stimuli from the Faces in Things test set sampled across Easy/Medium/Hard categories. Detection probability and detection reaction times varied systematically across stimulus categories (both p<.001), confirming that the labels indexed a genuine perceptual dimension. Bootstrapped split-half reliability was good-to-excellent (r=.95 for detection rate; r=.87 for detection reaction time; r=.88 for faceness rating), confirming that stimulus-level responses were highly replicable across participants. Faceness ratings also correlated strongly with detection reaction times (r=-.79, p<.001), suggesting both measures track a common underlying face signal. Model confidence scores showed moderate correlations with all primary behavioural outcomes (rs=.40-.51, ps<.001), supporting their use as a quantitative index of face signal in pareidolic images. Together, these findings establish a reliable, stimulus-validated paradigm for studying pareidolia. We thus provide a framework for testing whether individual differences in pareidolic sensitivity reflect bottom-up stimulus properties, top-down generative mechanisms, or both.", "SubmissionID": 499}, {"Day": "Wednesday", "Time": "09:00–10:30", "SessionID": 21, "Topic": "Face Perception and Recognition", "Title": "Beyond Words: Objective and Subjective Face Recognition Difficulties in Developmental Dyslexia", "Author": "Rachel Bennetts", "CoAuthors": "Andrea Petrova, Sarah Bate", "Abstract": "Face processing and word reading have typically been considered independent processes. However, growing evidence suggests that people with developmental dyslexia may also experience difficulties with face recognition. To date, most research has used highly controlled, unfamiliar face recognition tasks and group-based analyses to examine face processing in dyslexia, leaving it unclear whether these difficulties extend to more naturalistic tasks, such as famous face recognition or self-reported face recognition abiity, and what proportion of dyslexic readers show significant face recognition impairments. This study examined face recognition in 52 individuals with developmental dyslexia and 55 typical readers, using a famous face recognition task assessing familiarity judgements, semantic access, and identification, alongside a self-report measure of face recognition (the PI20) and several reading tasks. People with dyslexia performed significantly worse than typical readers on all reading tasks and all aspects of familiar face recognition, and reported poorer face recognition abilities. Over 25% of people with dyslexia showed \"minor\" face recognition impairments, and an additional 12% showed \"major\" impairments (over 1SD and 2SD from the mean on both famous faces and PI20, respectively), compared to only 4% of typical readers showing minor impairments and none showing major impairments. These findings suggest that face recognition difficulties in dyslexia are surprisingly common and meaningfully affect everyday face recognition.", "SubmissionID": 521}, {"Day": "Wednesday", "Time": "09:00–10:30", "SessionID": 21, "Topic": "Face Perception and Recognition", "Title": "Gradual transformation of orientation representations along the ventral visual cortex for human faces", "Author": "Mrittika Dey", "CoAuthors": "Andrea Costantino, Jolien Schuurmans, Valerie Goffaux", "Abstract": "Faces are socially important visual stimuli, containing most contrast in the horizontal orientation range. Although orientation is typically considered a low-level visual feature processed in the primary visual cortex (V1), horizontal information in faces elicits the strongest responses in the high-level fusiform face area (FFA). Yet, how the low-level representation of orientation transforms to support high-level face representations is unclear. We used fMRI and representational similarity analysis to track orientation encoding across the visual hierarchy. Nineteen participants viewed upright, inverted, and scrambled faces filtered in specific orientation bands (0–180°, 30° steps). Inverted faces retain orientation content and shape properties of upright faces while scrambled faces only preserve the former. We constructed representational dissimilarity matrices (RDMs) from multivoxel patterns across V1, LOC (lateral occipital cortex), OFA (occipital face area), FFA, and PPA (parahippocampal place area). To examine whether orientation representations were modulated by category, we compared neural RDMs to category-specific orientation models (horizontal–upright, horizontal–inverted, and horizontal–scrambled), each predicting highest dissimilarity for horizontal orientations within and across categories. We tested variance explained by each model, controlling for low-level image properties and high-level category structure.  All three category-specific models explained comparable variance in V1 and PPA, suggesting orientation representations in these regions were not modulated by category. In contrast, the horizontal–upright model showed a progressive increase in explained variance across LOC, OFA, and FFA, significantly outperforming both the inverted and scrambled models. The latter did not differ from each other nor show any systematic increase along the hierarchy. These findings document the transformation of orientation representations along the ventral visual hierarchy, shifting from orientation-selective coding in V1 to a category-selective format in high-level regions, dependent on their high-level informativeness.", "SubmissionID": 523}, {"Day": "Wednesday", "Time": "09:00–10:30", "SessionID": 21, "Topic": "Face Perception and Recognition", "Title": "Holistic Face Integration Under Degraded Visual Input: A Frequency-Tagging Study", "Author": "Alara Sürer (Student)", "CoAuthors": "Olesya Blazhenkova, Nihan Alp", "Abstract": "Human face perception is highly robust even when visual input is incomplete due to blur or occlusion, highlighting the role of top-down processes in perceptual completion. One possible contributor is visual mental imagery, given the overlap between imagery and face perception; however, it remains unclear whether imagery supports the holistic integration of degraded face parts. Here, we investigate whether degraded face parts still elicit holistic neural integration, and whether such integration is modulated by the degree of visual degradation, as captured by neural markers of visual integration. Using a frequency-tagging method, we dissociate part-based and holistic neural responses to faces through steady-state visual evoked potentials (SSVEPs). We tagged the two halves of the face at f1=6 and f2=7.5 Hz to quantify neural signals to each half separately, as well as their integration through intermodulation (IM: nf1 ± mf2) components. Faces were presented as fully visible, fully blurred, or partially blurred, with Gaussian blur applied at 20% and 80% in the fully and partially blurred conditions, respectively. On each trial, participants (N = 12) viewed a frequency-tagged face stimulus and, in the blurred conditions, were asked to imagine the partially degraded face halves or fully degraded faces and provided perceptual ratings of their experience. Preliminary analyses revealed robust SSVEPs at both tagged frequencies, their harmonics, and the IM components across conditions, indicating nonlinear interaction between the two frequency-tagged face halves. Fundamental responses were strongest over the occipital, while IM responses were observable both in the occipital and central regions. Central IM responses seemed to be modulated by the blur level and suppressed in the fully visible face condition, relative to partially and fully blurred faces. These findings suggest that degraded facial input still supports coherent neural integration and are consistent with a contribution of top-down processes to perceptual completion.", "SubmissionID": 578}, {"Day": "Wednesday", "Time": "09:00–10:30", "SessionID": 21, "Topic": "Face Perception and Recognition", "Title": "Does pre-construction face recall impact on the subsequent recognisability of holistic and feature-based facial composites?", "Author": "Emma Portch", "CoAuthors": "Charlie D. Frowd, Amy Purcell, Heidi Kuivaniemi-Smith, Alejandro J. Estudillo", "Abstract": "Facial composites are computer-generated visual likenesses, created by eyewitnesses to resemble a perpetrator. Their recognition, by those familiar with the target identity, can generate important investigative leads. While it is necessary to elicit a feature-based face-recall description from a witness prior to construction, construction relies both on accurate recall and recognition of the face. As such, while feature-recall can complement some aspects of construction, it can hamper others, with these effects moderated by the type of construction system used (feature-based or holistic). To date, this complex relationship has only been examined when face-recall is invited via a pre-construction Cognitive Interview (CI) yet witnesses ordinarily undergo a preceding Achieving Best Evidence (ABE) interview, wherein the degree of invited face-recall may considerably vary. The present study aimed to investigate the impact of such recall on composite accuracy: prior to a CI and construction, using either a feature-based (Pro-FIT) or holistic system (EvoFIT), participants encountered: (a) no ABE, or an ABE where they were invited to provide either (b) minimal face recall (via a simple free-recall prompt) or (c) detailed face recall (inclusive of context reinstatement, free- and cued-recall). Composite effectiveness was assessed by asking people familiar with the composite’s target identity to attempt to identify the image. Both feature-based and holistic composites were better identified when they had been constructed following no ABE versus a minimal or detailed ABE, with naming rates similar in the latter two conditions. The present result was unexpected and deviates from that obtained from prior repeated interviewing work, where face-recall was given either verbally or in writing. We harness Verbal Overshadowing and Cognitive Load theories to explain our findings, and we consider their implications for forensic practice.", "SubmissionID": 582}, {"Day": "Wednesday", "Time": "09:00–10:30", "SessionID": 21, "Topic": "Face Perception and Recognition", "Title": "Eccentricity—no distance— between dynamic faces limits synchrony perception", "Author": "Nihan Alp", "CoAuthors": "Zeynep Karagül, Bilge Sayim", "Abstract": "Visual perception does not operate uniformly across the visual field. Compared to foveal vision, peripheral vision has lower spatial resolution, stronger crowding, and processes temporal information differently. Temporal processing differences across the visual field, such as perceived timing of dynamic stimuli, could influence whether two events are perceived as synchronous. Here, we investigated whether the perceived synchrony of two dynamic faces is influenced by their locations in the visual field.\n\n\n\nWe conducted two experiments in which participants judged whether two simultaneously presented faces were synchronous or asynchronous. In Experiment 1, we varied face-to-face distance (6°, 8°, 12°) in two conditions. Participants either fixated on a centrally presented face, with the other face presented in the periphery (Center condition), or they fixated between the two peripheral faces, with one face at the same eccentricity in each hemifield (Symmetric condition). Sensitivity analyses showed an interaction between conditions and face-to-face distance. In the Center condition, sensitivity decreased with increasing distance. Conversely, sensitivity remained constant across distances in the Symmetric condition. These results indicate that increased face-to-face distances impaired synchrony perception only when one face was presented at the fovea and the other in the periphery.\n\n\nIn Experiment 2, we compared eccentricities with peripheral faces presented at the same three eccentricities (6°, 8°, and 12°) in both the Center and Symmetric conditions. We found a clear effect of eccentricity: sensitivity decreased with increasing eccentricity. In contrast to Experiment 1, there were no differences between the Center and Symmetric conditions. Our findings show that synchronization sensitivity is constrained primarily by eccentricity rather than by absolute face-to-face distance or fixation location. We suggest that the visual system compensates for foveal-peripheral differences to enable effective processing across the visual field.", "SubmissionID": 585}, {"Day": "Wednesday", "Time": "09:00–10:30", "SessionID": 36, "Topic": "Social Perception and Emotion", "Title": "Hearing the Connection: Auditory Cues Restore Social Chunking in Back-to-Back Interactions", "Author": "Yunxuan Ji", "CoAuthors": "Haoyu Teng, Mowei Shen, Zaifeng Gao", "Abstract": "Humans efficiently identify social partners by extracting relational information from interactive behavior through social chunking, a process that integrates individual actions into unified memory episodes. Prior research shows that this chunking advantage depends critically on face-to-face orientation: when agents interact back-to-back, the benefit disappears. This raises a key question: can alternative sensory channels compensate when visual cues are unavailable? We tested whether semantically congruent auditory cues can restore social chunking in back-to-back interactions. Participants were randomly assigned to a congruent or incongruent speech–action condition. During encoding, they viewed sequences of back-to-back action pairs accompanied by dialogue that was either semantically matched or mismatched with the actions. Memory load was manipulated by varying the number of interactive pairs (0–3), with non-interactive pairs as baseline. A concurrent digit-repetition task suppressed verbal recoding. At test, participants identified actions at cued spatial locations. Results showed that when speech was congruent, memory accuracy increased with the number of interactive pairs, indicating a robust chunking effect. In contrast, no such benefit emerged in the incongruent condition, where performance remained at baseline. These findings provide evidence that auditory information can substitute for visual facing cues in enabling social chunking. They suggest that social interaction recognition relies on flexible, multimodal integration and extend the dual-route framework by showing that the communicative pathway can be activated through auditory channels when visual access is blocked.", "SubmissionID": 414}, {"Day": "Wednesday", "Time": "09:00–10:30", "SessionID": 36, "Topic": "Social Perception and Emotion", "Title": "Eye movements reveal attention-holding effects for body stimuli varying in size", "Author": "Mario Dalmaso", "CoAuthors": "Anna Lorenzoni", "Abstract": "Our visual attention is strongly shaped by social signals in the environment. For instance, bodies expressing negative emotions tend to retain attention more than those conveying positive states, suggesting that the visual system is tuned to socially meaningful cues. In the present work, we examined whether a similar pattern occurs for body stimuli differing in body size. We hypothesised that stimuli markedly deviating from a typical body size range would hold attention more strongly in observers with a similar body size, reflecting the social relevance of more extreme body shapes. Two experiments were conducted. In the first experiment, participants provided manual responses while localising a peripheral target presented alongside a centrally displayed body stimulus depicting one of three body size levels: medium, markedly small, or markedly large. In the second experiment, the stimuli and task were identical, but saccadic latencies were recorded using a high-resolution eye tracker, providing a more sensitive index of attentional dynamics. Results showed no evidence of attention holding in the manual-response task, whereas the saccadic-latency experiment revealed clear evidence of attention holding, with significantly longer disengagement times, particularly for stimuli depicting smaller body sizes. Overall, these findings indicate that eye-movement measures are more sensitive to variations in attentional engagement related to body size and suggest that stimuli deviating from a typical body size range, especially those depicting smaller bodies, more strongly capture and hold attention.", "SubmissionID": 445}, {"Day": "Wednesday", "Time": "09:00–10:30", "SessionID": 36, "Topic": "Social Perception and Emotion", "Title": "The temporal distraction effect of erotic images does not depend on gender or alignment with sexual preferences", "Author": "Jeff Saunders", "CoAuthors": "Ho Ming Chan", "Abstract": "Erotic images produce a strong emotion-induced-blindness (EIB) effect. In this study, we test whether the EIB effect from erotic images depends on the relationship between the gender of observers and the gender of image models. Arousal and valence ratings of erotic images tend to be strongly dependent on the alignment between the gender and sexual preference of participants and the gender of image models. If either of these emotional dimensions is the key factor underlying the EIB effect from erotic images, then EIB effects would be expected to show similar interactions. To test this possibility, we analyzed the combined data from seven EIB experiments from our lab that tested erotic images of male and female models and included both male and female participants (N = 366). Each of the experiments used the same RSVP task and erotic stimuli and included a common subset of conditions. Although affective ratings of the erotic stimuli showed the expected gender interactions, we found no gender interactions in the EIB effect. Erotic images of men or women were equally distracting for both male and female participants. When we analyzed the subset of participants who self-identified as hetereosexual, the same qualitative results were observed. The inconsistency between affective ratings and EIB effects suggests that either the EIB effect from erotic images does not depend on valence and arousal, or that the affective ratings for erotic images do not capture the emotional salience that underlies the EIB effects. Our results demonstrate that erotic images produce a similarly strong temporal distraction effect regardless of whether the erotic content aligns with sexual preferences of the observer.", "SubmissionID": 507}, {"Day": "Wednesday", "Time": "09:00–10:30", "SessionID": 36, "Topic": "Social Perception and Emotion", "Title": "Disrupting the right posterior superior temporal cortex selectively impairs attentional orienting to social cues", "Author": "Rui Wang", "CoAuthors": "Peng Cai, Yifei Sun, Zhihan Gao, Li Wang, Rui Wang, Yi Jiang", "Abstract": "Humans readily detect others' focus of attention through various social cues such as eye gaze and biological motion. This remarkable ability, known as social attention, is thought to be supported by a specialized neural network involving the right superior temporal cortex. Here, we employed transcranial magnetic stimulation (TMS) over the right posterior superior temporal gyrus (pSTG) to assess its causal role in attentional orienting to social (eye gaze, biological motion) and non-social (arrow) cues. While all these cues elicited robust reflexive attentional orienting, disrupting the right pSTG significantly attenuated orienting to eye gaze and biological motion, with impairment magnitudes showing a trend toward correlation across individuals. In contrast, orienting to arrow cues remained unaffected. These results provide direct evidence for the functional specialization of the right pSTG in processing multiple forms of social directional cues, identifying it as a critical node of the \"social attention detector\" in the human brain.", "SubmissionID": 574}, {"Day": "Wednesday", "Time": "09:00–10:30", "SessionID": 36, "Topic": "Social Perception and Emotion", "Title": "Response Latency Shapes Perceptual Evaluations in Screen-Mediated Human-Agent Dialogue", "Author": "WenXin Zhang", "CoAuthors": "", "Abstract": "In screen-mediated social interaction, perceptual experience depends not only on what is presented, but also on when responses occur. We examined whether an agent's response latency shapes perceptual evaluations of single-turn human-agent dialogue and whether this effect is modulated by cognitive load. Twenty participants completed a fully within-subject 2 × 4 experiment crossing cognitive load (low, high) and response latency (0, 1000, 2000, and 4000 ms). Cognitive load was manipulated using a dual-task procedure in which participants either ignored or memorised a visually presented 7-digit sequence while performing the dialogue task. After each trial, participants rated interaction naturalness, perceived trustworthiness, and comfort on 0-10 scales. NASA-TLX scores confirmed that the load manipulation was effective. Response latency significantly affected all three measures (all ps < .05). Interaction naturalness ratings were lower at 4000 ms than at 1000 and 2000 ms, and perceived trustworthiness ratings were lower at 4000 ms than at 2000 ms. Comfort showed a non-linear pattern: ratings were highest at 1000-2000 ms, but lower at 4000 ms and, relative to 1000 ms, also lower at 0 ms. In contrast, cognitive load did not significantly affect any measure and did not interact with response latency. These findings suggest that response timing is a salient temporal cue for perceptual evaluations in brief screen-mediated human-agent dialogue. For single-turn interaction, neither immediate nor prolonged responses appear optimal; instead, a short delay of around 1000-2000 ms may best support interaction naturalness, perceived trustworthiness, and comfort.", "SubmissionID": 575}, {"Day": "Wednesday", "Time": "09:00–10:30", "SessionID": 36, "Topic": "Social Perception and Emotion", "Title": "Socio-emotional Feedback Enhances Generalizable Emotion Learning from Biological Motion in High Autistic Traits and Autism", "Author": "Heng Zhou", "CoAuthors": "Junbin Tian, Li Yang, Fang Yang, Yi Jiang", "Abstract": "The ability to perceive and interpret others’ emotions from various social signals is crucial for effective social interaction, enabling individuals to infer intentions and respond appropriately. In addition to facial expressions, humans can extract emotional information from body movement, even when conveyed through point-light displays attached to major joints—known as biological motion (BM), yet it is often reduced in individuals with autism spectrum disorder (ASD) or high autistic traits. It remains unknown whether BM-based emotion processing can be enhanced through targeted training, and whether such learning can generalize across domains of emotional processing.\n\nA total of 223 adults (ages 18–29) were recruited and randomly assigned to a brief, walking-based BM emotion train
